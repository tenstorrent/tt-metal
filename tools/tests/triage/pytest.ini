[pytest]
# docopt still emits parser-time "invalid escape sequence" warnings on import.
# Ignore both categories because older Python versions report DeprecationWarning
# while Python 3.12 reports SyntaxWarning for the same third-party code.
filterwarnings =
    ignore:invalid escape sequence:DeprecationWarning:docopt
    ignore:invalid escape sequence:SyntaxWarning:docopt
