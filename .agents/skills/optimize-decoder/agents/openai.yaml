interface:
  display_name: "Optimize Decoder"
  short_description: "Optimize a correct TTNN decoder layer"
  default_prompt: "Use $optimize-decoder to implement models/autoports/<model>/tt/optimized_decoder.py, preserve the functional decoder contract, improve layout/precision/program configs using profiling evidence, and leave a concise work log, final report, and perf-report output."

policy:
  allow_implicit_invocation: true
