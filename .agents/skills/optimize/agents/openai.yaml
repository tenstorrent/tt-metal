interface:
  display_name: "Optimize"
  short_description: "Optimize runnable TTNN code with perf evidence"
  default_prompt: "Use $optimize to improve runnable TTNN code while preserving correctness, profile warmed prefill and decode with tt-perf-report evidence, apply tracing/layout/sharding/precision-neutral program-geometry/data-movement improvements, keep pre-release dtype/fidelity and precision-bearing compute-kernel fields conservative unless memory capacity requires lowering, and leave a concise work log plus final performance report."

policy:
  allow_implicit_invocation: true
