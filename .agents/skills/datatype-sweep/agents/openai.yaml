interface:
  display_name: "Datatype Sweep"
  short_description: "Post-release TTNN dtype and fidelity Pareto sweep"
  default_prompt: "Use $datatype-sweep after TTI release to evaluate TTNN full-model precision and compute-fidelity configurations against the smaller TTI-release screening benchmark, choose the fastest passing config, rerun the full TTI-release benchmark/eval set for that config, and leave a Pareto plot plus selected precision config."

policy:
  allow_implicit_invocation: true
