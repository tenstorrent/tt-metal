interface:
  display_name: "Graph Rewrite"
  short_description: "Fuse/rewrite a TTNN op graph into a faster equivalent"
  default_prompt: "Use $graph-rewrite during the operation-topology audit to rewrite the measured TTNN op graph into a faster numerically-equivalent one: first replace primitive op sequences with dedicated tt-metal ops (explore the repo for existing ops), then simplify/merge structural ops, then fold adjacent ops (bias/activation/scale/transpose) into existing ops. Verify each rewrite with a PCC>0.99 unfused-vs-fused device test."

policy:
  allow_implicit_invocation: true
