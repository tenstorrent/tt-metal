# partitions.conf - Recommended Slurm partition definitions for TT Metal CI
# Install to /etc/slurm/partitions.conf or include from slurm.conf
#
# Each partition maps to a hardware SKU category. Nodes should be tagged with
# Features that match the constraint labels used by workflow scripts.
#
# Required GRES definition in slurm.conf:
#   GresTypes=tenstorrent
#   NodeName=... Gres=tenstorrent:1
#
# Required Features on nodes (set in slurm.conf NodeName lines):
#   wormhole_b0, blackhole, n150, n300, t3000, galaxy, 6u,
#   p100, p100a, p150, p150b, p300, llmbox, loudbox, deskbox,
#   exabox, multihost, viommu, pipeline-perf, pipeline-functional, amd64

# --- Build partition (CPU-only, no accelerator required) ---
PartitionName=build \
    Default=NO \
    MaxTime=240 \
    State=UP \
    OverSubscribe=YES

# --- Wormhole single-card ---
PartitionName=wh-n150 \
    Default=NO \
    MaxTime=480 \
    State=UP \
    OverSubscribe=EXCLUSIVE

PartitionName=wh-n300 \
    Default=NO \
    MaxTime=480 \
    State=UP \
    OverSubscribe=EXCLUSIVE

# --- Wormhole multi-card ---
PartitionName=wh-t3k \
    Default=NO \
    MaxTime=720 \
    State=UP \
    OverSubscribe=EXCLUSIVE

PartitionName=wh-galaxy \
    Default=NO \
    MaxTime=1440 \
    State=UP \
    OverSubscribe=EXCLUSIVE

# --- Blackhole single-card ---
PartitionName=bh-p100 \
    Default=NO \
    MaxTime=480 \
    State=UP \
    OverSubscribe=EXCLUSIVE

PartitionName=bh-p150 \
    Default=NO \
    MaxTime=480 \
    State=UP \
    OverSubscribe=EXCLUSIVE

PartitionName=bh-p300 \
    Default=NO \
    MaxTime=720 \
    State=UP \
    OverSubscribe=EXCLUSIVE

# --- Blackhole multi-card ---
PartitionName=bh-llmbox \
    Default=NO \
    MaxTime=1440 \
    State=UP \
    OverSubscribe=EXCLUSIVE

PartitionName=bh-loudbox \
    Default=NO \
    MaxTime=1440 \
    State=UP \
    OverSubscribe=EXCLUSIVE

PartitionName=bh-deskbox \
    Default=NO \
    MaxTime=480 \
    State=UP \
    OverSubscribe=EXCLUSIVE

# --- Multi-host ---
PartitionName=exabox \
    Default=NO \
    MaxTime=1440 \
    State=UP \
    OverSubscribe=EXCLUSIVE

# --- Performance overlay (nodes also belong to hw-specific partitions) ---
PartitionName=perf \
    Default=NO \
    MaxTime=1440 \
    State=UP \
    OverSubscribe=EXCLUSIVE
