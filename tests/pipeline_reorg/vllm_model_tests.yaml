# This file defines the test matrix for the vLLM Model Tests pipelines.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   model: HF hub id of the model to serve (also used for workflow_dispatch model filtering).
#   skus: A mapping of SKU names to their configuration:
#     timeout: Job timeout in minutes (whole-job guard; also summed for budget checks).
#     tier: Model tier (1, 2, or 3). Classification only — every entry runs at the
#           same cadence in this single pipeline. The value mirrors the tier of the
#           equivalent model in the e2e/unit pipelines (models_e2e_tests.yaml /
#           models_unit_tests.yaml) for the matching SKU, for reporting/parity.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#
# vLLM-specific per-entry keys (consumed by vllm-model-tests-impl.yaml):
#   server-timeout / benchmark-timeout / sampling-test-timeout: per-step timeouts (minutes).
#   mesh-device, arch, tt-config, additional-server-args, additional-benchmark-args,
#   additional-structured-output-args, default-chat-template-kwargs, tt-llama-text-ver,
#   tt-qwen3-text-ver, tt_mm_throttle_perf: server / benchmark configuration.
#   coherence-test / structured-output / multimodal / sampling-tests: optional test toggles.
#   sampling-test-filter: -k filter for the sampling test step.
#
# For max allowed timeout refer to .github/time_budget.yaml

# ── Gemma 3 ────────────────────────────────────────────────────────

- name: "Gemma3-27B"
  model: google/gemma-3-27b-it
  server-timeout: 45
  benchmark-timeout: 5
  mesh-device: T3K
  arch: arch-wormhole_b0
  tt-config: '{"sample_on_device_mode": "decode_only", "fabric_config": "FABRIC_1D", "l1_small_size": 4096}'
  additional-server-args: "--async-scheduling"
  tt-llama-text-ver: tt_transformers
  multimodal: true
  skus:
    wh_llmbox:
      timeout: 65
      tier: 2
  owner_id: U08E1JCDVNX # Pavle Petrovic
  co-owner-2-id: U08BH66EXAL # Radoica Draskic
