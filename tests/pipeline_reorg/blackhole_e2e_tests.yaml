# --- unit (fast) ---
# Fast multi-card legs that the legacy blackhole-multi-card-unit-tests-impl.yaml
# also runs in post-commit (fast-only: true). Kept in e2e to match the run-count
# observed on the pre-reorg reference run.
- id: bh-fabric-fast-unit
  name: fabric fast unit tests (1D, 2D, single erisc)
  cmd: |
    ./build/test/tt_metal/tt_fabric/fabric_unit_tests --gtest_filter="Fabric1D*Fixture.*"
    ./build/test/tt_metal/tt_fabric/fabric_unit_tests --gtest_filter="Fabric2D*Fixture.*"
    TT_METAL_DISABLE_MULTI_AERISC=1 ./build/test/tt_metal/tt_fabric/fabric_unit_tests --gtest_filter="Fabric1D*Fixture.*"
  skus:
    bh_loudbox:
      timeout: 15
    bh_p300:
      timeout: 15
    bh_quietbox_2:
      timeout: 15
  owner_id: U0883RN6CRE # William Ly
  team: scaleout

