# Blackhole e2e test matrix. See the pipeline-reorg schema for the entry keys
# (id, name, cmd, skus.<sku>.timeout, owner_id, team, model-name).

# --- deepseek_prefill ---
- id: bh-lb-deepseek-prefill-op-tests
  name: bh_lb_DeepSeek_PREFILL_OP_TESTS
  model-name: deepseek_prefill
  cmd: |
    exit_code=0
    pytest models/demos/deepseek_v3_d_p/tests/op_unit_tests/ -vvv --tb=short -k "(not test_ring_joint_mla or (4x2 and pcc_check and not fabric2d)) and (not test_rope_prefill or 4x2) and (not update_padded_kv_cache or 2x4) and (not rotary_embedding_indexed or 2x4) and not single-1" -m "not extended_model" || exit_code=$?
    exit $exit_code
  skus:
    bh_loudbox:
      timeout: 27
  owner_id: U094PKWHNJ0 # Petar Milojevic
  team: models

- id: bh-qb2-deepseek-prefill-op-tests
  name: bh_qb2_DeepSeek_PREFILL_OP_TESTS
  model-name: deepseek_prefill
  cmd: |
    exit_code=0
    pytest models/demos/deepseek_v3_d_p/tests/op_unit_tests/ -vvv --tb=short -k "not test_ring_joint_mla or (2x2 and pcc_check and not fabric2d)" || exit_code=$?
    exit $exit_code
  skus:
    bh_quietbox_2:
      timeout: 60
  owner_id: U094PKWHNJ0 # Petar Milojevic
  team: models
