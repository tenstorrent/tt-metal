# --- deepseek_prefill ---
- id: bh-lb-deepseek-prefill
  name: bh_lb_DeepSeek_PREFILL
  model-name: deepseek_prefill
  cmd: |
    exit_code=0
    pytest models/demos/deepseek_v3_d_p/tests/pcc/ -vvv --tb=short -k "not matmul_pcc and not perf-host-64 and ((mesh-4x2 or mesh-2x4 or linear-8) or not (moe_gate_prefill2d or moe_routing_setup or ttnn_moe)) and not (linear-8 and (pcc-device or (5k and not 25k))) and not (ttnn_moe and kimi and perf) and not (ttnn_moe and deepseek_v3 and mesh-4x2 and not fabric2d-) and not pad50" --timeout 1800 || exit_code=$?
    pytest models/demos/deepseek_v3_d_p/tests/test_mla.py::test_ds_mla -k "2x4 and random and scaled_sl and check_pcc and line" -vvv --tb=short || exit_code=$?
    pytest models/demos/deepseek_v3_d_p/tests/test_prefill_block.py::test_ds_prefill_block -k "balanced and not non_balanced and fabric2d and not pretrained" -vvv --tb=short --timeout=900 || exit_code=$?
    pytest models/demos/deepseek_v3_d_p/tests/test_prefill_block_loop.py -k "2x4 and layer0 and device and not fabric2d- and 2link" -vvv --tb=short || exit_code=$?
    exit $exit_code
  skus:
    bh_loudbox:
      timeout: 120
  owner_id: U08E1JCMAJF # Marko Bezulj
  team: models

- id: bh-lb-deepseek-dsa
  name: bh_lb_DeepSeek_DSA
  model-name: deepseek_prefill
  cmd: |
    exit_code=0
    export DEEPSEEK_V3_HF_MODEL=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528
    export DEEPSEEK_V32_MLA_REF_CACHE=/tmp/deepseek_v32_mla_ref_cache GLM51_MLA_REF_CACHE=/tmp/glm_5_1_mla_ref_cache
    export DS_SPARSE_FABRIC=fabric2d
    # Sparse MLA (V3.2 + GLM-5.1) vs MLACPU. Random weights + on-the-fly CPU truth -> no staged weights.
    # GLM-5.1 reshards heads->sequence in _sparse_mla so it now runs at tp=4; 2x4 is its coverage (accuracy
    # + the determinism/chunked anchor cases, which pin to the highest-TP mesh). DeepSeek-V3.2 covers the
    # asymmetric 2x4 mesh (its 8x4 coverage is on Galaxy). The sparse suite carries no tier markers, so
    # there is no -m gate.
    pytest models/demos/deepseek_v3_d_p/tests/sparse_mla/test_sparse_mla.py -k "glm_5_1 and 2x4 and fabric2d" -vvv --tb=short || exit_code=$?
    pytest models/demos/deepseek_v3_d_p/tests/sparse_mla/test_sparse_mla.py -k "deepseek_v32 and 2x4 and fabric2d" -vvv --tb=short || exit_code=$?
    exit $exit_code
  skus:
    bh_loudbox:
      timeout: 10
  owner_id: U07N3CUUN05  # Iva Potkonjak
  team: models

