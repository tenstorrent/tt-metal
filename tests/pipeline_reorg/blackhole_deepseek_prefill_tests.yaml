# This file defines the test matrix for the Blackhole DeepSeek Prefill tests pipeline.

# Each entry represents a parallel job with the following keys:
#   id: Stable slug for workflow_dispatch / jq filtering.
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   test_type: Test type identifier for filtering (workflow_dispatch test-type selection).
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# Blackhole DeepSeek Prefill module tests
- id: bh-lb-deepseek-prefill
  name: bh_lb_DeepSeek_PREFILL
  cmd: |
    pytest models/demos/deepseek_v3_d_p/tests/pcc/ -vvv --tb=short -k "not matmul_pcc" --timeout 1800
    pytest models/demos/deepseek_v3_d_p/tests/op_unit_tests/test_ring_joint_mla.py -k '4x2 and pcc_check' -vvv --tb=short
    pytest models/demos/deepseek_v3_d_p/tests/op_unit_tests/test_rope_prefill.py -k '4x2' -vvv --tb=short
    pytest models/demos/deepseek_v3_d_p/tests/test_mla.py::test_mla -k "2x4 and random and scaled_sl and check_pcc and line" -vvv --tb=short
    pytest models/demos/deepseek_v3_d_p/tests/test_prefill_block.py -vvv --tb=short --timeout=900
    pytest models/demos/deepseek_v3_d_p/tests/test_prefill_block_loop.py -k "2x4 and layer0 and device" -vvv --tb=short
    pytest models/demos/deepseek_v3_d_p/tests/op_unit_tests/test_moe_grouped_topk.py -k "realistic" -vvv --tb=short
    pytest models/demos/deepseek_v3_d_p/tests/perf/test_dispatch_combine_perf.py -m models_device_performance_bare_metal -vvv --tb=short --timeout=900
  test_type: module
  skus:
    bh_loudbox:
      timeout: 68
  owner_id: U08E1JCMAJF # Marko Bezulj
  team: models

- id: bh-qb-deepseek-prefill
  name: bh_qb_DeepSeek_PREFILL
  cmd: |
    pytest models/demos/deepseek_v3_d_p/tests/pcc/ -vvv --tb=short -k "not matmul_pcc" --timeout 1800
    pytest models/demos/deepseek_v3_d_p/tests/op_unit_tests/test_ring_joint_mla.py -k '2x2 and pcc_check' -vvv --tb=short
    pytest models/demos/deepseek_v3_d_p/tests/cache/ -vvv --tb=short
    pytest models/demos/deepseek_v3_d_p/tests/op_unit_tests/test_dispatch_combine_l1_small_semaphores.py -vvv --tb=short
  test_type: module
  skus:
    bh_quietbox_2:
      timeout: 40
  owner_id: U08E1JCMAJF # Marko Bezulj
  team: models
