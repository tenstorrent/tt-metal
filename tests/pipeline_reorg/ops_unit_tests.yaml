# Test matrix for ops-team per-op unit tests in the L2 nightly pipeline.
# Entry fields:
#   name: Display name for the matrix job.
#   cmd: Command to run.
#   skus: Mapping of SKU -> { timeout: <minutes> }.
#   owner_id: Slack user ID notified on failure.
#   team: Owning team (always "ops" for this file; budget rolls up under ops.unit).
#   category: Selector used by tt-metal-l2-nightly.yaml's `additional_test_categories`
#     dispatch input. On dispatch the impl filters this matrix to entries whose
#     category appears in the comma-separated list; on schedule the filter is bypassed.
#
# For max allowed timeout refer to .github/time_budget.yaml.

# =============================================================================
# Python per-op nightly tests (moved from tt_metal_l2_tests.yaml)
# =============================================================================

