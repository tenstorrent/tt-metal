  cmd: 'pytest tests/ttnn/nightly/unit_tests/operations/conv -xv -m "not disable_fast_runtime_mode" --timeout=600'
  skus:
    wh_n150:
      timeout: 150
    wh_n300:
      timeout: 150
    bh_p100:
      timeout: 150
    bh_p150b_civ2:
