# This file defines the test matrix for the Runtime Slow Dispatch unit tests.
# These tests run with TT_METAL_SLOW_DISPATCH_MODE=1 set in the container env.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# --- Core API Tests (SD) ---
- name: runtime_sd_api
  cmd: ./build/test/tt_metal/unit_tests_api
  skus:
    wh_n150_civ2:
      timeout: 15
    bh_p150b_civ2:
      timeout: 15
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime

# --- Data Movement Tests (SD) ---
- name: runtime_sd_data_movement
  cmd: ./build/test/tt_metal/unit_tests_data_movement
  skus:
    wh_n150_civ2:
      timeout: 10
    bh_p150b_civ2:
      timeout: 10
  owner_id: U099A7FMKL2
  team: runtime

# --- Debug Tools, Device, Dispatch (SD) ---
- name: runtime_sd_debug_tools_device_dispatch
  cmd: |
    ./build/test/tt_metal/unit_tests_debug_tools
    ./build/test/tt_metal/unit_tests_inspector
    ./build/test/tt_metal/unit_tests_device
    ./build/test/tt_metal/unit_tests_dispatch
  skus:
    wh_n150_civ2:
      timeout: 15
    bh_p150b_civ2:
      timeout: 15
  owner_id: U099A7FMKL2
  team: runtime

# --- LLK Tests (SD) ---
- name: runtime_sd_llk
  cmd: ./build/test/tt_metal/unit_tests_llk
  skus:
    wh_n150_civ2:
      timeout: 10
    bh_p150b_civ2:
      timeout: 10
  owner_id: U099A7FMKL2
  team: runtime
