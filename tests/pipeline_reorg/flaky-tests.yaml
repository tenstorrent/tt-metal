# Flaky Test Skip List
# Tests that intermittently fail on real hardware and are excluded from regular
# CI runs to prevent spurious merge queue ejections.
#
# Tests in this list are:
#   - SKIPPED in all regular ttnn test group runs (via --deselect)
#   - RUN EXCLUSIVELY in the dedicated "ttnn flaky tests" sanity job
#
# To add a test: open a GitHub issue with label "Flaky Test", document the
# failure evidence, then add the test here with a link to the issue.
# To graduate a test back: remove it here once it passes consistently.
#
# Structure mirrors ttsim-skip-list.yaml: arch-keyed lists of test node IDs.

