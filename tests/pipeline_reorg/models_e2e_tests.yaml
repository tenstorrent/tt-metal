# Gemma-4 e2e tests: one entry per model variant, multiple SKUs per entry.
# parametrize_mesh_with_fabric() picks the largest mesh shape that fits on each
# runner when CI=true is set, so the same `pytest` invocation runs 1x1 on N150,
# 1x2 on N300, 1x8 on T3K — no per-SKU `-k` filter needed.

- name: Gemma-4-E2B e2e tests
  cmd: |
    uv pip install -r models/demos/gemma4/requirements.txt
    export HF_HOME=/mnt/MLPerf/huggingface HF_MODEL=google/gemma-4-E2B-it TT_CACHE_PATH=/mnt/MLPerf/huggingface/tt_cache/google--gemma-4-E2B-it
    pytest -s --timeout 1000 models/demos/gemma4/demo/text_demo.py::test_demo
    # test_lm_head, test_packed_verify (spec-decode packed verify, #46755) and
    # test_model::test_full_model load real weights via
    # AutoModelForCausalLM.from_pretrained, so they live in the e2e job
    # (HF_MODEL=hub-id resolves to the populated /mnt/MLPerf cache) rather
    # than the unit job (HF_MODEL=local config-only dir).
    pytest -s --timeout 600 \
      models/demos/gemma4/tests/unit/test_lm_head.py \
      models/demos/gemma4/tests/unit/test_packed_verify.py \
      models/demos/gemma4/tests/unit/test_model.py::test_full_model
  model: gemma-4-e2b
  skus:
    wh_n150:
      timeout: 5
      tier: 3
    bh_p150:
      timeout: 5
      tier: 3
  owner_id: U088413NP0Q # Ashai Reddy
  team: models

