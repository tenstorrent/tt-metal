# This file defines the test matrix for the Models End-To-End Tests pipelines.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run (env vars must be inlined).
#   model: Model identifier for filtering (workflow_dispatch model selection).
#   skus: A mapping of SKU names to their configuration:
#     timeout: Job timeout in minutes.
#     tier: Model tier (1, 2, or 3) used to filter which pipeline runs this test.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# ── Llama ──────────────────────────────────────────────────────────

- name: Llama 3.1-8B e2e tests
  cmd: |
    export HF_MODEL=meta-llama/Llama-3.1-8B-Instruct TT_CACHE_PATH=/mnt/MLPerf/huggingface/tt_cache/meta-llama/Llama-3.1-8B-Instruct
    pytest --timeout 420 models/tt_transformers/demo/simple_text_demo.py -k "performance-ci-token-matching"
    # The DRAM prefetcher does not yet support more than one repeat batch (issue #47820):
    # cover the eval repeat-batch loop with the prefetcher DISABLED (perf reporting skipped
    # so only the prefetcher run sets perf), and cover the prefetcher path with a SINGLE
    # repeat batch (this run reports/validates perf). See #47820 for the multi-batch work.
    pytest --timeout 600 models/tt_transformers/demo/simple_text_demo.py -k "performance-ci-eval-32" --skip_perf_report
    pytest --timeout 600 models/tt_transformers/demo/simple_text_demo.py -k "performance-ci-eval-32" --use_prefetcher True --repeat_batches 1
    pytest --timeout 420 models/tt_transformers/demo/simple_text_demo.py -k "performance-ci-token-matching" --use_hf_rope
  model: llama3.1-8b
  skus:
    wh_n150:
      timeout: 11
      tier: 1
    bh_p150:
      timeout: 11
      tier: 1
    wh_llmbox_perf:
      timeout: 11
      tier: 2
    bh_quietbox_2:
      timeout: 20
      tier: 2
  owner_id: U03PUAKE719 # Miguel Tairum Cruz
  team: models

# bh_p300 runs in LFC mode: per-job impl yaml mounts the host's local-disk
# cache (/localdev/blackhole_demos/huggingface_data) onto /mnt/MLPerf/huggingface
# inside the container, so the wget below pulls weights from the LFC server
# into the cache and the test reads them via the standard /mnt/MLPerf/...
# path. Kept as a separate entry (rather than added to the main Llama 3.1-8B
# DP entries above) so the LFC-specific commands stay co-located with the
# test definition instead of leaking into the workflow yamls. Mirrors the
# legacy `llama3.1-8b data-parallel tests (LFC)` entry from
# tests/pipeline_reorg/blackhole_demo_tests.yaml.
- name: Llama 3.1-8B data-parallel e2e tests (P300 LFC)
  cmd: |
    set -e
    mkdir -p /mnt/MLPerf/huggingface/meta-llama
    wget -r -nH -x --cut-dirs=5 -np --progress=dot:giga -R "index.html*" -P /mnt/MLPerf/huggingface/meta-llama http://yyz2-lfcache564.yyz2.tenstorrent.com/mldata/model_checkpoints/pytorch/huggingface/meta-llama/Llama-3.1-8B-Instruct/
    export HF_MODEL=/mnt/MLPerf/huggingface/meta-llama/Llama-3.1-8B-Instruct
    export TT_CACHE_PATH=/mnt/MLPerf/huggingface/meta-llama/Llama-3.1-8B-Instruct
    pytest --timeout 600 models/tt_transformers/demo/simple_text_demo.py -k "performance and ci-32" --data_parallel 2 --max_seq_len 131072
  model: llama3.1-8b-dp
  skus:
    bh_p300:
      timeout: 25
      tier: 2
  owner_id: U03PUAKE719 # Miguel Tairum Cruz
  team: models

