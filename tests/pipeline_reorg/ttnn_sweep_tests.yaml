# Budget + ownership for the ttnn-run-sweeps pipeline (model_traced / lead_models).
#
# Consumed ONLY by verify_time_budget.py. The sweep workflow generates its own
# matrix (compute_sweep_matrix.py); the `cmd` fields here are placeholders and the
# `skus` entries exist so verify_time_budget can SUM the per-job timeouts per
# (team, sku) and enforce them against .github/time_budget.yaml -> ttnn.sweep.
#
# One entry per target so each carries its own owner and per-lane budget. SKU
# names match the routing SKUs in .github/sku_config.yaml (the *_sweeps entries
# that matrix_runner_config resolves runs_on from), so each budget line maps 1:1
# to the lane its jobs actually run on.
#
# `timeout` is the per-GH-job ceiling in minutes, set from observed per-job
# wall-clock with headroom (Lead run 29559503564 / Model-Traced run 29559513509,
# latest attempts):
#   lead    galaxy ~26  n150 ~6
#   traced  n150 ~25  n300 ~30  t3k ~48  p100a ~13  p150b ~13  p300a ~6
# For max allowed timeout refer to .github/time_budget.yaml.

- name: ttnn sweeps lead models
  target: lead_models
  cmd: 'placeholder - matrix generated by compute_sweep_matrix.py (see ttnn-run-sweeps.yaml)'
  skus:
    wh_galaxy_sweeps:
      timeout: 60
    wh_n150_sweeps:
      timeout: 15
  owner_id: U08T3JQEB36 # stevendae
  team: ttnn
  category: sweep

- name: ttnn sweeps model traced
  target: model_traced
  cmd: 'placeholder - matrix generated by compute_sweep_matrix.py (see ttnn-run-sweeps.yaml)'
  skus:
    wh_n150_sweeps:
      timeout: 60
    wh_n300_sweeps:
      timeout: 60
    wh_t3k_sweeps:
      timeout: 90
    bh_p100a_sweeps:
      timeout: 30
    bh_p150b_sweeps:
      timeout: 30
    bh_p300a_sweeps:
      timeout: 20
  owner_id: U08T3JQEB36 # stevendae
  team: ttnn
  category: sweep
