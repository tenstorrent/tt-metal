# This file defines the test matrix for the Blackhole demo tests pipeline.

# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The command to run.
#   skus: A mapping of SKU names to their configuration (each SKU has timeout in minutes).
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# This pipeline holds Blackhole demo / performance tests that have not yet been
# migrated to the tier 1/2/3 pipelines
# (tests/pipeline_reorg/models_{e2e,unit,device_perf}_tests.yaml) — currently a
# mix of diffusion / vision demos plus a few model e2e tests. The Llama / Qwen
# LLM e2e, data-parallel, and device-perf entries have been migrated out.

# All entries that read HF model checkpoints / tt_cache use the canonical HF_HOME convention
# (matches tests/pipeline_reorg/models_e2e_tests.yaml on the Wormhole side):
#   HF_HOME=/localdev/blackhole_demos/huggingface_data
#   HF_MODEL=<org>/<model>                                    # hub id, not a path
#   TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/tt_cache/<org>--<model>
# Exceptions: bh_p300 (LFC) entries keep file-path / HF_HUB_CACHE form because the LFC
# server hosts checkpoints in a layout that does not match the canonical hub cache.

# ─── mistral-small-3.1-24b ──────────────────────────────────────────────────

- name: mistral-small-3.1-24b e2e tests
  cmd: |
    set -e
    export HF_HOME=/localdev/blackhole_demos/huggingface_data
    export HF_MODEL=mistralai/Mistral-Small-3.1-24B-Instruct-2503
    export TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/tt_cache/mistralai--Mistral-Small-3.1-24B-Instruct-2503
    export MESH_DEVICE=T3K
    pytest --timeout 600 models/experimental/mistral_24b/tests/pipeline_tests
  skus:
    bh_quietbox_2:
      timeout: 10
  owner_id: U03PUAKE719 # Miguel Tairum
  team: models
  model-name: mistral-small-3.1-24b

# ─── stable_diffusion_xl ────────────────────────────────────────────────────

- name: stable_diffusion_xl demos
  cmd: >-
    pytest models/demos/stable_diffusion_xl_base/demo/demo.py -k "device_vae and device_encoders and with_trace and no_cfg_parallel" &&
    pytest models/demos/stable_diffusion_xl_base/demo/demo_base_and_refiner.py -k "device_vae and device_encoders and with_trace and no_cfg_parallel" &&
    pytest models/demos/stable_diffusion_xl_base/demo/demo_img2img.py -k "device_vae and device_encoders and with_trace and no_cfg_parallel" &&
    pytest models/demos/stable_diffusion_xl_base/demo/demo_inpainting.py -k "device_vae and device_encoders and with_trace and no_cfg_parallel"
  skus:
    bh_p150b_civ2:
      timeout: 120
  owner_id: U09LK84G4TF # Nikola Milicevic
  team: models
  model-name: stable_diffusion_xl

# ─── Flux.1-dev ─────────────────────────────────────────────────────────────

- name: Flux.1-dev P300-viommu performance (1x2sp0tp1)
  # bh_p300 (LFC) keeps the legacy HF_HUB_CACHE/path-style env var because the
  # LFC server hosts the model under <org>/models--<org>--<model>/, which is
  # different from the canonical HF hub cache layout under hub/. Migrating
  # this is a follow-up.
  cmd: HF_HUB_CACHE=/localdev/blackhole_demos/huggingface_data/black-forest-labs pytest models/tt_dit/tests/models/flux1/test_performance_flux1.py -k "1x2sp0tp1" --timeout=600
  skus:
    bh_p300:
      timeout: 10
  owner_id: U08TED0JM9D # Samuel Adesoye
  team: models
  model-name: flux.1-dev

- name: Flux.1-dev BH QuietBox 2 performance (2x2sp0tp1)
  cmd: |
    set -e
    export HF_HOME=/localdev/blackhole_demos/huggingface_data
    pytest models/tt_dit/tests/models/flux1/test_performance_flux1.py -k "2x2sp0tp1" --timeout=600
  skus:
    bh_quietbox_2:
      timeout: 10
  owner_id: U08TED0JM9D # Samuel Adesoye
  team: models
  model-name: flux.1-dev

