# This file defines the test matrix for the Blackhole demo tests pipeline.

# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The command to run.
#   skus: A mapping of SKU names to their configuration (each SKU has timeout in minutes).
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# All entries that read HF model checkpoints / tt_cache use the canonical HF_HOME convention
# (matches tests/pipeline_reorg/models_e2e_tests.yaml on the Wormhole side):
#   HF_HOME=/localdev/blackhole_demos/huggingface_data
#   HF_MODEL=<org>/<model>                                    # hub id, not a path
#   TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/tt_cache/<org>--<model>
# Exceptions: bh_p300 (LFC) entries keep file-path / HF_HUB_CACHE form because the LFC
# server hosts checkpoints in a layout that does not match the canonical hub cache.

- name: whisper performance
  cmd: pytest models/demos/audio/whisper/demo/demo.py --input-path="models/demos/audio/whisper/demo/dataset/conditional_generation" -k "conditional_generation" --timeout=600
  skus:
    bh_p150_perf:
      timeout: 10
  owner_id: U05RWH3QUPM # Salar Hosseini
  team: models
  model-name: whisper

- name: whisper nightly
  cmd: pytest models/demos/audio/whisper/tests/test_whisper_modules.py --timeout=600
  skus:
    bh_p150:
      timeout: 10
  owner_id: U05RWH3QUPM # Salar Hosseini
  team: models
  model-name: whisper

- name: unet-shallow performance
  cmd: pytest -sv models/experimental/functional_unet/tests/test_unet_perf.py -k "test_unet_trace_perf and not test_unet_trace_perf_multi_device"
  skus:
    bh_p150_perf:
      timeout: 5
  owner_id: U06ECNVR0EN # Evan Smal
  team: models
  model-name: unet-shallow

- name: llama3.1-8b 1-device perf
  cmd: |
    set -e
    export HF_HOME=/localdev/blackhole_demos/huggingface_data
    export HF_MODEL=meta-llama/Llama-3.1-8B-Instruct
    export TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/tt_cache/meta-llama--Llama-3.1-8B-Instruct
    pytest models/tt_transformers/demo/simple_text_demo.py -k "performance and ci and not stress" --max_seq_len 131072
  skus:
    bh_p150_perf:
      timeout: 10
  owner_id: U03PUAKE719 # Miguel Tairum
  team: models
  model-name: llama3.1-8b

- name: llama3.1-8b 1-device stress
  cmd: |
    set -e
    export HF_HOME=/localdev/blackhole_demos/huggingface_data
    export HF_MODEL=meta-llama/Llama-3.1-8B-Instruct
    export TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/tt_cache/meta-llama--Llama-3.1-8B-Instruct
    pytest models/tt_transformers/demo/simple_text_demo.py -k "performance and stress" --timeout=1800
  skus:
    bh_p150:
      timeout: 30
  owner_id: U03PUAKE719 # Miguel Tairum
  team: models
  model-name: llama3.1-8b

- name: llama3.1-8b 2-device tests
  cmd: |
    set -e
    export HF_HOME=/localdev/blackhole_demos/huggingface_data
    export HF_MODEL=meta-llama/Llama-3.1-8B-Instruct
    export TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/tt_cache/meta-llama--Llama-3.1-8B-Instruct
    pytest --timeout 600 models/tt_transformers/demo/simple_text_demo.py -k "performance and ci-32" --data_parallel 1 --max_seq_len 131072 --use_prefetcher True
    pytest --timeout 600 models/tt_transformers/demo/simple_text_demo.py -k "performance and ci-1" --data_parallel 1 --max_seq_len 131072 --use_prefetcher True
    pytest --timeout 600 models/tt_transformers/demo/simple_text_demo.py -k "performance and ci-32" --data_parallel 2 --max_seq_len 131072
    pytest --timeout 3600 models/tt_transformers/demo/simple_text_demo.py -k "performance and stress" --data_parallel 2 --max_generated_tokens 22000
    TT_METAL_PROFILER_PROGRAM_SUPPORT_COUNT=10000 pytest --timeout 600 models/tt_transformers/tests/test_device_perf.py -k "decode-llama3_8b-2-131072-2-10-1-1-False"
    TT_METAL_PROFILER_PROGRAM_SUPPORT_COUNT=10000 pytest --timeout 600 models/tt_transformers/tests/test_device_perf.py -k "prefill-llama3_8b-2-131072-2-2-1-1-False"
  skus:
    bh_deskbox:
      timeout: 90
  owner_id: U03PUAKE719 # Miguel Tairum
  team: models
  model-name: llama3.1-8b

