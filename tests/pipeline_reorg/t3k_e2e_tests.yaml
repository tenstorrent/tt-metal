# added qwen-vl vocab sizes). DO NOT MERGE this file change.
- name: models_tttv2_sampling_isolation_48222
  cmd: HF_HUB_OFFLINE=1 HF_HOME=/mnt/MLPerf/huggingface pytest -v --tb=short models/common/tests/modules/sampling/test_sampling_1d.py -k "ttnn_sampling_isolation or topk_allgather_isolation" -m "not slow"
  skus:
    wh_llmbox:
      timeout: 20
  owner_id: U07RY6B5FLJ # Gongyu Wang
