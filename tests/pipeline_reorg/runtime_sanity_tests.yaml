# This file defines the test matrix for the Runtime sanity tests.
# These are a small curated subset of the most critical runtime tests,
# designed to run quickly (<15 min) as a health check.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# --- Dispatch: RandomizeProgram (core dispatch health check) ---
# ~15 tests: random program dispatch + trace paths, excluding NIGHTLY variants
- name: runtime_sanity_dispatch
  cmd: |
    [ "$ARCH_NAME" = "wormhole_b0" ] && export TT_METAL_GTEST_ETH_DISPATCH=1
    ./build/test/tt_metal/unit_tests_dispatch --gtest_filter='*RandomProgram*:-*NIGHTLY*'
  skus:
    wh_n150_civ2:
      timeout: 5
    bh_p150b_civ2:
      timeout: 5
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime

# --- Device: init, cluster API, mock API (excluding NIGHTLY) ---
# ~35 tests: device init/teardown, DRAM/L1 ping, cluster validation, mock device
- name: runtime_sanity_device
  cmd: ./build/test/tt_metal/unit_tests_device --gtest_filter='*:-*NIGHTLY*'
  skus:
    wh_n150_civ2:
      timeout: 3
    bh_p150b_civ2:
      timeout: 3
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime

# --- API: DRAM R/W + L1 R/W + kernel compile (core API health check) ---
# ~14 tests: DRAMLoopback (3), SimpleL1 buffer (6), CompileProgram (5)
- name: runtime_sanity_api
  cmd: ./build/test/tt_metal/unit_tests_api --gtest_filter='*DRAMLoopbackSingleCore*:*TestSimpleL1*:*CompileProgram*'
  skus:
    wh_n150_civ2:
      timeout: 5
    bh_p150b_civ2:
      timeout: 5
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime
