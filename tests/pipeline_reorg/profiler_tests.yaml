# This file defines the merged test matrix for the Profiler tests pipeline.
# Entries cover galaxy (wh_galaxy SKU) and T3000 (wh_llmbox SKU) hardware.
# Callers select a subset by passing enabled-skus to profiler-tests-impl.yaml.

# Each entry has the following keys:
#   name: Display name shown in the GHA UI.
#   cmd: Exact command to run for the test (single-line or multi-line block).
#   skus: Mapping of SKU names to per-SKU config (each entry has timeout in minutes).
#   owner_id: Slack user ID to notify on failure.
#   team: Owning team.
#   arch: Hardware architecture the cmd targets ("wormhole_b0" or "blackhole").
#         Used by profiler-tests-impl.yaml to set ARCH_NAME per matrix entry.
#   mode: (optional) "post-commit" or "full". Profiler-tests-impl applies a
#         mode-filter so callers can pick which device_profiler.py variant
#         runs. Entries without `mode` run in any mode.

# For max allowed timeout refer to .github/time_budget.yaml

# NOTE: The owning team ("ttnn") and pipeline category ("integration") used for
# these profiler tests are placeholders pending final assignment. See
# https://github.com/tenstorrent/tt-metal/issues/44285 for the open issue tracking
# the final team / test-framework decision.

# ----- Galaxy (wh_galaxy) ----------------------------------------------------
# Per-entry timeouts derived from observed CI wall-clock (see git history of
# galaxy_profiler_tests.yaml). pytest --timeout is per-test, not total run.

- name: Galaxy profiler device tests
  # ~20 functions, observed >14 min wall-clock; 30 min gives healthy headroom.
  cmd: TT_METAL_DEVICE_PROFILER=1 pytest tests/tt_metal/tools/profiler/test_device_profiler.py --noconftest --timeout 360
  skus:
    wh_galaxy:
      timeout: 30
  owner_id: U03BJ1L3LUQ # Mo Memarian
  team: ttnn # Placeholder; see https://github.com/tenstorrent/tt-metal/issues/44285
  arch: wormhole_b0

- name: Galaxy profiler realtime cross-reference tests
  # Single test; observed ~6 min wall-clock; 15 min gives ~2.5x buffer.
  # The test itself has @pytest.mark.timeout(2100) baked in as the per-test ceiling.
  cmd: TT_METAL_DEVICE_PROFILER=1 pytest tests/ttnn/tracy/test_realtime_profiler.py::test_cross_reference_tg --timeout 2400
  skus:
    wh_galaxy:
      timeout: 15
  owner_id: U03BJ1L3LUQ # Mo Memarian
  team: ttnn # Placeholder; see https://github.com/tenstorrent/tt-metal/issues/44285
  arch: wormhole_b0

# ----- T3000 (wh_llmbox) -----------------------------------------------------
# Per-entry timeouts are estimates pending observed wall-clock data — adjust
# after first runs, following the galaxy approach above.

- name: T3000 mid-run device data dump
  cmd: |
    set -eo pipefail
    set -x
    rm -rf "$PROFILER_ARTIFACTS_DIR"
    mkdir -p "$PROFILER_ARTIFACTS_DIR"
    python -m tracy -v -r -p --sync-host-device --dump-device-data-mid-run -m pytest tests/ttnn/tracy/test_profiler_sync.py::test_mesh_device
    runDate=$(ls "$PROFILER_OUTPUT_DIR/")
    cat "$PROFILER_OUTPUT_DIR/$runDate/ops_perf_results_$runDate.csv"
    python "$PROFILER_SCRIPTS_ROOT/compare_ops_logs.py"
  skus:
    wh_llmbox:
      timeout: 8
  owner_id: U03BJ1L3LUQ # Mo Memarian
  team: ttnn # Placeholder; see https://github.com/tenstorrent/tt-metal/issues/44285
  arch: wormhole_b0

- name: T3000 async falcon7b causal-LM
  cmd: |
    set -eo pipefail
    set -x
    rm -rf "$PROFILER_ARTIFACTS_DIR"
    mkdir -p "$PROFILER_ARTIFACTS_DIR"
    python -m tracy -v -r -p --op-support-count 2000 -m "pytest -svv models/demos/ttnn_falcon7b/tests/multi_chip/test_falcon_causallm.py::test_falcon_causal_lm[wormhole_b0-20-2-BFLOAT16-L1-falcon_7b-layers_2-decode_batch32]" | tee "$PROFILER_ARTIFACTS_DIR/test_out.log"
    if grep -q "SKIPPED" "$PROFILER_ARTIFACTS_DIR/test_out.log"; then
        echo "No verification as test was skipped"
        exit 0
    fi
    runDate=$(ls "$PROFILER_OUTPUT_DIR/")
    csv="$PROFILER_OUTPUT_DIR/$runDate/ops_perf_results_$runDate.csv"
    lineCount=$(wc -l < "$csv" | awk '{print $1}')
    (( lineCount >= 1000 )) || { echo "Line count $lineCount below floor 1000" >&2; exit 1; }
    python "$PROFILER_SCRIPTS_ROOT/compare_ops_logs.py"
  skus:
    wh_llmbox:
      timeout: 15
  owner_id: U03BJ1L3LUQ # Mo Memarian
  team: ttnn # Placeholder; see https://github.com/tenstorrent/tt-metal/issues/44285
  arch: wormhole_b0

- name: T3000 async tracing resnet50 (legacy vs runtime comparison)
  cmd: |
    set -eo pipefail
    set -x
    rm -rf "$PROFILER_ARTIFACTS_DIR"
    mkdir -p "$PROFILER_ARTIFACTS_DIR"
    python -m tracy -v -r -p -m "pytest models/demos/vision/classification/resnet50/ttnn_resnet/tests/test_resnet50_performant.py::test_run_resnet50_trace_2cqs_inference[wormhole_b0-16-DataType.BFLOAT8_B-DataType.BFLOAT8_B-MathFidelity.LoFi-device_params0]" | tee "$PROFILER_ARTIFACTS_DIR/test_out.log"
    if grep -q "SKIPPED" "$PROFILER_ARTIFACTS_DIR/test_out.log"; then
        echo "No verification as test was skipped"
        exit 0
    fi
    runDate=$(ls "$PROFILER_OUTPUT_DIR/")
    csv="$PROFILER_OUTPUT_DIR/$runDate/ops_perf_results_$runDate.csv"
    lineCount=$(wc -l < "$csv" | awk '{print $1}')
    (( lineCount >= 2600 )) || { echo "Line count $lineCount below floor 2600" >&2; exit 1; }
    python "$PROFILER_SCRIPTS_ROOT/compare_ops_logs.py"
    # Legacy path vs runtime analysis comparison
    ./tools/tracy/process_ops_logs.py -o "$PROFILER_ARTIFACTS_DIR" -n "legacy_comparison" --force-legacy-device-logs
    legacy_report="$PROFILER_ARTIFACTS_DIR/reports/legacy_comparison/ops_perf_results_legacy_comparison.csv"
    [[ -f "$legacy_report" ]] || { echo "ERROR: Legacy report not found at $legacy_report"; exit 1; }
    python tools/tracy/compare_full_op_report.py "$csv" "$legacy_report"
    rm -rf "$PROFILER_ARTIFACTS_DIR/reports/legacy_comparison"
    # Device-only report on the same artifacts
    rm -rf "$PROFILER_OUTPUT_DIR/$runDate"
    ./tools/tracy/process_ops_logs.py --device-only --date
    runDate=$(ls "$PROFILER_OUTPUT_DIR/")
    csv="$PROFILER_OUTPUT_DIR/$runDate/ops_perf_results_$runDate.csv"
    lineCount=$(wc -l < "$csv" | awk '{print $1}')
    (( lineCount >= 1700 )) || { echo "ops_perf line count $lineCount below floor 1700" >&2; exit 1; }
    csv2="$PROFILER_OUTPUT_DIR/$runDate/per_core_op_to_op_times_$runDate.csv"
    lineCount=$(wc -l < "$csv2" | awk '{print $1}')
    (( lineCount >= 1700 )) || { echo "per_core_op_to_op line count $lineCount below floor 1700" >&2; exit 1; }
  skus:
    wh_llmbox:
      timeout: 25
  owner_id: U03BJ1L3LUQ # Mo Memarian
  team: ttnn # Placeholder; see https://github.com/tenstorrent/tt-metal/issues/44285
  arch: wormhole_b0

# NOTE: This entry runs two pytest invocations because the test's purpose is
# to cross-compare profiler artifacts between a mid-run-dump pytest and a
# normal pytest of the SAME resnet50 invocation. Splitting them across matrix
# shards would lose the shared artifact state required by the comparison.
- name: T3000 async tracing resnet50 (mid-run dump cross-comparison)
  cmd: |
    set -eo pipefail
    set -x
    rm -rf "$PROFILER_ARTIFACTS_DIR"
    mkdir -p "$PROFILER_ARTIFACTS_DIR"
    python -m tracy -v -r -p --dump-device-data-mid-run -m pytest models/demos/vision/classification/resnet50/ttnn_resnet/tests/test_resnet50_performant.py::test_run_resnet50_trace_2cqs_inference[wormhole_b0-16-DataType.BFLOAT8_B-DataType.BFLOAT8_B-MathFidelity.LoFi-device_params0] | tee "$PROFILER_ARTIFACTS_DIR/test_out.log"
    if grep -q "SKIPPED" "$PROFILER_ARTIFACTS_DIR/test_out.log"; then
        echo "No verification as test was skipped"
        exit 0
    fi
    midRunDumpRunDate=$(ls "$PROFILER_OUTPUT_DIR/")
    mv "$PROFILER_ARTIFACTS_DIR/.logs/cpp_device_perf_report.csv" "$PROFILER_OUTPUT_DIR/$midRunDumpRunDate/cpp_device_perf_report.csv"
    python -m tracy -v -r -p -m pytest models/demos/vision/classification/resnet50/ttnn_resnet/tests/test_resnet50_performant.py::test_run_resnet50_trace_2cqs_inference[wormhole_b0-16-DataType.BFLOAT8_B-DataType.BFLOAT8_B-MathFidelity.LoFi-device_params0]
    nonMidRunDumpRunDate=$(ls "$PROFILER_OUTPUT_DIR/" | grep -v "$midRunDumpRunDate")
    mv "$PROFILER_ARTIFACTS_DIR/.logs/cpp_device_perf_report.csv" "$PROFILER_OUTPUT_DIR/$nonMidRunDumpRunDate/cpp_device_perf_report.csv"
    python "$PROFILER_SCRIPTS_ROOT/compare_ops_logs.py" "$PROFILER_OUTPUT_DIR/$midRunDumpRunDate/ops_perf_results_$midRunDumpRunDate.csv" "$PROFILER_OUTPUT_DIR/$midRunDumpRunDate/cpp_device_perf_report.csv"
    python "$PROFILER_SCRIPTS_ROOT/compare_ops_logs.py" "$PROFILER_OUTPUT_DIR/$nonMidRunDumpRunDate/ops_perf_results_$nonMidRunDumpRunDate.csv" "$PROFILER_OUTPUT_DIR/$nonMidRunDumpRunDate/cpp_device_perf_report.csv"
    python "$PROFILER_SCRIPTS_ROOT/compare_ops_logs.py" --only-compare-op-ids "$PROFILER_OUTPUT_DIR/$midRunDumpRunDate/ops_perf_results_$midRunDumpRunDate.csv" "$PROFILER_OUTPUT_DIR/$nonMidRunDumpRunDate/cpp_device_perf_report.csv"
    python "$PROFILER_SCRIPTS_ROOT/compare_ops_logs.py" --only-compare-op-ids "$PROFILER_OUTPUT_DIR/$nonMidRunDumpRunDate/ops_perf_results_$nonMidRunDumpRunDate.csv" "$PROFILER_OUTPUT_DIR/$midRunDumpRunDate/cpp_device_perf_report.csv"
  skus:
    wh_llmbox:
      timeout: 25
  owner_id: U03BJ1L3LUQ # Mo Memarian
  team: ttnn # Placeholder; see https://github.com/tenstorrent/tt-metal/issues/44285
  arch: wormhole_b0

