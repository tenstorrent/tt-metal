# =============================================================================
# Shared TTNN Test Definitions
# =============================================================================
# This file defines all TTNN unit test groups used by both:
#   - ttnn-post-commit.yaml (hardware CI)
#   - ttsim.yaml (simulator CI)
#
# Each test group can have the following fields:
#   - name: Display name for the test group (required)
#   - cmd: The pytest command to run (required)
#   - timeout: GHA job-level timeout in minutes (required)
#   - merge_gate: If true, run during merge-gate (default: false)
#   - ttsim: If true, can run on TTSim simulator (default: true)
#   - fast_runtime_mode_off: If true, disable fast runtime mode (default: false)
# =============================================================================

tests:
  # ---------------------------------------------------------------------------
  # Example tests
  # ---------------------------------------------------------------------------
  - name: "ttnn example tests"
    cmd: "./tests/scripts/run_ttnn_examples.sh"
    timeout: 15
    merge_gate: true
    ttsim: false  # Examples use features not supported in simulator

  # ---------------------------------------------------------------------------
  # Core TTNN unit tests (base_functionality split into 6 groups)
  # ---------------------------------------------------------------------------
  - name: "ttnn base functionality group 1"
    cmd: 'pytest --timeout 300 tests/ttnn/unit_tests/base_functionality -xv --splits 6 --group 1 -m "not disable_fast_runtime_mode"'
    timeout: 15
    merge_gate: false
    ttsim: true

  - name: "ttnn base functionality group 2"
    cmd: 'pytest --timeout 300 tests/ttnn/unit_tests/base_functionality -xv --splits 6 --group 2 -m "not disable_fast_runtime_mode"'
    timeout: 15
    merge_gate: false
    ttsim: true

  - name: "ttnn base functionality group 3"
    cmd: 'pytest --timeout 300 tests/ttnn/unit_tests/base_functionality -xv --splits 6 --group 3 -m "not disable_fast_runtime_mode"'
    timeout: 15
    merge_gate: false
    ttsim: true

  - name: "ttnn base functionality group 4"
    cmd: 'pytest --timeout 300 tests/ttnn/unit_tests/base_functionality -xv --splits 6 --group 4 -m "not disable_fast_runtime_mode"'
    timeout: 15
    merge_gate: false
    ttsim: true

  - name: "ttnn base functionality group 5"
    cmd: 'pytest --timeout 300 tests/ttnn/unit_tests/base_functionality -xv --splits 6 --group 5 -m "not disable_fast_runtime_mode"'
    timeout: 15
    merge_gate: false
    ttsim: true

  - name: "ttnn base functionality group 6"
    cmd: 'pytest --timeout 300 tests/ttnn/unit_tests/base_functionality -xv --splits 6 --group 6 -m "not disable_fast_runtime_mode"'
    timeout: 15
    merge_gate: false
    ttsim: true

  - name: "ttnn benchmarks group"
    cmd: 'pytest --timeout 300 tests/ttnn/unit_tests/benchmarks -xv -m "not disable_fast_runtime_mode"'
    timeout: 15
    merge_gate: false
    ttsim: true

  - name: "ttnn tensor group"
    cmd: 'pytest --timeout 300 tests/ttnn/unit_tests/tensor -xv -m "not disable_fast_runtime_mode"'
    timeout: 15
    merge_gate: false
    ttsim: true

  # ---------------------------------------------------------------------------
  # Fast runtime mode off tests (commented out in original)
  # ---------------------------------------------------------------------------
  # - name: "ttnn fast runtime off"
  #   cmd: 'pytest --timeout 300 tests/ttnn/unit_tests -xv -m requires_fast_runtime_mode_off'
