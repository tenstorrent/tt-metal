# =============================================================================
# Shared TTNN Test Definitions
# =============================================================================
# This file defines all TTNN unit test groups used by both:
#   - ttnn-post-commit.yaml (hardware CI)
#   - ttsim.yaml (simulator CI)
#
# PRUNED FOR BIT-11 CLUSTER PROBE — only "ttnn eltwise group 4" retained.
# This group runs tests/ttnn/unit_tests/operations/eltwise split into 4 groups,
# running group 4, which contains test_typecast_sharded_fp32_bf16 — the
# canonical bit-11 affected test for escape row 13 (893272).
# =============================================================================

- name: "ttnn eltwise group 4"
  cmd: 'pytest --timeout 300 tests/ttnn/unit_tests/operations/eltwise -xv --splits 4 --group 4 -m "not disable_fast_runtime_mode"'
  skus:
    wh_n300_civ2:
      timeout: 40
    bh_p100:
      timeout: 40
    bh_p150b_civ2:
      timeout: 40
  team: ttnn
  owner_id: U09BX3N0N95 # Mateusz Nowak
  merge_gate: false
