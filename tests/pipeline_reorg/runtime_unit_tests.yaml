# This file defines the test matrix for the Runtime unit tests pipeline.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# --- Dispatch Tests (Fast Dispatch) ---
- name: runtime_fast_dispatch_on_eth
  cmd: |
    [ "$ARCH_NAME" = "wormhole_b0" ] && export TT_METAL_GTEST_ETH_DISPATCH=1
    ./build/test/tt_metal/unit_tests_dispatch --gtest_filter='-*NIGHTLY_*'
  skus:
    wh_n150_civ2:
      timeout: 10
    bh_p150b_civ2:
      timeout: 10
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime

- name: runtime_fast_dispatch_multi_cq
  cmd: TT_METAL_GTEST_NUM_HW_CQS=2 ./build/test/tt_metal/unit_tests_dispatch --gtest_filter='UnitMeshMultiCQ*Fixture.*'
  skus:
    wh_n150_civ2:
      timeout: 5
    wh_n300_civ2:
      timeout: 5
    wh_llmbox:
      timeout: 5
    bh_p150b_civ2:
      timeout: 5
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime

# --- Core API Tests (includes kernel path validation) ---
# Runtime tensor tests were split out of unit_tests_api into their own
# unit_tests_tensor binary; run it here so this group's coverage (and its
# already-budgeted runtime) is unchanged by the split.
- name: runtime_api
  cmd: |
    ./build/test/tt_metal/unit_tests_api
    ./build/test/tt_metal/unit_tests_tensor
    rm -rf /tmp/kernels && mkdir -p /tmp/kernels
    TT_METAL_KERNEL_PATH=/tmp/kernels ./build/test/tt_metal/unit_tests_api --gtest_filter='CompileProgramWithKernelPathEnvVarFixture.*'
  skus:
    wh_n150_civ2:
      timeout: 15
    bh_p150b_civ2:
      timeout: 15
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime

