    ./build/test/tt_metal/unit_tests_debug_tools --gtest_filter='-{disabled_debug_tools_filter}'
    ./build/test/tt_metal/unit_tests_inspector --gtest_filter='*'
  skus:
    wh_n150_civ2:
      timeout: 12
    bh_p150b_civ2:
      timeout: 12
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime

