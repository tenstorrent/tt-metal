# --- Kernel Path Validation ---
- name: runtime_kernel_path
  cmd: |
    rm -rf /tmp/kernels && mkdir -p /tmp/kernels
    TT_METAL_KERNEL_PATH=/tmp/kernels ./build/test/tt_metal/unit_tests_api --gtest_filter=CompileProgramWithKernelPathEnvVarFixture.*
  skus:
    wh_n150_civ2:
      timeout: 3
    bh_p150b_civ2:
      timeout: 3
  owner_id: U099A7FMKL2
  team: runtime
