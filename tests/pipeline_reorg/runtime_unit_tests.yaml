# This file defines the test matrix for the Runtime unit tests pipeline.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# VERIFICATION BRANCH: pruned to runtime_fd2 only (ci-disable/verify-runtime-unit-tests-sd-prefetch-telemetry-20260601)

# --- FD2 Dispatch Tests (prefetcher + dispatcher) ---
- name: runtime_fd2
  cmd: |
    ./build/test/tt_metal/perf_microbenchmark/dispatch/test_prefetcher --gtest_filter='-*SlowDispatch*'
    ./build/test/tt_metal/perf_microbenchmark/dispatch/test_dispatcher --gtest_filter='-*SlowDispatch*'
    TT_METAL_SLOW_DISPATCH_MODE=1 ./build/test/tt_metal/perf_microbenchmark/dispatch/test_prefetcher --gtest_filter='*SlowDispatch*'
    TT_METAL_SLOW_DISPATCH_MODE=1 ./build/test/tt_metal/perf_microbenchmark/dispatch/test_dispatcher --gtest_filter='*SlowDispatch*'
  skus:
    wh_n150_civ2:
      timeout: 5
    bh_p150b_civ2:
      timeout: 5
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime
