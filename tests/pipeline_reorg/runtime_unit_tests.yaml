# NOTE: wh_llmbox is intentionally NOT listed here. The full distributed_unit_tests suite already
# runs on wh_llmbox (the T3000 8-device box) via the scaleout-owned t3k_ttmetal_tests job
# (tests/scripts/t3000/run_t3000_unit_tests.sh), which budgets 40 min for it. Adding a second
# runtime_distributed run on wh_llmbox with the 15-min unit budget was redundant and could not
# complete in time on 8 devices. Smaller SKUs above skip the multi-device (2x4/4x8) suites.

# --- IOMMU PinnedMemory Tests (SD + FD) ---
- name: runtime_iommu_pinned_memory
  cmd: |
    TT_METAL_SLOW_DISPATCH_MODE=1 ./build/test/tt_metal/unit_tests_device --gtest_filter='*PinnedMemory*'
    ./build/test/tt_metal/distributed/distributed_unit_tests --gtest_filter='*PinnedMemory*'
  skus:
    wh_n150_civ2:
      timeout: 5
    bh_p150b_civ2_viommu:
      timeout: 5
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime

# --- FD2 Dispatch Tests (prefetcher + dispatcher) ---
- name: runtime_fd2
  cmd: |
    ./build/test/tt_metal/perf_microbenchmark/dispatch/test_prefetcher --gtest_filter='-*SlowDispatch*'
    ./build/test/tt_metal/perf_microbenchmark/dispatch/test_dispatcher --gtest_filter='-*SlowDispatch*'
    TT_METAL_SLOW_DISPATCH_MODE=1 ./build/test/tt_metal/perf_microbenchmark/dispatch/test_prefetcher --gtest_filter='*SlowDispatch*'
    TT_METAL_SLOW_DISPATCH_MODE=1 ./build/test/tt_metal/perf_microbenchmark/dispatch/test_dispatcher --gtest_filter='*SlowDispatch*'
  skus:
    wh_n150_civ2:
      timeout: 5
    bh_p150b_civ2:
      timeout: 5
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime

