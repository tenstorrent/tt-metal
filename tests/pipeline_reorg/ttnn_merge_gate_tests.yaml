# TTNN merge-gate smoke matrix (subset of former ttnn_sanity_tests.yaml merge_gate entries).
#
# Each entry: name, cmd, skus: { <sku>: { timeout: N } }, team, owner_id.
#
# sim_wormhole_b0 / sim_blackhole SKUs run the same cmd under the ttsim simulator
# on ubuntu-latest; ttnn-smoke-tests-impl.yaml invokes setup-ttsim for these.
# See .github/actions/setup-ttsim/action.yml.
# Logical SKUs only; merge_group prio routing is via sku_config merge_queue_sku.

- name: "ttnn example tests"
  # The codegen-repeat smoke rides this existing leg instead of being its own matrix
  # entry: a separate entry would allocate a whole new card and pay full checkout +
  # setup-job overhead for a test whose execution is <1s. Chaining it here adds ~1s to
  # an already-allocated runner. ttnn.repeat defaults to native, so this guards the
  # codegen path against regressions. On sim SKUs the impl strips `--timeout`; the test
  # is a 1-tile bf16 TILE N-repeat, tiny even at ttsim speeds.
  cmd: "./tests/scripts/run_ttnn_examples.sh && pytest tests/ttnn/unit_tests/operations/data_movement/test_repeat.py::test_repeat_codegen_smoke -x --timeout=120"
  skus:
    wh_n300_civ2:
      timeout: 15
    sim_wormhole_b0:
      timeout: 15
    sim_blackhole:
      timeout: 15
  team: ttnn
  owner_id: U076Z1JJUQZ # Artem Yerofieiev
