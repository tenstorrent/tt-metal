# This file defines the test matrix for the Fast dispatch frequent model tests pipeline.
# (Single-card) nightly model tests under tests/nightly/single_card/.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test ($PYTEST_CMD is set by the impl workflow).
#   model: Model identifier for filtering (workflow_dispatch models-to-run selection).
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#
# For max allowed timeout refer to .github/time_budget.yaml

# Standard wormhole frequent model tests
- name: bge_m3 nightly
  cmd: $PYTEST_CMD tests/nightly/single_card/bge_m3
  model: bge_m3
  skus:
    wh_n150:
      timeout: 30
    wh_n300:
      timeout: 30
  owner_id: U082LLYBLSW # Gabriel Tobar (CODEOWNERS @gtobarTT)
  team: models
