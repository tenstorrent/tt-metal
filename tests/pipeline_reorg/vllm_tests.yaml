# Test matrix for the vLLM nightly tests (.github/workflows/vllm-nightly-tests-impl.yaml).
#
# Pipeline-reorg format: name, model, cmd, server-timeout, benchmark-timeout, skus:{<sku>:{timeout}},
# team, owner_id, plus three JSON blobs:
#   server-config    : how the vLLM server is launched (mesh-device, tt-config, server args, ...)
#   guards           : which post-launch checks run (coherence, structured-output, multimodal, sampling)
#   benchmark-config : extra args for the benchmark phases (additional-benchmark-args)
# `cmd` is the server launcher; the Run-server step runs it in the background with the args/env
# expanded from server-config. The two phases (server, benchmark) keep their own timeouts
# (server-timeout / benchmark-timeout); the sku `timeout` is their sum, for budget accounting only.
# Filter by `model` (substring; 'all' = all).
#
# Owners (Slack IDs). Single-owner entries carry owner_id; two-owner entries name both in a comment.

# owners: Pavle Petrovic (U08E1JCDVNX), Radoica Draskic (U08BH66EXAL)
- name: "[WH-T3K] Gemma3-27B"
  model: "google/gemma-3-27b-it"
  cmd: "python3 vllm/plugins/vllm-tt-plugin/examples/server_example_tt.py"
  server-timeout: 45
  benchmark-timeout: 5
  server-config: '{
      "mesh-device": "T3K",
      "tt-config": {
        "sample_on_device_mode": "decode_only",
        "fabric_config": "FABRIC_1D",
        "l1_small_size": 4096
      },
      "additional-server-args": "--async-scheduling",
      "tt-llama-text-ver": "tt_transformers"
    }'
  guards: '{
      "multimodal": true
    }'
  benchmark-config: '{}'
  skus:
    wh_llmbox:
      timeout: 50  # server-timeout(45) + benchmark-timeout(5); budget only
  team: models

