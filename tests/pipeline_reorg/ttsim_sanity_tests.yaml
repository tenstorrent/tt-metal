# This file defines the test matrix for the ttsim sanity tests pipeline.

#  Each entry represents a parallel job with the following keys:
#  name: The display name for the job in GitHub Actions.
#  cmd: The exact command to run for the test.
#  skus: A mapping of SKU names to their configuration.
#    Each SKU entry contains:
#      timeout: The maximum allowed runtime for this job in minutes on that SKU.
#  owner_id: The Slack user ID to notify on failure.
#  team: The team that owns the test.
#  category: Selector used by tt-metal-l2-nightly.yaml's additional_test_categories
#    dispatch input. On dispatch the impl filters this matrix to entries whose
#    category appears in the comma-separated list; on schedule the filter is
#    bypassed and every entry runs.

# For max allowed timeout refer to .github/time_budget.yaml

- name: "ttsim examples"
  cmd: >-
    for ex in
    add_2_integers_in_compute
    add_2_integers_in_riscv
    eltwise_binary
    eltwise_sfpu
    hello_world_compute_kernel
    hello_world_datamovement_kernel;
    do
    build_dir=$(mktemp -d) || exit 1;
    cmake -G Ninja -S "/usr/share/tt-metalium/examples/$ex" -B "$build_dir" || exit 1;
    cmake --build "$build_dir" || exit 1;
    for exe in $(find "$build_dir" -maxdepth 2 -type f -executable -not -name '*.so');
    do "$exe" || exit 1; done;
    done
  skus:
    sim_wormhole_b0:
      timeout: 30
    sim_blackhole:
      timeout: 30
  team: ttsim
  owner_id: U08PR765YJ1 # Matt Craighead
