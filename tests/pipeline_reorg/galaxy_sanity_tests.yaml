# This file defines the test matrix for the Galaxy Sanity pipeline.

# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run (env vars must be inlined).
#   skus: A mapping of SKU names to their configuration (each SKU has timeout in minutes).
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#   arch: Architecture string (wormhole_b0) for downstream tooling.

# For max allowed timeout refer to .github/time_budget.yaml

- name: Deepseek V3 tests
  cmd: |
    export DEEPSEEK_V3_HF_MODEL=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-dequantized-stacked
    export DEEPSEEK_V3_CACHE=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache/CI
    uv pip install -r models/demos/deepseek_v3/reference/deepseek/requirements.txt
    # Running only decode and prefill-128 tests with HF weights for moe and mlp layer
    MESH_DEVICE=TG pytest models/demos/deepseek_v3/tests/test_decoder_block.py -k "model.layers.3 and (mode_decode or mode_prefill_seq_128)" --timeout 180 --durations=0
    MESH_DEVICE=TG pytest models/demos/deepseek_v3/tests/test_decoder_block.py -k "model.layers.0 and (mode_decode or mode_prefill_seq_128)" --timeout 60 --durations=0
  skus:
    wh_galaxy_perf:
      timeout: 10
  owner_id: U03HY7MK4BT # Mark O'Connor
  team: models
  arch: wormhole_b0
