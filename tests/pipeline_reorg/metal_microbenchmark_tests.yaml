# This file defines the test matrix for the metal microbenchmark pipeline.
# Scheduled perf/regression jobs for DRAM, fabric, data movement, and PCIe benchmarks.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#   arch: Architecture string for benchmark/latency checks (wormhole_b0 or blackhole).
#   upload_fabric_data: (Optional) Upload fabric BW/latency data to SFTP on main.

# For max allowed timeout refer to .github/time_budget.yaml

- name: N300 DRAM ubench
  cmd: ./tests/scripts/run_moreh_microbenchmark.sh
  skus:
    wh_n300_perf:
      timeout: 45
  owner_id: U06MJ6CVCGZ # Yu Gao
  team: runtime
  arch: wormhole_b0

- name: T3K ubench - Fabric BW & Latency
  cmd: TT_METAL_CLEAR_L1=1 ./build/test/tt_metal/tt_fabric/test_infra/test_tt_fabric --test_config ./tests/tt_metal/tt_fabric/test_infra/test_yamls/test_fabric_ubench_at_least_2x2_mesh.yaml
  skus:
    wh_llmbox_perf:
      timeout: 45
  owner_id: ULMEPM2MA # Sean Nijjar
  team: scaleout
  arch: wormhole_b0
  upload_fabric_data: true

- name: T3K ubench - Fabric Mux BW
  cmd: pytest -svv tests/tt_metal/microbenchmarks/ethernet/test_fabric_mux_bandwidth.py
  skus:
    wh_llmbox_perf:
      timeout: 45
  owner_id: U08FXFFH7L0 # Abhishek Agarwal
  team: scaleout
  arch: wormhole_b0

- name: WH Data Movement Regressions
  cmd: pytest -svv tests/tt_metal/tt_metal/data_movement/python/test_data_movement.py --gtest-filter Directed --verbose-log
  skus:
    wh_n300_perf:
      timeout: 45
  owner_id: U084B109TED # Ata Tuzuner
  team: runtime
  arch: wormhole_b0

- name: BH P150 DRAM ubench
  cmd: ./tests/scripts/run_moreh_microbenchmark.sh
  skus:
    bh_p150_perf:
      timeout: 45
  owner_id: U06MJ6CVCGZ # Yu Gao
  team: runtime
  arch: blackhole

- name: BH Data Movement Regressions
  cmd: pytest -svv tests/tt_metal/tt_metal/data_movement/python/test_data_movement.py --gtest-filter Directed --verbose-log
  skus:
    bh_p150_perf:
      timeout: 45
  owner_id: U084B109TED # Ata Tuzuner
  team: runtime
  arch: blackhole

- name: BH P150 PCIe Performance
  cmd: build/tools/mem_bench --benchmark_filter="Device (Reading|Writing) Host"
  skus:
    bh_p150b_civ2_viommu:
      timeout: 45
  owner_id: U08276D910S # Nigel Huang
  team: runtime
  arch: blackhole

- name: Fabric Collectives ubench - Point to Point
  cmd: tests/tt_metal/tt_fabric/benchmark/collectives/unicast/ci_run_unicast.sh
  skus:
    wh_llmbox_perf:
      timeout: 45
  owner_id: U08LD7UCKDF # Tomer Levin
  team: scaleout
  arch: wormhole_b0

- name: BH Quietbox ubench - Fabric BW & Latency
  cmd: TT_METAL_CLEAR_L1=1 ./build/test/tt_metal/tt_fabric/test_infra/test_tt_fabric --test_config ./tests/tt_metal/tt_fabric/test_infra/test_yamls/test_fabric_ubench_at_least_2x2_mesh.yaml
  skus:
    bh_quietbox_2:
      timeout: 45
  owner_id: U0883RN6CRE # William Ly (scaleout fabric)
  team: scaleout
  arch: blackhole
  upload_fabric_data: true
