# This file defines the test matrix for the Blackhole perf tests pipeline.

# Each entry represents a parallel job with the following keys:
#   id: Stable slug for workflow_dispatch / jq filtering.
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   upload_fabric_data: (Optional) When true the impl runs the fabric BW/latency
#                       capture + SFTP upload action on the main branch.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# Blackhole multi-card fabric perf tests
- id: bh-fabric-sanity-benchmark
  name: fabric sanity benchmark
  cmd: ./build/test/tt_metal/perf_microbenchmark/routing/test_tt_fabric --test_config ${TT_METAL_HOME}/tests/tt_metal/tt_metal/perf_microbenchmark/routing/test_fabric_ubench_at_least_2x2_mesh.yaml
  upload_fabric_data: true
  skus:
    bh_deskbox:
      timeout: 15
    bh_llmbox:
      timeout: 15
    bh_loudbox:
      timeout: 15
    bh_p300:
      timeout: 15
    bh_quietbox_2:
      timeout: 15
  owner_id: U0883RN6CRE # William Ly
  team: scaleout

# Blackhole multi-card ttnn perf tests
- id: bh-ring-sdpa-perf
  name: ring sdpa perf tests
  cmd: |
    SDPA_PERF_CHECKS=1 pytest tests/nightly/blackhole/sdpa/test_ring_joint_sdpa.py::test_ring_joint_attention_perf_check -svv
    SDPA_PERF_CHECKS=1 pytest tests/nightly/blackhole/sdpa/test_exp_ring_joint_sdpa.py::test_exp_ring_joint_attention_perf_check -svv
  skus:
    bh_deskbox:
      timeout: 10
    bh_llmbox:
      timeout: 10
    bh_loudbox:
      timeout: 10
    bh_p300:
      timeout: 10
    bh_quietbox_2:
      timeout: 10
  owner_id: U07RD9YRFT9 # Slavko Krstic
  team: ttnn
