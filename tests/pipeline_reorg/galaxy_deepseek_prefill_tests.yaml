# This file defines the test matrix for the Galaxy DeepSeek Prefill tests pipeline.

# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run (env vars must be inlined).
#   test_type: Test type identifier for filtering (workflow_dispatch test-type selection).
#   skus: A mapping of SKU names to their configuration (each SKU has timeout in minutes).
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# Blackhole Galaxy DeepSeek Prefill tests
- name: "(Galaxy) DeepSeek Prefill module tests"
  cmd: |
    export DEEPSEEK_V3_HF_MODEL=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528 DEEPSEEK_V3_CACHE=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache/CI MESH_DEVICE=TG
    uv pip install -r models/demos/deepseek_v3/reference/deepseek/requirements.txt
    pytest models/demos/deepseek_v3_d_p/tests/pcc/test_moe_gate_prefill2d.py -k "mesh-8x4"
    export DEEPSEEK_V3_MLA_REF_CACHE=/mnt/MLPerf/deepseek-prefill-cache/test_mla_output
    pytest models/demos/deepseek_v3_d_p/tests/test_mla.py::test_mla -k "8x4 and random and max_sl and check_pcc and balanced" -vvv --tb=short
    pytest models/demos/deepseek_v3_d_p/tests/test_prefill_block.py -k "8x4 and pcc" -vvv --tb=short --timeout=900
  test_type: module
  skus:
    bh_galaxy:
      timeout: 30
  owner_id: U08RL15T4N8
  team: models
