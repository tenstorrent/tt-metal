# Ring joint SDPA math-utilization perf checks (1 WAN, 1 MLA-100k, 1 Kimi chunked ring_mla).
# Uses real-time device program records, so it runs on the plain build without ENABLE_TRACY.
# sp/tp are auto-selected by MeshConfig.detect() on Galaxy (sp=8, tp=4).
- name: "(Galaxy) Ring Joint SDPA - perf checks"
  # Run both perf checks unconditionally (so both report numbers) but fail the step if either
  # fails - the harness only propagates the last command's exit code, so aggregate it ourselves.
  cmd: |
    export MESH_DEVICE=TG

    mpirun --pernode --tag-output bash -lc '
      rc=0
      python3 -m pytest tests/nightly/blackhole/sdpa/test_ring_joint_sdpa.py::test_ring_joint_attention_perf_check -svv || rc=1
      python3 -m pytest tests/nightly/blackhole/sdpa/test_ring_joint_sdpa.py::test_ring_mla_chunked_perf_check -svv || rc=1
      exit $rc
    '
  test_type: ring_joint_sdpa_perf
  test_group: sdpa_perf
  skus:
    bh_spsg:
      # Both perf checks run in ~5.6 min; 23 leaves headroom for Galaxy variance.
      timeout: 23
  owner_id: U08RL15T4N8
  team: models
  sp_config: spsg

- name: "(Galaxy) DeepSeek Prefill - Chunked Kimi (code_debug 55k)"
  # 55k-ISL chunked-prefill perf/smoke for Kimi: full 61 layers, 11 chunks x 5120 = 56320 tokens
  # (the full code_debug trace), 10 iterations. No-PCC: it drives the real chunked-prefill path end to
  # end (build once, forward 10x) and passes on completion -- no golden readback, no accuracy compare.
  #
  # Paths (CI mounts /mnt/MLPerf:ro):
  #   KIMI_K2_6_HF_MODEL  -> dequantized Kimi HF checkpoint (config.json + safetensors.index.json)
  #   TT_KIMI_PREFILL_TTNN_CACHE is intentionally NOT set; the conftest falls back to the
  #     shared cache path under KIMI_K2_6_HF_MODEL/tensor_cache_bh_32dev/8x4.
  #   PREFILL_TRACE_DIR   -> code_debug (56320) golden trace; metadata.json token_ids feed the prefill.
  cmd: |
    export MESH_DEVICE=TG
    export KIMI_K2_6_HF_MODEL=/mnt/models/Kimi-K2.6-dequantized
    export PREFILL_TRACE_DIR=/mnt/models/kimi-prefill-cache/vllm-kimi-k26-codedebug-56320
    mpirun --pernode --tag-output bash -lc '
      python3 -m pytest models/demos/deepseek_v3_d_p/tests/test_prefill_transformer_chunked.py::test_kimi_prefill_transformer_chunked_no_pcc[blackhole-kimi-mesh-8x4-L61-chunks_eleven-ten_iters-margin5pct] -xvs
    '
  test_type: kimi_chunked
  test_group: module
  skus:
    bh_spsg:
      # Job takes under 20 minutes; 30 minute timeout provides buffer for variance.
      timeout: 60
  owner_id: U08RL15T4N8
  team: models
  sp_config: spsg
