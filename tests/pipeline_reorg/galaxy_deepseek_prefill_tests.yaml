# This file defines the test matrix for the Galaxy DeepSeek Prefill tests pipeline.

# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run (env vars must be inlined).
#   test_type: Test type identifier for filtering (workflow_dispatch test-type selection).
#   test_group: Group identifier for selecting multiple related tests at once.
#   skus: A mapping of SKU names to their configuration (each SKU has timeout in minutes).
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# Blackhole Galaxy DeepSeek Prefill tests
- name: "(Galaxy) DeepSeek Prefill - MoE Gate"
  cmd: |
    export DEEPSEEK_V3_HF_MODEL=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528 DEEPSEEK_V3_CACHE=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache/CI TT_DS_PREFILL_TTNN_CACHE=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache/CI DEEPSEEK_V3_TRACE_DIR=/mnt/MLPerf/deepseek-prefill-cache MESH_DEVICE=TG
    uv pip install -r models/demos/deepseek_v3/reference/deepseek/requirements.txt
    pytest models/demos/deepseek_v3_d_p/tests/pcc/test_moe_gate_prefill2d.py -k "mesh-8x4"
  test_type: moe_gate
  test_group: module
  skus:
    bh_galaxy:
      timeout: 30
  owner_id: U08RL15T4N8
  team: models

- name: "(Galaxy) DeepSeek Prefill - MLA"
  cmd: |
    export DEEPSEEK_V3_HF_MODEL=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528 DEEPSEEK_V3_CACHE=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache/CI TT_DS_PREFILL_TTNN_CACHE=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache/CI DEEPSEEK_V3_TRACE_DIR=/mnt/MLPerf/deepseek-prefill-cache MESH_DEVICE=TG
    uv pip install -r models/demos/deepseek_v3/reference/deepseek/requirements.txt
    export DEEPSEEK_V3_MLA_REF_CACHE=/mnt/MLPerf/deepseek-prefill-cache/test_mla_output
    pytest models/demos/deepseek_v3_d_p/tests/test_mla.py::test_mla -k "8x4 and random and max_sl and check_pcc and balanced and ring" -vvv --tb=short
  test_type: mla
  test_group: module
  skus:
    bh_galaxy:
      timeout: 30
  owner_id: U08RL15T4N8
  team: models

- name: "(Galaxy) DeepSeek Prefill - Prefill Block"
  cmd: |
    export DEEPSEEK_V3_HF_MODEL=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528 DEEPSEEK_V3_CACHE=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache/CI TT_DS_PREFILL_TTNN_CACHE=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache/CI DEEPSEEK_V3_TRACE_DIR=/mnt/MLPerf/deepseek-prefill-cache MESH_DEVICE=TG
    uv pip install -r models/demos/deepseek_v3/reference/deepseek/requirements.txt
    pytest models/demos/deepseek_v3_d_p/tests/test_prefill_block.py -k "8x4 and pcc" -vvv --tb=short --timeout=900
  test_type: prefill_block
  test_group: module
  skus:
    bh_galaxy:
      timeout: 30
  owner_id: U08RL15T4N8
  team: models

- name: "(Galaxy) DeepSeek Prefill - Transformer from Trace"
  cmd: |
    export DEEPSEEK_V3_HF_MODEL=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528 DEEPSEEK_V3_CACHE=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache/CI TT_DS_PREFILL_TTNN_CACHE=/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache/CI DEEPSEEK_V3_TRACE_DIR=/mnt/MLPerf/deepseek-prefill-cache MESH_DEVICE=TG
    uv pip install -r models/demos/deepseek_v3/reference/deepseek/requirements.txt
    pytest models/demos/deepseek_v3_d_p/tests/test_prefill_transformer.py::test_prefill_transformer_from_trace -k "mesh-8x4 and e256_cf32_host" -vvv --tb=short --timeout=3600
  test_type: prefill_transformer
  test_group: module
  skus:
    bh_galaxy:
      timeout: 30
  owner_id: U08RL15T4N8
  team: models
