# Blackhole DeepSeek-v3-b1 op unit tests (blitz + per-core allocation, slow/fast dispatch)
- id: bh-ds-b1-blitz-slow-dispatch
  name: blackhole deepseek blitz op tests (slow dispatch)
  cmd: |
    set -e
    TT_METAL_SLOW_DISPATCH_MODE=1 pytest --timeout 600 -m "not skip_post_commit" models/demos/deepseek_v3_b1/tests/unit_tests/ --ignore=models/demos/deepseek_v3_b1/tests/unit_tests/per_core_allocation
    export DEVICE_PERF_REPORT_FILENAME="Ops_Perf.csv"
    python3 models/perf/merge_device_perf_results.py "$DEVICE_PERF_REPORT_FILENAME" REPORT
    cat "$DEVICE_PERF_REPORT_FILENAME"
    python3 models/perf/merge_device_perf_results.py "$DEVICE_PERF_REPORT_FILENAME" CHECK
  skus:
    bh_p150b_civ2_viommu:
      timeout: 20
    bh_p100a_civ2_viommu:
      timeout: 20
  owner_id: U0883RN6CRE # William Ly
  team: models

