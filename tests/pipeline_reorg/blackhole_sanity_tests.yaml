# This file defines the test matrix for the Blackhole Sanity pipeline.
# This is the post-commit gate suite, rebranded to "Sanity" under the pipeline reorg.
# All tests previously orchestrated by blackhole-post-commit.yaml live here.

# Each entry represents a parallel job with the following keys:
#   id: Stable slug for workflow_dispatch / jq filtering.
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# Blackhole profiler regression (post-commit subset)
- id: bh-profiler-regression
  name: profiler regression (post-commit)
  cmd: |
    ./tests/scripts/run_profiler_regressions.sh --post-commit
  skus:
    bh_p150b_civ2_viommu:
      timeout: 37
    bh_p100a_civ2_viommu:
      timeout: 37
  owner_id: U07TGCKHTBV # Aleksandar Dakic (#tt-metal-profiler)
  team: runtime

