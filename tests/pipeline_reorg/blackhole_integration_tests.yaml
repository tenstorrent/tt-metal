# This file defines the test matrix for the Blackhole integration tests pipeline.

# Each entry represents a parallel job with the following keys:
#   id: Stable slug for workflow_dispatch / jq filtering.
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# Blackhole multi-card fabric integration tests
- id: bh-fabric-infra-integration
  name: fabric infra unit tests
  cmd: |
    TT_METAL_CLEAR_L1=1 ./build/test/tt_metal/perf_microbenchmark/routing/test_tt_fabric --test_config ${TT_METAL_HOME}/tests/tt_metal/tt_metal/perf_microbenchmark/routing/test_fabric_sanity_common.yaml
    TT_METAL_CLEAR_L1=1 ./build/test/tt_metal/perf_microbenchmark/routing/test_tt_fabric --test_config ${TT_METAL_HOME}/tests/tt_metal/tt_metal/perf_microbenchmark/routing/test_fabric_sanity_at_least_2x2_mesh.yaml
    TT_FABRIC_PROFILE_RX_CH_FWD=1 TT_METAL_CLEAR_L1=1 ./build/test/tt_metal/perf_microbenchmark/routing/test_tt_fabric --test_config ${TT_METAL_HOME}/tests/tt_metal/tt_metal/perf_microbenchmark/routing/test_fabric_code_profiling.yaml
  skus:
    bh_deskbox:
      timeout: 15
    bh_llmbox:
      timeout: 15
    bh_loudbox:
      timeout: 15
    bh_p300:
      timeout: 15
    bh_quietbox_2:
      timeout: 15
  owner_id: U0883RN6CRE # William Ly
  team: scaleout

