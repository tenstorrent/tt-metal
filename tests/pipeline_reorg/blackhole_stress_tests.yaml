# Test matrix for (Blackhole) Stress — see .github/workflows/blackhole-stress-tests.yaml

- id: bh-fabric-stability-stress
  name: fabric stability nightly tests
  cmd: TT_METAL_CLEAR_L1=1 ./build/test/tt_metal/perf_microbenchmark/routing/test_tt_fabric --test_config ./tests/tt_metal/tt_metal/perf_microbenchmark/routing/test_fabric_stability_short_running.yaml
  skus:
    bh_deskbox:
      timeout: 15
    bh_llmbox:
      timeout: 15
    bh_loudbox:
      timeout: 15
    bh_p300:
      timeout: 15
    bh_quietbox_2:
      timeout: 15
  owner_id: U0883RN6CRE # William Ly
  team: scaleout

- id: bh-ttnn-stress
  name: ttnn stress tests
  cmd: pytest tests/ttnn/stress_tests/
  skus:
    bh_p150b_civ2:
      timeout: 45
    bh_llmbox:
      timeout: 45
  owner_id: U084DDYSWCW # Adrian Morrison
  team: ttnn

- id: bh-llama3_1-8b-1-device-stress
  name: llama3.1-8b 1-device stress
  cmd: |
    set -e
    export HF_HOME=/localdev/blackhole_demos/huggingface_data
    export HF_MODEL=meta-llama/Llama-3.1-8B-Instruct
    export TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/tt_cache/meta-llama--Llama-3.1-8B-Instruct
    pytest models/tt_transformers/demo/simple_text_demo.py -k "performance and stress" --timeout=1800
  model-name: llama3.1-8b
  weights-cache-mode: cloud-mlperf
  skus:
    bh_p150:
      timeout: 30
  owner_id: U03PUAKE719 # Miguel Tairum
  team: models

- id: bh-llama3_1-8b-2-device-stress
  name: llama3.1-8b 2-device stress
  cmd: |
    set -e
    export HF_HOME=/localdev/blackhole_demos/huggingface_data
    export HF_MODEL=meta-llama/Llama-3.1-8B-Instruct
    export TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/tt_cache/meta-llama--Llama-3.1-8B-Instruct
    pytest --timeout 3600 models/tt_transformers/demo/simple_text_demo.py -k "performance and stress" --data_parallel 2 --max_generated_tokens 22000
  model-name: llama3.1-8b
  weights-cache-mode: cloud-mlperf
  skus:
    bh_deskbox:
      timeout: 30
  owner_id: U03PUAKE719 # Miguel Tairum
  team: models

