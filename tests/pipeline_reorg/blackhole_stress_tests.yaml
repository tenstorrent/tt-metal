# This file defines the test matrix for the Blackhole stress tests pipeline.

# Each entry represents a parallel job with the following keys:
#   id: Stable slug for workflow_dispatch / jq filtering.
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   model-name: (Optional) Model identifier for filtering (workflow_dispatch model selection).
#   weights-cache-mode: (Optional) local-disk | cloud-mlperf | lfc — controls HF
#                       cache mount in the impl (matches blackhole-demo-tests).
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml
#
# NOTE: the lightweight post-commit stress suites (bh-fabric-stability-stress, bh-ttnn-stress) used
# to live here but are now part of the Blackhole e2e pipeline — see
# tests/pipeline_reorg/blackhole_e2e_tests.yaml. This file is for the heavy / weekly stress tests
# only (currently the Llama3.1-8B N-device model-stress matrix).

# Blackhole Llama3.1-8B N-device stress tests
- id: bh-llama3_1-8b-1-device-stress
  name: llama3.1-8b 1-device stress
  cmd: |
    set -e
    export HF_HOME=/localdev/blackhole_demos/huggingface_data
    export HF_MODEL=meta-llama/Llama-3.1-8B-Instruct
    export TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/tt_cache/meta-llama--Llama-3.1-8B-Instruct
    pytest models/tt_transformers/demo/simple_text_demo.py -k "performance and stress" --timeout=1800
  model-name: llama3.1-8b
  weights-cache-mode: cloud-mlperf
  skus:
    bh_p150:
      timeout: 30
  owner_id: U03PUAKE719 # Miguel Tairum
  team: models

- id: bh-llama3_1-8b-2-device-stress
  name: llama3.1-8b 2-device stress
  cmd: |
    set -e
    export HF_HOME=/localdev/blackhole_demos/huggingface_data
    export HF_MODEL=meta-llama/Llama-3.1-8B-Instruct
    export TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/tt_cache/meta-llama--Llama-3.1-8B-Instruct
    pytest --timeout 3600 models/tt_transformers/demo/simple_text_demo.py -k "performance and stress" --data_parallel 2 --max_generated_tokens 22000
  model-name: llama3.1-8b
  weights-cache-mode: cloud-mlperf
  skus:
    bh_deskbox:
      timeout: 30
  owner_id: U03PUAKE719 # Miguel Tairum
  team: models

