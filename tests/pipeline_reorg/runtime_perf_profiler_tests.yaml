# Runtime performance tests that require a profiler-enabled (ENABLE_TRACY=ON) build.
# These run in the (Runtime) Performance Tests pipeline against a separate
# profiler build artifact, so the non-profiler dispatch/bandwidth microbenchmarks
# in runtime_perf_tests.yaml are not perturbed by profiler instrumentation.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration (timeout in minutes).
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#
# For max allowed timeout refer to .github/time_budget.yaml (subheading: perf_profiler).

# --- Op-to-op latency microbenchmark ---
# Runs one pinned steady-state config to completion with the device profiler, then
# post-processes the profiler CSV in Python and gates the portable device KERNEL-zone
# op2op (official_op2op_us) against the per-arch golden. The metric comes only from the
# standard device profiler so it behaves identically on Wormhole and Blackhole; the new
# realtime profiler is intentionally NOT used here (it is unsupported on some WH setups).
# Goldens ship in record mode (null) until populated.
- name: runtime_perf_op_to_op_latency
  cmd: |
    mkdir -p generated/test_reports
    export TT_METAL_DEVICE_PROFILER=1
    # Accumulate profiler markers in per-RISC L1 and defer the L1->DRAM dump instead of
    # flushing after every program. Without this the ~3us per-program dump lands inside the
    # op2op gap and inflates the measured latency (reviewer feedback). The gated firmware
    # KERNEL zones and our lean DeviceRecordEvent markers both survive accumulate mode.
    export TT_METAL_PROFILER_ACCUMULATE=1
    ./build/test/tt_metal/perf_microbenchmark/op_to_op_latency/test_op_to_op_latency \
      --use-trace --trace-warmup-replays 2 --num-programs 8 --num-pages-per-core 4 \
      --compute-nops 2000 --use-device-profiler
    GOLDEN=tests/tt_metal/tt_metal/perf_microbenchmark/op_to_op_latency/op_to_op_golden.json
    if [ "$ARCH_NAME" = "blackhole" ]; then
      GOLDEN=tests/tt_metal/tt_metal/perf_microbenchmark/op_to_op_latency/op_to_op_blackhole_golden.json
    fi
    # The post-proc imports the profiler team's parser (tracy.process_device_log), which
    # lives under tools/. Put tools/ (plus repo root and ttnn) on PYTHONPATH so it resolves.
    export PYTHONPATH="${TT_METAL_HOME}/tools:${TT_METAL_HOME}:${TT_METAL_HOME}/ttnn${PYTHONPATH:+:${PYTHONPATH}}"
    python3 tests/tt_metal/tt_metal/perf_microbenchmark/op_to_op_latency/op_to_op_postprocess.py \
      --min-prog-id 3 --golden "$GOLDEN"
  skus:
    wh_n300_civ2:
      timeout: 5
    bh_p150_perf:
      timeout: 5
  owner_id: U099A7FMKL2 # Manish Sudumbrekar
  team: runtime
