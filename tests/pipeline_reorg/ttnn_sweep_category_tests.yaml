# Sweep batch definitions for the ttnn-run-sweeps workflow.
#
# Each entry is one PRE-DEFINED batch = a test category. The cmd runs the sweep
# runner over that category's modules (--module-name prefix-matches every module
# under the category, e.g. `eltwise.unary` -> all eltwise.unary.* sweeps) against
# the vectors generated upstream. Giants are split along their subdirs (eltwise);
# everything else is one entry per top-level category. model_traced / lead-models
# are separate run types and are not batched here.
#
# Budget is enforced by verify_time_budget.py against .github/time_budget.yaml
# (team: ttnn, category: sweep). Per-(team,sku) timeout sums must stay within that
# budget (wh_n150/wh_n300/bh_p150b_civ2/wh_galaxy: 900, bh_loudbox: 300).
#
# Single-card categories run on wh_n150/wh_n300/bh_p150b_civ2; ccl (multi-device)
# runs on wh_galaxy/bh_loudbox. Timeouts are first-pass estimates weighted by
# module count — tune from observed run durations.

# --- eltwise (split along subdirs) ---
- name: ttnn sweeps eltwise.unary
  cmd: 'python3 tests/sweep_framework/sweeps_runner.py --module-name eltwise.unary --vector-source vectors_export --result-dest results_export --tag ci-main --summary'
  skus:
    wh_n150:
      timeout: 300
    wh_n300:
      timeout: 300
    bh_p150b_civ2:
      timeout: 300
  owner_id: U05ACKAJTHS # Naif Tarafdar
  team: ttnn
  category: eltwise.unary

