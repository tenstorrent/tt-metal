# This file defines the test matrix for the Galaxy profiler tests pipeline.

# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration (each SKU has timeout in minutes).
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.

# For max allowed timeout refer to .github/time_budget.yaml

# NOTE: The owning team ("ttnn") and pipeline category ("integration") used for
# these profiler tests are placeholders pending final assignment. See
# https://github.com/tenstorrent/tt-metal/issues/44285 for the open issue tracking
# the final team / test-framework decision.

# Per-job timeouts are sized from observed CI wall-clock runtime with headroom.
# Note: pytest --timeout is per-test, not total run; test_device_profiler.py
# contains ~20 test functions so file wall-clock is much larger than the
# 360s/test ceiling.

- name: Galaxy profiler device tests
  # ~20 functions, observed >14 min wall-clock; 30 min gives healthy headroom.
  cmd: TT_METAL_DEVICE_PROFILER=1 pytest tests/tt_metal/tools/profiler/test_device_profiler.py --noconftest --timeout 360
  skus:
    wh_galaxy:
      timeout: 30
  owner_id: U03BJ1L3LUQ # Mo Memarian
  team: ttnn # Placeholder; see https://github.com/tenstorrent/tt-metal/issues/44285

- name: Galaxy profiler realtime cross-reference tests
  # Single test; observed ~6 min wall-clock; 15 min gives ~2.5x buffer.
  # The test itself has @pytest.mark.timeout(2100) baked in as the per-test ceiling.
  cmd: TT_METAL_DEVICE_PROFILER=1 pytest tests/ttnn/tracy/test_realtime_profiler.py::test_cross_reference_tg --timeout 2400
  skus:
    wh_galaxy:
      timeout: 15
  owner_id: U03BJ1L3LUQ # Mo Memarian
  team: ttnn # Placeholder; see https://github.com/tenstorrent/tt-metal/issues/44285
