    pytest --timeout 1800 models/tt_transformers/demo/simple_text_demo.py -k "performance-seqlen-sweep" --max_seq_len 32768 --page_params "{\"page_block_size\": 32, \"page_max_num_blocks_per_dp\": 1024}" 
  model: mixtral-8x7b
  skus:
    wh_llmbox_perf:
      timeout: 30
      tier: 2
