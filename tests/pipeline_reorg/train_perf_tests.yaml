# Test matrix for perf tests
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   category: Identifier to group tests for selective execution.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#
# For max allowed timeout refer to .github/time_budget.yaml.

- name: "TinyLlama Shakespeare"
  cmd: python tt-train/scripts/run_models.py --model_config tt-train/scripts/run_models_configs/single_cards.yaml --filter-filenames "tinyllama_shakespeare"
  skus:
    bh_p150b_civ2:
      timeout: 90
  category: pretraining
  owner_id: U07K00A281X # Kevin Wu
  team: train

- name: "TinyLlama Shakespeare (C++)"
  cmd: python tt-train/scripts/run_models.py --model_config tt-train/scripts/run_models_configs/single_cards.yaml --filter-filenames "tinyllama_shakespeare_cpp"
  skus:
    bh_p150b_civ2:
      timeout: 90
  category: pretraining
  owner_id: U07K00A281X # Kevin Wu
  team: train
