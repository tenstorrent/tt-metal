# This file defines the test matrix for the TTNN nightly integration tests
# pipeline.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#   merge_gate: false for nightly tests (never run on PR/merge gate).
#
# For max allowed timeout refer to .github/time_budget.yaml.

- name: ttnn nightly docs examples tests
  # docs_examples runs on viommu-stable SKUs in the legacy workflow.
  cmd: 'pytest tests/ttnn/docs_examples -xv -m "not disable_fast_runtime_mode" --timeout=600'
  skus:
    wh_n150_civ2:
      timeout: 15
    wh_n300_civ2:
      timeout: 15
    bh_p100a_civ2_viommu:
      timeout: 15
    bh_p150b_civ2_viommu:
      timeout: 15
  owner_id: U076Z1JJUQZ # Artem Yerofieiev
  team: ttnn
  merge_gate: false

- name: ttnn nightly sdpa stress tests
  cmd: |
    pytest tests/ttnn/nightly/unit_tests/operations/sdpa/test_mla_decode_stress.py \
           tests/ttnn/nightly/unit_tests/operations/sdpa/test_mla_prefill_stress.py \
           -xv --timeout=600
  skus:
    wh_n150:
      timeout: 30
    wh_n300:
      timeout: 30
    bh_p150b_civ2:
      timeout: 30
  owner_id: U085GDCAZTN # Pavle Josipovic
  team: ttnn
  merge_gate: false

- name: ttnn nightly data_movement ccl tests group 1
  # The post-commit data_movement / ccl / point_to_point suites are re-run
  # nightly in 3 split groups to cover the long tail that the PR gate skips.
  cmd: 'pytest tests/ttnn/unit_tests/operations/data_movement tests/ttnn/unit_tests/operations/ccl tests/ttnn/unit_tests/operations/point_to_point --splits 3 --group 1 -xv -m "not disable_fast_runtime_mode" --timeout=300'
  skus:
    wh_n150:
      timeout: 15
    wh_n300:
      timeout: 15
    bh_p100:
      timeout: 15
    bh_p150b_civ2:
      timeout: 15
  owner_id: U05ACKAJTHS # Naif Tarafdar
  team: ttnn
  merge_gate: false

- name: ttnn nightly data_movement ccl tests group 2
  cmd: 'pytest tests/ttnn/unit_tests/operations/data_movement tests/ttnn/unit_tests/operations/ccl tests/ttnn/unit_tests/operations/point_to_point --splits 3 --group 2 -xv -m "not disable_fast_runtime_mode" --timeout=300'
  skus:
    wh_n150:
      timeout: 15
    wh_n300:
      timeout: 15
    bh_p100:
      timeout: 15
    bh_p150b_civ2:
      timeout: 15
  owner_id: U05ACKAJTHS # Naif Tarafdar
  team: ttnn
  merge_gate: false

- name: ttnn nightly data_movement ccl tests group 3
  cmd: 'pytest tests/ttnn/unit_tests/operations/data_movement tests/ttnn/unit_tests/operations/ccl tests/ttnn/unit_tests/operations/point_to_point --splits 3 --group 3 -xv -m "not disable_fast_runtime_mode" --timeout=300'
  skus:
    wh_n150:
      timeout: 15
    wh_n300:
      timeout: 15
    bh_p100:
      timeout: 15
    bh_p150b_civ2:
      timeout: 15
  owner_id: U05ACKAJTHS # Naif Tarafdar
  team: ttnn
  merge_gate: false
