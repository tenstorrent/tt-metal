# Budget definition for the prepare-sweep-vectors load of the ttnn-run-sweeps
# workflow (ttnn-run-sweeps-impl.yaml).
#
# prepare-sweep-vectors runs the sweeps parameter generator on TT hardware
# (tt-ubuntu-2204-N150-viommu-stable = wh_n150_civ2) once per sweep run. Every
# sweep batch depends on its vectors artifact, so this hardware load is a fixed
# cost of every sweep pipeline and is tracked separately from the per-batch run
# budget (sweep) and the trace-validation budget (sweep_validation).
#
# Governance only: the job's actual timeout-minutes lives in the impl workflow.
# This entry is checked by verify_time_budget.py (team: ttnn, workflow:
# sweep_prepare) against .github/time_budget.yaml.
#
# For max allowed timeout refer to .github/time_budget.yaml.

- name: ttnn sweep prepare vectors
  cmd: 'python3 tests/sweep_framework/sweeps_parameter_generator.py'
  skus:
    wh_n150_civ2:
      timeout: 30
  owner_id: U08T3JQEB36 # Steven Lee
  team: ttnn
