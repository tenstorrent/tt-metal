# ============================================================================
# BH SC4 Multihost Pipeline Tests (4 connected galaxies)
# ============================================================================

- name: "Demo Test with Perf Metrics (DeepSeek V3 B1 Supercluster 4 aka Superpod 1)"
  cmd: |
    TTRUN_DIR=/etc/ttop
    TTRUN_PY="${TT_METAL_HOME}/ttnn/ttnn/distributed/ttrun.py"
    PIPELINE_HOSTS=$(awk 'NF {printf "%s,", $1}' "${TTRUN_DIR}/hostfile" | sed 's/,$//')

    TT_METAL_ALLOCATOR_MODE_HYBRID=1 TT_METAL_SLOW_DISPATCH_MODE=1 python3 "${TTRUN_PY}" \
      --tcp-interface ens5f0np0 \
      --mpi-args "--host $PIPELINE_HOSTS --map-by rankfile:file=${TTRUN_DIR}/rankfile --bind-to hwt:overload-allowed --tag-output --wdir ${TT_METAL_HOME}" \
      --rank-binding "${TTRUN_DIR}/rank_bindings.yaml" \
      python3 -m models.demos.deepseek_v3_b1.demo.cli \
        --max-new-tokens 4096 \
        --no-stop-at-eos \
        --weights real \
        --cache-path /mnt/models/deepseek-ai/cache-2026-03-22 \
        --prompt "Solve this step by step: Design a cache for sharded LLM weights across multiple hosts with local NVMe and shared NFS. Minimize startup latency, avoid duplicate reads, support cache invalidation, and explain tradeoffs between per-host caches, content-addressable storage, and pre-sharded artifacts." \
        --model-path /mnt/models/deepseek-ai/DeepSeek-R1-0528-dequantized
  skus:
    bh_sc4-blitz:
      timeout: 30
  owner_id: U08E1JCMAJF
  team: scaleout
  sp_config: sc4-blitz

