# ============================================================================
# BH SC16 Multihost Pipeline Tests (4 connected SC4 = 16 galaxies)
# ============================================================================
# bh_sc16 uses Count allocation (no ttop rankfile / rank_bindings.yaml). Launch via
# tt-run automapper (--mesh-graph-descriptor + --hosts); Phase-1 generate_rank_bindings
# writes bindings under <cwd>/generated/ttrun/<cache_id>/. cwd MUST be NFS-shared
# (/ci/tt-metal): /home/user/tt-metal is node-local, so Phase 1 rank 0 writes there
# on a worker and the runner never sees rank_bindings.yaml ("Phase 1 output not
# found"). Keep TT_METAL_HOME=/home/user/tt-metal for the binary + Phase 2 --wdir
# (built tree is unpacked there per node). Do not pass --rank-binding, --map-by
# rankfile, or --host in --mpi-args. Use --bind-to none (not hwt): Phase 1 has no
# rankfile, and hwt mapping fails on worker cpusets.
#
# Log control (runner OOM): multihost-with-nfs runners are capped at 4Gi.
# tt-run always injects --tag-output; without --output-filename, prterun buffers
# all 64 ranks of tagged stdout in anon RSS (~2Gi+) and OOMKills the runner
# (exit 137). Same pattern as kimi-decode-ladder:
#   PIPELINE_DIR (job env) on NFS -> --output-filename + launch.log
#   upload-artifact, then rm -rf PIPELINE_DIR (see demo-sp-multihost-impl.yaml).
# Do not stream ranks into the Actions pipe (no tee to stdout).

- name: "Teacher Forcing Test (DeepSeek V3 B1 Supercluster 16 aka Superpod 4)"
  cmd: |
    TTRUN_DIR=/etc/ttop
    export TT_METAL_HOME="${TT_METAL_HOME:-/home/user/tt-metal}"
    TTRUN_PY="${TT_METAL_HOME}/ttnn/ttnn/distributed/ttrun.py"
    PIPELINE_HOSTS=$(awk 'NF {printf "%s,", $1}' "${TTRUN_DIR}/hostfile" | sed 's/,$//')
    MGD=models/demos/deepseek_v3_b1/scaleout_configs/blitz_decode_mesh_graph_descriptor_superpod.textproto
    PIPELINE_DIR="${PIPELINE_DIR:?PIPELINE_DIR must be set (NFS staging for ranklogs)}"
    mkdir -p "${PIPELINE_DIR}/ranklogs"

    # Automapper Phase 1 outputs must land on NFS (same pattern as kimi-decode-ladder).
    cd /ci/tt-metal

    TT_LOGGER_LEVEL=warn TT_METAL_ALLOCATOR_MODE_HYBRID=1 TT_METAL_SLOW_DISPATCH_MODE=1 python3 "${TTRUN_PY}" \
      --tcp-interface ens5f0np0 \
      --mesh-graph-descriptor "$MGD" \
      --hosts "$PIPELINE_HOSTS" \
      --mpi-args "--bind-to none --wdir ${TT_METAL_HOME} --output-filename ${PIPELINE_DIR}/ranklogs/rank -x LOGURU_LEVEL=WARNING" \
      python3 -m models.demos.deepseek_v3_b1.demo.teacher_forced \
        --weights real \
        --cache-path /mnt/models/deepseek-ai/cache-2026-03-22 \
        --model-path /mnt/models/deepseek-ai/DeepSeek-R1-0528-dequantized \
        --prompt "Solve this step by step: Design a cache for sharded LLM weights across multiple hosts with local NVMe and shared NFS. Minimize startup latency, avoid duplicate reads, support cache invalidation, and explain tradeoffs between per-host caches, content-addressable storage, and pre-sharded artifacts." \
        --reference-file /mnt/models/ref_data/output1_reference.txt \
        --output-file output1_teacher_forcing_results.json \
        --chunk-accuracy 256 \
      > "${PIPELINE_DIR}/launch.log" 2>&1
  skus:
    bh_sc16:
      timeout: 30
  owner_id: U08E1JCMAJF
  team: scaleout
  sp_config: sc16

