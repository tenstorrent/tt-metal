# This file defines the test matrix for multihost pipeline tests.
# These tests run on exabox multihost infrastructure with allocation/reset lifecycle.

# Each entry represents a test with the following keys:
#   name: The display name for the test in GitHub Actions.
#   cmd: The exact command to run (env vars must be inlined).
#   skus: A mapping of SKU names to their configuration (each SKU has timeout in minutes).
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#   sp_config: Single pod configuration (sp1, sp4, sp5) to run this test on.

# For max allowed timeout refer to .github/time_budget.yaml (scaleout -> e2e)

# ============================================================================
# BH SP1 Multihost Pipeline Tests (4 connected galaxies)
# ============================================================================

- name: "Physical Discovery Test"
  cmd: |
    mpirun --tag-output -x LD_LIBRARY_PATH -x TT_METAL_RUNTIME_ROOT --pernode \
      /home/user/tt-metal/build/test/tt_metal/tt_fabric/test_physical_discovery
  skus:
    bh_sp1:
      timeout: 10
  owner_id: U08RL15T4N8
  team: scaleout
  sp_config: sp1

- name: "System Health Check"
  cmd: |
    mpirun --tag-output -x LD_LIBRARY_PATH -x TT_METAL_RUNTIME_ROOT --pernode \
      /home/user/tt-metal/build/test/tt_metal/tt_fabric/test_system_health
  skus:
    bh_sp1:
      timeout: 10
  owner_id: U08RL15T4N8
  team: scaleout
  sp_config: sp1

- name: "Pipeline Test (DeepSeek V3 B1)"
  cmd: |
    PIPELINE_HOSTS=$(awk '{printf "%s:4,", $1}' /ci/ttrun/hostfile | sed 's/,$//')
    PIPELINE_DIR=/ci/pipeline-${GITHUB_RUN_ID}
    mkdir -p $PIPELINE_DIR
    python3 /ci/tt-metal/models/demos/deepseek_v3_b1/scaleout_configs/generate_blitz_decode_pipeline_configs.py \
      --mpi-user user \
      --hostfile /ci/ttrun/hostfile \
      --worker-tt-metal-home /home/user/tt-metal \
      --output-dir $PIPELINE_DIR \
      /ci/tt-metal/models/demos/deepseek_v3_b1/scaleout_configs/blitz_pipeline_config_single_pod_ci.yaml
    cd $PIPELINE_DIR
    tt-run --skip-executable-check \
      --mpi-args "--map-by rankfile:file=blitz_decode_pipeline_rank_file_single_pod_ci --bind-to hwt:overload-allowed --host $PIPELINE_HOSTS --tag-output" \
      --rank-binding blitz_decode_pipeline_rank_binding_single_pod_ci.yaml \
      /home/user/tt-metal/build/test/tt_metal/multihost/socket_pipeline/multiprocess/unit_tests_pipeline
  skus:
    bh_sp1:
      timeout: 30
  owner_id: U08E1JCMAJF
  team: scaleout
  sp_config: sp1

# ============================================================================
# BH SP4 Multihost Pipeline Tests (4 connected SP1 = 16 galaxies)
# ============================================================================

- name: "Pipeline Test (DeepSeek V3 B1 Superpod)"
  cmd: |
    set -x
    export TT_METAL_HOME="${TT_METAL_HOME:-/ci/tt-metal}"
    TT_METAL_WORKER_HOME=/home/user/tt-metal
    TTRUN_HOSTFILE=/ci/ttrun/hostfile
    PIPELINE_DIR=/ci/pipeline-${GITHUB_RUN_ID}
    PIPELINE_HOSTS=$(awk '{printf "%s:4,", $1}' "${TTRUN_HOSTFILE}" | sed 's/,$//')
    echo "=== Pipeline SP4 superpod: resolved paths ==="
    echo "TT_METAL_WORKER_HOME=${TT_METAL_WORKER_HOME}"
    echo "TT_METAL_HOME=${TT_METAL_HOME}"
    echo "TTRUN_HOSTFILE=${TTRUN_HOSTFILE}"
    echo "PIPELINE_DIR=${PIPELINE_DIR}"
    echo "PIPELINE_HOSTS=${PIPELINE_HOSTS}"
    echo "=== Pipeline SP4 superpod: pwd and key dirs ==="
    pwd
    ls -la /ci/ttrun
    ls -la "${TT_METAL_HOME}/models/demos/deepseek_v3_b1/scaleout_configs" | head -n 30
    mkdir -p "${PIPELINE_DIR}"
    echo "=== Pipeline SP4 superpod: pipeline dir after mkdir ==="
    ls -la "${PIPELINE_DIR}"
    echo "=== Pipeline SP4 superpod: running generate_blitz_decode_pipeline_configs ==="
    python3 "${TT_METAL_HOME}/models/demos/deepseek_v3_b1/scaleout_configs/generate_blitz_decode_pipeline_configs.py" \
      --mpi-user user \
      --hostfile "${TTRUN_HOSTFILE}" \
      --worker-tt-metal-home "${TT_METAL_WORKER_HOME}" \
      --output-dir "${PIPELINE_DIR}" \
      "${TT_METAL_HOME}/models/demos/deepseek_v3_b1/scaleout_configs/blitz_pipeline_config_superpod_ci.yaml"
    echo "=== Pipeline SP4 superpod: after generate (exit $?) ==="
    pwd
    ls -la "${PIPELINE_DIR}"
    echo "=== Pipeline SP4 superpod: cd to pipeline dir ==="
    cd "${PIPELINE_DIR}"
    echo "=== Pipeline SP4 superpod: before tt-run ==="
    pwd
    ls -la
    echo "=== Pipeline SP4 superpod: running tt-run ==="
    TT_METAL_SLOW_DISPATCH_MODE=1 tt-run --skip-executable-check \
      --mpi-args "--map-by rankfile:file=blitz_decode_pipeline_rank_file_superpod_ci --bind-to hwt:overload-allowed --host ${PIPELINE_HOSTS} --tag-output" \
      --rank-binding blitz_decode_pipeline_rank_binding_superpod_ci.yaml \
      "${TT_METAL_WORKER_HOME}/build/test/tt_metal/multihost/socket_pipeline/multiprocess/unit_tests_pipeline"
  skus:
    bh_sp4:
      timeout: 60
  owner_id: U08E1JCMAJF
  team: scaleout
  sp_config: sp4
