# This file defines the test matrix for multihost pipeline tests.
# These tests run on exabox multihost infrastructure with allocation/reset lifecycle.

# Each entry represents a test with the following keys:
#   name: The display name for the test in GitHub Actions.
#   cmd: The exact command to run (env vars must be inlined).
#   skus: A mapping of SKU names to their configuration (each SKU has timeout in minutes).
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#   sp_config: Single pod configuration (sp1, sp4, sp5) to run this test on.

# For max allowed timeout refer to .github/time_budget.yaml (scaleout -> e2e)

# ============================================================================
# BH SP1 Multihost Pipeline Tests (4 connected galaxies)
# ============================================================================

- name: "Stress Test (DeepSeek V3 B1 Supercluster 4 aka Superpod 1)"
  cmd: |
    PIPELINE_DIR=/ci/pipeline-${GITHUB_RUN_ID}
    mkdir -p $PIPELINE_DIR
    python3 /ci/tt-metal/models/demos/deepseek_v3_b1/scaleout_configs/generate_blitz_decode_pipeline_configs.py \
      --mpi-user user \
      --hostfile /ci/ttrun/hostfile \
      --worker-tt-metal-home /home/user/tt-metal \
      --output-dir $PIPELINE_DIR \
      /ci/tt-metal/models/demos/deepseek_v3_b1/scaleout_configs/blitz_pipeline_config_single_pod_ci.yaml

    # NOTE: check where the python3 is coming from
    echo "============= SP1 superpod: checking python3 location ============="
    which python3
    which tt-run

    PIPELINE_HOSTS=$(awk '{printf "%s:4,", $1}' /ci/ttrun/hostfile | sed 's/,$//')
    # todo)) add proper stress test that can run for 2 hours -- repeat batches?
    TT_METAL_ALLOCATOR_MODE_HYBRID=1 TT_METAL_SLOW_DISPATCH_MODE=1 python3 -m ttnn.distributed.ttrun \
      --tcp-interface ens5f0np0 \
      --mpi-args "--map-by rankfile:file=blitz_decode_pipeline_rank_file_single_pod_ci --bind-to hwt:overload-allowed --host $PIPELINE_HOSTS --tag-output" \
      --rank-binding blitz_decode_pipeline_rank_binding_single_pod_ci.yaml \
      python3 -m models.demos.deepseek_v3_b1.demo.cli \
        --max-new-tokens 128000 \
        --weights real \
        --cache-path /mnt/models/deepseek-ai/cache-2026-03-22 \
        --prompt "Solve this step by step: Design a cache for sharded LLM weights across multiple hosts with local NVMe and shared NFS. Minimize startup latency, avoid duplicate reads, support cache invalidation, and explain tradeoffs between per-host caches, content-addressable storage, and pre-sharded artifacts." \
        --model-path /mnt/models/deepseek-ai/DeepSeek-R1-0528-dequantized
  skus:
    bh_sp1:
      timeout: 50
  owner_id: U08E1JCMAJF
  team: scaleout
  sp_config: sp1

# ============================================================================
# BH SP4 Multihost Pipeline Tests (4 connected SP1 = 16 galaxies)
# ============================================================================

- name: "Teacher Forcing Test (DeepSeek V3 B1 Supercluster 16 aka Superpod 4)"
  cmd: |
    PIPELINE_HOSTS=$(awk '{printf "%s:4,", $1}' /ci/ttrun/hostfile | sed 's/,$//')
    echo "PIPELINE_HOSTS: $PIPELINE_HOSTS"

    echo "============= SP4 superpod: running generate_blitz_decode_pipeline_configs ============="
    python3 /ci/tt-metal/models/demos/deepseek_v3_b1/scaleout_configs/generate_blitz_decode_pipeline_configs.py \
      /ci/tt-metal/models/demos/deepseek_v3_b1/scaleout_configs/blitz_pipeline_config_superpod_ci.yaml

    echo "============= SP4 superpod: running tt-run ============="
    # NOTE: check where the python3 is coming from
    echo "============= SP4 superpod: checking which python3 ============="
    which python3
    which tt-run

    TT_METAL_ALLOCATOR_MODE_HYBRID=1 TT_METAL_SLOW_DISPATCH_MODE=1 python3 -m ttnn.distributed.ttrun \
      --tcp-interface ens5f0np0 \
      --mpi-args "--map-by rankfile:file=blitz_decode_pipeline_rank_file_superpod_ci --bind-to hwt:overload-allowed --host $PIPELINE_HOSTS --tag-output --wdir /home/user/tt-metal" \
      --rank-binding blitz_decode_pipeline_rank_binding_superpod_ci.yaml \
      python3 -m models.demos.deepseek_v3_b1.demo.teacher_forced \
        --weights real \
        --cache-path /mnt/models/deepseek-ai/cache-2026-03-22 \
        --model-path /mnt/models/deepseek-ai/DeepSeek-R1-0528-dequantized \
        --prompt "Solve this step by step: Design a cache for sharded LLM weights across multiple hosts with local NVMe and shared NFS. Minimize startup latency, avoid duplicate reads, support cache invalidation, and explain tradeoffs between per-host caches, content-addressable storage, and pre-sharded artifacts." \
        --reference-file /mnt/models/ref_data/output1_reference.txt \
        --output-file output1_teacher_forcing_results.json \
        --chunk-accuracy 256

    echo "============= SP4 superpod: jq output1_teacher_forcing_results.json ============="
    jq . output1_teacher_forcing_results.json
  skus:
    bh_sp4:
      timeout: 50
  owner_id: U08E1JCMAJF
  team: scaleout
  sp_config: sp4
