# This file defines the test matrix for the Release pipeline.
# These tests are specifically curated for release validation and are decoupled
# from other pipelines to ensure stability and independent control.

# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run.
#   skus: A mapping of SKU names to their configuration (each SKU has timeout in minutes).
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#   model-name: Optional model identifier for filtering via workflow_dispatch.

# For max allowed timeout refer to .github/time_budget.yaml

# ============================================================================
# Wormhole tier 1 release tests (from models_e2e_tests.yaml)
# ============================================================================

- name: Llama 3.1-8B e2e tests
  cmd: |
    export HF_MODEL=meta-llama/Llama-3.1-8B-Instruct TT_CACHE_PATH=/mnt/MLPerf/huggingface/tt_cache/meta-llama/Llama-3.1-8B-Instruct
    pytest --timeout 420 models/tt_transformers/demo/simple_text_demo.py -k "performance-ci-token-matching"
    pytest --timeout 600 models/tt_transformers/demo/simple_text_demo.py -k "performance-ci-eval-32"
  model-name: llama3.1-8b
  skus:
    wh_n150:
      timeout: 7
  owner_id: U03PUAKE719 # Miguel Tairum Cruz
  team: models

- name: Llama 3.1-8B data-parallel e2e tests (Galaxy)
  cmd: |
    export HF_MODEL=meta-llama/Llama-3.1-8B-Instruct TT_CACHE_PATH=/mnt/MLPerf/huggingface/tt_cache/meta-llama/Llama-3.1-8B-Instruct
    pytest models/tt_transformers/demo/simple_text_demo.py -k "performance-ci-b1-DP" --timeout 1000
  model-name: llama3.1-8b-dp-galaxy
  skus:
    wh_galaxy_release:
      timeout: 20
  owner_id: U08BH66EXAL # Radoica Draskic
  team: models

- name: Llama 3.3-70B e2e tests (Galaxy)
  cmd: |
    export TT_CACHE_HOME=/mnt/MLPerf/huggingface/tt_cache LLAMA_DIR=/mnt/MLPerf/tt_dnn-models/llama/Llama3.3-70B-Instruct/ FAKE_DEVICE=TG
    pytest --timeout 1000 models/demos/llama3_70b_galaxy/demo/text_demo.py -k "pcc-80L"
    pytest --timeout 1000 models/demos/llama3_70b_galaxy/demo/text_demo.py -k "repeat2"
  model-name: llama3.3-70b-galaxy
  skus:
    wh_galaxy_release:
      timeout: 30
  owner_id: U053W15B6JF # Djordje Ivanovic
  team: models

- name: Llama 3.3-70B data-parallel e2e tests (Galaxy)
