# P150 Single-card tests
- name: unet-shallow P150 performance
  cmd: |
    pytest -sv models/experimental/functional_unet/tests/test_unet_perf.py -k "test_unet_trace_perf and not test_unet_trace_perf_multi_device"
  skus:
    bh_p150_perf:
      timeout: 36
  owner_id: U06ECNVR0EN # Evan Smal
  team: models
  model-name: unet-shallow

- name: Llama 3.1-8B P150 performance
  cmd: |
    set -e
    export HF_HOME=/localdev/blackhole_demos/huggingface_data
    if [[ -d /localdev/blackhole_demos/huggingface_data/hub ]]; then
      export HF_HUB_CACHE=/localdev/blackhole_demos/huggingface_data/hub
    else
      export HF_HUB_CACHE=/mnt/MLPerf/huggingface/hub
    fi
    if [[ -d /localdev/blackhole_demos/huggingface_data/meta-llama/Llama-3.1-8B-Instruct ]]; then
      export HF_MODEL=/localdev/blackhole_demos/huggingface_data/meta-llama/Llama-3.1-8B-Instruct
    else
      export HF_MODEL=meta-llama/Llama-3.1-8B-Instruct
    fi
    export TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/tt_cache/meta-llama--Llama-3.1-8B-Instruct
    if [[ ! -d "${TT_CACHE_PATH}" ]]; then
      export TT_CACHE_PATH=/localdev/blackhole_demos/huggingface_data/meta-llama/Llama-3.1-8B-Instruct
    fi
    pytest models/tt_transformers/demo/simple_text_demo.py -k "performance and ci and not stress" --max_seq_len 131072
  skus:
    bh_p150_perf:
      timeout: 84
  owner_id: U03PUAKE719 # Miguel Tairum
  team: models
  model-name: llama3.1-8b

- name: Llama 3.1-8B P150 stress
  cmd: |
