# L2 nightly LLK unit test matrix — full gtest suite under slow dispatch.
#
# Merge-gate coverage lives in tests/pipeline_reorg/llk_merge_gate_tests.yaml.
#
# Each entry: name, cmd, skus, team, arch, dispatch_mode.
# For sd entries the impl prepends TT_METAL_SLOW_DISPATCH_MODE=1 at invocation time.
#
# For max allowed timeout refer to .github/time_budget.yaml (llk / unit).

# Re-validates everything the merge-gate FD shards cover plus FD-only fixtures, but in
# slow dispatch. Tracking issue for the one exclusion: #45483.
- name: LLK SD wormhole (full suite, nightly)
  cmd: ./build/test/tt_metal/unit_tests_llk --gtest_filter='-MeshDeviceFixture.Top32RmDevPipelineCompletes'
  skus:
    wh_n150_civ2:
      timeout: 40
    wh_n300_civ2:
      timeout: 40
  team: llk
  arch: wormhole_b0
  dispatch_mode: sd

- name: LLK SD blackhole (full suite, nightly)
  cmd: ./build/test/tt_metal/unit_tests_llk --gtest_filter='-MeshDeviceFixture.Top32RmDevPipelineCompletes'
  skus:
    bh_p150b_civ2_viommu:
      timeout: 40
    bh_p100:
      timeout: 40
  team: llk
  arch: blackhole
  dispatch_mode: sd
