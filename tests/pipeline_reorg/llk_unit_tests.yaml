# --- Merge-gate + nightly: SD-only / Quasar slice ---
- name: LLK SD wormhole (Quasar slice)
  cmd: ./build/test/tt_metal/unit_tests_llk --gtest_filter='LLKMeshDeviceFixtureSlowDispatchOnly.*:LLKQuasarMeshDeviceSingleCardFixture.*:QuasarMeshDeviceSingleCardFixture.*'
  skus:
    wh_n150_civ2:
      timeout: 40
  team: llk
  arch: wormhole_b0
  dispatch_mode: sd

- name: LLK SD blackhole (Quasar slice)
  cmd: ./build/test/tt_metal/unit_tests_llk --gtest_filter='LLKMeshDeviceFixtureSlowDispatchOnly.*:LLKBlackholeSingleCardFixture.*:*MulReduceScalarTest*:LLKQuasarMeshDeviceSingleCardFixture.*:QuasarMeshDeviceSingleCardFixture.*-LLKBlackholeSingleCardFixture.TensixComputeUnpackTilizeFp8e4m3:LLKBlackholeSingleCardFixture.TensixComputePackUntilizeFp8e4m3:LLKBlackholeSingleCardFixture.TensixFp8e4m3ToFp8e4m3'
  skus:
    bh_p150b_civ2_viommu:
      timeout: 40
    bh_p150b_civ2_viommu_prio:
      timeout: 40
  team: llk
  arch: blackhole
  dispatch_mode: sd

# --- Nightly-only: full LLK gtest suite under SD on every supported SKU ---
# Re-validates everything the FD shards cover plus FD-only fixtures, but in
# slow dispatch. Tracking issue for the one exclusion: #45483.
- name: LLK SD wormhole (full suite, nightly)
  cmd: ./build/test/tt_metal/unit_tests_llk --gtest_filter='-MeshDeviceFixture.Top32RmDevPipelineCompletes'
  skus:
    wh_n150_civ2:
      timeout: 40
    wh_n300_civ2:
      timeout: 40
  team: llk
  arch: wormhole_b0
  dispatch_mode: sd
  l2_only: true

- name: LLK SD blackhole (full suite, nightly)
  cmd: ./build/test/tt_metal/unit_tests_llk --gtest_filter='-MeshDeviceFixture.Top32RmDevPipelineCompletes'
  skus:
    bh_p150b_civ2:
      timeout: 40
    bh_p100:
      timeout: 40
  team: llk
  arch: blackhole
  dispatch_mode: sd
  l2_only: true
