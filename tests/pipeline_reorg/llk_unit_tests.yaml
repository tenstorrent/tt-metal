# This file defines the test matrix for LLK unit tests.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run. For sd entries the impl prepends
#        TT_METAL_SLOW_DISPATCH_MODE=1 at invocation time; do not bake it
#        into the cmd.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   team: The team that owns the test budget.
#   arch: Architecture string (wormhole_b0 or blackhole).
#   dispatch_mode: "fd" for fast dispatch, "sd" for slow dispatch. The impl sets
#                  TT_METAL_SLOW_DISPATCH_MODE=1 when dispatch_mode == "sd".
#   gtest_shard_total / gtest_shard_index: Optional sharding via GTEST_TOTAL_SHARDS
#                  and GTEST_SHARD_INDEX env vars.
#   l2_only: Optional bool. When true, only callers passing l2-only=true
#            (i.e. the tt metal L2 pipeline) will pick up this entry.
#            Merge-gate skips it.
#
# For max allowed timeout refer to .github/time_budget.yaml

# --- Merge-gate + nightly: FD shards (full LLK gtest suite) ---
- name: LLK FD wormhole
  cmd: ./build/test/tt_metal/unit_tests_llk --gtest_filter='*'
  skus:
    wh_n150_civ2:
      timeout: 25
  team: llk
  arch: wormhole_b0
  dispatch_mode: fd
  gtest_shard_total: 4
  gtest_shard_index: 0

- name: LLK FD wormhole
  cmd: ./build/test/tt_metal/unit_tests_llk --gtest_filter='*'
  skus:
    wh_n150_civ2:
      timeout: 25
  team: llk
  arch: wormhole_b0
  dispatch_mode: fd
  gtest_shard_total: 4
  gtest_shard_index: 1

