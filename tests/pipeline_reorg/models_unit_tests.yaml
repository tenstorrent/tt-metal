# Gemma-4 unit tests: one entry per model variant, multiple SKUs per entry.
# parametrize_mesh_with_fabric() picks the largest mesh shape that fits on each
# runner when CI=true is set, so the same `pytest` invocation runs 1x1 on N150,
# 1x2 on N300, 1x8 on T3K — no per-SKU `-k` filter needed.

- name: Gemma-4-E2B unit tests
  cmd: |
    uv pip install -r models/demos/gemma4/requirements.txt
    export HF_MODEL=models/demos/gemma4/configs/gemma-4-E2B-it
    # test_lm_head, test_packed_verify (spec-decode packed verify, #46755) and
    # test_model::test_full_model load real weights via
    # AutoModelForCausalLM.from_pretrained — they run in the e2e job instead
    # so the unit suite can stay weight-free and self-contained on the
    # checked-in config.json.
    # test_bridge_* in test_vllm_parity.py import generator_vllm which needs
    # the vllm package; vllm is not installed in this CI image, so skip them
    # here (they still run in environments that have vllm).
    # CI-burden reduction, following #45818 (Gemma-4 reduce CI burden): the
    # heavy full-model-build + device-trace tests added *after* that PR by #45355
    # (prefill device trace + batched prefill) time out the larger variants on
    # constrained runners (e.g. 26B/31B on wh_llmbox), so the whole
    # test_prefill_trace_* and test_batched_prefill_perf files are ignored here.
    # test_full_model_parity_* (vLLM full-model parity decode loops, from #44265)
    # is likewise deselected. The tier-1 promotion of 26B/31B/12B is intentionally
    # kept — only the heavy test cases are removed, not the tiers.
    # The on-device batched-decode sampling tests (test_sampling_greedy_batch32 /
    # _top_k_constrained / _top_p_constrained / _log_probs_pcc in test_sampling.py)
    # are excluded via "not test_sampling_": each is parametrized across multi-chip
    # meshes (1x4/1x8) and the per-test multi-device mesh setup/teardown is slow on
    # constrained runners. They are validated locally on 1x4/1x8 (issue #44953).
    # The cheap pure-Python test_gemma4_make_sampling_args_* regression (no device)
    # does not match "test_sampling_" and is intentionally still run.
    pytest --timeout 600 \
      --ignore=models/demos/gemma4/tests/unit/test_lm_head.py \
      --ignore=models/demos/gemma4/tests/unit/test_prefill_trace_parity.py \
      --ignore=models/demos/gemma4/tests/unit/test_prefill_trace_perf.py \
      --ignore=models/demos/gemma4/tests/unit/test_prefill_trace_tracy_csv.py \
      --ignore=models/demos/gemma4/tests/unit/test_batched_prefill_perf.py \
      --ignore=models/demos/gemma4/tests/unit/test_packed_verify.py \
      --deselect models/demos/gemma4/tests/unit/test_model.py::test_full_model \
      -k "not test_bridge_ and not test_full_model_parity and not test_attention_decode_paged_batched and not test_sampling_" \
      models/demos/gemma4/tests/unit/
  model: gemma-4-e2b
  skus:
    wh_n150:
      timeout: 10
      tier: 3
    bh_p150:
      timeout: 10
      tier: 3
  owner_id: U088413NP0Q # Ashai Reddy
  team: models

