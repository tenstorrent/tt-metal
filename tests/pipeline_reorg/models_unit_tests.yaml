# GPT-OSS unit tests: uses HF config only (no weights). parametrize_mesh_with_fabric()
# picks the largest fitting mesh shape per SKU when CI=true, so one yaml entry
# covers N150 (1x1), T3K/llmbox (1x8), and Galaxy (4x8) without per-SKU -k filters.
- name: GPT-OSS 20B unit tests
  cmd: |
    export HF_MODEL=models/demos/gpt_oss/configs/gpt-oss-20b
    pytest --timeout 600 models/demos/gpt_oss/tests/unit/
  model: gpt-oss-20b
  skus:
    # Wormhole
    wh_llmbox:
      timeout: 12
      tier: 2
    # Blackhole
    bh_p150:
      timeout: 10
      tier: 2
    bh_quietbox_2:
      timeout: 5
      tier: 2
  owner_id: U08TJ70UFRT # Harry Andrews
  team: models

- name: GPT-OSS 120B unit tests
  cmd: |
    export HF_MODEL=models/demos/gpt_oss/configs/gpt-oss-120b TT_MM_THROTTLE_PERF=2
    # Tensor cache is pre-built on the NAS — skip loading model weights by default.
    # Check mlperf-write-access in the workflow to load weights and regenerate the cache.
    SKIP_MODEL_LOAD="--skip-model-load"
    [ "${MLPERF_READ_ONLY:-true}" = "false" ] && SKIP_MODEL_LOAD=""
    pytest --timeout 1500 models/demos/gpt_oss/tests/unit $SKIP_MODEL_LOAD
  model: gpt-oss-120b
  skus:
    # Wormhole
    wh_llmbox:
      timeout: 25
      tier: 1
    wh_galaxy:
      timeout: 40
      tier: 1
    # Blackhole
    bh_quietbox_2:
      # 10 min was too tight: the suite runs to ~12 min and got wall-clock
      # killed mid-"Full MLP Pipeline" on the prefill_4096 test_decoder while
      # all components were still passing (PCC 0.96-0.99). 15 also proved too
      # tight on slower hosts (07-06: killed at the 15-min limit having done 52
      # of ~64 tests on p03t05, vs 11.4 min for the full 64 on p02t07 — host
      # variance, not a hang; firmware pre-compiled, all sub-tests pass). Bump to
      # 22; suite is long (test_rope seq sweep to 131k) and may want sharding.
      timeout: 22
      tier: 1
    bh_galaxy:
      timeout: 10
      tier: 1
  owner_id: U08TJ70UFRT # Harry Andrews
  team: models

