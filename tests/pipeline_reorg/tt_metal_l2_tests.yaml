# Test matrix for the L2 nightly pipeline — non-ttnn-team residual entries.
#
# After the ttnn-team reorg, the 22 ttnn ops entries that used to live here
# moved to ops_unit_tests.yaml / ops_integration_tests.yaml /
# ttnn_integration_tests.yaml / tt_cnn_unit_tests.yaml. The ttsim
# compute-fused entry moved to ttsim_unit_tests.yaml. This file retains the
# models (sdxl) entries that still need an l2-budgeted home
# until those teams reorg their own buckets.
#
# Each entry represents a parallel job with the following keys:
#   name: The display name for the job in GitHub Actions.
#   cmd: The exact command to run for the test.
#   skus: A mapping of SKU names to their configuration.
#     Each SKU entry contains:
#       timeout: The maximum allowed runtime for this job in minutes on that SKU.
#   owner_id: The Slack user ID to notify on failure.
#   team: The team that owns the test.
#   category: Selector used by tt-metal-l2-nightly.yaml's additional_test_categories
#     dispatch input. On dispatch the impl filters this matrix to entries whose
#     category appears in the comma-separated list; on schedule the filter is
#     bypassed and every entry runs.
#
# For max allowed timeout refer to .github/time_budget.yaml.

# =============================================================================
# Model demos
# =============================================================================

- name: ttnn nightly sdxl tests (wormhole)
  cmd: |
    pytest models/demos/stable_diffusion_xl_base/tests/pcc/test_unet_loop.py --loop-iter-num=50 -xv -m "not disable_fast_runtime_mode" --timeout=600
    pytest models/demos/stable_diffusion_xl_base/refiner/tests/pcc/test_unet_loop.py --loop-iter-num=50 -xv -m "not disable_fast_runtime_mode" --timeout=600
    pytest models/demos/stable_diffusion_xl_base/lora/tests/test_lora_rollback.py -xv -m "not disable_fast_runtime_mode" --timeout=600
  skus:
    wh_n150_civ2:
      timeout: 90
    wh_n300_civ2:
      timeout: 90
  owner_id: U0837MYG788 # Marko Radosavljevic
  team: models
  category: sdxl

- name: ttnn nightly sdxl tests (blackhole P150b)
  cmd: |
    pytest models/demos/stable_diffusion_xl_base/tests/pcc/test_unet_loop.py --loop-iter-num=50 -xv -m "not disable_fast_runtime_mode" --timeout=600
    pytest models/demos/stable_diffusion_xl_base/refiner/tests/pcc/test_unet_loop.py --loop-iter-num=50 -xv -m "not disable_fast_runtime_mode" --timeout=600
  skus:
    bh_p150b_civ2:
      timeout: 70
  owner_id: U0837MYG788 # Marko Radosavljevic
  team: models
  category: sdxl

- name: ttnn nightly sdxl demo cfg parallel test (N300)
  cmd: 'pytest models/demos/stable_diffusion_xl_base/demo/demo.py -k "device_vae and device_encoders and with_trace and use_cfg_parallel" --timeout=600'
  skus:
    wh_n300_civ2:
      timeout: 25
  owner_id: U0837MYG788 # Marko Radosavljevic
  team: models
  category: sdxl
