# Prefill overlay: single 4×4 BH logical mesh (big mesh); two local ranks share mesh_id 0 with host ranks 0 and 1.
# TT_VISIBLE_DEVICES: logical chip IDs for BH Galaxy 2×4 cross-tray slices 0 and 1 (see PhysicalMappingGeneration.Generate2x4SliceToPCIeDeviceMapping + bh_6u_cluster_desc.yaml UBB tray/ASIC layout).
# Mesh graph differs from sub-context 1 (decode uses dual 2×4 + intermesh); tt-run sets TT_MESH_GRAPH_DESC_PATH per rank.
# Referenced from mock_galaxy_single_host_subcontext_rank_bindings_mapping.yaml (sub-context 0).
rank_bindings:
  - rank: 0
    mesh_id: 0
    mesh_host_rank: 0
    env_overrides:
      # slice 0
      TT_VISIBLE_DEVICES: 11,13,17,23,24,26,27,29
  - rank: 1
    mesh_id: 0
    mesh_host_rank: 1
    env_overrides:
      # slice 1
      TT_VISIBLE_DEVICES: 1,5,9,12,16,19,20,22
mesh_graph_desc_path: "tests/tt_metal/tt_fabric/custom_mesh_descriptors/bh_galaxy_single_4x4_mesh.textproto"
