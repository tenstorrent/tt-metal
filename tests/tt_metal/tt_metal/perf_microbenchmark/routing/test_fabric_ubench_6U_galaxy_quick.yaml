allocation_policies:
    receiver:
      max_configs_per_core: 4

Tests:
  - name: "LinearMulticast"
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: Linear
      num_links: 4

    defaults:
      ftype: mcast
      ntype: unicast_write
      num_packets: 20000
      size: 4096

    patterns:
      - type: all_to_all
        iterations: 3

  - name: "FullRingMulticast"
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: Ring
      num_links: 4

    defaults:
      ftype: mcast
      ntype: unicast_write
      num_packets: 100000
      size: 4096

    patterns:
      - type: full_ring
        iterations: 3

  - name: "MeshMulticast"
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: Mesh
      num_links: 4

    defaults:
      ftype: mcast
      ntype: unicast_write
      num_packets: 20000
      size: 4096

    patterns:
      - type: all_to_all
        iterations: 3

  - name: "TorusAllToAllMulticast"
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: Torus
      torus_config: XY
      num_links: 4

    defaults:
      ftype: mcast
      ntype: unicast_write
      num_packets: 20000
      size: 4096

    patterns:
      - type: all_to_all

  - name: "NeighborExchangeLinear"
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: Linear

    parametrization_params:
      num_links: [1, 2, 3, 4]
      ntype: [unicast_write, fused_atomic_inc, unicast_scatter_write]
      size: [4096]

    defaults:
      ftype: unicast
      num_packets: 20000

    patterns:
      - type: neighbor_exchange
        iterations: 3

  - name: "NeighborExchangeUnicast"
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: NeighborExchange

    parametrization_params:
      num_links: [1, 2, 3, 4]
      ntype: [unicast_write, fused_atomic_inc, unicast_scatter_write]
      size: [2048, 4096]

    defaults:
      ftype: unicast
      num_packets: 100000

    patterns:
      - type: neighbor_exchange
