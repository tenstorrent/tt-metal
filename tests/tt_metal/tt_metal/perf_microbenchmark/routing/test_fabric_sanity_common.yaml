Tests:
  - name: "SimpleUnicastWriteLinear"
    sync: true
    fabric_setup:
      topology: Linear

    senders:
      - device: [0, 0]
        patterns:
          - ftype: unicast
            ntype: unicast_write
            size: 1024
            num_packets: 10
            destination:
              device: [0, 1]

  - name: "TestNocSendTypesLinear"
    sync: true
    fabric_setup:
      topology: Linear


    senders:
      - device: [0, 0]
        patterns:
          - ftype: unicast
            size: 1024
            num_packets: 10
            destination:
              device: [0, 1]

  - name: "TestPacketSizesLinear"
    sync: true
    fabric_setup:
      topology: Linear


    senders:
      - device: [0, 0]
        patterns:
          - ftype: unicast
            ntype: unicast_write
            num_packets: 10
            destination:
              device: [0, 1]

  - name: "AllToAllUnicastWriteLinear"
    sync: true
    fabric_setup:
      topology: Linear

    defaults:
      ftype: unicast
      ntype: unicast_write
      size: 1024
      num_packets: 10

    patterns:
      - type: all_to_all

  - name: "AllToAllUnicastTestNocSendTypesLinear"
    sync: true
    fabric_setup:
      topology: Linear


    defaults:
      ftype: unicast
      size: 1024
      num_packets: 10

    patterns:
      - type: all_to_all

  - name: "AllToAllMulticastLinear"
    sync: true
    fabric_setup:
      topology: Linear

    defaults:
      ftype: mcast
      ntype: unicast_write
      size: 1024
      num_packets: 10

    patterns:
      - type: all_to_all

  - name: "UnidirectionalMulticastLinear"
    sync: true
    fabric_setup:
      topology: Linear

    defaults:
      ftype: mcast
      ntype: unicast_write
      size: 1024
      num_packets: 10

    patterns:
      - type: unidirectional_linear

  - name: "FullDevicePairingLinear"
    sync: true
    fabric_setup:
      topology: Linear

    defaults:
      ftype: unicast
      ntype: unicast_write
      size: 1024
      num_packets: 10

    patterns:
      - type: full_device_random_pairing
        iterations: 5

  - name: AllToAllTestPacketSizesLinear
    sync: true
    fabric_setup:
      topology: Linear


    defaults:
      ftype: unicast
      ntype: unicast_write
      size: 1024
      num_packets: 10

    patterns:
      - type: all_to_all

  - name: "FlowControlAllToAllLinear"
    sync: true
    enable_flow_control: true
    fabric_setup:
      topology: Linear


    defaults:
      num_packets: 10

    patterns:
      - type: all_to_all

  - name: "SimpleUnicastMesh"
    fabric_setup:
      topology: Mesh

    senders:
      - device: [0, 0]
        patterns:
          - ftype: unicast
            ntype: unicast_write
            size: 1024
            num_packets: 10
            destination:
              device: [0, 1]

  - name: "TestNocSendTypesMesh"
    fabric_setup:
      topology: Mesh


    senders:
      - device: [0, 0]
        patterns:
          - ftype: unicast
            size: 1024
            num_packets: 10
            destination:
              device: [0, 1]

  - name: "AllToAllUnicastMesh"
    fabric_setup:
      topology: Mesh

    defaults:
      ftype: unicast
      ntype: unicast_write
      size: 1024
      num_packets: 10

    patterns:
      - type: all_to_all

