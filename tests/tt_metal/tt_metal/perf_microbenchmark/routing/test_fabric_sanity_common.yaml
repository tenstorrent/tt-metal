  - name: "SequentialNeighborExchangeLatency"
    latency_test_mode: true

    fabric_setup:
      topology: Linear


    defaults:
      ftype: unicast
      num_packets: 10

    patterns:
      - type: sequential_neighbor_exchange

  - name: "SimpleNOCSelect"
    fabric_setup:
      topology: Linear

    defaults:
      size: 1024
      ftype: unicast
      ntype: unicast_write
      num_packets: 10

    senders:
      - noc_id: 0
        device: [0, 0]
        patterns:
          - destination:
              device: [0, 1]

      - noc_id: 1
        device: [0, 0]
        patterns:
          - destination:
              device: [0, 1]



