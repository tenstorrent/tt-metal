# Dual Galaxy Fabric Stress Testing
# Unidirectional stress tests for 64-chip dual Galaxy systems (Mesh 0 -> Mesh 1)
# Tests various traffic patterns under sustained load without deadlock

allocation_policies:
    receiver:
      max_configs_per_core: 2

Tests:
  # ======================================================================================
  # Test 1: Comprehensive Unicast Stress - Single sender with full parametrization
  # ======================================================================================
  - name: "DualGalaxyUnicastStress"
    fabric_setup:
      topology: Mesh
      routing_type: Dynamic
      mesh_descriptor_path: "tests/tt_metal/tt_fabric/custom_mesh_descriptors/dual_galaxy_big_mesh_mgd.yaml"

    top_level_iterations: 3

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc]
      size: [32, 64, 128]
      num_packets: [5000, 10000]

    defaults:
      ftype: unicast

    senders:
      - device: [0, [0, 0]]
        patterns:
          - destination:
              device: [1, [7, 3]]

  # ======================================================================================
  # Test 2: Multiple Concurrent Senders - Unidirectional
  # ======================================================================================
  - name: "DualGalaxyMultipleSenders"
    fabric_setup:
      topology: Mesh
      routing_type: Dynamic
      mesh_descriptor_path: "tests/tt_metal/tt_fabric/custom_mesh_descriptors/dual_galaxy_big_mesh_mgd.yaml"

    top_level_iterations: 3

    defaults:
      ftype: unicast
      ntype: unicast_write
      size: 64
      num_packets: 8000

    senders:
      - device: [0, [0, 0]]
        patterns:
          - destination:
              device: [1, [0, 0]]
      - device: [0, [3, 1]]
        patterns:
          - destination:
              device: [1, [3, 1]]
      - device: [0, [7, 3]]
        patterns:
          - destination:
              device: [1, [7, 3]]

  # ======================================================================================
  # Test 3: Multicast Stress - One-to-many unidirectional
  # ======================================================================================
  - name: "DualGalaxyMulticastStress"
    fabric_setup:
      topology: Mesh
      routing_type: Dynamic
      mesh_descriptor_path: "tests/tt_metal/tt_fabric/custom_mesh_descriptors/dual_galaxy_big_mesh_mgd.yaml"

    top_level_iterations: 3

    parametrization_params:
      size: [64, 128]

    defaults:
      ftype: mcast
      ntype: unicast_write
      num_packets: 5000

    senders:
      - device: [0, [0, 0]]
        patterns:
          - destination:
              device: [1, [0, 0]]
          - destination:
              device: [1, [3, 1]]
          - destination:
              device: [1, [7, 3]]

  # ======================================================================================
  # Test 4: Reverse Direction Unicast Stress - Mesh 1 to Mesh 0
  # ======================================================================================
  - name: "DualGalaxyReverseUnicastStress"
    fabric_setup:
      topology: Mesh
      routing_type: Dynamic
      mesh_descriptor_path: "tests/tt_metal/tt_fabric/custom_mesh_descriptors/dual_galaxy_big_mesh_mgd.yaml"

    top_level_iterations: 3

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc]
      size: [32, 64, 128]
      num_packets: [5000, 10000]

    defaults:
      ftype: unicast

    senders:
      - device: [1, [7, 3]]
        patterns:
          - destination:
              device: [0, [0, 0]]
