
Tests:

  - name: "MeshNeighborExchange"
    sync: true
    fabric_setup:
      topology: Mesh

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]

    defaults:
      ftype: unicast
      size: 32
      num_packets: 1000

    patterns:
      - type: neighbor_exchange

  - name: "FlowControlMeshNeighborExchange"
    enable_flow_control: true
    sync: true
    fabric_setup:
      topology: Mesh

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]
      size: [1024, 2048, 4096]

    defaults:
      ftype: unicast
      num_packets: 1000

    patterns:
      - type: neighbor_exchange

  # Cross-mesh all-to-all (adjacent-mesh destinations), retained from the
  # original multi-mesh sanity coverage.
  - name: "MultiMeshAllToAll"
    sync: true
    fabric_setup:
      topology: Mesh

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]
      size: [1024, 2048, 4096]

    defaults:
      ftype: unicast
      num_packets: 100

    patterns:
      - type: all_to_all
