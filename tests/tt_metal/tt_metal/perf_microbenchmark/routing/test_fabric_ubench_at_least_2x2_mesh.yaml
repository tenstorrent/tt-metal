allocation_policies:
    receiver:
      max_configs_per_core: 4

Tests:
  ### NEIGHBOR EXCHANGE BANDWIDTH TESTS ###
  - name: "NeighborExchangeUnicast"
    skip: [watcher]  # gh issue #38537
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: NeighborExchange

    parametrization_params:
      num_links: [1, 2, 3, 4]
      ntype: [unicast_write, fused_atomic_inc, unicast_scatter_write]
      size: [2048, 4096]

    defaults:
      ftype: unicast
      num_packets: 100000

    patterns:
      - type: neighbor_exchange

  ### LINEAR BANDWIDTH TESTS ###
  - name: "LinearMulticast"
    skip: [watcher]  # gh issue #38537
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: Linear

    parametrization_params:
      num_links: [1, 2, 3, 4]
      ntype: [unicast_write, fused_atomic_inc, unicast_scatter_write]
      size: [2048, 4096]

    defaults:
      ftype: mcast
      num_packets: 20000

    patterns:
      - type: all_to_all
        iterations: 3

  - name: "UnidirLinearMulticast"
    skip: [watcher]  # gh issue #38537
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: Linear

    parametrization_params:
      num_links: [1, 2, 3, 4]
      ntype: [unicast_write, fused_atomic_inc, unicast_scatter_write]
      size: [2048, 4096]

    defaults:
      ftype: mcast
      num_packets: 20000

    patterns:
      - type: unidirectional_linear
        iterations: 3

  - name: "SingleSenderLinearUnicastAllDevices"
    skip: [watcher]  # gh issue #38537
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: Linear

    parametrization_params:
      num_links: [1, 2, 3, 4]
      ntype: [unicast_write, fused_atomic_inc, unicast_scatter_write]
      size: [2048, 4096]

    defaults:
      ftype: unicast
      num_packets: 20000

    patterns:
      - type: one_to_all
        iterations: 3

  - name: "NeighborExchangeLinear"
    skip: [watcher]  # gh issue #38537
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: Linear

    parametrization_params:
      num_links: [1, 2, 3, 4]
      ntype: [unicast_write, fused_atomic_inc, unicast_scatter_write]
      size: [4096]

    defaults:
      ftype: unicast
      num_packets: 20000

    patterns:
      - type: neighbor_exchange
        iterations: 3

  ### LINEAR LATENCY TESTS ###
  - name: "LatencyLinearUnicast"
    skip: [watcher]  # gh issue #38537
    latency_test_mode: true
    fabric_setup:
      topology: Linear

    parametrization_params:
      size: [16, 4096]
      ntype: [unicast_write, fused_atomic_inc]

    senders:
      - device: [0, 0]
        patterns:
          - ftype: unicast
            num_packets: 256  # number of independent latency samples to collect
            destination:
              device: [0, 1]

  ### RING BANDWIDTH TESTS ###
  # Full Ring Multicast and Unicast tests have more variation in bandwidth, so we run them for extra iterations
  - name: "FullRingMulticast"
    skip: [watcher] # Watcher waits mess up ethernet communication
    benchmark_mode: true
    sync: true
    fabric_setup:
      topology: Ring

    parametrization_params:
      num_links: [1, 2, 3, 4]
      ntype: [unicast_write, fused_atomic_inc, unicast_scatter_write]
      size: [2048, 4096]

    defaults:
