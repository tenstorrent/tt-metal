allocation_policies:
    receiver:
      max_configs_per_core: 1

Tests:
  - name: "LinearNeighborExchange"
    fabric_setup:
      topology: Linear

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]

    defaults:
      ftype: unicast
      size: 32
      num_packets: 30000

    patterns:
      - type: neighbor_exchange

  - name: "FlowControlLinearNeighborExchange"
    enable_flow_control: true
    fabric_setup:
      topology: Linear

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]
      size: [1024, 2048, 4096]

    defaults:
      ftype: unicast
      num_packets: 1000000

    patterns:
      - type: neighbor_exchange

  - name: "MeshNeighborExchange"
    fabric_setup:
      topology: Mesh

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]

    defaults:
      ftype: unicast
      size: 32
      num_packets: 30000

    patterns:
      - type: neighbor_exchange

  - name: "FlowControlMeshNeighborExchange"
    enable_flow_control: true
    fabric_setup:
      topology: Mesh

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]
      size: [1024, 2048, 4096]

    defaults:
      ftype: unicast
      num_packets: 1000000

    patterns:
      - type: neighbor_exchange
