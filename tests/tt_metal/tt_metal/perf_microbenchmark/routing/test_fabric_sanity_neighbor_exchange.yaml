allocation_policies:
    receiver:
      max_configs_per_core: 1

Tests:

  - name: "LinearSequentialNeighborExchange"
    fabric_setup:
      topology: Linear

    parametrization_params:
      num_links: [1, 2]

    defaults:
      ftype: unicast
      ntype: unicast_write
      size: 32
      num_packets: 1000

    patterns:
      - type: sequential_neighbor_exchange

  - name: "RingSequentialNeighborExchange"
    fabric_setup:
      topology: Ring

    parametrization_params:
      num_links: [1, 2]

    defaults:
      ftype: unicast
      ntype: unicast_write
      size: 32
      num_packets: 1000

    patterns:
      - type: sequential_neighbor_exchange

  - name: "MeshSequentialNeighborExchange"
    fabric_setup:
      topology: Mesh

    parametrization_params:
      num_links: [1, 2]

    defaults:
      ftype: unicast
      ntype: unicast_write
      size: 32
      num_packets: 1000

    patterns:
      - type: sequential_neighbor_exchange

  - name: "2DTorusXYSequentialNeighborExchange"
    fabric_setup:
      topology: Torus
      torus_config: XY

    parametrization_params:
      num_links: [1, 2]

    defaults:
      ftype: unicast
      ntype: unicast_write
      size: 32
      num_packets: 1000

    patterns:
      - type: sequential_neighbor_exchange

  - name: "LinearNeighborExchange"
    fabric_setup:
      topology: Linear

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]

    defaults:
      ftype: unicast
      size: 32
      num_packets: 30000

    patterns:
      - type: neighbor_exchange

  - name: "FlowControlLinearNeighborExchange"
    enable_flow_control: true
    fabric_setup:
      topology: Linear

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]
      size: [1024, 2048, 4096]

    defaults:
      ftype: unicast
      num_packets: 1000000

    patterns:
      - type: neighbor_exchange

  - name: "RingNeighborExchange"
    fabric_setup:
      topology: Ring

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]

    defaults:
      ftype: unicast
      size: 32
      num_packets: 30000

    patterns:
      - type: neighbor_exchange

  - name: "MeshNeighborExchange"
    fabric_setup:
      topology: Mesh

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]

    defaults:
      ftype: unicast
      size: 32
      num_packets: 30000

    patterns:
      - type: neighbor_exchange

  - name: "FlowControlMeshNeighborExchange"
    enable_flow_control: true
    fabric_setup:
      topology: Mesh

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]
      size: [1024, 2048, 4096]

    defaults:
      ftype: unicast
      num_packets: 1000000

    patterns:
      - type: neighbor_exchange

  - name: "2DTorusXYNeighborExchange"
    fabric_setup:
      topology: Torus
      torus_config: XY

    parametrization_params:
      ntype: [unicast_write, atomic_inc, fused_atomic_inc, unicast_scatter_write]
      num_links: [1, 2]

    defaults:
      ftype: unicast
      size: 32
      num_packets: 30000

    patterns:
      - type: neighbor_exchange
