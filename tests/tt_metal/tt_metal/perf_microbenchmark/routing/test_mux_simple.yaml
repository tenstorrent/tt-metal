Tests:
  - name: "mux_simple_p2p"
    sync: true
    fabric_setup:
      topology: Linear
      enable_mux: true

    senders:
      - device: [0, 0]
        patterns:
          - ftype: unicast
            ntype: unicast_write
            size: 512
            num_packets: 10
            destination:
              device: [0, 1]

  - name: "mux_simple_comparison"
    sync: true
    fabric_setup:
      topology: Linear
      enable_mux: false

    senders:
      - device: [0, 0]
        patterns:
          - ftype: unicast
            ntype: unicast_write
            size: 512
            num_packets: 10
            destination:
              device: [0, 1]
