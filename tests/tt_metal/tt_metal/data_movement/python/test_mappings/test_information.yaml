# Data Movement Test Information
#
# This file contains metadata for all data movement tests including:
# - name: Human-readable test name
# - directory: Folder name where the test is located
# - web_viewer_name: (optional) Short UI label for the web viewer; presence means the test is displayed
# - comment: (optional) Additional notes about test behavior and performance
#
# Required fields for packet sizes tests:
#   - memory_type: Memory type being accessed
#       Values: "l1" | "dram"
#   - mechanism: How data is transmitted over NOC
#       Values: "unicast" | "multicast"
#   - pattern: Communication pattern between cores
#       Values: "one_to_one" | "one_from_one" | "one_to_all" | "one_from_all" | "all_to_all" | "all_from_all"
#
# Bandwidth calculation mode:
#   - bandwidth_mode: How bandwidth is calculated and reported
#       Values: "per_core" (default) | "combined"
#       - "per_core": Reports median/average bandwidth per individual core
#       - "combined": Reports aggregate bandwidth across all cores
#           combined_bandwidth = total_bytes / wall_clock_time
#           where wall_clock_time = max(duration) across all cores
#           Use this for multi-core DRAM tests where cores are synchronized
#
# Bandwidth unit:
#   - bandwidth_unit: Unit for bandwidth in plots and reports
#       Values: "bpc" (default) | "gbps"
#       - "bpc": bytes/cycle
#       - "gbps": GB/s (requires clock frequency from device or fallback constant)
#
# These metadata fields are automatically injected into CSV files when using the --report flag.

