      num_links: [1, 2]

    defaults:
      ftype: unicast
      size: 32
      num_packets: 30000

    patterns:
      - type: neighbor_exchange
        mesh_scope: intra_mesh

  - name: "MultiMeshNeighborExchangeInter"
