profiles:
  wormhole_n150_host:
    host_match:
      board_type: wormhole
      device_series: n150
      card_count: 1
    can_run:
      hardware_groups:
        - { board_type: wormhole, device_series: n150, card_count: 1 }
        - { board_type: wormhole, device_series: n300, card_count: 1 }
      mesh_shapes:
        - [1, 1]

  wormhole_n300_1c_host:
