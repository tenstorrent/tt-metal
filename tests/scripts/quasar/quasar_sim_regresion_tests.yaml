# Quasar emulator regression tests
#
# Structure:
#   <group>:            Binary name under build/test/tt_metal/
#     - filter: <glob>  GTest filter pattern
#       config: <NxM>   Simulator grid config (maps to emu-quasar-<config>). Supports 1x3 and 2x3 and 2x3_DISPATCH
#       env:            (optional) Extra environment variables as key: value pairs
#
# Example test entry
#
# unit_tests_legacy:
#   - filter: "*SingleDmL1Write*"
#     config: 1x3
#     env:
#       TT_METAL_SOMETHING: 1

unit_tests_legacy:
  - filter: "*DmLoopback*"
    config: 1x3

  - filter: "*QuasarComputeKernelMultipleThread*"
    config: 1x3

  - filter: "*MultiDmAddTwoInts*"
    config: 2x3

  - filter: "*Bmm"
    config: 1x3
    env:
      TT_METAL_SLOW_DISPATCH_MODE: 1

#  - filter: "*SingleDmL1Write*"
#    config: 1x3

unit_tests_llk:
  - filter: "*SingleCoreSingleMeshDeviceSfpuParameterizedFixture*TensixSfpuCompute/10"
    config: 1x3
    env:
      TT_METAL_SLOW_DISPATCH_MODE: 1

unit_tests_api:
  - filter: "*TensixSingleCoreDirectDramReaderDatacopyWriter"
    config: 1x3
    env:
      TT_METAL_SLOW_DISPATCH_MODE: 1

  # TEMP(revert): forced failure to validate the RTL Sim CI check-output feature
  - filter: "RtlSimCheckOutput.DoesNotExist_ForcedFailure"
    config: 1x3
