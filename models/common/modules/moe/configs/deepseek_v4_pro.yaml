# deepseek_v4_pro
mesh_shape: [16, 8]
cluster_axis: 0
batch_per_device: 32
hidden_size: 7168
select_experts_k: 6
num_routed_experts: 384
num_shared_experts: 1
has_bias: false

# gate (routing front-end): n_group 1 = generalized op (ungrouped) / 8 = deepseek op (grouped top-8).
# deepseek-v4: ungrouped top-6 with the sqrtsoftplus score = sqrt(softplus(logit)) (applied externally
# via ttnn.sqrt(ttnn.softplus(.)), no in-kernel op) + score_correction_bias for selection, linear
# renormalization, scaled by 2.5. 384 experts → the op's 512-combine path (pad 384→512, two 256-blocks →
# global top-6), same combine path as kimi_k25.
n_group: 1
score_func: sqrtsoftplus
routed_scaling_factor: 2.5

# router matmul compute config: hidden=7168 is deep + tie-sensitive, needs HiFi2 + fp32 accumulation.
gate_matmul_compute:
  math_fidelity: HiFi2
  math_approx_mode: true
  fp32_dest_acc_en: true
  packer_l1_acc: true

# router matmul program config: tuned 2D-mcast blocking for the gate matmul (batch 32 × hidden 7168 @
# 7168 × 512 — N=384 experts padded to 512 for the 2-block combine). in0_block_w=32 divides K=224 tiles; out
# is 1×16 tiles → per_core_N=2 spreads N across 8 cores (needs storage grid x≥8; drop to per_core_N=4 if
# narrower). compute_with_storage_grid_size is device-derived (auto-filled). Omit to let ttnn auto-select.
gate_matmul_program_config:
  in0_block_w: 32
  out_subblock_h: 1
  out_subblock_w: 2
  out_block_h: 1
  out_block_w: 2
  per_core_M: 1
  per_core_N: 2
  transpose_mcast: false
  fused_activation: null

compute:
  intermediate_size: 3072
  activation_type: SILU

reduce:
  shared_expert_scale: 1.0

experts:
  expert_mapping: sequential
  shared_expert_ids_to_devices: fully_replicated
