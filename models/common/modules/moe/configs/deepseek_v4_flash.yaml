# deepseek_v4_flash
mesh_shape: [16, 8]
cluster_axis: 0
batch_per_device: 32
hidden_size: 4096
select_experts_k: 6
num_routed_experts: 256
num_shared_experts: 1
has_bias: false

# gate (routing front-end): n_group 1 = generalized op (ungrouped) / 8 = deepseek op (grouped top-8).
# deepseek-v4: ungrouped (1 group) top-6 with the sqrtsoftplus score = sqrt(softplus(logit)) (applied
# externally via ttnn.sqrt(ttnn.softplus(.)), no in-kernel op) + score_correction_bias for selection,
# linear renormalization, scaled by 1.5. 256 experts → single 256-face (no combine). Same gate as
# deepseek_v4_pro but 256 experts / scale 1.5 (pro is 384 / 2.5).
n_group: 1
score_func: sqrtsoftplus
routed_scaling_factor: 1.5

# router matmul compute config: hidden=4096 is deep enough to flip near-tied top-6 experts at the
# default (LoFi + bf16-accumulate) fidelity (cf. qwen3_235b), so use HiFi2 + fp32 accumulation.
gate_matmul_compute:
  math_fidelity: HiFi2
  math_approx_mode: true
  fp32_dest_acc_en: true
  packer_l1_acc: true

# router matmul program config: tuned 2D-mcast blocking for the gate matmul (batch 32 × hidden 4096 @
# 4096 × 256). in0_block_w=32 divides K=128 tiles; out is 1×8 tiles → per_core_M=1, per_core_N=2 (4 cores in
# N). compute_with_storage_grid_size is device-derived (auto-filled). Omit to let ttnn auto-select (slower).
gate_matmul_program_config:
  in0_block_w: 32
  out_subblock_h: 1
  out_subblock_w: 2
  out_block_h: 1
  out_block_w: 2
  per_core_M: 1
  per_core_N: 2
  transpose_mcast: false
  fused_activation: null

compute:
  intermediate_size: 2048
  activation_type: SILU

reduce:
  shared_expert_scale: 1.0

experts:
  expert_mapping: sequential
  shared_expert_ids_to_devices: fully_replicated
