# qwen35_397b
mesh_shape: [16, 8]
cluster_axis: 0
batch_per_device: 32
hidden_size: 4096
select_experts_k: 10
num_routed_experts: 512
num_shared_experts: 1
has_bias: false

# gate (routing front-end): n_group 1 = generalized op (ungrouped) / 8 = deepseek op (grouped top-8).
# Qwen3.5 397B = linear → softmax(all) → top-10 → renormalize, no bias, no scale. UNSUPPORTED by the kernel
# op (top-10 ∉ {4,6,8}, and 512 experts), so TTMoEGate takes the pure-ttnn FALLBACK (matmul → topk →
# softmax-over-selected; softmax moved to the end, ≡ softmax-front + renorm since Z cancels), scale 1.0.
n_group: 1
score_func: softmax
routed_scaling_factor: 1.0

# router matmul compute config: hidden=4096 is deep enough to flip near-tied top-k experts at the default
# (LoFi + bf16-accumulate) fidelity (cf. qwen3_235b), so use HiFi2 + fp32 accumulation (in the fallback matmul).
gate_matmul_compute:
  math_fidelity: HiFi2
  math_approx_mode: true
  fp32_dest_acc_en: true
  packer_l1_acc: true

# router matmul program config: tuned 2D-mcast blocking for the FALLBACK router matmul (batch 32 × hidden
# 4096 @ 4096 × 512 — N=512 UNpadded; the fallback runs ttnn.matmul → ttnn.topk, so this applies to that
# matmul). in0_block_w=32 divides K=128 tiles; out is 1×16 tiles → per_core_N=2 spreads N across 8 cores
# (needs storage grid x≥8; drop to per_core_N=4 if narrower). Grid auto-filled. Omit to let ttnn auto-select.
gate_matmul_program_config:
  in0_block_w: 32
  out_subblock_h: 1
  out_subblock_w: 2
  out_block_h: 1
  out_block_w: 2
  per_core_M: 1
  per_core_N: 2
  transpose_mcast: false
  fused_activation: null

compute:
  intermediate_size: 1024
  activation_type: SILU

reduce:
  shared_expert_scale: 1.0

experts:
  expert_mapping: sequential
  shared_expert_ids_to_devices: fully_replicated
