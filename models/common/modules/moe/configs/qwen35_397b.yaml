# qwen35_397b
mesh_shape: [16, 8]
cluster_axis: 0
batch_per_device: 32
hidden_size: 4096
select_experts_k: 10
num_routed_experts: 512
num_shared_experts: 1
has_bias: false

# gate (routing front-end): n_group 1 = generalized op (ungrouped) / 8 = deepseek op (grouped top-8).
# Qwen3.5 397B = linear → softmax(all) → top-10 → renormalize, no bias, no scale. UNSUPPORTED by the kernel
# op (top-10 ∉ {4,6,8}, and 512 experts), so TTMoEGate takes the pure-ttnn FALLBACK (matmul → softmax(all)
# → topk → linear renorm). softmax_position: pre puts the softmax over ALL experts UP FRONT — matching this
# model's definition directly and giving a numerically-stable exp (vs exp-over-selected raw logits); the
# linear renorm over the selected makes it mathematically ≡ softmax-over-selected, scale 1.0.
n_group: 1
score_func: softmax
softmax_position: pre
routed_scaling_factor: 1.0

compute:
  intermediate_size: 1024
  activation_type: SILU

reduce:
  shared_expert_scale: 1.0

experts:
  expert_mapping: sequential
  shared_expert_ids_to_devices: fully_replicated
