# kimi_k25
mesh_shape: [16, 8]
cluster_axis: 0
batch_per_device: 32
hidden_size: 7168
select_experts_k: 8
num_routed_experts: 384
num_shared_experts: 1
has_bias: false

# gate (routing front-end): n_group 1 = generalized op (ungrouped) / 8 = deepseek op (grouped top-8).
# Kimi-K2 is deepseek-arch but config.json has n_group=1 / topk_group=1 → the grouped path is a NO-OP
# (1 group, select 1 of 1 = all experts), i.e. UNGROUPED top-8 with sigmoid(logit)+score_correction_bias
# for selection, linear renormalization (norm_topk_prob), scaled by 2.827. 384 experts → 2-block combine.
n_group: 1
score_func: sigmoid
routed_scaling_factor: 2.827
# noaux_tc score-correction bias (e_score_correction_bias): added to the sigmoid scores for SELECTION only.
score_correction_bias: true

# router matmul compute config: hidden=7168 is deep + tie-sensitive, needs HiFi2 + fp32 accumulation.
gate_matmul_compute:
  math_fidelity: HiFi2
  math_approx_mode: true
  fp32_dest_acc_en: true
  packer_l1_acc: true

# router matmul program config: tuned 2D-mcast blocking for the gate matmul (batch 32 × hidden 7168 @
# 7168 × 512 — N=384 experts padded to 512 for the 2-block combine). Same per-core blocking as deepseek_v3
# (in0_block_w=32 divides K=224 tiles; per_core_M=1, per_core_N=2), but the out is 1×16 tiles so the matmul
# spreads N across 8 cores (needs a storage grid with x≥8; drop per_core_N to 4 if the grid is narrower).
# compute_with_storage_grid_size is device-derived (auto-filled). Omit this block to let ttnn auto-select.
gate_matmul_program_config:
  in0_block_w: 32
  out_subblock_h: 1
  out_subblock_w: 2
  out_block_h: 1
  out_block_w: 2
  per_core_M: 1
  per_core_N: 2
  transpose_mcast: false
  fused_activation: null

compute:
  intermediate_size: 2048
  activation_type: SILU

reduce:
  shared_expert_scale: 1.0

experts:
  expert_mapping: sequential
  shared_expert_ids_to_devices: fully_replicated
