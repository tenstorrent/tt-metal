# gpt_oss
mesh_shape: [8, 4]
cluster_axis: 0
batch_per_device: 32
hidden_size: 2880
select_experts_k: 4
num_routed_experts: 128
num_shared_experts: 0
has_bias: true

# gate (routing front-end): n_group 1 = generalized op (ungrouped) / 8 = deepseek op (grouped top-8).
# GPT-OSS router (GptOssTopKRouter): logits = Wx + b → top-4 (by Wx+b) → softmax over the selected (Wx+b).
# TTMoEGate's score_func=softmax is exactly that (rank by logit, then exp-over-selected), scale 1.0, and the
# router LINEAR bias b is supplied as the gate projection bias (router_bias below → torch_gate_proj_bias),
# so logits = Wx + b and b flows into BOTH selection and the softmax weights (matches the reference).
# 128 experts → padded to the op's 256-face.
n_group: 1
score_func: softmax
routed_scaling_factor: 1.0
# router LINEAR bias: GPT-OSS's GptOssTopKRouter does F.linear(x, W, b). TTMoEGate adds b via ttnn.linear's
# bias (torch_gate_proj_bias) — distinct from the deepseek score-correction bias (which is selection-only).
# (has_bias=true above is the separate EXPERT-MLP bias.)
router_bias: true

# router matmul program config: tuned 2D-mcast blocking for the gate matmul (batch 32 × hidden 2880 @
# 2880 × 256 — N=128 experts padded to 256). The router LINEAR bias goes through ttnn.linear; this program
# config applies to that linear's matmul. in0_block_w=30 = largest ≤32 divisor of K=90 tiles (hidden 2880
# isn't a 1024-multiple); out is 1×8 tiles → per_core_M=1, per_core_N=2 (4 cores in N). Grid auto-filled.
# Omit to let ttnn auto-select (slower).
gate_matmul_program_config:
  in0_block_w: 30
  out_subblock_h: 1
  out_subblock_w: 2
  out_block_h: 1
  out_block_w: 2
  per_core_M: 1
  per_core_N: 2
  transpose_mcast: false
  fused_activation: null

compute:
  intermediate_size: 2880
  activation_type: SWIGLU

reduce:
  shared_expert_scale: 1.0

experts:
  expert_mapping: sequential
