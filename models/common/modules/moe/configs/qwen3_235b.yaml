# qwen3_235b
mesh_shape: [8, 4]
cluster_axis: 0
batch_per_device: 32
hidden_size: 4096
select_experts_k: 8
num_routed_experts: 128
num_shared_experts: 0
has_bias: false

# gate (routing front-end): n_group 1 = generalized op (ungrouped) / 8 = deepseek op (grouped top-8).
# Qwen3 MoE = softmax over all experts → top-k → renormalize (≡ softmax over selected, the global Z
# cancels), no bias, no scaling. 128 experts → padded to the op's 256-face in TTMoEGate.forward.
n_group: 1
score_func: softmax
routed_scaling_factor: 1.0

# router matmul compute config (OPTIONAL, per-model): hidden=4096 is deep enough that the default matmul
# (LoFi + bf16 accumulate) drifts and flips near-tied experts at the top-8 boundary. HiFi2 + fp32
# accumulation keeps the selection stable. (qwen35_35b, hidden=2048, is shallow enough to skip this.)
gate_matmul_compute:
  math_fidelity: HiFi2
  math_approx_mode: true
  fp32_dest_acc_en: true
  packer_l1_acc: true

# router matmul program config: tuned 2D-mcast blocking for the gate matmul (batch 32 × hidden 4096 @
# 4096 × 256 — N=128 experts padded to 256). Same blocking as deepseek_v3: in0_block_w=32 divides K=128
# tiles; out is 1×8 tiles → per_core_M=1, per_core_N=2. compute_with_storage_grid_size is device-derived
# (auto-filled). Omit this block to let ttnn auto-select (slower).
gate_matmul_program_config:
  in0_block_w: 32
  out_subblock_h: 1
  out_subblock_w: 2
  out_block_h: 1
  out_block_w: 2
  per_core_M: 1
  per_core_N: 2
  transpose_mcast: false
  fused_activation: null

compute:
  intermediate_size: 1536
  activation_type: SILU

reduce:
  shared_expert_scale: 1.0

experts:
  expert_mapping: sequential
