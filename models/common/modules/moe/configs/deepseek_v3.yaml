# deepseek_v3
mesh_shape: [16, 8]
cluster_axis: 0
batch_per_device: 32
hidden_size: 7168
select_experts_k: 8
num_routed_experts: 256
num_shared_experts: 1
has_bias: false

# gate (routing front-end): n_group 1 = generalized op (ungrouped) / 8 = deepseek op (grouped top-8)
n_group: 8
score_func: sigmoid
routed_scaling_factor: 2.5

# router matmul compute config (OPTIONAL, per-model): deepseek's gate matmul is hidden=7168-deep and the
# grouped 8→4 selection is tie-sensitive, so it needs HiFi2 + fp32 accumulation — the default matmul
# (LoFi + bf16 accumulate) flips near-tied experts → top-k index drift. Omit this block to fall back to
# ttnn's default matmul fidelity (fine for shallow / tie-insensitive gates, e.g. qwen35).
gate_matmul_compute:
  math_fidelity: HiFi2
  math_approx_mode: true
  fp32_dest_acc_en: true
  packer_l1_acc: true

compute:
  intermediate_size: 2048
  activation_type: SILU

reduce:
  shared_expert_scale: 1.0

experts:
  expert_mapping: sequential
  shared_expert_ids_to_devices: fully_replicated
