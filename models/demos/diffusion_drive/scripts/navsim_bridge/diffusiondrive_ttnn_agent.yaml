#
# NavSim hydra agent config for the TTNN bridge.
# Copy this into  navsim/planning/script/config/common/agent/  and run
#   run_pdm_score.py ... agent=diffusiondrive_ttnn_agent
# The TTNN server must be running (scripts/ttnn_pdm_server.py, tt-metal venv).

_target_: diffusiondrive_ttnn_agent.DiffusionDriveTtnnAgent
_convert_: 'all'

config:
  _target_: navsim.agents.diffusiondrive.transfuser_config.TransfuserConfig
  _convert_: 'all'

  trajectory_sampling:
    _target_: nuplan.planning.simulation.trajectory.trajectory_sampling.TrajectorySampling
    _convert_: 'all'
    time_horizon: 4
    interval_length: 0.5

  latent: False

# Weights live in the TTNN server; checkpoint_path is accepted only for CLI
# compatibility with the upstream command line (agent.checkpoint_path=$CKPT).
checkpoint_path: null
socket_path: /tmp/ttnn_dd.sock
lr: 6e-4
