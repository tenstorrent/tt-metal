# REQUEST mode (unbounded, H2D-driven), 2-rank D2D pipeline. No PREFILL_STANDALONE => request loop.
# rank0 (d07u02) builds the H2D service; downstream rank1 reads via D2D. Migration/LayerAck auto-disabled
# for num_ranks>1. Cache sized to 11 chunks. Shutdown is via SIGKILL (no end-of-request sentinel yet).
rank_bindings:
  - {rank: 0, mesh_id: 0, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 1, mesh_id: 1, mesh_host_rank: 0, env_overrides: {}}
mesh_graph_desc_path: models/demos/deepseek_v3_d_p/tt/runners/topology_configuration/pipeline_prefill_2galaxy_connected_mesh_graph_descriptor.textproto
global_env:
  PREFILL_FABRIC_MODE: "2d"
  PREFILL_MAX_SEQ_LEN: "56320"
  PREFILL_H2D_SERVICE_ID: "ds_prefill"
  PREFILL_GATE_FALLBACK_MODE: "DEVICE_FP32"
  # ttrun does NOT propagate PREFILL_* from the shell -- migration knobs must live here.
  PREFILL_ENABLE_MIGRATION: "0"
  # Worker shmem queue names -- must match the running migration_endpoint (see cluster_env.sh).
  PREFILL_MIGRATION_CMD_QUEUE: "/mig_ep1_cmd"
  PREFILL_MIGRATION_TABLE_QUEUE: "/mig_ep1_table"
  PREFILL_MIGRATION_RESP_QUEUE: "/mig_ep1_resp"
  PREFILL_MIGRATION_SELFTEST: "0"
  PREFILL_MIGRATION_INTERLEAVED: "0"
  # Set PREFILL_MIGRATION_CLIENT_DIR to the dir containing the migration_client.so file
