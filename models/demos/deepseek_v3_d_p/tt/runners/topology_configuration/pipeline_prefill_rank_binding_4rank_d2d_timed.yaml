# 4-rank 55k D2D transport, per-chunk timing, PCC off. Reports each rank's pipeline.prefill() compute
# + absolute epoch start/end so the per-hop handoff gaps gap(0->1), gap(1->2), gap(2->3) can be
# compared for uniformity + stability across the three inter-galaxy boundaries.
#
# The 4 galaxies are a 2x2 RING, not a line — launch --host order MUST be a Hamiltonian chain:
#   bh-glx-d07u02:1,bh-glx-d07u08:1,bh-glx-d08u08:1,bh-glx-d08u02:1
# (d07u08<->d08u02 is NOT cabled; the naive d07u02,d07u08,d08u02,d08u08 order fails to map.)
rank_bindings:
  - {rank: 0, mesh_id: 0, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 1, mesh_id: 1, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 2, mesh_id: 2, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 3, mesh_id: 3, mesh_host_rank: 0, env_overrides: {}}
mesh_graph_desc_path: models/demos/deepseek_v3_d_p/tt/runners/topology_configuration/pipeline_prefill_4galaxy_connected_mesh_graph_descriptor.textproto
global_env:
  PREFILL_PP_TRANSPORT: "d2d"
  PREFILL_FABRIC_MODE: "2d"
  PREFILL_STANDALONE_PCC: "0"
  PREFILL_STANDALONE_NCHUNKS: "11"
  PREFILL_PP_TIME_CHUNKS: "1"
