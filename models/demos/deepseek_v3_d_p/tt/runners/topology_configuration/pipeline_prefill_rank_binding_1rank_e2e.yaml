# 1-rank clean e2e baseline: full 61-layer model on ONE galaxy, no pipeline/transport. FABRIC_2D to
# match the 2/4-rank runs (apples-to-apples — isolates the pipeline-parallel speedup). E2E_CLOCK logs
# true uninflated wall-clock; PCC off.
rank_bindings:
  - rank: 0
    mesh_id: 0
    mesh_host_rank: 0
    env_overrides: {}
mesh_graph_desc_path: tt_metal/fabric/mesh_graph_descriptors/single_bh_galaxy_torus_x_graph_descriptor.textproto
global_env:
  PREFILL_FABRIC_MODE: "2d"
  PREFILL_STANDALONE_PCC: "0"
  PREFILL_STANDALONE_NCHUNKS: "11"
