# 2-rank 55k d2d transport, per-chunk timing (PREFILL_PP_TIME_CHUNKS), PCC off. Logs each rank's
# pipeline.prefill() compute duration + absolute epoch start/end so the cross-rank handoff gap
# (next-rank compute start - this-rank compute end = the real transport cost) is directly measurable.
rank_bindings:
  - {rank: 0, mesh_id: 0, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 1, mesh_id: 1, mesh_host_rank: 0, env_overrides: {}}
mesh_graph_desc_path: models/demos/deepseek_v3_d_p/tt/runners/topology_configuration/pipeline_prefill_2galaxy_connected_mesh_graph_descriptor.textproto
global_env:
  PREFILL_PP_TRANSPORT: "d2d"
  PREFILL_FABRIC_MODE: "2d"

  PREFILL_STANDALONE_PCC: "0"
  PREFILL_STANDALONE_NCHUNKS: "11"
  PREFILL_PP_TIME_CHUNKS: "1"
