# tt-run rank binding for the 2-galaxy pipeline split with rank0 fed by the H2D socket (Step 2).
#
# 2-galaxy split (rank0 layers [0,31)+embed, rank1 layers [31,61)+norm+lmhead; D2D-socket activation
# transport over the connected MGD + FABRIC_2D) — but rank0's token input comes from the H2D socket
# service instead of the trace file (PREFILL_PP_H2D=1). An external producer (prefill_h2d_producer.py)
# must run ON u02 and push PREFILL_STANDALONE_NCHUNKS chunks; rank0 listens (h2d_socket_sync), runs
# its slice, forwards the activation to rank1 over D2D, listens again.
#
# Launch (rank0+rank1 via tt-run; producer is a SEPARATE process on u02):
#   bash models/demos/deepseek_v3_d_p/tt/runners/run_pipeline_prefill.sh \
#     models/demos/deepseek_v3_d_p/tt/runners/pipeline_prefill_h2d_2rank.yaml
#   # then, on u02, once rank0 logs "[h2d] service up":
#   PREFILL_H2D_SERVICE_ID=ds_prefill PREFILL_STANDALONE_NCHUNKS=4 PREFILL_SP=8 PREFILL_TP=4 \
#     PREFILL_H2D_CONNECT_TIMEOUT=900 \
#     python3 -m models.demos.deepseek_v3_d_p.tt.runners.prefill_h2d_producer

rank_bindings:
  - rank: 0
    mesh_id: 0
    mesh_host_rank: 0
    env_overrides: {}
  - rank: 1
    mesh_id: 1
    mesh_host_rank: 0
    env_overrides: {}

mesh_graph_desc_path: models/demos/deepseek_v3_d_p/tt/runners/topology_configuration/pipeline_prefill_2galaxy_connected_mesh_graph_descriptor.textproto

global_env:
  PREFILL_STANDALONE: "1"   # merged runner: standalone (bring-up/pipeline) mode, not the production request loop
  PREFILL_STANDALONE_PCC: "1"
  PREFILL_STANDALONE_NCHUNKS: "4"
  # rank0 reads tokens from the H2D socket instead of the trace.
  PREFILL_PP_H2D: "1"
  PREFILL_FABRIC_MODE: "2d"
  PREFILL_H2D_SERVICE_ID: "ds_prefill"
