# REQUEST mode (unbounded, H2D-driven), 4-rank D2D pipeline. No PREFILL_STANDALONE => request loop.
# rank0 builds the H2D service; downstream ranks read via D2D. Migration/LayerAck auto-disabled (num_ranks>1).
# Shutdown is SIGKILL (no end-of-request sentinel yet). Host order is the ring chain (see the 4-galaxy MGD).
rank_bindings:
  - {rank: 0, mesh_id: 0, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 1, mesh_id: 1, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 2, mesh_id: 2, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 3, mesh_id: 3, mesh_host_rank: 0, env_overrides: {}}
mesh_graph_desc_path: models/demos/deepseek_v3_d_p/tt/runners/topology_configuration/pipeline_prefill_4galaxy_connected_mesh_graph_descriptor.textproto
global_env:
  PREFILL_FABRIC_MODE: "2d"
  PREFILL_MAX_SEQ_LEN: "56320"
  PREFILL_H2D_SERVICE_ID: "ds_prefill"
  PREFILL_GATE_FALLBACK_MODE: "DEVICE_FP32"

  PREFILL_ENABLE_MIGRATION: "0"
  # Worker shmem queue names -- must match the running migration_endpoint
  PREFILL_MIGRATION_CMD_QUEUE: "/mig_ep1_cmd"
  PREFILL_MIGRATION_TABLE_QUEUE: "/mig_ep1_table"
  PREFILL_MIGRATION_RESP_QUEUE: "/mig_ep1_resp"
  # Set PREFILL_MIGRATION_CLIENT_DIR to the dir containing the migration_client.so file
  PREFILL_MIGRATION_GRANULARITY: "layerwise"
  PREFILL_MIGRATION_SELFTEST: "0"
  PREFILL_MODEL_VARIANT: "kimi_k2_6"
  PREFILL_PP_D2D_FIFO_BYTES: "4096"
  PREFILL_MIGRATION_INTERLEAVED: "0"
  # NOTE: PREFILL_CHECK_COMPLETIONS is test-only — the master attaches a stand-in consumer that
  # drains the scheduler's counter channel, so it must NOT be set in a config a real scheduler runs
  # against (it would zero the deltas the scheduler polls). Enable it only for bring-up.
