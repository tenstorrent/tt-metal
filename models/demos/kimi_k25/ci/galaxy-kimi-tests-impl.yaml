name: "[internal] Galaxy Kimi K2.5 tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      extra-tag:
        required: false
        type: string
        default: "in-service"
      topology:
        required: false
        type: string
        default: "topology-4u"
      test-type:
        required: false
        type: string
        default: "all"
      recreate_weights_cache:
        required: false
        type: string
        default: "No"
      new_cache_dir:
        required: false
        type: string
        default: ""

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate test matrix
        id: generate
        run: |
          all_tests=$(jq -n '[
            { "name": "(Galaxy) Kimi K2.5 unit tests",   "arch": "wormhole_b0", "test-type": "unit",   "timeout": 20,   "owner_id": "U0AK48VCFM0" },
            { "name": "(Galaxy) Kimi K2.5 smoke test",   "arch": "wormhole_b0", "test-type": "smoke",  "timeout": 60,   "owner_id": "U0AK48VCFM0" },
            { "name": "(Galaxy) Kimi K2.5 module tests", "arch": "wormhole_b0", "test-type": "module", "timeout": 150,  "owner_id": "U0AK48VCFM0" },
            { "name": "(Galaxy) Kimi K2.5 demo (full)",  "arch": "wormhole_b0", "test-type": "full",   "timeout": 3600, "owner_id": "U0AK48VCFM0" }
          ]')

          # Filter matrix based on test-type selection
          if [ "${{ inputs.test-type }}" = "all" ]; then
            matrix="$all_tests"
          else
            matrix=$(echo "$all_tests" | jq -c "[.[] | select(.\"test-type\" == \"${{ inputs.test-type }}\")]")
          fi

          # Fail fast if the matrix is empty (invalid test-type selected)
          if [ "$(echo "$matrix" | jq length)" -eq 0 ]; then
            echo "Error: Invalid test-type selected: '${{ inputs.test-type }}'"
            exit 1
          fi
          echo "matrix=$(echo "$matrix" | jq -c .)" >> $GITHUB_OUTPUT

  galaxy-kimi-tests:
    needs: generate-matrix
    name: ${{ matrix.test-group.name }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    runs-on:
      - arch-wormhole_b0
      - ${{ inputs.topology }}
      - bare-metal
      - pipeline-functional
      - ${{ inputs.extra-tag }}
    container:
      image: ${{ inputs.docker-image }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
        ARCH_NAME: ${{ matrix.test-group.arch }}
        KIMI_HF_MODEL: /mnt/MLPerf/tt_dnn-models/moonshotai/Kimi-K2.5
        KIMI_CACHE: /mnt/MLPerf/tt_dnn-models/moonshotai/Kimi-K2.5-Cache/CI
        MESH_DEVICE: TG
        CI: true
        GITHUB_ACTIONS: true
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
        - ${{ inputs.recreate_weights_cache == 'Yes' && '/mnt/MLPerf/tt_dnn-models/moonshotai/Kimi-K2.5-Cache:/mnt/MLPerf/tt_dnn-models/moonshotai/Kimi-K2.5-Cache' || '/mnt/MLPerf/tt_dnn-models/moonshotai/Kimi-K2.5-Cache:/mnt/MLPerf/tt_dnn-models/moonshotai/Kimi-K2.5-Cache:ro' }}
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}

      # ------------------------------------------------------------------
      # unit: CPU-only — no hardware, no real weights
      # ------------------------------------------------------------------
      - name: Run Kimi K2.5 CPU unit tests
        if: ${{ matrix.test-group.test-type == 'unit' }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          pytest models/demos/kimi_k25/tests \
            --ignore=models/demos/kimi_k25/tests/test_moe.py \
            --ignore=models/demos/kimi_k25/tests/test_moe_gate.py \
            --ignore=models/demos/kimi_k25/tests/test_mla.py \
            -k "not test_forward_pass and not test_full_model and not HardWare" \
            --timeout 60 --durations=0

      # ------------------------------------------------------------------
      # smoke: Random-weights forward pass (no real weights, fast gate)
      # ------------------------------------------------------------------
      - name: Run Kimi K2.5 random-weights smoke test
        if: ${{ matrix.test-group.test-type == 'smoke' }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          pytest models/demos/kimi_k25/tests/test_kimi_generate.py \
            -k "test_forward_pass" --timeout 600 --durations=0 -v

      # ------------------------------------------------------------------
      # module: Single-layer hardware tests (real weights from MLPerf mount)
      # ------------------------------------------------------------------
      - name: Validate weight cache
        if: ${{ matrix.test-group.test-type == 'module' }}
        timeout-minutes: 10
        run: |
          echo "KIMI_HF_MODEL=$KIMI_HF_MODEL"
          ls "$KIMI_HF_MODEL" | head -10 || echo "WARNING: model path not accessible"
      - name: Run Kimi K2.5 module tests
        if: ${{ matrix.test-group.test-type == 'module' }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          pytest models/demos/kimi_k25/tests/test_moe_gate.py \
                 models/demos/kimi_k25/tests/test_moe.py \
                 models/demos/kimi_k25/tests/test_mla.py \
            --timeout 600 --durations=0 -v

      # ------------------------------------------------------------------
      # full: End-to-end demo run (real weights, 61 layers, nightly)
      # ------------------------------------------------------------------
      - name: Run Kimi K2.5 full demo (61 layers, 56 prompts)
        if: ${{ matrix.test-group.test-type == 'full' }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          pytest models/demos/kimi_k25/demo/test_demo.py \
            -k "tg_full" --timeout 3600 --durations=0 -v

      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
          owner: ${{ matrix.test-group.owner_id }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
