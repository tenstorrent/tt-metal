<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>4K Image Detection — TT WH Galaxy</title>
<style>
  :root {
    --bg-0: #0a0612;
    --bg-1: #16101f;
    --card: #161126;
    --card-border: #2a1f48;
    --text: #e6e1f5;
    --text-dim: #b9a7ff;
    --accent: #7c5cff;
    --accent-hover: #9279ff;
    --pill-inactive: #1c1530;
    --good: #5af2a3;
    --warn: #ffb05a;
    --bad: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(80% 60% at 70% 0%, #1a1230 0%, transparent 60%),
      radial-gradient(60% 50% at 0% 100%, #150f24 0%, transparent 70%),
      var(--bg-0);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header.topbar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(8px);
    background: rgba(10, 6, 18, 0.78);
    border-bottom: 1px solid rgba(124, 92, 255, 0.18);
  }
  .logo-card {
    justify-self: start;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 10px 18px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .logo-card img { height: 56px; display: block; }
  .center-stack { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .title {
    font-size: 24px; line-height: 1.2; font-weight: 600;
    letter-spacing: 0.2px;
    border-bottom: 2px solid rgba(124, 92, 255, 0.5);
    padding-bottom: 6px;
  }
  .toggle-pill {
    position: relative;
    display: inline-flex;
    background: var(--pill-inactive);
    border: 1px solid var(--card-border);
    border-radius: 999px;
    padding: 5px;
    box-shadow: inset 0 0 0 1px rgba(124, 92, 255, 0.06);
    user-select: none;
  }
  .toggle-pill .seg {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 22px;
    border-radius: 999px;
    cursor: pointer;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 16px;
    transition: color 160ms ease;
    min-width: 150px;
    justify-content: center;
  }
  .toggle-pill .seg.active { color: #fff; }
  .toggle-pill .indicator {
    position: absolute;
    top: 5px; bottom: 5px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), #5b3dd6);
    box-shadow: 0 6px 18px rgba(124, 92, 255, 0.45);
    transition: transform 200ms ease, width 200ms ease;
    z-index: 0;
  }
  /* Side panel kept narrow on purpose — video must dominate. */
  main {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 12px;
    padding: 10px 12px;
  }
  @media (max-width: 1100px) {
    main { grid-template-columns: 1fr; }
    .right-col { order: -1; }
  }
  .video-card {
    position: relative;
    background: #050308;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    overflow: hidden;
    min-height: 300px;
    /* Match the video's own height cap so the card doesn't reserve empty
       pillarbox below the stream. The overlay canvas is position:absolute
       and tracks the video's content rect, so it still lines up. */
    max-height: calc(100vh - 110px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  #main, #localCam {
    display: block;
    width: 100%;
    height: auto;
    /* Generous cap — header is 80-90 px now, so 110 px leaves a small
       breathing margin without wasting vertical space on letterbox. */
    max-height: calc(100vh - 110px);
    background: #000;
    object-fit: contain;
  }
  #localCam { display: none; }
  #overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .right-col { display: flex; flex-direction: column; gap: 14px; }
  .preview-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .preview-card h3 {
    margin: 0 0 10px 0;
    font-size: 13px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 600;
  }
  #tiles {
    display: block;
    width: 100%;
    height: auto;
    background: #050308;
    border-radius: 6px;
    border: 1px solid rgba(124, 92, 255, 0.18);
  }
  .caption {
    margin-top: 10px;
    font: 15px ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--text-dim);
    text-align: center;
  }
  /* Dedicated FPS line — bigger than the caption so it reads across the room. */
  #fpsCap {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--good);
    margin-top: 6px;
  }
  .meta-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 16px;
    font: 14px ui-monospace, monospace;
    color: var(--text-dim);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .meta-card .row { display: flex; justify-content: space-between; padding: 4px 0; }
  .meta-card .row b { color: var(--text); font-weight: 600; font-size: 15px; }
  .switch-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 6, 18, 0.78);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 50;
    backdrop-filter: blur(6px);
  }
  .switch-overlay.show { display: flex; }
  .spinner {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 4px solid rgba(124, 92, 255, 0.18);
    border-top-color: var(--accent);
    animation: spin 900ms linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .switch-overlay .msg {
    font-size: 16px;
    color: var(--text);
    letter-spacing: 0.2px;
  }
  .err-toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(255, 107, 107, 0.16); border: 1px solid rgba(255, 107, 107, 0.5);
    color: #ffd5d5; padding: 8px 14px; border-radius: 8px; font: 13px ui-monospace, monospace;
    display: none;
  }
  .err-toast.show { display: block; }
  /* 8-stream grid: 4 columns x 2 rows of square tiles, sized so the whole
     grid fits within the viewport (no scroll). --s is the per-cell side,
     computed as min(width-budget/4, height-budget/2) so cells stay square
     and the grid is centered with any remaining space as margin. */
  #streamsGrid {
    display: none;
    gap: 10px;
    justify-content: center;
    align-content: center;
    width: 100%;
  }
  main.streams-mode {
    grid-template-columns: 1fr;
    padding: 8px 10px;
  }
  main.streams-mode #streamsGrid {
    display: grid;
    --header-h: 120px;
    --gap: 10px;
    /* source content is 1280x724 (16:9-ish) after cropping the baked-in
       gray bars. Cell width takes the lesser of width-budget/4 and
       (height-budget/2) * aspect so rows of the grid still fit. */
    --aspect: calc(1280 / 724);
    --s-w: min(
      calc((100vw - 40px - 3 * var(--gap)) / 4),
      calc(((100vh - var(--header-h) - var(--gap)) / 2) * var(--aspect))
    );
    grid-template-columns: repeat(4, var(--s-w));
    grid-template-rows: repeat(2, calc(var(--s-w) / var(--aspect)));
  }
  main.streams-mode .video-card,
  main.streams-mode .right-col { display: none; }
  .stream-cell {
    position: relative;
    background: #050308;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    overflow: hidden;
  }
  .stream-cell canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .stream-hud {
    position: absolute;
    top: 6px; left: 8px; right: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    pointer-events: none;
    z-index: 2;
    font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.75);
  }
  .stream-hud .hud-left {
    background: rgba(124, 92, 255, 0.6);
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: 0.3px;
    font-weight: 600;
    white-space: nowrap;
  }
  .stream-hud .hud-right {
    background: rgba(10, 6, 18, 0.7);
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: 0.2px;
    color: var(--good);
    font-weight: 600;
    white-space: nowrap;
  }
  /* Master video sits in the first cell at full size so Chrome keeps the
     decoder active (offscreen / 2-px tricks can trip the "invisible media"
     throttle in recent builds). The canvas on top covers it completely; the
     video itself is invisible to the user. */
  .streams-master-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    background: #000;
  }
  .stream-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    z-index: 1;
    background: rgba(10, 6, 18, 0.75);
    color: var(--text);
    font: 14px ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: 0.5px;
    pointer-events: none;
    transition: opacity 180ms ease;
  }
  .stream-loading.hidden { opacity: 0; pointer-events: none; display: none; }
  .stream-loading .tile-spinner {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 3px solid rgba(124, 92, 255, 0.18);
    border-top-color: var(--accent);
    animation: spin 900ms linear infinite;
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="logo-card">
      <img src="assets/tt_logo.png" alt="Tenstorrent" />
    </div>
    <div class="center-stack">
      <div class="title">4K Image Detection — TT WH Galaxy</div>
      <div class="toggle-pill" id="toggle" role="tablist" aria-label="Source">
        <span class="indicator" id="ind"></span>
        <button class="seg" data-id="camera" role="tab" aria-selected="false">
          <span aria-hidden="true">🎥</span><span>Camera</span>
        </button>
        <button class="seg" data-id="multi" role="tab" aria-selected="false">
          <span aria-hidden="true">🗂️</span><span>Streams</span>
        </button>
        <button class="seg active" data-id="video" role="tab" aria-selected="true">
          <span aria-hidden="true">🎬</span><span>Video</span>
        </button>
      </div>
    </div>
    <div></div>
  </header>

  <main>
    <section class="video-card" id="videoCard">
      <video id="main" autoplay muted playsinline loop></video>
      <video id="localCam" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
    </section>
    <section id="streamsGrid"></section>
    <aside class="right-col">
      <div class="preview-card">
        <h3>Tile preview</h3>
        <canvas id="tiles" width="320" height="180"></canvas>
        <div class="caption" id="tilesCap">YOLOv8L · — tiles</div>
        <div class="caption" id="fpsCap">inference —.— FPS</div>
      </div>
      <div class="meta-card" id="meta">
        <div class="row"><span>transport</span><b id="m_transport">—</b></div>
        <div class="row"><span>resolution</span><b id="m_res">—</b></div>
        <div class="row"><span>tiles</span><b id="m_tiles">—</b></div>
        <div class="row"><span>delivery</span><b id="m_delivery">—</b></div>
      </div>
    </aside>
  </main>

  <div class="switch-overlay" id="switching">
    <div class="spinner"></div>
    <div class="msg" id="switchMsg">Switching transport…</div>
  </div>
  <div class="err-toast" id="err"></div>

<script>
"use strict";
/* ===================================================================
 * Constants
 * =================================================================== */
const TILE = 640;
// Everything is same-origin: the supervisor serves this page AND proxies /offer
// to the pipeline. So no need for separate URLs.
const SUPERVISOR = location.origin;
const OFFER_URL  = `${location.origin}/offer`;

/* ===================================================================
 * Utility: grid math mirroring build_overlap_grid in the pipeline.
 * Returns the same (xStarts, yStarts) the server computes, so the
 * mini preview canvas draws the exact tiling the runtime picks.
 * =================================================================== */
function gridFor(w, h) {
  const cols = Math.max(1, Math.ceil(w / TILE));
  const rows = Math.max(1, Math.ceil(h / TILE));
  const xStarts = Array.from({length: cols},
    (_, i) => Math.min(i * TILE, Math.max(0, w - TILE)));
  const yStarts = Array.from({length: rows},
    (_, i) => Math.min(i * TILE, Math.max(0, h - TILE)));
  return { cols, rows, n: cols * rows, xStarts, yStarts };
}

function captionFor(g) {
  if (g.n <= 1) return "YOLOv8L · 1 × 640×640 tile";
  return `YOLOv8L · ${g.n} × 640×640 tiles`;
}

/* ===================================================================
 * Tile preview canvas: downscale a recent video frame and overlay grid
 * =================================================================== */
const tileCanvas = document.getElementById("tiles");
const tileCtx    = tileCanvas.getContext("2d");
let lastGrid     = gridFor(3840, 2160);
let mainSrc      = null; // <video> or <canvas>-equivalent for ctx.drawImage

// Source resolution drives the grid even before pixels arrive.
let srcW = 0, srcH = 0;

function _drawGridOnly(dx, dy, dw, dh, sw, sh) {
  const sxToPx = dw / sw, syToPx = dh / sh;
  tileCtx.lineWidth = 1;
  tileCtx.strokeStyle = "rgba(124, 92, 255, 0.85)";
  for (const x of lastGrid.xStarts) {
    const px = dx + Math.round(x * sxToPx);
    tileCtx.beginPath(); tileCtx.moveTo(px + 0.5, dy); tileCtx.lineTo(px + 0.5, dy + dh); tileCtx.stroke();
    const px2 = dx + Math.round((x + TILE) * sxToPx);
    tileCtx.beginPath(); tileCtx.moveTo(px2 + 0.5, dy); tileCtx.lineTo(px2 + 0.5, dy + dh); tileCtx.stroke();
  }
  for (const y of lastGrid.yStarts) {
    const py = dy + Math.round(y * syToPx);
    tileCtx.beginPath(); tileCtx.moveTo(dx, py + 0.5); tileCtx.lineTo(dx + dw, py + 0.5); tileCtx.stroke();
    const py2 = dy + Math.round((y + TILE) * syToPx);
    tileCtx.beginPath(); tileCtx.moveTo(dx, py2 + 0.5); tileCtx.lineTo(dx + dw, py2 + 0.5); tileCtx.stroke();
  }
}

function drawTilePreview() {
  const cw = tileCanvas.width, ch = tileCanvas.height;
  tileCtx.fillStyle = "#050308";
  tileCtx.fillRect(0, 0, cw, ch);

  // The grid is computed in SOURCE-frame space (e.g. 3840×2160 even when the
  // H.264 stream is downscaled to 1920×1080). If we used mainSrc.videoWidth
  // here the grid would be drawn against display-space dims and tile coords
  // > videoWidth would fall off-canvas (symptom: caption says 24 tiles, only
  // 6 visible). Always prefer supervisor-reported srcW/srcH and fall back to
  // the element's intrinsic size only when the supervisor hasn't told us yet.
  let sw = srcW || (mainSrc && (mainSrc.videoWidth || mainSrc.naturalWidth)) || 0;
  let sh = srcH || (mainSrc && (mainSrc.videoHeight || mainSrc.naturalHeight)) || 0;
  if (!sw || !sh) {
    tileCtx.fillStyle = "#1c1530";
    tileCtx.fillRect(0, 0, cw, ch);
    tileCtx.fillStyle = "#b9a7ff";
    tileCtx.font = "11px ui-monospace, monospace";
    tileCtx.fillText("waiting for stream…", 12, 20);
    document.getElementById("tilesCap").textContent = captionFor(lastGrid);
    return;
  }
  const ar = sw / sh;
  let dw = cw, dh = Math.round(cw / ar);
  if (dh > ch) { dh = ch; dw = Math.round(ch * ar); }
  const dx = ((cw - dw) >> 1), dy = ((ch - dh) >> 1);

  // Draw pixels if available; else draw a dim rectangle to host the grid lines.
  const haveStream = mainSrc && (mainSrc.videoWidth || mainSrc.naturalWidth);
  if (haveStream) {
    try { tileCtx.drawImage(mainSrc, dx, dy, dw, dh); } catch (_e) {}
  } else {
    tileCtx.fillStyle = "#1c1530";
    tileCtx.fillRect(dx, dy, dw, dh);
  }
  _drawGridOnly(dx, dy, dw, dh, sw, sh);
  document.getElementById("tilesCap").textContent = captionFor(lastGrid);
}

function _updateFpsCap() {
  const el = document.getElementById("fpsCap");
  if (!el) return;
  // If no dets arrived in the last 2 s the stream has stalled — blank the
  // readout so it doesn't keep advertising a stale number.
  const stalled = _detsLastT === 0 || (performance.now() - _detsLastT) > 2000;
  el.textContent = (!stalled && detsFps > 0.5)
    ? `inference ${detsFps.toFixed(1)} FPS`
    : "inference —.— FPS";
}

function rafLoop() {
  drawTilePreview();
  _updateFpsCap();
  requestAnimationFrame(rafLoop);
}

/* ===================================================================
 * Toggle pill UX
 * =================================================================== */
const segs = Array.from(document.querySelectorAll(".toggle-pill .seg"));
const ind  = document.getElementById("ind");
function setActiveSeg(id, animate = true) {
  segs.forEach(s => {
    const on = (s.dataset.id === id);
    s.classList.toggle("active", on);
    s.setAttribute("aria-selected", on ? "true" : "false");
  });
  const target = segs.find(s => s.dataset.id === id);
  if (!target) return;
  const r = target.getBoundingClientRect();
  const p = target.parentElement.getBoundingClientRect();
  if (!animate) ind.style.transition = "none";
  ind.style.width = r.width + "px";
  ind.style.transform = `translateX(${r.left - p.left - 4}px)`;
  if (!animate) requestAnimationFrame(() => { ind.style.transition = ""; });
}

/* ===================================================================
 * Overlay canvas (camera mode only) - draws boxes from data channel
 * =================================================================== */
const mainEl    = document.getElementById("main");
const localCam  = document.getElementById("localCam");
const overlay   = document.getElementById("overlay");
const ovctx     = overlay.getContext("2d");
let latestDets  = null;
const COCO = ["person","bicycle","car","motorcycle","airplane","bus","train","truck","boat","traffic light","fire hydrant","stop sign","parking meter","bench","bird","cat","dog","horse","sheep","cow","elephant","bear","zebra","giraffe","backpack","umbrella","handbag","tie","suitcase","frisbee","skis","snowboard","sports ball","kite","baseball bat","baseball glove","skateboard","surfboard","tennis racket","bottle","wine glass","cup","fork","knife","spoon","bowl","banana","apple","sandwich","orange","broccoli","carrot","hot dog","pizza","donut","cake","chair","couch","potted plant","bed","dining table","toilet","tv","laptop","mouse","remote","keyboard","cell phone","microwave","oven","toaster","sink","refrigerator","book","clock","vase","scissors","teddy bear","hair drier","toothbrush"];

function syncOverlayRect() {
  // The <video> element is `width:100%; height:auto; max-height:...;
  // object-fit:contain`, which means the element box is frequently a
  // different aspect ratio than the intrinsic video — creating letterbox
  // bars inside the element. The previous overlay was `inset:0` on the
  // whole card, so box coords drawn in source space landed outside the
  // actual video area. Compute the video's *content* rect here (applying
  // contain-math manually) and position the canvas exactly over it. Then
  // set the internal canvas buffer to source-frame dims so detection box
  // coords map 1:1 — no scaling in drawOverlay.
  const v = currentMode === "camera" ? localCam : mainEl;
  let sw, sh;
  if (currentMode === "camera") {
    sw = v.videoWidth || negotiatedW || 0;
    sh = v.videoHeight || negotiatedH || 0;
  } else {
    sw = negotiatedW || v.videoWidth || 0;
    sh = negotiatedH || v.videoHeight || 0;
  }
  if (!sw || !sh) return false;

  const vRect = v.getBoundingClientRect();
  if (!vRect.width || !vRect.height) return false;

  const srcAR  = sw / sh;
  const elemAR = vRect.width / vRect.height;
  let contentW, contentH, contentX, contentY;
  if (elemAR > srcAR) {
    // Element wider than content — pillarbox bars left/right.
    contentH = vRect.height;
    contentW = contentH * srcAR;
    contentX = (vRect.width - contentW) / 2;
    contentY = 0;
  } else {
    contentW = vRect.width;
    contentH = contentW / srcAR;
    contentX = 0;
    contentY = (vRect.height - contentH) / 2;
  }

  // Position the canvas absolutely (still inside #videoCard, which is
  // position:relative) so its CSS rect exactly matches the video's content.
  const card = document.getElementById("videoCard");
  const cardRect = card.getBoundingClientRect();
  const left = (vRect.left - cardRect.left) + contentX;
  const top  = (vRect.top  - cardRect.top)  + contentY;
  overlay.style.inset  = "auto";
  overlay.style.left   = left + "px";
  overlay.style.top    = top + "px";
  overlay.style.width  = contentW + "px";
  overlay.style.height = contentH + "px";

  // Internal buffer = source frame dims. Box coords are source-space →
  // drawing with raw (x1,y1,x2,y2) maps pixel-perfect once CSS scales
  // the canvas to contentW × contentH.
  if (overlay.width !== sw) overlay.width = sw;
  if (overlay.height !== sh) overlay.height = sh;
  return true;
}

function drawOverlay() {
  if (currentMode === "multi") return; // multi mode draws per-stream canvases
  const ok = syncOverlayRect();
  if (!ok) return;
  ovctx.clearRect(0, 0, overlay.width, overlay.height);
  // Gate: only paint boxes when a video frame is actually being shown. Without
  // this, SSE-delivered dets land faster than the <video> can load and the
  // rAF loop paints stale boxes onto a black/unloaded element. Also clears
  // latestDets so when playback stalls, boxes blank instead of sticking.
  const el = (currentMode === "camera") ? localCam : mainEl;
  const playing = el && el.readyState >= 2 && !el.paused && !el.ended;
  if (!playing) { latestDets = null; return; }
  if (!latestDets) return;
  const { boxes, scores, cls } = latestDets;
  if (!boxes || !boxes.length) return;
  const sw = overlay.width;
  // Stroke / label sized in source space so screen thickness is consistent
  // across resolutions — a 2 px stroke at 1080p becomes invisible at 4K.
  const lw = Math.max(2, Math.round(sw / 600));
  const fontPx = Math.max(12, Math.round(sw / 80));
  ovctx.lineWidth = lw;
  ovctx.font = `${fontPx}px ui-monospace, monospace`;
  for (let i = 0; i < boxes.length; i++) {
    const [x1, y1, x2, y2] = boxes[i];
    const c = cls ? cls[i] : 0;
    const s = scores ? scores[i] : 0;
    ovctx.strokeStyle = "rgba(124, 92, 255, 0.95)";
    ovctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
    const label = `${COCO[c] || c} ${(s * 100).toFixed(0)}%`;
    const tw = ovctx.measureText(label).width + 8;
    const lh = fontPx + 4;
    ovctx.fillStyle = "rgba(124, 92, 255, 0.85)";
    ovctx.fillRect(x1, Math.max(0, y1 - lh), tw, lh);
    ovctx.fillStyle = "#fff";
    ovctx.fillText(label, x1 + 4, Math.max(fontPx, y1 - 4));
  }
}
function overlayLoop() { drawOverlay(); requestAnimationFrame(overlayLoop); }

/* ===================================================================
 * Connection state machine
 * =================================================================== */
let pc = null;
let dch = null;
let currentMode = "video";          // "video" | "camera" | "multi"
let camStream = null;
let negotiatedW = 0, negotiatedH = 0;
let negotiatedFps = 0, totalFrames = 0;

// Video-split mode: pipeline runs at full speed (~70 FPS) and pushes
// {frame_id, boxes, ...} over SSE as each frame is inferred. Browser plays
// the raw source MP4 at its native rate (~30 FPS) with `loop` on, and the
// pipeline's FrameSource also loops internally (but keeps frame_id monotonic).
//
// To keep boxes aligned across loop cycles we key the buffer by
// `frame_id % totalFrames` — pipeline pass N overwrites slot for source
// frame F every cycle, so the browser always finds the freshest dets for
// whatever frame it's currently presenting. Buffer size stays bounded at
// totalFrames regardless of how long the pipeline has been running.
const detsBuffer = new Map();       // (frame_id % n_frames) -> {boxes, scores, cls}
let detsSSE = null;
let videoRvfcHandle = null;

// Inference throughput — the pipeline publishes its own `ema_fps` (the same
// number printed in the `[sahi-640] avg ... FPS` log lines) on every dets
// message, so the browser just reads and displays it verbatim. We deliberately
// do NOT derive FPS from SSE arrival rate: TCP batches multiple dets into one
// packet, EventSource dispatches them in the same microtask, and any 1/dt
// estimate spikes to ~10,000 FPS. Trusting the server's smoothed number keeps
// the readout steady and matches what the logs report.
let detsFps = 0;
let _detsLastT = 0;                  // last arrival timestamp; used only to blank the readout when the stream stalls

function _markDetsArrival(fps) {
  _detsLastT = performance.now();
  if (typeof fps === "number" && isFinite(fps) && fps >= 0) {
    detsFps = fps;
  }
}

function _resetDetsFps() {
  detsFps = 0; _detsLastT = 0;
}

function closeDetsStream() {
  if (detsSSE) { try { detsSSE.close(); } catch (_e) {} }
  detsSSE = null;
  detsBuffer.clear();
}

function _frameKey(raw) {
  // Pipeline emits monotonic frame_ids, but the source file has only
  // totalFrames frames — every cycle the pipeline walks them again. Folding
  // to `raw mod totalFrames` keeps the buffer bounded AND lets the browser's
  // <video loop> (which restarts its clock every cycle) hit the same slot.
  if (totalFrames > 0) {
    const m = ((raw % totalFrames) + totalFrames) % totalFrames;
    return m;
  }
  return raw | 0;
}

function openDetsStream() {
  closeDetsStream();
  detsSSE = new EventSource(`${location.origin}/dets`);
  detsSSE.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch (_e) { return; }
    if (!msg || msg.k !== "dets") return;
    _markDetsArrival(msg.fps);
    const key = _frameKey(msg.frame_id | 0);
    detsBuffer.set(key, {
      boxes: msg.boxes || [],
      scores: msg.scores || [],
      cls: msg.cls || [],
    });
  };
  detsSSE.onerror = () => {
    // EventSource auto-reconnects — just log.
    console.warn("[dets] SSE error (auto-reconnect)");
  };
}

function detsForFrame(frameId) {
  // Exact match preferred; fall back to the nearest earlier frame_id (or
  // wrap-around predecessor when totalFrames is known) so a brief inference
  // stall doesn't blank the overlay.
  if (detsBuffer.has(frameId)) return detsBuffer.get(frameId);
  let best = -1;
  for (const k of detsBuffer.keys()) {
    if (k <= frameId && k > best) best = k;
  }
  if (best < 0 && totalFrames > 0 && detsBuffer.size > 0) {
    // Cold start: no slot at or before frameId, but the pipeline may have
    // filled later slots from a prior cycle. Take the highest one we have.
    for (const k of detsBuffer.keys()) if (k > best) best = k;
  }
  return best >= 0 ? detsBuffer.get(best) : null;
}

function onVideoFrameTick(_now, metadata) {
  // Prefer mediaTime * fps when we know totalFrames — it maps to a file-local
  // frame index that matches `fc % totalFrames` on the server side. The
  // alternative (presentedFrames) starts fresh on every <video loop> cycle
  // AND on every `mainEl.load()`, so it doesn't align with pipeline fc.
  let fid;
  if (totalFrames > 0 && negotiatedFps > 0 && metadata && typeof metadata.mediaTime === "number") {
    const localIdx = Math.round(metadata.mediaTime * negotiatedFps);
    fid = ((localIdx % totalFrames) + totalFrames) % totalFrames;
  } else {
    fid = ((metadata && metadata.presentedFrames) | 0) - 1;
  }
  const d = detsForFrame(fid);
  if (d) {
    latestDets = {
      boxes: d.boxes, scores: d.scores, cls: d.cls,
      frame_w: negotiatedW, frame_h: negotiatedH,
    };
  }
  if (currentMode === "video" && mainEl && typeof mainEl.requestVideoFrameCallback === "function") {
    videoRvfcHandle = mainEl.requestVideoFrameCallback(onVideoFrameTick);
  }
}

function cancelVideoRvfc() {
  if (videoRvfcHandle && mainEl && typeof mainEl.cancelVideoFrameCallback === "function") {
    try { mainEl.cancelVideoFrameCallback(videoRvfcHandle); } catch (_e) {}
  }
  videoRvfcHandle = null;
}

function showSwitch(msg) {
  document.getElementById("switchMsg").textContent = msg;
  document.getElementById("switching").classList.add("show");
}
function hideSwitch() { document.getElementById("switching").classList.remove("show"); }
function toast(msg) {
  const el = document.getElementById("err");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), 4000);
}

function teardown() {
  try { if (dch) dch.close(); } catch (_e) {}
  try { if (pc)  pc.close();  } catch (_e) {}
  dch = null; pc = null;
  if (camStream) {
    camStream.getTracks().forEach(t => { try { t.stop(); } catch (_e) {} });
    camStream = null;
  }
  cancelVideoRvfc();
  closeDetsStream();
  teardownStreams();
  _resetDetsFps();
  latestDets = null;
  mainEl.srcObject = null;
  mainEl.removeAttribute("src");
  mainEl.load();
  localCam.srcObject = null;
}

async function postSource(transport, w, h) {
  const r = await fetch(`${SUPERVISOR}/api/source`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ transport, width: w | 0, height: h | 0 }),
  });
  if (!r.ok) throw new Error(`supervisor /api/source ${r.status}`);
  return r.json();
}

async function offerToPipeline(pcLocal) {
  const r = await fetch(OFFER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sdp: pcLocal.localDescription.sdp, type: pcLocal.localDescription.type }),
  });
  if (!r.ok) {
    let detail = "";
    try { const j = await r.json(); detail = j.error || j.detail || ""; } catch (_) {}
    throw new Error(`pipeline /offer ${r.status}${detail ? ` — ${detail}` : ""}`);
  }
  return r.json();
}

/* ---------- Video mode: split delivery ----------
 * Browser plays /source.mp4 natively (no server re-encode) and overlays
 * detections streamed over /dets SSE, looked up per frame via rVFC.
 * This decouples network bandwidth from inference throughput: the pipeline
 * runs at ~70 FPS on hardware independently of the 30 FPS playback rate.
 */
async function startVideo() {
  showSwitch("Starting Video transport…");
  teardown();
  const status = await postSource("video", 0, 0);
  if (!status.ok) { hideSwitch(); toast("supervisor failed to start pipeline"); return; }
  negotiatedW = status.frame_w; negotiatedH = status.frame_h;
  lastGrid = gridFor(negotiatedW, negotiatedH);
  updateMeta(status, "native MP4 + dets over SSE");
  showSwitch("Loading source video…");
  localCam.style.display = "none";
  mainEl.style.display = "block";
  mainEl.srcObject = null;
  // Cache-buster: on toggle video→camera→video, some browsers keep the old
  // range-cache keyed on the bare URL.
  mainEl.src = `${location.origin}/source.mp4?t=${Date.now()}`;
  mainSrc = mainEl;
  const ready = new Promise((resolve) => {
    const done = () => { mainEl.removeEventListener("loadeddata", done); mainEl.removeEventListener("playing", done); resolve(); };
    mainEl.addEventListener("loadeddata", done, { once: true });
    mainEl.addEventListener("playing", done, { once: true });
    setTimeout(resolve, 8000);
  });
  try { await mainEl.play(); } catch (_e) { /* autoplay quirks */ }
  await ready;

  // Start SSE + per-frame overlay lookup AFTER the <video> is wired up so
  // the very first presented frame can already pick up a det (pipeline
  // begins inferring as soon as the supervisor restart returned 200).
  openDetsStream();
  if (typeof mainEl.requestVideoFrameCallback === "function") {
    videoRvfcHandle = mainEl.requestVideoFrameCallback(onVideoFrameTick);
  } else {
    // Extremely old browsers: fall back to the RAF overlay loop only (it
    // will show the newest buffered det, which drifts slightly from playback).
    console.warn("[video] requestVideoFrameCallback unavailable; overlay may lag");
  }
  hideSwitch();
}

/* ---------- Camera mode: sendrecv camera + boxes over data channel ---------- */
async function startCamera() {
  showSwitch("Requesting camera permission…");
  teardown();
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        // Ask the webcam for 60 fps — most modern cameras support it at
        // ≤ 1080p given enough light. Browsers silently fall back to 30
        // if the device/lighting can't sustain it.
        frameRate: { ideal: 60, min: 30 },
      },
      audio: false,
    });
  } catch (e) {
    hideSwitch(); toast("camera permission denied: " + e.message); return;
  }
  camStream = stream;
  localCam.srcObject = stream;
  localCam.style.display = "block";
  mainEl.style.display = "none";
  mainSrc = localCam;
  await new Promise((res) => {
    if (localCam.readyState >= 1) return res();
    localCam.onloadedmetadata = () => res();
  });
  negotiatedW = localCam.videoWidth || 1280;
  negotiatedH = localCam.videoHeight || 720;
  lastGrid = gridFor(negotiatedW, negotiatedH);

  showSwitch(`Starting Camera transport (${negotiatedW}×${negotiatedH})…`);
  const status = await postSource("camera", negotiatedW, negotiatedH);
  if (!status.ok) { hideSwitch(); toast("supervisor failed to start camera pipeline"); return; }
  updateMeta(status, "data_only (boxes over data channel)");

  showSwitch("Connecting to inference…");
  pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
  dch = pc.createDataChannel("dets", { ordered: true });
  dch.onmessage = (ev) => {
    try {
      let payload;
      if (typeof ev.data === "string") payload = JSON.parse(ev.data);
      else payload = JSON.parse(new TextDecoder().decode(ev.data));
      if (payload && payload.k === "dets") {
        _markDetsArrival(payload.fps);
        latestDets = {
          boxes: payload.boxes || [],
          scores: payload.scores || [],
          cls: payload.cls || [],
          frame_w: negotiatedW,
          frame_h: negotiatedH,
        };
      }
    } catch (_e) { /* silent */ }
  };
  stream.getVideoTracks().forEach(t => pc.addTrack(t, stream));
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  const ans = await offerToPipeline(pc);
  await pc.setRemoteDescription(ans);
  hideSwitch();
}

function updateMeta(status, deliveryDesc) {
  document.getElementById("m_transport").textContent = status.transport || "—";
  document.getElementById("m_res").textContent = `${status.frame_w}×${status.frame_h}`;
  document.getElementById("m_tiles").textContent = `${status.tiles_x}×${status.tiles_y} = ${status.n_tiles}`;
  document.getElementById("m_delivery").textContent = deliveryDesc;
  if (status.frame_w && status.frame_h) {
    srcW = status.frame_w; srcH = status.frame_h;
    lastGrid = gridFor(srcW, srcH);
  }
  // fps / n_frames are present in video mode only. Stash for rVFC lookup math.
  negotiatedFps = +(status.fps || 0) || 0;
  totalFrames = (status.n_frames | 0) || 0;
}

async function selectMode(mode) {
  if (mode === currentMode) return;
  currentMode = mode;
  setActiveSeg(mode);
  localStorage.setItem("ttdemo.mode", mode);
  try {
    if (mode === "video")      await startVideo();
    else if (mode === "multi") await startStreams();
    else                       await startCamera();
  } catch (e) {
    hideSwitch();
    toast(e.message || String(e));
    console.error(e);
  }
}

segs.forEach(s => s.addEventListener("click", () => selectMode(s.dataset.id)));
window.addEventListener("resize", () => setActiveSeg(currentMode, false));

/* ===================================================================
 * Multi (Streams) mode: ONE hidden master <video> feeds 8 canvas tiles.
 *
 * Why a single video: HTTP/1.1 per-origin connection caps (~6 in Chrome)
 * throttle 8 parallel <video src="/source.mp4"> tags so ~2 tiles hang
 * indefinitely. Routing one master video into 8 canvases via rVFC uses
 * one connection, renders all 8 tiles from the same decoded frames, and
 * stays in perfect lockstep.
 *
 * Pipeline still emits one dets message *per stream* per frame (the
 * stream_id being the route key); each tile renders the master frame
 * + its own stream_id's boxes. V1 broadcasts the same frame to all 8,
 * so box coords are identical across tiles; when the pipeline grows
 * true per-stream sources the same demux handles it unchanged.
 * =================================================================== */
const N_STREAMS = 8;
// Source video is 1280x1280 with baked-in gray bars; actual content is
// rows [STREAMS_CROP_Y, STREAMS_CROP_Y + STREAMS_CROP_H). Canvas is sized to
// the cropped content, drawImage uses the 9-arg crop form, and box y-coords
// (reported in 1280x1280 frame space) get shifted by -STREAMS_CROP_Y.
const STREAMS_SRC_W = 1280;
const STREAMS_SRC_H = 1280;
const STREAMS_CROP_Y = 280;
const STREAMS_CROP_H = 724;
let streamsMaster = null;
let streamsCanvases = [];
let streamsCtxs = [];
let streamsDetsBuffers = [];
let streamsLatestDets = [];
let streamsRvfcHandle = null;
let streamsDetsSSE = null;
let streamsHudLeftEls = [];    // per-stream "Stream N · model · D devices"
let streamsHudRightEls = [];   // per-stream FPS element
let streamsLoadingEls = [];    // per-stream loading overlay (hidden after first paint)
let streamsFirstFrameSeen = []; // per-stream bool — drop the overlay once true
let streamsFps = [];           // last-known per-stream FPS (from SSE msg.fps)
let streamsTilesPerStream = 4; // model cluster size per stream, seeded from /api/status

function buildStreamsGrid(forceRebuild = false) {
  const grid = document.getElementById("streamsGrid");
  if (!forceRebuild && streamsMaster && streamsCanvases.length === N_STREAMS) return;
  // Nuke the DOM tree -- this also removes any existing <video> with a
  // sticky MediaError (code=4 SRC_NOT_SUPPORTED etc), which cannot be
  // fully cleared via src reassignment alone in Chromium.
  streamsMaster = null;
  grid.innerHTML = "";
  streamsCanvases = []; streamsCtxs = [];
  streamsDetsBuffers = []; streamsLatestDets = [];
  streamsHudLeftEls = []; streamsHudRightEls = []; streamsFps = [];
  streamsLoadingEls = []; streamsFirstFrameSeen = [];

  streamsMaster = document.createElement("video");
  streamsMaster.autoplay = true;
  streamsMaster.muted = true;
  streamsMaster.playsInline = true;
  streamsMaster.loop = true;
  streamsMaster.preload = "auto";
  streamsMaster.className = "streams-master-video";
  streamsMaster.addEventListener("error", () => {
    const e = streamsMaster.error;
    const codeNames = { 1: "ABORTED", 2: "NETWORK", 3: "DECODE", 4: "SRC_NOT_SUPPORTED" };
    const codeName = e ? (codeNames[e.code] || String(e.code)) : "none";
    console.error(`[multi] master <video> error code=${e && e.code} (${codeName}) message=${e && e.message}`);
    toast(`stream video failed (${codeName})`);
  });
  streamsMaster.addEventListener("loadeddata", () => {
    console.log(`[multi] master loadeddata ${streamsMaster.videoWidth}x${streamsMaster.videoHeight}`);
  });
  streamsMaster.addEventListener("playing", () => {
    console.log("[multi] master playing");
  });
  streamsMaster.addEventListener("stalled", () => console.warn("[multi] master stalled"));
  // Deferred: we attach the master <video> to cell 0 AFTER the cells are
  // created (so it sits beneath that cell's canvas in the render tree at
  // full cell size — keeps the decoder active under Chrome's visibility
  // heuristics).

  for (let i = 0; i < N_STREAMS; i++) {
    const cell = document.createElement("div");
    cell.className = "stream-cell";
    const hud = document.createElement("div");
    hud.className = "stream-hud";
    const hudLeft = document.createElement("span");
    hudLeft.className = "hud-left";
    hudLeft.textContent = `Stream ${i + 1} · YOLOv8L · ${streamsTilesPerStream} devices`;
    const hudRight = document.createElement("span");
    hudRight.className = "hud-right";
    hudRight.textContent = "—.— FPS";
    hud.appendChild(hudLeft);
    hud.appendChild(hudRight);
    const c = document.createElement("canvas");
    c.width = STREAMS_SRC_W; c.height = STREAMS_CROP_H;
    const loading = document.createElement("div");
    loading.className = "stream-loading";
    const spinner = document.createElement("div");
    spinner.className = "tile-spinner";
    const msg = document.createElement("div");
    msg.textContent = "Loading stream…";
    loading.appendChild(spinner);
    loading.appendChild(msg);
    // Attach the master <video> to cell 0, beneath that cell's canvas.
    // Canvas sits at z-index:1 via its .stream-cell canvas rule; the video
    // lives at z-index:0 as a full-size, opaque-black backdrop that the
    // drawImage loop reads from. Keeps the decoder active because the
    // element is in a visible render subtree at real size.
    if (i === 0 && streamsMaster) {
      cell.appendChild(streamsMaster);
    }
    cell.appendChild(c);
    cell.appendChild(hud);
    cell.appendChild(loading);
    grid.appendChild(cell);
    streamsCanvases.push(c);
    streamsCtxs.push(c.getContext("2d"));
    streamsDetsBuffers.push(new Map());
    streamsLatestDets.push(null);
    streamsHudLeftEls.push(hudLeft);
    streamsHudRightEls.push(hudRight);
    streamsLoadingEls.push(loading);
    streamsFirstFrameSeen.push(false);
    streamsFps.push(0);
  }
}

function openStreamsDetsStream() {
  if (streamsDetsSSE) { try { streamsDetsSSE.close(); } catch (_e) {} }
  streamsDetsSSE = new EventSource(`${location.origin}/dets`);
  streamsDetsSSE.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch (_e) { return; }
    if (!msg || msg.k !== "dets") return;
    _markDetsArrival(msg.fps);
    const sid = (msg.stream_id | 0);
    if (sid < 0 || sid >= N_STREAMS) return;
    const key = _frameKey(msg.frame_id | 0);
    streamsDetsBuffers[sid].set(key, {
      boxes: msg.boxes || [],
      scores: msg.scores || [],
      cls: msg.cls || [],
    });
    if (typeof msg.fps === "number" && isFinite(msg.fps) && msg.fps >= 0) {
      streamsFps[sid] = msg.fps;
      const el = streamsHudRightEls[sid];
      if (el) el.textContent = `${msg.fps.toFixed(1)} FPS`;
    }
  };
  streamsDetsSSE.onerror = () => { console.warn("[dets-multi] SSE error (auto-reconnect)"); };
}

function closeStreamsDetsStream() {
  if (streamsDetsSSE) { try { streamsDetsSSE.close(); } catch (_e) {} }
  streamsDetsSSE = null;
  for (const b of streamsDetsBuffers) b.clear();
}

function _streamDetsForFrame(sid, frameId) {
  const buf = streamsDetsBuffers[sid];
  if (!buf) return null;
  if (buf.has(frameId)) return buf.get(frameId);
  let best = -1;
  for (const k of buf.keys()) if (k <= frameId && k > best) best = k;
  if (best < 0 && totalFrames > 0 && buf.size > 0) {
    for (const k of buf.keys()) if (k > best) best = k;
  }
  return best >= 0 ? buf.get(best) : null;
}

function _drawStreamBoxes(sid) {
  // Canvas already holds the current master frame -- DO NOT clear here, or
  // we'd erase the video. Just stroke boxes on top.
  const ctx = streamsCtxs[sid];
  const canvas = streamsCanvases[sid];
  const d = streamsLatestDets[sid];
  if (!ctx || !canvas || !d || !d.boxes || !d.boxes.length) return;
  const sw = canvas.width;
  const lw = Math.max(2, Math.round(sw / 400));
  const fontPx = Math.max(14, Math.round(sw / 60));
  ctx.lineWidth = lw;
  ctx.font = `${fontPx}px ui-monospace, monospace`;
  const { boxes, scores, cls } = d;
  for (let i = 0; i < boxes.length; i++) {
    const [bx1, by1, bx2, by2] = boxes[i];
    // Boxes are in 1280x1280 source-frame coordinates. We cropped the top
    // STREAMS_CROP_Y rows off, so shift y by that offset. Drop any box that
    // lies entirely inside the cropped-out bar.
    const y1 = by1 - STREAMS_CROP_Y;
    const y2 = by2 - STREAMS_CROP_Y;
    if (y2 <= 0 || y1 >= STREAMS_CROP_H) continue;
    const x1 = bx1;
    const x2 = bx2;
    const c = cls ? cls[i] : 0;
    const sc = scores ? scores[i] : 0;
    ctx.strokeStyle = "rgba(124, 92, 255, 0.95)";
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
    const label = `${COCO[c] || c} ${(sc * 100).toFixed(0)}%`;
    const tw = ctx.measureText(label).width + 8;
    const lh = fontPx + 4;
    ctx.fillStyle = "rgba(124, 92, 255, 0.85)";
    ctx.fillRect(x1, Math.max(0, y1 - lh), tw, lh);
    ctx.fillStyle = "#fff";
    ctx.fillText(label, x1 + 4, Math.max(fontPx, y1 - 4));
  }
}

// Last frame_id observed by rVFC (if available). rAF loop reads this to
// align dets with the current video frame. When rVFC is unavailable we fall
// back to currentTime * fps.
let _streamsLastFid = 0;
let _streamsRafHandle = null;

function _streamsDrawLoop() {
  if (currentMode !== "multi" || !streamsMaster) { _streamsRafHandle = null; return; }
  const master = streamsMaster;
  const ready = master.readyState >= 2 && master.videoWidth > 0;
  let fid = _streamsLastFid;
  if (ready && totalFrames > 0 && negotiatedFps > 0) {
    const localIdx = Math.round((master.currentTime || 0) * negotiatedFps);
    fid = ((localIdx % totalFrames) + totalFrames) % totalFrames;
  }
  for (let s = 0; s < N_STREAMS; s++) {
    const ctx = streamsCtxs[s];
    const canvas = streamsCanvases[s];
    if (!ctx || !canvas) continue;
    if (ready) {
      // 9-arg drawImage: crop source rect (skip gray bars) -> full canvas.
      try {
        ctx.drawImage(
          master,
          0, STREAMS_CROP_Y, STREAMS_SRC_W, STREAMS_CROP_H,
          0, 0, canvas.width, canvas.height,
        );
      } catch (_e) {}
      if (!streamsFirstFrameSeen[s]) {
        streamsFirstFrameSeen[s] = true;
        const lo = streamsLoadingEls[s];
        if (lo) lo.classList.add("hidden");
      }
      const d = _streamDetsForFrame(s, fid);
      if (d) streamsLatestDets[s] = d;
      _drawStreamBoxes(s);
    } else {
      // Master stalled/loading: blank the tile (video frame + boxes) so we
      // don't show stale boxes floating over a black canvas.
      try { ctx.clearRect(0, 0, canvas.width, canvas.height); } catch (_e) {}
      streamsLatestDets[s] = null;
    }
  }
  _streamsRafHandle = requestAnimationFrame(_streamsDrawLoop);
}

// rVFC tick — purely tracks the current frame_id so dets line up precisely
// with the decoded frame. Never does drawing itself (rAF loop handles that)
// so a throttled rVFC can't stall the visual.
function _onMasterFrame(_now, metadata) {
  if (currentMode !== "multi" || !streamsMaster) return;
  if (totalFrames > 0 && negotiatedFps > 0 && metadata && typeof metadata.mediaTime === "number") {
    const localIdx = Math.round(metadata.mediaTime * negotiatedFps);
    _streamsLastFid = ((localIdx % totalFrames) + totalFrames) % totalFrames;
  } else if (metadata && typeof metadata.presentedFrames === "number") {
    _streamsLastFid = (metadata.presentedFrames | 0) - 1;
  }
  if (typeof streamsMaster.requestVideoFrameCallback === "function") {
    streamsRvfcHandle = streamsMaster.requestVideoFrameCallback(_onMasterFrame);
  }
}

function cancelStreamsRvfc() {
  if (streamsRvfcHandle && streamsMaster && typeof streamsMaster.cancelVideoFrameCallback === "function") {
    try { streamsMaster.cancelVideoFrameCallback(streamsRvfcHandle); } catch (_e) {}
  }
  streamsRvfcHandle = null;
  if (_streamsRafHandle) { try { cancelAnimationFrame(_streamsRafHandle); } catch (_e) {} }
  _streamsRafHandle = null;
}

async function startStreams() {
  showSwitch("Starting Streams transport…");
  teardown();
  const status = await postSource("multi", 0, 0);
  if (!status.ok) { hideSwitch(); toast("supervisor failed to start multi-stream pipeline"); return; }
  negotiatedW = status.frame_w; negotiatedH = status.frame_h;
  lastGrid = gridFor(negotiatedW, negotiatedH);
  const nStreams = status.n_streams || N_STREAMS;
  const tps = status.tiles_per_stream || 4;
  streamsTilesPerStream = tps;
  updateMeta(status, `${nStreams} streams × ${tps} tiles → ${status.n_tiles} devices`);
  showSwitch("Loading stream video…");

  buildStreamsGrid(true);
  document.querySelector("main").classList.add("streams-mode");
  for (let i = 0; i < N_STREAMS; i++) {
    // Canvas internal size matches the cropped content area, NOT the raw
    // 1280x1280 frame — the drawImage call above crops the gray bars.
    streamsCanvases[i].width = STREAMS_SRC_W;
    streamsCanvases[i].height = STREAMS_CROP_H;
    if (streamsHudLeftEls[i]) {
      streamsHudLeftEls[i].textContent = `Stream ${i + 1} · YOLOv8L · ${tps} devices`;
    }
    if (streamsHudRightEls[i]) {
      streamsHudRightEls[i].textContent = "—.— FPS";
    }
    streamsFirstFrameSeen[i] = false;
    if (streamsLoadingEls[i]) streamsLoadingEls[i].classList.remove("hidden");
  }
  // Pre-flight: confirm /source.mp4 is reachable BEFORE binding to the video
  // element. If the pipeline is still warming up (trace capture, mesh lock
  // release), we retry a few times with backoff so we don't poison the
  // <video> element with a cached 404.
  const srcUrl = `${location.origin}/source.mp4?t=${Date.now()}`;
  let probeOk = false;
  for (let attempt = 0; attempt < 10; attempt++) {
    try {
      const pr = await fetch(srcUrl, { method: "HEAD", cache: "no-store" });
      if (pr.ok) { probeOk = true; break; }
      console.warn(`[multi] /source.mp4 probe attempt ${attempt+1}: status=${pr.status}`);
    } catch (e) {
      console.warn(`[multi] /source.mp4 probe attempt ${attempt+1} threw:`, e && e.message);
    }
    await new Promise(r => setTimeout(r, 500));
  }
  if (!probeOk) {
    hideSwitch();
    toast("pipeline did not serve /source.mp4 after 5s — check supervisor logs");
    return;
  }
  // Clear any poisoned state on the element before re-assigning (browsers
  // cache a NETWORK/SRC_NOT_SUPPORTED error on media elements across src
  // changes unless we explicitly blank+load first).
  streamsMaster.removeAttribute("src");
  streamsMaster.load();
  streamsMaster.src = srcUrl;
  streamsMaster.load();
  try {
    await streamsMaster.play();
  } catch (e) {
    console.warn("[multi] master play() rejected:", e && e.message);
    // Autoplay policy can block the first play() even though muted=true.
    // Retry once after a short delay; if that still fails, surface it.
    await new Promise(r => setTimeout(r, 250));
    try { await streamsMaster.play(); }
    catch (e2) { toast("browser blocked autoplay: click anywhere to start"); console.warn("[multi] retry failed:", e2 && e2.message); }
  }
  // Click-anywhere-to-play: if autoplay got blocked, a single click on the
  // grid unblocks playback. Registered once; the handler removes itself
  // after the first successful play().
  const _onGridClick = () => {
    if (!streamsMaster) return;
    streamsMaster.play().then(() => {
      document.getElementById("streamsGrid").removeEventListener("click", _onGridClick);
    }).catch(() => {});
  };
  document.getElementById("streamsGrid").addEventListener("click", _onGridClick);
  // Watchdog: if the master isn't reporting HAVE_CURRENT_DATA after 3s,
  // surface its state to the console so the user can see what's wrong.
  setTimeout(() => {
    if (!streamsMaster) return;
    const m = streamsMaster;
    console.log(
      `[multi] master state: readyState=${m.readyState} ` +
      `videoWidth=${m.videoWidth} videoHeight=${m.videoHeight} ` +
      `currentTime=${m.currentTime.toFixed(2)} paused=${m.paused} ` +
      `error=${m.error && m.error.code} networkState=${m.networkState}`
    );
  }, 3000);
  await new Promise((res) => {
    const done = () => {
      streamsMaster.removeEventListener("loadeddata", done);
      streamsMaster.removeEventListener("playing", done);
      res();
    };
    streamsMaster.addEventListener("loadeddata", done, { once: true });
    streamsMaster.addEventListener("playing", done, { once: true });
    setTimeout(res, 8000);
  });

  openStreamsDetsStream();
  // rAF draws continuously (fires even if autoplay is throttled / rVFC
  // never runs). rVFC, when available, only updates the frame_id so dets
  // overlay aligns to the decoded frame.
  _streamsRafHandle = requestAnimationFrame(_streamsDrawLoop);
  if (typeof streamsMaster.requestVideoFrameCallback === "function") {
    streamsRvfcHandle = streamsMaster.requestVideoFrameCallback(_onMasterFrame);
  }
  hideSwitch();
}

function teardownStreams() {
  cancelStreamsRvfc();
  closeStreamsDetsStream();
  if (streamsMaster) {
    try { streamsMaster.pause(); } catch (_e) {}
    try { streamsMaster.removeAttribute("src"); streamsMaster.load(); } catch (_e) {}
  }
  for (let i = 0; i < streamsCanvases.length; i++) {
    streamsLatestDets[i] = null;
    if (streamsCtxs[i] && streamsCanvases[i]) {
      streamsCtxs[i].clearRect(0, 0, streamsCanvases[i].width, streamsCanvases[i].height);
    }
  }
  const mainEl2 = document.querySelector("main");
  if (mainEl2) mainEl2.classList.remove("streams-mode");
}

async function fetchStatus() {
  try {
    const r = await fetch(`${SUPERVISOR}/api/status`, { cache: "no-store" });
    if (!r.ok) return null;
    return r.json();
  } catch (_e) { return null; }
}

(async function bootstrap() {
  setActiveSeg("video", false);
  rafLoop();
  overlayLoop();

  // Seed the tile preview + meta panel from the supervisor BEFORE we kick off
  // any WebRTC. So a refresh-in-the-middle still shows "24 tiles -> 24 devices"
  // immediately, and the user sees the grid even while the trace is warming up.
  const status0 = await fetchStatus();
  if (status0 && status0.transport && status0.transport !== "idle") {
    const deliv = status0.transport === "video"
      ? "native MP4 + dets over SSE"
      : status0.transport === "multi"
      ? `${status0.n_streams || 8} streams × ${status0.tiles_per_stream || 4} tiles`
      : "data_only (boxes over data channel)";
    updateMeta(status0, deliv);
  }

  const saved = localStorage.getItem("ttdemo.mode");
  const validModes = ["camera", "video", "multi"];
  let initial = "video";
  if (validModes.includes(saved)) initial = saved;
  else if (status0 && validModes.includes(status0.transport)) initial = status0.transport;
  currentMode = (initial === "video") ? "camera" : "video"; // force selectMode to switch
  await selectMode(initial);
})();
</script>
</body>
