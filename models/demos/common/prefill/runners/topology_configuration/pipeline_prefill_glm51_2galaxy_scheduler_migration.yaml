# GLM-5.1 across TWO 8x4 galaxies — Stage 4: REAL scheduler drives the loopback migration.
#
# Difference from the self-test binding: NO PREFILL_MIGRATION_SELFTEST. The runner publishes the merged
# table + waits WORKER_READY, then runs the request loop; the C++ prefill_scheduler_driver (Terminal C)
# feeds the tokens AND issues the migrate(slot0->slot1). ENABLE_MIGRATION=1 wires the table publish.
#
# NOTE: with no self-test there is NO automatic dst==src verify on multi-rank — Stage 4 validates the
# SCHEDULER INTEGRATION (driver feeds H2D + reads router-aggregated acks + issues the migrate). The
# migration COPY correctness is still governed by the merged-table address math (the bisect bug); the
# golden PCC below only confirms the prefill (src), not the migrated dst.
#
# REQUIRES a migration_endpoint on BOTH hosts (endpoint id 1) + the tt-metal branch.
#
# Launch (runner):
#   ./models/demos/common/prefill/runners/run_pipeline_prefill.sh \
#     models/demos/common/prefill/runners/topology_configuration/pipeline_prefill_glm51_2galaxy_scheduler_migration.yaml \
#     bh-glx-110-c09u14:1,bh-glx-110-c09u20:1

rank_bindings:
  - {rank: 0, mesh_id: 0, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 1, mesh_id: 1, mesh_host_rank: 0, env_overrides: {}}

mesh_graph_desc_path: models/demos/common/prefill/runners/topology_configuration/pipeline_prefill_2galaxy_connected_mesh_graph_descriptor.textproto

global_env:
  PREFILL_MANIFEST: "models/demos/deepseek_v3_d_p/tt/runners/manifests/glm51.json"

  PREFILL_FABRIC_MODE: "2d"
  PREFILL_NUM_LAYERS: "78"
  PREFILL_CHUNK_SIZE: "5120"
  PREFILL_MAX_SEQ_LEN: "56320"
  PREFILL_NUM_USERS: "2"            # src (slot 0) + dst (slot 1); scheduler --max-users must be >= 2
  PREFILL_SP: "8"
  PREFILL_TP: "4"
  PREFILL_H2D_SERVICE_ID: "ds_prefill"
  PREFILL_GATE_FALLBACK_MODE: "DEVICE_FP32"

  # Migration wired (table publish + endpoint), but the SCHEDULER drives the migrate (no self-test).
  PREFILL_ENABLE_MIGRATION: "1"
  PREFILL_LAYER_ACK_D2H: "1"
  PREFILL_MIGRATION_CMD_QUEUE: "/mig_ep1_cmd"
  PREFILL_MIGRATION_TABLE_QUEUE: "/mig_ep1_table"
  PREFILL_MIGRATION_RESP_QUEUE: "/mig_ep1_resp"
  PREFILL_MIGRATION_GRANULARITY: "layerwise"
  PREFILL_MIGRATION_CLIENT_DIR: "/data/yeongyun/tt-llm-engine/disaggregation/migration/build_RelWithDebInfo/python"

  # Golden KV PCC on the request-loop output (confirms prefill/src only).
  PREFILL_REQUEST_LOOP_PCC: "1"
  DEEPSEEK_PREFILL_TRACE_DIR: "/mnt/models/deepseek-prefill-cache/golden/structured_traces/glm_51_code_debug_55k_vllm"
  PREFILL_STANDALONE_CHUNKED_PCC: "0.8"
