rank_bindings:
  - {rank: 0, mesh_id: 0, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 1, mesh_id: 1, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 2, mesh_id: 2, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 3, mesh_id: 3, mesh_host_rank: 0, env_overrides: {}}

mesh_graph_desc_path: models/demos/common/prefill/runners/topology_configuration/pipeline_prefill_4galaxy_connected_mesh_graph_descriptor.textproto

global_env:
  PREFILL_MANIFEST: "models/demos/deepseek_v3_d_p/tt/runners/manifests/glm51.json"

  PREFILL_FABRIC_MODE: "2d"
  PREFILL_NUM_LAYERS: "78"
  PREFILL_CHUNK_SIZE: "5120"
  PREFILL_MAX_SEQ_LEN: "56320"
  PREFILL_NUM_USERS: "4"            # src (slot 0) + dst (slot 1); scheduler --max-users must be >= 2
  PREFILL_SP: "8"
  PREFILL_TP: "4"
  PREFILL_H2D_SERVICE_ID: "ds_prefill"
  PREFILL_GATE_FALLBACK_MODE: "DEVICE_FP32"

  # Migration wired (table publish + endpoint), but the SCHEDULER drives the migrate (no self-test).
  PREFILL_ENABLE_MIGRATION: "1"
  PREFILL_LAYER_ACK_D2H: "1"
  PREFILL_MIGRATION_CMD_QUEUE: "/mig_ep1_cmd"
  PREFILL_MIGRATION_TABLE_QUEUE: "/mig_ep1_table"
  PREFILL_MIGRATION_RESP_QUEUE: "/mig_ep1_resp"
  PREFILL_MIGRATION_GRANULARITY: "layerwise"
  PREFILL_MIGRATION_CLIENT_DIR: "/data/yeongyun/tt-llm-engine/disaggregation/migration/build_RelWithDebInfo/python"

  # src==dst migration verify: after the loop, each rank waits for the driver's DONE sentinel (it
  # carries the migrated src->dst pairs), then PCCs dst==src on its layer slice (validate_after_prefill
  # -> validate_migrations_pairwise). PAIRWISE=1 selects the dst==src comparison.
  PREFILL_VALIDATE_MIGRATION: "1"
  PREFILL_MIGRATE_PAIRWISE: "1"
  # WARNING: every rank waits for this sentinel, but /tmp is HOST-LOCAL — the driver writes it only on
  # rank 0's host, so ranks 1..3 would time out. For multi-host, point this at a filesystem shared by
  # all hosts (NFS), and set the SAME path on the driver (Terminal C). e.g. a shared scratch dir.
  MIGRATION_DONE_FILE: "/data/yeongyun/disagg_run/migration_done.sentinel"

  # Golden KV PCC on the request-loop output (confirms prefill/src only; runs BEFORE the migrate).
  PREFILL_REQUEST_LOOP_PCC: "1"
  DEEPSEEK_PREFILL_TRACE_DIR: "/mnt/models/deepseek-prefill-cache/golden/structured_traces/glm_51_code_debug_55k_vllm"
  PREFILL_STANDALONE_CHUNKED_PCC: "0.8"
