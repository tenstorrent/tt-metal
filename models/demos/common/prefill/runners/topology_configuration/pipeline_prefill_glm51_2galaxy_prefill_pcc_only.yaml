# GLM-5.1 across TWO 8x4 galaxies — BISECT binding: plain pipelined prefill + per-rank golden PCC,
# with NO D2H LayerAck and NO migration. Isolates whether the pipelined PREFILL itself produces wrong
# KV at depth, vs the D2H-ack/migration path corrupting it.
#
#   * If the golden PCC is CLEAN here (>=0.85/layer like single-rank) but collapses when
#     PREFILL_LAYER_ACK_D2H=1 / migration is on -> the ack/migration path corrupts prefill.
#   * If it STILL collapses (~10 good layers/stage, then drops) -> the pipelined prefill is broken
#     independent of ack/migration.
#
# 78 layers split 39/39 across ranks 0->1. Request mode: producer feeds rank 0's host. No endpoint.
#
# Launch:
#   ./models/demos/common/prefill/runners/run_pipeline_prefill.sh \
#     models/demos/common/prefill/runners/topology_configuration/pipeline_prefill_glm51_2galaxy_prefill_pcc_only.yaml \
#     bh-glx-110-c09u14:1,bh-glx-110-c09u20:1

rank_bindings:
  - {rank: 0, mesh_id: 0, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 1, mesh_id: 1, mesh_host_rank: 0, env_overrides: {}}

mesh_graph_desc_path: models/demos/common/prefill/runners/topology_configuration/pipeline_prefill_2galaxy_connected_mesh_graph_descriptor.textproto

global_env:
  PREFILL_MANIFEST: "models/demos/deepseek_v3_d_p/tt/runners/manifests/glm51.json"

  PREFILL_FABRIC_MODE: "2d"
  PREFILL_NUM_LAYERS: "78"          # split 39/39 across the 2 ranks
  PREFILL_CHUNK_SIZE: "5120"
  PREFILL_MAX_SEQ_LEN: "56320"
  PREFILL_NUM_USERS: "1"
  PREFILL_SP: "8"
  PREFILL_TP: "4"
  PREFILL_H2D_SERVICE_ID: "ds_prefill"
  PREFILL_GATE_FALLBACK_MODE: "DEVICE_FP32"

  # Truly plain prefill: NO migration, NO D2H device emission, NO ack feed (PREFILL_ENABLE_LAYER_ACK,
  # PREFILL_LAYER_ACK_D2H, PREFILL_ENABLE_MIGRATION all UNSET). Multi-rank still builds the router +
  # ack channel, but the producer SKIPS the drain via PREFILL_PRODUCER_ACK_DRAIN=0 (set on the producer
  # command), so nothing blocks and the shutdown sentinel fires right after the last chunk.

  # Per-rank golden KV PCC on the request-loop output.
  PREFILL_REQUEST_LOOP_PCC: "1"
  DEEPSEEK_PREFILL_TRACE_DIR: "/mnt/models/deepseek-prefill-cache/golden/structured_traces/glm_51_code_debug_55k_vllm"
  PREFILL_STANDALONE_CHUNKED_PCC: "0.8"
