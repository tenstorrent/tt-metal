# GLM-5.1 across TWO 8x4 galaxies — Stage 1 (pipelined prefill + per-rank golden PCC) AND
# Stage 2 (D2H multi-host LayerAck), no migration yet. De-risks fabric/topology before 4 galaxies.
#
# REQUIRES the tt-metal branch `yeongyun/layer-ack-d2h-multi-host` (D2H LayerAck router).
#
# 78 layers split 39/39 across ranks 0->1 (D2D between the two galaxies). Request mode: rank 0 builds
# the H2D service; feed it with prefill_producer.py on rank 0's HOST.
#   * Stage 1 gate: each rank prints [kv-pcc] for its slice (rank0 global 0..38, rank1 global 39..77).
#   * Stage 2 gate: the producer's _drain_layer_acks reaches chunks * 78 (router aggregated both ranks).
#
# Launch (host order = cabling chain: mesh 0 -> first --host, mesh 1 -> second):
#   ./models/demos/common/prefill/runners/run_pipeline_prefill.sh \
#     models/demos/common/prefill/runners/topology_configuration/pipeline_prefill_glm51_2galaxy_pcc_ack.yaml \
#     <h0>:1,<h1>:1

rank_bindings:
  - {rank: 0, mesh_id: 0, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 1, mesh_id: 1, mesh_host_rank: 0, env_overrides: {}}

mesh_graph_desc_path: models/demos/common/prefill/runners/topology_configuration/pipeline_prefill_2galaxy_connected_mesh_graph_descriptor.textproto

global_env:
  PREFILL_MANIFEST: "models/demos/deepseek_v3_d_p/tt/runners/manifests/glm51.json"

  # Topology / transport (must match the producer's env).
  PREFILL_FABRIC_MODE: "2d"
  PREFILL_NUM_LAYERS: "78"          # split 39/39 across the 2 ranks
  PREFILL_CHUNK_SIZE: "5120"
  PREFILL_MAX_SEQ_LEN: "56320"
  PREFILL_NUM_USERS: "2"
  PREFILL_SP: "8"
  PREFILL_TP: "4"
  PREFILL_H2D_SERVICE_ID: "ds_prefill"
  PREFILL_GATE_FALLBACK_MODE: "DEVICE_FP32"

  # Stage 2 — D2H multi-host LayerAck (no migration). Router aggregates rank 1 -> rank 0 via MPI and
  # injects the single scheduler counter channel. ENABLE_LAYER_ACK forces the ack path on without
  # migration (its usual trigger); LAYER_ACK_D2H switches the completion source to device records.
  PREFILL_ENABLE_MIGRATION: "0"
  PREFILL_ENABLE_LAYER_ACK: "1"
  PREFILL_LAYER_ACK_D2H: "1"

  # Stage 1 — per-rank golden KV PCC after the loop.
  PREFILL_REQUEST_LOOP_PCC: "1"
  DEEPSEEK_PREFILL_TRACE_DIR: "/mnt/models/deepseek-prefill-cache/golden/structured_traces/glm_51_code_debug_55k_vllm"
  PREFILL_STANDALONE_CHUNKED_PCC: "0.8"
