# GLM-5.1 across FOUR 8x4 galaxies — BOTH:
#   (1) Pipelined prefill (78 layers split 20/20/19/19 across ranks 0->1->2->3, D2D between galaxies).
#   (2) Migration-layer LOOPBACK test (prefill slot->slot copy) driven by the built-in self-test.
#
# REQUIRES the tt-metal branch `yeongyun/layer-ack-d2h-multi-host` in this checkout (D2H LayerAck
# router + merged multi-rank KV chunk table + per-rank device-map delivery). Won't do migration on
# plain glm-5-1-setup.
#
# Pieces (see the runbook):
#   * D2H LayerAck (PREFILL_LAYER_ACK_D2H=1): each rank emits per-layer device records; the router
#     MPI-forwards to rank 0 and injects the single scheduler counter channel.
#   * Merged table + migration (PREFILL_MIGRATION_SELFTEST=1): rank 0 publishes the 4-galaxy-spanning
#     table; the runner self-drives one migrate (slot 0 -> slot 1) + slot==slot verify. No external
#     scheduler needed for this bring-up step (swap it in once this passes).
#   * Per-rank golden PCC (PREFILL_REQUEST_LOOP_PCC=1): each rank PCCs its layer slice vs the golden.
#
# Launch (host order = cabling chain: mesh 0 -> first --host ... mesh 3 -> last):
#   ./models/demos/common/prefill/runners/run_pipeline_prefill.sh \
#     models/demos/common/prefill/runners/topology_configuration/pipeline_prefill_glm51_4galaxy_loopback_migration.yaml \
#     <h0>:1,<h1>:1,<h2>:1,<h3>:1
# ...with a migration_endpoint already up on EACH host (launch_migration_endpoints.sh, endpoint id 1),
# and the producer feeding rank 0's host.

rank_bindings:
  - {rank: 0, mesh_id: 0, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 1, mesh_id: 1, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 2, mesh_id: 2, mesh_host_rank: 0, env_overrides: {}}
  - {rank: 3, mesh_id: 3, mesh_host_rank: 0, env_overrides: {}}

mesh_graph_desc_path: models/demos/common/prefill/runners/topology_configuration/pipeline_prefill_4galaxy_connected_mesh_graph_descriptor.textproto

global_env:
  PREFILL_MANIFEST: "models/demos/deepseek_v3_d_p/tt/runners/manifests/glm51.json"

  # Topology / transport (must match the producer's env).
  PREFILL_FABRIC_MODE: "2d"
  PREFILL_NUM_LAYERS: "78"          # split 20/20/19/19 across the 4 ranks
  PREFILL_CHUNK_SIZE: "5120"
  PREFILL_MAX_SEQ_LEN: "56320"
  PREFILL_NUM_USERS: "2"            # loopback needs a src (slot 0) + dst (slot 1)
  PREFILL_SP: "8"
  PREFILL_TP: "4"
  PREFILL_H2D_SERVICE_ID: "ds_prefill"
  PREFILL_GATE_FALLBACK_MODE: "DEVICE_FP32"

  # (2) Migration loopback self-test + D2H LayerAck.
  PREFILL_MIGRATION_SELFTEST: "1"   # self-driven migrate(slot0->slot1) + slot==slot verify; implies table publish
  PREFILL_ENABLE_LAYER_ACK: "1"
  PREFILL_LAYER_ACK_D2H: "1"        # device-record completion source -> router -> counter channel
  # Worker shmem queue names — MUST match the migration_endpoint (launch_migration_endpoints.sh
  # --prefill_endpoint_id 1 uses the /mig_ep1_* names).
  PREFILL_MIGRATION_CMD_QUEUE: "/mig_ep1_cmd"
  PREFILL_MIGRATION_TABLE_QUEUE: "/mig_ep1_table"
  PREFILL_MIGRATION_RESP_QUEUE: "/mig_ep1_resp"
  PREFILL_MIGRATION_GRANULARITY: "layerwise"
  # Migration client .so dir. MUST be in global_env (ttrun does NOT forward shell PREFILL_*), and must
  # exist at this same absolute path on ALL 4 hosts (NFS-shared or rsync'd).
  PREFILL_MIGRATION_CLIENT_DIR: "/data/yeongyun/tt-llm-engine/disaggregation/migration/build_RelWithDebInfo/python"

  # (1) Per-rank golden KV PCC after the loop.
  PREFILL_REQUEST_LOOP_PCC: "1"
  DEEPSEEK_PREFILL_TRACE_DIR: "/mnt/models/deepseek-prefill-cache/golden/structured_traces/glm_51_code_debug_55k_vllm"
  PREFILL_STANDALONE_CHUNKED_PCC: "0.8"
