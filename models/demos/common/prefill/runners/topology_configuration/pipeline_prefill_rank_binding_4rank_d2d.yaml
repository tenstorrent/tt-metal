# tt-run rank binding for the 4-rank pipeline prefill over the D2D socket transport.
#
# Four 8x4 galaxies, one rank each, chained rank 0 -> 1 -> 2 -> 3 by inter-galaxy MeshSockets over the
# connected 4-galaxy MGD. The model's 61 layers split ~15/16/15/15 across the four ranks; the hidden
# state hops device-to-device at each boundary (no host/NFS round-trip).
#
# Launch on the 4-galaxy superpod. Host order must match the physical cabling chain (mesh 0 -> first
# --host, ... mesh 3 -> last); reorder the --host slots if a boundary's fabric fails to train:
#   ./models/demos/common/prefill/runners/run_pipeline_prefill.sh \
#     models/demos/common/prefill/runners/topology_configuration/pipeline_prefill_rank_binding_4rank_d2d.yaml \
#     bh-glx-d07u02:1,bh-glx-d07u08:1,bh-glx-d08u02:1,bh-glx-d08u08:1

rank_bindings:
  - rank: 0
    mesh_id: 0
    mesh_host_rank: 0
    env_overrides: {}
  - rank: 1
    mesh_id: 1
    mesh_host_rank: 0
    env_overrides: {}
  - rank: 2
    mesh_id: 2
    mesh_host_rank: 0
    env_overrides: {}
  - rank: 3
    mesh_id: 3
    mesh_host_rank: 0
    env_overrides: {}

# Connected 4x 8x4 BH-galaxy MGD: inter-galaxy links 0<->1<->2<->3.
mesh_graph_desc_path: models/demos/common/prefill/runners/topology_configuration/pipeline_prefill_4galaxy_connected_mesh_graph_descriptor.textproto

global_env:
  # Default to INFO so ttnn per-op DEBUG logging stays off the host dispatch path. Must live in
  # global_env (ttrun forwards it to every rank before loguru is imported), not the manifest
  # (applied at runtime, after loguru has already read its level).
  LOGURU_LEVEL: "INFO"
  # Model config (PREFILL_MODEL + model-specific knobs) lives in a per-model manifest, applied via
  # setdefault before the runner's env reads. This binding stays model-agnostic: point PREFILL_MANIFEST
  # at any model's manifest to run it on this topology. ttrun does not propagate shell PREFILL_*, so
  # the manifest path (like the rest of global_env) must live here.
  PREFILL_MANIFEST: "models/demos/deepseek_v3_d_p/tt/runners/manifests/kimi.json"
  PREFILL_STANDALONE: "1"   # standalone bring-up/pipeline mode, not the production request loop
  PREFILL_FABRIC_MODE: "2d"   # D2D pipeline transport needs FABRIC_2D
  PREFILL_STANDALONE_PCC: "0"
  PREFILL_STANDALONE_NCHUNKS: "11"
