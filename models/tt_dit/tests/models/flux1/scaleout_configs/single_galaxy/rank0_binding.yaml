# Single rank owning the 4x2 (8-device) block of one BH galaxy. Device ids match the proven
# connected block used by the DeepSeek one_galaxy rank0 binding.
rank_bindings:
- rank: 0
  mesh_id: 0
  mesh_host_rank: 0
  env_overrides:
    TT_VISIBLE_DEVICES: 0,1,4,5,8,9,12,13
# Repo-relative path (resolved against --wdir=$TT_METAL_HOME on every host) so the descriptor is
# found at test runtime on the worker, not just in the launcher's CWD.
mesh_graph_desc_path: models/tt_dit/tests/models/flux1/scaleout_configs/single_galaxy/mesh_graph_descriptor.textproto
