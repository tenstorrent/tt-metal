  # reserved region until the runtime validates high-water marks across all live
  # traces (#48869). Values carried over from main.
  llama3.3-70b-galaxy:
    aliases: ["llama3.3-70b-galaxy"]
    skus:
      wh_galaxy_perf:
        trace_region_size: 216580672
