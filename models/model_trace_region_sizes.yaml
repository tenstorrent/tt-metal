version: 1
description: |
  Centralized trace region size exceptions (bytes) for models CI.
  Unconfigured (model, SKU) pairs default to dynamic allocation (trace_region_size=0).
  Only add an entry when a model needs a fixed reserved trace region — see #47574.
sizes:
  unet-3d:
    aliases: ["unet-3d", "shallow-unet"]
    skus:
      wh_n150:
        # Small fixed region required for single-device UNet trace on N150.
        trace_region_size: 679936

  llama3.3-70b-galaxy:
    aliases: ["llama3.3-70b-galaxy"]
    skus:
      wh_galaxy_perf:
        trace_region_size: 216580672

  llama3.3-70b-galaxy-decode:
    aliases: ["llama3.3-70b-galaxy-decode"]
    skus:
      wh_galaxy_perf:
        trace_region_size: 23887872

  llama3.3-70b-galaxy-qwen:
    aliases: ["llama3.3-70b-galaxy-qwen"]
    skus:
      wh_galaxy_perf:
        trace_region_size: 184915840

  qwen3-32b-galaxy:
    aliases: ["qwen3-32b-galaxy"]
    skus:
      wh_galaxy_perf:
        trace_region_size: 102000000

  qwen3-32b-galaxy-decode:
    aliases: ["qwen3-32b-galaxy-decode"]
    skus:
      wh_galaxy_perf:
        trace_region_size: 12726272
