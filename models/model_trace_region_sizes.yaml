version: 1
description: |
  Centralized trace region size exceptions (bytes) for models CI.
  Unconfigured (model, SKU) pairs default to dynamic allocation (trace_region_size=0).
  Only the Galaxy (wh_galaxy_perf) model configs that regressed under dynamic
  allocation are pinned here. See #47574 / #49072.
sizes:
