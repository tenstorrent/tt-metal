# Trace Selection Registry
#
# This file controls which op configurations get reconstructed from the database
#
# There are two sections:
#
#   targets   - what to reconstruct (edited by you)
#   registry  - log of every trace loaded into the DB (auto-appended on load)
#
# -- TARGETS ------------------------------------------------------------------
#
# Two scope groups (driven by CI): lead_models and model_traced.
#
# Each entry lists:
#   model: [name, ...]   which models to include (must match model_name in the DB)
#   trace: [N, M, ...]   which trace IDs to pull from (pinned; skips registry lookup)
#
# Only configs belonging to the listed models are reconstructed from each trace.
# If a trace contains 20 models but you list only [whisper], you get whisper only.
#
# Omitting trace: causes each model to auto-resolve to its latest active trace
# from the registry below (useful when you always want the newest data).
#
# Reconstruct from the command line:
#   python tests/sweep_framework/load_ttnn_ops_data_v2.py reconstruct-manifest \
#       model_tracer/trace_selection_registry.yaml \
#       model_tracer/traced_operations/ttnn_operations_lead_models.json \
#       lead_models
#   python tests/sweep_framework/load_ttnn_ops_data_v2.py reconstruct-manifest \
#       model_tracer/trace_selection_registry.yaml \
#       model_tracer/traced_operations/ttnn_operations_model_traced.json \
#       model_traced
#
# -- REGISTRY -----------------------------------------------------------------
#
# One entry per trace loaded into the DB. Auto-appended with status: draft on load.
# Manually promote to status: active when the trace is ready for CI.
# Models lists the exact model_name values (from ttnn_ops_v5.ttnn_model) in the trace.
# See model_tracer/GUIDE.md for full CLI commands for loading


targets:
  lead_models:
    - model:
        - gpt_oss
        - wan2_2
        - deepseek_v3
      trace: [9, 15, 13]

  model_traced:
    - model:
        - efficientnetb0
        - llama-3.2-1b
        - whisper_2
        - whisper_3
      trace: [25, 17, 18, 19, 20, 28]

