# Maps MPI ranks to the mesh ids in mgd.textproto and pins each rank to a
# disjoint set of chips via TT_VISIBLE_DEVICES (UMD enumerates PCIe boards
# 0..3; each N300 board has 2 chips reachable over the on-board eth link).
#
# Rank 0 = sender   (owns board 0      -> mesh_id 0, a [1, 2] line = 2 chips).
# Rank 1 = receiver (owns boards 1,2,3 -> mesh_id 1, a [1, 6] line = 6 chips).
#
# !!! HARDWARE-SPECIFIC TEMPLATE !!!
# TT_VISIBLE_DEVICES indexes PCIe devices, not UMD chip ids. This host is four
# N300 boards = four PCIe devices (valid ids 0..3), each exposing two chips. So
# "0" = board 0 = two chips for rank 0 (a [1, 2] line) and "1,2,3" = boards
# 1+2+3 = six chips for rank 1 (a [1, 6] line). (Do NOT use chip ids 4..7 here
# -- only 0..3 are valid PCIe device ids on this machine.) The [1, 6] receiver
# line requires boards 1,2,3 to be eth-linked in a line; adjust to your machine.

rank_bindings:
  - rank: 0
    mesh_id: 0
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "0"
  - rank: 1
    mesh_id: 1
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "1,2,3"

mesh_graph_desc_path: "configurations/local8/mgd.textproto"
