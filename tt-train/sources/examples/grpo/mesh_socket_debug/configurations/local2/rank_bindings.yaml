# Maps MPI ranks to the mesh ids in mgd.textproto and pins each rank to a
# disjoint N300 board via TT_VISIBLE_DEVICES (UMD enumerates PCIe boards
# 0..3; each board has 2 chips reachable over the on-board eth link).
#
# Rank 0 = sender   (owns board 0 -> mesh_id 0).
# Rank 1 = receiver (owns board 1 -> mesh_id 1).
#
# Copied from tests/weight_transfer/configurations/local2.

rank_bindings:
  - rank: 0
    mesh_id: 0
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "0"
  - rank: 1
    mesh_id: 1
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "1"

mesh_graph_desc_path: "configurations/local2/mgd.textproto"
