# Maps MPI ranks to the mesh ids declared in mgd.textproto and pins each
# rank to a disjoint set of four chips via TT_VISIBLE_DEVICES.
#
# Rank 0 = TTML rank (GRPOTrainer driver + WeightBridge sender) -> mesh_id 0,
#          a [1, 4] DDP mesh.
# Rank 1 = TTT  rank (WeightBridge receiver) -> mesh_id 1, a [1, 4] parent
#          mesh that the example splits into four [1, 1] submeshes, one
#          TttGenerationWorker each.
#
# !!! HARDWARE-SPECIFIC TEMPLATE !!!
# TT_VISIBLE_DEVICES indexes PCIe devices, not UMD chip ids. This host is four
# N300 boards = four PCIe devices (valid ids 0..3), each board exposing two
# chips (a local chip + its eth-paired remote). So "0,1" = boards 0+1 = four
# chips for rank 0 and "2,3" = boards 2+3 = four chips for rank 1, each a
# routable [1, 4] line. (Do NOT use chip ids 4..7 here -- only 0..3 are valid
# PCIe device ids on this machine.) Adjust to your machine.

rank_bindings:
  - rank: 0
    mesh_id: 0
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "0,1"
  - rank: 1
    mesh_id: 1
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "2,3"

mesh_graph_desc_path: "configurations/local8/mgd.textproto"
