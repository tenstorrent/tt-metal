# Maps MPI ranks (0 = TTML, 1 = TTT) to mgd.textproto mesh ids, pinning each to
# a disjoint N300 board via TT_VISIBLE_DEVICES.
#
# !!! HARDWARE-SPECIFIC TEMPLATE !!!
# TT_VISIBLE_DEVICES indexes PCIe devices (0..3 here), not UMD chip ids; each
# N300 board is one PCIe device exposing two chips. Adjust to your machine.

rank_bindings:
  - rank: 0
    mesh_id: 0
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "0"
  - rank: 1
    mesh_id: 1
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "1"

mesh_graph_desc_path: "configurations/local4/mgd.textproto"
