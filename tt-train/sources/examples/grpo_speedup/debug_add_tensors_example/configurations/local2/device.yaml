# Per-rank device config consumed by ttml.common.utils.initialize_device.
# Each rank opens a mesh of this shape against the devices visible to it
# (scoped by TT_VISIBLE_DEVICES from rank_bindings.yaml).
#
# Keep mesh_shape consistent with mgd.textproto -> mesh_descriptors.M0.device_topology.
#
# [1, 4] line topology + DDP-only: ttml's ParallelismContext takes the
# is_line_topology branch (auto_context.cpp:151-180) and assigns the DDP
# axis to the non-trivial dim (length 4). Weights stay fully replicated
# across the 4 chips, which is the only configuration the WeightBridge
# currently supports (it asserts every tensor is fully replicated).

device_config:
  mesh_shape: [1, 4]
  enable_ddp: true
  enable_tp: false
