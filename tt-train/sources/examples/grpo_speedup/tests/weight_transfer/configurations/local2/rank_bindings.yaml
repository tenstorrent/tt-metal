# Maps MPI ranks to mesh ids declared in mgd.textproto, and pins each rank
# to a disjoint set of physical N300 boards via TT_VISIBLE_DEVICES.
#
# Rank 0 = TTML rank (WeightBridge sender, hosts the ttml LlamaCompositeKV).
# Rank 1 = TTT  rank (WeightBridge receiver, hosts the tt-transformers Transformer).
#
# Hardware: T3K = 4x N300 boards = 8 wormhole chips. UMD's TT_VISIBLE_DEVICES
# enumerates *PCIe boards* (valid IDs 0..3), not chips -- each board has 2
# chips (chip 0 reachable over PCIe, chip 1 reachable from chip 0 via the
# on-board eth link).
#
# Layout: each rank owns 2 boards = 4 chips, declared as a [1, 4] line mesh
# in mgd.textproto. The line snakes through the 4 chips:
#   board0-chip0 -- board1-chip0 -- board1-chip1 -- board0-chip1   (rank 0)
#   board2-chip0 -- board3-chip0 -- board3-chip1 -- board2-chip1   (rank 1)
# DDP-only: the parallelism axis is the non-trivial dim (length 4) per ttml's
# auto_context.cpp `is_line_topology` branch. The bridge asserts every
# transferred tensor is fully replicated across this axis.

rank_bindings:
  - rank: 0
    mesh_id: 0
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "0,1"
  - rank: 1
    mesh_id: 1
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "2,3"

mesh_graph_desc_path: "configurations/local2/mgd.textproto"
