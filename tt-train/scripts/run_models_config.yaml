#
# Field descriptions (per model entry):
#   name:     Display name of model
#   filename: Prefix for output files
#   binary:   Name of folder/binary under build directory
#   args:     List of args passed to model binary

models:
  - name: "NanoGPT Shakespeare"
    filename: "nanogpt"
    binary: "nano_gpt"
    args:
      - "-c"
      - "{tt-train}/configs/training_configs/training_shakespeare_nanogpt.yaml"

  - name: "NanoLlama3 Shakespeare"
    filename: "nanollama"
    binary: "nano_gpt"
    args:
      - "-c"
      - "{tt-train}/configs/training_configs/training_shakespeare_nanollama3.yaml"
