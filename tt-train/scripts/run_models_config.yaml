# Qwen
  - name: "Qwen 3 0.6B Shakespeare"
    filename: "qwen3_0.6b_shakespeare"
    binary: "${TT_METAL_RUNTIME_ROOT}/tt-train/sources/examples/nano_gpt/train_nanogpt.py"
    args:
      - "-c ${TT_METAL_RUNTIME_ROOT}/tt-train/configs/training_configs/training_shakespeare_qwen3_06b.yaml"
      - "--track_memory"
    tokenize:
      text_file: "data/shakespeare.txt"
      hf_tokenizer: "Qwen/Qwen3-0.6B"
      output_file: "data/tokenized_shakespeare_qwen3"
