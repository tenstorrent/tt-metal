#
# Field descriptions (per model entry):
#   name:     Display name of model
#   filename: Prefix for output files. Unique identifier. Changing this might affect dashboard.
#   binary:   Absolute path to the executable or Python script to run
#   args:     List of arguments passed to the configured executable or script

models:
# Python Models
  - name: "NanoGPT Shakespeare"
    filename: "nanogpt_shakespeare"
    binary: "${TT_METAL_RUNTIME_ROOT}/tt-train/sources/examples/nano_gpt/train_nanogpt.py"
    args:
      - "-c ${TT_METAL_RUNTIME_ROOT}/tt-train/configs/training_configs/training_shakespeare_nanogpt_char.yaml"
      - "--track_memory"

  - name: "NanoLlama3 Shakespeare"
    filename: "nanollama_shakespeare"
    binary: "${TT_METAL_RUNTIME_ROOT}/tt-train/sources/examples/nano_gpt/train_nanogpt.py"
    args:
      - "-c ${TT_METAL_RUNTIME_ROOT}/tt-train/configs/training_configs/training_shakespeare_nanollama3_char.yaml"
      - "--track_memory"

  - name: "Nano Deepseek (Char) Shakespeare"
    filename: "nano_deepseek_char_shakespeare"
    binary: "${TT_METAL_RUNTIME_ROOT}/tt-train/sources/examples/nano_gpt/train_nanogpt.py"
    args:
      - "-c ${TT_METAL_RUNTIME_ROOT}/tt-train/configs/training_configs/training_shakespeare_nano_deepseek_char.yaml"
      - "--track_memory"

  - name: "TinyLlama Shakespeare"
    filename: "tinyllama_shakespeare"
    binary: "${TT_METAL_RUNTIME_ROOT}/tt-train/sources/examples/nano_gpt/train_nanogpt.py"
    args:
      - "-c ${TT_METAL_RUNTIME_ROOT}/tt-train/configs/training_configs/training_shakespeare_tinyllama.yaml"
      - "--track_memory"
    skip-card:
      - "n150"
      - "n300"
      - "p100"
    tokenize:
      text_file: "data/shakespeare.txt"
      hf_tokenizer: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
      output_file: "data/tokenized_shakespeare_tinyllama"

  - name: "Linear Regression"
    filename: "linear_regression"
    binary: "${TT_METAL_RUNTIME_ROOT}/tt-train/sources/examples/linear_regression/linear_regression.py"
    args:
      - "--track_memory"
      - "--verbose"

  - name: "Qwen 3 1.7B Shakespeare"
    filename: "qwen3_1.7b_shakespeare"
    binary: "${TT_METAL_RUNTIME_ROOT}/tt-train/sources/examples/nano_gpt/train_nanogpt.py"
    args:
      - "-c ${TT_METAL_RUNTIME_ROOT}/tt-train/configs/training_configs/training_shakespeare_qwen3_17b.yaml"
      - "--max_steps 500"
      - "--track_memory"
    skip-card:
      - "n150"
      - "n300"
      - "p100"
    tokenize:
      text_file: "data/shakespeare.txt"
      hf_tokenizer: "Qwen/Qwen3-1.7B"
      output_file: "data/tokenized_shakespeare_qwen3"

  - name: "Tiny Deepseek (Char) Shakespeare"
    filename: "tiny_deepseek_char_shakespeare"
    binary: "${TT_METAL_RUNTIME_ROOT}/tt-train/sources/examples/nano_gpt/train_nanogpt.py"
    args:
      - "-c ${TT_METAL_RUNTIME_ROOT}/tt-train/configs/training_configs/training_shakespeare_tiny_deepseek_char.yaml"
      - "--max_steps 1000"
      - "--track_memory"
    skip-card:
      - "n150"
      - "n300"
      - "p100"

  - name: "TinyLlama 1.1B DDP=32 Shakespeare"
    filename: "tinyllama_1_1b_ddp32_shakespeare"
    binary: "${TT_METAL_RUNTIME_ROOT}/tt-train/sources/examples/nano_gpt/train_nanogpt.py"
    args:
      - "-c ${TT_METAL_RUNTIME_ROOT}/tt-train/configs/training_configs/training_shakespeare_tinyllama_ddp.yaml"
      - "--track_memory"
      - "--batch_size=160"
      - "--max_steps=2048"
    mgd: "${TT_METAL_RUNTIME_ROOT}/tt_metal/fabric/mesh_graph_descriptors/single_bh_galaxy_mesh_32x1_graph_descriptor.textproto"

  - name: "Llama 8B TP=8 DDP=4 Shakespeare"
    filename: "llama_8b_tp8_ddp4_shakespeare"
    binary: "${TT_METAL_RUNTIME_ROOT}/tt-train/sources/examples/nano_gpt/train_nanogpt.py"
    args:
      - "-c ${TT_METAL_RUNTIME_ROOT}/tt-train/configs/training_configs/llama8b/training_shakespeare_llama_8b_tp8_ddp4.yaml"
      - "--track_memory"
      - "--batch_size=4"
      - "--max_steps=2048"
    mgd: "${TT_METAL_RUNTIME_ROOT}/tt_metal/fabric/mesh_graph_descriptors/single_bh_galaxy_torus_4x8_graph_descriptor.textproto"
    tokenize:
      text_file: "data/shakespeare.txt"
      hf_tokenizer: "/mnt/MLPerf/huggingface/hub/models--meta-llama--Llama-3.1-8B-Instruct/snapshots/0e9e39f249a16976918f6564b8830bc894c89659"
      output_file: "data/tokenized_shakespeare_llama8b"

  - name: "Llama 8B TP=4 DDP=8 Shakespeare"
    filename: "llama_8b_tp4_ddp8_shakespeare"
    binary: "${TT_METAL_RUNTIME_ROOT}/tt-train/sources/examples/nano_gpt/train_nanogpt.py"
    args:
      - "-c ${TT_METAL_RUNTIME_ROOT}/tt-train/configs/training_configs/llama8b/training_shakespeare_llama_8b_tp4_ddp8.yaml"
      - "--track_memory"
      - "--batch_size=8"
      - "--max_steps=2048"
    mgd: "${TT_METAL_RUNTIME_ROOT}/tt_metal/fabric/mesh_graph_descriptors/single_bh_galaxy_torus_xy_graph_descriptor.textproto"
    tokenize:
      text_file: "data/shakespeare.txt"
      hf_tokenizer: "/mnt/MLPerf/huggingface/hub/models--meta-llama--Llama-3.1-8B-Instruct/snapshots/0e9e39f249a16976918f6564b8830bc894c89659"
      output_file: "data/tokenized_shakespeare_llama8b"
