# HostWeightBridge transport test -- 4->4 shape (rank 0 sender, rank 1 receiver).
#
# !!! HARDWARE-SPECIFIC TEMPLATE !!!
# TT_VISIBLE_DEVICES indexes PCIe devices, not UMD chip ids: on this 4x N300 host
# "0,1" and "2,3" are each two boards = a routable [1, 4] line. Adjust per machine.

rank_bindings:
  - rank: 0
    mesh_id: 0
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "0,1"
  - rank: 1
    mesh_id: 1
    mesh_host_rank: 0
    env_overrides:
      TT_VISIBLE_DEVICES: "2,3"

mesh_graph_desc_path: "configurations/4_4/mgd.textproto"
