training_config:
  project_name: "llama_405b"
  seed: 5489
  model_save_interval: 500
  batch_size: 1
  num_epochs: 1
  max_steps: 100
  learning_rate: 0.00008
  weight_decay: 0.01
  use_moreh_adamw: true
  use_kahan_summation: false
  use_clip_grad_norm: false
  clip_grad_norm_max_norm: 1.0
  model_config: "model_configs/llama405b.yaml"
  multihost_config: multihost_configs/16worker_126block_pp_fabric.yaml

device_config:
  enable_tp: true
  mesh_shape: [1, 8]

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0
