training_config:
  project_name: "tt_train_tiny_deepseek"
  seed: 5489
  model_save_interval: 500
  batch_size: 1
  num_epochs: 1
  max_steps: 5000
  use_clip_grad_norm: false
  clip_grad_norm_max_norm: 1.0
  data_path: "data/shakespeare.txt"
  model_config: "${TT_METAL_RUNTIME_ROOT}/tt-train/configs/model_configs/moe/deepseek_16B.yaml"
  optimizer:
    type: AdamW
    lr: 0.0001
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false

device_config:
  # Full DeepSeek TP: TP size must divide num_heads (12), inter_dim (4096),
  # and moe_inter_dim (768). Use TP-only for now: SparseMoETP's host-loop FFN
  # consumes one offsets vector, while DDP+TP produces per-DP-row offsets.
  # DP+TP needs per-shard variable_matmul runtime args before it is safe.
  mesh_shape: [1, 4]
  enable_tp: true
  # MoE-only TP (no general TP): use e.g. mesh [8, 4], enable_ddp: true,
  # enable_tp: false, moe_tp_axis: 1 — do not use TP=32 with num_heads=12.
  moe_tp_axis: -1

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0
