training_config:
  #model_path: "data/gpt2s_exported.msgpack"
  seed: 5489
  model_save_interval: 500
  batch_size: 4
  num_epochs: 1
  max_steps: 5000
  optimizer:
    type: MorehAdamW
    lr: 0.0003
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false
    use_kahan_summation: false
  gradient_accumulation_steps: 1
  tokenizer_type: bpe
  tokenizer_path: "data/gpt2-tokenizer.json"
  model_config: "configs/model_configs/gpt2s.yaml"

device_config:
    enable_ddp: false
    mesh_shape: [1,1]
