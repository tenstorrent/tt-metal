# Llama-3.2-1B GRPO + pure DDP on a 32-card Blackhole galaxy.
#
# Run:
#   python3 boolq_training_example.py --model llama-1b \
#     --config ${TT_METAL_RUNTIME_ROOT}/tt-train/configs/training_configs/grpo_boolq_llama_1b_ddp_32dev.yaml
#
# per_device_train_batch_size * num_devices (2*32=64) must be divisible by num_generations (8).

training_config:
  model_config: "${TT_METAL_RUNTIME_ROOT}/tt-train/configs/model_configs/llama3_2_1B.yaml"

  optimizer:
    type: MorehAdamW
    lr: 5.0e-6
    beta1: 0.9
    beta2: 0.99
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false
    kahan_summation: false

  grpo_config:
    epsilon: 0.2
    per_device_train_batch_size: 2
    num_iterations: 1
    gradient_accumulation_steps: 8
    logging_steps: 1
    checkpointing: false
    checkpoint_interval: 5
    prompts_to_train: 1600
    temperature: 1.5
    max_completion_length: 1024
    num_generations: 8
    warmup_steps: 0

device_config:
  enable_ddp: true
  mesh_shape: [32, 1]
