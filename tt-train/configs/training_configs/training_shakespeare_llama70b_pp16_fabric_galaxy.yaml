training_config:
  project_name: "llama_70b"
  seed: 5489
  model_save_interval: 500
  batch_size: 1
  num_epochs: 1
  max_steps: 5000
  use_clip_grad_norm: false
  clip_grad_norm_max_norm: 1.0
  model_config: "configs/model_configs/llama70b.yaml"
  multihost_config: "configs/multihost_configs/16worker_80block_pp_fabric.yaml"
  optimizer:
    type: AdamW
    lr: 0.00015
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false
    stochastic_rounding: false

device_config:
  enable_tp: true
  mesh_shape: [1, 8]

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0
