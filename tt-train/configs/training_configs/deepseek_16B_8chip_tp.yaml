training_config:
  project_name: "tt_train_deepseek_16B_8chip_tp"
  seed: 5489
  batch_size: 4
  num_epochs: 1
  max_steps: 20
  use_clip_grad_norm: false
  data_path: "${TT_METAL_RUNTIME_ROOT}/tt-train/data/shakespeare_deepseek.yaml"
  model_config: "${TT_METAL_RUNTIME_ROOT}/tt-train/configs/model_configs/moe/deepseek_16B_tp.yaml"
  optimizer:
    type: AdamW
    lr: 0.0001
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false
    stochastic_rounding: true

device_config:
  # 8 Blackhole chips, full tensor parallelism (TP=8) on the "tp" axis.
  # Set TT_MESH_GRAPH_DESC_PATH to a 1x8 mesh graph descriptor for the 8-chip mesh.
  # MoE uses SparseMoETP (experts' intermediate dim sharded across the tp axis).
  mesh_shape: [1, 8]
  enable_tp: true
  enable_ddp: false

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0
