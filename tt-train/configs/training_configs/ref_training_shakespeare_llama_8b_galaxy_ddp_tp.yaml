training_config:
  project_name: "tt_train_nano_gpt" # not really nanogpt, but want to use the same wandb project name for now
  seed: 5489
  model_save_interval: 500
  batch_size: 4
  gradient_accumulation_steps: 2
  num_epochs: 1
  max_steps: 5000
  use_clip_grad_norm: false
  clip_grad_norm_max_norm: 1.0
  tokenizer_type: "char"
  data_path: "data/shakespeare.txt"
  model_config: "${TT_METAL_RUNTIME_ROOT}/tt-train/configs/model_configs/llama8b_efficient.yaml"
  optimizer:
    type: AdamW
    lr: 0.00003
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false
    stochastic_rounding: false

device_config:
  enable_ddp: true
  enable_tp: true
  mesh_shape: [4, 8]  # DDP=4 x TP=8 = 32 devices

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0
