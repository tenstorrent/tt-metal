training_config:
  project_name: "tt_train_tinyllama_slimpajama-6B"
  seed: 5489
  model_save_interval: 1000
  # Recipe A: paper-exact global batch of 512.
  # batch_size (per-chip micro batch) = 4, gradient_accumulation_steps = 4
  # -> global batch = 4 * 4 * 32 chips = 512 sequences (matches TinyLlama paper).
  # Per-chip activation (e.g. SwiGLU [B, T, intermediate_dim] = [4, 2048, 5632]
  # bf16 ~= 92 MiB) fits comfortably; batch=32 hit DRAM OOM at this seq_len.
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 1
  # ~1 epoch through SlimPajama-6B-tokenized train split (6,405,226,567 tokens
  # per train/meta.json). Tokens / opt step = 4 * 4 * 32 * 2048 = 1,048,576.
  # 6.41B / 1.05M ~= 6105 opt steps; rounded to 6100.
  max_steps: 6100
  scheduler_type: warmup_linear
  use_clip_grad_norm: true
  clip_grad_norm_max_norm: 1.0
  model_config: "${TT_METAL_RUNTIME_ROOT}/tt-train/configs/model_configs/tinyllama.yaml"

  # Pre-tokenized SlimPajama-6B (uint16 .bin shards produced by
  # tt-train/sources/examples/nano_gpt/pretraining/dataset_preprocessing.py).
  # Activates the TinyLlama / lit_gpt PackedDataset-style data path.
  tokenized_data_dir: "/data/awliu/datasets/SlimPajama-6B-tokenized"
  train_split: "train"
  val_split: "validation"
  n_chunks: 8

  # Periodic validation loss eval (matches TinyLlama paper:
  # eval_step_interval=5000 / eval_iters=100). Scaled to this 3000-step run.
  eval_interval: 500
  eval_iters: 100

  # Optimizer hyperparameters lifted from the TinyLlama paper (arxiv 2401.02385,
  # pretrain/tinyllama.py): lr=4e-4, beta1=0.9, beta2=0.95, weight_decay=0.1.
  optimizer:
    type: AdamW
    lr: 0.0004
    beta1: 0.9
    beta2: 0.95
    epsilon: 1.0e-8
    weight_decay: 0.1
    amsgrad: false
    stochastic_rounding: false

device_config:
  enable_ddp: true
  mesh_shape: [32, 1]

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0
