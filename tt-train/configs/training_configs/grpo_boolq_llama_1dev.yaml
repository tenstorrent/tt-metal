# Tested on 1x p150.
# MGD: tt_metal/fabric/mesh_graph_descriptors/p150_mesh_graph_descriptor.textproto

transformer_config:
  model_type: "llama"
  num_heads: 32
  num_groups: 8
  embedding_dim: 2048
  intermediate_dim: 8192
  dropout_prob: 0.0
  num_blocks: 16
  weight_tying: "enabled"
  vocab_size: 32000
  max_sequence_length: 1024
  runner_type: "memory_efficient"
  theta: 500000.0
  rope_scaling:
    scaling_factor: 32.0
    high_freq_factor: 4.0
    low_freq_factor: 1.0
    original_context_length: 8192

device_config:
  enable_ddp: false
  mesh_shape: [1, 1]

optimizer_config:
  type: MorehAdamW
  lr: 5.0e-6
  beta1: 0.9
  beta2: 0.99
  epsilon: 1.0e-8
  weight_decay: 0.01
  amsgrad: false
  kahan_summation: false

grpo_config:
  epsilon: 0.2
  batch_size: 2
  micro_batch_size: 16
  num_iterations: 1
  gradient_accumulation_steps: 8
  logging_steps: 1
  checkpointing: true
  checkpoint_interval: 5
  prompts_to_train: 1600
  temperature: 1.5
  max_completion_length: 256
  num_generations: 8
  warmup_steps: 0
