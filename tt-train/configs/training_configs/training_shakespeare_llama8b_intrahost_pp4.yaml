training_config:
  project_name: "llama_8b"
  model_type: "llama"
  seed: 5489
  model_save_interval: 500
  batch_size: 1
  num_epochs: 1
  max_steps: 5000
  use_clip_grad_norm: false
  clip_grad_norm_max_norm: 1.0
  tokenizer_path: "data/tinyllama-tokenizer.json"
  tokenizer_type: "bpe"
  model_config: "${TT_METAL_RUNTIME_ROOT}/tt-train/configs/model_configs/llama8b_efficient.yaml"
  multihost_config: "${TT_METAL_RUNTIME_ROOT}/tt-train/configs/multihost_configs/4worker_32block_pp_fabric.yaml"
  optimizer:
    type: AdamW
    lr: 0.0003
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false
    stochastic_rounding: false

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0

device_config:
  enable_tp: true
  mesh_shape: [1, 8]
