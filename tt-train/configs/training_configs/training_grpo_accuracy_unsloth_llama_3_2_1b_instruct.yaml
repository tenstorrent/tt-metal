training_config:
  project_name: "grpo_unsloth_llama_3_2_1b_instruct_unsloth"
  batch_size: 32
  validation_batch_size: 4
  num_epochs: 1
  max_steps: 160
  eval_every: 20
  model_save_interval: 50
  gradient_accumulation_steps: 1
  use_clip_grad_norm: false
  clip_grad_norm_max_norm: 1.0
  tokenizer_type: "bpe"
  checkpoint_dir: "checkpoints_gsm8k_unsloth_llama_3_2_1b_instruct"
  model_config: "model_configs/llama3_2_1B.yaml"

  optimizer:
    type: MorehAdamW
    lr: 0.0003
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false
    kahan_summation: false

grpo_config:
  max_tokens_to_complete: 512
  group_size: 8

scheduler_config:
  max_lr: 1e-4
  min_lr: 3e-5
  warmup_steps: 20
  hold_steps: 1000

eval_config:
  repetition_penalty: 1.0
  temperature: 0.8
  top_k: 50
  top_p: 1.0

device_config:
  enable_ddp: false
  mesh_shape: [1, 1]
