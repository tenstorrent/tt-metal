training_config:
  project_name: "tt_train_nano_gpt"
  seed: 5489
  model_save_interval: 500
  batch_size: 8
  num_epochs: 1
  max_steps: 5000
  use_clip_grad_norm: false
  clip_grad_norm_max_norm: 1.0
  model_config: "configs/model_configs/tinyllama.yaml"

optimizer_config: "configs/optimizer_configs/adamw_fused.yaml"

device_config:
  enable_ddp: true
  mesh_shape: [1, 32]

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0
