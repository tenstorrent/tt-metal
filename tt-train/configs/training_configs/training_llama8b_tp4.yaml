# MGD: tt-train/configs/mgd/bh_qb_1_4_ring_ring.textproto (Blackhole QuietBox, device_topology [1, 4])
training_config:
  project_name: "tt_train_llama8b_tp4"
  seed: 5489
  batch_size: 1
  gradient_accumulation_steps: 4
  num_epochs: 1
  max_steps: 5000
  use_clip_grad_norm: false  # TP-incompatible
  clip_grad_norm_max_norm: 1.0
  data_path: "data/tokenized_shakespeare_tinyllama.yaml"
  model_config: "${TT_METAL_RUNTIME_ROOT}/tt-train/configs/model_configs/llama8b.yaml"
  optimizer:
    type: AdamW
    lr: 3e-5
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false
    stochastic_rounding: false

device_config:
  enable_tp: true
  enable_sp: true
  enable_ddp: false
  mesh_shape: [1, 4]  # mirrors MGD device_topology [1, 4]; axis 1 = tp (size 4)

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0
