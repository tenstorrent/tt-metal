training_config:
  project_name: "tt_train_tiny_deepseek"
  seed: 5489
  model_save_interval: 500
  batch_size: 8
  num_epochs: 1
  max_steps: 5000
  use_clip_grad_norm: true
  clip_grad_norm_max_norm: 1.0
  tokenizer_type: "char"
  data_path: "data/shakespeare.txt"
  model_config: "${TT_METAL_RUNTIME_ROOT}/tt-train/configs/model_configs/moe/tiny_deepseek.yaml"
  optimizer:
    type: AdamWFullPrecision
    lr: 0.0001
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false

device_config:
  enable_ddp: false
  mesh_shape: [1,1]

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0
