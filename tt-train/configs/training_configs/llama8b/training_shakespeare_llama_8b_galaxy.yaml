training_config:
  project_name: "tt_train_llama8b"
  seed: 5489
  model_save_interval: 1
  batch_size: 1
  num_epochs: 1
  max_steps: 20
  use_clip_grad_norm: false
  clip_grad_norm_max_norm: 1.0
  optimizer:
    type: AdamW
    lr: 0.0003
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false
    stochastic_rounding: false
  tokenizer_type: "bpe"
  data_path: "data/tokenized_shakespeare_llama8b.yaml"
  model_config: "model_configs/llama8b.yaml"

device_config:
  enable_ddp: false
  enable_tp: false
  mesh_shape: [1,1]

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0
