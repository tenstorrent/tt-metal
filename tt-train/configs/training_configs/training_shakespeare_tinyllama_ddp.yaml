training_config:
  project_name: "tt_train_tinyllama_ddp32_bpe"
  seed: 5489
  model_save_interval: 0
  batch_size: 160
  gradient_accumulation_steps: 1
  num_epochs: 1
  max_steps: 5000
  use_clip_grad_norm: false
  clip_grad_norm_max_norm: 1.0
  data_path: "data/tokenized_shakespeare_tinyllama.yaml"
  model_config: "${TT_METAL_RUNTIME_ROOT}/tt-train/configs/model_configs/tinyllama_bpe.yaml"
  optimizer:
    type: AdamW
    lr: 0.00010
    beta1: 0.9
    beta2: 0.999
    epsilon: 1.0e-8
    weight_decay: 0.01
    amsgrad: false
    stochastic_rounding: false

device_config:
  enable_ddp: true
  mesh_shape: [32, 1]

eval_config:
  repetition_penalty: 1.0
  temperature: 0.7
  top_k: 50
  top_p: 1.0
