name: 'Delete Environment'
description: 'A composable action to delete an environment'

inputs:
  environmentName:
    description: 'Environment name'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Delete Environment
      shell: bash
      env:
        ENVIRONMENT_NAME: ${{ inputs.environmentName }}
      run: |
        # Validate environment name (alphanumeric, hyphen, underscore only)
        if [[ ! "$ENVIRONMENT_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
          echo "::error::Invalid environment name: must be alphanumeric with hyphens/underscores only"
          exit 1
        fi
        kubectl -nttop delete "helmrelease/$ENVIRONMENT_NAME" --ignore-not-found
