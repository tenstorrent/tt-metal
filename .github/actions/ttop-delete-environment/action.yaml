name: "Delete Environment"
description: "A composable action to delete an environment"

inputs:
  environmentName:
    description: "Environment name"
    required: true

runs:
  using: "composite"
  steps:
    - name: Delete Environment
      shell: bash
      env:
        ENVIRONMENT_NAME: ${{ inputs.environmentName }}
      run: |
        source "$GITHUB_ACTION_PATH/../../scripts/security/input-validation.sh"
        validate_allocation_name "$ENVIRONMENT_NAME" || exit 1
        kubectl -nttop delete "helmrelease/$ENVIRONMENT_NAME" --ignore-not-found
