name: Upload data via SFTP
description: Upload data SFTP server for later analysis
inputs:
  ssh-private-key:
    description: The Slack ID of the person to be tagged.
    required: true
  sftp-batchfile:
    description: Text batchfile containing SFTP commands
    required: true
  username:
    description: Username of account on server
    required: true
  hostname:
    description: Hostname of server
    required: true
  path:
    description: Path where data and batchfile are located
    required: false
runs:
  using: composite
  steps:
    - name: Create key file
      shell: bash
      env:
        PATH_INPUT: ${{ inputs.path }}
        SSH_PRIVATE_KEY: ${{ inputs.ssh-private-key }}
      run: |
        source "$GITHUB_ACTION_PATH/../../scripts/security/input-validation.sh"
        if [ -n "$PATH_INPUT" ]; then
          validate_path "$PATH_INPUT" --allow-relative || exit 1
          echo "Changing dir to $PATH_INPUT"
          cd -- "$PATH_INPUT" || { validation_error "Failed to change directory to $PATH_INPUT"; exit 1; }
        fi
        printf '%s\n' "$SSH_PRIVATE_KEY" > id_key
        chmod go-rwx id_key
    - name: Upload files
      shell: bash
      env:
        PATH_INPUT: ${{ inputs.path }}
        SFTP_BATCHFILE: ${{ inputs.sftp-batchfile }}
        SFTP_USERNAME: ${{ inputs.username }}
        SFTP_HOSTNAME: ${{ inputs.hostname }}
      run: |
        source "$GITHUB_ACTION_PATH/../../scripts/security/input-validation.sh"
        validate_hostname "$SFTP_HOSTNAME" || exit 1
        validate_username "$SFTP_USERNAME" || exit 1
        if [ -n "$PATH_INPUT" ]; then
          validate_path "$PATH_INPUT" --allow-relative || exit 1
          echo "Changing dir to $PATH_INPUT"
          cd -- "$PATH_INPUT" || { validation_error "Failed to change directory to $PATH_INPUT"; exit 1; }
        fi
        sftp -oStrictHostKeyChecking=false -i id_key -b "$SFTP_BATCHFILE" "$SFTP_USERNAME@$SFTP_HOSTNAME"
