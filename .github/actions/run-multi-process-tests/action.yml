name: 'Run Multi-Process Tests'
description: 'Runs multi-process fabric tests with various mesh configurations'
runs:
  using: "composite"
  steps:
    - name: Run Multi-Process tests
      shell: bash
      env:
        LD_LIBRARY_PATH: /work/build/lib
        TT_METAL_HOME: /work
      run: |
        # Ensure LD_LIBRARY_PATH is exported so MPI child processes find libspdlog etc. in build/lib
        export LD_LIBRARY_PATH=/work/build/lib
        # -x LD_LIBRARY_PATH: explicitly pass to mpirun so spawned ranks inherit it (fixes spdlog symbol lookup)
        # --oversubscribe: required for multi-rank meshes (e.g. 4x4=16 ranks) on single host
        MPI_ARGS="-x LD_LIBRARY_PATH=/work/build/lib --allow-run-as-root --oversubscribe"
        tt-run --mesh-graph-descriptor tests/tt_metal/tt_fabric/custom_mesh_descriptors/wh_galaxy_split_4x4_multi_big_mesh.textproto --hosts localhost --mpi-args "$MPI_ARGS" ./build/test/tt_metal/perf_microbenchmark/routing/test_tt_fabric --test_config tests/tt_metal/tt_metal/perf_microbenchmark/routing/test_dual_big_mesh_fabric_2d_sanity.yaml
        tt-run --mesh-graph-descriptor tests/tt_metal/tt_fabric/custom_mesh_descriptors/wh_galaxy_split_4x4_multi_mesh.textproto --hosts localhost --mpi-args "$MPI_ARGS" python3 tests/ttnn/distributed/test_multi_mesh.py
        tt-run --mesh-graph-descriptor tests/tt_metal/tt_fabric/custom_mesh_descriptors/wh_galaxy_split_4x4_multi_mesh.textproto --hosts localhost --mpi-args "$MPI_ARGS" ./build/test/tt_metal/multi_host_socket_tests
        tt-run --mesh-graph-descriptor tests/tt_metal/tt_fabric/custom_mesh_descriptors/wh_galaxy_split_4x4_multi_big_mesh.textproto --hosts localhost --mpi-args "$MPI_ARGS" ./build/test/tt_metal/multi_host_fabric_tests --gtest_filter="*Socket*"
        tt-run --mesh-graph-descriptor tests/tt_metal/tt_fabric/custom_mesh_descriptors/wh_galaxy_2x4_mesh_graph_descriptor.textproto --hosts localhost --mpi-args "$MPI_ARGS" ./build/test/tt_metal/perf_microbenchmark/routing/test_tt_fabric --test_config tests/tt_metal/tt_metal/perf_microbenchmark/routing/test_wh_6u_quad_2x4_acyclic.yaml
        tt-run --mesh-graph-descriptor tests/tt_metal/tt_fabric/custom_mesh_descriptors/wh_galaxy_2x4_mesh_graph_descriptor.textproto --hosts localhost --mpi-args "$MPI_ARGS" ./build/test/tt_metal/perf_microbenchmark/routing/test_tt_fabric --test_config tests/tt_metal/tt_metal/perf_microbenchmark/routing/test_wh_6u_quad_2x4_cyclic.yaml
        tt-run --mesh-graph-descriptor tests/tt_metal/tt_fabric/custom_mesh_descriptors/wh_galaxy_split_4x2_multi_mesh.textproto --hosts localhost --mpi-args "$MPI_ARGS" ./build/test/tt_metal/perf_microbenchmark/routing/test_tt_fabric --test_config tests/tt_metal/tt_metal/perf_microbenchmark/routing/test_fabric_multi_mesh_sanity_common.yaml
