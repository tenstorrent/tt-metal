name: 'LLK Compile for Quasar'
description: 'Compile LLK tests for the Quasar architecture via pytest --compile-producer. Assumes the repository is already checked out.'

inputs:
  pytest-markers:
    description: 'Pytest mark expression (e.g., "quasar", "not perf and not nightly").'
    required: false
    default: 'quasar'
  test-splits:
    description: 'Total number of test groups for sharding. Caller must set up its own matrix to fan out groups when > 1.'
    required: false
    default: '1'
  test-group:
    description: '1-indexed shard to compile (must be <= test-splits).'
    required: false
    default: '1'
  num-workers:
    description: 'Number of pytest-xdist workers (-n). Defaults to "auto" (one per CPU). Set higher than nproc to overprovision and hide pytest collection overhead.'
    required: false
    default: 'auto'

runs:
  using: composite
  steps:
    - name: Install SFPI
      shell: bash
      working-directory: tt_metal/tt-llk/tests
      run: CHIP_ARCH=quasar ./setup_testing_env.sh

    - name: Compile for Quasar
      shell: bash
      working-directory: tt_metal/tt-llk/tests/python_tests
      env:
        LLK_BUILD_PARALLELISM: "0" # one g++ per worker
        CHIP_ARCH: quasar
      run: |
        echo "Compiling Quasar (group ${{ inputs.test-group }}/${{ inputs.test-splits }})..."
        pytest -q --compile-producer -n ${{ inputs.num-workers }} \
              -m "${{ inputs.pytest-markers }}" \
              --splits ${{ inputs.test-splits }} --group ${{ inputs.test-group }} \
              --override-ini=log_cli=false --tb=short --timeout=60 \
              --junitxml=pytest-report-quasar-compile.xml .

    - name: Upload JUnit report for compiling elfs
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: >-
          ${{ (contains(inputs.pytest-markers, 'perf') && !contains(inputs.pytest-markers, 'not perf'))
              && 'perf-' || '' }}junit-report-quasar-${{ inputs.test-group }}-compile
        path: tt_metal/tt-llk/tests/python_tests/pytest-report-quasar-compile.xml

    - name: Publish Test Results
      if: always()
      uses: mikepenz/action-junit-report@v5
      with:
        report_paths: tt_metal/tt-llk/tests/python_tests/pytest-report-quasar-compile.xml
        check_name: Quasar Compile Tests
        detailed_summary: true
        job_summary: false
        include_passed: false
        fail_on_failure: false
