name: "Use Precomputed or Compute Data"
description: "Extract precomputed JSON data or run a compute script if not provided"

inputs:
  precomputed-data:
    description: "JSON data from preflight (optional). If empty, compute-script is run."
    required: false
    default: ""
  compute-script:
    description: |
      Script path (relative to repo root) to run if precomputed-data is empty.
      Must output JSON to stdout. Arguments can be appended after the path.
      Example: ".github/scripts/compute-platform-data.sh 22.04 owner/repo"
      SECURITY: Only file paths are accepted; arbitrary shell expressions are rejected.
    required: false
    default: ""
  output-mappings:
    description: |
      Space-separated list of output names to extract from JSON.
      Names auto-convert to jq selectors (kebab-case → snake_case, prepend '.').
      For custom mappings, use "output_name:jq_selector" format.
      Example: "tool-tags any-missing ubuntu-version:.version"
    required: true

outputs:
  data:
    description: "The full JSON data (precomputed or freshly computed)"
    value: ${{ steps.result.outputs.data }}

runs:
  using: "composite"
  steps:
    - name: Get data (precomputed or computed)
      id: get-data
      shell: bash
      env:
        PRECOMPUTED_DATA: ${{ inputs.precomputed-data }}
        COMPUTE_SCRIPT: ${{ inputs.compute-script }}
      run: |
        set -euo pipefail

        if [ -n "$PRECOMPUTED_DATA" ]; then
          echo "Using precomputed data"
          DATA="$PRECOMPUTED_DATA"
        elif [ -n "$COMPUTE_SCRIPT" ]; then
          # Reject shell metacharacters to prevent command injection.
          # Only plain script paths with space-separated arguments are allowed.
          if [[ "$COMPUTE_SCRIPT" =~ [\;\|\&\$\`\(\)\{\}\<\>\\] ]]; then
            echo "Error: compute-script contains shell metacharacters. Only script paths with arguments are allowed." >&2
            exit 1
          fi

          # Split into script path and arguments (word-splitting is intentional here)
          read -ra SCRIPT_PARTS <<< "$COMPUTE_SCRIPT"
          SCRIPT_PATH="${SCRIPT_PARTS[0]}"
          SCRIPT_ARGS=("${SCRIPT_PARTS[@]:1}")

          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "Error: compute-script path '$SCRIPT_PATH' does not exist" >&2
            exit 1
          fi
          if [ ! -x "$SCRIPT_PATH" ]; then
            echo "Error: compute-script path '$SCRIPT_PATH' is not executable" >&2
            exit 1
          fi

          echo "Running compute script: $SCRIPT_PATH ${SCRIPT_ARGS[*]}"
          DATA=$("$SCRIPT_PATH" "${SCRIPT_ARGS[@]}")
        else
          echo "Error: Either precomputed-data or compute-script must be provided" >&2
          exit 1
        fi

        # Output the data using heredoc for multi-line safety
        {
          echo "data<<EOF_DATA"
          echo "$DATA"
          echo "EOF_DATA"
        } >> "$GITHUB_OUTPUT"

    - name: Extract outputs
      id: result
      shell: bash
      env:
        DATA: ${{ steps.get-data.outputs.data }}
        OUTPUT_MAPPINGS: ${{ inputs.output-mappings }}
      run: |
        set -euo pipefail

        # Pass through the full data
        {
          echo "data<<EOF_DATA"
          echo "$DATA"
          echo "EOF_DATA"
        } >> "$GITHUB_OUTPUT"

        # Extract each mapped output
        for arg in $OUTPUT_MAPPINGS; do
          # Check if explicit mapping is provided (contains ':')
          if [[ "$arg" == *":"* ]]; then
            output_name="${arg%%:*}"
            jq_selector="${arg#*:}"
          else
            # Auto-derive: convert kebab-case to snake_case and prepend '.'
            output_name="$arg"
            jq_selector=".${arg//-/_}"
          fi

          if [ -z "$output_name" ]; then
            echo "Error: Empty output name in '$arg'" >&2
            continue
          fi

          value=$(echo "$DATA" | jq -r "$jq_selector" 2>/dev/null || echo "")

          # Handle multi-line values
          if [[ "$value" == *$'\n'* ]]; then
            delimiter="EOF_${output_name//[^a-zA-Z0-9_]/_}"
            {
              echo "${output_name}<<${delimiter}"
              echo "$value"
              echo "${delimiter}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "${output_name}=${value}" >> "$GITHUB_OUTPUT"
          fi
        done
