name: "Workflow Status"
description: "Ensures all required jobs succeeded and handles optional jobs correctly."

inputs:
  required-jobs:
    description: "Comma-separated list of required jobs (must succeed)."
    required: true
  optional-jobs:
    description: "Comma-separated list of optional jobs (skipped is OK, but failure is not)."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Check Jobs with github-script
      uses: actions/github-script@v7
      env:
        REQUIRED_JOBS: ${{ inputs.required-jobs }}
        OPTIONAL_JOBS: ${{ inputs.optional-jobs }}
      with:
        script: |
          const requiredJobsRaw = process.env.REQUIRED_JOBS || "";
          const optionalJobsRaw = process.env.OPTIONAL_JOBS || "";

          // Validate job names (alphanumeric, hyphen, underscore only)
          const validateJobName = (name) => /^[a-zA-Z0-9_-]+$/.test(name);

          const requiredJobs = requiredJobsRaw.split(",").map(job => job.trim()).filter(Boolean);
          const optionalJobs = optionalJobsRaw.split(",").map(job => job.trim()).filter(Boolean);

          // Validate all job names
          for (const job of [...requiredJobs, ...optionalJobs]) {
            if (!validateJobName(job)) {
              core.setFailed(`Invalid job name: '${job}'. Job names must be alphanumeric with hyphens/underscores.`);
              return;
            }
          }

          const needs = JSON.parse(process.env.NEEDS_CONTEXT);

          // Check required jobs
          for (const job of requiredJobs) {
            const result = needs[job]?.result;
            console.log(`Job: ${job}, Result: ${result}`);
            if (result !== "success") {
              core.setFailed(`Required job '${job}' did not succeed.`);
            }
          }

          // Check optional jobs (treat skipped as success)
          for (const job of optionalJobs) {
            const result = needs[job]?.result || "success"; // Default to success if missing
            console.log(`Job: ${job}, Result: ${result}`);
            if (result === "failure" || result === "cancelled") {
              core.setFailed(`Optional job '${job}' failed.`);
            }
          }

          console.log("Workflow was successful.");
