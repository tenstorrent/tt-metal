name: "Cleanup Action"
description: "Cleans up the workspace to remove root-owned files on non-ephemeral runners."

inputs:
  path:
    description: "The directory to clean up"
    required: false
    default: "/__w/tt-metal/tt-metal/docker-job"
runs:
  using: "composite"
  steps:
    - name: Cleanup workspace
      shell: bash
      run: |
        echo "=== Workspace cleanup ==="
        ls -al "${{ inputs.path }}" || true
        rm -rf "${{ inputs.path }}"
        ls -al "$(dirname "${{ inputs.path }}")" || true

    - name: Cleanup temp files
      shell: bash
      run: |
        shopt -s nullglob

        echo "=== Disk usage before cleanup ==="
        df -h / || true

        # Clean model weights downloaded by CIv2 model cache during test steps
        if [ -d /tmp/ttnn_model_cache ]; then
          echo "=== CIv2 model cache size ==="
          du -sh /tmp/ttnn_model_cache || true
          rm -rf /tmp/ttnn_model_cache
        fi

        # Clean temp files left by kernel compilation in /tmp
        tmp_files=(/tmp/cc*.s /tmp/cc*.o /tmp/cc*.res /tmp/cc*.ld /tmp/cc*.le)
        if [ ${#tmp_files[@]} -gt 0 ]; then
          echo "=== Kernel compilation temp files ==="
          du -shc "${tmp_files[@]}" || true
          rm -rf "${tmp_files[@]}"
        fi

        echo "=== Disk usage after cleanup ==="
        df -h / || true
