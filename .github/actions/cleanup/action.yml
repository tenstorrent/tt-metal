name: "Cleanup Action"
description: "Cleans up the workspace to remove root-owned files on non-ephemeral runners."

inputs:
  path:
    description: "The directory to clean up"
    required: false
    default: "/work"
runs:
  using: "composite"
  steps:
    - name: Cleanup
      shell: bash
      run: |
        cd /
        echo "pre rm"
        ls -al "${{ inputs.path }}"
        # Preserve .github so the runner can still resolve local action definitions
        # for post-steps (e.g. "Post Checkout Repository") after cleanup runs.
        find "${{ inputs.path }}" -mindepth 1 -maxdepth 1 ! -name '.github' -exec rm -rf {} +
        echo "post rm"
        ls -al "${{ inputs.path }}"
