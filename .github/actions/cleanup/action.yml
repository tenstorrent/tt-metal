name: "Cleanup Action"
description: "Cleans up the workspace to remove root-owned files on non-ephemeral runners."

inputs:
  path:
    description: "The directory to clean up"
    required: false
    default: "/__w/tt-metal/tt-metal/docker-job"
runs:
  using: "composite"
  steps:
    - name: Cleanup
      shell: bash
      run: |
        cd /
        echo "pre rm"
        ls -al "${{ inputs.path }}"
        rm -rf "${{ inputs.path }}"
        echo "post rm"
        ls -al "$(dirname "${{ inputs.path }}")"

    - name: Cleanup temp files from kernel compilation
      shell: bash
      run: |
        echo "=== Disk usage before cleanup ==="
        df -h / || true

        # Clean temp files left by kernel compilation in /tmp
        rm -rf /tmp/cc*.s /tmp/cc*.o /tmp/cc*.res /tmp/cc*.ld /tmp/cc*.le 2>/dev/null || true

        echo "=== Disk usage after cleanup ==="
        df -h / || true
