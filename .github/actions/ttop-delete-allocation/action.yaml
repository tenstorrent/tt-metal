name: 'Delete Allocation'
description: 'A composable action to delete an allocation'

inputs:
  allocationName:
    description: 'Allocation name'
    required: true
  namespace:
    description: 'Kubernetes namespace for the environment'
    required: false
    default: 'ttop-ci'

runs:
  using: 'composite'
  steps:
    - name: Delete Allocation
      shell: bash
      run: |
        kubectl -n ${{ inputs.namespace }} delete allocation/${{ inputs.allocationName }} --ignore-not-found
