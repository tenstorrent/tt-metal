# Create allocation object in Kubernetes & wait

name: 'Create Allocation'
description: 'Composable action that creates Allocation object in Kubernetes'

inputs:
  allocationName:
    description: 'Allocation name'
    required: true
  spec:
    description: 'Allocation spec (YAML body under spec.retryPolicy)'
    required: true
  namespace:
    description: 'Target namespace for the allocation'
    required: false
    default: 'ttop-ci'

runs:
  using: 'composite'
  steps:
    - name: Construct allocation manifest (spec)
      shell: bash
      env:
        ALLOCATION_SPEC: ${{ inputs.spec }}
      run: |
        SPEC=$(printf '%s\n' "$ALLOCATION_SPEC" | sed 's/^/  /')
        cat <<EOF >> $GITHUB_ENV
        ALLOCATION_MANIFEST<<ALLOCATION_EOF
        apiVersion: tenstorrent.com/v1alpha1
        kind: Allocation
        metadata:
          name: ${{ inputs.allocationName }}
          namespace: ${{ inputs.namespace }}
          annotations:
            ci.tenstorrent.com/created-by: ${{ github.actor }}
            ci.tenstorrent.com/repository: ${{ github.repository }}
            ci.tenstorrent.com/run-id: ${{ github.run_id }}
            ci.tenstorrent.com/workflow-ref: ${{ github.workflow_ref }}
            ci.tenstorrent.com/event-name: ${{ github.event_name }}
        spec:
          retryPolicy: Always
        ${SPEC}
        ALLOCATION_EOF
        EOF

    - name: Create Allocation
      shell: bash
      run: |
        echo "Creating allocation..."
        printf "%s" "${ALLOCATION_MANIFEST}" | kubectl -n ${{ inputs.namespace }} apply -f -

    - name: Wait for allocation
      shell: bash
      run: |
        echo "Waiting for allocation to be ready..."
        kubectl -n ${{ inputs.namespace }} wait --for=jsonpath='{.status.phase}'=Allocated allocation/${{ inputs.allocationName }} --timeout=999m
