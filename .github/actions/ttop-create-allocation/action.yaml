# Create allocation object in Kubernetes & wait

name: 'Create Allocation'
description: 'Composable action that creates Allocation object in Kubernetes'

inputs:
  allocationName:
    description: 'Allocation name'
    required: true
  spec:
    description: 'Allocation spec (YAML body under spec.retryPolicy)'
    required: true
  namespace:
    description: 'Target namespace for the allocation'
    required: false
    default: 'ttop-ci'

runs:
  using: 'composite'
  steps:
    - name: Construct allocation manifest (spec)
      shell: bash
      env:
        ALLOCATION_SPEC: ${{ inputs.spec }}
      run: |
        SPEC=$(printf '%s\n' "$ALLOCATION_SPEC" | sed 's/^/  /')
        cat <<EOF >> $GITHUB_ENV
        ALLOCATION_MANIFEST<<ALLOCATION_EOF
        apiVersion: tenstorrent.com/v1alpha1
        kind: Allocation
        metadata:
          name: ${{ inputs.allocationName }}
          namespace: ${{ inputs.namespace }}
        spec:
          retryPolicy: Always
        ${SPEC}
        ALLOCATION_EOF
        EOF

    - name: Get github ID token
      shell: bash
      id: token
      run: |
        IDTOKEN=$(curl -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" $ACTIONS_ID_TOKEN_REQUEST_URL -H "Accept: application/json; api-version=2.0" -H "Content-Type: application/json" -d "{}" | jq -r '.value')
        echo "::add-mask::${IDTOKEN}"
        echo "idToken=${IDTOKEN}" >> $GITHUB_OUTPUT

    - name: Create Allocation
      shell: bash
      run: |
        echo "Creating allocation..."
        printf "%s" "${ALLOCATION_MANIFEST}" | kubectl --token ${{ steps.token.outputs.idToken }} -n ${{ inputs.namespace }} apply -f -

    - name: Wait for allocation
      shell: bash
      run: |
        echo "Waiting for allocation to be ready..."
        kubectl --token ${{ steps.token.outputs.idToken }} -n ${{ inputs.namespace }} wait --for=jsonpath='{.status.phase}'=Allocated allocation/${{ inputs.allocationName }} --timeout=999m
