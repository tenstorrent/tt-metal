# Create allocation object in Kubernetes & wait

name: 'Create Allocation'
description: 'Composable action that creates Allocation object in Kubernetes'

inputs:
  allocationName:
    description: 'Allocation name'
    required: true
  spec:
    description: 'Allocation spec'
    required: false
    default: ''
  explicit:
    description: 'List of explicit nodes (ignored when spec is provided)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Construct allocation manifest (explicit)
      shell: bash
      id: explicit
      if: ${{ inputs.explicit != '' }}
      env:
        ALLOCATION_NAME: ${{ inputs.allocationName }}
        EXPLICIT_NODES: ${{ inputs.explicit }}
      run: |
        # Validate allocation name (alphanumeric, hyphen, underscore only)
        if [[ ! "$ALLOCATION_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
          echo "::error::Invalid allocation name: must be alphanumeric with hyphens/underscores only"
          exit 1
        fi
        cat <<EOF >> $GITHUB_ENV
        ALLOCATION_MANIFEST<<ALLOCATION_EOF
        apiVersion: tenstorrent.com/v1alpha1
        kind: Allocation
        metadata:
          name: ${ALLOCATION_NAME}
        spec:
          retryPolicy: Always
          allocationType: Explicit
          explicit: [${EXPLICIT_NODES}]
        ALLOCATION_EOF
        EOF

    - name: Construct allocation manifest (spec)
      shell: bash
      id: spec
      if: ${{ inputs.spec != '' }}
      env:
        ALLOCATION_NAME: ${{ inputs.allocationName }}
        SPEC_INPUT: ${{ inputs.spec }}
      run: |
        # Validate allocation name
        if [[ ! "$ALLOCATION_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
          echo "::error::Invalid allocation name: must be alphanumeric with hyphens/underscores only"
          exit 1
        fi
        SPEC=$(printf '%s\n' "$SPEC_INPUT" | sed 's/^/  /')
        cat <<EOF >> $GITHUB_ENV
        ALLOCATION_MANIFEST<<ALLOCATION_EOF
        apiVersion: tenstorrent.com/v1alpha1
        kind: Allocation
        metadata:
          name: ${ALLOCATION_NAME}
        spec:
          retryPolicy: Always
        ${SPEC}
        ALLOCATION_EOF
        EOF

    - name: Create Allocation
      shell: bash
      run: |
        echo "Creating allocation..."
        printf "%s" "$ALLOCATION_MANIFEST" | kubectl apply -f -

    - name: Wait for allocation
      shell: bash
      env:
        ALLOCATION_NAME: ${{ inputs.allocationName }}
      run: |
        # Validate allocation name
        if [[ ! "$ALLOCATION_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
          echo "::error::Invalid allocation name: must be alphanumeric with hyphens/underscores only"
          exit 1
        fi
        echo "Waiting for allocation to be ready..."
        kubectl wait --for=jsonpath='{.status.phase}'=Allocated "allocation/$ALLOCATION_NAME" --timeout=999m
