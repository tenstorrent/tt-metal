# Create allocation object in Kubernetes & wait

name: 'Create Allocation'
description: 'Composable action that creates Allocation object in Kubernetes'

inputs:
  allocationName:
    description: 'Allocation name'
    required: true
  spec:
    description: 'Allocation spec'
    required: false
    default: ''
  specFile:
    description: 'Path to allocation spec file (avoids corrupting large MGD via job outputs)'
    required: false
    default: ''
  explicit:
    description: 'List of explicit nodes (ignored when spec is provided)'
    required: false
    default: ''
  namespace:
    description: 'Target namespace for the allocation'
    required: false
    default: 'ttop-ci'

runs:
  using: 'composite'
  steps:
    - name: Construct allocation manifest (explicit)
      shell: bash
      id: explicit
      if: ${{ inputs.explicit != '' }}
      run: |
        cat <<EOF >> $GITHUB_ENV
        ALLOCATION_MANIFEST<<ALLOCATION_EOF
        apiVersion: tenstorrent.com/v1alpha1
        kind: Allocation
        metadata:
          name: ${{ inputs.allocationName }}
          namespace: ${{ inputs.namespace }}
        spec:
          retryPolicy: Always
          allocationType: Explicit
          explicit: [${{ inputs.explicit }}]
        ALLOCATION_EOF
        EOF

    - name: Construct allocation manifest (spec file)
      shell: bash
      id: spec-file
      if: ${{ inputs.specFile != '' }}
      run: |
        MANIFEST="/tmp/allocation-${{ inputs.allocationName }}.yaml"
        {
          echo "apiVersion: tenstorrent.com/v1alpha1"
          echo "kind: Allocation"
          echo "metadata:"
          echo "  name: ${{ inputs.allocationName }}"
          echo "  namespace: ${{ inputs.namespace }}"
          echo "spec:"
          echo "  retryPolicy: Always"
          sed 's/^/  /' "${{ inputs.specFile }}"
        } > "${MANIFEST}"
        echo "ALLOCATION_MANIFEST_PATH=${MANIFEST}" >> "$GITHUB_ENV"

    - name: Construct allocation manifest (spec)
      shell: bash
      id: spec
      if: ${{ inputs.spec != '' && inputs.specFile == '' }}
      run: |
        SPEC=$(printf '%s\n' '${{ inputs.spec }}' | sed 's/^/  /')
        cat <<EOF >> $GITHUB_ENV
        ALLOCATION_MANIFEST<<ALLOCATION_EOF
        apiVersion: tenstorrent.com/v1alpha1
        kind: Allocation
        metadata:
          name: ${{ inputs.allocationName }}
          namespace: ${{ inputs.namespace }}
        spec:
          retryPolicy: Always
        ${SPEC}
        ALLOCATION_EOF
        EOF

    - name: Create Allocation
      shell: bash
      run: |
        echo "Creating allocation..."
        if [ -n "${ALLOCATION_MANIFEST_PATH:-}" ]; then
          kubectl -n ${{ inputs.namespace }} apply -f "${ALLOCATION_MANIFEST_PATH}"
        else
          printf "%s" "${{ env.ALLOCATION_MANIFEST }}" | kubectl -n ${{ inputs.namespace }} apply -f -
        fi

    - name: Wait for allocation
      shell: bash
      run: |
        echo "Waiting for allocation to be ready..."
        kubectl -n ${{ inputs.namespace }} wait --for=jsonpath='{.status.phase}'=Allocated allocation/${{ inputs.allocationName }} --timeout=999m
