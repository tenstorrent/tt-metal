name: "Pull, tag, and push a docker image to GHCR as latest"
description: "Tags a Docker image as latest and pushes to GitHub Container Registry"

inputs:
  docker-image-tag:
    description: "Docker image tag in format REPO_NAME:VERSION"
    required: true
    type: string
  github-token:
    description: "GH Token for registry login"
    required: true
    type: string
  new-tag:
    description: "New tag to use, for example latest or v0.65.0"
    required: false
    type: string
    default: "latest"

outputs:
  repo-name:
    description: "Extracted repository name from docker image tag"
    value: ${{ steps.parse-repo.outputs.repo-name }}

runs:
  using: "composite"
  steps:
    - name: Validate docker image tag format
      shell: bash
      env:
        DOCKER_IMAGE_TAG: ${{ inputs.docker-image-tag }}
      run: |
        source "$GITHUB_ACTION_PATH/../../scripts/security/input-validation.sh"
        validate_docker_image "$DOCKER_IMAGE_TAG" || exit 1

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: "Download regctl"
      shell: bash
      run: |
        sudo curl -L https://github.com/regclient/regclient/releases/download/v0.9.2/regctl-linux-amd64 -o /usr/local/bin/regctl
        sudo chmod +x /usr/local/bin/regctl

    - name: Parse repository name
      id: parse-repo
      shell: bash
      env:
        DOCKER_IMAGE_TAG: ${{ inputs.docker-image-tag }}
      run: |
        source "$GITHUB_ACTION_PATH/../../scripts/security/input-validation.sh"
        REPO_NAME="${DOCKER_IMAGE_TAG%:*}"
        set_github_output "repo-name" "$REPO_NAME"
        echo "Extracted repository name: ${REPO_NAME}"

    - name: Pull, tag and push image
      shell: bash
      env:
        DOCKER_IMAGE_TAG: ${{ inputs.docker-image-tag }}
        REPO_NAME: ${{ steps.parse-repo.outputs.repo-name }}
        NEW_TAG: ${{ inputs.new-tag }}
      run: |
        LATEST_TAG="${REPO_NAME}:${NEW_TAG}"
        echo "Copying $DOCKER_IMAGE_TAG to ${LATEST_TAG}"
        regctl image copy "$DOCKER_IMAGE_TAG" "$LATEST_TAG"
