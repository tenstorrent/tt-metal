name: 'Trigger Auto-Triage for Regressions'
description: 'Triggers auto-triage workflow for each regressed job'
inputs:
  regressed_workflows_path:
    description: 'Path to a JSON file containing regressed workflows with failing jobs'
    required: true
  github_token:
    description: 'GitHub token for triggering workflows'
    required: true
  slack_ts:
    description: 'Slack message timestamp for threading replies (fallback when slack_ts_map has no entry for a pipeline)'
    required: false
  slack_ts_map:
    description: 'JSON map of pipeline name to Slack thread timestamp (e.g. {"galaxy-perf-tests": "1234567890.123456"}). When provided, each auto-triage dispatch uses its pipeline-specific ts so replies thread under the correct message.'
    required: false
  slack_channel_id:
    description: 'Slack channel ID for sending notifications'
    required: false
  slack_bot_token:
    description: 'Slack bot token for sending messages'
    required: false
  send-slack-message:
    description: 'Whether auto-triage should send a Slack message'
    required: false
    default: true

runs:
  using: 'node20'
  main: 'index.js'
