name: Find existing build for SHA
description: >
  Searches the repository's artifact list for a prior build artifact matching
  the current commit SHA and requested configuration (tracy, distributed).
  Works across ALL workflow types — direct workflow_dispatch, workflow_call
  from Sanity, Merge Gate, etc. — because it searches artifacts by name
  rather than querying workflow runs by workflow ID.

inputs:
  tracy:
    description: >
      Whether the caller needs a profiler-enabled build. When 'true', only
      profiler artifacts are accepted. When 'false' (default), BOTH profiler
      and non-profiler artifacts are accepted because a profiler build is a
      superset that can run non-profiler tests.
    required: false
    default: 'false'
  distributed:
    description: >
      Whether to look for a distributed-enabled build artifact.
      Artifacts built with distributed=false have '_no_distributed' in their
      name. Must match the calling workflow's distributed input.
    required: false
    default: 'true'
  check-wheel:
    description: >
      Also check for a matching wheel artifact in the prior run.
      When 'true', outputs wheel-found and wheel-run-id independently
      of the C++ build artifact search.
    required: false
    default: 'false'
  github-token:
    description: GitHub token for API access (needs actions:read)
    required: false
    default: ${{ github.token }}

outputs:
  run-id:
    description: The run ID of the prior build, or empty string if not found
    value: ${{ steps.find.outputs.run-id }}
  found:
    description: '''true'' if a reusable C++ build artifact was found, ''false'' otherwise'
    value: ${{ steps.find.outputs.found }}
  wheel-found:
    description: '''true'' if a reusable wheel artifact was also found, ''false'' otherwise'
    value: ${{ steps.find.outputs.wheel-found }}
  wheel-run-id:
    description: Run ID where the wheel artifact was found (empty if not found)
    value: ${{ steps.find.outputs.wheel-run-id }}

runs:
  using: composite
  steps:
    - name: Search for prior build artifacts by SHA
      id: find
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const sha = context.sha;
          const tracy = '${{ inputs.tracy }}' === 'true';
          const distributed = '${{ inputs.distributed }}' !== 'false';
          const checkWheel = '${{ inputs.check-wheel }}' === 'true';

          console.log(`Searching for existing build artifacts for SHA: ${sha}`);
          console.log(`Config: tracy=${tracy}, distributed=${distributed}, check-wheel=${checkWheel}`);
          console.log(`Profiler matching: ${tracy ? 'require profiler build' : 'accept any (profiler builds are a superset)'}`);

          // Artifact names follow the pattern:
          //   TTMetal_build_any_{VERSION}_{ARCH}_{TOOLCHAIN}[_profiler][_no_distributed]_{SHA}_{RUN_ID}
          // Wheel artifact names follow the pattern:
          //   ttnn-dist-cp{PYVER}-{BUILD_TYPE}[-profiler]-{SHA}-{RUN_ID}
          // The SHA in the name is the full commit SHA (or sanitized ref).
          // We match on: SHA (exact), profiler/tracy variant, and distributed variant.
          // Platform/arch/toolchain are not matched because >99% of builds use the
          // same defaults, and the SHA already ensures code identity.

          const MAX_PAGES = 5; // Search up to 500 recent artifacts
          let foundBuild = null;
          let foundWheel = null;

          try {
            for (let page = 1; page <= MAX_PAGES; page++) {
              const resp = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page
              });

              const artifacts = resp.data.artifacts;
              if (artifacts.length === 0) {
                console.log(`Page ${page}: no more artifacts`);
                break;
              }

              console.log(`Page ${page}: checking ${artifacts.length} artifacts...`);

              for (const artifact of artifacts) {
                // Skip expired artifacts
                if (artifact.expired) continue;

                // Skip artifacts from the current run
                if (artifact.workflow_run && artifact.workflow_run.id === context.runId) continue;

                // Must contain our commit SHA
                if (!artifact.name.includes(sha)) continue;

                // Check for C++ build artifact
                if (!foundBuild && artifact.name.startsWith('TTMetal_build_any')) {
                  // Match tracy/profiler variant.
                  // A profiler build is a superset of a non-profiler build — it can
                  // run both profiler and non-profiler tests. So when the caller wants
                  // tracy=false, we accept EITHER variant. When the caller wants
                  // tracy=true, we require the profiler build specifically.
                  const hasProfiler = artifact.name.includes('_profiler');
                  if (tracy && !hasProfiler) continue;

                  // Match distributed variant
                  const hasNoDistributed = artifact.name.includes('_no_distributed');
                  if (distributed === hasNoDistributed) continue;

                  foundBuild = artifact;
                }

                // Check for wheel artifact (only if requested)
                if (checkWheel && !foundWheel && artifact.name.startsWith('ttnn-dist-cp')) {
                  // Match profiler variant: wheel names use '-profiler-' when tracy is enabled.
                  // Same superset logic: profiler wheels work for non-profiler callers,
                  // but non-profiler wheels don't work for profiler callers.
                  const wheelHasProfiler = artifact.name.includes('-profiler-');
                  if (tracy && !wheelHasProfiler) continue;
                  foundWheel = artifact;
                }

                // Early exit if we found everything we need
                if (foundBuild && (!checkWheel || foundWheel)) break;
              }

              if (foundBuild && (!checkWheel || foundWheel)) break;
            }
          } catch (err) {
            // If we lack actions:read permission, the API returns 403.
            // Gracefully fall through to building from scratch.
            console.log(`⚠️ Could not list artifacts (${err.status || err.message}) — will build fresh`);
            console.log('Hint: ensure the calling job has "actions: read" permission');
            core.setOutput('run-id', '');
            core.setOutput('found', 'false');
            core.setOutput('wheel-found', 'false');
            core.setOutput('wheel-run-id', '');
            return;
          }

          if (foundBuild) {
            const runId = foundBuild.workflow_run ? foundBuild.workflow_run.id : '';
            console.log(`✅ Found reusable build artifact "${foundBuild.name}" from run ${runId}`);
            core.setOutput('run-id', runId.toString());
            core.setOutput('found', 'true');
          } else {
            console.log('No reusable C++ build artifacts found — will build fresh');
            core.setOutput('run-id', '');
            core.setOutput('found', 'false');
          }

          if (foundWheel) {
            const wheelRunId = foundWheel.workflow_run ? foundWheel.workflow_run.id : '';
            console.log(`✅ Found reusable wheel artifact "${foundWheel.name}" from run ${wheelRunId}`);
            core.setOutput('wheel-found', 'true');
            core.setOutput('wheel-run-id', wheelRunId.toString());
          } else {
            if (checkWheel) {
              console.log('No reusable wheel artifact found — will build wheel fresh');
            }
            core.setOutput('wheel-found', 'false');
            core.setOutput('wheel-run-id', '');
          }
