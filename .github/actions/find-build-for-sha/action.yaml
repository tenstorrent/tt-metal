name: Find existing build for SHA
description: >
  Queries the GitHub API for a prior successful run of build-artifact.yaml
  on the current commit SHA that has a non-expired build artifact matching
  the requested configuration. Outputs the run ID so callers can download
  artifacts instead of rebuilding.

inputs:
  workflow-filename:
    description: The workflow filename to search (e.g. build-artifact.yaml)
    required: false
    default: build-artifact.yaml
  tracy:
    description: >
      Whether to look for a profiler-enabled build artifact.
      Must match the 'true'/'false' string value of the calling workflow's
      tracy input so the correct artifact variant is selected.
    required: false
    default: 'false'
  github-token:
    description: GitHub token for API access (needs actions:read)
    required: false
    default: ${{ github.token }}

outputs:
  run-id:
    description: The run ID of the prior build, or empty string if not found
    value: ${{ steps.find.outputs.run-id }}
  found:
    description: '''true'' if a reusable artifact was found, ''false'' otherwise'
    value: ${{ steps.find.outputs.found }}

runs:
  using: composite
  steps:
    - name: Search for prior successful build
      id: find
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const sha = context.sha;
          const workflowFile = '${{ inputs.workflow-filename }}';
          const tracy = '${{ inputs.tracy }}' === 'true';

          console.log(`Searching for existing build artifacts for SHA: ${sha}`);
          console.log(`Workflow: ${workflowFile}`);
          console.log(`Config: tracy=${tracy}`);

          // List successful runs of the target workflow for this SHA
          const runs = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: workflowFile,
            head_sha: sha,
            status: 'success',
            per_page: 10
          });

          console.log(`Found ${runs.data.workflow_runs.length} successful prior run(s) for SHA ${sha}`);

          for (const run of runs.data.workflow_runs) {
            // Skip the current run
            if (run.id === context.runId) continue;

            const { data: artifactData } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id
            });

            const artifacts = artifactData.artifacts.filter(a => !a.expired);
            const artifactNames = artifacts.map(a => a.name);
            console.log(`Run ${run.id} has ${artifacts.length} non-expired artifact(s): ${artifactNames.join(', ')}`);

            // Find the build artifact matching the requested tracy/non-tracy variant.
            // Artifact names follow the pattern: TTMetal_build_any_<version>_...[_profiler_]...
            const buildArtifact = artifacts.find(a => {
              if (!a.name.startsWith('TTMetal_build_any')) return false;
              const hasProfiler = a.name.includes('_profiler_');
              return tracy ? hasProfiler : !hasProfiler;
            });

            if (buildArtifact) {
              console.log(`✅ Found reusable build artifact "${buildArtifact.name}" in run ${run.id} (${run.html_url})`);
              core.setOutput('run-id', run.id.toString());
              core.setOutput('found', 'true');
              return;
            } else {
              const missing = tracy
                ? 'TTMetal_build_any (profiler variant)'
                : 'TTMetal_build_any (non-profiler variant)';
              console.log(`Run ${run.id}: missing ${missing}, skipping`);
            }
          }

          console.log('No reusable artifacts found — will build fresh');
          core.setOutput('run-id', '');
          core.setOutput('found', 'false');
