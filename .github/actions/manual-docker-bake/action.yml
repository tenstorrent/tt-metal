name: "Manual Docker Bake"
description: "Run docker buildx bake via CLI with shared options"

inputs:
  bake-file:
    description: "Path to docker-bake.hcl file"
    required: false
    default: "dockerfile/docker-bake.hcl"
  targets:
    description: "Bake targets to build (comma-separated)"
    required: true
  set-lines:
    description: "Newline-delimited bake --set overrides"
    required: false
    default: ""
  ubuntu-version:
    description: "Optional UBUNTU_VERSION env for bake args"
    required: false
    default: ""
  python-version:
    description: "Optional PYTHON_VERSION env for bake args"
    required: false
    default: ""
  retries:
    description: "Number of attempts before failing"
    required: false
    default: "3"
  retry-delay-seconds:
    description: "Delay between retries"
    required: false
    default: "5"
  use-default-builder:
    description: >-
      Select the buildx 'default' builder before invoking bake. Every current
      caller of this action runs docker/setup-buildx-action beforehand to
      provision a docker-container builder capable of the zstd/OCI-mediatype
      image exporter, so this must stay false or bake silently switches back
      to the classic driver and loses that exporter support. Only set true if
      a caller intentionally wants the classic default driver instead.
    required: false
    default: "false"
  validate-images:
    description: "Validate that built images can be inspected after build"
    required: false
    default: "true"
  enable-attestations:
    description: >-
      Request full (mode=max) build provenance and a real SBOM attestation for
      every target, via the attest target field - buildx bake ignores unknown
      keys placed inside a target's output= string (e.g. provenance=false),
      so this must go through attest instead. Every pushed tag therefore
      becomes a multi-manifest OCI Image Index (real per-platform image
      manifest + a separate "unknown/unknown" attestation-manifest); GHCR's
      package page does not render that shape and drops description/label
      display for the tag as a result (reported to GitHub separately - see
      tenstorrent/tt-metal#49882). That's a registry-UI limitation, not a
      reason to skip attestations: pulls, containerd, and scanners all
      handle the Index/attestation-manifest shape correctly. Set to "false"
      to instead explicitly disable attestations for a caller that wants
      neither (e.g. to skip the extra SBOM-generator build time).
    required: false
    default: "true"
  harbor-prefix:
    description: >-
      Harbor pull-through cache prefix (e.g. 'harbor.example.com/'). If non-empty
      and the first bake attempt fails, a second attempt is made with the prefix
      stripped from all docker-image:// context URIs (GHCR direct fallback).
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Run docker buildx bake
      shell: bash
      env:
        INPUT_BAKE_FILE: ${{ inputs.bake-file }}
        INPUT_TARGETS: ${{ inputs.targets }}
        INPUT_SET_LINES: ${{ inputs.set-lines }}
        INPUT_UBUNTU_VERSION: ${{ inputs.ubuntu-version }}
        INPUT_PYTHON_VERSION: ${{ inputs.python-version }}
        INPUT_RETRIES: ${{ inputs.retries }}
        INPUT_RETRY_DELAY_SECONDS: ${{ inputs.retry-delay-seconds }}
        INPUT_USE_DEFAULT_BUILDER: ${{ inputs.use-default-builder }}
        INPUT_VALIDATE_IMAGES: ${{ inputs.validate-images }}
        INPUT_ENABLE_ATTESTATIONS: ${{ inputs.enable-attestations }}
        INPUT_HARBOR_PREFIX: ${{ inputs.harbor-prefix }}
      run: |
        set -euo pipefail

        if [ "${INPUT_USE_DEFAULT_BUILDER}" = "true" ]; then
          docker buildx use default || true
        fi

        if [ -n "${INPUT_UBUNTU_VERSION}" ]; then
          export UBUNTU_VERSION="${INPUT_UBUNTU_VERSION}"
        fi
        if [ -n "${INPUT_PYTHON_VERSION}" ]; then
          export PYTHON_VERSION="${INPUT_PYTHON_VERSION}"
        fi

        mapfile -t SET_LINES < <(printf '%s\n' "${INPUT_SET_LINES}")

        IFS=',' read -r -a TARGETS <<< "${INPUT_TARGETS}"
        CLEAN_TARGETS=()
        for t in "${TARGETS[@]}"; do
          trimmed="${t#"${t%%[![:space:]]*}"}"
          trimmed="${trimmed%"${trimmed##*[![:space:]]}"}"
          [ -n "$trimmed" ] && CLEAN_TARGETS+=("$trimmed")
        done
        if [ "${#CLEAN_TARGETS[@]}" -eq 0 ]; then
          echo "No bake targets provided."
          exit 1
        fi

        BAKE_SETS=()
        for s in "${SET_LINES[@]}"; do
          [ -n "$s" ] && BAKE_SETS+=(--set "$s")
        done
        if [ "${INPUT_ENABLE_ATTESTATIONS}" = "true" ]; then
          for t in "${CLEAN_TARGETS[@]}"; do
            BAKE_SETS+=(--set "${t}.attest=type=provenance,mode=max")
            BAKE_SETS+=(--set "${t}.attest=type=sbom")
          done
        else
          for t in "${CLEAN_TARGETS[@]}"; do
            BAKE_SETS+=(--set "${t}.attest=type=provenance,disabled=true")
            BAKE_SETS+=(--set "${t}.attest=type=sbom,disabled=true")
          done
        fi

        retries="${INPUT_RETRIES}"
        delay="${INPUT_RETRY_DELAY_SECONDS}"
        attempt=1
        bake_success=false
        last_bake_exit=0
        until [ "$attempt" -gt "$retries" ]; do
          echo "docker buildx bake targets=${CLEAN_TARGETS[*]} attempt ${attempt}/${retries}"
          docker buildx bake -f "${INPUT_BAKE_FILE}" "${BAKE_SETS[@]}" "${CLEAN_TARGETS[@]}" \
            && last_bake_exit=0 || last_bake_exit=$?
          if [ "$last_bake_exit" -eq 0 ]; then
            bake_success=true
            break
          fi
          if [ "$attempt" -lt "$retries" ]; then
            echo "Bake failed, retrying in ${delay}s..."
            sleep "$delay"
          fi
          attempt=$((attempt + 1))
        done

        if [ "$bake_success" != "true" ]; then
          if [ -n "${INPUT_HARBOR_PREFIX}" ]; then
            echo "WARNING: Bake failed after ${retries} attempt(s) with Harbor prefix." \
              "Retrying without Harbor prefix (GHCR direct fallback)..."
            FALLBACK_SETS=()
            for s in "${SET_LINES[@]}"; do
              if [ -n "$s" ]; then
                # Strip harbor prefix from docker-image:// context URIs so bake pulls from GHCR directly
                stripped="${s//"docker-image://${INPUT_HARBOR_PREFIX}"/"docker-image://"}"
                FALLBACK_SETS+=(--set "$stripped")
              fi
            done
            if [ "${INPUT_ENABLE_ATTESTATIONS}" = "true" ]; then
              for t in "${CLEAN_TARGETS[@]}"; do
                FALLBACK_SETS+=(--set "${t}.attest=type=provenance,mode=max")
                FALLBACK_SETS+=(--set "${t}.attest=type=sbom")
              done
            else
              for t in "${CLEAN_TARGETS[@]}"; do
                FALLBACK_SETS+=(--set "${t}.attest=type=provenance,disabled=true")
                FALLBACK_SETS+=(--set "${t}.attest=type=sbom,disabled=true")
              done
            fi
            docker buildx bake -f "${INPUT_BAKE_FILE}" "${FALLBACK_SETS[@]}" "${CLEAN_TARGETS[@]}" \
              && bake_success=true || last_bake_exit=$?
            if [ "$bake_success" = "true" ]; then
              echo "Bake succeeded after GHCR direct fallback."
            else
              echo "ERROR: Bake failed even without Harbor prefix (exit code: ${last_bake_exit})."
              exit 1
            fi
          else
            echo "ERROR: Bake failed after ${retries} attempts (last exit code: ${last_bake_exit})."
            exit 1
          fi
        fi

        # Validate that images were actually built and are inspectable
        validation_failed=false
        if [ "${INPUT_VALIDATE_IMAGES}" = "true" ]; then
          echo ""
          echo "Validating built images..."
          for target in "${CLEAN_TARGETS[@]}"; do
            # Check if there's a tag override in the set-lines for this target
            target_tag=""
            target_output=""
            for s in "${SET_LINES[@]}"; do
              # Extract tag override: target.tags=xxx
              if [[ "$s" =~ ^${target}\.tags=(.+)$ ]]; then
                target_tag="${BASH_REMATCH[1]}"
              fi
              # Extract output override: target.output=xxx
              if [[ "$s" =~ ^${target}\.output=(.+)$ ]]; then
                target_output="${BASH_REMATCH[1]}"
              fi
            done

            # Determine how to validate based on output configuration
            # If output contains 'push=true' without 'type=docker', image is registry-only
            if [[ "$target_output" =~ push=true ]] && [[ ! "$target_output" =~ type=docker ]]; then
              # Registry-only image - validate by checking manifest
              if [ -n "$target_tag" ]; then
                echo "Checking registry image for target '$target' (tag: $target_tag)..."
                if ! docker manifest inspect "$target_tag" > /dev/null 2>&1; then
                  echo "ERROR: Registry image validation failed for target '$target' (tag: $target_tag)"
                  echo "The build reported success but the image is not available in the registry."
                  validation_failed=true
                else
                  echo "  Registry image validated: $target_tag"

                  # Verbose: print manifest/attestation-manifest sizes, provenance, and SBOM summary.
                  # Never fails validation itself (all commands below are best-effort/informational).
                  IMAGETOOLS_JSON=$(docker buildx imagetools inspect "$target_tag" --format '{{json .}}' 2>/dev/null || echo "")
                  if [ -n "$IMAGETOOLS_JSON" ]; then
                    echo "$IMAGETOOLS_JSON" | jq -r '
                      "  Manifest: \(.manifest.mediaType // "unknown") digest=\(.manifest.digest // "?")",
                      (if .manifest.manifests then
                        (.manifest.manifests[] | "    - " + (.platform.architecture // "?") + "/" + (.platform.os // "?") + " " + .mediaType + " size=" + (.size | tostring) + " bytes" + (if .annotations["vnd.docker.reference.type"] then " [" + .annotations["vnd.docker.reference.type"] + "]" else "" end))
                      else
                        "    (single manifest, size=" + (.manifest.size // 0 | tostring) + " bytes)"
                      end)
                    ' 2>/dev/null || echo "    (could not parse imagetools manifest output)"
                  else
                    echo "  WARNING: docker buildx imagetools inspect failed for $target_tag - skipping size/attestation details"
                  fi

                  PROVENANCE_JSON=$(docker buildx imagetools inspect "$target_tag" --format '{{json .Provenance}}' 2>/dev/null || echo "")
                  if [ -n "$PROVENANCE_JSON" ] && [ "$PROVENANCE_JSON" != "null" ]; then
                    echo "  Provenance (SLSA):"
                    echo "$PROVENANCE_JSON" | jq -c '.SLSA | {builder, buildType, materialsCount: (.materials // [] | length)}' 2>/dev/null \
                      | sed 's/^/    /' || echo "    (could not parse provenance JSON)"
                  else
                    echo "  WARNING: no provenance attestation found for $target_tag"
                  fi

                  SBOM_JSON=$(docker buildx imagetools inspect "$target_tag" --format '{{json .SBOM}}' 2>/dev/null || echo "")
                  if [ -n "$SBOM_JSON" ] && [ "$SBOM_JSON" != "null" ]; then
                    SBOM_PKG_COUNT=$(echo "$SBOM_JSON" | jq -r '.SPDX.packages // [] | length' 2>/dev/null || echo "?")
                    SBOM_BYTES=$(echo -n "$SBOM_JSON" | wc -c)
                    echo "  SBOM (SPDX): ${SBOM_PKG_COUNT} packages, ${SBOM_BYTES} bytes" \
                      "(full document not printed here - too large for logs; fetch with" \
                      "'docker buildx imagetools inspect ${target_tag} --format \"{{json .SBOM}}\"')"
                  else
                    echo "  WARNING: no SBOM attestation found for $target_tag"
                  fi
                fi
              else
                echo "  Skipping validation for target '$target' (no tag specified for registry check)"
              fi
            else
              # Local image validation
              local_tag="$target_tag"
              if [ -z "$local_tag" ]; then
                # Get the default image name from the bake file
                local_tag=$(docker buildx bake -f "${INPUT_BAKE_FILE}" --print "$target" 2>/dev/null \
                  | jq -r --arg t "$target" '.target[$t].tags[0]' 2>/dev/null || echo "")
                if [ -z "$local_tag" ] || [ "$local_tag" = "null" ]; then
                  local_tag="tt-metalium-${target}:local"
                fi
              fi
              echo "Checking local image for target '$target' (tag: $local_tag)..."
              if ! docker image inspect "$local_tag" > /dev/null 2>&1; then
                echo "ERROR: Image validation failed for target '$target' (tag: $local_tag)"
                echo "The build reported success but the image is not inspectable."
                validation_failed=true
              else
                local_size=$(docker image inspect "$local_tag" --format '{{.Size}}' 2>/dev/null || echo "?")
                echo "  Local image validated: $local_tag (size=${local_size} bytes)"
                echo "  (local docker-loaded images don't carry attestation manifests - no provenance/SBOM to report)"
              fi
            fi
          done

          if [ "$validation_failed" = "true" ]; then
            echo "ERROR: One or more image validations failed."
            exit 1
          fi
          echo "All images validated successfully."
        fi
