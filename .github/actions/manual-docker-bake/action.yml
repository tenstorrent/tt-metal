name: "Manual Docker Bake"
description: "Run docker buildx bake via CLI with shared options"

inputs:
  bake-file:
    description: "Path to docker-bake.hcl file"
    required: false
    default: "dockerfile/docker-bake.hcl"
  targets:
    description: "Bake targets to build (comma-separated)"
    required: true
  set-lines:
    description: "Newline-delimited bake --set overrides"
    required: false
    default: ""
  ubuntu-version:
    description: "Optional UBUNTU_VERSION env for bake args"
    required: false
    default: ""
  python-version:
    description: "Optional PYTHON_VERSION env for bake args"
    required: false
    default: ""
  retries:
    description: "Number of attempts before failing"
    required: false
    default: "3"
  retry-delay-seconds:
    description: "Delay between retries"
    required: false
    default: "5"
  use-default-builder:
    description: "Select buildx default builder before invoking bake"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Run docker buildx bake
      shell: bash
      env:
        INPUT_BAKE_FILE: ${{ inputs.bake-file }}
        INPUT_TARGETS: ${{ inputs.targets }}
        INPUT_SET_LINES: ${{ inputs.set-lines }}
        INPUT_UBUNTU_VERSION: ${{ inputs.ubuntu-version }}
        INPUT_PYTHON_VERSION: ${{ inputs.python-version }}
        INPUT_RETRIES: ${{ inputs.retries }}
        INPUT_RETRY_DELAY_SECONDS: ${{ inputs.retry-delay-seconds }}
        INPUT_USE_DEFAULT_BUILDER: ${{ inputs.use-default-builder }}
      run: |
        set -euo pipefail

        if [ "${INPUT_USE_DEFAULT_BUILDER}" = "true" ]; then
          docker buildx use default || true
        fi

        if [ -n "${INPUT_UBUNTU_VERSION}" ]; then
          export UBUNTU_VERSION="${INPUT_UBUNTU_VERSION}"
        fi
        if [ -n "${INPUT_PYTHON_VERSION}" ]; then
          export PYTHON_VERSION="${INPUT_PYTHON_VERSION}"
        fi

        mapfile -t SET_LINES < <(printf '%s\n' "${INPUT_SET_LINES}")

        BAKE_SETS=()
        for s in "${SET_LINES[@]}"; do
          [ -n "$s" ] && BAKE_SETS+=(--set "$s")
        done

        IFS=',' read -r -a TARGETS <<< "${INPUT_TARGETS}"
        CLEAN_TARGETS=()
        for t in "${TARGETS[@]}"; do
          trimmed="${t#"${t%%[![:space:]]*}"}"
          trimmed="${trimmed%"${trimmed##*[![:space:]]}"}"
          [ -n "$trimmed" ] && CLEAN_TARGETS+=("$trimmed")
        done
        if [ "${#CLEAN_TARGETS[@]}" -eq 0 ]; then
          echo "No bake targets provided."
          exit 1
        fi

        retries="${INPUT_RETRIES}"
        delay="${INPUT_RETRY_DELAY_SECONDS}"
        attempt=1
        until [ "$attempt" -gt "$retries" ]; do
          echo "docker buildx bake targets=${CLEAN_TARGETS[*]} attempt ${attempt}/${retries}"
          if docker buildx bake -f "${INPUT_BAKE_FILE}" "${BAKE_SETS[@]}" "${CLEAN_TARGETS[@]}"; then
            exit 0
          fi
          if [ "$attempt" -lt "$retries" ]; then
            echo "Bake failed, retrying in ${delay}s..."
            sleep "$delay"
          fi
          attempt=$((attempt + 1))
        done

        echo "Bake failed after ${retries} attempts."
        exit 1
