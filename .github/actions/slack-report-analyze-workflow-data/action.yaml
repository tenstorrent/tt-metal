name: "Report Workflow Status to Slack"
description: "Report the workflow status to Slack to help identify breakages faster."
inputs:
  slack_webhook_url:
    description: "Webhook URL for the Slack channel to be posted to. Generated via slack app!"
    required: false
  channel_id:
    description: "Channel ID for the Slack channel (required if using Bot Token)"
    required: false
  regressed_workflows_path:
    description: "Path to a JSON file containing regressed workflows"
    required: false
  alert_all_message_path:
    description: "Path to a text file containing the Slack-ready alert text"
    required: false
outputs:
  slack_ts:
    description: "The timestamp of the first sent Slack message (only available when using Bot Token)"
    value: ${{ steps.slack_send.outputs.ts }}
  slack_ts_map:
    description: "JSON map keyed '<workflow_name> / <job_name>' (or just '<workflow_name>' when a regression has no failing jobs) to that entry's Slack thread timestamp. Bot Token only."
    value: ${{ steps.slack_send.outputs.slack_ts_map }}
runs:
  using: "composite"
  steps:
    - name: Build Slack message from regressions
      id: build
      shell: bash
      env:
        ALERT_PATH: ${{ inputs.alert_all_message_path }}
        REGRESSED_PATH: ${{ inputs.regressed_workflows_path }}
      run: |
        set -euo pipefail
        tmp_file="$(mktemp)"
        cleanup_tmp_file() {
          rm -f "$tmp_file"
        }
        trap cleanup_tmp_file EXIT

        if [ -n "${REGRESSED_PATH:-}" ] && [ -f "$REGRESSED_PATH" ]; then
          cp "$REGRESSED_PATH" "$tmp_file"
        else
          printf '%s' '[]' > "$tmp_file"
        fi

        if [ -n "${ALERT_PATH:-}" ] && [ -f "$ALERT_PATH" ]; then
          ALERT_RAW="$(cat "$ALERT_PATH")"
        else
          ALERT_RAW=""
        fi

        if ! jq -e . "$tmp_file" >/dev/null 2>&1; then
          echo "⚠️ Failed to parse regression list JSON. Skipping Slack notification."
          echo "has_regressions=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Check if there are any regressions
        REGRESSION_COUNT=$(jq -r 'if (type=="array") then length else 0 end' "$tmp_file")
        if [ "$REGRESSION_COUNT" -eq 0 ]; then
          echo "✅ No regressions detected. Skipping Slack notification (only posting when there are regressions)."
          echo "has_regressions=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "📊 Found $REGRESSION_COUNT regression(s). Preparing Slack notification..."
        echo "has_regressions=true" >> "$GITHUB_OUTPUT"

        # Slack has a 3000 character limit per text block
        # Use 2500 as our target to leave room for chunk indicators and formatting
        MAX_BLOCK_TEXT_LENGTH=2500
        # Use actual newline character
        NEWLINE=$'\n'
        HEADER_PREFIX="❌ *Regressions (Pass → Fail):*${NEWLINE}"

        # Function to format a single failing job to text
        format_single_job() {
          local job_json="${1:-}"
          echo "$job_json" | jq -r '
                if (. | type) == "object" and .name then
                  (if .url and (.url | length) > 0 then
                    "    • <" + .url + "|" + .name + ">"
                  else
                    "    • " + .name
                  end) + (if (.owners | type) == "array" and (.owners | length) > 0 then
                    " " + (.owners | map(
                      if (.name // "") != "" then "@" + .name
                      else null end
                    ) | map(select(. != null)) | join(" "))
                  else "" end)
                elif (. | type) == "string" then
                  "    • " + .
                else
              ""
            end
          ' 2>/dev/null || echo ""
        }

        # Function to format regression header (without failing jobs)
        format_regression_header() {
          local regression_json="${1:-}"
          echo "$regression_json" | jq -r '
              "*" + .name + "*"
              + (if .workflow_url then " — <" + .workflow_url + "|workflow>" else "" end)
              + (if .run_url then " — <" + .run_url + "|run>" else "" end)
              + (if .commit_url and .commit_short then " — <" + .commit_url + "|" + .commit_short + ">" else "" end)
          ' 2>/dev/null || echo ""
        }

        # Reserve space for chunk indicator (e.g., "[Part X/Y]" text)
        CHUNK_INDICATOR_BUFFER=100

        # Split regressions into chunks, splitting failing jobs if a single regression is too large
        chunk_dir="$(mktemp -d)"
        # Ensure temporary chunk directory is cleaned up on exit of this step
        # Note: payload files are cleaned up in the slack_send step after they're used
        cleanup_chunk_dir() {
          if [ -n "${chunk_dir:-}" ] && [ -d "$chunk_dir" ]; then
            rm -rf "$chunk_dir"
          fi
        }
        trap cleanup_chunk_dir EXIT

        chunk_index=0

        # ── Per-JOB granularity ──────────────────────────────────────────
        # Every failing job becomes its OWN top-level Slack message and its
        # own entry in TS_MAP.  Boundary key format:
        #   "<workflow_name> / <job_name>"  (matches the lookup key used by
        #   trigger-auto-triage-for-regressions/index.js)
        #
        # Regressions that have zero failing jobs still emit one message so
        # the operator sees them; those boundaries are keyed by the
        # workflow name alone, and the trigger action's fallback chain
        # resolves them via slackTsMap[workflow.name].
        for i in $(seq 0 $((REGRESSION_COUNT - 1))); do
          regression=$(jq -c ".[$i]" "$tmp_file")
          regression_name=$(echo "$regression" | jq -r '.name // "Unknown"')
          regression_header=$(format_regression_header "$regression")

          failing_jobs_count=$(echo "$regression" | jq -r '.failing_jobs | if type == "array" then length else 0 end')

          echo "Processing regression $((i + 1)): $regression_name with $failing_jobs_count failing jobs"

          if [ "$failing_jobs_count" -eq 0 ]; then
            # No failing jobs — single workflow-level message.
            boundary_key="$regression_name"
            echo "$boundary_key" > "${GITHUB_WORKSPACE}/slack_regression_boundary_${chunk_index}.txt"
            echo "  → Workflow-only boundary [$chunk_index]: $boundary_key"

            chunk_text="${HEADER_PREFIX}${regression_header}"
            chunk_length=${#chunk_text}
            if [ "$chunk_length" -gt "$((MAX_BLOCK_TEXT_LENGTH - CHUNK_INDICATOR_BUFFER))" ]; then
              echo "⚠️ Workflow-only message for '$regression_name' is ${chunk_length} chars, exceeds budget $((MAX_BLOCK_TEXT_LENGTH - CHUNK_INDICATOR_BUFFER)); truncating header"
              chunk_text="${HEADER_PREFIX}*${regression_name}*"
            fi
            echo "$chunk_text" > "${chunk_dir}/chunk_${chunk_index}.txt"
            chunk_index=$((chunk_index + 1))
            continue
          fi

          for j in $(seq 0 $((failing_jobs_count - 1))); do
            job=$(echo "$regression" | jq -c ".failing_jobs[$j]")
            job_text=$(format_single_job "$job")
            job_name=$(echo "$job" | jq -r 'if type == "object" then (.name // "Unknown") else . end')

            if [ -z "$job_text" ]; then
              echo "  → Skipping empty job_text for job index $j in $regression_name"
              continue
            fi

            boundary_key="${regression_name} / ${job_name}"
            echo "$boundary_key" > "${GITHUB_WORKSPACE}/slack_regression_boundary_${chunk_index}.txt"
            echo "  → Per-job boundary [$chunk_index]: $boundary_key"

            chunk_text="${HEADER_PREFIX}${regression_header}${NEWLINE}${job_text}"
            chunk_length=${#chunk_text}
            if [ "$chunk_length" -gt "$((MAX_BLOCK_TEXT_LENGTH - CHUNK_INDICATOR_BUFFER))" ]; then
              # A single regression-header + job-line that exceeds the budget
              # is unexpected; log loudly and fall back to a minimal message
              # so the operator still sees *something* for this job.
              echo "⚠️ Per-job message for '$boundary_key' is ${chunk_length} chars, exceeds budget $((MAX_BLOCK_TEXT_LENGTH - CHUNK_INDICATOR_BUFFER)); falling back to minimal body"
              chunk_text="${HEADER_PREFIX}*${regression_name}*${NEWLINE}    • ${job_name}"
            fi
            echo "$chunk_text" > "${chunk_dir}/chunk_${chunk_index}.txt"
            chunk_index=$((chunk_index + 1))
          done
        done

        TOTAL_CHUNKS=$chunk_index
        echo "total_chunks=$TOTAL_CHUNKS" >> "$GITHUB_OUTPUT"
        echo "Created $TOTAL_CHUNKS chunk(s)"

        # Count total failing workflows from alert_all_message
        # The alert message format is: "*Alerts: failing workflows on main*\n• Workflow Name <url|open> mentions jobs"
        # We count lines starting with "• " to get the total number of failing workflows
        FAILING_WORKFLOWS_COUNT_MESSAGE=""
        if [ -n "${ALERT_RAW:-}" ]; then
          # Decode the alert message and count workflow lines
          decoded_alert=$(printf '%b' "$ALERT_RAW")
          total_failing_count=$(echo "$decoded_alert" | grep -E '^• ' | wc -l | tr -d ' ')

          # Subtract regressions (already shown in detail) to get "other" failing workflows
          other_failing_count=$((total_failing_count - REGRESSION_COUNT))

          # Format the message (singular vs plural)
          if [ "$other_failing_count" -gt 0 ]; then
            if [ "$other_failing_count" -eq 1 ]; then
              FAILING_WORKFLOWS_COUNT_MESSAGE="1 other pipeline is failing"
            else
              FAILING_WORKFLOWS_COUNT_MESSAGE="$other_failing_count other pipelines are failing"
            fi
          fi
        fi

        # Build payloads for each chunk
        HEADER="Aggregate Workflow Data run: "
        HEADER+="<https://github.com/${GITHUB_REPOSITORY}"
        HEADER+="/actions/runs/${GITHUB_RUN_ID}|this run>"

        # Generate payloads for all chunks and store them
        # Temporarily disable exit on error so we create all payload files even if one fails
        set +e
        for i in $(seq 0 $((TOTAL_CHUNKS - 1))); do
          chunk_file="${chunk_dir}/chunk_${i}.txt"
          if [ ! -f "$chunk_file" ]; then
            echo "⚠️ Chunk file not found: $chunk_file"
            continue
          fi

          # Read the pre-formatted chunk text
          chunk_full_text=$(cat "$chunk_file" 2>/dev/null || echo "Error reading chunk")
          if [ "$chunk_full_text" = "Error reading chunk" ]; then
            echo "⚠️ Failed to read chunk $i"
            continue
          fi

          # Add chunk indicator if there are multiple chunks
          if [ "$TOTAL_CHUNKS" -gt 1 ]; then
            chunk_full_text="*[Part $((i + 1))/$TOTAL_CHUNKS]*"$'\n'"${chunk_full_text}"
          fi

          # Verify the final text length doesn't exceed Slack's limit
          final_text_length=$(printf '%s' "$chunk_full_text" | wc -c)
          echo "Chunk $((i + 1)) text length: $final_text_length characters"
          if [ "$final_text_length" -gt 3000 ]; then
            echo "⚠️ Warning: Chunk $((i + 1)) text length ($final_text_length) exceeds Slack's 3000 char limit"
            echo "This chunk may fail to send."
          fi

          # Add failing workflows count message only to the last chunk
          PAYLOAD=""
          if [ "$i" -eq $((TOTAL_CHUNKS - 1)) ] && [ -n "${FAILING_WORKFLOWS_COUNT_MESSAGE:-}" ]; then
            PAYLOAD=$(jq -cn \
              --arg header "$HEADER" \
              --arg body "$chunk_full_text" \
              --arg failing_count_msg "$FAILING_WORKFLOWS_COUNT_MESSAGE" \
              '
              {
                "text": ($header + "\n" + $body + "\n\n" + $failing_count_msg),
                "blocks": [
                  { "type": "section", "text": { "type": "mrkdwn", "text": $header } },
                  { "type": "section", "text": { "type": "mrkdwn", "text": $body } },
                  { "type": "section", "text": { "type": "mrkdwn", "text": $failing_count_msg } }
                ]
              }
            ' 2>/dev/null || echo "")
          else
            PAYLOAD=$(jq -cn \
              --arg header "$HEADER" \
              --arg body "$chunk_full_text" \
              '
              {
                "text": ($header + "\n" + $body),
                "blocks": [
                  { "type": "section", "text": { "type": "mrkdwn", "text": $header } },
                  { "type": "section", "text": { "type": "mrkdwn", "text": $body } }
                ]
              }
            ' 2>/dev/null || echo "")
          fi

          if [ -z "$PAYLOAD" ]; then
            echo "⚠️ Failed to create payload for chunk $i"
            continue
          fi

          # Verify the actual block text length in the payload (after JSON encoding)
          body_block_text=$(echo "$PAYLOAD" | \
            jq -r '.blocks[1].text.text // .blocks[1].text // ""' 2>/dev/null || echo "")
          body_block_text_length=$(printf '%s' "$body_block_text" | wc -c)
          echo "Chunk $((i + 1)) body block text length: $body_block_text_length chars"
          if [ "$body_block_text_length" -gt 3000 ]; then
            echo "⚠️ CRITICAL: Chunk $((i + 1)) block text exceeds Slack's 3000 char limit!"
          fi

          # Store payload in a file for the send step
          payload_file="${GITHUB_WORKSPACE}/slack_payload_${i}.json"
          echo "$PAYLOAD" > "$payload_file"
          echo "Created payload file: $payload_file ($(wc -c < "$payload_file") bytes)"
        done
        set -e

        # Verify all payload files were created
        echo "Verifying payload files were created:"
        for i in $(seq 0 $((TOTAL_CHUNKS - 1))); do
          payload_file="${GITHUB_WORKSPACE}/slack_payload_${i}.json"
          if [ -f "$payload_file" ]; then
            body_len=$(jq -r '.blocks[1].text.text // .blocks[1].text // ""' "$payload_file" 2>/dev/null | wc -c)
            echo "  ✅ Payload $i exists ($(wc -c < "$payload_file") bytes, body: $body_len chars)"
          else
            echo "  ⚠️ Payload $i MISSING!"
          fi
        done

        # Temporary chunk files will be cleaned up by trap on exit

    - name: Skip Slack notification (no regressions)
      if: steps.build.outputs.has_regressions != 'true'
      shell: bash
      run: echo "ℹ️ Skipping Slack notification because there are no regressions to report."

    - name: Report GitHub Pipeline Status to Slack (multiple messages if needed)
      if: steps.build.outputs.has_regressions == 'true'
      id: slack_send
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ env.SLACK_BOT_TOKEN }}
        CHANNEL_ID: ${{ inputs.channel_id }}
        SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook_url }}
        TOTAL_CHUNKS: ${{ steps.build.outputs.total_chunks }}
      run: |
        set -euo pipefail

        # Ensure payload and boundary files are cleaned up even if this step fails
        cleanup_payload_files() {
          rm -f "${GITHUB_WORKSPACE}"/slack_payload_*.json 2>/dev/null || true
          rm -f "${GITHUB_WORKSPACE}"/slack_regression_boundary_*.txt 2>/dev/null || true
        }
        trap cleanup_payload_files EXIT

        TOTAL_CHUNKS="${TOTAL_CHUNKS:-1}"
        # Handle edge case where TOTAL_CHUNKS is 0 or non-positive to ensure at least one message
        if [ "${TOTAL_CHUNKS}" -le 0 ] 2>/dev/null; then
          echo "Warning: TOTAL_CHUNKS was ${TOTAL_CHUNKS}, normalizing to 1 to ensure at least one Slack message."
          TOTAL_CHUNKS=1
        fi
        echo "Sending $TOTAL_CHUNKS message(s) to Slack..."

        # Debug: List all payload files
        echo "Looking for payload files in ${GITHUB_WORKSPACE}:"
        ls -la "${GITHUB_WORKSPACE}"/slack_payload_*.json 2>/dev/null || echo "No payload files found yet"

        FIRST_TS=""
        SEND_ERRORS=0

        if [ -n "${SLACK_BOT_TOKEN:-}" ] && [ -n "${CHANNEL_ID:-}" ]; then
          # Using Bot Token method - supports threading
          # TS_MAP tracks {boundary_key: slack_ts} where boundary_key is
          # "<workflow_name> / <job_name>" for per-job messages, or just
          # "<workflow_name>" for the zero-failing-jobs edge case.
          TS_MAP="{}"
          # CURRENT_REGRESSION_TS holds the top-level ts for the message currently
          # being sent; since this loop now emits one top-level message per chunk,
          # it's reset on every boundary (which is every chunk).
          CURRENT_REGRESSION_TS=""

          # Temporarily disable exit on error for the loop so we can send all messages even if one fails
          set +e
          for i in $(seq 0 $((TOTAL_CHUNKS - 1))); do
            payload_file="${GITHUB_WORKSPACE}/slack_payload_${i}.json"
            if [ ! -f "$payload_file" ]; then
              echo "⚠️ Payload file not found: $payload_file"
              echo "Available files:"
              ls -la "${GITHUB_WORKSPACE}"/slack_payload_*.json 2>/dev/null || echo "None found"
              SEND_ERRORS=$((SEND_ERRORS + 1))
              continue
            fi

            PAYLOAD=$(cat "$payload_file" 2>/dev/null || echo "")
            if [ -z "$PAYLOAD" ]; then
              echo "⚠️ Failed to read payload file: $payload_file"
              SEND_ERRORS=$((SEND_ERRORS + 1))
              continue
            fi

            # Verify the block text length before sending
            # Check the body block (index 1) text length
            body_text=$(echo "$PAYLOAD" | jq -r '.blocks[1].text.text // .blocks[1].text // ""' 2>/dev/null || echo "")
            body_text_length=$(printf '%s' "$body_text" | wc -c)

            echo "Sending message part $((i + 1))/$TOTAL_CHUNKS..."
            echo "Payload file size: $(wc -c < "$payload_file" 2>/dev/null || echo 0) bytes"
            echo "Body block text length: $body_text_length characters (limit: 3000)"

            if [ "$body_text_length" -gt 3000 ]; then
              echo "⚠️ ERROR: Body text length ($body_text_length) exceeds Slack's 3000 char limit!"
              echo "This message will fail. Skipping to prevent API error."
              echo "Cleaning up oversized payload file: $payload_file"
              rm -f "$payload_file" || echo "⚠️ Failed to remove payload file: $payload_file"
              SEND_ERRORS=$((SEND_ERRORS + 1))
              continue
            fi

            # Check for a regression boundary marker written by the build step.
            # When present, this chunk is the first message for a new pipeline, so
            # it must be sent as a top-level message (no thread_ts).
            boundary_file="${GITHUB_WORKSPACE}/slack_regression_boundary_${i}.txt"
            boundary_regression_name=""
            if [ -f "$boundary_file" ]; then
              boundary_regression_name=$(cat "$boundary_file" 2>/dev/null || echo "")
              CURRENT_REGRESSION_TS=""
              echo "New regression boundary for: $boundary_regression_name"
              rm -f "$boundary_file" || echo "⚠️ Failed to remove boundary file: $boundary_file"
            fi

            # Build request body with channel and optional thread_ts
            REQUEST_BODY=""
            if [ -z "$CURRENT_REGRESSION_TS" ]; then
              # Top-level message (first chunk of a regression, or legacy single-message mode)
              REQUEST_BODY=$(echo "$PAYLOAD" | \
                jq -c --arg channel "$CHANNEL_ID" \
                '. + {channel: $channel}' 2>/dev/null || echo "")
            else
              # Continuation chunk — thread under the regression's top-level message
              REQUEST_BODY=$(echo "$PAYLOAD" | \
                jq -c --arg channel "$CHANNEL_ID" --arg thread_ts "$CURRENT_REGRESSION_TS" \
                '. + {channel: $channel, thread_ts: $thread_ts}' 2>/dev/null || echo "")
            fi

            if [ -z "$REQUEST_BODY" ]; then
              echo "⚠️ Failed to build request body for message part $((i + 1))"
              SEND_ERRORS=$((SEND_ERRORS + 1))
              continue
            fi

            RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$REQUEST_BODY" 2>/dev/null || echo '{"ok":false,"error":"curl_failed"}')

            # Extract timestamp for threading subsequent messages
            MSG_TS=$(echo "$RESPONSE" | jq -r '.ts // empty' 2>/dev/null || echo "")
            if [ -z "$CURRENT_REGRESSION_TS" ] && [ -n "$MSG_TS" ] && [ "$MSG_TS" != "null" ]; then
              CURRENT_REGRESSION_TS="$MSG_TS"
              # Record the first-ever ts for backward-compat output
              if [ -z "$FIRST_TS" ]; then
                FIRST_TS="$MSG_TS"
                echo "ts=$FIRST_TS" >> "$GITHUB_OUTPUT"
                echo "First message timestamp: $FIRST_TS"
              fi
              # Add this message's ts to the boundary-keyed map
              if [ -n "$boundary_regression_name" ]; then
                TS_MAP=$(echo "$TS_MAP" | \
                  jq -c --arg name "$boundary_regression_name" --arg ts "$MSG_TS" \
                  '. + {($name): $ts}' 2>/dev/null || echo "$TS_MAP")
                echo "Recorded ts=$MSG_TS for boundary: $boundary_regression_name"
              fi
            fi

            # Check for errors
            OK_STATUS=$(echo "$RESPONSE" | \
              jq -r '.ok // false' 2>/dev/null || echo "false")
            if [ "$OK_STATUS" != "true" ]; then
              ERROR_MSG=$(echo "$RESPONSE" | \
                jq -r '.error // "unknown error"' 2>/dev/null || echo "failed to parse response")
              echo "⚠️ Failed to send Slack message part $((i + 1)): $ERROR_MSG"
              echo "Response: $RESPONSE"
              SEND_ERRORS=$((SEND_ERRORS + 1))
            else
              echo "✅ Successfully sent message part $((i + 1))/$TOTAL_CHUNKS"
            fi
          done
          set -e

          # Output the boundary-keyed ts map for downstream steps
          echo "slack_ts_map=$(echo "$TS_MAP" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "Final slack_ts_map: $(echo "$TS_MAP" | jq -c .)"

          if [ "$SEND_ERRORS" -gt 0 ]; then
            echo "⚠️ Warning: $SEND_ERRORS out of $TOTAL_CHUNKS messages failed to send"
            # Fail the step if all messages failed
            if [ "$SEND_ERRORS" -eq "$TOTAL_CHUNKS" ]; then
              echo "❌ All messages failed to send!"
              exit 1
            fi
          fi
        elif [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
          # Using Webhook method (simpler but no threading support)
          # Temporarily disable exit on error for the loop
          set +e
          for i in $(seq 0 $((TOTAL_CHUNKS - 1))); do
            payload_file="${GITHUB_WORKSPACE}/slack_payload_${i}.json"
            if [ ! -f "$payload_file" ]; then
              echo "⚠️ Payload file not found: $payload_file"
              echo "Available files:"
              ls -la "${GITHUB_WORKSPACE}"/slack_payload_*.json 2>/dev/null || echo "None found"
              SEND_ERRORS=$((SEND_ERRORS + 1))
              continue
            fi

            PAYLOAD=$(cat "$payload_file" 2>/dev/null || echo "")
            if [ -z "$PAYLOAD" ]; then
              echo "⚠️ Failed to read payload file: $payload_file"
              SEND_ERRORS=$((SEND_ERRORS + 1))
              continue
            fi

            echo "Sending message part $((i + 1))/$TOTAL_CHUNKS via webhook..."
            echo "Payload file size: $(wc -c < "$payload_file" 2>/dev/null || echo 0) bytes"

            HTTP_CODE=$(curl -s -w "\n%{http_code}" -o /tmp/slack_response_${i}.txt -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" 2>/dev/null | tail -n1 || echo "000")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "⚠️ Failed to send Slack message part $((i + 1)): HTTP $HTTP_CODE"
              cat "/tmp/slack_response_${i}.txt" 2>/dev/null || echo "No response body"
              SEND_ERRORS=$((SEND_ERRORS + 1))
            else
              echo "✅ Successfully sent message part $((i + 1))/$TOTAL_CHUNKS"
            fi
            rm -f "/tmp/slack_response_${i}.txt"
          done
          set -e

          if [ "$SEND_ERRORS" -gt 0 ]; then
            echo "⚠️ Warning: $SEND_ERRORS out of $TOTAL_CHUNKS messages failed to send"
            # Fail the step if all messages failed
            if [ "$SEND_ERRORS" -eq "$TOTAL_CHUNKS" ]; then
              echo "❌ All messages failed to send!"
              exit 1
            fi
          fi
        else
          echo "⚠️ No Slack credentials provided (SLACK_BOT_TOKEN or SLACK_WEBHOOK_URL)"
          exit 1
        fi

        # Payload files will be cleaned up by trap on exit
