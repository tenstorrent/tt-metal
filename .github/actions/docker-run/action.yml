name: "Run set of commands in Docker"
description: "Run commands in docker"

inputs:
  run_args:
    description: |
      Commands to run in docker.
      TRUST BOUNDARY: run_args is interpolated directly into a shell script.
      Only pass values from trusted sources (hardcoded workflow YAML, matrix
      definitions in the repo). Never pass user-controlled input (workflow_dispatch
      string inputs, PR metadata, issue bodies, etc.) without validation.
    required: true
  docker_os_arch:
    description: 'Docker image architecture'
    required: false
    default: tt-metalium/ubuntu-22.04-dev-amd64
  docker_image:
    description: 'Specify Docker image to use.'
    required: false
  docker_username:
    description: docker login username
    required: true
    default: ${{ github.actor }}
  docker_password:
    description: docker login password
    required: true
  docker_opts:
    description: 'Docker options'
    required: false
  device:
    description: "Description of Device as it is used in docker run command."
    type: string
    required: false
    default: |
      -v /dev/hugepages-1G:/dev/hugepages-1G
      --device /dev/tenstorrent
  install_wheel:
    description: "Install the wheel that contains all of the Python environment. The artifact needs to be present."
    type: boolean
    required: false
    default: false
  forward_civ2_proxy_env_vars:
    description: "Forward the CIV2 proxy environment variables to the container."
    type: boolean
    required: false
    default: false
runs:
  using: "composite"
  steps:
    - name: Set docker image tag
      if: ${{ inputs.docker_image }}
      shell: bash
      run: |
        echo "TT_METAL_DOCKER_IMAGE_TAG=${{ inputs.docker_image }}" >> $GITHUB_ENV
    - name: Determine docker image tag
      if: ${{ ! inputs.docker_image }}
      uses: ./.github/actions/generate-docker-tag
      with:
        image: ${{ inputs.docker_os_arch || 'docker-image-unresolved!'}}
    - name: Set
      shell: bash
      run: |
        echo "RUNNER_UID=$(id -u)" >> $GITHUB_ENV
        echo "RUNNER_GID=$(id -g)" >> $GITHUB_ENV
        if [ "${{ inputs.forward_civ2_proxy_env_vars }}" == "true" ]; then
          echo "CIV2_HTTP_PROXY=$HTTP_PROXY" >> $GITHUB_ENV
          echo "CIV2_http_proxy=$http_proxy" >> $GITHUB_ENV
          echo "CIV2_HTTPS_PROXY=$HTTPS_PROXY" >> $GITHUB_ENV
          echo "CIV2_https_proxy=$https_proxy" >> $GITHUB_ENV
          echo "CIV2_NO_PROXY=$NO_PROXY" >> $GITHUB_ENV
          echo "CIV2_no_proxy=$no_proxy" >> $GITHUB_ENV
        fi
    - name: Resolve docker image (harbor health check + fallback)
      id: registry
      shell: bash
      run: |
        set -uo pipefail

        RAW_IMAGE="${TT_METAL_DOCKER_IMAGE_TAG}"

        # Normalize caller-supplied image to canonical GHCR form.
        # Callers may pass any of: ghcr.io/..., harbor.ci.tenstorrent.net/ghcr.io/...,
        # or harbor.ci.tenstorrent.net/<project>/... (harbor-native). Strip all prefixes.
        if [[ "$RAW_IMAGE" == harbor.ci.tenstorrent.net/ghcr.io/* ]]; then
          GHCR_IMAGE="${RAW_IMAGE#harbor.ci.tenstorrent.net/}"
        elif [[ "$RAW_IMAGE" == harbor.ci.tenstorrent.net/* ]]; then
          GHCR_IMAGE="ghcr.io/${RAW_IMAGE#harbor.ci.tenstorrent.net/}"
        else
          GHCR_IMAGE="$RAW_IMAGE"
        fi

        # Harbor-native path: harbor stores a local copy without the ghcr.io component.
        # Pulling from this path never causes harbor to contact GitHub.
        HARBOR_NATIVE="harbor.ci.tenstorrent.net/${GHCR_IMAGE#ghcr.io/}"
        # Harbor pull-through path: harbor proxies the pull from GHCR on cache miss.
        HARBOR_PROXY="harbor.ci.tenstorrent.net/${GHCR_IMAGE}"

        echo "Image candidates:"
        echo "  GHCR:          $GHCR_IMAGE"
        echo "  Harbor native: $HARBOR_NATIVE"
        echo "  Harbor proxy:  $HARBOR_PROXY"

        # --- Step 1: Harbor health check (mirrors check-harbor.yaml logic) ---
        HARBOR_HEALTHY=false
        HEALTH_RESPONSE=$(curl --max-time 10 -sf \
          "https://harbor.ci.tenstorrent.net/api/v2.0/health" 2>/dev/null || true)
        if [ -z "$HEALTH_RESPONSE" ]; then
          echo "Harbor health check timed out, retrying in 5s..."
          sleep 5
          HEALTH_RESPONSE=$(curl --max-time 10 -sf \
            "https://harbor.ci.tenstorrent.net/api/v2.0/health" 2>/dev/null || true)
        fi

        if [ -n "$HEALTH_RESPONSE" ]; then
          OVERALL_STATUS=$(python3 -c \
            "import sys,json; print(json.loads(sys.stdin.read()).get('status','unknown'))" \
            <<< "$HEALTH_RESPONSE" 2>/dev/null || echo "unknown")
          if [ "$OVERALL_STATUS" = "healthy" ]; then
            HARBOR_HEALTHY=true
            echo "Harbor is healthy"
          else
            echo "::warning title=Harbor Unhealthy::Harbor status: ${OVERALL_STATUS}. Falling back to direct GHCR pull."
          fi
        else
          echo "::warning title=Harbor Unavailable::Harbor did not respond. Falling back to direct GHCR pull."
        fi

        # --- Step 2: Resolve the image to pull ---
        RESOLVED_IMAGE=""
        if [ "$HARBOR_HEALTHY" = "true" ]; then
          # Check if image is present on harbor native (no ghcr.io component in the path).
          # We query the Harbor REST API; a 200 means harbor has it locally — no GitHub
          # contact required. Anything else (401 treated as absent, 404 = not there) falls
          # through to the pull-through proxy path.
          #
          # Path parsing: ghcr.io/{project}/{subpath...}/{image}:{tag}
          # Harbor API: /api/v2.0/projects/{project}/repositories/{subpath%2F...%2Fimage}/artifacts/{tag}
          HARBOR_PATH="${GHCR_IMAGE#ghcr.io/}"              # tenstorrent/tt-metal/.../image:tag
          HARBOR_TAG="${HARBOR_PATH##*:}"                    # tag (or digest after @)
          HARBOR_REPO="${HARBOR_PATH%%:*}"                   # tenstorrent/tt-metal/.../image
          HARBOR_PROJECT="${HARBOR_REPO%%/*}"                # tenstorrent
          HARBOR_REPO_SUBPATH="${HARBOR_REPO#*/}"            # tt-metal/.../image
          HARBOR_REPO_ENCODED="${HARBOR_REPO_SUBPATH//\//%2F}"  # tt-metal%2F...%2Fimage

          API_STATUS=$(curl --max-time 10 -o /dev/null -sw "%{http_code}" \
            "https://harbor.ci.tenstorrent.net/api/v2.0/projects/${HARBOR_PROJECT}/repositories/${HARBOR_REPO_ENCODED}/artifacts/${HARBOR_TAG}" \
            2>/dev/null || echo "000")

          if [ "$API_STATUS" = "200" ]; then
            echo "Image found on harbor native (HTTP 200) — no GitHub contact needed"
            RESOLVED_IMAGE="$HARBOR_NATIVE"
          else
            echo "Image not on harbor native (HTTP ${API_STATUS}) — using harbor pull-through proxy"
            RESOLVED_IMAGE="$HARBOR_PROXY"
          fi
        else
          RESOLVED_IMAGE="$GHCR_IMAGE"
        fi

        echo "Resolved: $RESOLVED_IMAGE"
        echo "RESOLVED_DOCKER_IMAGE=$RESOLVED_IMAGE" >> "$GITHUB_ENV"

        # Downstream steps: harbor allows anonymous pulls; GHCR needs explicit login.
        if [[ "$RESOLVED_IMAGE" == harbor.ci.tenstorrent.net/* ]]; then
          echo "login-required=false" >> "$GITHUB_OUTPUT"
        else
          echo "login-required=true" >> "$GITHUB_OUTPUT"
        fi
        echo "action-registry=ghcr.io" >> "$GITHUB_OUTPUT"
      env:
        TT_METAL_DOCKER_IMAGE_TAG: ${{ env.TT_METAL_DOCKER_IMAGE_TAG }}
    - name: Docker login
      if: ${{ steps.registry.outputs.login-required == 'true' }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ inputs.docker_username }}
        password: ${{ inputs.docker_password }}
    - name: Pull docker image
      shell: bash
      run: |
        docker pull ${{ env.RESOLVED_DOCKER_IMAGE }}
    - uses: tenstorrent/docker-run-action@v6
      with:
        shell: bash
        username: ${{ inputs.docker_username }}
        password: ${{ inputs.docker_password }}
        registry: ${{ steps.registry.outputs.action-registry }}
        image: ${{ env.RESOLVED_DOCKER_IMAGE || 'docker-image-unresolved!'}}
        # The most important option below is `--rm`. Otherwise, the machines will fill up with undeleted containers.
        # The mounting of /etc/passwd, /etc/shadow, and /etc/bashrc is required in order for the correct file permissions
        # for newly created files.
        # Passing HOME variable is necessary to avoid Python lib installation into /home/ubuntu/.local folder which
        # may not be writable by the RUNNER_UID user.
        # --log-driver none: Do not save logs to disk by default as we're printing them to GitHub Actions UI already
        # and it takes up space on the runner. What can happen is that we can eat up all the space of a runner while it's
        # spitting our endless logs, causing the runner being unable to call home, resulting in job failures / runner
        # offline status on GitHub. Issue tt-metal/#12626
        options: |
          -u ${{ env.RUNNER_UID }}:${{ env.RUNNER_GID }}
          --rm
          -v /etc/passwd:/etc/passwd:ro
          -v /etc/shadow:/etc/shadow:ro
          -v /etc/bashrc:/etc/bashrc:ro
          -v ${{ github.workspace }}:${{ github.workspace }}
          --net=host
          --log-driver local
          --log-opt max-size=50m
          ${{ inputs.docker_opts }}
          -e LOGURU_LEVEL=${{ env.LOGURU_LEVEL || 'INFO' }}
          -e PYTHONPATH=${{ github.workspace }}
          -e HOME=${{ github.workspace }}
          -e GITHUB_ACTIONS=true
          -e CI=true
          -e GITHUB_REPOSITORY=${{ github.repository }}
          -e GITHUB_SHA=${{ github.sha }}
          -e GITHUB_REF_NAME=${{ github.ref_name }}
          -e GITHUB_RUN_ID=${{ github.run_id }}
          -e GITHUB_TRIGGERING_ACTOR=${{ github.triggering_actor }}
          -e RUNNER_NAME=${{ runner.name }}
          ${{ (inputs.forward_civ2_proxy_env_vars && format('-e HTTP_PROXY={0}', env.CIV2_HTTP_PROXY)) || '' }}
          ${{ (inputs.forward_civ2_proxy_env_vars && format('-e http_proxy={0}', env.CIV2_http_proxy)) || '' }}
          ${{ (inputs.forward_civ2_proxy_env_vars && format('-e HTTPS_PROXY={0}', env.CIV2_HTTPS_PROXY)) || '' }}
          ${{ (inputs.forward_civ2_proxy_env_vars && format('-e https_proxy={0}', env.CIV2_https_proxy)) || '' }}
          ${{ (inputs.forward_civ2_proxy_env_vars && format('-e NO_PROXY={0}', env.CIV2_NO_PROXY)) || '' }}
          ${{ (inputs.forward_civ2_proxy_env_vars && format('-e no_proxy={0}', env.CIV2_no_proxy)) || '' }}
          ${{ inputs.device }}
          -w ${{ github.workspace }}
        run: |
          set -euo pipefail

          install_wheel=${{ inputs.install_wheel }}
          if [ "${install_wheel,,}" == "true" ]; then
            WHEEL_FILES=(*.whl)
            if [ ! -e "${WHEEL_FILES[0]}" ]; then
              echo "::warning::No .whl file found in workspace. Skipping wheel installation."
            elif [ ${#WHEEL_FILES[@]} -gt 1 ]; then
              echo "::error::Multiple .whl files found in workspace: ${WHEEL_FILES[*]}. Please ensure only one wheel file is present."
              exit 1
            elif uv pip install "${WHEEL_FILES[0]}"; then
              echo "INFO: Successfully installed wheel '${WHEEL_FILES[0]}' into venv"
            else
              echo "::warning::Failed to install wheel '${WHEEL_FILES[0]}'. Continuing anyway."
            fi
          fi

          ${{ inputs.run_args }}
