# Get allocation rank data by retrieving Config Maps generated by Allocation Controller

name: 'Get Allocation configs'
description: 'Get allocation rank data by retrieving Config Maps generated by Allocation Controller'

inputs:
  allocationName:
    description: 'Allocation name'
    required: true
  allocationNamespace:
    description: 'Allocation namespace'
    required: false
    default: 'ttop-ci'
  path:
    description: 'Path to dump configs'
    required: false
    default: '/etc/ttop'

runs:
  using: 'composite'
  steps:
    - name: Get github ID token
      shell: bash
      id: token
      run: |
        IDTOKEN=$(curl -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" $ACTIONS_ID_TOKEN_REQUEST_URL -H "Accept: application/json; api-version=2.0" -H "Content-Type: application/json" -d "{}" | jq -r '.value')
        echo "::add-mask::${IDTOKEN}"
        echo "idToken=${IDTOKEN}" >> $GITHUB_OUTPUT

    - name: Get allocation configs
      shell: bash
      id: get-configs
      run: |
        echo "Getting allocation configs..."

        # Create target directory
        sudo mkdir -p "${{ inputs.path }}"
        sudo chown "$(whoami):$(whoami)" "${{ inputs.path }}"
        sudo chmod 755 "${{ inputs.path }}"

        # Find config map with the allocation label
        configmap_name=$(kubectl --token ${{ steps.token.outputs.idToken }} get configmaps -n "${{ inputs.allocationNamespace }}" \
          -l "allocation.tenstorrent.com/generated-by=${{ inputs.allocationName }}" \
          -o jsonpath='{.items[0].metadata.name}')

        if [ -z "$configmap_name" ]; then
          echo "No config map found with label allocation.tenstorrent.com/generated-by=${{ inputs.allocationName }}"
          exit 1
        fi

        echo "Found config map: $configmap_name"

        # Get all keys from the config map and dump them to files
        kubectl --token ${{ steps.token.outputs.idToken }} get configmap "$configmap_name" -n "${{ inputs.allocationNamespace }}" -o json | \
          jq -r '.data | keys[]' | \
          while IFS= read -r key; do
            echo "Writing key: $key"
            kubectl --token ${{ steps.token.outputs.idToken }} get configmap "$configmap_name" -n "${{ inputs.allocationNamespace }}" -o json | \
              jq -r --arg k "$key" '.data[$k]' > "${{ inputs.path }}/$key"
            echo "Contents of $key:"
            cat "${{ inputs.path }}/$key"

          done

        echo "All config map keys have been written to ${{ inputs.path }}"
