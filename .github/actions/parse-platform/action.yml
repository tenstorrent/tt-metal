name: "Parse Platform"
description: 'Parses platform dropdown (e.g., "Ubuntu 22.04") into distro, version, and toolchain'

inputs:
  platform:
    description: 'Platform string (e.g., "Ubuntu 22.04", "Ubuntu 24.04")'
    required: false
    default: ""
  distro:
    description: "Direct distro input (used when platform is not set)"
    required: false
    default: ""
  version:
    description: "Direct version input (used when platform is not set)"
    required: false
    default: ""
  default-distro:
    description: "Default distro if neither platform nor distro is set"
    required: false
    default: "ubuntu"
  default-version:
    description: "Default version if neither platform nor version is set"
    required: false
    default: "22.04"
  enable-lto:
    description: 'Override LTO setting (true/false/auto). If "auto" or empty, uses platform default'
    required: false
    default: "auto"

outputs:
  distro:
    description: "Parsed distribution (ubuntu)"
    value: ${{ steps.parse.outputs.distro }}
  version:
    description: "Parsed version (22.04, 24.04)"
    value: ${{ steps.parse.outputs.version }}
  toolchain:
    description: "Appropriate toolchain for the platform"
    value: ${{ steps.parse.outputs.toolchain }}
  enable-lto:
    description: "Whether LTO should be enabled for this platform"
    value: ${{ steps.parse.outputs.enable-lto }}

runs:
  using: "composite"
  steps:
    - id: parse
      shell: bash
      env:
        INPUT_PLATFORM: ${{ inputs.platform }}
        INPUT_DISTRO: ${{ inputs.distro }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_DEFAULT_DISTRO: ${{ inputs.default-distro }}
        INPUT_DEFAULT_VERSION: ${{ inputs.default-version }}
        INPUT_ENABLE_LTO: ${{ inputs.enable-lto }}
      run: |
        # Reject values containing embedded newlines.  GITHUB_OUTPUT uses
        # newlines as record delimiters (key=value\n), so a newline *inside*
        # a value would inject a second, attacker-controlled output variable.
        # The trailing \n added by printf '%s\n' below is the required
        # record terminator — that one is intentional and safe.
        for var_name in INPUT_PLATFORM INPUT_DISTRO INPUT_VERSION INPUT_DEFAULT_DISTRO INPUT_DEFAULT_VERSION INPUT_ENABLE_LTO; do
          val="${!var_name}"
          if [[ "${val}" == *$'\n'* ]] || [[ "${val}" == *$'\r'* ]]; then
            echo "::error::Input ${var_name} contains newline characters"
            exit 1
          fi
        done

        output_enable_lto() {
          local platform_default="$1"
          if [ "$INPUT_ENABLE_LTO" = "true" ] || [ "$INPUT_ENABLE_LTO" = "false" ]; then
            printf '%s\n' "enable-lto=${INPUT_ENABLE_LTO}" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "enable-lto=${platform_default}" >> "$GITHUB_OUTPUT"
          fi
        }

        if [ -n "$INPUT_PLATFORM" ]; then
          case "$INPUT_PLATFORM" in
            "Ubuntu 22.04")
              printf '%s\n' "distro=ubuntu" >> "$GITHUB_OUTPUT"
              printf '%s\n' "version=22.04" >> "$GITHUB_OUTPUT"
              printf '%s\n' "toolchain=cmake/x86_64-linux-clang-20-libstdcpp-toolchain.cmake" >> "$GITHUB_OUTPUT"
              output_enable_lto "false"
              ;;
            "Ubuntu 24.04")
              printf '%s\n' "distro=ubuntu" >> "$GITHUB_OUTPUT"
              printf '%s\n' "version=24.04" >> "$GITHUB_OUTPUT"
              printf '%s\n' "toolchain=cmake/x86_64-linux-clang-20-libstdcpp-toolchain.cmake" >> "$GITHUB_OUTPUT"
              output_enable_lto "false"
              ;;
            *)
              if [[ ! "${INPUT_DEFAULT_DISTRO}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
                echo "::error::Invalid default-distro: ${INPUT_DEFAULT_DISTRO}"
                exit 1
              fi
              if [[ ! "${INPUT_DEFAULT_VERSION}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
                echo "::error::Invalid default-version: ${INPUT_DEFAULT_VERSION}"
                exit 1
              fi
              printf '%s\n' "distro=${INPUT_DEFAULT_DISTRO}" >> "$GITHUB_OUTPUT"
              printf '%s\n' "version=${INPUT_DEFAULT_VERSION}" >> "$GITHUB_OUTPUT"
              printf '%s\n' "toolchain=cmake/x86_64-linux-clang-17-libstdcpp-toolchain.cmake" >> "$GITHUB_OUTPUT"
              output_enable_lto "false"
              ;;
          esac
        else
          DISTRO="$INPUT_DISTRO"
          VERSION="$INPUT_VERSION"
          [ -z "$DISTRO" ] && DISTRO="$INPUT_DEFAULT_DISTRO"
          [ -z "$VERSION" ] && VERSION="$INPUT_DEFAULT_VERSION"

          if [[ ! "${DISTRO}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid distro: ${DISTRO}"
            exit 1
          fi
          if [[ ! "${VERSION}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid version: ${VERSION}"
            exit 1
          fi

          printf '%s\n' "distro=${DISTRO}" >> "$GITHUB_OUTPUT"
          printf '%s\n' "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [ "$DISTRO" = "ubuntu" ]; then
            if [ "$VERSION" = "24.04" ] || [ "$VERSION" = "22.04" ]; then
              printf '%s\n' "toolchain=cmake/x86_64-linux-clang-20-libstdcpp-toolchain.cmake" >> "$GITHUB_OUTPUT"
              output_enable_lto "false"
            else
              printf '%s\n' "toolchain=cmake/x86_64-linux-clang-20-libstdcpp-toolchain.cmake" >> "$GITHUB_OUTPUT"
              output_enable_lto "false"
            fi
          else
            printf '%s\n' "toolchain=cmake/x86_64-linux-clang-20-libstdcpp-toolchain.cmake" >> "$GITHUB_OUTPUT"
            output_enable_lto "false"
          fi
        fi
