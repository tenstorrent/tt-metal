name: 'Report Status'
description: 'Send Slack notification with test results'

inputs:
  test_name:
    description: 'Name of the test suite'
    required: true
  slack_bot_token:
    description: 'Slack bot token'
    required: true
  slack_channel_id:
    description: 'Slack channel ID'
    required: true
  status:
    description: 'Status of the test run (success or failure)'
    required: true

runs:
  using: composite
  steps:
    - name: Construct message
      id: message
      shell: bash
      env:
        INPUT_TEST_NAME: ${{ inputs.test_name }}
        INPUT_STATUS: ${{ inputs.status }}
        GH_SHA: ${{ github.sha }}
        GH_SERVER_URL: ${{ github.server_url }}
        GH_REPOSITORY: ${{ github.repository }}
        GH_RUN_ID: ${{ github.run_id }}
        GH_SENDER_LOGIN: ${{ github.event.sender.login }}
      run: |
        COMMIT_URL="https://github.com/tenstorrent/tt-metal/commit/${GH_SHA}"
        COMMIT_SHA="${GH_SHA:0:7}"
        RUN_BASE="${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs"
        RUN_URL="${RUN_BASE}/${GH_RUN_ID}"
        TRIGGERER="${GH_SENDER_LOGIN}"
        if [ -z "$TRIGGERER" ]; then
          TRIGGERER="scheduled run"
        fi

        if [ "$INPUT_STATUS" == "success" ]; then
          MESSAGE=":white_check_mark: *${INPUT_TEST_NAME} passed* :white_check_mark:"
          MESSAGE="$MESSAGE\n\nAll tests completed successfully!"
        else
          MESSAGE=":alert: *${INPUT_TEST_NAME} failed* :alert:"
          MESSAGE="$MESSAGE\n\nThe scheduled run hit some test failures."
        fi

        MESSAGE="$MESSAGE\n\nTriggered by: \`$TRIGGERER\`"
        MESSAGE="$MESSAGE\nCommit: <$COMMIT_URL|$COMMIT_SHA>"

        if [ "$INPUT_STATUS" == "success" ]; then
          MESSAGE="$MESSAGE\n<${RUN_URL}|View the run details.>"
        else
          MESSAGE="$MESSAGE\n<${RUN_URL}|Please check the logs to see what went wrong.>"
        fi

        {
          echo 'text<<EOF'
          echo "$MESSAGE"
          echo 'EOF'
        } >> $GITHUB_OUTPUT
    - name: Send Slack notification
      uses: slackapi/slack-github-action@v2.1.1
      env:
        SLACK_CHANNEL_ID: ${{ inputs.slack_channel_id }}
        SLACK_MESSAGE_TEXT: ${{ steps.message.outputs.text }}
      with:
        method: chat.postMessage
        token: ${{ inputs.slack_bot_token }}
        payload: |
          {
            "channel": "${{ env.SLACK_CHANNEL_ID }}",
            "text": "${{ env.SLACK_MESSAGE_TEXT }}"
          }
