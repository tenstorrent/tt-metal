# This file defines the maximum allowed timeout (in minutes) for tests
# belonging to a given team and workflow.
# These budgets are enforced during the load-test-matrix step in pipelines.

# This is part of an effort to reorganize the pipelines for clearer resource allocation and ownership.

# Entries are grouped by team -> pipeline -> sku (machine type in CI) : time_budget (in minutes)

# Team names are currently assigned to tests by best guess.
#   Please message #tt-metal-infra if there are any concerns.

# Example:
metal_infra:
  pr_gate:
    wh_n150_civ2: 0
    wh_n300_civ2: 0
    wh_llmbox_civ2: 0
    bh_p150b_civ2_viommu: 0
    bh_p150b_civ2: 0
  merge_gate:
    wh_n150_civ2: 0
    wh_n300_civ2: 0
    wh_llmbox_civ2: 0
    bh_p150b_civ2_viommu: 0
    bh_p150b_civ2: 0
  sanity: # APC and BHPC will be renamed to sanity
    CPU: 0
    N150: 0
    N300: 0
    P100: 0
    P100a: 0
    P150: 0
    P150b: 0
    P300: 0
    wh_llmbox: 0
    bh_loudbox: 0
    bh_qb: 0
  unit:
    N150: 0
    N300: 0
    P100: 0
    P100a: 0
    P150: 0
    P150b: 0
    wh_llmbox: 0
    wh_galaxy: 0
    bh_galaxy: 0
  integration:
    N150: 0
    N300: 0
    P100: 0
    P100a: 0
    P150: 0
    P150b: 0
    wh_llmbox: 0
    wh_galaxy: 0
    bh_galaxy: 0
  e2e:
    wh_llmbox: 0
    wh_galaxy: 0
    bh_galaxy: 0
  perf:
    wh_llmbox: 0
    wh_galaxy: 0
    bh_galaxy: 0
  demo:
    wh_llmbox: 0
    wh_galaxy: 0
    bh_galaxy: 0

