name: "[internal] Docs build and deploy to GitHub pages on main impl"

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: latest
      docker-image:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      build-type:
        description: 'Build type (Release or ASan). ASan builds require LD_PRELOAD of the ASan runtime.'
        required: false
        type: string
        default: 'Release'
      dry-run:
        required: false
        type: boolean
        default: false

jobs:
  build-docs:
    strategy:
      # Do not fail-fast because we need to ensure all tests go to completion
      # so we try not to get hanging machines
      fail-fast: false
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!'}}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
        GITHUB_ACTIONS: true
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job # Here be dragons; keep it scoped to our desired volume, yet must be under github.workspace and be sure to clean up at the end
      - name: ⬇️ Download Wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.wheel-artifact-name }}
          path: /work
      - name: Install Wheel
        run: |
          WHEEL_FILENAME=$(ls -1 *.whl)
          uv pip install $WHEEL_FILENAME
      - name: Check TTNN ops are documented
        # Verifies every registered ttnn op has an entry in docs/source/ttnn/ttnn/api.rst.
        # Runs here (no hardware needed) rather than in nightly — catches missing docs on the PR that adds the op.
        # ASan builds require LD_PRELOAD of the ASan runtime so Python can import the instrumented ttnn extension.
        run: |
          if [ "${{ inputs.build-type }}" = "ASan" ]; then
            export LD_PRELOAD="$(clang-20 -print-resource-dir)/lib/linux/libclang_rt.asan-x86_64.so"
            export ASAN_OPTIONS="detect_leaks=0"
          fi
          python3 scripts/detect_undocumented_ttnn_ops.py
      - name: Build Docs
        timeout-minutes: 15
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ inputs.build-type }}" = "ASan" ]; then
            # Preload the ASan runtime so Python can load ASan-instrumented native extensions
            # without hitting missing-symbol errors at import time (Python itself is not ASan-built).
            export LD_PRELOAD="$(clang-20 -print-resource-dir)/lib/linux/libclang_rt.asan-x86_64.so"
            # Disable LeakSanitizer — it runs at process exit by default and produces spurious
            # reports from Python internals/docs tooling that don't clean up deliberately.
            export ASAN_OPTIONS="detect_leaks=0"
          fi
          ./tests/scripts/run_build_docs.sh
      - name: Prepare artifact - move output
        run: |
          mkdir gh_pages
          mv docs/build/html gh_pages/${{ inputs.version }}
      - name: Upload docs artifact (skipped for dry run)
        if: ${{ !inputs.dry-run }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gh_pages_${{ inputs.version }}
          path: /work/gh_pages/${{ inputs.version }}/
          if-no-files-found: error

  deploy-docs:
    needs: build-docs
    # Only deploy from main/stable or a final release tag (vX.Y.Z). Pre-release tags
    # like v0.69.0-rc1 or v0.68.0-dev20260319 are excluded so they don't accumulate on
    # gh-pages and inflate the Pages artifact past the 10 GB limit. See #45440.
    if: ${{ !inputs.dry-run && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable' || (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-'))) }}
    runs-on: ubuntu-latest
    concurrency:
      # Note that people may spam the post-commit pipeline on their branch, and
      # we have this docs pipeline in the post-commit pipeline, then people
      # would have to wait until the previous one fully completes. That may be
      # ok because each post-commit pipeline definitely takes more than 30 min
      group: "pages-${{ github.ref }}"
      cancel-in-progress: false # WARNING: This will only queue a single job; all else will still be cancelled!
    defaults:
      run:
        shell: bash
    steps:
      - name: ⬇️ Checkout
        # This is needed by the pages-deploy action so
        # that the folder is initialized for .git
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 10
        with:
          name: gh_pages_${{ inputs.version }}
          path: gh_pages/${{ inputs.version }}
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        id: deployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          target-folder: ${{ inputs.version }}
          folder: ./gh_pages/${{ inputs.version }}
          force: false
      - name: Delete artifact if deployment failed
        # When the deployment API call fails, the artifacts are not cleaned up correctly
        # and the next attempt (!) run will cause an error.
        # See more:
        # https://github.com/tenstorrent/tt-metal/issues/17623
        if: ${{ failure() }}
        uses: geekyeggo/delete-artifact@v5
        continue-on-error: true
        with:
          name: github-pages
      - name: Regenerate versions.json on gh-pages
        # The Sphinx version-selector template (docs/source/common/_templates/versions.html)
        # fetches /tt-metal/versions.json on every docs page load. Regenerating it from the
        # current gh-pages tree after each successful deploy keeps the dropdown perfectly
        # in sync with what's served. See #45572.
        if: ${{ steps.deployment.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DEPLOYED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # Build versions.json from the current gh-pages tree: 'latest' first, then final
          # release dirs (vX.Y.Z) sorted descending. RC/dev tags are filtered out.
          payload=$(gh api "repos/${REPO}/git/trees/gh-pages" --jq '
            [.tree[] | select(.type == "tree") | .path
              | select(test("^(latest|v\\d+\\.\\d+\\.\\d+)$"))]
            | sort_by(
                if . == "latest" then [9999, 9999, 9999]
                else (capture("^v(?<a>\\d+)\\.(?<b>\\d+)\\.(?<c>\\d+)$")
                      | [(.a | tonumber), (.b | tonumber), (.c | tonumber)])
                end)
            | reverse
            | {versions: .}
          ')
          echo "Computed versions.json:"; echo "$payload" | jq .

          # The Contents API PUT requires the existing file's sha when updating, and rejects
          # it when creating. Look it up once; pass it only if the file already exists.
          existing_sha=$(gh api "repos/${REPO}/contents/versions.json?ref=gh-pages" \
            --jq '.sha // empty' 2>/dev/null || true)
          extra_args=()
          [ -n "$existing_sha" ] && extra_args+=(-f "sha=${existing_sha}")
          gh api --method PUT "repos/${REPO}/contents/versions.json" \
            -f message="Update versions.json after ${DEPLOYED_VERSION} deploy" \
            -f content="$(echo "$payload" | base64 -w0)" \
            -f branch=gh-pages "${extra_args[@]}"
      - name: Index docs into OpenSearch
        # The indexer reads the built HTML from the artifact downloaded above.
        # Non-critical post-deploy enhancement: a transient ingest failure must
        # not mark an otherwise-successful docs deploy as failed.
        if: ${{ steps.deployment.outcome == 'success' }}
        continue-on-error: true
        env:
          # Scoped to this step only (not job-level) so the OpenSearch write
          # credential is never exposed to the other actions in this job.
          DOCS_SEARCH_INGEST_API_KEY: ${{ secrets.DOCS_SEARCH_INGEST_API_KEY_DOCS_TENSTORRENT }}
          SEARCH_API_BASE: https://csl860x2oj.execute-api.us-east-2.amazonaws.com/prod
          DOC_CATALOG_SOURCE_ID: docs-tenstorrent
          DOCS_ID_NAMESPACE: tt-metal
          DOCS_INDEX_VERSION: ${{ inputs.version }}
          DOCS_OUTPUT_DIR: gh_pages/${{ inputs.version }}
          DOC_SITE_BASE_URL: https://docs.tenstorrent.com/tt-metal/${{ inputs.version }}
        run: |
          if [ -z "${DOCS_SEARCH_INGEST_API_KEY}" ]; then
            echo "::warning::Skipping OpenSearch indexing because DOCS_SEARCH_INGEST_API_KEY_DOCS_TENSTORRENT is not set."
            exit 0
          fi
          python3 scripts/index_remote_search.py
      - name: Check the docs deployment is up
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          set -eu # basic shell hygiene
          curl --fail -LI https://docs.tenstorrent.com/tt-metal/latest/ttnn/index.html -o /dev/null -s
