name: "Build tt-metal — aarch64 native Ubuntu 24.04"

# Native (no Docker) compile check on a GitHub-hosted arm64 runner.
# Validates that tt-metal builds cleanly on aarch64 Ubuntu 24.04.

on:
  schedule:
    # Every 2 hours, offset by 7 minutes to spread GH runner load
    - cron: "7 */2 * * *"
  workflow_dispatch:
    inputs:
      build-type:
        required: false
        type: choice
        default: "Release"
        options:
          - "Release"
          - "RelWithDebInfo"
          - "Debug"
        description: "CMake build type"

jobs:
  build-aarch64:
    name: "🛠️ aarch64 Ubuntu 24.04 native build"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    env:
      BUILD_TYPE: ${{ inputs.build-type || 'Release' }}

    steps:
      - name: "⬇️ Checkout repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: "📦 Install system dependencies"
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            g++-14 \
            pandoc \
            xz-utils \
            openssl \
            libssl-dev \
            python3-dev \
            python3-pip \
            python3-venv \
            libhwloc-dev \
            libnuma-dev \
            libatomic1 \
            libstdc++6 \
            libtbb-dev \
            libcapstone-dev \
            wget \
            curl \
            xxd \
            lsb-release \
            software-properties-common \
            gnupg \
            ca-certificates

      - name: "🔧 Install LLVM 20 (clang-20)"
        run: |
          set -euo pipefail
          TEMP_DIR=$(mktemp -d)
          wget -q -P "$TEMP_DIR" https://apt.llvm.org/llvm.sh
          chmod u+x "$TEMP_DIR/llvm.sh"
          sudo "$TEMP_DIR/llvm.sh" 20
          rm -rf "$TEMP_DIR"
          # Verify
          clang-20 --version
          clang++-20 --version

      - name: "📦 Restore CPM source cache"
        id: cpm-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cpmcache.tar.zst
          key: >-
            cpm-z22-${{ hashFiles(
              'third_party/CMakeLists.txt',
              'tt_metal/third_party/umd/third_party/CMakeLists.txt',
              'tt-train/cmake/dependencies.cmake') }}
          restore-keys: cpm-z22-

      - name: "📦 Unpack CPM cache"
        run: |
          [ -f .cpmcache.tar.zst ] && tar -I 'zstd -T0' -xf .cpmcache.tar.zst || true

      - name: "⚙️ Configure ccache"
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-aarch64-ubuntu2404-${{ env.BUILD_TYPE }}
          max-size: "2G"
          append-timestamp: false

      - name: "🔧 Build tt-metal"
        run: |
          set -euo pipefail
          ./build_metal.sh \
            --toolchain-path cmake/aarch64-linux-clang-20-libstdcpp-toolchain.cmake \
            --build-type "$BUILD_TYPE" \
            --enable-ccache \
            --without-distributed \
            --without-python-bindings

      - name: "📦 Pack CPM cache"
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        run: |
          [ -d .cpmcache ] && tar -I 'zstd -T0 --ultra -22' -cf .cpmcache.tar.zst .cpmcache || true

      - name: "📦 Save CPM source cache"
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cpmcache.tar.zst
          key: ${{ steps.cpm-cache.outputs.cache-primary-key }}

      - name: "📊 ccache statistics"
        if: always()
        run: ccache -s
