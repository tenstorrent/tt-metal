name: "[internal] Profiler tests impl"

# Single shared impl for all profiler test suites (galaxy + T3000 + single-card).
# Each matrix entry in tests/pipeline_reorg/profiler_tests.yaml carries its
# own SKU(s), arch, and cmd, so this impl is fully data-driven — no
# per-pipeline forks required.
#
# Mode filtering: matrix entries may carry a `mode` field ("post-commit" or
# "full"). Callers pass `test-mode` to select; entries with no `mode` run in
# all modes.

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
        description: "Comma-separated SKU list to run. Must resolve to at least one SKU after sanitization."
      test-mode:
        required: false
        type: string
        default: "post-commit"
        description: "Which mode-tagged entries to include: post-commit, full, or all."
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)."
      enable-watcher:
        required: false
        type: boolean
        default: false
      enable-lightweight-kernel-asserts:
        required: false
        type: boolean
        default: false
      enable-llk-asserts:
        required: false
        type: boolean
        default: false

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.apply-mode-filter.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/profiler_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: |
          pip3 install PyYAML
      - name: Verify test timeouts against budget
        # The "integration" pipeline category is a placeholder pending final
        # team / test-framework assignment, see
        # https://github.com/tenstorrent/tt-metal/issues/44285
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "integration"
      - name: Build unified test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Apply mode filter
        id: apply-mode-filter
        # Entries with no `mode` always run. Entries with `mode` run only when
        # test-mode matches (or test-mode == "all").
        # Inputs are passed via env vars (not inline ${{ }} substitution) so
        # single quotes / shell metacharacters inside the matrix JSON (e.g.
        # `awk '{print $1}'` in cmd fields) can't break the shell parser.
        env:
          MATRIX_JSON: ${{ steps.build-matrix.outputs.matrix }}
          TEST_MODE: ${{ inputs.test-mode }}
          ENABLED_SKUS: ${{ inputs.enabled-skus }}
        run: |
          if [ "$TEST_MODE" = "all" ]; then
            FILTERED="$MATRIX_JSON"
          else
            FILTERED=$(jq -c --arg m "$TEST_MODE" '[.[] | select(.mode == null or .mode == $m)]' <<<"$MATRIX_JSON")
          fi
          if [ "$FILTERED" = "[]" ]; then
            echo "::error::No tests match enabled-skus='$ENABLED_SKUS' + test-mode='$TEST_MODE'."
            exit 1
          fi
          {
            echo "matrix<<EOF"
            echo "$FILTERED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  profiler-tests:
    needs: load-test-matrix
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        # ARCH_NAME is per-test, driven by the matrix entry's arch field
        # (mirrors the pattern in galaxy_health_tests.yaml). Values:
        # "wormhole_b0" or "blackhole".
        ARCH_NAME: ${{ matrix.test-group.arch }}
        LOGURU_LEVEL: INFO
        PROFILER_SCRIPTS_ROOT: /work/tools/tracy
        PROFILER_TEST_SCRIPTS_ROOT: /work/tests/tt_metal/tools/profiler
        PROFILER_ARTIFACTS_DIR: /work/generated/profiler
        PROFILER_OUTPUT_DIR: /work/generated/profiler/reports
        DONT_USE_VIRTUAL_ENVIRONMENT: 1
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          submodules: recursive
          path: docker-job
      - name: Mark repository as safe directory
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher }}
          enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts }}
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          ${{ matrix.test-group.cmd }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
