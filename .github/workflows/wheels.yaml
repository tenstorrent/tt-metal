name: "Build Python Wheel"

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      docker-image:
        required: true
        type: string
        description: "Docker image to use for building the wheel (should be manylinux)"
      build-type:
        required: false
        type: string
        default: "Release"
      tracy:
        required: false
        type: boolean
        default: true
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
    outputs:
      artifact-name:
        description: "Name to give download-artifact to get the Wheel"
        value: ${{ jobs.build-wheel.result == 'success' && jobs.build-wheel.outputs.artifact_name }}

jobs:
  build-wheel:
    name: 🐍 Build wheel (Python ${{ inputs.python-version }})
    timeout-minutes: 45
    runs-on: tt-ubuntu-2204-large-stable
    environment: ${{ github.ref == 'refs/heads/main' && 'mainline' || '' }}
    outputs:
      artifact_name: ${{ steps.set_artifact_name.outputs.artifact_name }}
    env:
      # S3 ccache config — lift to repo vars/secrets when ready
      CCACHE_S3_BUCKET: ccache
      CCACHE_S3_PREFIX: tt-metal
      CCACHE_S3_READONLY: "false"
    defaults:
      run:
        shell: bash

    steps:
      - name: Format Python version
        id: format_python_version
        run: |
          PYTHON_VERSION_NODOT=$(echo "${{ inputs.python-version }}" | tr -d '.')
          echo "python_version_nodot=${PYTHON_VERSION_NODOT}" >> $GITHUB_OUTPUT
          echo "Selected Python ${{ inputs.python-version }} (${PYTHON_VERSION_NODOT})"

      - name: Configure S3 ccache storage
        # Failing internal jobs draws attention immediately so we can fix them and make them fast.
        # Forks will never have secrets; don't fail the job for them, they'll just run slower
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          if [ -z "${{ secrets.GARAGE_S3_ACCESS_KEY }}" ] || [ -z "${{ secrets.GARAGE_S3_SECRET_KEY }}" ]; then
            echo "Garage S3 credentials are missing. Did you forget 'secrets: inherit'?"
            exit 1
          fi
          # The ccache-storage-s3 helper reads credentials from the standard AWS
          # credential chain, so export them to the job environment.
          echo "AWS_ACCESS_KEY_ID=${{ secrets.GARAGE_S3_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.GARAGE_S3_SECRET_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=garage" >> $GITHUB_ENV
          # The s3:// scheme makes ccache auto-spawn and manage the helper itself:
          # it derives the binary name (ccache-storage-s3) from the scheme and looks
          # it up in libexec, forking it on demand and respawning across build steps.
          # Garage's s3_region is configured as "garage" — must match exactly or signing fails.
          CCACHE_REMOTE_STORAGE="s3://${CCACHE_S3_BUCKET}|region=garage|prefix=${CCACHE_S3_PREFIX}|endpoint_url=http://garage.garage.svc.cluster.local:3900"
          if [ "${CCACHE_S3_READONLY}" = "true" ]; then
            CCACHE_REMOTE_STORAGE="${CCACHE_REMOTE_STORAGE}|read-only=true"
          fi
          echo "CCACHE_REMOTE_STORAGE=${CCACHE_REMOTE_STORAGE}" >> $GITHUB_ENV
          echo "CCACHE_REMOTE_STORAGE: ${CCACHE_REMOTE_STORAGE}"
          # Garage is a cluster-internal service reached directly from inside a Docker bridge
          # network — the same way build-artifact.yaml's container: job reaches it. The
          # cibuildwheel build below runs in a bridge-networked container, so the
          # ccache-storage-s3 helper connects DIRECTLY to garage:3900, bypassing the Squid proxy
          # via NO_PROXY (the AWS Go SDK honors NO_PROXY). We export the bypass here so it is
          # forwarded into the cibuildwheel container.
          echo "NO_PROXY=${NO_PROXY:+${NO_PROXY},}garage.garage.svc.cluster.local" >> $GITHUB_ENV
          echo "no_proxy=${no_proxy:+${no_proxy},}garage.garage.svc.cluster.local" >> $GITHUB_ENV
          # Enable debug logging from the ccache-storage-s3 helper binary.
          echo "CRSH_LOGFILE=/tmp/ccache-storage-s3.log" >> $GITHUB_ENV
          # AWS SDK Go v2 (≥1.32) computes CRC32 checksums on every PutObject by default.
          # Garage uses plain HTTP and ccache's payload arrives as an unseekable stream, so
          # the SDK can't compute the checksum upfront and fails. "when_required" tells the
          # SDK to skip checksum computation for regular PUTs.
          echo "AWS_REQUEST_CHECKSUM_CALCULATION=when_required" >> $GITHUB_ENV
          # Explicit Garage endpoint as an AWS SDK env var fallback. The helper reads this
          # if ccache does not forward |endpoint_url=... as CRSH_ATTR_* (defensive belt-and-suspenders).
          echo "AWS_ENDPOINT_URL_S3=http://garage.garage.svc.cluster.local:3900" >> $GITHUB_ENV

      - name: Fetch ccache-storage-s3 helper for the manylinux container
        # The pre-built manylinux image only copies /usr/local/bin/ccache from the
        # ccache tool layer — it drops /usr/local/libexec, which is where the
        # ccache-storage-s3 helper lives. The ccache binary derives the helper name
        # from the s3:// scheme and looks it up in its baked-in libexecdir
        # (/usr/local/libexec); when the helper is absent the first compile fails with
        # "ccache: error: unknown remote storage scheme: s3". dockerfile/Dockerfile.manylinux
        # now copies libexec too, but pre-built images on older tags still lack it, so we
        # download the helper on the HOST runner (which has proxy egress to GitHub) and
        # volume-mount it into the cibuildwheel container at the path ccache searches.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        env:
          # Keep in sync with STORAGE_HELPER_VERSION/SHA256 in dockerfile/scripts/install-ccache.sh
          STORAGE_HELPER_VERSION: "0.1.7"
          STORAGE_HELPER_SHA256: "3ac52edbcbda895c5514f13eac39e6d9a9e2550234b331c8e14050a94b79854c"
        run: |
          set -euo pipefail
          HELPER_DIR="${RUNNER_TEMP}/ccache-helper"
          mkdir -p "${HELPER_DIR}"
          URL="https://github.com/blozano-tt/ccache-storage-s3-go/releases/download/v${STORAGE_HELPER_VERSION}/ccache-storage-s3-go-${STORAGE_HELPER_VERSION}-linux-amd64.tar.gz"
          TARBALL="${HELPER_DIR}/helper.tar.gz"
          curl -fsSL -o "${TARBALL}" "${URL}"
          echo "${STORAGE_HELPER_SHA256}  ${TARBALL}" | sha256sum -c -
          tar -xzf "${TARBALL}" -C "${HELPER_DIR}"
          rm -f "${TARBALL}"
          BIN=$(find "${HELPER_DIR}" -type f -name 'ccache-storage-s3*' | head -n 1)
          if [ -z "${BIN}" ]; then
            echo "ERROR: ccache-storage-s3 binary not found in tarball" >&2
            exit 1
          fi
          # Land it at a stable path the build step mounts into the container.
          TARGET="${HELPER_DIR}/ccache-storage-s3.bin"
          install -m 0755 "${BIN}" "${TARGET}"
          echo "CCACHE_S3_HELPER_PATH=${TARGET}" >> "$GITHUB_ENV"
          echo "Fetched ccache-storage-s3 helper to ${TARGET}"

      # NOTE: build-artifact.yaml has a curl-based "Verify S3 connectivity" probe, but we do
      # NOT replicate it here. That probe relies on `curl --aws-sigv4` sending the
      # X-Amz-Content-Sha256 header, which Garage requires. The Ubuntu CI image used by
      # build-artifact.yaml ships curl 8.x (sends the header → probe passes), but THIS job's
      # manylinux image (quay.io/pypa/manylinux_2_34_x86_64) ships curl 7.76.1, whose
      # --aws-sigv4 does NOT emit X-Amz-Content-Sha256. Garage therefore rejects the probe PUT
      # with HTTP 400 "Missing X-Amz-Content-Sha256 field" — a limitation of that old curl, not
      # of ccache or of connectivity. The actual ccache remote-storage path does not use curl:
      # ccache spawns the ccache-storage-s3 Go helper, whose AWS Go SDK always sends
      # X-Amz-Content-Sha256 correctly. So the curl probe would only ever test a tool ccache
      # never uses. We drop it and let ccache exercise the real (Go SDK) path during the build;
      # CCACHE_REMOTE_ONLY=true below keeps any remaining helper hiccup non-fatal to the build.

      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: ${{ (startsWith(inputs.ref, 'refs/tags/') || startsWith(github.ref, 'refs/tags/')) && 1 || 500 }}
          fetch-tags: true # Need tags for `git describe`

      - name: 📦 Restore CPM source cache
        id: cpm-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cpmcache.tar.zst
          key: cpm-z22-${{ hashFiles('third_party/CMakeLists.txt', 'tt_metal/third_party/umd/third_party/CMakeLists.txt', 'tt-train/cmake/dependencies.cmake') }}
          restore-keys: cpm-z22-

      - name: 📦 Unpack CPM cache
        run: |
          [ -f .cpmcache.tar.zst ] && tar -I 'zstd -T0' -xf .cpmcache.tar.zst || true

      # Python for driving the build; not the version the wheel targets
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: 🐍 Build wheel
        id: build-wheel
        uses: pypa/cibuildwheel@v2.23.2
        env:
          CIBW_BUILD: "cp${{ steps.format_python_version.outputs.python_version_nodot }}-manylinux_x86_64*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_BUILD_FRONTEND: build
          # Mount the ccache-storage-s3 helper (fetched on the host above) into the
          # container at ccache's baked-in libexecdir so the s3:// remote-storage scheme
          # resolves. Without this the manylinux image's ccache (which only has bin/ccache,
          # not libexec/ccache-storage-s3) aborts every compile with
          # "unknown remote storage scheme: s3". Empty when the helper wasn't fetched
          # (forks): cibuildwheel ignores an empty CIBW_CONTAINER_ENGINE and CCACHE_REMOTE_ONLY
          # keeps a missing helper non-fatal so the build still proceeds.
          CIBW_CONTAINER_ENGINE: "${{ env.CCACHE_S3_HELPER_PATH && format('docker; create_args: --volume {0}:/usr/local/libexec/ccache-storage-s3:ro', env.CCACHE_S3_HELPER_PATH) || '' }}"
          CIBW_ENVIRONMENT: >-
            CCACHE_REMOTE_ONLY=true
            CCACHE_TEMPDIR=/tmp/ccache
            CCACHE_REMOTE_STORAGE="${{ env.CCACHE_REMOTE_STORAGE }}"
            AWS_ACCESS_KEY_ID="${{ env.AWS_ACCESS_KEY_ID }}"
            AWS_SECRET_ACCESS_KEY="${{ env.AWS_SECRET_ACCESS_KEY }}"
            AWS_DEFAULT_REGION=garage
            AWS_REQUEST_CHECKSUM_CALCULATION=when_required
            AWS_ENDPOINT_URL_S3=http://garage.garage.svc.cluster.local:3900
            CRSH_LOGFILE=/tmp/ccache-storage-s3.log
            CIBW_ENABLE_TRACY="${{ inputs.tracy && 'ON' || 'OFF' }}"
            CIBW_BUILD_TYPE="${{ inputs.build-type }}"
            CIBW_ENABLE_LTO="${{ inputs.enable-lto && 'ON' || 'OFF' }}"
          CIBW_BEFORE_BUILD: "mkdir -p /tmp/ccache && ccache -z && ccache -p"
          # Log ccache stats inside the container right after each wheel compiles. CIBW_AFTER_BUILD
          # runs in the build container after compilation (before repair/test), so ccache is still
          # configured and populated. On Linux the host filesystem is mounted in the container at
          # /host, so we write the stats to /host/tmp/ccache-wheel-stats.txt (= /tmp on the host)
          # and cat it so the output also appears in the cibuildwheel build log. A later host step
          # reads that file and appends it to the GitHub Job Summary.
          CIBW_AFTER_BUILD: "ccache -sv > /host/tmp/ccache-wheel-stats.txt 2>&1 && cat /host/tmp/ccache-wheel-stats.txt"
          CIBW_TEST_COMMAND: 'python -c "import ttnn"'
          CIBW_TEST_SKIP: ${{ inputs.build-type == 'ASan' && '*' || '' }}
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ inputs.docker-image || 'docker-image-unresolved!' }}

      - name: 📊 ccache stats summary
        if: always()
        run: |
          if [ -f /tmp/ccache-wheel-stats.txt ]; then
            echo "## ccache stats" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/ccache-wheel-stats.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📦 Pack CPM cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        run: |
          [ -d .cpmcache ] && tar -I 'zstd -T0 --ultra -22' -cf .cpmcache.tar.zst .cpmcache || true

      - name: 📦 Save CPM source cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cpmcache.tar.zst
          key: ${{ steps.cpm-cache.outputs.cache-primary-key }}

      - name: Set wheel artifact name
        id: set_artifact_name
        run: |
          # Use full sanitized ref/SHA and workflow run ID to ensure uniqueness across parallel builds
          # Sanitize ref/SHA by replacing invalid characters with hyphens
          RAW_REF="${{ inputs.ref || github.sha }}"
          SANITIZED_REF=$(echo "$RAW_REF" | sed 's/[\/:"<>|*?\r\n\\]/-/g')
          TRACY_SUFFIX="${{ (inputs.tracy && '-profiler') || '' }}"
          ARTIFACT_NAME="ttnn-dist-cp${{ steps.format_python_version.outputs.python_version_nodot }}-${{ inputs.build-type }}${TRACY_SUFFIX}-${SANITIZED_REF}-${{ github.run_id }}"
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: ☁️ Upload wheel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: 10
        with:
          name: ${{ steps.set_artifact_name.outputs.artifact_name }}
          path: wheelhouse
          if-no-files-found: error
