name: Bug Check

on:
  issue_comment:
    types: [created]

jobs:
  bug-check:
    name: Run Bug Checker
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/bug-check') &&
      (
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: write

    steps:
      - name: Get PR number
        id: pr
        run: echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install "anthropic>=0.30.0,<1.0.0" "pyyaml>=6.0.0,<7.0.0"

      - name: Run bug checker
        id: check
        env:
          BUG_CHECKER_API_KEY: ${{ secrets.BUG_CHECKER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/bug_checker/run_bug_checker.py \
            --pr ${{ steps.pr.outputs.number }} \
            --sarif .github/bug-checker-results.sarif \
            --post-comments \
            --verbose

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .github/bug-checker-results.sarif
        continue-on-error: true
