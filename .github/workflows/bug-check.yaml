name: Bug Check

on:
  issue_comment:
    types: [created]

jobs:
  bug-check:
    name: Run Bug Checker
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/bug-check') &&
      (
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER'
      )
    concurrency:
      group: bug-check-${{ github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: write

    steps:
      - name: Get PR number
        id: pr
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: echo "number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
          cache-dependency-path: '.github/bug_checker/requirements-bug-checker.txt'

      - name: Install dependencies
        run: pip install -r .github/bug_checker/requirements-bug-checker.txt

      - name: Run bug checker
        id: check
        env:
          BUG_CHECKER_API_KEY: ${{ secrets.BUG_CHECKER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          python .github/bug_checker/run_bug_checker.py \
            --pr "$PR_NUMBER" \
            --sarif .github/bug-checker-results.sarif \
            --post-comments \
            --verbose

      - name: Upload SARIF
        if: always() && hashFiles('.github/bug-checker-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .github/bug-checker-results.sarif
