name: "(Tier 1) Models Sweep Tests"

on:
  schedule:
    # Weekly, Saturdays at 06:00 UTC. (GitHub Actions cron is always UTC; scheduled runs fire on the default branch only.)
    - cron: "0 6 * * 6"
  workflow_dispatch:
    inputs:
      model:
        description: "Select model to test"
        required: true
        default: all
        type: choice
        options:
          - all
          - llama3.1-8b
          - llama3.3-70b
      sku:
        description: "Select SKU to test"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - "wh_n150 (N150)"
          - "wh_n300 (N300)"
          - "wh_llmbox (T3000)"
          - "wh_llmbox_perf (T3000 perf)"
          - "wh_galaxy (WH Galaxy)"
          - "wh_galaxy_perf (WH Galaxy perf)"
          - "bh_p150 (P150)"
          - "bh_p300 (P300)"
          - "bh_quietbox_2 (BH QB2)"
          - "bh_galaxy (BH Galaxy)"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      mlperf-read-only:
        required: false
        type: boolean
        default: true
        description: "Mount /mnt/MLPerf as read-only (uncheck for read-write access to populate tensor caches)"

permissions:
  packages: write
  contents: write

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  resolve-skus:
    runs-on: ubuntu-latest
    outputs:
      enabled-skus: ${{ steps.resolve.outputs.enabled-skus }}
    steps:
      - name: Resolve SKU selection
        id: resolve
        run: |
          ALL_SKUS="wh_n150,wh_n300,wh_llmbox,wh_llmbox_perf,wh_galaxy,wh_galaxy_perf,bh_p150,bh_p300,bh_quietbox_2,bh_galaxy"
          SKU_INPUT="${{ inputs.sku || 'all' }}"
          if [[ "$SKU_INPUT" == "all" ]]; then
            echo "enabled-skus=$ALL_SKUS" >> $GITHUB_OUTPUT
          else
            # Extract SKU name before the parenthetical description
            SKU_NAME=$(echo "$SKU_INPUT" | sed 's/ (.*//')
            echo "enabled-skus=$SKU_NAME" >> $GITHUB_OUTPUT
          fi
  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}
  models-sweep-tests:
    needs: [check-harbor, build-artifact, resolve-skus]
    secrets: inherit
    uses: ./.github/workflows/models-sweep-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.resolve-skus.outputs.enabled-skus }}
      model: ${{ inputs.model || 'all' }}
      tier: "1"
      # `!= false` so unset inputs on scheduled runs default to read-only (true)
      mlperf-read-only: ${{ inputs.mlperf-read-only != false }}
