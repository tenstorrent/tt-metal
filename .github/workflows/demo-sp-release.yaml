name: "(Release) Model Status for Console Deployment"

on:
  workflow_dispatch:
    inputs:
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      mlperf-read-only:
        required: false
        type: boolean
        default: true
        description: "Set to false to allow write access to MLPerf mount"
      test-group:
        description: "Select which test group to run (SP1/4 tests can be run between 12 and 4 PM UTC)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - deepseek_prefill
          - deepseek_decode
          - deepseek_unit_tests
          - wan22
          - single_galaxy_deepseek
          - sp1_deepseek
          - sp4_deepseek

  schedule:
    # Run daily at 11 AM UTC
    - cron: "0 11 * * 1-5"

permissions:
  contents: write
  packages: write
  actions: write
  id-token: write

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: ${{ inputs.build-type || 'Release' }}
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}
      build-wheel: true
      tracy: true  # required for device-perf tests (e.g. galaxy DeepSeek Prefill PERF)

  deepseek-prefill-tests:
    name: "DeepSeek Prefill Tests"
    needs: [build-artifact]
    if: ${{ inputs.test-group == 'all' || inputs.test-group == 'deepseek_prefill' || github.event_name == 'schedule' }}
    secrets: inherit
    uses: ./.github/workflows/demo-sp-release-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      enabled-skus: bh_galaxy,bh_loudbox
      model: deepseek_prefill
      mlperf-read-only: ${{ inputs.mlperf-read-only != false }}
      job-prefix: "[DeepSeek Prefill] "

  deepseek-decode-tests:
    name: "DeepSeek Decode Tests (B1 Decoder Block)"
    needs: [build-artifact]
    if: ${{ inputs.test-group == 'all' || inputs.test-group == 'deepseek_decode' || github.event_name == 'schedule' }}
    secrets: inherit
    uses: ./.github/workflows/demo-sp-release-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      enabled-skus: bh_p300,bh_galaxy
      model: deepseek_decode
      mlperf-read-only: ${{ inputs.mlperf-read-only != false }}
      job-prefix: "[DeepSeek Decode] "

  deepseek-unit-tests:
    name: "DeepSeek B1 Unit Tests"
    needs: build-artifact
    if: ${{ inputs.test-group == 'all' || inputs.test-group == 'deepseek_unit_tests' || github.event_name == 'schedule' }}
    secrets: inherit
    uses: ./.github/workflows/demo-sp-release-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      enabled-skus: bh_galaxy
      model: deepseek_unit_tests
      mlperf-read-only: ${{ inputs.mlperf-read-only != false }}
      job-prefix: "[DeepSeek Unit Tests] "

  wan22-tests:
    name: "Wan 2.2 Tests"
    needs: [build-artifact]
    if: ${{ inputs.test-group == 'all' || inputs.test-group == 'wan22' || github.event_name == 'schedule' }}
    secrets: inherit
    uses: ./.github/workflows/demo-sp-release-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      enabled-skus: wh_galaxy_perf,wh_llmbox_perf
      model: wan22
      mlperf-read-only: ${{ inputs.mlperf-read-only != false }}
      job-prefix: "[Wan2.2] "

  deepseek-sp4-tests:
    name: "SP4 DeepSeek Tests"
    needs: [build-artifact]
    if: ${{ inputs.test-group == 'all' || inputs.test-group == 'sp4_deepseek' || github.event_name == 'schedule' }}
    secrets: inherit
    uses: ./.github/workflows/demo-sp-multihost-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      sp-config: sp4

  deepseek-sp1-tests:
    name: "SP1 DeepSeek Tests"
    needs: build-artifact
    if: ${{ inputs.test-group == 'all' || inputs.test-group == 'sp1_deepseek' || github.event_name == 'schedule' }}
    secrets: inherit
    uses: ./.github/workflows/demo-sp-multihost-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      sp-config: sp1

  # todo)) proven to work by itself but mess up SP1 allocationp; disabled until issue (https://github.com/tenstorrent/tt-metal/issues/44917) is resolved
