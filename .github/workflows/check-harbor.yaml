# Check if Harbor registry is available and return the appropriate prefix.
# Orchestrators compose pull-ready image strings by passing this prefix into
# resolve-docker-pull-refs (or equivalent format()) with canonical ghcr.io tags.
name: "[internal] Check Harbor Availability"

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: "tt-ubuntu-light"
        description: "Runner label for the Harbor health check job"
    outputs:
      harbor-prefix:
        description: "Harbor pull-through prefix from org vars when healthy; empty to pull GHCR directly"
        value: ${{ jobs.check.outputs.harbor-prefix }}
  schedule:
    - cron: "0 * * * *"

jobs:
  check:
    name: "Check Harbor"
    runs-on: ${{ inputs.runs-on || 'tt-ubuntu-light' }}
    permissions:
      contents: read
    outputs:
      harbor-prefix: ${{ steps.check.outputs.harbor-prefix }}
    steps:
      - name: Check Harbor availability
        id: check
        env:
          HARBOR_PREFIX: ${{ vars.HARBOR_PREFIX }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          HARBOR_HEALTHY=false
          if ! command -v jq > /dev/null 2>&1; then
            echo "::error title=Missing jq::jq is required to parse Harbor health responses. Docker pulls will fall back to direct GHCR."
            echo "harbor-prefix=" >> "$GITHUB_OUTPUT"
            if [ "$EVENT_NAME" = "schedule" ]; then
              exit 1
            fi
            exit 0
          fi

          # Try to reach Harbor registry API and check api v2.0 health endpoint
          # Using --max-time 10 to prevent hanging if Harbor is partially responsive

          # First, try to get health endpoint response
          # Use `|| true` so curl failures (e.g. exit 28 timeout, exit 22 HTTP error)
          # don't trip `set -e` before we emit the fallback error annotation below.
          HEALTH_RESPONSE=$(curl --max-time 10 -sf "https://harbor.ci.tenstorrent.net/api/v2.0/health" 2>/dev/null || true)

          # Single retry: if first attempt returned empty (timeout/network blip), wait 5s and try once more
          if [ -z "$HEALTH_RESPONSE" ]; then
            echo "First Harbor health check failed, retrying in 5s..."
            sleep 5
            HEALTH_RESPONSE=$(curl --max-time 10 -sf "https://harbor.ci.tenstorrent.net/api/v2.0/health" 2>/dev/null || true)
          fi

          if [ -n "$HEALTH_RESPONSE" ]; then
            echo "$HEALTH_RESPONSE" | jq -r '.components[] | select(.status != "healthy") | "\(.name):\(.status)"' | while IFS=: read -r name status; do
              echo "::warning title=Harbor Component Unhealthy::Component $name has status: $status"
            done

            OVERALL_STATUS=$(echo "$HEALTH_RESPONSE" | jq -r '.status')
            if [ "$OVERALL_STATUS" = "healthy" ]; then
              HARBOR_HEALTHY=true
              echo "harbor-prefix=$HARBOR_PREFIX" >> "$GITHUB_OUTPUT"
              echo "✓ Harbor is available"
            else
              echo "::error title=Harbor Unhealthy::Harbor overall status is: $OVERALL_STATUS. Docker pulls will fall back to direct GHCR."
              echo "harbor-prefix=" >> "$GITHUB_OUTPUT"
              echo "### Harbor Registry Unhealthy" >> "$GITHUB_STEP_SUMMARY"
              echo "Overall status: \`$OVERALL_STATUS\`. Falling back to direct GHCR." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "::error title=Harbor Unavailable::Harbor registry did not respond. Docker pulls will fall back to direct GHCR."
            echo "harbor-prefix=" >> "$GITHUB_OUTPUT"
            echo "### Harbor Registry Unavailable" >> "$GITHUB_STEP_SUMMARY"
            echo "Harbor did not respond within timeout. Falling back to direct GHCR." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$HARBOR_HEALTHY" != "true" ] && [ "$EVENT_NAME" = "schedule" ]; then
            exit 1
          fi
