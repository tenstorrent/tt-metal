name: "[internal] Check Harbor Availability"
description: "Check if Harbor registry is available and return the appropriate prefix"

on:
  workflow_call:
    outputs:
      harbor-prefix:
        description: "Harbor prefix to use (empty if Harbor is down)"
        value: ${{ jobs.check.outputs.harbor-prefix }}
  schedule:
    - cron: '0 * * * *'

jobs:
  check:
    name: "Check Harbor"
    runs-on: tt-ubuntu-2204-small-stable
    outputs:
      harbor-prefix: ${{ steps.check.outputs.harbor-prefix }}
    steps:
      - name: Check Harbor availability
        id: check
        run: |
          # Try to reach Harbor registry API and check api v2.0 health endpoint
          # Using --max-time 10 to prevent hanging if Harbor is partially responsive

          # First, try to get health endpoint response
          HEALTH_RESPONSE=$(curl --max-time 10 -sf "https://harbor.ci.tenstorrent.net/api/v2.0/health" 2>/dev/null)

          if [ -n "$HEALTH_RESPONSE" ]; then
            # Parse health response and emit warnings for unhealthy components
            # Emit warnings for each unhealthy component
            echo "$HEALTH_RESPONSE" | jq -r '.components[] | select(.status != "healthy") | "\(.name):\(.status)"' | while IFS=: read -r name status; do
              echo "::warning title=Harbor Component Unhealthy::Component $name has status: $status"
            done

            # Check overall status
            OVERALL_STATUS=$(echo "$HEALTH_RESPONSE" | jq -r '.status')
            if [ "$OVERALL_STATUS" = "healthy" ]; then
              echo "harbor-prefix=${{ vars.HARBOR_PREFIX }}" >> $GITHUB_OUTPUT
              echo "✓ Harbor is available"
            else
              echo "::warning title=Harbor Overall Unhealthy::Harbor overall status is: $OVERALL_STATUS"
              echo "harbor-prefix=" >> $GITHUB_OUTPUT
              echo "⚠ Harbor unhealthy, falling back to direct GHCR"
            fi
          else
            echo "harbor-prefix=" >> $GITHUB_OUTPUT
            echo "⚠ Harbor unavailable, falling back to direct GHCR"
          fi
