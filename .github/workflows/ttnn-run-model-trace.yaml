              f"{machine_info.get('board_type', '?')} / "
              f"{machine_info.get('device_series', '?')} "
              f"(x{machine_info.get('card_count', '?')})"
          )

          leg_rows = []
          status_dir = Path(os.environ["LEG_STATUS_DIR"])
          if status_dir.is_dir():
              for p in sorted(status_dir.glob("*.json")):
                  try:
                      rec = json.loads(p.read_text())
                  except Exception:
                      continue
                  icon = "✅" if rec.get("outcome") == "success" else "❌"
                  hf = rec.get("hf_model") or ""
                  leg_rows.append(
                      f"| {icon} | `{rec.get('slug')}` | `{rec.get('test_path')}` | "
                      f"`{hf}` | {rec.get('stats', {}).get('unique_operations') or '-'} | "
                      f"{rec.get('stats', {}).get('total_configurations') or '-'} |"
                  )

          lines = [
              "## New Trace Entry (homogenized batch)",
              "",
              "| Field | Value |",
              "|---|---|",
              f"| trace_run_id | `{os.environ['TRACE_RUN_ID']}` |",
              f"| Trace UID | `{os.environ['TRACE_UID']}` |",
              f"| Hardware | {hw} |",
              f"| Models in batch | {len(models)} |",
              f"| Total configurations | {config_count} |",
              f"| tt-metal SHA | `{os.environ['TT_METAL_SHA']}` |",
              f"| Workflow run | {os.environ['RUN_URL']} |",
              "",
              "### Per-leg outcomes",
              "",
              "| Status | Slug | test_path | HF_MODEL | Unique ops | Total configs |",
              "|---|---|---|---|---|---|",
          ]
          lines.extend(leg_rows or ["| — | (no leg sidecars found) | | | | |"])
          lines.extend([
              "",
              "## Promotion checklist",
              "- [ ] Review trace stats above and in the workflow job summary",
              "- [ ] Change registry status from `draft` to `active`",
              "- [ ] Add the batch's `model_name`s to the appropriate `targets` group",
          ])
          print("\n".join(lines))
          PY
