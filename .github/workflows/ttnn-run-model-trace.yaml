            echo "::notice::Manifest PR created on branch $BRANCH_NAME"
          else
            echo "::notice::No changes to trace_selection_registry.yaml — skipping PR"
          fi

  trigger-validation:
    name: Trigger validation
    needs: [homogenize-and-load]
    # Validation needs a concrete trace_run_id (produced only when load-to-db
    # successfully uploaded). run-validation is the user's explicit opt-in.
    if: ${{ inputs.run-validation && inputs.load-to-db && needs.homogenize-and-load.outputs.trace-run-id != '' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/ttnn-model-trace-sweep-validation-impl.yaml
    secrets: inherit
    with:
      pinned-trace-id: ${{ needs.homogenize-and-load.outputs.trace-run-id }}
      allow-partial-hash-changes: true
      caller-id: ${{ format('ttnn-run-model-trace/run-{0}/attempt-{1}', github.run_id, github.run_attempt) }}

  summarize-batch:
    name: Summarize batch
    needs: [validate-inputs, trace-model, homogenize-and-load]
    if: ${{ always() && needs.trace-model.result != 'cancelled' && needs.trace-model.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all leg status sidecars
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: model-trace-status-*
          path: leg_status
          merge-multiple: true

      - name: Write aggregate step summary
        env:
          MODEL_COUNT: ${{ needs.validate-inputs.outputs.model-count }}
          TRACE_RUN_ID: ${{ needs.homogenize-and-load.outputs.trace-run-id }}
          HOMOGENIZED_TRACE_UID: ${{ needs.homogenize-and-load.outputs.trace-uid }}
          LOAD_TO_DB: ${{ inputs.load-to-db }}
          RUN_VALIDATION: ${{ inputs.run-validation }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          rows = []
          success = 0
          failed = 0
          status_dir = Path("leg_status")
          if status_dir.is_dir():
              for p in sorted(status_dir.glob("*.json")):
                  try:
                      rec = json.loads(p.read_text())
                  except Exception:
                      continue
                  ok = rec.get("outcome") == "success"
                  icon = "✅" if ok else "❌"
                  success += int(ok)
                  failed += int(not ok)
                  hf = rec.get("hf_model") or ""
                  rows.append(
                      f"| {icon} | `{rec.get('slug')}` | `{rec.get('test_path')}` | "
                      f"`{hf}` | {rec.get('stats', {}).get('unique_operations') or '-'} | "
                      f"{rec.get('stats', {}).get('total_configurations') or '-'} | "
                      f"`{rec.get('trace_uid') or '-'}` |"
                  )

          lines = [
              "## Model trace batch summary",
              "",
              f"- Models requested: **{os.environ.get('MODEL_COUNT', '?')}**",
              f"- Succeeded: **{success}** / Failed: **{failed}**",
              f"- Load to DB: **{os.environ.get('LOAD_TO_DB', 'false')}**",
              f"- Run Validation: **{os.environ.get('RUN_VALIDATION', 'false')}**",
          ]
          trace_run_id = os.environ.get("TRACE_RUN_ID")
          trace_uid = os.environ.get("HOMOGENIZED_TRACE_UID")
          if trace_run_id:
              lines.append(f"- Homogenized `trace_run_id`: **`{trace_run_id}`**")
          if trace_uid:
              lines.append(f"- Homogenized `trace_uid`: **`{trace_uid}`**")
          lines.extend([
              "",
              "| Status | Slug | test_path | HF_MODEL | Unique ops | Total configs | Leg trace_uid |",
              "|---|---|---|---|---|---|---|",
          ])
          lines.extend(rows or ["| — | (no leg sidecars found) | | | | | |"])

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a") as f:
                  f.write("\n".join(lines) + "\n")
          print("\n".join(lines))
          PY
