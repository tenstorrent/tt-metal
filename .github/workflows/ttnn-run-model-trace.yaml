name: "ttnn run model trace"

on:
  workflow_dispatch:
    inputs:
      models:
        description: >-
          JSON array of models to trace (GitHub collapses multiline input, so use inline JSON).
          Example: [{"test_path":"models/tt_transformers/demo/simple_text_demo.py::test_demo_text","HF_MODEL":"meta-llama/Llama-3.2-1B-Instruct"},{"test_path":"models/demos/audio/whisper/demo/demo.py"}]
          Keys: test_path (required), HF_MODEL (optional), extra_args (optional).
          All models share runner-label and are homogenized into one trace_run_id.
        required: true
        type: string
      runner-label:
        description: "CI runner / hardware target (shared by every model in the batch)"
        required: true
        type: choice
        options:
          - N150
          - N300
          - P100a
          - P150b
          - n300-llmbox
          - topology-6u
          - BH-LLMBox
          - BH-DeskBox
          - BH-LoudBox
        default: "N150"
      store-raw-traces:
        description: "Keep individual per-op trace files and upload as artifact"
        required: false
        type: boolean
        default: false
      load-to-db:
        description: "Homogenize, load into DB, and open a single manifest PR"
        required: false
        type: boolean
        default: false
      run-validation:
        description: "Run the sweep validation pipeline against the newly uploaded trace (requires load-to-db)"
        required: false
        type: boolean
        default: false
      timeout-minutes:
        description: "Timeout per tracing leg (minutes)"
        required: false
        type: number
        default: 60

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-inputs:
    name: Validate inputs & derive arch
    runs-on: ubuntu-latest
    outputs:
      arch: ${{ steps.derive.outputs.arch }}
      platform: ${{ steps.derive.outputs.platform }}
      ci-version: ${{ steps.derive.outputs.ci_version }}
      matrix: ${{ steps.parse.outputs.matrix }}
      model-count: ${{ steps.parse.outputs.model_count }}
    steps:
      - name: Verify tenstorrent org membership
        env:
          GH_TOKEN: ${{ secrets.TENSTORRENT_ORG_READ_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::error::Missing secret TENSTORRENT_ORG_READ_TOKEN (PAT with read:org)"
            exit 1
          fi

          if ! gh api "orgs/tenstorrent/members/${ACTOR}" --silent 2>/dev/null; then
            echo "::error::GitHub user ${ACTOR} is not recognized as a tenstorrent organization member"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive

      - name: Install parser dependency
        run: pip3 install PyYAML

      - name: Parse models input and build matrix
        id: parse
        env:
          MODELS_INPUT: ${{ inputs.models }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          import yaml

          raw = os.environ["MODELS_INPUT"]
          try:
              entries = yaml.safe_load(raw)
          except yaml.YAMLError as exc:
              print(f"::error::models input is not valid YAML/JSON: {exc}")
              sys.exit(1)

          if not isinstance(entries, list) or not entries:
              print("::error::models must be a non-empty YAML/JSON list of {test_path, HF_MODEL?, extra_args?} entries")
              sys.exit(1)

          def make_slug(test_path):
              # Basename without extension, replace '::' with '_', keep only safe chars.
              base = Path(test_path.split("::", 1)[0]).stem
              suffix = test_path.split("::", 1)[1] if "::" in test_path else ""
              raw_slug = f"{base}_{suffix}" if suffix else base
              return re.sub(r"[^A-Za-z0-9._-]+", "-", raw_slug).strip("-") or "trace"

          include = []
          slug_counts = {}
          errors = []
          for idx, entry in enumerate(entries):
              if not isinstance(entry, dict):
                  errors.append(f"entry #{idx}: must be a mapping, got {type(entry).__name__}")
                  continue
              test_path = entry.get("test_path")
              if not isinstance(test_path, str) or not test_path:
                  errors.append(f"entry #{idx}: missing required 'test_path'")
                  continue

              test_file = test_path.split("::", 1)[0]
              if not Path(test_file).is_file():
                  errors.append(f"entry #{idx}: test_path file not found: {test_file}")
                  continue

              base_slug = make_slug(test_path)
              n = slug_counts.get(base_slug, 0)
              slug_counts[base_slug] = n + 1
              slug = base_slug if n == 0 else f"{base_slug}-{n}"

              include.append(
                  {
                      "index": idx,
                      "slug": slug,
                      "test_path": test_path,
                      "hf_model": entry.get("HF_MODEL", "") or "",
                      "extra_args": entry.get("extra_args", "") or "",
                  }
              )

          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)

          matrix = {"include": include}
          gh_out = os.environ["GITHUB_OUTPUT"]
          with open(gh_out, "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write(f"model_count={len(include)}\n")

          print(f"Resolved {len(include)} models into matrix:")
          for item in include:
              tag = f" [HF_MODEL:{item['hf_model']}]" if item["hf_model"] else ""
              print(f"  - {item['slug']}: {item['test_path']}{tag}")
          PY

      - name: Derive arch from runner label
        id: derive
        env:
          RUNNER_LABEL: ${{ inputs.runner-label }}
        run: |
          RUNNER="$RUNNER_LABEL"
          case "$RUNNER" in
            P100a|P150b|BH-LLMBox|BH-DeskBox|BH-LoudBox)
              ARCH="blackhole"
              ;;
            *)
              ARCH="wormhole_b0"
              ;;
          esac
          # CIv2 pool (tt-ubuntu-2204-<label>-viommu-stable) resolves HF weights
          # via the in-cluster large file cache. Bare-metal labels run on CIv1
          # with /mnt/MLPerf (Weka) instead.
          case "$RUNNER" in
            N150|N300|P100a|P150b)
              CI_VERSION="civ2"
              ;;
            *)
              CI_VERSION="civ1"
              ;;
          esac
          echo "arch=$ARCH" >> $GITHUB_OUTPUT
          echo "platform=Ubuntu 22.04" >> $GITHUB_OUTPUT
          echo "ci_version=$CI_VERSION" >> $GITHUB_OUTPUT
          echo "Derived arch=$ARCH ci_version=$CI_VERSION for runner=$RUNNER"

  build-artifact:
    name: Build
    needs: [validate-inputs]
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: Release
      build-wheel: true
      platform: ${{ needs.validate-inputs.outputs.platform }}

  trace-model:
    name: "Trace: ${{ matrix.slug }}"
    needs: [validate-inputs, build-artifact]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.validate-inputs.outputs.matrix).include }}
    container:
      image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        ARCH_NAME: ${{ needs.validate-inputs.outputs.arch }}
        LOGURU_LEVEL: INFO
        GITHUB_ACTIONS: true
        TRACY_NO_INVARIANT_CHECK: 1
        # CIv1 points HF at the Weka-backed cache; CIv2 resolves through TT_GH_CI_INFRA
        # + LFC so HF_HOME is left unset (falls back to the container default).
        HF_HOME: ${{ needs.validate-inputs.outputs.ci-version == 'civ1' && '/mnt/MLPerf/tt_dnn-models/hf_home' || '' }}
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: >-
        --device /dev/tenstorrent
        --device /dev/ipmi0
        --privileged
        ${{ needs.validate-inputs.outputs.ci-version == 'civ2' && '-e TT_GH_CI_INFRA=1' || '' }}
    defaults:
      run:
        shell: bash
        working-directory: /work
    timeout-minutes: ${{ fromJSON(inputs.timeout-minutes) }}
    runs-on: >-
      ${{
        (inputs.runner-label == 'topology-6u' || inputs.runner-label == 'BH-LLMBox' || inputs.runner-label == 'BH-DeskBox' || inputs.runner-label == 'BH-LoudBox') && fromJSON(format('["{0}", "in-service", "bare-metal"]', inputs.runner-label))
        || format('tt-ubuntu-2204-{0}-viommu-stable', inputs.runner-label)
      }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive
          path: docker-job

      - name: Setup job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
          wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}

      - name: Display trace configuration
        env:
          TEST_PATH: ${{ matrix.test_path }}
          SLUG: ${{ matrix.slug }}
          RUNNER_LABEL: ${{ inputs.runner-label }}
          ARCH: ${{ needs.validate-inputs.outputs.arch }}
          CI_VERSION: ${{ needs.validate-inputs.outputs.ci-version }}
          HF_MODEL: ${{ matrix.hf_model }}
          EXTRA_ARGS: ${{ matrix.extra_args }}
          STORE_RAW: ${{ inputs.store-raw-traces }}
          LOAD_DB: ${{ inputs.load-to-db }}
          RUN_VALIDATION: ${{ inputs.run-validation }}
          TIMEOUT: ${{ inputs.timeout-minutes }}
          TT_METAL_SHA: ${{ github.sha }}
        run: |
          if [[ "$CI_VERSION" == "civ2" ]]; then
            HF_SOURCE="LFC via TT_GH_CI_INFRA=1"
          else
            HF_SOURCE="/mnt/MLPerf (HF_HOME=/mnt/MLPerf/tt_dnn-models/hf_home)"
          fi
          echo "::group::Trace Configuration (leg: $SLUG)"
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│                    Model Trace Configuration                │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│ Leg slug:             $SLUG"
          echo "│ Test Path:            $TEST_PATH"
          echo "│ Runner:               $RUNNER_LABEL"
          echo "│ Architecture:         $ARCH"
          echo "│ CI version:           $CI_VERSION"
          echo "│ HF_MODEL:             ${HF_MODEL:-(not set)}"
          echo "│ HF weights source:    $HF_SOURCE"
          echo "│ Store Raw Traces:     $STORE_RAW"
          echo "│ Load to DB:           $LOAD_DB"
          echo "│ Run Validation:       $RUN_VALIDATION"
          echo "│ Extra Args:           ${EXTRA_ARGS:-(none)}"
          echo "│ Timeout:              $TIMEOUT minutes"
          echo "│ tt-metal SHA:         $TT_METAL_SHA"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

      - name: Probe LFC for HF_MODEL (CIv2)
        if: ${{ needs.validate-inputs.outputs.ci-version == 'civ2' && matrix.hf_model != '' }}
        env:
          INPUT_HF_MODEL: ${{ matrix.hf_model }}
        run: |
          LFC_BASE="http://large-file-cache.large-file-cache.svc.cluster.local//mldata/model_checkpoints/pytorch/huggingface"
          URL="${LFC_BASE}/${INPUT_HF_MODEL}/config.json"
          echo "Probing LFC: $URL"
          STATUS=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 30 "$URL" || echo "000")
          echo "HTTP status: $STATUS"
          if [[ "$STATUS" != "200" ]]; then
            echo "::error::LFC does not serve ${INPUT_HF_MODEL} (HTTP $STATUS at $URL)."
            echo "::error::Upload the weights to /mldata/model_checkpoints/pytorch/huggingface/${INPUT_HF_MODEL}/,"
            echo "::error::or re-run this workflow on a CIv1 runner label (topology-6u, BH-LLMBox, BH-DeskBox, BH-LoudBox)"
            echo "::error::where /mnt/MLPerf provides the weights."
            exit 1
          fi
          echo "LFC has ${INPUT_HF_MODEL}"

      - name: Verify CIv1 weights (MLPerf)
        if: ${{ needs.validate-inputs.outputs.ci-version == 'civ1' && matrix.hf_model != '' }}
        env:
          INPUT_HF_MODEL: ${{ matrix.hf_model }}
        run: |
          if ! mountpoint -q /mnt/MLPerf; then
            echo "::error::/mnt/MLPerf is not mounted on this CIv1 runner."
            exit 1
          fi
          EXPECTED="/mnt/MLPerf/tt_dnn-models/${INPUT_HF_MODEL}"
          if [[ -d "$EXPECTED" ]]; then
            echo "Found CIv1 weights at $EXPECTED"
          else
            echo "::warning::No CIv1 weights under $EXPECTED; HF loader will try HF_HOME cache and may fail if unpopulated."
          fi

      - name: Run model trace
        id: trace
        timeout-minutes: ${{ fromJSON(inputs.timeout-minutes) }}
        env:
          HF_MODEL: ${{ matrix.hf_model }}
          TEST_PATH: ${{ matrix.test_path }}
          EXTRA_ARGS: ${{ matrix.extra_args }}
          STORE_RAW_TRACES: ${{ inputs.store-raw-traces }}
        run: |
          TRACER_OUTPUT_DIR="model_tracer/traced_operations"

          # Reject extra_args that override output directory
          if [[ "$EXTRA_ARGS" =~ (^|[[:space:]])(--output-dir|-o)(=|[[:space:]]|$) ]]; then
            echo "::error::extra_args must not override tracer output directory"
            exit 1
          fi

          cmd=(python3 model_tracer/generic_ops_tracer.py "$TEST_PATH" --output-dir "$TRACER_OUTPUT_DIR")

          if [[ "$STORE_RAW_TRACES" == "true" ]]; then
            cmd+=("--store")
          fi

          if [[ -n "$EXTRA_ARGS" ]]; then
            mapfile -d '' -t extra < <(
              python3 -c 'import os, shlex, sys; [sys.stdout.write(a + "\0") for a in shlex.split(os.environ["EXTRA_ARGS"])]'
            )
            cmd+=("${extra[@]}")
          fi

          "${cmd[@]}"

          MASTER_JSON="$TRACER_OUTPUT_DIR/ttnn_operations_master.json"
          echo "master_json_path=$MASTER_JSON" >> $GITHUB_OUTPUT

          # Extract trace_uid from the persisted master JSON rather than the
          # per-trace metadata file, which generic_ops_tracer.py deletes unless
          # --store is set.
          if [[ -f "$MASTER_JSON" ]]; then
            TRACE_UID=$(MASTER_JSON="$MASTER_JSON" python3 - <<'PY'
          import json
          import os

          with open(os.environ["MASTER_JSON"]) as f:
              data = json.load(f)

          for op_data in data.get("operations", {}).values():
              for cfg in op_data.get("configurations", []):
                  for execution in cfg.get("executions", []):
                      trace_uid = execution.get("trace_uid")
                      if trace_uid:
                          print(trace_uid)
                          raise SystemExit(0)
          PY
            )
          fi

          if [[ -n "$TRACE_UID" ]]; then
            echo "trace_uid=$TRACE_UID" >> $GITHUB_OUTPUT
          fi

      - name: Write leg status sidecar
        if: always()
        env:
          SLUG: ${{ matrix.slug }}
          TEST_PATH: ${{ matrix.test_path }}
          HF_MODEL: ${{ matrix.hf_model }}
          EXTRA_ARGS: ${{ matrix.extra_args }}
          TRACE_OUTCOME: ${{ steps.trace.outcome }}
          TRACE_UID: ${{ steps.trace.outputs.trace_uid }}
          MASTER_JSON: ${{ steps.trace.outputs.master_json_path }}
        run: |
          mkdir -p /work/leg-status
          python3 - <<'PY'
          import json
          import os

          master_json = os.environ.get("MASTER_JSON") or ""
          stats = {"unique_operations": None, "total_configurations": None}
          if master_json and os.path.isfile(master_json):
              try:
                  with open(master_json) as f:
                      data = json.load(f)
                  ops = data.get("operations", {})
                  stats["unique_operations"] = len(ops)
                  stats["total_configurations"] = sum(
                      len(op.get("configurations", [])) for op in ops.values()
                  )
              except Exception as exc:
                  stats["parse_error"] = str(exc)

          record = {
              "slug": os.environ["SLUG"],
              "test_path": os.environ["TEST_PATH"],
              "hf_model": os.environ.get("HF_MODEL", "") or None,
              "extra_args": os.environ.get("EXTRA_ARGS", "") or None,
              "outcome": os.environ.get("TRACE_OUTCOME") or "skipped",
              "trace_uid": os.environ.get("TRACE_UID") or None,
              "stats": stats,
          }
          out_path = f"/work/leg-status/{record['slug']}.json"
          with open(out_path, "w") as f:
              json.dump(record, f, indent=2)
          print(f"Wrote {out_path}")
          PY

      - name: Write per-leg job summary
        if: always() && steps.trace.outcome == 'success'
        env:
          MASTER_JSON: ${{ steps.trace.outputs.master_json_path }}
          TEST_PATH: ${{ matrix.test_path }}
          SLUG: ${{ matrix.slug }}
          TRACE_UID: ${{ steps.trace.outputs.trace_uid }}
          TT_METAL_SHA: ${{ github.sha }}
        run: |
          if [[ ! -f "$MASTER_JSON" ]]; then
            echo "::warning::Master JSON not found at $MASTER_JSON"
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import textwrap

          master_json = os.environ["MASTER_JSON"]
          test_path = os.environ["TEST_PATH"]
          slug = os.environ["SLUG"]
          trace_uid = os.environ.get("TRACE_UID", "unknown")
          tt_metal_sha = os.environ["TT_METAL_SHA"]

          with open(master_json) as f:
              data = json.load(f)

          ops = data.get("operations", {})
          unique_ops = len(ops)
          total_configs = sum(len(op.get("configurations", [])) for op in ops.values())

          machine_info = {}
          for op_data in ops.values():
              for cfg in op_data.get("configurations", []):
                  for exc in cfg.get("executions", []):
                      if exc.get("machine_info"):
                          mi = exc["machine_info"]
                          if isinstance(mi, list):
                              mi = mi[0]
                          machine_info = mi
                          break
                  if machine_info:
                      break
              if machine_info:
                  break

          board = machine_info.get("board_type", "unknown")
          series = machine_info.get("device_series", "unknown")
          cards = machine_info.get("card_count", "?")
          mesh = machine_info.get("mesh_device_shape", [])

          summary = textwrap.dedent(f"""
          ## Model Trace Results — `{slug}`

          | Field | Value |
          |---|---|
          | Test Path | `{test_path}` |
          | Hardware | {board} / {series} (x{cards}) |
          | Mesh Shape | {mesh} |
          | Unique Operations | {unique_ops} |
          | Total Configurations | {total_configs} |
          | Leg Trace UID | `{trace_uid}` |
          | tt-metal SHA | `{tt_metal_sha}` |
          """).lstrip()

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary)
          PY

      - name: Upload leg master JSON
        if: always() && steps.trace.outcome == 'success'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: model-trace-leg-${{ matrix.slug }}
          path: /work/model_tracer/traced_operations/ttnn_operations_master.json
          retention-days: 1

      - name: Upload leg status sidecar
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: model-trace-status-${{ matrix.slug }}
          path: /work/leg-status/${{ matrix.slug }}.json
          retention-days: 1

      - name: Upload raw trace files
        if: inputs.store-raw-traces && steps.trace.outcome == 'success'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: model-trace-raw-files-${{ matrix.slug }}
          path: /work/generated/ttnn/reports/operation_parameters/
          retention-days: 1

  homogenize-and-load:
    name: Homogenize & load
    needs: [validate-inputs, trace-model]
    if: ${{ inputs.load-to-db && always() && needs.trace-model.result != 'cancelled' && needs.trace-model.result != 'skipped' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
      pull-requests: write
    env:
      PYTHONPATH: ${{ github.workspace }}
    outputs:
      trace-run-id: ${{ steps.load.outputs.trace_run_id }}
      trace-uid: ${{ steps.homogenize.outputs.trace_uid }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install psycopg2-binary pyyaml tqdm

      - name: Download leg master JSONs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: model-trace-leg-*
          path: downloaded_legs
          merge-multiple: false

      - name: Flatten leg artifacts
        id: flatten
        run: |
          mkdir -p legs
          LEG_COUNT=0

          echo "::group::downloaded_legs contents"
          find downloaded_legs -maxdepth 6 -print 2>/dev/null || echo "(downloaded_legs does not exist)"
          echo "::endgroup::"

          # download-artifact's directory structure depends on how many artifacts
          # matched the pattern: with a single match and merge-multiple:false it may
          # extract straight into `path/`; with multiple it creates `path/<name>/`.
          # upload-artifact also preserves the workspace-relative path, so the JSON
          # can live several levels deep. Walk the whole tree instead of guessing.
          if [[ -d downloaded_legs ]]; then
            while IFS= read -r src; do
              rel="${src#downloaded_legs/}"
              slug=$(echo "$rel" | grep -oE 'model-trace-leg-[^/]+' | head -1 | sed 's/^model-trace-leg-//' || true)
              if [[ -z "$slug" ]]; then
                slug="leg-$((LEG_COUNT + 1))"
              fi
              # Disambiguate if two JSONs resolve to the same slug.
              dest="legs/${slug}.json"
              n=1
              while [[ -e "$dest" ]]; do
                dest="legs/${slug}-${n}.json"
                n=$((n + 1))
              done
              cp "$src" "$dest"
              LEG_COUNT=$((LEG_COUNT + 1))
            done < <(find downloaded_legs -type f -name 'ttnn_operations_master.json' 2>/dev/null)
          fi

          echo "leg_count=$LEG_COUNT" >> $GITHUB_OUTPUT
          if [[ "$LEG_COUNT" -eq 0 ]]; then
            echo "::warning::No successful leg master JSONs to homogenize; skipping load."
          else
            echo "Found $LEG_COUNT leg master JSON(s) to homogenize:"
            ls -1 legs/
          fi

      - name: Homogenize master JSONs
        id: homogenize
        if: steps.flatten.outputs.leg_count != '0'
        run: |
          mkdir -p model_tracer/traced_operations
          python3 model_tracer/homogenize_master_json.py \
            --input legs \
            --output model_tracer/traced_operations/ttnn_operations_master.json

          TRACE_UID=$(python3 -c "import json; print(json.load(open('model_tracer/traced_operations/ttnn_operations_master.json'))['metadata']['trace_uid'])")
          echo "trace_uid=$TRACE_UID" >> $GITHUB_OUTPUT
          echo "Homogenized trace_uid: $TRACE_UID"

      - name: Upload homogenized master JSON
        if: steps.homogenize.outcome == 'success'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: model-trace-master-json-homogenized
          path: model_tracer/traced_operations/ttnn_operations_master.json
          retention-days: 1

      - name: Load into database
        id: load
        if: steps.homogenize.outcome == 'success'
        env:
          TTNN_OPS_DATABASE_URL: ${{ secrets.TTNN_OPS_LEAD_MODELS_DATABASE_URL }}
          TT_METAL_SHA: ${{ github.sha }}
        run: |
          python tests/sweep_framework/load_ttnn_ops_data_v2.py load \
            model_tracer/traced_operations/ttnn_operations_master.json \
            "$TT_METAL_SHA" \
            --emit-id-file /tmp/trace_run_id.txt

          if [[ -f /tmp/trace_run_id.txt ]]; then
            TRACE_RUN_ID=$(head -n1 /tmp/trace_run_id.txt)
            echo "trace_run_id=$TRACE_RUN_ID" >> $GITHUB_OUTPUT
            echo "Loaded trace_run_id=$TRACE_RUN_ID"
          else
            echo "::warning::Loader did not emit a trace_run_id (likely a duplicate trace_uid)."
          fi

      - name: Download leg status sidecars
        if: steps.load.outcome == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: model-trace-status-*
          path: leg_status
          merge-multiple: true

      - name: Create manifest PR
        if: steps.load.outcome == 'success' && steps.load.outputs.trace_run_id != ''
        env:
          GH_TOKEN: ${{ secrets.CODEOWNERS_GROUP_ANALYSIS_PAT }}
          TRACE_UID: ${{ steps.homogenize.outputs.trace_uid }}
          TRACE_RUN_ID: ${{ steps.load.outputs.trace_run_id }}
          RUN_ID: ${{ github.run_id }}
          # Branch off main so the manifest-PR branch tip contains no .github/workflows
          # changes relative to main. Otherwise GitHub's workflow-scope check rejects
          # the push since CODEOWNERS_GROUP_ANALYSIS_PAT lacks the 'workflows' scope.
          BASE_REF: main
          TT_METAL_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MASTER_JSON: model_tracer/traced_operations/ttnn_operations_master.json
          LEG_STATUS_DIR: leg_status
        run: |
          if ! git diff --quiet model_tracer/trace_selection_registry.yaml 2>/dev/null; then
            # Snapshot the loader-updated registry before we change branches.
            cp model_tracer/trace_selection_registry.yaml /tmp/registry_updated.yaml

            # Fetch the target base (main) and branch from it so the push only
            # contains the registry delta, not the feature branch's workflow edits.
            git fetch --depth=1 origin "$BASE_REF"
            BRANCH_NAME="trace/auto-manifest-${RUN_ID}"
            git checkout -B "$BRANCH_NAME" "origin/$BASE_REF"

            # Reapply the loader's registry update on top of main.
            cp /tmp/registry_updated.yaml model_tracer/trace_selection_registry.yaml

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add model_tracer/trace_selection_registry.yaml

            if git diff --cached --quiet; then
              echo "::notice::Registry on main already matches loader output; skipping PR."
              exit 0
            fi

            MODEL_COUNT=$(python3 -c "import json; print(len(json.load(open('$MASTER_JSON'))['metadata'].get('models', [])))")
            git commit -m "Add draft trace entry for ${MODEL_COUNT} model(s) (trace_run_id=${TRACE_RUN_ID})"
            git push origin "$BRANCH_NAME"

            # Compile PR body stats from the homogenized JSON + per-leg sidecars.
            PR_BODY=$(MASTER_JSON="$MASTER_JSON" LEG_STATUS_DIR="$LEG_STATUS_DIR" \
              TRACE_UID="$TRACE_UID" TRACE_RUN_ID="$TRACE_RUN_ID" \
              TT_METAL_SHA="$TT_METAL_SHA" RUN_URL="$RUN_URL" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          with open(os.environ["MASTER_JSON"]) as f:
              data = json.load(f)
          ops = data.get("operations", {})
          meta = data.get("metadata", {})
          config_count = sum(len(op.get("configurations", [])) for op in ops.values())
          models = meta.get("models", [])

          machine_info = {}
          for op_data in ops.values():
              for cfg in op_data.get("configurations", []):
                  for exc in cfg.get("executions", []):
                      mi = exc.get("machine_info", {})
