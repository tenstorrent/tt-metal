name: "(Galaxy) Sanity"

on:
  workflow_dispatch:
    inputs:
      arch:
        required: true
        type: choice
        options:
          - wormhole_b0
        default: wormhole_b0
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      extra-tag:
        required: false
        type: string
        default: "in-service"
  schedule:
    # Every 2 hours (UTC)
    - cron: "0 */2 * * *"

run-name: >
  ${{
    ((github.event.inputs.arch == 'blackhole') && '(BH Galaxy) Sanity') ||
    ((github.event.inputs.arch == 'wormhole_b0') && '(WH Galaxy) Sanity') ||
    '(Unspecified Galaxy) Sanity'
  }}

permissions:
  packages: write
  contents: write

jobs:
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}

  galaxy-sanity-test:
    needs: build-artifact
    secrets: inherit
    uses: ./.github/workflows/galaxy-sanity-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      extra-tag: ${{ inputs.extra-tag || 'in-service' }}
