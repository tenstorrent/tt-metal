name: "[post-commit] LLK audit tool - unit tests"

# Hermetic Python unit tests for the llk-audit recall tool's checkers. No clang,
# hardware, or repo build needed — the tests run each checker over synthetic
# fact bases. Path-filtered so it only runs when the tool changes.

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - "main"
    paths:
      - "tt_metal/tt-llk/.claude/tools/llk-audit/**"

permissions:
  contents: read

jobs:
  llk-audit-unit-tests:
    name: Run llk-audit checker unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 10
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Run llk-audit unit tests
        working-directory: tt_metal/tt-llk/.claude/tools/llk-audit
        run: python3 tests/test_checks.py
