name: "[internal] Galaxy DeepSeek tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      extra-tag:
        required: false
        type: string
        default: "in-service"
      topology:
        required: false
        type: string
        default: "topology-6u"
      test-type:
        required: false
        type: string
        default: "all"
      recreate_weights_cache:
        required: false
        type: string
        default: "No"
      new_cache_dir:
        required: false
        type: string
        default: ""
      enable-tracy:
        required: false
        type: boolean
        default: false
        description: "Whether Tracy profiling is enabled in the build"

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate test matrix
        id: generate
        run: |
          all_tests=$(jq -n '[
            { "name": "(Galaxy) DeepSeek unit tests", "arch": "wormhole_b0", "model": "deepseek", "test-type": "unit", "timeout": 15, "owner_id": "U03HY7MK4BT" },
            { "name": "(Galaxy) DeepSeek module tests", "arch": "wormhole_b0", "model": "deepseek", "test-type": "module", "timeout": 150, "owner_id": "U03HY7MK4BT" },
            { "name": "(Galaxy) DeepSeek final-op-unit tests", "arch": "wormhole_b0", "model": "deepseek", "test-type": "final-op-unit", "timeout": 150, "owner_id": "U03HY7MK4BT" },
            { "name": "(Galaxy) DeepSeek long-seq module tests", "arch": "wormhole_b0", "model": "deepseek", "test-type": "long-seq-module", "timeout": 115, "owner_id": "U0896VBAKFC" }
          ]')

          # Filter matrix based on test-type selection
          if [ "${{ inputs.test-type }}" = "all" ]; then
            matrix="$all_tests"
          else
            matrix=$(echo "$all_tests" | jq -c "[.[] | select(.\"test-type\" == \"${{ inputs.test-type }}\")]")
          fi

          # Fail fast if the matrix is empty (invalid test-type selected)
          if [ "$(echo "$matrix" | jq length)" -eq 0 ]; then
            echo "Error: Invalid test-type selected: '${{ inputs.test-type }}'"
            exit 1
          fi
          echo "matrix=$(echo "$matrix" | jq -c .)" >> $GITHUB_OUTPUT

  galaxy-deepseek-tests:
    needs: generate-matrix
    name: ${{ matrix.test-group.name }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    runs-on:
      - arch-wormhole_b0
      - ${{ inputs.topology }}
      - bare-metal
      - pipeline-functional
      - ${{ inputs.extra-tag }}
    container:
      image: ${{ inputs.docker-image }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
        ARCH_NAME: ${{ matrix.test-group.arch }}
        DEEPSEEK_V3_HF_MODEL: /mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528
        DEEPSEEK_V3_CACHE: /mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache/CI
        MESH_DEVICE: TG
        # Required for BenchmarkData to save to Superset
        CI: true
        GITHUB_ACTIONS: true
        # Indicate if Tracy profiling is available in this build
        TT_METAL_TRACY_BUILD: ${{ inputs.enable-tracy && '1' || '0' }}
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
        - ${{ inputs.recreate_weights_cache == 'Yes' && '/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache:/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache' || '/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache:/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache:ro' }}
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      - name: Validate cluster health
        timeout-minutes: 5
        run: |
          ./build/tools/scaleout/run_cluster_validation --cabling-descriptor-path tt_metal/fabric/cabling_descriptors/wh_galaxy_xy_torus.textproto --hard-fail --send-traffic
      - name: Prepare custom weights cache directory
        if: ${{ inputs.recreate_weights_cache == 'Yes' }}
        env:
          INPUT_CACHE_DIR: ${{ inputs.new_cache_dir }}
        run: |
          CACHE_BASE="/mnt/MLPerf/tt_dnn-models/deepseek-ai/DeepSeek-R1-0528-Cache"
          if [[ -z "${INPUT_CACHE_DIR}" ]]; then
            echo "::error::recreate_weights_cache is Yes but new_cache_dir is empty. Please provide a cache directory name."
            exit 1
          fi
          DIR_NAME="${INPUT_CACHE_DIR}"
          if [[ "${DIR_NAME}" =~ [/[:space:][:cntrl:]] || "${DIR_NAME}" == "." || "${DIR_NAME}" == ".." ]]; then
            echo "::error::new_cache_dir contains invalid characters (slashes, spaces, control chars) or is '.'/'..'"
            exit 1
          fi
          if [[ "${DIR_NAME}" == "CI" ]]; then
            echo "::error::new_cache_dir cannot be 'CI' — this would overwrite the production cache."
            exit 1
          fi
          NEW_DIR="${CACHE_BASE}/${DIR_NAME}"
          RESOLVED=$(realpath -m "${NEW_DIR}")
          if [[ "${RESOLVED}" != "${CACHE_BASE}/"* || "${RESOLVED}" == "${CACHE_BASE}/CI" ]]; then
            echo "::error::new_cache_dir resolves outside the allowed cache base or to the CI directory."
            exit 1
          fi
          echo "Creating new cache directory: ${NEW_DIR}"
          mkdir -p "${NEW_DIR}"
          echo "Copying test_io_cache from CI directory..."
          rm -rf "${NEW_DIR}/test_io_cache"
          cp -r "${CACHE_BASE}/CI/test_io_cache" "${NEW_DIR}/test_io_cache"
          chmod -R a+rwX "${NEW_DIR}"
          echo "DEEPSEEK_V3_CACHE=${NEW_DIR}" >> $GITHUB_ENV
      - name: Run DeepSeek unit tests
        if: ${{ matrix.test-group.test-type == 'unit' }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          uv pip install -r models/demos/deepseek_v3/reference/deepseek/requirements.txt
          pytest models/demos/deepseek_v3/tests/unit --timeout 60 --durations=0
      - name: Validate weight cache
        if: ${{ matrix.test-group.test-type == 'module' || matrix.test-group.test-type == 'final-op-unit' }}
        timeout-minutes: 10
        run: |
          python3 models/demos/deepseek_v3/scripts/validate_weight_cache.py --root "$DEEPSEEK_V3_CACHE/tests_cache" || true
      - name: Run DeepSeek module tests
        if: ${{ matrix.test-group.test-type == 'module' }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          uv pip install -r models/demos/deepseek_v3/reference/deepseek/requirements.txt
          # Phase 1: Fast, high-signal tests first (~5 min) — get early failure feedback
          pytest \
            models/demos/deepseek_v3/tests/test_rms_norm.py \
            models/demos/deepseek_v3/tests/test_moe_gate.py \
            models/demos/deepseek_v3/tests/test_lm_head.py \
            models/demos/deepseek_v3/tests/test_lm_head1d.py \
            models/demos/deepseek_v3/tests/test_embedding.py \
            models/demos/deepseek_v3/tests/test_mlp.py \
            models/demos/deepseek_v3/tests/test_mla.py \
            --timeout 600 --durations=0
          # Phase 2: Heavy integration tests + any remaining files
          pytest models/demos/deepseek_v3/tests \
            --ignore=models/demos/deepseek_v3/tests/unit \
            --ignore=models/demos/deepseek_v3/tests/fused_op_unit_tests \
            --ignore=models/demos/deepseek_v3/tests/test_rms_norm.py \
            --ignore=models/demos/deepseek_v3/tests/test_moe_gate.py \
            --ignore=models/demos/deepseek_v3/tests/test_lm_head.py \
            --ignore=models/demos/deepseek_v3/tests/test_lm_head1d.py \
            --ignore=models/demos/deepseek_v3/tests/test_embedding.py \
            --ignore=models/demos/deepseek_v3/tests/test_mlp.py \
            --ignore=models/demos/deepseek_v3/tests/test_mla.py \
            --timeout 600 --durations=0
      - name: Run DeepSeek op unit tests
        if: ${{ matrix.test-group.test-type == 'final-op-unit' }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          echo "Skipping separate functional fused-op run for final-op-unit."
          echo "final-op-unit now uses Tracy-backed device perf tests as the single execution path."
      - name: Check device performance test availability
        if: ${{ matrix.test-group.test-type == 'final-op-unit' }}
        run: |
          if [ "${{ inputs.enable-tracy }}" != "true" ]; then
            echo "ERROR: final-op-unit requires Tracy-enabled execution for fused-op device perf tests."
            echo "Set enable-tracy: true in workflow dispatch/caller."
            exit 1
          fi
          echo "✓ Tracy profiling ENABLED - final-op-unit device perf tests will run"
      - name: Run DeepSeek op unit tests (Device Performance)
        if: ${{ matrix.test-group.test-type == 'final-op-unit' }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          uv pip install -r models/demos/deepseek_v3/reference/deepseek/requirements.txt

          echo "=============================================="
          echo "Device Performance Tests"
          echo "=============================================="
          echo "DeepSeek fused-op device perf tests (CI-curated selection)"
          CI_FUSED_OP_DEVICE_PERF_K_EXPR='
          (
            (test_ds_embedding_device_perf and ((decode and 1) or (prefill and 128))) or
            (test_ds_all_gather_embedding_device_perf and ((decode and 1) or (prefill and 128))) or
            (test_ds_lm_head_device_perf and ((decode and 1) or (prefill and 128))) or
            (test_ds_rms_norm_device_perf and ((decode and 1) or (prefill and 128))) or
            (test_ds_distributed_norm_device_perf and ((decode and 1) or (prefill and 128))) or
            (test_ds_ff1_3_device_perf and ((decode and 1) or (prefill and 128))) or
            (test_ds_ff2_device_perf and ((decode and 1) or (prefill and 128))) or
            (test_ds_mul_device_perf and ((decode and 1) or (prefill and 128))) or
            (test_ds_reduce_scatter_post_ff2_device_perf and ((decode and 1) or (prefill and 128))) or
            (test_ds_all_gather_preff1_3_device_perf and ((decode and 1) or (prefill and 128)))
          )'
          CI_FUSED_OP_DEVICE_PERF_K_EXPR="$(printf '%s' "$CI_FUSED_OP_DEVICE_PERF_K_EXPR" | tr '\n' ' ' | tr -s '[:space:]' ' ' | sed 's/^ //; s/ $//')"
          pytest models/demos/deepseek_v3/tests/fused_op_unit_tests -k "$CI_FUSED_OP_DEVICE_PERF_K_EXPR" --timeout 600 --durations=0

          echo "=============================================="
          echo "All device perf tests completed!"
          echo "=============================================="
      - name: Run DeepSeek long seq len module tests
        if: ${{ matrix.test-group.test-type == 'long-seq-module' }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          uv pip install -r models/demos/deepseek_v3/reference/deepseek/requirements.txt
          DEEPSEEK_MAX_SEQ_LEN_OVERRIDE=16384 pytest models/demos/deepseek_v3/tests/test_mla.py -k "mode_decode" --timeout 900 --durations=0
          DEEPSEEK_MAX_SEQ_LEN_OVERRIDE=12288 pytest models/demos/deepseek_v3/tests/test_decoder_block.py -k "mode_decode" --timeout 2400 --durations=0
          # TODO: set DEEPSEEK_MAX_SEQ_LEN_OVERRIDE to large value if test does not get killed in CI.
          DEEPSEEK_MAX_SEQ_LEN_OVERRIDE=1024 pytest models/demos/deepseek_v3/tests/test_model.py -k "mode_decode" --timeout 1250 --durations=0
          DEEPSEEK_MAX_SEQ_LEN_OVERRIDE=32768 pytest models/demos/deepseek_v3/tests/test_model.py -k "mode_prefill" --timeout 1250 --durations=0
      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
          owner: ${{ matrix.test-group.owner_id }}
      # - name: Save environment data
      #   id: save-environment-data
      #   if: ${{ !cancelled() }}
      #   run: |
      #     if [ -d "generated/benchmark_data" ]; then
      #       echo "has_benchmark_data=true" >> $GITHUB_OUTPUT
      #       python3 .github/scripts/data_analysis/create_benchmark_with_environment_json.py
      #     else
      #       echo "::warning::Benchmark data directory 'generated/benchmark_data' does not exist"
      #       echo "has_benchmark_data=false" >> $GITHUB_OUTPUT
      #     fi
      # - name: Upload benchmark data
      #   if: ${{ !cancelled() && steps.save-environment-data.conclusion == 'success' && steps.save-environment-data.outputs.has_benchmark_data == 'true' }}
      #   uses: tenstorrent/tt-metal/.github/actions/upload-data-via-sftp@main
      #   with:
      #     ssh-private-key: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
      #     sftp-batchfile: .github/actions/upload-data-via-sftp/benchmark_data_batchfile.txt
      #     username: ${{ secrets.SFTP_BENCHMARK_WRITER_USERNAME }}
      #     hostname: ${{ secrets.SFTP_BENCHMARK_WRITER_HOSTNAME }}
      #     path: /work
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
