name: "Build tt-metal artifacts"
permissions:
  contents: read
  packages: write
on:
  workflow_call:
    inputs:
      build-type:
        required: false
        type: string
        default: "Release"
      runs-on:
        required: false
        type: string
        default: "tt-ubuntu-2204-large-stable"
        description: "Runner label for the build-artifact job"
      tracy:
        required: false
        type: boolean
        default: false
        description: "Build with tracy enabled"
      distributed:
        required: false
        type: boolean
        default: true
        description: "Build with distributed enabled (Adds OpenMPI dependency)"
      build-wheel:
        required: false
        type: boolean
        default: false
        description: "Build Python Wheel"
      architecture:
        required: false
        type: string
        default: "amd64"
      toolchain:
        required: false
        type: string
        default: "cmake/x86_64-linux-clang-20-libstdcpp-toolchain.cmake"
        description: "Toolchain file to use for build"
      publish-artifact:
        required: false
        type: boolean
        default: true
        description: "Make resulting artifact available in the workflow"
      publish-package:
        required: false
        type: boolean
        default: true
        description: "Make resulting debian packages available in the workflow"
      build-ttnn-import-artifact:
        required: false
        type: boolean
        default: false
        description: "Upload a lean artifact (build/lib *.so + runtime) so consumers can import ttnn in-place via TT_FROM_PRECOMPILED_DIR"
      build-inplace-wheel:
        required: false
        type: boolean
        default: false
        description: "Package the wheel from the compiled tree (no second compile) instead of the manylinux build-wheel job; in-family CI consumers only"
      skip-tt-train:
        # FIXME: TT-Train needs to get fixed to not assume a specific toolchain.
        #        Fow now enabling an opt-out. But this should get removed.
        required: false
        type: boolean
        default: true
      profile:
        required: false
        type: boolean
        default: false
        description: "Profile the compilation"
      build-umd-tests:
        required: false
        type: boolean
        default: false
        description: "Build UMD tests"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      platform:
        required: false
        type: string
        default: ""
        description: >-
          Platform string (e.g., 'Ubuntu 22.04', 'Ubuntu 24.04').
          If provided, overrides distro/version/toolchain.
      fetch-depth:
        required: false
        type: number
        default: 500
        description: >-
          Git fetch depth for the checkout step. Must be large enough to
          include all tags and history needed for `git describe`.
      checkout-filter:
        required: false
        type: string
        default: ""
        description: >-
          Partial-clone filter for the checkout (e.g. 'tree:0' or 'blob:none').
          Empty (default) means a normal, non-partial clone.
      ref:
        required: false
        type: string
        default: ""
        description: 'Commit SHA to test (default: HEAD)'
      wheel-ref:
        required: false
        type: string
        default: ""
        description: "Git ref used only for wheel checkout/versioning"
      use-artifacts-from-run:
        required: false
        type: string
        default: ""
        description: "Workflow run ID to download artifacts from (skips build)"
      # Pre-built Docker image tags (optional - if provided, skips docker build)
      ci-build-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built CI Build Docker image tag"
      ci-test-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built CI Test Docker image tag"
      dev-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built Dev Docker image tag"
      basic-dev-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built Basic Dev Docker image tag"
      basic-ttnn-runtime-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built Basic TTNN Runtime Docker image tag"
      manylinux-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built ManyLinux Docker image tag"
      harbor-prefix:
        required: false
        type: string
        default: ""
        description: "Harbor prefix to use (empty for direct GHCR)"
    outputs:
      ci-build-docker-image:
        description: >-
          Docker tag for the CI Build Docker image for building TT-Metalium et al
        value: >-
          ${{ inputs.ci-build-docker-image || jobs.build-docker-image.outputs.ci-build-tag }}
      ci-test-docker-image:
        description: "Docker tag for the CI Test Docker image for testing TT-Metalium et al"
        value: ${{ inputs.ci-test-docker-image || jobs.build-docker-image.outputs.ci-test-tag }}
      dev-docker-image:
        description: "Docker tag for the dev Docker image for developing TT-Metalium et al"
        value: ${{ inputs.dev-docker-image || jobs.build-docker-image.outputs.dev-tag }}
      basic-dev-docker-image:
        description: "Docker tag for the basic dev Docker image for basic development"
        value: ${{ inputs.basic-dev-docker-image || jobs.build-docker-image.outputs.basic-dev-tag }}
      basic-ttnn-runtime-docker-image:
        description: "Docker tag for the basic TTNN runtime Docker image for running TTNN"
        value: ${{ inputs.basic-ttnn-runtime-docker-image || jobs.build-docker-image.outputs.basic-ttnn-runtime-tag }}
      manylinux-docker-image:
        description: "Docker tag for the ManyLinux Docker image"
        value: ${{ inputs.manylinux-docker-image || jobs.build-docker-image.outputs.manylinux-tag }}
      packages-artifact-name:
        description: "Name to give download-artifact to get the packages"
        value: >-
          ${{ jobs.build-artifact.result == 'success' &&
              jobs.build-artifact.outputs.packages-artifact-name ||
              (jobs.download-artifacts.result == 'success' &&
               jobs.download-artifacts.outputs.packages-artifact-name || '') }}
      build-artifact-name:
        description: "Name of the published build artifact"
        value: >-
          ${{ jobs.build-artifact.result == 'success' &&
              jobs.build-artifact.outputs.build_artifact_name ||
              (jobs.download-artifacts.result == 'success' &&
               jobs.download-artifacts.outputs.build_artifact_name || '') }}
      wheel-artifact-name:
        description: "Name of the published wheel artifact"
        value: >-
          ${{ (jobs.build-wheel.result == 'success' &&
               jobs.build-wheel.outputs.artifact-name) ||
              (jobs.build-artifact.result == 'success' &&
               jobs.build-artifact.outputs.inplace_wheel_artifact_name) ||
              (jobs.download-artifacts.result == 'success' &&
               jobs.download-artifacts.outputs.wheel_artifact_name) || '' }}
      ttnn-import-artifact-id:
        description: "ID of the lean artifact (build/lib *.so + runtime) for importing ttnn in-place without a wheel"
        value: >-
          ${{ jobs.build-artifact.result == 'success' &&
              jobs.build-artifact.outputs.ttnn_import_artifact_id || '' }}
  workflow_dispatch:
    inputs:
      tracy:
        required: false
        type: boolean
        default: false
        description: "Build with tracy enabled"
      distributed:
        required: false
        type: boolean
        default: true
        description: "Build with distributed enabled (Adds OpenMPI dependency)"
      build-wheel:
        required: false
        type: boolean
        default: false
        description: "Build Python Wheel"
      build-inplace-wheel:
        required: false
        type: boolean
        default: false
        description: "Package the wheel from the compiled tree (no second compile) instead of the manylinux build-wheel job; in-family CI consumers only"
      architecture:
        required: false
        type: string
        default: "amd64"
      toolchain:
        required: false
        type: string
        default: "cmake/x86_64-linux-clang-20-libstdcpp-toolchain.cmake"
        description: "Toolchain file to use for build"
      profile:
        required: false
        type: boolean
        default: false
        description: "Profile the compilation"
      build-umd-tests:
        required: false
        type: boolean
        default: false
        description: "Build UMD tests"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Target Platform"
      build-type:
        required: false
        type: string
        default: "Release"
      runs-on:
        required: false
        type: string
        default: "tt-ubuntu-2204-large-stable"
        description: "Runner label for the build-artifact job"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      harbor-prefix:
        required: false
        type: string
        default: ""
        description: "Harbor prefix to use (empty for direct GHCR)"
      fetch-depth:
        required: false
        type: number
        default: 500
        description: >-
          Git fetch depth for the checkout step. Must be large enough to
          include all tags and history needed for `git describe`.
      checkout-filter:
        required: false
        type: string
        default: ""
        description: >-
          Partial-clone filter for the checkout (e.g. 'tree:0' or 'blob:none').
          Empty (default) means a normal, non-partial clone.
      wheel-ref:
        required: false
        type: string
        default: ""
        description: "Git ref used only for wheel checkout/versioning"
      publish-artifact:
        required: false
        type: boolean
        default: true
        description: "Make resulting artifact available in the workflow"

jobs:
  # =============================================================================
  # ARCHITECTURE NOTE: Platform Parsing
  # =============================================================================
  # This workflow handles platform parsing internally via the parse-platform job.
  # Callers should NOT run their own parse-platform job - just pass:
  #   - platform: "Ubuntu 22.04" or "Ubuntu 24.04"
  #   - enable-lto: true/false (optional, defaults based on platform)
  #
  # The parse-platform job converts the platform string to distro/version/toolchain
  # and applies platform-specific defaults (e.g., LTO settings).
  # =============================================================================

  # Parse platform dropdown to extract distro/version/toolchain
  parse-platform:
    runs-on: ubuntu-slim
    outputs:
      distro: ${{ steps.parse.outputs.distro }}
      version: ${{ steps.parse.outputs.version }}
      toolchain: ${{ steps.parse.outputs.toolchain }}
      enable-lto: ${{ steps.parse.outputs.enable-lto }}
      python-version: ${{ steps.parse.outputs.python-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: true
      - id: parse
        uses: ./.github/actions/parse-platform
        with:
          platform: ${{ inputs.platform }}
          enable-lto: ${{ inputs.enable-lto || false }}
  # =============================================================================
  # ARCHITECTURE NOTE: Docker Image Caching
  # =============================================================================
  # Docker images can be provided in two ways:
  # 1. Pre-built: Pass ci-build-docker-image, dev-docker-image, etc. as inputs
  #    (used by merge-gate.yaml which builds all images once upfront)
  # 2. On-demand: Leave docker image inputs empty; build-docker-image job runs
  #
  # The "always() && !failure() && !cancelled()" pattern is used throughout to
  # allow jobs to run even when upstream jobs are SKIPPED (not just successful).
  # This is necessary because pre-built image inputs cause build-docker-image
  # to be skipped, but downstream jobs still need to run.
  # =============================================================================

  # Only build docker images if pre-built tags are not provided
  build-docker-image:
    if: ${{ always() && !failure() && !cancelled() && inputs.ci-build-docker-image == '' }}
    uses: ./.github/workflows/build-docker-artifact.yaml
    secrets: inherit
    with:
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      architecture: ${{ inputs.architecture }}
      ref: ${{ inputs.ref }}
      harbor-prefix: ${{ inputs.harbor-prefix }}
  download-artifacts:
    if: ${{ inputs.use-artifacts-from-run != '' }}
    runs-on: ubuntu-latest
    outputs:
      build_artifact_name: ${{ steps.download.outputs.build-artifact-name }}
      wheel_artifact_name: ${{ steps.download.outputs.wheel-artifact-name }}
      packages-artifact-name: ${{ steps.download.outputs.packages-artifact-name }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: true
      - name: Download artifacts from workflow run
        id: download
        env:
          GH_TOKEN: ${{ github.token }}
        uses: ./.github/actions/download-artifacts-from-run
        with:
          workflow_run_id: ${{ inputs.use-artifacts-from-run }}
          working-directory: ${{ github.workspace }}/artifacts
          tracy: ${{ inputs.tracy }}
      - name: Upload build artifact for downstream jobs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.download.outputs.build-artifact-name }}
          path: ${{ github.workspace }}/artifacts/ttm_any.tar.zst
          if-no-files-found: error
          retention-days: 1
      - name: Upload wheel artifact
        if: ${{ steps.download.outputs.wheel-artifact-name != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.download.outputs.wheel-artifact-name }}
          path: ${{ github.workspace }}/artifacts/*.whl
          if-no-files-found: ignore
          retention-days: 1
      - name: Upload packages artifact
        if: ${{ steps.download.outputs.packages-artifact-name != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.download.outputs.packages-artifact-name }}
          path: ${{ github.workspace }}/artifacts/*.deb
          if-no-files-found: ignore
          retention-days: 1
  build-artifact:
    # Use always() so this job runs even when build-docker-image is skipped (pre-built tags provided)
    if: ${{ always() && !failure() && !cancelled() && inputs.use-artifacts-from-run == '' }}
    name: >-
      🛠️ Build ${{ inputs.build-type }}
      ${{ needs.parse-platform.outputs.distro }}
      ${{ needs.parse-platform.outputs.version }}
    needs: [parse-platform, build-docker-image]
    # Cross-workflow compile mutex: if two workflows (e.g. pr-gate + merge-gate) trigger
    # builds for the same commit + config simultaneously, queue them so the second run
    # gets a fully warm ccache instead of both racing with cold caches.
    # Keyed purely on SHA + compile inputs — no branch/PR special-casing.
    concurrency:
      group: >-
        cmake-build-
        ${{ github.sha }}-
        ${{ inputs.platform }}-
        ${{ inputs.build-type }}-
        ${{ inputs.toolchain }}-
        ${{ inputs.architecture }}-
        tracy:${{ inputs.tracy }}-
        dist:${{ inputs.distributed }}-
        lto:${{ inputs.enable-lto }}
      queue: max
    timeout-minutes: 100
    runs-on: ${{ inputs['runs-on'] }}
    environment: ${{ github.ref == 'refs/heads/main' && 'mainline' || '' }}
    outputs:
      packages-artifact-name: ${{ steps.set-artifact-name.outputs.name }}
      build_artifact_name: ${{ steps.set_build_artifact_name.outputs.build_artifact_name }}
      ttnn_import_artifact_id: ${{ steps.upload_ttnn_import.outputs.artifact-id }}
      inplace_wheel_artifact_name: ${{ steps.build_inplace_wheel.outputs.artifact_name }}
    env:
      # Platform values from parse-platform job (handles both workflow_dispatch and workflow_call)
      DISTRO: ${{ needs.parse-platform.outputs.distro }}
      VERSION: ${{ needs.parse-platform.outputs.version }}
      TOOLCHAIN: ${{ inputs.toolchain || needs.parse-platform.outputs.toolchain }}
      CCACHE_S3_BUCKET: ccache
      CCACHE_S3_PREFIX: tt-metal
      CCACHE_S3_READONLY: "false"
      CCACHE_S3_DEBUG: "false"
    container:
      # Callers that pre-resolve via resolve-docker-pull-refs pass already-prefixed
      # tags with harbor-prefix=''; callers with raw GHCR tags pass harbor-prefix
      # from check-harbor. Either way format(prefix, tag) produces the right ref.
      image: >-
        ${{
          (inputs.ci-build-docker-image != '' &&
            format('{0}{1}', inputs.harbor-prefix, inputs.ci-build-docker-image)) ||
          format('{0}{1}', inputs.harbor-prefix,
            needs.build-docker-image.outputs.ci-build-tag || 'docker-image-unresolved!')
        }}
      env:
        CCACHE_REMOTE_ONLY: "true"
        CCACHE_TEMPDIR: /tmp/ccache
        CCACHE_COMPRESS: "true"
        CCACHE_COMPRESSLEVEL: "3"
        # Log ccache operations to a file so remote storage errors are visible in CI.
        # Errors (storage helper failures, S3 timeouts) would otherwise be silent.
        CCACHE_LOGFILE: /tmp/ccache.log
        # Strip the working directory prefix from hashed paths so cache entries
        # are reusable across machines even if the checkout path differs.
        CCACHE_BASEDIR: /work
        # TODO: Revisit the addition of these env vars https://github.com/tenstorrent/tt-metal/issues/20161
        TRACY_NO_INVARIANT_CHECK: 1
        TRACY_NO_ISA_EXTENSIONS: 1
      volumes:
        - ${{ github.workspace }}:/work
        # HOME is hardcoded for no clear reason: https://github.com/actions/runner/issues/863
        - /home/ubuntu/.ccache-ci:/github/home/.ccache
      # Group 1457 is for the shared ccache drive
      # tmpfs is for efficiency
      options: >
        --group-add 1457
        --tmpfs /tmp
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878

    steps:
      - name: Configure S3 ccache storage
        # Failing internal jobs draws attention immediately so we can fix them and make them fast.
        # Forks will never have secrets; don't fail the job for them, they'll just run slower
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          if [ -z "${{ secrets.GARAGE_S3_ACCESS_KEY }}" ] || [ -z "${{ secrets.GARAGE_S3_SECRET_KEY }}" ]; then
            echo "Garage S3 credentials are missing. Did you forget 'secrets: inherit'?"
            exit 1
          fi
          echo "AWS_ACCESS_KEY_ID=${{ secrets.GARAGE_S3_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.GARAGE_S3_SECRET_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=garage" >> $GITHUB_ENV
          CCACHE_REMOTE_STORAGE="s3://${CCACHE_S3_BUCKET}|region=garage|prefix=${CCACHE_S3_PREFIX}|endpoint_url=http://garage.garage.svc.cluster.local:3900"
          if [ "${CCACHE_S3_READONLY}" = "true" ]; then
            CCACHE_REMOTE_STORAGE="${CCACHE_REMOTE_STORAGE}|read-only=true"
          fi
          echo "CCACHE_REMOTE_STORAGE=${CCACHE_REMOTE_STORAGE}" >> $GITHUB_ENV
          echo "CCACHE_REMOTE_STORAGE: ${CCACHE_REMOTE_STORAGE}"
          if [ "${CCACHE_S3_DEBUG}" = "true" ]; then
            echo "CRSH_LOGFILE=/tmp/ccache-storage-s3.log" >> $GITHUB_ENV
          fi
          echo "AWS_ENDPOINT_URL_S3=http://garage.garage.svc.cluster.local:3900" >> $GITHUB_ENV

      - name: Verify S3 connectivity (write / read-back / delete)
        # NOTE: this probe is intentionally NON-FATAL. ccache treats the remote
        # cache as a soft dependency (remote errors degrade to local misses), so a
        # transient Garage hiccup must not turn into a hard build failure. We warn
        # and continue rather than `exit 1`. The probe is purely diagnostic.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          # Use a per-job unique key so concurrent jobs (this is a reusable workflow
          # invoked by many pipelines against the same bucket/prefix) don't clobber
          # each other's PUT/GET/DELETE windows and cause spurious 404 read-backs.
          KEY=".s3-connectivity-test-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${RANDOM}"
          BASE="http://garage.garage.svc.cluster.local:3900/${CCACHE_S3_BUCKET}/${CCACHE_S3_PREFIX}/${KEY}"
          PAYLOAD="ccache-s3-connectivity-ok"
          SIGV4="aws:amz:garage:s3"
          CREDS="${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}"
          probe() {
            # PUT
            echo "${PAYLOAD}" | curl -fsS -X PUT --aws-sigv4 "${SIGV4}" --user "${CREDS}" \
              "${BASE}" --data-binary @- -o /dev/null || return 1
            # GET and verify
            local result
            result=$(curl -fsS --aws-sigv4 "${SIGV4}" --user "${CREDS}" "${BASE}") || return 1
            [ "${result}" = "${PAYLOAD}" ] || { echo "Read-back mismatch: got '${result}'"; return 1; }
            # DELETE (best effort cleanup)
            curl -fsS -X DELETE --aws-sigv4 "${SIGV4}" --user "${CREDS}" "${BASE}" -o /dev/null || true
            return 0
          }
          if probe; then
            echo "S3 connectivity verified: write/read-back/delete all OK"
          else
            echo "::warning::S3 connectivity probe failed; ccache will degrade remote misses to local. Continuing."
          fi

      - name: Set artifact name
        id: set-artifact-name
        run: |
          TOOLCHAIN_CLEANED=$(echo "${{ env.TOOLCHAIN }}" | sed -E 's/^cmake\///; s/-toolchain\.cmake$//')
          # Use full sanitized ref/SHA and workflow run ID to ensure uniqueness
          # Sanitize ref/SHA by replacing invalid characters with hyphens
          RAW_REF="${{ inputs.ref || github.sha }}"
          SANITIZED_REF=$(echo "$RAW_REF" | sed 's/[\/:"<>|*?\r\n\\]/-/g')
          TRACY_SUFFIX="${{ (inputs.tracy && '-profiler') || '' }}"
          DIST_SUFFIX="${{ (inputs.distributed == false && '-no-distributed') || '' }}"
          DISTRO="${{ env.DISTRO }}"
          VERSION="${{ env.VERSION }}"
          ARCH="${{ inputs.architecture }}"
          BUILD_TYPE="${{ inputs.build-type }}"
          RUN_ID="${{ github.run_id }}"
          ARTIFACT_PARTS=(
            "packages"
            "${DISTRO}"
            "${VERSION}"
            "${ARCH}"
            "${BUILD_TYPE}"
            "${TOOLCHAIN_CLEANED}${TRACY_SUFFIX}${DIST_SUFFIX}"
            "${SANITIZED_REF}"
            "${RUN_ID}"
          )
          ARTIFACT_NAME=$(IFS='-'; echo "${ARTIFACT_PARTS[*]}")

          echo "name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: ${{ inputs.fetch-depth }}
          fetch-tags: true # Need tags for `git describe`
          filter: ${{ inputs.checkout-filter }}

      - name: Create ccache tmpdir
        run: |
          mkdir -p /tmp/ccache

      - name: Prepare ccache summary
        run: |
          # Zero out the stats so we can see how we did this build
          # NOTE: may be inaccurate if we have >1 build runner on the same machine, using the same local cache
          ccache -z

      - name: 🔧 Configure git safe.directory
        run: |
          # The checkout action adds $GITHUB_WORKSPACE (/__w/tt-metal/tt-metal) as a safe directory,
          # but not /work which is mounted from the host. Git commands from /work fail due to
          # ownership mismatch (host uid vs container root). Add /work to safe.directory.
          git config --global --add safe.directory /work

      - name: 📦 Restore CPM source cache
        id: cpm-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cpmcache.tar.zst
          key: >-
            cpm-z22-${{ hashFiles(
              'third_party/CMakeLists.txt',
              'tt_metal/third_party/umd/third_party/CMakeLists.txt',
              'tt-train/cmake/dependencies.cmake') }}
          restore-keys: cpm-z22-

      - name: 📦 Unpack CPM cache
        run: |
          [ -f .cpmcache.tar.zst ] && tar -I 'zstd -T0' -xf .cpmcache.tar.zst || true

      - name: 🔧 CMake configure
        run: |
          set -eu # basic shell hygiene

          if [ "${{ inputs.skip-tt-train }}" = "true" ]; then
            args_fixme="--build-metal-tests --build-ttnn-tests --build-programming-examples"
          else
            args_fixme="--build-all"
          fi
          echo "Args: ${args_fixme}"

          build_args=(
            "./build_metal.sh"
            "--build-dir" "build"
            "--build-type" "${{ inputs.build-type }}"
            "--toolchain-path" "${{ env.TOOLCHAIN }}"
            ${args_fixme}
            "--enable-ccache"
            "--configure-only"
          )

          echo "Build tracy: ${{ inputs.tracy }}"
          if [ "${{ inputs.tracy }}" = "false" ]; then
            build_args+=("--disable-profiler")
          fi
          echo "Build distributed: ${{ inputs.distributed }}"
          if [ "${{ inputs.distributed }}" = "false" ]; then
            build_args+=("--without-distributed")
          fi
          if [ "${{ inputs.profile }}" = "true" ]; then
            build_args+=("--enable-time-trace" "--disable-unity-builds")
          fi
          if [ "${{ inputs.build-umd-tests }}" = "true" ]; then
            build_args+=("--build-umd-tests")
          fi
          if [ "${{ inputs.enable-lto }}" = "true" ]; then
            build_args+=("--enable-lto")
          fi
          echo "build-artifact.yaml running: ${build_args[*]}"
          "${build_args[@]}"

      - name: 📦 Pack CPM cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        run: |
          [ -d .cpmcache ] && tar -I 'zstd -T0 --ultra -22' -cf .cpmcache.tar.zst .cpmcache || true

      - name: 📦 Save CPM source cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cpmcache.tar.zst
          key: ${{ steps.cpm-cache.outputs.cache-primary-key }}

      - name: 🛠️ Compile
        timeout-minutes: 90
        run: |
          # --target install is for the tarball that should get replaced by proper packaging later
          "$GITHUB_WORKSPACE/.github/scripts/utils/host-load-sidecar.sh" \
            --interval 1 \
            --label "cmake build (install target)" \
            --output "$GITHUB_STEP_SUMMARY" \
            -- cmake --build build --target install

      - name: 🛠️ Profile
        if: ${{ inputs.profile }}
        run: |
          echo "maxNameLength = 300" > ClangBuildAnalyzer.ini
          ClangBuildAnalyzer --all build capture.bin
          ClangBuildAnalyzer --analyze capture.bin

      - name: 📦 Package
        timeout-minutes: 10
        run: |
          cmake --build build --target package

          if [[ "${{ env.DISTRO }}" == "fedora" ]]; then
            ls -1sh build/*.rpm || true
          else
            ls -1sh build/*.deb build/*.ddeb || true
          fi

      - name: Publish ccache summary
        run: |
          CCACHE_STATS=$(ccache -sv)
          echo "$CCACHE_STATS"
          echo '## CCache Summary' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$CCACHE_STATS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Surface remote storage stats and errors from the ccache log.
          # Uses a filter script to avoid overflowing the 1024k step summary limit.
          if [ -f /tmp/ccache.log ]; then
            echo '## CCache Remote Storage' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            .github/scripts/ccache_log_filter.sh /tmp/ccache.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          # Helper debug log — only written when CCACHE_S3_DEBUG=true enables CRSH_LOGFILE.
          if [ -f /tmp/ccache-storage-s3.log ]; then
            echo "=== ccache-storage-s3 log (first 30 lines) ==="
            head -30 /tmp/ccache-storage-s3.log
            echo "=== ccache-storage-s3 log (last 80 lines) ==="
            tail -80 /tmp/ccache-storage-s3.log
            echo '## CCache Storage Helper Log' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -30 /tmp/ccache-storage-s3.log >> $GITHUB_STEP_SUMMARY
            echo '--- (last 200 lines) ---' >> $GITHUB_STEP_SUMMARY
            tail -200 /tmp/ccache-storage-s3.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: ☁️ Upload packages
        if: ${{ inputs.publish-package }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: 10
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            /work/build/*.deb
            /work/build/*.ddeb
          compression-level: 0
          if-no-files-found: error

      - name: Stage ttnn-import libs
        if: ${{ inputs.build-ttnn-import-artifact }}
        run: |
          # Lean TT_FROM_PRECOMPILED_DIR tree (build/lib + runtime). strip --strip-unneeded
          # drops the symbol table + debug, keeping the dynamic symbols needed to import ttnn.
          mkdir -p /work/ttnn-import/build/lib
          cp -a /work/build/lib/*.so* /work/ttnn-import/build/lib/
          find /work/ttnn-import/build/lib -type f -name '*.so*' -exec strip --strip-unneeded {} +
          cp -a /work/runtime /work/ttnn-import/runtime
          echo "Lean ttnn-import tree size:"; du -sh /work/ttnn-import /work/ttnn-import/build/lib

      - name: ☁️ Upload ttnn-import artifact
        id: upload_ttnn_import
        if: ${{ inputs.build-ttnn-import-artifact }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: 10
        with:
          name: ttnn-import-${{ inputs.build-type }}
          path: /work/ttnn-import
          compression-level: 1
          if-no-files-found: error

      - name: 🐍 Package wheel
        id: build_inplace_wheel
        if: ${{ inputs.build-inplace-wheel }}
        run: |
          # Wheel from the precompiled tree (TT_FROM_PRECOMPILED_DIR) — no recompile.
          # Build isolation pulls the pyproject build-system pins.
          export TT_FROM_PRECOMPILED_DIR=/work
          python3 -m build --wheel --outdir /work/wheelhouse-raw

          # auditwheel bundles transitively-linked libs (libtracy etc.) so the wheel is
          # self-contained; targets manylinux_2_35 (ubuntu 22.04 glibc) = in-family only.
          uv pip install auditwheel patchelf
          LD_LIBRARY_PATH=/work/build/lib auditwheel repair -w /work/wheelhouse /work/wheelhouse-raw/*.whl
          echo "Repaired wheel(s):"; ls -1sh /work/wheelhouse/*.whl
          # Name it like the build-wheel job so consumers treat it identically.
          RAW_REF="${{ inputs.ref || github.sha }}"
          SANITIZED_REF=$(echo "$RAW_REF" | sed 's/[\/:"<>|*?\r\n\\]/-/g')
          TRACY_SUFFIX="${{ (inputs.tracy && '-profiler') || '' }}"
          ARTIFACT_NAME="ttnn-dist-inplace-${{ inputs.build-type }}${TRACY_SUFFIX}-${SANITIZED_REF}-${{ github.run_id }}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: ☁️ Upload wheel package
        if: ${{ inputs.build-inplace-wheel }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: 10
        with:
          name: ${{ steps.build_inplace_wheel.outputs.artifact_name }}
          path: /work/wheelhouse/*.whl
          if-no-files-found: error

      - name: "Tar files"
        if: ${{ inputs.publish-artifact }}
        run: |
          WASM_ROOT="build/profiler/build_wasm"
          mkdir -p "${WASM_ROOT}/traces"
          ARTIFACT_PATHS="ttnn/ttnn/*.so build/lib build/programming_examples"
          ARTIFACT_PATHS+=" build/test build/tools runtime tt_metal/pre-compiled ${WASM_ROOT}"

          if [[ "${{ inputs.skip-tt-train }}" != "true" ]]; then
            ARTIFACT_PATHS="$ARTIFACT_PATHS build/tt-train data"
          fi
          tar -I 'zstd --adapt=min=9 -T0' -cvhf /work/ttm_any.tar.zst $ARTIFACT_PATHS

      - name: Set build artifact name
        id: set_build_artifact_name
        run: |
          TOOLCHAIN_CLEANED=$(echo "${{ env.TOOLCHAIN }}" | sed -E 's/^cmake\///; s/-toolchain\.cmake$//')
          # Use full sanitized ref/SHA and workflow run ID to ensure uniqueness
          # Sanitize ref/SHA by replacing invalid characters with hyphens
          RAW_REF="${{ inputs.ref || github.sha }}"
          SANITIZED_REF=$(echo "$RAW_REF" | sed 's/[\/:"<>|*?\r\n\\]/-/g')
          TRACY_SUFFIX="${{ (inputs.tracy && '_profiler') || '' }}"
          DIST_SUFFIX="${{ (inputs.distributed == false && '_no_distributed') || '' }}"
          BUILD_TYPE="${{ inputs.build-type || 'Release' }}"
          VERSION="${{ env.VERSION }}"
          ARCH="${{ inputs.architecture }}"
          RUN_ID="${{ github.run_id }}"
          BUILD_ARTIFACT_PARTS=(
            "TTMetal_build_any"
            "${VERSION}"
            "${ARCH}"
            "${TOOLCHAIN_CLEANED}${TRACY_SUFFIX}${DIST_SUFFIX}_${BUILD_TYPE}"
            "${SANITIZED_REF}"
            "${RUN_ID}"
          )
          BUILD_ARTIFACT_NAME=$(IFS='_'; echo "${BUILD_ARTIFACT_PARTS[*]}")
          echo "build_artifact_name=$BUILD_ARTIFACT_NAME" >> "$GITHUB_ENV"
          echo "build_artifact_name=$BUILD_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

      - name: ☁️ Upload tarball
        if: ${{ inputs.publish-artifact }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        timeout-minutes: 10
        with:
          name: ${{ env.build_artifact_name }}
          path: /work/ttm_any.tar.zst
          if-no-files-found: error
          compression-level: 0

  build-wheel:
    # Use always() so this job runs even when build-docker-image is skipped (pre-built tags provided)
    if: ${{ always() && !failure() && !cancelled() && inputs.build-wheel && inputs.use-artifacts-from-run == '' }}
    name: 🐍 Build wheel (Python ${{ needs.parse-platform.outputs.python-version }})
    uses: ./.github/workflows/wheels.yaml
    needs: [parse-platform, build-docker-image]
    secrets: inherit
    with:
      python-version: ${{ needs.parse-platform.outputs.python-version }}
      docker-image: >-
        ${{
          (inputs.manylinux-docker-image != '' &&
            format('{0}{1}', inputs.harbor-prefix, inputs.manylinux-docker-image)) ||
          format('{0}{1}', inputs.harbor-prefix,
            needs.build-docker-image.outputs.manylinux-tag || 'docker-image-unresolved!')
        }}
      ref: ${{ inputs.wheel-ref || inputs.ref || '' }}
      tracy: ${{ inputs.tracy }}
      enable-lto: ${{ inputs.enable-lto || false }}
      build-type: ${{ inputs.build-type || 'Release' }}
      runs-on: ${{ inputs['runs-on'] }}
      checkout-filter: ${{ inputs.checkout-filter }}
