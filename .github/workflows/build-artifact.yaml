name: "Build tt-metal artifacts"

on:
  workflow_call:
    inputs:
      arch:
        required: false
        type: string
        default: '["grayskull", "wormhole_b0"]'
      build-type:
        required: false
        type: string
        default: "Release"
      tracy:
        required: false
        type: boolean
        default: false
        description: "Build with tracy enabled"
  workflow_dispatch:
    inputs:
      arch:
        required: false
        type: string
        default: '["grayskull", "wormhole_b0"]'
      build-type:
        required: false
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - CI
      tracy:
        required: false
        type: boolean
        default: false
        description: "Build with tracy enabled"
jobs:

  build-docker-images:
    strategy:
      matrix:
        arch: ${{ fromJson(inputs.arch || '["grayskull", "wormhole_b0", "blackhole"]') }}
        docker_image_tag: [ tt-metalium/ubuntu-20.04-amd64 ]
    env:
      TT_METAL_ENV: ${{ vars.TT_METAL_ENV }}
      ARCH_NAME: ${{ matrix.arch }}
      IMAGE_TAG: dev-${GITHUB_ACTOR}.${{ matrix.arch }}
      TT_METAL_DOCKER_IMAGE: tt-metalium/ubuntu-20.04-amd64
      TT_METAL_DOCKER_IMAGE_TAG: ${{ github.sha }}
    environment: dev
    runs-on: build-docker
    steps:
      - uses: tenstorrent-metal/metal-workflows/.github/actions/checkout-with-submodule-lfs@v2.0.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine Docker Image Tag
        id: set-image
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=dev-${GITHUB_ACTOR}.${{ matrix.arch }}.${{ github.sha }}" >> $GITHUB_ENV
          fi
      - name: Build Docker image
        run: |
          ARCH_NAME=${{ matrix.arch}}
          ARCH_NAME_IN_URL=${ARCH_NAME//_/.}
          docker build -f dockerfile/tt-metalium.Dockerfile -t ${{ env.TT_METAL_DOCKER_IMAGE_TAG }}-${ARCH_NAME} . --build-arg="ARCH_NAME=${{ matrix.arch }}" --build-arg="ARCH_NAME_IN_URL=${ARCH_NAME_IN_URL}" --build-arg="IMAGE_TAG=dev-${GITHUB_ACTOR}"
      - name: Push Docker image to GitHub Container Registry
        run: |
          GITHUB_REPO_DOCKER_IMAGE_TAG=ghcr.io/${{ github.repository }}/${{ env.TT_METAL_DOCKER_IMAGE }}/${{ matrix.arch }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.TT_METAL_DOCKER_IMAGE_TAG }}-${ARCH_NAME} $GITHUB_REPO_DOCKER_IMAGE_TAG
          docker push $GITHUB_REPO_DOCKER_IMAGE_TAG
