name: "LLK Nightly Performance Tests"

on:
  schedule:
    # Run every night at 3AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_protected && github.run_id ||
    github.ref }}
  cancel-in-progress: true

jobs:
  perf-tests:
    name: "LLK Performance tests"
    uses: ./.github/workflows/llk-perf-tests-impl.yaml
    secrets: inherit

  report-status:
    name: "Report status"
    runs-on: ubuntu-latest
    if: >-
      ${{
        always() &&
        (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      }}
    needs: perf-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Report status
        uses: ./.github/actions/report-failure
        with:
          test_name: "Nightly Performance Tests"
          slack_bot_token: ${{ secrets.LLK_SLACK_REPORTING_BOT_TOKEN }}
          slack_channel_id: ${{ secrets.LLK_CI_STATUS_CHANNEL_ID }}
          status: ${{ needs.perf-tests.result }}
