name: "[internal] ttnn sanity tests impl"

on:
  workflow_call:
    inputs:
      enabled-skus:
        required: true
        type: string
        description: "Comma-separated SKUs (e.g. wh_n300_civ2). Maps to runs_on via .github/sku_config.yaml."
      docker-image:
        required: true
        type: string
      harbor-prefix:
        required: false
        type: string
        default: ""
      wheel-artifact-name:
        required: true
        type: string
      enable-watcher:
        required: false
        type: boolean
        default: false
      enable-lightweight-kernel-asserts:
        description: "Enable lightweight kernel asserts"
        required: false
        type: boolean
        default: false
      enable-llk-asserts:
        description: "Enable LLK asserts"
        required: false
        type: boolean
        default: false
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
      timeout-minutes-override:
        required: false
        type: number
        default: 0
        description: "If > 0, skip time budget verification and use this as job timeout (e.g. 240 for APC watcher, 120 for BHPC watcher)."
      collect-coverage:
        required: false
        type: boolean
        default: false
        description: "When true, collect LLVM profraw data and upload per-job profdata artifact for coverage aggregation."
      enable-perf-host-profiling:
        required: false
        type: boolean
        default: false
        description: "EXPERIMENT: run the selected HW test group under `perf record -g` and upload perf.data as an artifact. Default off, no overhead when disabled."
      perf-target-group:
        required: false
        type: string
        default: ""
        description: "Exact matrix test-group name to profile with perf (e.g. 'ttnn eltwise group 1'). Required when enable-perf-host-profiling is true."
      perf-sample-frequency:
        required: false
        type: string
        default: "1000"
        description: "perf sample frequency in Hz"

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has-sim: ${{ steps.detect-sim.outputs.has-sim }}
      skip-args-wormhole_b0: ${{ steps.skip-list.outputs.skip-args-wormhole_b0 }}
      skip-args-blackhole: ${{ steps.skip-list.outputs.skip-args-blackhole }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/ttnn_sanity_tests.yaml
      TTSIM_SKIP_LIST_YAML: ./tests/pipeline_reorg/ttsim-skip-list.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          ref: ${{ inputs.ref || github.sha }}
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true

      - name: Install dependencies
        run: |
          pip3 install PyYAML

      - name: Verify test timeouts against budget
        if: ${{ inputs.timeout-minutes-override == 0 }}
        run: |
          set -e
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "sanity"

      - name: Build test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml

      - name: Detect sim SKUs in matrix
        id: detect-sim
        run: |
          matrix='${{ steps.build-matrix.outputs.matrix }}'
          has_sim=$(echo "$matrix" | jq -r 'any(.[]; .sku | startswith("sim_"))')
          echo "has-sim=$has_sim" >> "$GITHUB_OUTPUT"

      # Load the TTSim skip list ONCE for the whole matrix and expose per-arch --deselect
      # args. The ttnn job applies these (via PYTEST_ADDOPTS) on every sim_* entry so the
      # simulator runs the same cmd as hardware minus the tests that don't yet work on ttsim.
      # Path is $TTSIM_SKIP_LIST_YAML; see tests/pipeline_reorg/ttsim-skip-list.yaml.
      - name: Load TTSim skip list
        id: skip-list
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os, yaml
          skips = yaml.safe_load(open(os.environ["TTSIM_SKIP_LIST_YAML"])) or {}
          for arch in ("wormhole_b0", "blackhole"):
              args = " ".join("--deselect=" + p for p in (skips.get(arch) or []))
              print(f"skip-args-{arch}={args}")
          PY

  # Fetch ttsim simulator binaries once for the whole matrix; only needed when
  # the resolved matrix contains sim_* SKUs. Consumed by setup-ttsim below.
  fetch-ttsim:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.has-sim == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ttsim version
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: tt_metal/ttsim-version
          sparse-checkout-cone-mode: false
      - name: Read ttsim version
        id: ttsim-version
        run: echo "version=$(cat tt_metal/ttsim-version)" >> "$GITHUB_OUTPUT"
      - name: Download wormhole_b0 ttsim binary
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          repository: tenstorrent/ttsim
          tag: ${{ steps.ttsim-version.outputs.version }}
          fileName: libttsim_wh.so
          out-file-path: /tmp/ttsim
      - name: Download blackhole ttsim binary
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          repository: tenstorrent/ttsim
          tag: ${{ steps.ttsim-version.outputs.version }}
          fileName: libttsim_bh.so
          out-file-path: /tmp/ttsim
      - name: Upload ttsim binaries artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ttsim-binaries
          path: /tmp/ttsim/
          if-no-files-found: error
          retention-days: 1

  ttnn:
    needs: [load-test-matrix, fetch-ttsim]
    # fetch-ttsim is skipped when the matrix has no sim_* SKUs; allow that.
    if: ${{ !cancelled() && (needs.fetch-ttsim.result == 'success' || needs.fetch-ttsim.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    environment: ${{ github.ref == 'refs/heads/main' && 'mainline' || '' }}
    container:
      image: ${{ (startsWith(matrix.test-group.sku, 'sim_') || matrix.test-group.sku == 'bh_p100') && (inputs.docker-image || 'docker-image-unresolved!') || format('{0}{1}', inputs.harbor-prefix, inputs.docker-image) }}
      env:
        LOGURU_LEVEL: INFO
        PYTHONPATH: /work
        TT_LOGGER_LEVEL: warn
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: ${{ startsWith(matrix.test-group.sku, 'sim_') && '--label runner-mode=sim' || (inputs.enable-perf-host-profiling && matrix.test-group.name == format('{0} [{1}]', inputs.perf-target-group, matrix.test-group.sku)) && '--cap-add CAP_PERFMON --device /dev/tenstorrent -e TT_GH_CI_INFRA' || '--device /dev/tenstorrent -e TT_GH_CI_INFRA' }}
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          ref: ${{ inputs.ref || github.sha }}
          filter: blob:none
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher || false }}
          enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
          enable-kernel-ccache: true
          # Kernel ccache uses separate Redis backend (REDIS_CCACHE_*) from build ccache (REDIS_*)
          # This allows different retention policies for runtime JIT vs. C++ build artifacts
          redis-ccache-storage: redis://${{ vars.REDIS_CCACHE_USER }}:${{ secrets.REDIS_CCACHE_PASSWORD }}@${{ vars.REDIS_CCACHE_HOST }}:${{ vars.REDIS_CCACHE_PORT }}${{ vars.REDIS_CCACHE_IS_READONLY == 'true' && '|read-only=true' || '' }}
          auto-triage: ${{ !inputs.enable-watcher }}

      - name: ⬇️  Setup TTSim
        if: ${{ startsWith(matrix.test-group.sku, 'sim_') }}
        uses: ./docker-job/.github/actions/setup-ttsim
        timeout-minutes: 5
        with:
          sku: ${{ matrix.test-group.sku }}

      # WORKAROUND (TEN-3868 / https://github.com/tenstorrent/tt-metal/issues/38246):
      # unpack_to_dest_tile_done() issues TT_UNPACR(SrcA, INT32), which is UndefinedBehavior
      # per the ISA spec; ttsim faithfully rejects it while real HW silently has the bug.
      # The simulator doesn't need the workaround, so strip that line from the wormhole_b0
      # header before kernels are JIT-compiled. Wormhole sim only; this patches the runner's
      # /opt/venv (so it must run here, not in load-test-matrix). Remove once LLK ships a fix.
      - name: Apply ttsim wormhole workaround patches
        if: ${{ matrix.test-group.sku == 'sim_wormhole_b0' }}
        run: |
          HEADER=$(find /opt/venv -name "cunpack_common.h" -path "*wormhole_b0*" 2>/dev/null | head -1)
          echo "Patching: $HEADER"
          sed -i -e '/TT_UNPACR(SrcA, 0, 0, context_id, 0, 1 \/\* Set OvrdThreadId\*\/, 0 \/\*Set Dvalid\*\/, p_unpacr::RAREFYB_DISABLE, 1, 0, 0, 0, 1);/d' \
            "$HEADER"

      - name: Install pytest-xdist (sim parallel execution)
        if: ${{ startsWith(matrix.test-group.sku, 'sim_') }}
        run: uv pip install pytest-xdist

      - name: Set ttnn fast runtime if exists in config
        if: ${{ matrix.test-group.fast_runtime_mode_off }}
        run: |
          echo "TTNN_CONFIG_OVERRIDES={\"enable_fast_runtime_mode\": false}" >> $GITHUB_ENV

      - name: Set up coverage profiling
        if: ${{ inputs.collect-coverage }}
        run: |
          mkdir -p /work/coverage
          echo "LLVM_PROFILE_FILE=/work/coverage/%p-%m.profraw" >> "$GITHUB_ENV"

      # EXPERIMENT (perf host profiling): the following steps are only active when
      # inputs.enable-perf-host-profiling is true. They validate the target group, install
      # linux perf on the HW runner, and probe whether perf can actually *record* (not just
      # exist). All are no-ops (skipped) when the experiment is disabled, so there is zero
      # overhead on the default path.
      #
      # SECURITY: user-controlled inputs (perf-target-group, perf-install-package) are never
      # interpolated into a shell body via ${{ ... }}; they are passed through `env:` and only
      # expanded as quoted "$VAR" at runtime so they cannot inject shell.
      - name: Validate perf profiling target (host profiling)
        if: ${{ inputs.enable-perf-host-profiling && !startsWith(matrix.test-group.sku, 'sim_') }}
        env:
          PERF_TARGET_GROUP: ${{ inputs.perf-target-group }}
        run: |
          if [ -z "$PERF_TARGET_GROUP" ]; then
            echo "::error::enable-perf-host-profiling is true but perf-target-group is empty."
            echo "::error::You must supply the exact matrix test-group name to profile (e.g. 'ttnn eltwise group 1')."
            exit 1
          fi
          echo "perf host profiling requested for target group: '$PERF_TARGET_GROUP'"

      - name: Install perf (host profiling)
        if: ${{ inputs.enable-perf-host-profiling && !startsWith(matrix.test-group.sku, 'sim_') && matrix.test-group.name == format('{0} [{1}]', inputs.perf-target-group, matrix.test-group.sku) }}
        run: |
          # Non-failing on purpose: if the perf package can't be installed (kernel/version mismatch
          # on the runner), leave a clear signal in the logs but don't fail the job.
          #
          # The runner's perf binary must match the host kernel. We therefore install the
          # kernel-specific linux-tools package (e.g. linux-tools-5.15.0-185-generic) with the
          # generic package as a fallback. The package list is hardcoded to avoid exposing a
          # user-controlled input that could be used for command injection.
          kernel_pkg="linux-tools-$(uname -r)"
          pkgs=(linux-tools-common "$kernel_pkg" linux-tools-generic)
          echo "Installing perf packages: ${pkgs[*]}"
          apt-get update || true
          apt-get install -y -- "${pkgs[@]}" || true

      # Probe whether perf can actually RECORD, not merely that the binary exists. `command -v`
      # only proves the executable is present; on many CI runners perf_event_open is denied
      # (kernel.perf_event_paranoid, seccomp, missing CAP_PERFMON, etc.). Run a real, throwaway
      # `perf record ... -- true` and only mark perf_ready=true if it succeeds. Never fails the
      # step, so the selected group still tests even when recording is denied.
      - name: Probe perf recording capability (host profiling)
        id: perf-probe
        if: ${{ inputs.enable-perf-host-profiling && !startsWith(matrix.test-group.sku, 'sim_') && matrix.test-group.name == format('{0} [{1}]', inputs.perf-target-group, matrix.test-group.sku) }}
        env:
          PERF_SAMPLE_FREQUENCY: ${{ inputs.perf-sample-frequency }}
        run: |
          perf_ready=false
          if command -v perf >/dev/null 2>&1; then
            perf --version || true
            if perf record -g -F "${PERF_SAMPLE_FREQUENCY}" -o /tmp/perf_probe.data -- true >/dev/null 2>&1; then
              perf_ready=true
              echo "perf recording probe succeeded; the target group will be profiled."
            else
              echo "::warning::perf is installed but cannot record (perf_event_open likely denied); the group will run without profiling."
            fi
            rm -f /tmp/perf_probe.data || true
          else
            echo "::warning::perf is not available; the group will run without profiling."
          fi
          echo "perf_ready=$perf_ready" >> "$GITHUB_OUTPUT"

      - name: ${{ matrix.test-group.name }} tests
        if: ${{ !startsWith(matrix.test-group.sku, 'sim_') }}
        timeout-minutes: ${{ inputs.timeout-minutes-override > 0 && inputs.timeout-minutes-override || matrix.test-group.timeout }}
        env:
          # Whether THIS matrix leg should be profiled: experiment on + this is the chosen HW group.
          # (Never true on sim legs — this step's `if` already excludes sim_* SKUs.)
          PERF_PROFILE_THIS: ${{ inputs.enable-perf-host-profiling && matrix.test-group.name == format('{0} [{1}]', inputs.perf-target-group, matrix.test-group.sku) }}
          # Whether the probe confirmed perf can actually record. Empty when the probe step was
          # skipped (experiment off / not the target group); treated as "not ready".
          PERF_READY: ${{ steps.perf-probe.outputs.perf_ready }}
          PERF_SAMPLE_FREQUENCY: ${{ inputs.perf-sample-frequency }}
          PERF_TARGET_GROUP: ${{ inputs.perf-target-group }}
          TEST_GROUP_NAME: ${{ matrix.test-group.name }}
          TEST_GROUP_CMD: ${{ matrix.test-group.cmd }}
        run: |
          # Build the inner command passed to the power sidecar's `bash -c`. Use a shell variable
          # for the pytest command (from $TEST_GROUP_CMD) to avoid YAML/shell quoting hell.
          #
          # Non-profiled path (default): byte-for-byte the original behaviour — run the group cmd
          # directly under the power sidecar.
          # Profiled path (experiment): wrap the group cmd in `perf record -g -F <freq> -o <out>`,
          # writing perf.data to /work so the host mount at ${{ github.workspace }}/docker-job can
          # upload it. Only wrap when the recording-capability probe (perf-probe step) succeeded;
          # otherwise fall back to running the cmd unwrapped so the group still tests.
          #
          # The whole group cmd is wrapped in `perf record ... -- bash -c '<cmd>'` so that a group
          # command with chained commands (e.g. `pytest ... && pytest ...`) is captured in full,
          # not just the first simple command. $TEST_GROUP_CMD is passed as a positional arg to the
          # inner `bash -c` (see the sidecar invocation below), never spliced into a string, so its
          # &&/quotes survive intact and it can't inject into the perf command line.
          if [ "$PERF_PROFILE_THIS" = "true" ] && [ "$PERF_READY" = "true" ]; then
            # Sanitize the group name for use in a filename: spaces and any non [A-Za-z0-9._-] -> '_'.
            SANITIZED=$(printf '%s' "$TEST_GROUP_NAME" | sed -E 's/[^A-Za-z0-9._-]+/_/g')
            PERF_OUTPUT="/work/perf_${SANITIZED}.data"
            echo "perf host profiling ENABLED for '$TEST_GROUP_NAME' -> $PERF_OUTPUT (freq ${PERF_SAMPLE_FREQUENCY}Hz)"
            RUNNER=(perf record -g -F "${PERF_SAMPLE_FREQUENCY}" -o "${PERF_OUTPUT}" -- bash -c "$TEST_GROUP_CMD")
          else
            if [ "$PERF_PROFILE_THIS" = "true" ]; then
              echo "::warning::perf recording not available; running '$TEST_GROUP_NAME' without profiling."
            fi
            RUNNER=(bash -c "$TEST_GROUP_CMD")
          fi

          python3 tools/tt-power-sidecar/tt_power_sidecar.py \
            --backend sysfs \
            --out /work/power_report.json \
            -- "${RUNNER[@]}"

      # Simulator runs have no hardware power telemetry, so swap the HW power sidecar for the
      # host-load sidecar — it reports host CPU/memory/disk/network usage (a "mem report", not
      # a power report). Written to /work/mem_report.json and uploaded by its own step below.
      # Runs under the ttsim env from setup-ttsim.
      - name: ${{ matrix.test-group.name }} tests (simulator)
        if: ${{ startsWith(matrix.test-group.sku, 'sim_') }}
        timeout-minutes: ${{ inputs.timeout-minutes-override > 0 && inputs.timeout-minutes-override || matrix.test-group.timeout }}
        env:
          PYTEST_ADDOPTS: "-p no:timeout -n 4 ${{ matrix.test-group.sku == 'sim_wormhole_b0' && needs.load-test-matrix.outputs.skip-args-wormhole_b0 || matrix.test-group.sku == 'sim_blackhole' && needs.load-test-matrix.outputs.skip-args-blackhole || '' }}"
        run: |
          # Strip the per-test `pytest --timeout N` from the cmd: the simulator is ~10-50x slower than
          # HW, so that per-op limit kills slow-but-correct ops (the job timeout-minutes is the backstop;
          # PYTEST_ADDOPTS also sets -p no:timeout). Run that cmd with xdist; if a worker crashes (xdist
          # only reports "worker crashed"), re-run serially (drop -n 4 via the PYTEST_ADDOPTS override)
          # with --lf for actionable diagnostics.
          export cmd=$(printf '%s' '${{ matrix.test-group.cmd }}' | sed -E 's/[[:space:]]+--timeout[[:space:]]+[0-9]+//g')
          # PYTEST_ADDOPTS for the serial fallback re-run (drops -n 4); applied only on retry.
          export SERIAL_ADDOPTS="-p no:timeout ${{ matrix.test-group.sku == 'sim_wormhole_b0' && needs.load-test-matrix.outputs.skip-args-wormhole_b0 || matrix.test-group.sku == 'sim_blackhole' && needs.load-test-matrix.outputs.skip-args-blackhole || '' }}"
          # Wrap the whole sim run in the host-load sidecar so its usage report covers both
          # the parallel run and any serial re-run. Written to /work/mem_report.json (even
          # on failure — emitted before the sidecar exits) so the Upload mem report step
          # picks it up. The sidecar is the final command, so it propagates the run's exit code.
          .github/scripts/utils/host-load-sidecar.sh \
            --interval 1 \
            --label "${{ matrix.test-group.name }} (simulator)" \
            --output /work/mem_report.json \
            -- bash -c '
              if eval "$cmd"; then
                exit 0
              fi
              echo "::warning::Parallel run failed. Re-running failed tests serially for clear diagnostics..."
              export PYTEST_ADDOPTS="$SERIAL_ADDOPTS"
              eval "$cmd --lf --lfnf=all --tb=long -v" || true
              exit 1
            '

      - name: Upload power report
        if: ${{ !cancelled() && !startsWith(matrix.test-group.sku, 'sim_') }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: power-report-${{ matrix.test-group.name }}
          # /docker-job/ is the host-side mount of the Docker runner's /work/ directory.
          # The power sidecar writes --out /work/power_report.json inside the container;
          # this host path is what the upload-artifact action reads.
          path: ${{ github.workspace }}/docker-job/power_report.json
          if-no-files-found: warn
          retention-days: 30

      # EXPERIMENT (perf host profiling): summarize + upload perf.data. Guarded so it only runs
      # for the chosen HW group when the experiment is enabled; otherwise skipped (no overhead).
      - name: Summarize perf profile (host profiling)
        if: ${{ !cancelled() && inputs.enable-perf-host-profiling && !startsWith(matrix.test-group.sku, 'sim_') && matrix.test-group.name == format('{0} [{1}]', inputs.perf-target-group, matrix.test-group.sku) }}
        run: |
          # Best-effort human-readable summary next to the perf.data. Only attempt when a perf.data
          # exists, perf is available, and the file is a sane size (skip huge captures to keep this
          # step cheap). Never fails the job.
          shopt -s nullglob
          for f in /work/perf_*.data; do
            echo "Found perf capture: $f ($(du -h "$f" | cut -f1))"
            if ! command -v perf >/dev/null 2>&1; then
              echo "perf not available; skipping report generation."
              continue
            fi
            # Skip summarizing captures larger than ~500MB to keep this step fast.
            size_bytes=$(stat -c %s "$f" 2>/dev/null || echo 0)
            if [ "$size_bytes" -gt 524288000 ]; then
              echo "perf.data larger than 500MB; skipping report generation."
              continue
            fi
            perf report --stdio -i "$f" 2>/dev/null | head -100 > "${f%.data}.report.txt" || true
            echo "Wrote summary: ${f%.data}.report.txt"
          done || true

      - name: Generate flame graph (host profiling)
        if: ${{ !cancelled() && inputs.enable-perf-host-profiling && !startsWith(matrix.test-group.sku, 'sim_') && matrix.test-group.name == format('{0} [{1}]', inputs.perf-target-group, matrix.test-group.sku) }}
        run: |
          # Best-effort flame graph generation from the captured perf.data. Clone Brendan Gregg's
          # FlameGraph tools into /tmp and use them to produce an SVG. This runs in the CI container
          # which already has perf installed, so we don't need to transfer the data elsewhere.
          shopt -s nullglob
          for f in /work/perf_*.data; do
            [ -f "$f" ] || continue
            echo "Generating flame graph for: $f"
            if ! command -v perf >/dev/null 2>&1; then
              echo "perf not available; skipping flame graph generation."
              continue
            fi
            # Limit to ~500MB perf.data to keep the script step fast.
            size_bytes=$(stat -c %s "$f" 2>/dev/null || echo 0)
            if [ "$size_bytes" -gt 524288000 ]; then
              echo "perf.data larger than 500MB; skipping flame graph generation."
              continue
            fi
            # Clone FlameGraph tooling if not already present.
            fg_dir="/tmp/FlameGraph"
            if [ ! -d "$fg_dir" ]; then
              git clone --depth 1 https://github.com/brendangregg/FlameGraph.git "$fg_dir" || true
            fi
            if [ -f "$fg_dir/flamegraph.pl" ] && [ -f "$fg_dir/stackcollapse-perf.pl" ]; then
              svg_out="${f%.data}.svg"
              perf script -i "$f" 2>/dev/null | "$fg_dir/stackcollapse-perf.pl" 2>/dev/null | "$fg_dir/flamegraph.pl" --title "perf: $(basename "$f" .data)" > "$svg_out" 2>/dev/null || true
              if [ -s "$svg_out" ]; then
                echo "Wrote flame graph: $svg_out ($(du -h "$svg_out" | cut -f1))"
              else
                echo "Flame graph generation produced an empty file; removing."
                rm -f "$svg_out"
              fi
            else
              echo "FlameGraph tooling not available; skipping flame graph generation."
            fi
          done || true
      - name: Upload perf profile (host profiling)
        if: ${{ !cancelled() && inputs.enable-perf-host-profiling && !startsWith(matrix.test-group.sku, 'sim_') && matrix.test-group.name == format('{0} [{1}]', inputs.perf-target-group, matrix.test-group.sku) }}
        run: |
          # Gather the perf outputs (.data, .report.txt, .svg) into one directory so we can upload
          # them as a single artifact tree. This avoids issues with multiple glob patterns in the
          # upload-artifact action and gives a clean artifact layout.
          mkdir -p /work/perf_outputs
          shopt -s nullglob
          for f in /work/perf_*.data /work/perf_*.report.txt /work/perf_*.svg; do
            [ -f "$f" ] || continue
            cp -v "$f" /work/perf_outputs/ || true
          done
          ls -la /work/perf_outputs/

      - name: Upload perf profile artifact (host profiling)
        if: ${{ !cancelled() && inputs.enable-perf-host-profiling && !startsWith(matrix.test-group.sku, 'sim_') && matrix.test-group.name == format('{0} [{1}]', inputs.perf-target-group, matrix.test-group.sku) }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: perf-host-profile-${{ matrix.test-group.name }}
          # /docker-job/ is the host-side mount of the container's /work/ directory. The previous
          # step copies perf_<sanitized>.data, .report.txt, and .svg into /work/perf_outputs/.
          path: ${{ github.workspace }}/docker-job/perf_outputs/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload mem report
        if: ${{ !cancelled() && startsWith(matrix.test-group.sku, 'sim_') }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mem-report-${{ matrix.test-group.name }}
          # Sim analogue of the HW power report: the host-load sidecar writes its CPU/memory/
          # disk/network usage report to --output /work/mem_report.json inside the container;
          # this host path is what the upload-artifact action reads.
          path: ${{ github.workspace }}/docker-job/mem_report.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload profdata artifact
        if: ${{ inputs.collect-coverage && always() }}
        run: |
          if ! ls /work/coverage/*.profraw 1>/dev/null 2>&1; then
            echo "No profraw files found, skipping upload"
            exit 0
          fi
          llvm-profdata-20 merge -sparse /work/coverage/*.profraw \
            -o /work/coverage/job.profdata
          echo "Merged $(ls /work/coverage/*.profraw | wc -l) profraw files into job.profdata ($(du -h /work/coverage/job.profdata | cut -f1))"
        shell: bash
      - name: Upload profdata
        if: ${{ inputs.collect-coverage && always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: profdata-ttnn-${{ matrix.test-group.name }}
          path: ${{ github.workspace }}/docker-job/coverage/job.profdata
          if-no-files-found: ignore
          retention-days: 1

      - name: 📊 CCache Report
        if: ${{ !cancelled() }}
        run: |
          echo '## CCache Summary (kernel)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache -s >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Surface remote storage stats and errors from the ccache log.
          # Uses a filter script to avoid overflowing the 1024k step summary limit.
          if [ -f /tmp/ccache.log ]; then
            echo '## CCache Remote Storage (kernel)' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            .github/scripts/ccache_log_filter.sh /tmp/ccache.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"

      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
