name: "[internal] Build Docker Python venv images"

# Reusable workflow that checks and builds Python venv images (ci-build-venv, ci-test-venv).
# Called by build-docker-artifact.yaml. Venv images are pushed to GHCR.
#
# Uses manual docker buildx bake (dockerfile/docker-bake.hcl) for builds.
permissions:
  packages: write

env:
  BAKE_OUTPUT: type=image,push=true,compression=zstd,compression-level=22,force-compression=true,oci-mediatypes=true

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
        description: "Platform (e.g. Ubuntu 22.04) for venv base image"
      force-rebuild:
        required: false
        type: boolean
        default: false
        description: "Force rebuild of all Python venv images even if they exist in registry"
      precomputed-venv-data:
        required: false
        type: string
        default: ""
        description: |
          JSON from preflight (ci_build_venv_tag, ci_test_venv_tag, ci_build_venv_exists, ci_test_venv_exists, version). When set, skips tag computation.
    outputs:
      ci-build-venv-tag:
        description: "Docker tag for ci-build venv image"
        value: ${{ jobs.tags.outputs.ci-build-venv-tag }}
      ci-test-venv-tag:
        description: "Docker tag for ci-test venv image"
        value: ${{ jobs.tags.outputs.ci-test-venv-tag }}
      ubuntu-version:
        description: "Ubuntu version (e.g. 22.04) for build args"
        value: ${{ jobs.tags.outputs.ubuntu-version }}

jobs:
  # Compute content-addressed tags and check which venv images already exist, or use precomputed data
  tags:
    name: "📋 Compute venv tags"
    runs-on: tt-ubuntu-2204-large-stable
    outputs:
      ci-build-venv-tag: ${{ steps.data.outputs.ci-build-venv-tag }}
      ci-build-venv-exists: ${{ steps.data.outputs.ci-build-venv-exists }}
      ci-test-venv-tag: ${{ steps.data.outputs.ci-test-venv-tag }}
      ci-test-venv-exists: ${{ steps.data.outputs.ci-test-venv-exists }}
      any-missing: ${{ steps.data.outputs.any-missing }}
      ubuntu-version: ${{ steps.data.outputs.ubuntu-version }}
    steps:
      - name: Checkout repo
        if: inputs.precomputed-venv-data == ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse platform
        if: inputs.precomputed-venv-data == ''
        id: platform
        uses: ./.github/actions/parse-platform
        with:
          platform: ${{ inputs.platform }}

      - name: Get venv data
        id: data
        env:
          PRECOMPUTED: ${{ inputs.precomputed-venv-data }}
          FORCE_REBUILD: ${{ inputs.force-rebuild }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.platform.outputs.version }}
        run: |
          set -euo pipefail

          if [ -n "$PRECOMPUTED" ]; then
            echo "Using precomputed venv data"
            # Extract venv-specific fields from platform data
            # and compute any-missing from the existence flags
            ci_build_exists=$(echo "$PRECOMPUTED" | jq -r '.ci_build_venv_exists')
            ci_test_exists=$(echo "$PRECOMPUTED" | jq -r '.ci_test_venv_exists')

            if [ "$ci_build_exists" = "true" ] && [ "$ci_test_exists" = "true" ]; then
              any_missing="false"
            else
              any_missing="true"
            fi

            # Build a venv-specific JSON for extraction
            DATA=$(echo "$PRECOMPUTED" | jq -c --arg any_missing "$any_missing" '. + {any_missing: $any_missing}')
          else
            echo "Computing venv data..."
            VERSION_NODOT="${VERSION//.}"
            VENV_HASH=$(.github/scripts/dockerfile-hash.sh dockerfile/Dockerfile.python)
            BASE="ghcr.io/${REPO}/tt-metalium/python-venv"

            CI_BUILD_VENV_TAG="${BASE}/ci-build:${VERSION_NODOT}-${VENV_HASH}"
            CI_TEST_VENV_TAG="${BASE}/ci-test:${VERSION_NODOT}-${VENV_HASH}"

            any_missing="false"
            if [ "$FORCE_REBUILD" = "true" ]; then
              ci_build_venv_exists="false"
              ci_test_venv_exists="false"
              any_missing="true"
            else
              docker manifest inspect "$CI_BUILD_VENV_TAG" > /dev/null 2>&1 && ci_build_venv_exists="true" || { ci_build_venv_exists="false"; any_missing="true"; }
              docker manifest inspect "$CI_TEST_VENV_TAG" > /dev/null 2>&1 && ci_test_venv_exists="true" || { ci_test_venv_exists="false"; any_missing="true"; }
            fi

            DATA=$(jq -cn \
              --arg ci_build_venv_tag "$CI_BUILD_VENV_TAG" \
              --arg ci_test_venv_tag "$CI_TEST_VENV_TAG" \
              --arg ci_build_venv_exists "$ci_build_venv_exists" \
              --arg ci_test_venv_exists "$ci_test_venv_exists" \
              --arg any_missing "$any_missing" \
              --arg version "$VERSION" \
              '{ci_build_venv_tag: $ci_build_venv_tag, ci_test_venv_tag: $ci_test_venv_tag, ci_build_venv_exists: $ci_build_venv_exists, ci_test_venv_exists: $ci_test_venv_exists, any_missing: $any_missing, version: $version}')
          fi

          # Extract outputs
          .github/scripts/extract-outputs.sh "$DATA" \
            "ci-build-venv-tag:.ci_build_venv_tag" \
            "ci-test-venv-tag:.ci_test_venv_tag" \
            "ci-build-venv-exists:.ci_build_venv_exists" \
            "ci-test-venv-exists:.ci_test_venv_exists" \
            "any-missing:.any_missing" \
            "ubuntu-version:.version"

  # Build any venv images that don't exist yet using manual docker bake
  build:
    name: "🐍 Build missing venvs"
    needs: tags
    if: needs.tags.outputs.any-missing == 'true'
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare bake overrides
        id: bake
        run: |
          set -euo pipefail
          UBUNTU_VERSION="${{ needs.tags.outputs.ubuntu-version }}"

          if [ "$UBUNTU_VERSION" = "24.04" ]; then
            PYTHON_VERSION="3.12"
          else
            PYTHON_VERSION="3.10"
          fi

          TARGETS=""
          SET=""

          if [ "${{ needs.tags.outputs.ci-build-venv-exists }}" != "true" ]; then
            TARGETS+="ci-build-venv,"
            SET+="ci-build-venv.tags=${{ needs.tags.outputs.ci-build-venv-tag }}"$'\n'
            SET+="ci-build-venv.output=${BAKE_OUTPUT}"$'\n'
          fi

          if [ "${{ needs.tags.outputs.ci-test-venv-exists }}" != "true" ]; then
            TARGETS+="ci-test-venv,"
            SET+="ci-test-venv.tags=${{ needs.tags.outputs.ci-test-venv-tag }}"$'\n'
            SET+="ci-test-venv.output=${BAKE_OUTPUT}"$'\n'
          fi

          TARGETS="${TARGETS%,}"

          echo "targets=$TARGETS" >> $GITHUB_OUTPUT
          echo "ubuntu-version=$UBUNTU_VERSION" >> $GITHUB_OUTPUT
          echo "python-version=$PYTHON_VERSION" >> $GITHUB_OUTPUT
          {
            echo "set<<EOF"
            echo "$SET"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push missing venv images
        if: steps.bake.outputs.targets != ''
        uses: ./.github/actions/manual-docker-bake
        with:
          targets: ${{ steps.bake.outputs.targets }}
          set-lines: ${{ steps.bake.outputs.set }}
          ubuntu-version: ${{ steps.bake.outputs.ubuntu-version }}
          python-version: ${{ steps.bake.outputs.python-version }}
