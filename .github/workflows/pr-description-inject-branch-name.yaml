name: Inject branch name and CI status into PR description

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  pull-requests: write

jobs:
  update-description:
    # Skip for PRs from forks — the GITHUB_TOKEN lacks write access to the
    # base repo's pull requests in that context, causing a 403 on pulls.update.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Update PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branchName = pr.head.ref;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Replace branch name placeholder (no-op on synchronize, idempotent)
            let body = pr.body || "";
            body = body.replaceAll("{{branch_name}}", branchName);

            // Pipelines to report on.
            // optional: true  → shown as opt-in, "no run" is expected
            // optional: false → required, "no run" is a signal something's missing
            const pipelines = [
              { name: "Sanity tests",                  workflow: "sanity-tests.yaml",               optional: false },
              { name: "Blackhole post-commit",          workflow: "blackhole-post-commit.yaml",      optional: false },
              { name: "L2 Nightly",                    workflow: "tt-metal-l2-nightly.yaml",        optional: false },
              { name: "(Single) Choose your pipeline", workflow: "pipeline-select.yaml",            optional: true  },
              { name: "(T3K) Choose your pipeline",    workflow: "pipeline-select-t3k.yaml",        optional: true  },
              { name: "(Galaxy) Choose your pipeline", workflow: "pipeline-select-galaxy.yaml",     optional: true  },
            ];

            const rows = [];
            for (const p of pipelines) {
              // Include branch filter so the link lands on runs for this PR's branch
              const dispatchUrl = `https://github.com/${owner}/${repo}/actions/workflows/${p.workflow}?query=branch:${branchName}`;
              const badgeUrl = `https://github.com/${owner}/${repo}/actions/workflows/${p.workflow}/badge.svg?branch=${branchName}`;

              // Badge is live (re-rendered on every page load) and includes the pipeline name.
              // Clicking it filters to runs for this branch. No separate text or run-link column needed.
              rows.push(`| [![](${badgeUrl})](${dispatchUrl}) |`);
            }

            const statusSection = [
              "### CI Status",
              "_Auto-generated on every push. Badges update live. Click a badge to filter runs by this branch._",
              "",
              "| |",
              "|:---:|",
              ...rows,
            ].join("\n");

            // Replace existing CI Status section if present, otherwise append
            const ciStatusRegex = /### CI Status[\s\S]*?(?=\n#{1,6} |\s*$)/;
            if (ciStatusRegex.test(body)) {
              body = body.replace(ciStatusRegex, statusSection);
            } else {
              body = body.trimEnd() + "\n\n" + statusSection;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              body,
            });
