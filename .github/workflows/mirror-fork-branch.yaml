name: Mirror Fork Branch to Origin

on:
  workflow_call:
    inputs:
      source:
        description: 'Source in format <fork_owner>:<branch>'
        required: true
        type: string
      target_branch:
        description: >
          Optional. Target branch name in origin. If not provided, the branch will be named
          `mirror/<fork_owner>/<branch>`.
        required: false
        type: string
  workflow_dispatch:
    inputs:
      source:
        description: 'Source in format <fork_owner>:<branch>'
        required: true
      target_branch:
        description: >
          Optional. Target branch name in origin. If not provided, the branch will be named
          `mirror/<fork_owner>/<branch>`.
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  mirror-fork-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Parse input
        id: parse_input
        shell: bash
        env:
          SOURCE_INPUT: ${{ github.event.inputs.source }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          source .github/scripts/security/input-validation.sh
          IFS=":" read -r FORK_OWNER SRC_BRANCH <<< "$SOURCE_INPUT"
          if [ -z "$FORK_OWNER" ] || [ -z "$SRC_BRANCH" ]; then
            validation_error "Input must be in the format <fork_owner>:<branch>"
            exit 1
          fi
          validate_username "$FORK_OWNER" || exit 1
          validate_branch_name "$SRC_BRANCH" || exit 1
          ORIGIN_REPO_NAME=$(echo "$GITHUB_REPO" | cut -d'/' -f2)
          FORK_REPO="${FORK_OWNER}/${ORIGIN_REPO_NAME}"
          echo "FORK_OWNER: $FORK_OWNER"
          echo "Source branch: $SRC_BRANCH"
          echo "Fork repository: $FORK_REPO"
          set_github_output "fork_owner" "$FORK_OWNER"
          set_github_output "src_branch" "$SRC_BRANCH"
          set_github_output "fork_repo" "$FORK_REPO"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add fork remote and fetch branch
        env:
          FORK_REPO: ${{ steps.parse_input.outputs.fork_repo }}
          SRC_BRANCH: ${{ steps.parse_input.outputs.src_branch }}
        run: |
          echo "Adding remote for fork: $FORK_REPO"
          git remote add fork "https://github.com/${FORK_REPO}.git" || echo "Remote 'fork' already exists"
          echo "Fetching branch: $SRC_BRANCH"
          git fetch fork "$SRC_BRANCH"

      - name: Create or update local branch from fork branch
        id: create_branch
        shell: bash
        env:
          TARGET_BRANCH_INPUT: ${{ github.event.inputs.target_branch }}
          FORK_OWNER: ${{ steps.parse_input.outputs.fork_owner }}
          SRC_BRANCH: ${{ steps.parse_input.outputs.src_branch }}
        run: |
          # Determine the target branch name.
          if [ -n "$TARGET_BRANCH_INPUT" ]; then
            TARGET_BRANCH="$TARGET_BRANCH_INPUT"
          else
            TARGET_BRANCH="mirror/${FORK_OWNER}/${SRC_BRANCH}"
          fi
          source .github/scripts/security/input-validation.sh
          validate_branch_name "$TARGET_BRANCH" || exit 1
          echo "Using target branch: $TARGET_BRANCH"
          # If the branch exists locally, update it; if not, create it.
          if git show-ref --verify --quiet "refs/heads/$TARGET_BRANCH"; then
            echo "Branch '$TARGET_BRANCH' exists. Updating with latest commits from fork."
            git checkout "$TARGET_BRANCH"
            git reset --hard "fork/${SRC_BRANCH}"
          else
            echo "Branch '$TARGET_BRANCH' does not exist. Creating it from fork branch."
            git checkout -b "$TARGET_BRANCH" "fork/${SRC_BRANCH}"
          fi
          set_github_output "target_branch" "$TARGET_BRANCH"

      - name: Push branch to origin
        env:
          TARGET_BRANCH: ${{ steps.create_branch.outputs.target_branch }}
        run: |
          echo "Pushing branch '$TARGET_BRANCH' to origin"
          git push origin "$TARGET_BRANCH" --force

      - name: Find PR
        id: pr
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORK_OWNER: ${{ steps.parse_input.outputs.fork_owner }}
          SRC_BRANCH: ${{ steps.parse_input.outputs.src_branch }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # Look for a PR with head "fork_owner:src_branch"
          HEAD_QUERY="${FORK_OWNER}:${SRC_BRANCH}"
          echo "Searching for PR with head: ${HEAD_QUERY}"
          PR_JSON=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPO}/pulls?head=${HEAD_QUERY}")
          source .github/scripts/security/input-validation.sh
          PR_NUMBER=$(echo "$PR_JSON" | jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found"
            set_github_output "issue" ""
          else
            echo "Found PR #$PR_NUMBER"
            set_github_output "issue" "$PR_NUMBER"
          fi

      - name: Post comment on PR
        if: steps.pr.outputs.issue != ''
        uses: mshick/add-pr-comment@v2
        with:
          issue: ${{ steps.pr.outputs.issue }}
          message: |
           ✨ A mirror branch has been created/updated for this PR: [`${{ steps.create_branch.outputs.target_branch }}`](https://github.com/${{ github.repository }}/tree/${{ steps.create_branch.outputs.target_branch }})
