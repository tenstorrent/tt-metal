name: "Nightly LLVM Code Coverage"

# Nightly LLVM code coverage, reported per area of interest.
# Builds with CodeCoverage build type, runs each area's tests in parallel,
# aggregates LLVM profdata per area, generates per-area HTML + JSON reports,
# and publishes to tenstorrent/tt-metal-code-coverage (gh-pages).
#
# Areas:
#   ttnn          — ttnn unit tests (Python, wheel-installed .so objects)
#   metal-runtime — tt_metal C++ runtime unit tests (GTest binaries)
#
# To add a new area:
#   1. Add a `run-<area>-tests` job below that calls the relevant impl workflow
#      with collect-coverage: true. Name profdata artifacts `profdata-<area>-*`.
#   2. Add the job to aggregate-coverage.needs.
#   3. Add a block in the "Generate per-area coverage reports" step that defines
#      the area's objects and output directory.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC nightly

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml

  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: CodeCoverage
      build-wheel: true
      tracy: true
      skip-tt-train: false
      platform: "Ubuntu 22.04"
      enable-lto: false

  run-ttnn-tests:
    needs: [check-harbor, build-artifact]
    uses: ./.github/workflows/ttnn-post-commit.yaml
    secrets: inherit
    with:
      enabled-skus: "wh_n300_civ2"
      docker-image: ${{ needs.build-artifact.outputs.ci-test-docker-image }}
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      merge-gate-call: false
      collect-coverage: true

  run-metal-runtime-tests:
    needs: [build-artifact]
    uses: ./.github/workflows/runtime-unit-tests-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      # wh_n150_civ2: single-card WH — sufficient for runtime unit tests
      enabled-skus: "wh_n150_civ2"
      collect-coverage: true

  aggregate-coverage:
    name: "Aggregate & publish coverage"
    needs: [check-harbor, build-artifact, run-ttnn-tests, run-metal-runtime-tests]
    if: always()
    runs-on: tt-ubuntu-2204-large-stable
    timeout-minutes: 90
    container:
      image: ${{ format('{0}{1}', needs.check-harbor.outputs.harbor-prefix, needs.build-artifact.outputs.dev-docker-image) }}
      volumes:
        - ${{ github.workspace }}:/work
      options: --tmpfs /tmp
    defaults:
      run:
        shell: bash
        working-directory: /work

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Configure git safe.directory
        run: git config --global --add safe.directory /work

      - name: Setup job
        uses: ./.github/actions/setup-job
        with:
          build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
          wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
          auto-triage: false

      - name: Download ttnn profdata artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: profdata-ttnn-*
          path: /work/profdata-ttnn
          merge-multiple: false

      - name: Download metal-runtime profdata artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: profdata-metal-runtime-*
          path: /work/profdata-metal-runtime
          merge-multiple: false

      - name: Generate per-area coverage reports
        env:
          # Single source of truth for the list of areas.
          # Update this (and add a generate_area block below) when adding new areas.
          COVERAGE_AREAS: "ttnn metal-runtime"
        run: |
          set -euo pipefail
          IGNORE_REGEX='(^|/)\.cpmcache/|(^|/)build[^/]*/|(^|/)third_party/'
          mkdir -p /work/coverage /work/coverage_html

          # Persist the area list for downstream steps (step summary, index, publish).
          echo "$COVERAGE_AREAS" > /work/coverage/areas.txt

          # ------------------------------------------------------------------ #
          # Helper: generate HTML + JSON for a single area.
          #   $1 = area name (matches profdata dir and output subdir)
          #   Remaining args: instrumented object paths
          # Returns 1 on error so callers can decide whether to fail-fast or warn.
          # ------------------------------------------------------------------ #
          generate_area() {
            local area="$1"; shift
            local objects=("$@")
            local profdata_dir="/work/profdata-${area}"
            local merged="/work/coverage/${area}.profdata"
            local html_dir="/work/coverage_html/${area}"
            local json_out="/work/coverage/${area}-summary.json"

            echo "::group::Coverage — ${area}"

            # Check objects first — no point merging profdata if there is nothing to report against.
            if [ ${#objects[@]} -eq 0 ]; then
              echo "::error::No instrumented objects found for area '${area}' — cannot generate coverage"
              echo "::endgroup::"
              return 1
            fi

            # Collect profdata files for this area
            shopt -s globstar nullglob
            local profdata_files=("${profdata_dir}"/**/*.profdata)
            if [ ${#profdata_files[@]} -eq 0 ]; then
              echo "::warning::No profdata artifacts found for area '${area}' — skipping"
              echo "::endgroup::"
              return 0
            fi
            echo "Found ${#profdata_files[@]} profdata file(s) for ${area}"

            # Merge
            llvm-profdata-20 merge -sparse "${profdata_files[@]}" -o "${merged}"
            echo "Merged profdata: $(du -h "${merged}" | cut -f1)"

            local obj_flags=()
            for obj in "${objects[@]}"; do obj_flags+=("-object=${obj}"); done

            # HTML report
            mkdir -p "${html_dir}"
            llvm-cov-20 show \
              --format=html \
              --instr-profile="${merged}" \
              "${obj_flags[@]}" \
              --ignore-filename-regex="${IGNORE_REGEX}" \
              --output-dir="${html_dir}"
            echo "HTML report (${area}): $(du -sh "${html_dir}" | cut -f1)"

            # JSON summary
            llvm-cov-20 export \
              --format=text \
              --instr-profile="${merged}" \
              "${obj_flags[@]}" \
              --ignore-filename-regex="${IGNORE_REGEX}" \
              --summary-only > "${json_out}"

            echo "::endgroup::"
          }

          # ------------------------------------------------------------------ #
          # Area: ttnn
          #   Objects: wheel-installed .so files (profraw paths recorded against
          #   these during test runs that install the wheel).
          # ------------------------------------------------------------------ #
          ttnn_objects=()
          while IFS= read -r -d '' obj; do
            ttnn_objects+=("$obj")
          done < <(find /opt/venv/lib -path "*/ttnn/build/lib/*.so" -print0 2>/dev/null)
          generate_area "ttnn" "${ttnn_objects[@]}" \
            || echo "::warning::ttnn coverage generation failed — continuing with remaining areas"

          # ------------------------------------------------------------------ #
          # Area: metal-runtime
          #   Objects: GTest binaries compiled with -fprofile-instr-generate
          #   (CodeCoverage build type) and their shared libs.
          # ------------------------------------------------------------------ #
          metal_runtime_objects=()
          while IFS= read -r -d '' obj; do
            metal_runtime_objects+=("$obj")
          done < <(find /work/docker-job/build/test/tt_metal -name "unit_tests_*" -type f -executable -print0 2>/dev/null)
          while IFS= read -r -d '' obj; do
            metal_runtime_objects+=("$obj")
          done < <(find /work/docker-job/build/lib -name "libtt_metal*.so" -type f -print0 2>/dev/null)
          generate_area "metal-runtime" "${metal_runtime_objects[@]}" \
            || echo "::warning::metal-runtime coverage generation failed — continuing with remaining areas"

      - name: Generate step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os, pathlib

          areas = pathlib.Path("/work/coverage/areas.txt").read_text().split()
          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")

          with open(summary_file, "a") as out:
              out.write("## tt-metal Code Coverage\n\n")
              for area in areas:
                  json_path = pathlib.Path(f"/work/coverage/{area}-summary.json")
                  if not json_path.exists():
                      out.write(f"### {area}\n_No coverage data_\n\n")
                      continue
                  with open(json_path) as f:
                      data = json.load(f)
                  totals = data["data"][0]["totals"]
                  out.write(f"### {area}\n")
                  out.write("| Metric | Covered | Total | % |\n")
                  out.write("|--------|---------|-------|---|\n")
                  for k in ("lines", "functions", "regions"):
                      t = totals[k]
                      out.write(f"| {k.title()} | {t['covered']} | {t['count']} | {t['percent']:.1f}% |\n")
                  out.write("\n")
          EOF

      - name: Generate index page
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os, pathlib, datetime

          areas = pathlib.Path("/work/coverage/areas.txt").read_text().split()
          html_root = pathlib.Path("/work/coverage_html")
          html_root.mkdir(parents=True, exist_ok=True)

          rows = []
          for area in areas:
              json_path = pathlib.Path(f"/work/coverage/{area}-summary.json")
              if not json_path.exists():
                  rows.append(f"<tr><td>{area}</td><td colspan='3'><em>no data</em></td></tr>")
                  continue
              with open(json_path) as f:
                  data = json.load(f)
              t = data["data"][0]["totals"]
              lines_pct = t["lines"]["percent"]
              funcs_pct = t["functions"]["percent"]
              regions_pct = t["regions"]["percent"]
              rows.append(
                  f'<tr>'
                  f'<td><a href="{area}/index.html">{area}</a></td>'
                  f'<td>{lines_pct:.1f}%</td>'
                  f'<td>{funcs_pct:.1f}%</td>'
                  f'<td>{regions_pct:.1f}%</td>'
                  f'</tr>'
              )

          commit = os.environ.get("GITHUB_SHA", "unknown")[:7]
          date_str = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>tt-metal Code Coverage</title>
            <style>
              body {{ font-family: sans-serif; max-width: 800px; margin: 2rem auto; }}
              table {{ border-collapse: collapse; width: 100%; }}
              th, td {{ border: 1px solid #ccc; padding: 0.5rem 1rem; text-align: left; }}
              th {{ background: #f4f4f4; }}
              .meta {{ color: #666; font-size: 0.85rem; margin-top: 1.5rem; }}
            </style>
          </head>
          <body>
            <h1>tt-metal Code Coverage</h1>
            <table>
              <thead><tr><th>Area</th><th>Lines</th><th>Functions</th><th>Regions</th></tr></thead>
              <tbody>{''.join(rows)}</tbody>
            </table>
            <p class="meta">Generated {date_str} &mdash; commit <code>{commit}</code></p>
          </body>
          </html>
          """
          (html_root / "index.html").write_text(html)
          print("Generated index.html")
          EOF

      - name: Publish to tt-metal-code-coverage
        if: github.ref == 'refs/heads/main'
        run: |
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.CLANGSA_RESULTS_PAT }}@github.com/tenstorrent/tt-metal-code-coverage.git" \
            /tmp/coverage-pages

          cd /tmp/coverage-pages
          git checkout --orphan new-gh-pages
          git rm -rf . 2>/dev/null || true

          cp -r /work/coverage_html/. .
          # Publish per-area JSON summaries
          areas=$(cat /work/coverage/areas.txt)
          for area in $areas; do
            src="/work/coverage/${area}-summary.json"
            [ -f "$src" ] && cp "$src" "${area}-summary.json" || true
          done
          areas_json=$(python3 -c "import json,pathlib; print(json.dumps(pathlib.Path('/work/coverage/areas.txt').read_text().split()))")
          printf '{"date":"%s","commit":"%s","areas":%s}\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "${{ github.sha }}" \
            "$areas_json" > meta.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "coverage $(date -u +%Y-%m-%d) @ $(echo '${{ github.sha }}' | head -c 7)"
          git push --force origin HEAD:gh-pages
