name: "Nightly LLVM Code Coverage"

# Nightly LLVM code coverage for ttnn.
# Builds with CodeCoverage build type, runs all ttnn unit test groups in parallel,
# aggregates LLVM profdata, and publishes HTML + JSON to tenstorrent/tt-metal-code-coverage.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC nightly

jobs:
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: CodeCoverage
      build-wheel: true
      tracy: true
      skip-tt-train: false
      platform: "Ubuntu 22.04"
      enable-lto: false

  run-ttnn-tests:
    needs: [build-artifact]
    uses: ./.github/workflows/ttnn-post-commit.yaml
    secrets: inherit
    with:
      enabled-skus: "wh_n300_civ2"
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      merge-gate-call: false
      collect-coverage: true

  aggregate-coverage:
    name: "Aggregate & publish coverage"
    needs: [build-artifact, run-ttnn-tests]
    if: always()
    runs-on: tt-ubuntu-2204-large-stable
    timeout-minutes: 60
    container:
      image: harbor.ci.tenstorrent.net/${{ needs.build-artifact.outputs.dev-docker-image }}
      volumes:
        - ${{ github.workspace }}:/work
      options: --tmpfs /tmp
    defaults:
      run:
        shell: bash
        working-directory: /work

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Configure git safe.directory
        run: git config --global --add safe.directory /work

      - name: Setup job
        uses: ./.github/actions/setup-job
        with:
          build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
          wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
          auto-triage: false

      - name: Download all profdata artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: profdata-*
          path: /work/profdata-artifacts
          merge-multiple: false

      - name: Merge profdata
        run: |
          shopt -s globstar
          profdata_files=(/work/profdata-artifacts/**/*.profdata)
          if [ ${#profdata_files[@]} -eq 0 ] || [ ! -f "${profdata_files[0]}" ]; then
            echo "::error::No profdata files found from test jobs"
            exit 1
          fi
          echo "Found ${#profdata_files[@]} profdata files to merge"
          mkdir -p /work/coverage
          llvm-profdata-20 merge -sparse "${profdata_files[@]}" \
            -o /work/coverage/coverage.profdata
          echo "Merged profdata: $(du -h /work/coverage/coverage.profdata | cut -f1)"

      - name: Generate coverage reports
        run: |
          objects=()
          # Collect instrumented .so files from wheel-installed ttnn
          # (test jobs install the wheel; profraw is recorded against these paths)
          while IFS= read -r -d '' obj; do
            objects+=("$obj")
          done < <(find /opt/venv/lib -path "*/ttnn/build/lib/*.so" -print0 2>/dev/null)

          if [ ${#objects[@]} -eq 0 ]; then
            echo "::error::No instrumented objects found"
            exit 1
          fi

          obj_flags=()
          for obj in "${objects[@]}"; do obj_flags+=("-object=$obj"); done

          # Text summary per object
          mkdir -p /work/coverage_per_object
          for obj in "${objects[@]}"; do
            base=$(basename "$obj" .so)
            llvm-cov-20 report \
              -instr-profile=/work/coverage/coverage.profdata \
              --ignore-filename-regex='(^|/)\.cpmcache/|(^|/)build[^/]*/|(^|/)third_party/' \
              "$obj" > "/work/coverage_per_object/${base}.txt" 2>&1 || true
          done

          # HTML report
          llvm-cov-20 show \
            --format=html \
            --instr-profile=/work/coverage/coverage.profdata \
            "${obj_flags[@]}" \
            --ignore-filename-regex='(^|/)\.cpmcache/|(^|/)build[^/]*/|(^|/)third_party/' \
            --output-dir=/work/coverage_html
          echo "HTML report: $(du -sh /work/coverage_html | cut -f1)"

          # JSON summary
          llvm-cov-20 export \
            --format=text \
            --instr-profile=/work/coverage/coverage.profdata \
            "${obj_flags[@]}" \
            --ignore-filename-regex='(^|/)\.cpmcache/|(^|/)build[^/]*/|(^|/)third_party/' \
            --summary-only > /work/coverage/summary.json

          # Step summary
          echo "## tt-metal Code Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Covered | Total | % |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|---------|-------|---|" >> "$GITHUB_STEP_SUMMARY"
          python3 - <<'EOF'
          import json, os
          with open('/work/coverage/summary.json') as f:
              data = json.load(f)
          totals = data['data'][0]['totals']
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          with open(summary_file, 'a') as out:
              for k in ('lines', 'functions', 'regions'):
                  t = totals[k]
                  out.write(f"| {k.title()} | {t['covered']} | {t['count']} | {t['percent']:.1f}% |\n")
          EOF

      - name: Publish to tt-metal-code-coverage
        if: github.ref == 'refs/heads/main'
        run: |
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.CLANGSA_RESULTS_PAT }}@github.com/tenstorrent/tt-metal-code-coverage.git" \
            /tmp/coverage-pages

          cd /tmp/coverage-pages
          git checkout --orphan new-gh-pages
          git rm -rf . 2>/dev/null || true

          cp -r /work/coverage_html/. .
          cp /work/coverage/summary.json .
          printf '{"date":"%s","commit":"%s"}\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "${{ github.sha }}" > meta.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "coverage $(date -u +%Y-%m-%d) @ $(echo '${{ github.sha }}' | head -c 7)"
          git push --force origin HEAD:gh-pages
