name: "Nightly LLVM Code Coverage"

# Nightly LLVM-instrumented code coverage for ttnn.
# Builds with CodeCoverage build type, runs ALL ttnn test groups from
# ttnn-tests.yaml in parallel on WH N300, then merges profdata and
# publishes an HTML report to tenstorrent/tt-metal-code-coverage (gh-pages).

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC nightly

jobs:
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: CodeCoverage
      build-wheel: false
      tracy: true
      skip-tt-train: false
      platform: "Ubuntu 22.04"
      enable-lto: false

  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/ttnn-tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true

      - name: Install dependencies
        run: pip3 install PyYAML

      - name: Build test matrix (all groups, wh_n300_civ2 only)
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "wh_n300_civ2" \
            ./.github/sku_config.yaml

  run-coverage:
    needs: [build-artifact, build-matrix]
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    name: "Coverage - ${{ matrix.test-group.name }}"
    runs-on: ${{ matrix.test-group.runs_on }}
    timeout-minutes: 240
    container:
      image: harbor.ci.tenstorrent.net/${{ needs.build-artifact.outputs.dev-docker-image }}
      env:
        LOGURU_LEVEL: INFO
        PYTHONPATH: /work
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          filter: blob:none
          submodules: recursive
          path: docker-job

      - name: Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}

      - name: Set ttnn fast runtime if exists in config
        if: ${{ matrix.test-group.fast_runtime_mode_off }}
        run: |
          echo "TTNN_CONFIG_OVERRIDES={\"enable_fast_runtime_mode\": false}" >> $GITHUB_ENV

      - name: Run tests with coverage instrumentation
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          source python_env/bin/activate
          export PYTHONPATH=$(pwd)

          mkdir -p /work/coverage
          export LLVM_PROFILE_FILE=/work/coverage/%p-%m.profraw

          # Run tests; do not fail the workflow on test failures
          # since we want coverage data even if some tests fail
          ${{ matrix.test-group.cmd }} || true

          echo "Collected $(ls /work/coverage/*.profraw 2>/dev/null | wc -l) profraw files"

      - name: Merge profraw into profdata
        run: |
          if ! ls /work/coverage/*.profraw 1>/dev/null 2>&1; then
            echo "::warning::No profraw files found for this test group"
            exit 0
          fi
          llvm-profdata-17 merge -sparse /work/coverage/*.profraw -o /work/coverage/job.profdata
          echo "Merged profile data: $(du -h /work/coverage/job.profdata | cut -f1)"

      - name: Upload profdata
        if: ${{ hashFiles('/work/coverage/job.profdata') != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: "profdata-${{ matrix.test-group.name }}"
          path: /work/coverage/job.profdata
          retention-days: 1

  aggregate-coverage:
    name: "Aggregate & publish coverage report"
    needs: [build-artifact, run-coverage]
    if: always()
    runs-on: tt-ubuntu-2204-large-stable
    timeout-minutes: 60
    container:
      image: harbor.ci.tenstorrent.net/${{ needs.build-artifact.outputs.dev-docker-image }}
      env:
        LOGURU_LEVEL: INFO
        PYTHONPATH: /work
      volumes:
        - ${{ github.workspace }}/docker-job:/work
    defaults:
      run:
        shell: bash
        working-directory: /work

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          filter: blob:none
          submodules: recursive
          path: docker-job

      - name: Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}

      - name: Download all profdata artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: profdata-*
          path: /work/profdata-all

      - name: Merge all profdata files
        run: |
          mkdir -p coverage
          profdata_files=$(find /work/profdata-all -name '*.profdata' 2>/dev/null)
          count=$(echo "$profdata_files" | grep -c . || true)
          echo "Found ${count} profdata files to merge"

          if [ "$count" -eq 0 ]; then
            echo "::error::No profdata files found from any test job"
            exit 1
          fi

          echo "$profdata_files"
          llvm-profdata-17 merge -sparse $profdata_files -o coverage/coverage.profdata
          echo "Merged profile data: $(du -h coverage/coverage.profdata | cut -f1)"

      - name: Generate per-object coverage reports
        run: |
          objects=(
            ./build/lib/libtt_metal.so
            ./build/lib/libtt_stl.so
            ./build/lib/_ttnncpp.so
            ./build/lib/_ttnn.so
          )

          mkdir -p coverage_per_object
          for obj in "${objects[@]}"; do
            if [ -f "$obj" ]; then
              base=$(basename "$obj" .so)
              llvm-cov-17 report \
                -instr-profile=coverage/coverage.profdata \
                "$obj" > "coverage_per_object/${base}.txt" 2>&1 || true
              echo "--- ${base} ---"
              head -5 "coverage_per_object/${base}.txt"
            else
              echo "::warning::Object not found: $obj"
            fi
          done

      - name: Generate HTML report
        run: |
          objects=()
          for obj in ./build/lib/libtt_metal.so ./build/lib/libtt_stl.so ./build/lib/_ttnncpp.so ./build/lib/_ttnn.so; do
            [ -f "$obj" ] && objects+=("$obj")
          done

          if [ ${#objects[@]} -eq 0 ]; then
            echo "::error::No instrumented objects found"
            exit 1
          fi

          obj_flags=()
          for obj in "${objects[@]}"; do
            obj_flags+=("-object=${obj}")
          done

          llvm-cov-17 show \
            --format=html \
            --instr-profile=coverage/coverage.profdata \
            "${obj_flags[@]}" \
            --output-dir=coverage_html

          echo "HTML report size: $(du -sh coverage_html | cut -f1)"

      - name: Generate JSON summary
        run: |
          objects=()
          for obj in ./build/lib/libtt_metal.so ./build/lib/libtt_stl.so ./build/lib/_ttnncpp.so ./build/lib/_ttnn.so; do
            [ -f "$obj" ] && objects+=("$obj")
          done

          obj_flags=()
          for obj in "${objects[@]}"; do
            obj_flags+=("-object=${obj}")
          done

          llvm-cov-17 export \
            --format=json \
            --instr-profile=coverage/coverage.profdata \
            "${obj_flags[@]}" \
            --summary-only > coverage/summary.json

          echo "## Code Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json, sys
          with open('coverage/summary.json') as f:
              data = json.load(f)
          totals = data['data'][0]['totals']
          for k in ('lines', 'functions', 'regions'):
              t = totals[k]
              pct = t['percent']
              print(f'| {k.title()} | {t[\"covered\"]}/{t[\"count\"]} | {pct:.1f}% |')
          " | (echo '| Metric | Covered/Total | Percent |'; echo '|--------|---------------|---------|'; cat) >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to tt-metal-code-coverage (gh-pages)
        if: github.ref == 'refs/heads/main'
        run: |
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.CLANGSA_RESULTS_PAT }}@github.com/tenstorrent/tt-metal-code-coverage.git" \
            coverage-pages 2>/dev/null || \
          git clone \
            "https://x-access-token:${{ secrets.CLANGSA_RESULTS_PAT }}@github.com/tenstorrent/tt-metal-code-coverage.git" \
            coverage-pages

          cd coverage-pages
          git checkout --orphan new-pages 2>/dev/null || true
          git rm -rf . 2>/dev/null || true

          cp -r ../coverage_html/* .
          cp ../coverage/summary.json .
          echo '{ "date": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'", "commit": "${{ github.sha }}" }' > meta.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "coverage $(date -u +%Y-%m-%d) @ ${{ github.sha }}"
          git push --force origin HEAD:gh-pages
