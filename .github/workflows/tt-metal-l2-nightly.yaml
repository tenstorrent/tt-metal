name: "Nightly tt-metal L2 tests"

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Architectures to test: ["blackhole"], ["wormhole_b0"], or both (default)'
        required: false
        type: string
        default: '["blackhole", "wormhole_b0"]'
      run_didt_tests:
        description: "Run DIDT tests"
        required: false
        type: boolean
        default: false
      run_cpp_tests:
        description: "Run cpp unit tests"
        required: false
        type: boolean
        default: false
      run_llk_unit_tests:
        description: "Run LLK Unit Tests (slow dispatch)"
        required: false
        type: boolean
        default: false
      run_tutorials_tests:
        description: "Run TTNN Tutorials"
        required: false
        type: boolean
        default: false
      run_tt_train_unit_tests:
        description: "Run TT-Train Unit Tests"
        required: false
        type: boolean
        default: false
      run_tt_train_perf_tests:
        description: "Run TT-Train Perf Tests (Python)"
        required: false
        type: boolean
        default: false
      run_models_unit_tests:
        description: "Run models-unit-tests"
        required: false
        type: boolean
        default: false
      run_tt_cnn_unit_tests:
        description: "Run tt-cnn-unit-tests"
        required: false
        type: boolean
        default: false
      additional_test_categories:
        description: >
          Additional test categories to run (comma-separated, e.g.,
          conv,pool,sdxl,sdpa,eltwise,matmul,experimental,docs_examples,ops_docs_check,misc,moreh,fused,reduction,data_movement,transformers,compute_fused)
        required: false
        type: string
        default: ""
      timeout:
        description: "Test timeout in minutes"
        required: false
        type: number
        default: 150
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      enable-llk-asserts:
        description: "Enable LLK asserts"
        required: false
        type: boolean
        default: false

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      tracy: true
      skip-tt-train: false
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}
  generate-arch-matrix:
    runs-on: ubuntu-latest
    outputs:
      # Comma-separated SKU string spanning every SKU referenced by L2 nightly
      # test yamls (HW + viommu + sim). Downstream impls intersect this against
      # the SKUs declared in their test yaml entries.
      l2-nightly-skus: ${{ steps.parse.outputs.l2-nightly-skus }}
    steps:
      - id: parse
        run: |
          arch='${{ inputs.architecture }}'

          # Default to running all if empty or not provided (scheduled runs)
          if [[ -z "$arch" || "$arch" == "" ]]; then
            arch='["blackhole", "wormhole_b0"]'
          fi

          # Validate JSON format
          if ! echo "$arch" | jq -e 'type == "array"' > /dev/null 2>&1; then
            echo "❌ Error: Invalid JSON format. Input must be a JSON array."
            echo "   Received input: $arch"
            echo "   Valid format: [\"blackhole\", \"wormhole_b0\"]"
            exit 1
          fi

          # Validate each architecture name using jq for exact matching
          valid_archs='["blackhole", "wormhole_b0"]'
          invalid_archs=$(echo "$arch" | jq -r --argjson valid "$valid_archs" '.[] | select(. as $a | $valid | index($a) | not)')
          if [[ -n "$invalid_archs" ]]; then
            echo "❌ Error: Invalid architecture(s) found:"
            echo "$invalid_archs" | while read -r invalid; do
              echo "   - '$invalid'"
            done
            echo "   Valid values are: blackhole, wormhole_b0"
            echo "   Received input: $arch"
            exit 1
          fi

          # Check for each architecture using jq for exact matching
          run_wormhole=$(echo "$arch" | jq -r 'if index("wormhole_b0") then "true" else "false" end')
          run_blackhole=$(echo "$arch" | jq -r 'if index("blackhole") then "true" else "false" end')

          # Ensure at least one valid architecture was specified
          if [[ "$run_wormhole" == "false" && "$run_blackhole" == "false" ]]; then
            echo "❌ Error: No valid architectures found in input: $arch"
            echo "   Valid values are: blackhole, wormhole_b0"
            exit 1
          fi

          # SKU coverage spanning every L2 nightly test yaml entry.
          l2_nightly_skus=()
          if [[ "$run_wormhole" == "true" ]]; then
            l2_nightly_skus+=("wh_n150" "wh_n300" "wh_n150_civ2" "wh_n300_civ2" "sim_wormhole_b0")
          fi
          if [[ "$run_blackhole" == "true" ]]; then
            l2_nightly_skus+=("bh_p100" "bh_p150b_civ2" "bh_p100a_civ2_viommu" "bh_p150b_civ2_viommu" "sim_blackhole")
          fi
          l2_nightly_skus_str=$(IFS=,; echo "${l2_nightly_skus[*]}")
          echo "l2-nightly-skus=$l2_nightly_skus_str" >> $GITHUB_OUTPUT

  resolve-docker-pull-refs:
    needs: [check-harbor, build-artifact]
    uses: ./.github/workflows/resolve-docker-pull-refs.yaml
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      dev-docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      basic-ttnn-runtime-docker-image: ${{ needs.build-artifact.outputs.basic-ttnn-runtime-docker-image }}

  ### General team
  tt-metal-l2-tests:
    needs: [build-artifact, generate-arch-matrix]
    if: |
      needs.generate-arch-matrix.outputs.l2-nightly-skus != '' && (
        github.event_name == 'schedule' || inputs.additional_test_categories != ''
      )
    secrets: inherit
    uses: ./.github/workflows/tt-metal-l2-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.l2-nightly-skus }}
      additional_test_categories: >-
        ${{ github.event_name == 'schedule' && 'sdxl,train,compute_fused'
        || inputs.additional_test_categories }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  
  ### Syseng team
  syseng-didt-tests:
    needs: [build-artifact, generate-arch-matrix]
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.l2-nightly-skus }}
      additional_test_categories: >-
        ${{ (github.event_name == 'schedule' &&
        'conv,matmul,fused,reduction,experimental,pool,eltwise,transformers,moreh,misc,sdpa,data_movement,docs_examples,cpp_accessor,cpp_lab_examples')
        || (inputs.run_cpp_tests && format('{0},cpp_accessor,cpp_lab_examples', inputs.additional_test_categories))
        || inputs.additional_test_categories }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  
  ### TTNN team
  ops-unit-tests:
    needs: [build-artifact, generate-arch-matrix]
    if: |
      needs.generate-arch-matrix.outputs.l2-nightly-skus != '' && (
        github.event_name == 'schedule' || inputs.additional_test_categories != '' || inputs.run_cpp_tests
      )
    secrets: inherit
    uses: ./.github/workflows/ops-unit-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
  ops-integration-tests:
    needs: [build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || contains(format(',{0},', inputs.additional_test_categories), ',ops_docs_check,')) &&
      needs.generate-arch-matrix.outputs.l2-nightly-skus != ''
    secrets: inherit
    uses: ./.github/workflows/ops-integration-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.l2-nightly-skus }}
      additional_test_categories: >-
        ${{ github.event_name == 'schedule' && 'ops_docs_check'
        || inputs.additional_test_categories }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  ttnn-integration-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_tutorials_tests) &&
      needs.generate-arch-matrix.outputs.l2-nightly-skus != ''
    secrets: inherit
    uses: ./.github/workflows/ttnn-integration-tests-impl.yaml
    with:
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.basic-ttnn-runtime-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.l2-nightly-skus }}
      additional_test_categories: tutorials
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  cnn-unit-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_tt_cnn_unit_tests) &&
      needs.generate-arch-matrix.outputs.l2-nightly-skus != ''
    secrets: inherit
    uses: ./.github/workflows/tt-cnn-unit-tests-impl.yaml
    with:
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.l2-nightly-skus }}
      additional_test_categories: cnn_pipeline,cnn_builder
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}

  
  ### TT-Train team
  tt-train-unit-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_tt_train_unit_tests) &&
      needs.generate-arch-matrix.outputs.l2-nightly-skus != ''
    secrets: inherit
    uses: ./.github/workflows/tt-train-tests.yaml
    with:
      test-category: unit
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.l2-nightly-skus }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  tt-train-perf-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_tt_train_perf_tests) &&
      needs.generate-arch-matrix.outputs.l2-nightly-skus != ''
    secrets: inherit
    uses: ./.github/workflows/tt-train-tests.yaml
    with:
      test-category: perf
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.l2-nightly-skus }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}

  ### Models team
  models-unit-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_models_unit_tests) &&
      contains(needs.generate-arch-matrix.outputs.l2-nightly-skus, 'wh_n150')
    secrets: inherit
    uses: ./.github/workflows/models-post-commit.yaml
    with:
      arch: wormhole_b0
      runner-label: N150
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}

  ### Triage team
  triage-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: ${{ contains(needs.generate-arch-matrix.outputs.l2-nightly-skus, 'wh_n150') }}
    secrets: inherit
    uses: ./.github/workflows/triage-tests-impl.yaml
    with:
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.l2-nightly-skus }}
      run-hang-report-test: true
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  
  ### LLK Team
  # LLK Unit Tests — runs the full LLK gtest binary in slow dispatch as a comprehensive
  # nightly regression. The PR gate covers two narrower slices (FD path via
  # llk-fd-unit-tests-* and a Quasar+SD-only slice via llk-sd-unit-tests-*); this job is the
  # superset that re-validates everything in SD on every supported runner class.
  llk-unit-tests:
    needs: [build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_llk_unit_tests) &&
      needs.generate-arch-matrix.outputs.l2-nightly-skus != ''
    secrets: inherit
    uses: ./.github/workflows/llk-unit-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.l2-nightly-skus }}
      l2-only: true
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
