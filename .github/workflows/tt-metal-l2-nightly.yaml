name: "Nightly tt-metal L2 tests"

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Architectures to test: ["blackhole"], ["wormhole_b0"], or both (default)'
        required: false
        type: string
        default: '["blackhole", "wormhole_b0"]'
      run_didt_tests:
        description: "Run DIDT tests"
        required: false
        type: boolean
        default: false
      run_cpp_tests:
        description: "Run cpp-unit-tests"
        required: false
        type: boolean
        default: false
      run_fd_unit_tests:
        description: "Run Fast Dispatch Unit Tests"
        required: false
        type: boolean
        default: false
      run_sd_unit_tests:
        description: "Run Slow Dispatch Unit Tests"
        required: false
        type: boolean
        default: false
      run_metal_iommu_tests:
        description: "Run Metal IOMMU Unit Tests"
        required: false
        type: boolean
        default: false
      run_tutorials_tests:
        description: "Run TTNN Tutorials"
        required: false
        type: boolean
        default: false
      run_tt_train_unit_tests:
        description: "Run TT-Train Unit Tests"
        required: false
        type: boolean
        default: false
      run_tt_train_perf_tests:
        description: "Run TT-Train Perf Tests (Python)"
        required: false
        type: boolean
        default: false
      run_models_unit_tests:
        description: "Run models-unit-tests"
        required: false
        type: boolean
        default: false
      run_tt_cnn_unit_tests:
        description: "Run tt-cnn-unit-tests"
        required: false
        type: boolean
        default: false
      additional_test_categories:
        description: >
          Additional test categories to run (comma-separated, e.g.,
          conv,pool,sdxl,sdpa,eltwise,matmul,experimental,docs_examples,ops_docs_check,misc,moreh,fused,reduction,data_movement,transformers,compute_fused)
        required: false
        type: string
        default: ""
      timeout:
        description: "Test timeout in minutes"
        required: false
        type: number
        default: 150
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      enable-llk-asserts:
        description: "Enable LLK asserts"
        required: false
        type: boolean
        default: false

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      tracy: true
      skip-tt-train: false
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}
  generate-arch-matrix:
    runs-on: ubuntu-latest
    outputs:
      # Dynamic matrices for each job type
      matrix-l2-tests: ${{ steps.parse.outputs.matrix-l2-tests }}
      matrix-cpp-tests: ${{ steps.parse.outputs.matrix-cpp-tests }}
      matrix-sd-fd-tests: ${{ steps.parse.outputs.matrix-sd-fd-tests }}
      matrix-tutorials: ${{ steps.parse.outputs.matrix-tutorials }}
      tt-train-skus: ${{ steps.parse.outputs.tt-train-skus }}
      matrix-wormhole-only: ${{ steps.parse.outputs.matrix-wormhole-only }}
      matrix-blackhole-only: ${{ steps.parse.outputs.matrix-blackhole-only }}
      # Comma-separated SKU string spanning every entry in the dependant yamls (HW + viommu + sim).
      l2-nightly-skus: ${{ steps.parse.outputs.l2-nightly-skus }}
    steps:
      - id: parse
        run: |
          arch='${{ inputs.architecture }}'

          # Default to running all if empty or not provided (scheduled runs)
          if [[ -z "$arch" || "$arch" == "" ]]; then
            arch='["blackhole", "wormhole_b0"]'
          fi

          # Validate JSON format
          if ! echo "$arch" | jq -e 'type == "array"' > /dev/null 2>&1; then
            echo "❌ Error: Invalid JSON format. Input must be a JSON array."
            echo "   Received input: $arch"
            echo "   Valid format: [\"blackhole\", \"wormhole_b0\"]"
            exit 1
          fi

          # Validate each architecture name using jq for exact matching
          valid_archs='["blackhole", "wormhole_b0"]'
          invalid_archs=$(echo "$arch" | jq -r --argjson valid "$valid_archs" '.[] | select(. as $a | $valid | index($a) | not)')
          if [[ -n "$invalid_archs" ]]; then
            echo "❌ Error: Invalid architecture(s) found:"
            echo "$invalid_archs" | while read -r invalid; do
              echo "   - '$invalid'"
            done
            echo "   Valid values are: blackhole, wormhole_b0"
            echo "   Received input: $arch"
            exit 1
          fi

          # Check for each architecture using jq for exact matching
          run_wormhole=$(echo "$arch" | jq -r 'if index("wormhole_b0") then "true" else "false" end')
          run_blackhole=$(echo "$arch" | jq -r 'if index("blackhole") then "true" else "false" end')

          # Ensure at least one valid architecture was specified
          if [[ "$run_wormhole" == "false" && "$run_blackhole" == "false" ]]; then
            echo "❌ Error: No valid architectures found in input: $arch"
            echo "   Valid values are: blackhole, wormhole_b0"
            exit 1
          fi

          # Build dynamic matrices based on architecture selection using jq for proper JSON construction
          # Note: Empty matrices are not possible for the main matrices because validation above ensures
          # at least one of run_wormhole or run_blackhole is true (exits with error otherwise).
          # Architecture-specific matrices (wormhole-only, blackhole-only) may be empty if that arch is not selected.

          # Helper function to add an entry to a JSON array (using -c for compact single-line output)
          add_entry() {
            local json="$1"
            local arch="$2"
            local label="$3"
            echo "$json" | jq -c --arg arch "$arch" --arg label "$label" '. += [{"arch": $arch, "runner-label": $label}]'
          }

          # Matrix for tt-metal-l2-tests and didt-tests (N150, N300, P100, P150b)
          matrix_l2='[]'
          if [[ "$run_wormhole" == "true" ]]; then
            matrix_l2=$(add_entry "$matrix_l2" "wormhole_b0" "N150")
            matrix_l2=$(add_entry "$matrix_l2" "wormhole_b0" "N300")
          fi
          if [[ "$run_blackhole" == "true" ]]; then
            matrix_l2=$(add_entry "$matrix_l2" "blackhole" "P100a")
            matrix_l2=$(add_entry "$matrix_l2" "blackhole" "P150b")
          fi
          echo "matrix-l2-tests=$matrix_l2" >> $GITHUB_OUTPUT

          # Matrix for cpp-unit-tests (N150, N300, P150b, P100a)
          matrix_cpp='[]'
          if [[ "$run_wormhole" == "true" ]]; then
            matrix_cpp=$(add_entry "$matrix_cpp" "wormhole_b0" "N150")
            matrix_cpp=$(add_entry "$matrix_cpp" "wormhole_b0" "N300")
          fi
          if [[ "$run_blackhole" == "true" ]]; then
            matrix_cpp=$(add_entry "$matrix_cpp" "blackhole" "P150b")
            matrix_cpp=$(add_entry "$matrix_cpp" "blackhole" "P100a")
          fi
          echo "matrix-cpp-tests=$matrix_cpp" >> $GITHUB_OUTPUT

          # Matrix for sd-unit-tests and fast-dispatch-unit-tests (N150, N300, P150, P100)
          matrix_sd_fd='[]'
          if [[ "$run_wormhole" == "true" ]]; then
            matrix_sd_fd=$(add_entry "$matrix_sd_fd" "wormhole_b0" "N150")
            matrix_sd_fd=$(add_entry "$matrix_sd_fd" "wormhole_b0" "N300")
          fi
          if [[ "$run_blackhole" == "true" ]]; then
            matrix_sd_fd=$(add_entry "$matrix_sd_fd" "blackhole" "P150b")
            matrix_sd_fd=$(add_entry "$matrix_sd_fd" "blackhole" "P100a")
          fi
          echo "matrix-sd-fd-tests=$matrix_sd_fd" >> $GITHUB_OUTPUT

          # Matrix for test-ttnn-tutorials (N150, P150b, P100)
          matrix_tutorials='[]'
          if [[ "$run_wormhole" == "true" ]]; then
            matrix_tutorials=$(add_entry "$matrix_tutorials" "wormhole_b0" "N150")
          fi
          if [[ "$run_blackhole" == "true" ]]; then
            matrix_tutorials=$(add_entry "$matrix_tutorials" "blackhole" "P150b")
            matrix_tutorials=$(add_entry "$matrix_tutorials" "blackhole" "P100a")
          fi
          echo "matrix-tutorials=$matrix_tutorials" >> $GITHUB_OUTPUT

          # SKU coverage for tests/pipeline_reorg/tt-train-tests.yaml
          tt_train_skus=()
          if [[ "$run_wormhole" == "true" ]]; then
            tt_train_skus+=("wh_n150_civ2" "wh_n300_civ2")
          fi
          if [[ "$run_blackhole" == "true" ]]; then
            tt_train_skus+=("bh_p100a_civ2_viommu" "bh_p150b_civ2")
          fi
          tt_train_skus_str=$(IFS=,; echo "${tt_train_skus[*]}")
          echo "tt-train-skus=$tt_train_skus_str" >> $GITHUB_OUTPUT

          # Matrix for wormhole-only jobs (N150)
          matrix_wh='[]'
          if [[ "$run_wormhole" == "true" ]]; then
            matrix_wh=$(add_entry "$matrix_wh" "wormhole_b0" "N150")
          fi
          echo "matrix-wormhole-only=$matrix_wh" >> $GITHUB_OUTPUT

          # Matrix for blackhole-only jobs (P150b)
          matrix_bh='[]'
          if [[ "$run_blackhole" == "true" ]]; then
            matrix_bh=$(add_entry "$matrix_bh" "blackhole" "P150b")
          fi
          echo "matrix-blackhole-only=$matrix_bh" >> $GITHUB_OUTPUT

          # SKU coverage for L2 nightly impls. Per-impl test yamls (e.g.
          # tt_metal_l2_nightly_tests.yaml, syseng_unit_tests.yaml) filter this
          # superset down to the SKUs they declare.
          l2_nightly_skus=()
          if [[ "$run_wormhole" == "true" ]]; then
            l2_nightly_skus+=("wh_n150" "wh_n300" "wh_n150_civ2" "wh_n300_civ2" "sim_wormhole_b0")
          fi
          if [[ "$run_blackhole" == "true" ]]; then
            l2_nightly_skus+=("bh_p100" "bh_p150b_civ2" "bh_p100a_civ2_viommu" "bh_p150b_civ2_viommu" "sim_blackhole")
          fi
          l2_nightly_skus_str=$(IFS=,; echo "${l2_nightly_skus[*]}")
          echo "l2-nightly-skus=$l2_nightly_skus_str" >> $GITHUB_OUTPUT

  resolve-docker-pull-refs:
    needs: [check-harbor, build-artifact]
    uses: ./.github/workflows/resolve-docker-pull-refs.yaml
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      dev-docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      basic-ttnn-runtime-docker-image: ${{ needs.build-artifact.outputs.basic-ttnn-runtime-docker-image }}

  tt-metal-l2-tests:
    needs: [build-artifact, generate-arch-matrix]
    if: |
      needs.generate-arch-matrix.outputs.l2-nightly-skus != '' && (
        github.event_name == 'schedule' || inputs.additional_test_categories != ''
      )
    secrets: inherit
    uses: ./.github/workflows/tt-metal-l2-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.l2-nightly-skus }}
      additional_test_categories: >-
        ${{ github.event_name == 'schedule' &&
        'conv,matmul,fused,reduction,experimental,pool,eltwise,transformers,moreh,misc,sdpa,data_movement,docs_examples,sdxl,compute_fused'
        || inputs.additional_test_categories }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  ttnn-ops-docs-check:
    needs: [build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || contains(format(',{0},', inputs.additional_test_categories), ',ops_docs_check,')) &&
      needs.generate-arch-matrix.outputs.matrix-wormhole-only != '[]'
    secrets: inherit
    uses: ./.github/workflows/ttnn-ops-docs-check.yaml
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-arch-matrix.outputs.matrix-wormhole-only) }}
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      timeout: ${{ (github.event_name == 'schedule' && 150) || fromJSON(inputs.timeout) }}
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
  syseng-didt-tests:
    needs: [ build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_didt_tests) &&
      needs.generate-arch-matrix.outputs.l2-nightly-skus != ''
    secrets: inherit
    uses: ./.github/workflows/syseng-didt-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.l2-nightly-skus }}
  # FD C++ Unit Tests
  cpp-unit-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_cpp_tests) &&
      needs.generate-arch-matrix.outputs.matrix-cpp-tests != '[]'
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-arch-matrix.outputs.matrix-cpp-tests) }}
    uses: ./.github/workflows/cpp-post-commit.yaml
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      gtest_filter: "*NIGHTLY_*"
      nightly-run: true
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  # SD LLK Unit Tests — runs the full LLK gtest binary in slow dispatch as a comprehensive
  # nightly regression. The PR gate covers two narrower slices (FD path via
  # llk-fd-unit-tests-* and a Quasar+SD-only slice via llk-sd-unit-tests-*); this job is the
  # superset that re-validates everything in SD on every supported runner class.
  llk-sd-unit-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_sd_unit_tests) &&
      needs.generate-arch-matrix.outputs.matrix-sd-fd-tests != '[]'
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-arch-matrix.outputs.matrix-sd-fd-tests) }}
    uses: ./.github/workflows/llk-unit-tests.yaml
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      dispatch-mode: sd
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      gtest-filter: "-MeshDeviceFixture.Top32RmDevPipelineCompletes"  # disabled — deterministic compile failure, tracking issue #45483
  # TTNN Tutorials
  test-ttnn-tutorials:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_tutorials_tests) &&
      needs.generate-arch-matrix.outputs.matrix-tutorials != '[]'
    secrets: inherit
    uses: ./.github/workflows/ttnn-tutorials-post-commit.yaml
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-arch-matrix.outputs.matrix-tutorials) }}
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.basic-ttnn-runtime-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  tt-train-unit-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_tt_train_unit_tests) &&
      needs.generate-arch-matrix.outputs.tt-train-skus != ''
    secrets: inherit
    uses: ./.github/workflows/tt-train-tests.yaml
    with:
      test-category: unit
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.tt-train-skus }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  tt-train-perf-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_tt_train_perf_tests) &&
      needs.generate-arch-matrix.outputs.tt-train-skus != ''
    secrets: inherit
    uses: ./.github/workflows/tt-train-tests.yaml
    with:
      test-category: perf
      enabled-skus: ${{ needs.generate-arch-matrix.outputs.tt-train-skus }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  # FD Model Tests
  models-unit-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_models_unit_tests) &&
      needs.generate-arch-matrix.outputs.matrix-wormhole-only != '[]'
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-arch-matrix.outputs.matrix-wormhole-only) }}
    uses: ./.github/workflows/models-post-commit.yaml
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  # Triage tests (including hang report generation test)
  triage-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: ${{ needs.generate-arch-matrix.outputs.matrix-wormhole-only != '[]' }}
    secrets: inherit
    uses: ./.github/workflows/triage-tests-impl.yaml
    with:
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: wh_n150_civ2
      run-hang-report-test: true
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
  # TT-CNN Unit tests
  tt-cnn-unit-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-arch-matrix]
    if: |
      (github.event_name == 'schedule' || inputs.run_tt_cnn_unit_tests) &&
      needs.generate-arch-matrix.outputs.matrix-wormhole-only != '[]'
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-arch-matrix.outputs.matrix-wormhole-only) }}
    uses: ./.github/workflows/tt-cnn-post-commit.yaml
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
