name: Merge Gate
# This pipeline is the minimum bar a PR must pass before it can pass the merge queue.
# It is intended to be relatively fast and lightweight that the delay between completing
# a PR and having the changes available on main is not onerous.

# Requirements for all jobs in this workflow:
# - End-to-end (excluding wait times for runners) must be less than 15mins.
#   This includes the cost of checking out the code, preparing a runner, etc.
# - Individual test cases must be less than 5s.

run-name: >-
  ${{ github.event_name == 'merge_group' && github.event.action == 'destroyed' && github.event.reason == 'merged' && format('[Merge Queue] 🎯 Merged {0}', github.sha) ||
      github.event_name == 'merge_group' && github.event.action == 'destroyed' && github.event.reason == 'dequeued' && format('[Merge Queue] ↩️ Dequeued {0}', github.sha) ||
      github.event_name == 'merge_group' && github.event.action == 'destroyed' && github.event.reason == 'invalidated' && format('[Merge Queue] 💔 Invalidated {0}', github.sha) ||
      github.event_name == 'merge_group' && github.event.action == 'destroyed' && format('[Merge Queue] {0} {1}', github.event.reason, github.sha) ||
      github.event_name == 'merge_group' && format('[Merge Queue] 💫 Processing {0}: {1}', github.actor, github.sha) ||
      '' }}

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  merge_group:
    types:
      - checks_requested
      - destroyed
  push:
    branches:
      - main # Builds on main will populate the shared ccache to speed up builds on branches

concurrency:
  # Groups to control cancelling of obsolete runs.
  # main (or any protected branch): run_id (ie: never cancel other jobs)
  # PRs: PR #
  # Merge Queue: branch name; will be paired with the 'destroyed' trigger to cause a cancel when it leaves or moves in the queue.
  #              See https://github.com/orgs/community/discussions/137976#discussioncomment-14004793
  # All others: branch name (ie: one run per branch)
  group: >-
    ${{ github.workflow }}-
    ${{ (github.ref_protected && github.run_id)
        || github.event.pull_request.number
        || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  checks: write
  packages: write

jobs:
  # ===========================================================================
  # Infrastructure (shared builds / images / change detection)
  # ===========================================================================

  static-checks:
    # Workaround for https://github.com/orgs/community/discussions/46757?sort=old#discussioncomment-4909336
    # We must have this workflow trigger on PRs in order to allow us to require them in the merge queue.
    # But we don't actually WANT to run it on PRs -- that's the whole point.  GitHub strikes again.
    if: github.event.action != 'destroyed' && github.event_name != 'pull_request'
    uses: ./.github/workflows/all-static-checks.yaml
    secrets: inherit

  # Build all Docker images ONCE at the start, then share with all downstream jobs
  docker-images:
    if: github.event.action != 'destroyed' && github.event_name != 'pull_request'
    uses: ./.github/workflows/build-all-docker-images.yaml
    secrets: inherit
    with:
      runs-on-large: ${{ github.event_name == 'merge_group' && 'tt-ubuntu-2204-large-prio-stable' || 'tt-ubuntu-2204-large-stable' }}
      runs-on-medium: ${{ github.event_name == 'merge_group' && 'tt-ubuntu-2204-medium-prio-stable' || 'tt-ubuntu-2204-medium-stable' }}
      check-harbor-runs-on: ${{ github.event_name == 'merge_group' && 'tt-ubuntu-light-prio' || 'tt-ubuntu-light' }}

  # TODO: Duplicate check-harbor call. build-all-docker-images.yaml (called by
  # docker-images above) also calls check-harbor internally, but does not expose
  # harbor-prefix as a workflow output. Eliminating this duplication would require
  # either adding harbor-prefix to build-all-docker-images.yaml outputs or
  # restructuring the pipeline to pass it through. Low priority — the check is
  # cheap and idempotent.
  check-harbor:
    if: github.event.action != 'destroyed' && github.event_name != 'pull_request'
    uses: ./.github/workflows/check-harbor.yaml
    with:
      runs-on: ${{ github.event_name == 'merge_group' && 'tt-ubuntu-light-prio' || 'tt-ubuntu-light' }}

  find-changes:
    if: github.event.action != 'destroyed' && github.event_name != 'pull_request'
    runs-on: ubuntu-slim
    outputs:
      any-code-changed: ${{ steps.find-changes.outputs.any-code-changed }}
      docs-changed: ${{ steps.find-changes.outputs.docs-changed }}
      cmake-changed: ${{ steps.find-changes.outputs.cmake-changed }}
      tt-metalium-changed: ${{ steps.find-changes.outputs.tt-metalium-changed }}
      tt-nn-changed: ${{ steps.find-changes.outputs.tt-nn-changed }}
      tt-metalium-or-tt-nn-tests-changed: ${{ steps.find-changes.outputs.tt-metalium-or-tt-nn-tests-changed }}
      build-workflows-changed: ${{ steps.find-changes.outputs.build-workflows-changed }}
      llk-wormhole-changed: ${{ steps.find-changes.outputs.llk-wormhole-changed }}
      llk-blackhole-changed: ${{ steps.find-changes.outputs.llk-blackhole-changed }}
      llk-common-changed: ${{ steps.find-changes.outputs.llk-common-changed }}
      llk-sfpi-changed: ${{ steps.find-changes.outputs.llk-sfpi-changed }}
      llk-unit-tests-changed: ${{ steps.find-changes.outputs.llk-unit-tests-changed }}
      llk-ci-changed: ${{ steps.find-changes.outputs.llk-ci-changed }}
      tt-train-changed: ${{ steps.find-changes.outputs.tt-train-changed }}
      models-changed: ${{ steps.find-changes.outputs.models-changed }}
    steps:
      # Use the in-tree action (same as pr-gate.yaml) so the llk-* outputs above are
      # available; the previously-pinned @v0.63.0 predates the llk-unit-tests-changed flag.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          fetch-depth: 1
          sparse-checkout: .github
      - id: find-changes
        uses: ./.github/actions/find-changed-files

  build:
    if: ${{ github.ref_name == 'main' ||
            needs.find-changes.outputs.cmake-changed == 'true' ||
            needs.find-changes.outputs.any-code-changed == 'true' ||
            needs.find-changes.outputs.docs-changed == 'true' ||
            needs.find-changes.outputs.build-workflows-changed == 'true'
        }}
    needs: [find-changes, docker-images, check-harbor]
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: Release
      build-wheel: true
      platform: "Ubuntu 22.04"
      enable-lto: false
      skip-tt-train: false
      ci-build-docker-image: ${{ needs.docker-images.outputs.ubuntu-2204-ci-build-tag }}
      ci-test-docker-image: ${{ needs.docker-images.outputs.ubuntu-2204-ci-test-tag }}
      dev-docker-image: ${{ needs.docker-images.outputs.ubuntu-2204-dev-tag }}
      basic-dev-docker-image: ${{ needs.docker-images.outputs.ubuntu-2204-basic-dev-tag }}
      basic-ttnn-runtime-docker-image: ${{ needs.docker-images.outputs.ubuntu-2204-basic-ttnn-runtime-tag }}
      manylinux-docker-image: ${{ needs.docker-images.outputs.manylinux-tag }}
      runs-on: ${{ github.event_name == 'merge_group' && 'tt-ubuntu-2204-large-prio-stable' || 'tt-ubuntu-2204-large-stable' }}
      fetch-depth: 1
      checkout-filter: tree:0

  build-tsan:
    if: ${{ github.ref_name == 'main' ||
            needs.find-changes.outputs.cmake-changed == 'true' ||
            needs.find-changes.outputs.any-code-changed == 'true' ||
            needs.find-changes.outputs.build-workflows-changed == 'true'
        }}
    needs: [find-changes, docker-images, check-harbor]
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: TSan
      platform: "Ubuntu 24.04"
      toolchain: cmake/x86_64-linux-clang-20-libstdcpp-toolchain.cmake
      skip-tt-train: false
      publish-artifact: false
      ci-build-docker-image: ${{ needs.docker-images.outputs.ubuntu-2404-ci-build-tag }}
      ci-test-docker-image: ${{ needs.docker-images.outputs.ubuntu-2404-ci-test-tag }}
      dev-docker-image: ${{ needs.docker-images.outputs.ubuntu-2404-dev-tag }}
      basic-dev-docker-image: ${{ needs.docker-images.outputs.ubuntu-2404-basic-dev-tag }}
      basic-ttnn-runtime-docker-image: ${{ needs.docker-images.outputs.ubuntu-2404-basic-ttnn-runtime-tag }}
      manylinux-docker-image: ${{ needs.docker-images.outputs.manylinux-tag }}
      runs-on: ${{ github.event_name == 'merge_group' && 'tt-ubuntu-2204-large-prio-stable' || 'tt-ubuntu-2204-large-stable' }}
      fetch-depth: 1
      checkout-filter: tree:0

  build-asan:
    if: ${{ github.ref_name == 'main' ||
            needs.find-changes.outputs.cmake-changed == 'true' ||
            needs.find-changes.outputs.any-code-changed == 'true' ||
            needs.find-changes.outputs.build-workflows-changed == 'true'
        }}
    needs: [find-changes, docker-images, check-harbor]
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: ASan
      platform: "Ubuntu 24.04"
      toolchain: cmake/x86_64-linux-clang-20-libstdcpp-toolchain.cmake
      skip-tt-train: false
      publish-artifact: false
      ci-build-docker-image: ${{ needs.docker-images.outputs.ubuntu-2404-ci-build-tag }}
      ci-test-docker-image: ${{ needs.docker-images.outputs.ubuntu-2404-ci-test-tag }}
      dev-docker-image: ${{ needs.docker-images.outputs.ubuntu-2404-dev-tag }}
      basic-dev-docker-image: ${{ needs.docker-images.outputs.ubuntu-2404-basic-dev-tag }}
      basic-ttnn-runtime-docker-image: ${{ needs.docker-images.outputs.ubuntu-2404-basic-ttnn-runtime-tag }}
      manylinux-docker-image: ${{ needs.docker-images.outputs.manylinux-tag }}
      runs-on: ${{ github.event_name == 'merge_group' && 'tt-ubuntu-2204-large-prio-stable' || 'tt-ubuntu-2204-large-stable' }}
      fetch-depth: 1
      checkout-filter: tree:0

  build-sweeps:
    if: ${{ github.ref_name == 'main' ||
            needs.find-changes.outputs.cmake-changed == 'true' ||
            needs.find-changes.outputs.any-code-changed == 'true'
        }}
    needs: [find-changes, docker-images, check-harbor]
    uses: ./.github/workflows/build-wrapper.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      ubuntu-2204-ci-build-tag: ${{ needs.docker-images.outputs.ubuntu-2204-ci-build-tag }}
      ubuntu-2204-dev-tag: ${{ needs.docker-images.outputs.ubuntu-2204-dev-tag }}
      ubuntu-2204-manylinux-tag: ${{ needs.docker-images.outputs.manylinux-tag }}
      ubuntu-2404-ci-build-tag: ${{ needs.docker-images.outputs.ubuntu-2404-ci-build-tag }}
      ubuntu-2404-dev-tag: ${{ needs.docker-images.outputs.ubuntu-2404-dev-tag }}
      ubuntu-2404-manylinux-tag: ${{ needs.docker-images.outputs.manylinux-tag }}
      runs-on: ${{ github.event_name == 'merge_group' && 'tt-ubuntu-2204-medium-prio-stable' || 'tt-ubuntu-2204-medium-stable' }}
      fetch-depth: 1

  resolve-docker-pull-refs:
    needs: [check-harbor, build]
    uses: ./.github/workflows/resolve-docker-pull-refs.yaml
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      dev-docker-image: ${{ needs.build.outputs.dev-docker-image }}
      basic-dev-docker-image: ${{ needs.build.outputs.basic-dev-docker-image }}
      ci-test-docker-image: ${{ needs.build.outputs.ci-test-docker-image }}

  resolve-docker-pull-refs-tsan:
    needs: [check-harbor, build-tsan]
    uses: ./.github/workflows/resolve-docker-pull-refs.yaml
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      dev-docker-image: ${{ needs.build-tsan.outputs.dev-docker-image }}

  resolve-docker-pull-refs-asan:
    needs: [check-harbor, build-asan]
    uses: ./.github/workflows/resolve-docker-pull-refs.yaml
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      dev-docker-image: ${{ needs.build-asan.outputs.dev-docker-image }}

  # ===========================================================================
  # Team: runtime
  # test list: runtime_validation_merge_gate_tests.yaml,
  #            runtime_validation_basic_tests.yaml
  # ===========================================================================

  runtime-smoke-tests:
    needs: [find-changes, resolve-docker-pull-refs-tsan, build-tsan, check-harbor]
    if: ${{ github.ref_name == 'main' ||
            needs.find-changes.outputs.cmake-changed == 'true' ||
            needs.find-changes.outputs.tt-metalium-changed == 'true' ||
            needs.find-changes.outputs.tt-metalium-or-tt-nn-tests-changed == 'true'
        }}
    uses: ./.github/workflows/smoke.yaml
    with:
      docker-image: ${{ needs.resolve-docker-pull-refs-tsan.outputs.dev-docker-image }}
      package-artifact-name: ${{ needs.build-tsan.outputs.packages-artifact-name }}
      enabled-skus: ALL_SKUS_IN_TESTS
      per-test-timeout: 15 # max minutes for any SKU timeout in the smoke tests yaml
      product: tt-metalium
      enable-kernel-ccache: true

  runtime-basic-tests:
    if: ${{
        github.ref_name == 'main' ||
        needs.find-changes.outputs.cmake-changed == 'true' ||
        needs.find-changes.outputs.tt-metalium-changed == 'true' ||
        needs.find-changes.outputs.tt-metalium-or-tt-nn-tests-changed == 'true'
      }}
    needs: [build-asan, resolve-docker-pull-refs-asan, find-changes, check-harbor]
    uses: ./.github/workflows/basic.yaml
    with:
      docker-image: ${{ needs.resolve-docker-pull-refs-asan.outputs.dev-docker-image }}
      package-artifact-name: ${{ needs.build-asan.outputs.packages-artifact-name }}
      enabled-skus: ALL_SKUS_IN_TESTS
      per-test-timeout: 15 # max minutes for any SKU timeout in the basic tests yaml
      product: tt-metalium

  # ===========================================================================
  # Team: triage
  # test list: triage_merge_gate_tests.yaml
  # ===========================================================================

  triage-tests:
    needs: [build, resolve-docker-pull-refs, find-changes, check-harbor]
    secrets: inherit
    uses: ./.github/workflows/triage-tests-impl.yaml
    with:
      test-category: merge_gate
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build.outputs.wheel-artifact-name }}
      build-artifact-name: ${{ needs.build.outputs.build-artifact-name }}
      enabled-skus: ALL_SKUS_IN_TESTS
      per-test-timeout: 15

  # ===========================================================================
  # Team: ttnn
  # test list: ttnn_validation_merge_gate_tests.yaml,
  #            ttnn_validation_basic_tests.yaml,
  #            ttnn_merge_gate_tests.yaml
  # ===========================================================================

  ttnn-smoke-tests:
    needs: [find-changes, resolve-docker-pull-refs-tsan, build-tsan, check-harbor]
    if: ${{ github.ref_name == 'main' ||
            needs.find-changes.outputs.cmake-changed == 'true' ||
            needs.find-changes.outputs.tt-metalium-changed == 'true' ||
            needs.find-changes.outputs.tt-nn-changed == 'true' ||
            needs.find-changes.outputs.tt-metalium-or-tt-nn-tests-changed == 'true'
        }}
    uses: ./.github/workflows/smoke.yaml
    with:
      docker-image: ${{ needs.resolve-docker-pull-refs-tsan.outputs.dev-docker-image }}
      package-artifact-name: ${{ needs.build-tsan.outputs.packages-artifact-name }}
      enabled-skus: ALL_SKUS_IN_TESTS
      per-test-timeout: 15 # max minutes for any SKU timeout in the smoke tests yaml
      product: tt-nn
      enable-kernel-ccache: true

  ttnn-basic-tests:
    needs: [build-asan, resolve-docker-pull-refs-asan, find-changes, check-harbor]
    if: ${{ github.ref_name == 'main' ||
            needs.find-changes.outputs.cmake-changed == 'true' ||
            needs.find-changes.outputs.tt-metalium-changed == 'true' ||
            needs.find-changes.outputs.tt-nn-changed == 'true' ||
            needs.find-changes.outputs.tt-metalium-or-tt-nn-tests-changed == 'true'
        }}
    uses: ./.github/workflows/basic.yaml
    with:
      docker-image: ${{ needs.resolve-docker-pull-refs-asan.outputs.dev-docker-image }}
      package-artifact-name: ${{ needs.build-asan.outputs.packages-artifact-name }}
      enabled-skus: ALL_SKUS_IN_TESTS
      per-test-timeout: 15 # max minutes for any SKU timeout in the basic tests yaml
      product: tt-nn

  ttnn-merge-gate-tests:
    needs: [build, find-changes]
    if: ${{ github.ref_name == 'main' ||
            needs.find-changes.outputs.cmake-changed == 'true' ||
            needs.find-changes.outputs.tt-metalium-changed == 'true' ||
            needs.find-changes.outputs.tt-nn-changed == 'true' ||
            needs.find-changes.outputs.tt-metalium-or-tt-nn-tests-changed == 'true'
        }}
    uses: ./.github/workflows/ttnn-smoke-tests-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build.outputs.wheel-artifact-name }}
      per-test-timeout: 15

  # ===========================================================================
  # Team: models
  # test list: models_merge_gate_tests.yaml (currently empty)
  # ===========================================================================

  models-smoke-tests:
    needs: [build, resolve-docker-pull-refs, find-changes, check-harbor]
    if: ${{ github.ref_name == 'main' ||
             needs.find-changes.outputs.cmake-changed == 'true' ||
             needs.find-changes.outputs.models-changed == 'true' ||
             needs.find-changes.outputs.tt-nn-changed == 'true' ||
             needs.find-changes.outputs.tt-metalium-changed == 'true'
        }}
    secrets: inherit
    uses: ./.github/workflows/models-smoke-tests-impl.yaml
    with:
      enabled-skus: ALL_SKUS_IN_TESTS
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-artifact-name: ${{ needs.build.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build.outputs.wheel-artifact-name }}
      per-test-timeout: 15

  # ===========================================================================
  # Team: train
  # test list: train_merge_gate_tests.yaml
  # ===========================================================================

  train-merge-gate-tests:
    needs: [build, find-changes]
    if: ${{ github.event_name == 'workflow_dispatch' ||
            github.ref_name == 'main' ||
            needs.find-changes.outputs.tt-train-changed == 'true' ||
            needs.find-changes.outputs.cmake-changed == 'true' ||
            needs.find-changes.outputs.tt-metalium-changed == 'true' ||
            needs.find-changes.outputs.tt-nn-changed == 'true'
        }}
    secrets: inherit
    uses: ./.github/workflows/tt-train-tests.yaml
    with:
      test-category: merge_gate
      enabled-skus: ALL_SKUS_IN_TESTS
      docker-image: ${{ needs.build.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build.outputs.build-artifact-name }}
      per-test-timeout: 15

  # ===========================================================================
  # Team: scaleout (fabric)
  # test list: fabric_merge_gate_tests.yaml,
  #            fabric_cpu_only_smoke_merge_gate_tests.yaml
  # ===========================================================================

  scaleout-unit-tests:
    needs: [build, resolve-docker-pull-refs, find-changes, check-harbor]
    if: ${{ github.ref_name == 'main' ||
            needs.find-changes.outputs.cmake-changed == 'true' ||
            needs.find-changes.outputs.tt-metalium-changed == 'true' ||
            needs.find-changes.outputs.tt-nn-changed == 'true' ||
            needs.find-changes.outputs.tt-metalium-or-tt-nn-tests-changed == 'true'
        }}
    secrets: inherit
    uses: ./.github/workflows/fabric-build-and-unit-tests.yaml
    with:
      test-category: merge_gate
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build.outputs.wheel-artifact-name }}
      per-test-timeout: 15

  # Fabric CPU-only tests removed from merge gate — https://github.com/tenstorrent/tt-metal/pull/47987
  # Scaffolding kept for a future smoke subset (fabric_cpu_only_smoke_merge_gate_tests.yaml).
  # When re-enabling: uncomment tests in that yaml, replace `if: false` with a real trigger,
  # and add scaleout-cpu-only-unit-tests back to workflow-status needs + optional-jobs below.
  scaleout-cpu-only-unit-tests:
    needs: [build, resolve-docker-pull-refs, find-changes, check-harbor]
    if: false
    secrets: inherit
    uses: ./.github/workflows/fabric-cpu-only-tests-impl.yaml
    with:
      tests-yaml-path: ./tests/pipeline_reorg/fabric_cpu_only_smoke_merge_gate_tests.yaml
      test-category: smoke
      runs-on-sku: cpu_medium
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build.outputs.wheel-artifact-name }}
      per-test-timeout: 15

  # ===========================================================================
  # Team: llk
  # test list: llk_merge_gate_tests.yaml
  # ===========================================================================

  # Merge-gate LLK gtest matrix (tests/pipeline_reorg/llk_merge_gate_tests.yaml).
  # SKU coverage is narrowed via sku-allowlist from find-changes. L2 nightly uses
  # tests/pipeline_reorg/llk_unit_tests.yaml. merge_group prio routing is via
  # prepare_test_matrix --event + sku_config merge_queue_sku.
  llk-unit-tests:
    needs: [build, resolve-docker-pull-refs, find-changes]
    if: ${{
        github.event.action != 'destroyed' &&
        github.event_name != 'pull_request' &&
        (github.ref_name == 'main' ||
         needs.find-changes.outputs.llk-wormhole-changed == 'true' ||
         needs.find-changes.outputs.llk-blackhole-changed == 'true' ||
         needs.find-changes.outputs.llk-common-changed == 'true' ||
         needs.find-changes.outputs.llk-sfpi-changed == 'true' ||
         needs.find-changes.outputs.llk-unit-tests-changed == 'true' ||
         needs.find-changes.outputs.llk-ci-changed == 'true')
      }}
    secrets: inherit
    uses: ./.github/workflows/llk-unit-tests-impl.yaml
    with:
      test-category: merge_gate
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build.outputs.build-artifact-name }}
      per-test-timeout: 15
      enabled-skus: ALL_SKUS_IN_TESTS
      # "*" = no allowlist filter; empty = skip all; else CSV of logical SKUs.
      sku-allowlist: ${{
          (github.ref_name == 'main'
           || needs.find-changes.outputs.llk-common-changed == 'true'
           || needs.find-changes.outputs.llk-sfpi-changed == 'true'
           || needs.find-changes.outputs.llk-unit-tests-changed == 'true'
           || needs.find-changes.outputs.llk-ci-changed == 'true'
           || (needs.find-changes.outputs.llk-wormhole-changed == 'true'
               && needs.find-changes.outputs.llk-blackhole-changed == 'true'))
          && '*'
          || (needs.find-changes.outputs.llk-wormhole-changed == 'true' && 'wh_n150_civ2')
          || (needs.find-changes.outputs.llk-blackhole-changed == 'true' && 'bh_p150b_civ2_viommu')
          || '' }}

  # ===========================================================================
  # Team: shield
  # No merge-gate jobs yet.
  # ===========================================================================

  # ===========================================================================
  # Team: blaze
  # No merge-gate jobs yet.
  # ===========================================================================

  # ===========================================================================
  # Status
  # ===========================================================================

  # GitHub has so many design limitations it's not even funny.
  # This job is purely so we can capture the essence of the workflow as a whole in our status checks.
  workflow-status:
    name: Merge Gate Status
    # Force this job to run so GH can 'see' it, provided some other job has actually run.
    # Otherwise if the entire workflow has been skipped (eg: the PR was in Draft), then this will
    # report FAILED instead of SKIPPED.
    if: >-
      ${{
        always() &&
        contains(join(needs.*.result, ','), 'success') ||
        contains(join(needs.*.result, ','), 'failure')
      }}

    needs: [static-checks, docker-images, find-changes, build, build-tsan, build-sweeps, runtime-smoke-tests, runtime-basic-tests, triage-tests, ttnn-smoke-tests, ttnn-basic-tests, ttnn-merge-gate-tests, models-smoke-tests, train-merge-gate-tests, scaleout-unit-tests, llk-unit-tests]
    runs-on: ubuntu-slim
    steps:
      - name: Check if all jobs passed
        uses: tenstorrent/tt-metal/.github/actions/workflow-status@main
        with:
          required-jobs: "static-checks, find-changes"
          optional-jobs: "build, build-tsan, build-sweeps, runtime-smoke-tests, runtime-basic-tests, triage-tests, ttnn-smoke-tests, ttnn-basic-tests, ttnn-merge-gate-tests, models-smoke-tests, train-merge-gate-tests, scaleout-unit-tests, llk-unit-tests"
        env:
          NEEDS_CONTEXT: "${{ toJSON(needs) }}"
      - if: (failure() && contains(join(needs.*.result, ','), 'failure') && github.event_name == 'merge_group')
        uses: tenstorrent/tt-metal/.github/actions/slack-report-merge-gate@main
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_WEBHOOK_URL }}
          owner: ""
      - if: (failure() && contains(join(needs.*.result, ','), 'failure') && github.ref == 'refs/heads/main')
        uses: tenstorrent/tt-metal/.github/actions/slack-report-merge-gate-main@main
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_WEBHOOK_URL }}
          owner: "U0AK4BVCFM0,S0985AN7TC5"
