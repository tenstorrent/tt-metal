name: "[internal] Single-card profiler tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: false
        type: string
      test-selection:
        required: false
        type: string
        default: "all"
      ref:
        required: false
        type: string
        default: ""
      enable-watcher:
        required: false
        type: boolean
        default: false
      enable-lightweight-kernel-asserts:
        required: false
        type: boolean
        default: false
      enable-llk-asserts:
        required: false
        type: boolean
        default: false

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.apply-mode-filter.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/single_card_profiler_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        # "integration" category is a placeholder, see
        # https://github.com/tenstorrent/tt-metal/issues/44285
        run: |
          set -e
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "integration"
      - name: Build test matrix
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Apply mode filter
        id: apply-mode-filter
        # Inputs flow via env vars so shell metacharacters in cmd fields
        # (e.g. `awk '{print $1}'`) can't break the shell parser.
        env:
          MATRIX_JSON: ${{ steps.build-matrix.outputs.matrix }}
          TEST_SELECTION: ${{ inputs.test-selection }}
          ENABLED_SKUS: ${{ inputs.enabled-skus }}
        run: |
          if [ "$TEST_SELECTION" = "all" ]; then
            FILTERED="$MATRIX_JSON"
          else
            FILTERED=$(jq -c --arg m "$TEST_SELECTION" '[.[] | select(.mode == null or .mode == $m)]' <<<"$MATRIX_JSON")
          fi
          if [ "$FILTERED" = "[]" ]; then
            echo "::error::No tests match enabled-skus='$ENABLED_SKUS' + test-selection='$TEST_SELECTION'."
            exit 1
          fi
          {
            echo "matrix<<EOF"
            echo "$FILTERED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  single-card-profiler-tests:
    needs: load-test-matrix
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        # Derive arch from SKU prefix — bh_* runs on blackhole, anything else
        # is wormhole_b0. Avoids carrying an arch field on every matrix entry.
        ARCH_NAME: ${{ startsWith(matrix.test-group.sku, 'bh_') && 'blackhole' || 'wormhole_b0' }}
        LOGURU_LEVEL: INFO
        PROFILER_SCRIPTS_ROOT: /work/tools/tracy
        PROFILER_TEST_SCRIPTS_ROOT: /work/tests/tt_metal/tools/profiler
        PROFILER_ARTIFACTS_DIR: /work/generated/profiler
        PROFILER_OUTPUT_DIR: /work/generated/profiler/reports
        DONT_USE_VIRTUAL_ENVIRONMENT: 1
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          submodules: recursive
          path: docker-job
      - name: Mark repository as safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher }}
          enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts }}
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          ${{ matrix.test-group.cmd }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
