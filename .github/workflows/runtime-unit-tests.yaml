name: "(Runtime) Tests"

on:
  workflow_dispatch:
    inputs:
      # Architecture selection
      wormhole:
        description: "Run on Wormhole"
        required: false
        type: boolean
        default: true
      blackhole:
        description: "Run on Blackhole"
        required: false
        type: boolean
        default: true
      # Test level selection
      run-sanity-tests:
        description: "Run sanity tests (quick dispatch + device + API health check)"
        required: false
        type: boolean
        default: true
      run-unit-tests:
        description: "Run unit tests (single-chip C++ gtests, FD + SD)"
        required: false
        type: boolean
        default: true
      run-integration-tests:
        description: "Run integration tests (BH multi-card + Galaxy)"
        required: false
        type: boolean
        default: true
      run-perf-tests:
        description: "Run dispatch performance tests"
        required: false
        type: boolean
        default: true
      # Build options
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"

jobs:
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-wheel: true
      enable-lto: ${{ inputs.enable-lto || false }}

  resolve-skus:
    runs-on: ubuntu-latest
    outputs:
      sanity-skus: ${{ steps.resolve.outputs.sanity-skus }}
      unit-skus: ${{ steps.resolve.outputs.unit-skus }}
      integration-skus: ${{ steps.resolve.outputs.integration-skus }}
      perf-skus: ${{ steps.resolve.outputs.perf-skus }}
    steps:
      - id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "sanity-skus=wh_n150_civ2,bh_p150b_civ2" >> "$GITHUB_OUTPUT"
            echo "unit-skus=wh_n150_civ2,wh_n300_civ2,bh_p150b_civ2,bh_p100a_civ2_viommu,bh_p150b_civ2_viommu,bh_quietbox,wh_galaxy" >> "$GITHUB_OUTPUT"
            echo "integration-skus=bh_quietbox,bh_loudbox,wh_galaxy,bh_galaxy" >> "$GITHUB_OUTPUT"
            echo "perf-skus=wh_n300_civ2,bh_p150_perf" >> "$GITHUB_OUTPUT"
          else
            sanity_skus=""
            unit_skus=""
            integration_skus=""
            perf_skus=""
            if [[ "${{ inputs.wormhole }}" == "true" ]]; then
              sanity_skus="wh_n150_civ2"
              unit_skus="wh_n150_civ2,wh_n300_civ2,wh_galaxy"
              integration_skus="wh_galaxy"
              perf_skus="wh_n300_civ2"
            fi
            if [[ "${{ inputs.blackhole }}" == "true" ]]; then
              [ -n "$sanity_skus" ] && sanity_skus="${sanity_skus},"
              sanity_skus="${sanity_skus}bh_p150b_civ2"
              [ -n "$unit_skus" ] && unit_skus="${unit_skus},"
              unit_skus="${unit_skus}bh_p150b_civ2,bh_p100a_civ2_viommu,bh_p150b_civ2_viommu,bh_quietbox"
              [ -n "$integration_skus" ] && integration_skus="${integration_skus},"
              integration_skus="${integration_skus}bh_quietbox,bh_loudbox,bh_galaxy"
              [ -n "$perf_skus" ] && perf_skus="${perf_skus},"
              perf_skus="${perf_skus}bh_p150_perf"
            fi
            echo "sanity-skus=$sanity_skus" >> "$GITHUB_OUTPUT"
            echo "unit-skus=$unit_skus" >> "$GITHUB_OUTPUT"
            echo "integration-skus=$integration_skus" >> "$GITHUB_OUTPUT"
            echo "perf-skus=$perf_skus" >> "$GITHUB_OUTPUT"
          fi

  runtime-sanity-tests:
    needs: [build-artifact, resolve-skus]
    if: ${{ github.event_name == 'schedule' || inputs.run-sanity-tests }}
    uses: ./.github/workflows/runtime-sanity-tests-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      enabled-skus: ${{ needs.resolve-skus.outputs.sanity-skus }}

  runtime-unit-tests:
    needs: [build-artifact, resolve-skus]
    if: ${{ github.event_name == 'schedule' || inputs.run-unit-tests }}
    uses: ./.github/workflows/runtime-unit-tests-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      enabled-skus: ${{ needs.resolve-skus.outputs.unit-skus }}

  runtime-integration-tests:
    needs: [build-artifact, resolve-skus]
    if: ${{ github.event_name == 'schedule' || inputs.run-integration-tests }}
    uses: ./.github/workflows/runtime-integration-tests-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      enabled-skus: ${{ needs.resolve-skus.outputs.integration-skus }}

  runtime-perf-tests:
    needs: [build-artifact, resolve-skus]
    if: ${{ github.event_name == 'schedule' || inputs.run-perf-tests }}
    uses: ./.github/workflows/runtime-perf-tests-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      enabled-skus: ${{ needs.resolve-skus.outputs.perf-skus }}

  runtime-fd-python-tests:
    needs: [build-artifact, resolve-skus]
    if: ${{ github.event_name == 'schedule' || inputs.run-integration-tests }}
    uses: ./.github/workflows/runtime-fd-python-tests-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.resolve-skus.outputs.unit-skus }}
