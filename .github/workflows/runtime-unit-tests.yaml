name: "(Runtime) Unit Tests"

# Nightly schedule restores coverage previously run via L2 Nightly; staggered to reduce runner contention.
# Manual validation completed before enabling (see PR #40962 discussion).
on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC daily
  workflow_dispatch:
    inputs:
      sku:
        description: "Select machine/SKU to test (jobs with no coverage for the SKU are skipped)"
        required: false
        default: all
        type: choice
        options:
          - all
          - "wh_n150_civ2 (N150)"
          - "wh_n300_civ2 (N300)"
          - "wh_llmbox (WH LLMBox)"
          - "wh_galaxy (WH Galaxy)"
          - "bh_p150b_civ2 (P150b)"
          - "bh_p100a_civ2_viommu (P100a viommu)"
          - "bh_p150b_civ2_viommu (P150b viommu)"
          - "bh_p300 (P300)"
          - "bh_loudbox (BH LoudBox)"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  resolve-skus:
    runs-on: ubuntu-latest
    outputs:
      enabled-skus: ${{ steps.resolve.outputs.enabled-skus }}
    steps:
      - name: Resolve SKU selection
        id: resolve
        run: |
          ALL_SKUS="wh_n150_civ2,wh_n300_civ2,wh_llmbox,bh_p150b_civ2,bh_p100a_civ2_viommu,bh_p150b_civ2_viommu,bh_p300,bh_loudbox,wh_galaxy"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SKU_INPUT="${{ inputs.sku || 'all' }}"
            if [[ "$SKU_INPUT" == "all" ]]; then
              echo "enabled-skus=$ALL_SKUS" >> $GITHUB_OUTPUT
            else
              SKU_NAME=$(echo "$SKU_INPUT" | sed 's/ (.*//')
              echo "enabled-skus=$SKU_NAME" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi
          echo "enabled-skus=$ALL_SKUS" >> $GITHUB_OUTPUT
  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: ${{ inputs.build-type || 'Release' }}
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}

  runtime-unit-tests:
    needs: [check-harbor, build-artifact, resolve-skus]
    uses: ./.github/workflows/runtime-unit-tests-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      enabled-skus: ${{ needs.resolve-skus.outputs.enabled-skus }}
