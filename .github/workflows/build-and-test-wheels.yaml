name: "[post-commit] Python wheels build and test"

# This workflow tests that wheels can be built with and without build-artifact.

on:
  workflow_dispatch:
    inputs:
      from-precompiled:
        description: "Use precompiled assets for wheel build, skip build-artifact"
        default: True
        type: boolean

jobs:
  build-artifact:
    if: ${{ inputs.from-precompiled }}
    uses: ./.github/workflows/build-artifact.yaml
    secrets: inherit
    with:
      build-wheel: true
  test-wheels:
    needs: build-artifact
    uses: ./.github/workflows/_test-wheels-impl.yaml
    with:
      from-precompiled: ${{ inputs.from-precompiled }}
