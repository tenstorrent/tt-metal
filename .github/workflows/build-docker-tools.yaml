name: "[internal] Build Docker tool images"

# Reusable workflow that checks and builds tool images (ccache, mold, doxygen, etc.).
# Called by build-docker-artifact.yaml. Tool images are pushed to GHCR.
#
# Uses manual docker buildx bake (dockerfile/docker-bake.hcl) to build missing tools.
permissions:
  packages: write

env:
  BAKE_OUTPUT: type=image,push=true,compression=zstd,compression-level=22,force-compression=true,oci-mediatypes=true

on:
  workflow_call:
    inputs:
      force-rebuild:
        required: false
        type: boolean
        default: false
        description: "Force rebuild of all tool images even if they exist in registry"
    outputs:
      # JSON bundle containing all tool tags
      tool-tags:
        description: "JSON object containing all tool image tags"
        value: ${{ jobs.tags.outputs.tool-tags }}

jobs:
  # Compute content-addressed tags and check which images already exist
  tags:
    name: "📋 Compute tool tags"
    runs-on: ubuntu-latest
    outputs:
      tool-tags: ${{ steps.tags.outputs.tool-tags }}
      any-missing: ${{ steps.check.outputs.any-missing }}
      # Per-tool existence flags and tags (consumed by build job)
      ccache-exists: ${{ steps.check.outputs.ccache-exists }}
      mold-exists: ${{ steps.check.outputs.mold-exists }}
      doxygen-exists: ${{ steps.check.outputs.doxygen-exists }}
      cba-exists: ${{ steps.check.outputs.cba-exists }}
      gdb-exists: ${{ steps.check.outputs.gdb-exists }}
      cmake-exists: ${{ steps.check.outputs.cmake-exists }}
      yq-exists: ${{ steps.check.outputs.yq-exists }}
      sfpi-exists: ${{ steps.check.outputs.sfpi-exists }}
      openmpi-exists: ${{ steps.check.outputs.openmpi-exists }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute tool image tags
        id: tags
        env:
          HARBOR_PREFIX: ${{ vars.HARBOR_PREFIX || '' }}
        run: |
          set -euo pipefail
          TOOL_TAGS=$(.github/scripts/compute-tool-tags.sh "${{ github.repository }}")
          echo "tool-tags<<EOJSON" >> $GITHUB_OUTPUT
          echo "$TOOL_TAGS" >> $GITHUB_OUTPUT
          echo "EOJSON" >> $GITHUB_OUTPUT

      - name: Check if tool images exist
        id: check
        run: |
          set -euo pipefail
          TOOL_TAGS='${{ steps.tags.outputs.tool-tags }}'
          FORCE_REBUILD="${{ inputs.force-rebuild }}"
          any_missing=false
          for key in ccache mold doxygen cba gdb cmake yq sfpi openmpi; do
            tag=$(echo "$TOOL_TAGS" | jq -r ".\"${key}-tag\"")
            if [ "$FORCE_REBUILD" = "true" ]; then
              echo "Force rebuild enabled: treating $tag as missing"
              echo "${key}-exists=false" >> $GITHUB_OUTPUT
              any_missing=true
            elif docker manifest inspect "$tag" > /dev/null 2>&1; then
              echo "$tag exists"
              echo "${key}-exists=true" >> $GITHUB_OUTPUT
            else
              echo "$tag does not exist"
              echo "${key}-exists=false" >> $GITHUB_OUTPUT
              any_missing=true
            fi
          done
          echo "any-missing=${any_missing}" >> $GITHUB_OUTPUT

  # Build any tool images that don't exist yet using manual docker bake
  build:
    name: "🔧 Build missing tools"
    needs: tags
    if: needs.tags.outputs.any-missing == 'true'
    timeout-minutes: 60
    runs-on: tt-ubuntu-2204-large-stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare bake overrides
        id: bake
        env:
          TOOL_TAGS: ${{ needs.tags.outputs.tool-tags }}
        run: |
          set -euo pipefail
          TARGETS=""
          SET=""

          add_if_missing() {
            local name="$1"
            local exists="$2"
            if [ "$exists" != "true" ]; then
              local tag
              tag=$(echo "$TOOL_TAGS" | jq -r ".\"${name}-tag\"")
              TARGETS+="${name},"
              SET+="${name}.tags=${tag}"$'\n'
              SET+="${name}.output=${BAKE_OUTPUT}"$'\n'
            fi
          }

          add_if_missing ccache "${{ needs.tags.outputs.ccache-exists }}"
          add_if_missing mold "${{ needs.tags.outputs.mold-exists }}"
          add_if_missing doxygen "${{ needs.tags.outputs.doxygen-exists }}"
          add_if_missing cba "${{ needs.tags.outputs.cba-exists }}"
          add_if_missing gdb "${{ needs.tags.outputs.gdb-exists }}"
          add_if_missing cmake "${{ needs.tags.outputs.cmake-exists }}"
          add_if_missing yq "${{ needs.tags.outputs.yq-exists }}"
          add_if_missing sfpi "${{ needs.tags.outputs.sfpi-exists }}"
          add_if_missing openmpi "${{ needs.tags.outputs.openmpi-exists }}"

          TARGETS="${TARGETS%,}"

          echo "targets=$TARGETS" >> $GITHUB_OUTPUT
          {
            echo "set<<EOF"
            echo "$SET"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push missing tool images
        if: steps.bake.outputs.targets != ''
        uses: ./.github/actions/manual-docker-bake
        with:
          targets: ${{ steps.bake.outputs.targets }}
          set-lines: ${{ steps.bake.outputs.set }}
