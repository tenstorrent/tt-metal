name: "[tt-train] Build and Test"

on:
  workflow_call:
    inputs:
      docker-image:
        required: false
        type: string
        default: ""
        description: "Docker image to use for build and test"
      build-artifact-name:
        required: false
        type: string
        default: ""
        description: "Build artifact name to use (skips build if provided)"
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  build-artifact:
    needs: check-harbor
    if: ${{ !inputs.build-artifact-name }}
    uses: ./.github/workflows/build-artifact.yaml
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: Release
      skip-tt-train: false
      platform: "Ubuntu 22.04"

  run-tt-train-tests:
    needs: [check-harbor, build-artifact]
    if: ${{ always() && (needs.build-artifact.result == 'success' || needs.build-artifact.result == 'skipped') }}
    uses: ./.github/workflows/tt-train-post-commit.yaml
    secrets: inherit
    with:
      arch: wormhole_b0
      runner-label: N150
      docker-image: >-
        ${{ inputs.docker-image
            || format('{0}{1}', needs.check-harbor.outputs.harbor-prefix, needs.build-artifact.outputs.dev-docker-image)
            || 'docker-image-unresolved!' }}
      build-artifact-name: >-
        ${{ inputs.build-artifact-name
            || needs.build-artifact.outputs.build-artifact-name
            || 'build-artifact-unresolved!' }}

  validate-pr:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [run-tt-train-tests]
    steps:
      - run: |
          test_result="${{ needs.run-tt-train-tests.result }}"
          if [[ $test_result == "success" ]] ; then
            exit 0
          else
            exit 1
          fi
