name: "Sanity tests"

on:
  workflow_call:
    inputs:
      build-type:
        required: false
        default: Release
        type: string
        description: "Build type configuration (Release, Debug, RelWithDebInfo, ASan, TSan)"
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
        description: "Platform to build and test (e.g., 'Ubuntu 22.04', 'Ubuntu 24.04')"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      with-retries:
        required: false
        type: boolean
        default: false
        description: "Re-run failed jobs (max 3)"
      run-wormhole:
        required: false
        type: boolean
        default: true
        description: "Run the Wormhole suite"
      run-blackhole:
        required: false
        type: boolean
        default: true
        description: "Run the Blackhole suite"
      run-sim:
        required: false
        default: true
        type: boolean
        description: "Run the TTSim suite"
      run-ttnn-sanity-tests:
        required: false
        type: boolean
        default: true
        description: "Run TTNN sanity tests"
      run-t3000-apc-fast-tests:
        required: false
        type: boolean
        default: true
        description: "Run T3000 APC fast tests"
      run-ops-sanity-tests:
        required: false
        type: boolean
        default: true
        description: "Run ops unit tests"
      run-umd-sanity-tests:
        required: false
        type: boolean
        default: true
        description: "Run UMD sanity tests (Blackhole)"
      run-ttsim-sanity-tests:
        required: false
        type: boolean
        default: true
        description: "Run TTSim sanity tests"
      run-blackhole-multi-card-sanity-tests:
        required: false
        default: true
        type: boolean
        description: "Run Blackhole multi-card sanity tests"
      enable-watcher:
        required: false
        type: boolean
        default: false
        description: "Enable watcher for long-running tests"
      enable-lightweight-kernel-asserts:
        required: false
        type: boolean
        default: false
        description: "Enable lightweight kernel asserts"
      enable-llk-asserts:
        required: false
        type: boolean
        default: false
        description: "Enable LLK asserts"
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
  workflow_dispatch:
    inputs:
      with-retries:
        default: false
        type: boolean
        description: "Re-run failed jobs (max 3)"
      run-wormhole:
        required: false
        default: true
        type: boolean
        description: "Run the Wormhole suite"
      run-blackhole:
        required: false
        default: true
        type: boolean
        description: "Run the Blackhole suite"
      run-sim:
        required: false
        default: true
        type: boolean
        description: "Run the TTSim suite"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        default: Release
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
      enable-lto:
        required: false
        default: false
        type: boolean
        description: "Enable Link Time Optimization (LTO)"
      run-ttnn-sanity-tests:
        required: false
        default: true
        type: boolean
        description: "Run TTNN sanity tests"
      run-t3000-apc-fast-tests:
        required: false
        default: true
        type: boolean
        description: "Run T3000 APC fast tests"
      run-ops-sanity-tests:
        required: false
        default: true
        type: boolean
        description: "Run ops unit tests"
      run-umd-sanity-tests:
        required: false
        default: true
        type: boolean
        description: "Run UMD sanity tests"
      run-ttsim-sanity-tests:
        required: false
        default: true
        type: boolean
        description: "Run TTSim sanity tests"
      run-blackhole-multi-card-sanity-tests:
        required: false
        default: true
        type: boolean
        description: "Run Blackhole multi-card sanity tests"
      enable-watcher:
        required: false
        default: false
        type: boolean
        description: "Enable watcher for long-running tests"
      enable-lightweight-kernel-asserts:
        required: false
        default: false
        type: boolean
        description: "Enable lightweight kernel asserts"
      enable-llk-asserts:
        required: false
        default: false
        type: boolean
        description: "Enable LLK asserts"
  push:
    branches: ["main"]
  schedule:
    # Scheduled (cron) runs fire the Blackhole + sim suite (Wormhole excluded).
    - cron: "0 */4 * * *"

permissions:
  actions: read
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  packages: write
  checks: write

run-name: Sanity tests(${{ (github.event_name == 'workflow_dispatch' && inputs.with-retries) && ' with retries' || ''}}${{ (github.event_name == 'schedule') && ' Blackhole' || ''}})
jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  # NOTE: build-artifact.yaml handles platform parsing internally.
  # Just pass platform and enable-lto inputs directly.
  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      tracy: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      skip-tt-train: false
      build-umd-tests: true
      enable-lto: ${{ inputs.enable-lto || false }}
      ref: ${{ inputs.ref || github.sha }}

  resolve-docker-pull-refs:
    needs: [check-harbor, build-artifact]
    if: ${{ !cancelled() && needs.build-artifact.result == 'success' }}
    uses: ./.github/workflows/resolve-docker-pull-refs.yaml
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      dev-docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      basic-dev-docker-image: ${{ needs.build-artifact.outputs.basic-dev-docker-image }}
      ci-test-docker-image: ${{ needs.build-artifact.outputs.ci-test-docker-image }}
      basic-docker-image: ${{ needs.build-artifact.outputs.basic-dev-docker-image }}
      test-docker-image: ${{ needs.build-artifact.outputs.ci-test-docker-image }}

  # Single SKU list that gates every suite (L2-nightly style). Each impl filters this list against
  # its own tests yaml via prepare_test_matrix.py, so an empty intersection just yields no jobs.
  generate-sku-matrix:
    runs-on: ubuntu-latest
    outputs:
      sanity-skus: ${{ steps.parse.outputs.sanity-skus }}
    steps:
      - id: parse
        run: |
          # push -> Wormhole + sim; scheduled (cron) -> Blackhole; workflow_call/dispatch -> per
          # run-wormhole / run-blackhole / run-sim. Each impl filters this list to what it supports.
          if [[ "${{ github.event_name }}" == "push" ]]; then
            run_wormhole=true
            run_blackhole=false
            run_sim=true
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            run_wormhole=false
            run_blackhole=true
            run_sim=false
          else
            run_wormhole='${{ inputs.run-wormhole }}'
            run_blackhole='${{ inputs.run-blackhole }}'
            run_sim='${{ inputs.run-sim }}'
          fi

          if [[ "$run_wormhole" != "true" && "$run_blackhole" != "true" && "$run_sim" != "true" ]]; then
            echo "❌ Error: Neither wormhole, blackhole, nor sim was selected."
            exit 1
          fi

          sanity_skus=()
          if [[ "$run_wormhole" == "true" ]]; then
            sanity_skus+=("wh_n300_civ2")
          fi
          if [[ "$run_blackhole" == "true" ]]; then
            sanity_skus+=("bh_p150b_civ2" "bh_p150b_civ2_viommu" "bh_quietbox_2" "bh_p300")
          fi
          if [[ "$run_sim" == "true" ]]; then
            sanity_skus+=("sim_wormhole_b0" "sim_wormhole_b0_galaxy" "sim_blackhole" "sim_blackhole_galaxy")
          fi

          sanity_skus_str=$(IFS=,; echo "${sanity_skus[*]}")
          echo "sanity-skus=$sanity_skus_str" >> "$GITHUB_OUTPUT"

  # TTNN sanity tests
  ttnn-sanity-tests:
    needs: [build-artifact, generate-sku-matrix]
    secrets: inherit
    if: ${{ always() && !cancelled() && needs.build-artifact.result == 'success' && needs.generate-sku-matrix.outputs.sanity-skus != '' && toJSON(inputs.run-ttnn-sanity-tests) != 'false' }}
    uses: ./.github/workflows/ttnn-sanity-tests-impl.yaml
    with:
      # HW and sim SKUs share one call; sim_* SKUs run on ubuntu-latest (no Harbor access), so this
      # uses the canonical GHCR image from build-artifact (not the Harbor-resolved ref).
      enabled-skus: ${{ needs.generate-sku-matrix.outputs.sanity-skus }}
      docker-image: ${{ needs.build-artifact.outputs.ci-test-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      timeout-minutes-override: ${{ inputs.enable-watcher && 240 || 0 }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}

  t3000-apc-fast-tests:
    if: ${{ always() && !cancelled() && needs.build-artifact.result == 'success' && contains(needs.generate-sku-matrix.outputs.sanity-skus, 'wh_') && toJSON(inputs.run-t3000-apc-fast-tests) != 'false' }}
    needs: [build-artifact, generate-sku-matrix]
    secrets: inherit
    uses: ./.github/workflows/t3000-sanity-tests-impl.yaml
    with:
      enabled-skus: "wh_llmbox"
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      timeout-minutes-override: ${{ inputs.enable-watcher && 80 || 0 }}
      ref: ${{ inputs.ref || github.sha }}

  # Ops sanity (Wormhole + Blackhole via ops_sanity_tests.yaml)
  ops-sanity-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-sku-matrix]
    secrets: inherit
    if: ${{ always() && !cancelled() && needs.resolve-docker-pull-refs.result == 'success' && needs.build-artifact.result == 'success' && (contains(needs.generate-sku-matrix.outputs.sanity-skus, 'wh_') || contains(needs.generate-sku-matrix.outputs.sanity-skus, 'bh_')) && toJSON(inputs.run-ops-sanity-tests) != 'false' }}
    uses: ./.github/workflows/ops-sanity-impl.yaml
    with:
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.generate-sku-matrix.outputs.sanity-skus }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}

  # UMD sanity (Blackhole + Wormhole n300 via umd_sanity_tests.yaml)
  umd-sanity-tests:
    needs: [resolve-docker-pull-refs, build-artifact, generate-sku-matrix]
    secrets: inherit
    if: ${{ always() && !cancelled() && needs.resolve-docker-pull-refs.result == 'success' && needs.build-artifact.result == 'success' && (contains(needs.generate-sku-matrix.outputs.sanity-skus, 'wh_') || contains(needs.generate-sku-matrix.outputs.sanity-skus, 'bh_')) && toJSON(inputs.run-umd-sanity-tests) != 'false' }}
    uses: ./.github/workflows/umd-sanity-tests-impl.yaml
    with:
      enabled-skus: ${{ needs.generate-sku-matrix.outputs.sanity-skus }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}

  ttsim-sanity-tests:
    needs: [build-artifact, generate-sku-matrix]
    if: ${{ !cancelled() && needs.build-artifact.result == 'success' && contains(needs.generate-sku-matrix.outputs.sanity-skus, 'sim_') && toJSON(inputs.run-ttsim-sanity-tests) != 'false' }}
    uses: ./.github/workflows/ttsim-sanity-tests-impl.yaml
    secrets: inherit
    with:
      basic-docker-image: ${{ needs.build-artifact.outputs.basic-dev-docker-image }}
      package-artifact-name: ${{ needs.build-artifact.outputs.packages-artifact-name }}
      ref: ${{ inputs.ref || github.sha }}

  runtime-sim-sanity-tests:
    needs: [build-artifact, generate-sku-matrix]
    if: ${{ !cancelled() && needs.build-artifact.result == 'success' && contains(needs.generate-sku-matrix.outputs.sanity-skus, 'sim_') && toJSON(inputs.run-ttsim-sanity-tests) != 'false' }}
    uses: ./.github/workflows/runtime-sanity-tests-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-artifact.outputs.ci-test-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.generate-sku-matrix.outputs.sanity-skus }}
      ref: ${{ inputs.ref || github.sha }}

  # Blackhole multi-card post-commit tests (QB2/P300 box).
  blackhole-multi-card-fast-sanity-tests:
    if: ${{ always() && !cancelled() && needs.build-artifact.result == 'success' && contains(needs.generate-sku-matrix.outputs.sanity-skus, 'bh_') && toJSON(inputs.run-blackhole-multi-card-sanity-tests) != 'false' }}
    needs: [build-artifact, generate-sku-matrix]
    secrets: inherit
    uses: ./.github/workflows/blackhole-multi-card-sanity-tests-impl.yaml
    with:
      enabled-skus: ${{ needs.generate-sku-matrix.outputs.sanity-skus }}
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}
