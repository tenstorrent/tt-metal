name: "Sanity tests"

on:
  workflow_call:
    inputs:
      build-type:
        required: false
        default: Release
        type: string
        description: "Build type configuration (Release, Debug, RelWithDebInfo, ASan, TSan)"
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
        description: "Platform to build and test (e.g., 'Ubuntu 22.04', 'Ubuntu 24.04')"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      with-retries:
        required: false
        type: boolean
        default: false
        description: "Re-run failed jobs (max 3)"
      run-ttnn-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run TTNN unit tests"
      run-models-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run model unit tests"
      run-tt-train-cpp-unit-tests:
        required: false
        type: boolean
        default: false
        description: "Run TT-Train C++ unit tests"
      run-profiler-tests:
        required: false
        type: boolean
        default: true
        description: "Run profiler regression tests"
      run-t3000-apc-fast-tests:
        required: false
        type: boolean
        default: true
        description: "Run T3000 APC fast tests"
      run-ops-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run ops unit tests"
      run-ttsim-tests:
        required: false
        type: boolean
        default: true
        description: "Run TTSim tests (unit + integration)"
      run-ttsim-integration-tests:
        required: false
        type: boolean
        default: true
        description: "Run TTSim integration tests"
      enable-watcher:
        required: false
        type: boolean
        default: false
        description: "Enable watcher for long-running tests"
      enable-lightweight-kernel-asserts:
        required: false
        type: boolean
        default: false
        description: "Enable lightweight kernel asserts"
      enable-llk-asserts:
        required: false
        type: boolean
        default: false
        description: "Enable LLK asserts"
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
      # Pre-built artifacts (optional - if provided, skips build-artifact job)
      dev-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built dev Docker image tag (skips build if provided)"
      build-artifact-name:
        required: false
        type: string
        default: ""
        description: "Pre-built build artifact name (skips build if provided)"
      wheel-artifact-name:
        required: false
        type: string
        default: ""
        description: "Pre-built wheel artifact name (skips build if provided)"
      packages-artifact-name:
        required: false
        type: string
        default: ""
        description: "Pre-built packages artifact name (for ttsim tests)"
  workflow_dispatch:
    inputs:
      with-retries:
        default: false
        type: boolean
        description: "Re-run failed jobs (max 3)"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        default: Release
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
      enable-lto:
        required: false
        default: false
        type: boolean
        description: "Enable Link Time Optimization (LTO)"
      run-ttnn-unit-tests:
        required: false
        default: true
        type: boolean
        description: "Run TTNN unit tests"
      run-models-unit-tests:
        required: false
        default: true
        type: boolean
        description: "Run model unit tests"
      run-tt-train-cpp-unit-tests:
        required: false
        default: false
        type: boolean
        description: "Run TT-Train C++ unit tests"
      run-profiler-tests:
        required: false
        default: true
        type: boolean
        description: "Run profiler regression tests"
      run-t3000-apc-fast-tests:
        required: false
        default: true
        type: boolean
        description: "Run T3000 APC fast tests"
      run-ops-unit-tests:
        required: false
        default: true
        type: boolean
        description: "Run ops unit tests"
      run-ttsim-tests:
        required: false
        default: true
        type: boolean
        description: "Run TTSim tests (unit + integration)"
      run-ttsim-integration-tests:
        required: false
        default: true
        type: boolean
        description: "Run TTSim integration tests"
      enable-watcher:
        required: false
        default: false
        type: boolean
        description: "Enable watcher for long-running tests"
      enable-lightweight-kernel-asserts:
        required: false
        default: false
        type: boolean
        description: "Enable lightweight kernel asserts"
      enable-llk-asserts:
        required: false
        default: false
        type: boolean
        description: "Enable LLK asserts"
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
      brain-fast-dispatch-only:
        required: false
        type: boolean
        default: false
        description: "[BrAIn] Run only the ttsim fast-dispatch async buffer repro job, skip everything else"
  push:
    branches: ["main"]

permissions:
  actions: read
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  packages: write
  checks: write

run-name: Sanity tests${{ (github.event_name == 'workflow_dispatch' && inputs.with-retries) && ' (with retries)' || ''}}
jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  # NOTE: build-artifact.yaml handles platform parsing internally.
  # Just pass platform and enable-lto inputs directly.
  build-artifact:
    needs: check-harbor
    if: ${{ inputs.dev-docker-image == '' && !inputs.brain-fast-dispatch-only }}
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      tracy: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      skip-tt-train: false
      enable-lto: ${{ inputs.enable-lto || false }}
      ref: ${{ inputs.ref || github.sha }}

  resolve-artifacts:
    runs-on: ubuntu-latest
    needs: [build-artifact]
    if: ${{ !cancelled() && (inputs.dev-docker-image != '' || needs.build-artifact.result == 'success') }}
    outputs:
      dev-docker-image: ${{ steps.resolve.outputs.dev-docker-image }}
      basic-dev-docker-image: ${{ steps.resolve.outputs.basic-dev-docker-image }}
      ci-test-docker-image: ${{ steps.resolve.outputs.ci-test-docker-image }}
      build-artifact-name: ${{ steps.resolve.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ steps.resolve.outputs.wheel-artifact-name }}
      packages-artifact-name: ${{ steps.resolve.outputs.packages-artifact-name }}
    steps:
      - id: resolve
        run: |
          # Validate pre-built artifact inputs - all three must be provided together
          if [[ -n "${{ inputs.dev-docker-image }}" || -n "${{ inputs.build-artifact-name }}" || -n "${{ inputs.wheel-artifact-name }}" ]]; then
            if [[ -z "${{ inputs.dev-docker-image }}" || -z "${{ inputs.build-artifact-name }}" || -z "${{ inputs.wheel-artifact-name }}" ]]; then
              echo "Error: When using pre-built artifacts, all three inputs must be provided:"
              echo "  - dev-docker-image: '${{ inputs.dev-docker-image }}'"
              echo "  - build-artifact-name: '${{ inputs.build-artifact-name }}'"
              echo "  - wheel-artifact-name: '${{ inputs.wheel-artifact-name }}'"
              exit 1
            fi
          fi

          # Use provided artifacts if available, otherwise use built artifacts
          if [[ -n "${{ inputs.dev-docker-image }}" ]]; then
            echo "dev-docker-image=${{ inputs.dev-docker-image }}" >> "$GITHUB_OUTPUT"
            echo "basic-dev-docker-image=${{ inputs.dev-docker-image }}" >> "$GITHUB_OUTPUT"
            echo "ci-test-docker-image=${{ inputs.dev-docker-image }}" >> "$GITHUB_OUTPUT"
            echo "build-artifact-name=${{ inputs.build-artifact-name }}" >> "$GITHUB_OUTPUT"
            echo "wheel-artifact-name=${{ inputs.wheel-artifact-name }}" >> "$GITHUB_OUTPUT"
            echo "packages-artifact-name=${{ inputs.packages-artifact-name }}" >> "$GITHUB_OUTPUT"
          else
            echo "dev-docker-image=${{ needs.build-artifact.outputs.dev-docker-image }}" >> "$GITHUB_OUTPUT"
            echo "basic-dev-docker-image=${{ needs.build-artifact.outputs.basic-dev-docker-image }}" >> "$GITHUB_OUTPUT"
            echo "ci-test-docker-image=${{ needs.build-artifact.outputs.ci-test-docker-image }}" >> "$GITHUB_OUTPUT"
            echo "build-artifact-name=${{ needs.build-artifact.outputs.build-artifact-name }}" >> "$GITHUB_OUTPUT"
            echo "wheel-artifact-name=${{ needs.build-artifact.outputs.wheel-artifact-name }}" >> "$GITHUB_OUTPUT"
            echo "packages-artifact-name=${{ needs.build-artifact.outputs.packages-artifact-name }}" >> "$GITHUB_OUTPUT"
          fi

  resolve-docker-pull-refs:
    needs: [check-harbor, resolve-artifacts]
    if: ${{ !cancelled() && needs.resolve-artifacts.result == 'success' }}
    uses: ./.github/workflows/resolve-docker-pull-refs.yaml
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      dev-docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      basic-dev-docker-image: ${{ needs.resolve-artifacts.outputs.basic-dev-docker-image }}
      ci-test-docker-image: ${{ needs.resolve-artifacts.outputs.ci-test-docker-image }}
      basic-docker-image: ${{ needs.resolve-artifacts.outputs.basic-dev-docker-image }}
      test-docker-image: ${{ needs.resolve-artifacts.outputs.ci-test-docker-image }}

  tests-to-run:
    needs: [resolve-artifacts]
    if: ${{ always() && !cancelled() && needs.resolve-artifacts.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      ttnn-unit-tests: ${{ steps.set-ttnn-unit-tests.outputs.should-run }}
      models-unit-tests: ${{ steps.set-models-unit-tests.outputs.should-run }}
      tt-train-cpp-unit-tests: ${{ steps.set-tt-train-cpp-unit-tests.outputs.should-run }}
      run-profiler-tests: ${{ steps.set-run-profiler-tests.outputs.should-run }}
      t3000-apc-fast-tests: ${{ steps.set-t3000-apc-fast-tests.outputs.should-run }}
      ops-unit-tests: ${{ steps.set-ops-unit-tests.outputs.should-run }}
      ttsim-tests: ${{ steps.set-ttsim-tests.outputs.should-run }}
    steps:
      - id: set-ttnn-unit-tests
        run: |
          echo "should-run=${{ github.event_name == 'push' || inputs.run-ttnn-unit-tests }}" >> "$GITHUB_OUTPUT"
      - id: set-models-unit-tests
        run: |
          echo "should-run=${{ github.event_name == 'push' || inputs.run-models-unit-tests }}" >> "$GITHUB_OUTPUT"
      - id: set-tt-train-cpp-unit-tests
        run: |
          echo "should-run=${{ github.event_name == 'push' || inputs.run-tt-train-cpp-unit-tests }}" >> "$GITHUB_OUTPUT"
      - id: set-run-profiler-tests
        run: |
          echo "should-run=${{ github.event_name == 'push' || inputs.run-profiler-tests }}" >> "$GITHUB_OUTPUT"
      - id: set-t3000-apc-fast-tests
        run: |
          echo "should-run=${{ github.event_name == 'push' || inputs.run-t3000-apc-fast-tests }}" >> "$GITHUB_OUTPUT"
      - id: set-ops-unit-tests
        run: |
          echo "should-run=${{ github.event_name == 'push' || inputs.run-ops-unit-tests }}" >> "$GITHUB_OUTPUT"
      - id: set-ttsim-tests
        run: |
          echo "should-run=${{ github.event_name == 'push' || inputs.run-ttsim-tests }}" >> "$GITHUB_OUTPUT"

  # TTNN FD Unit tests
  ttnn-unit-tests:
    needs: [resolve-docker-pull-refs, resolve-artifacts, tests-to-run]
    secrets: inherit
    if: ${{ always() && !cancelled() && needs.resolve-docker-pull-refs.result == 'success' && needs.resolve-artifacts.result == 'success' && needs.tests-to-run.outputs.ttnn-unit-tests == 'true' }}
    uses: ./.github/workflows/ttnn-post-commit.yaml
    with:
      enabled-skus: "wh_n300_civ2"
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      timeout-minutes-override: ${{ inputs.enable-watcher && 240 || 0 }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}

  # FD Model Tests
  models-unit-tests:
    needs: [resolve-docker-pull-refs, resolve-artifacts, tests-to-run]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        test-group: [{ arch: wormhole_b0, runner-label: N300 }]
    if: ${{ always() && !cancelled() && needs.resolve-docker-pull-refs.result == 'success' && needs.resolve-artifacts.result == 'success' && needs.tests-to-run.outputs.models-unit-tests == 'true' }}
    uses: ./.github/workflows/models-post-commit.yaml
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}
      timeout: ${{ inputs.enable-watcher && 120 || 35 }}

  tt-train-cpp-unit-tests:
    needs: [resolve-docker-pull-refs, resolve-artifacts, tests-to-run]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        test-group: [{ arch: wormhole_b0, runner-label: N300 }]
    if: ${{ !cancelled() && needs.resolve-artifacts.result == 'success' && needs.tests-to-run.outputs.tt-train-cpp-unit-tests == 'true' }}
    uses: ./.github/workflows/tt-train-post-commit.yaml
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      gtest_filter: "*-*NIGHTLY_*"
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}

  profiler-tests:
    needs: [resolve-docker-pull-refs, resolve-artifacts, tests-to-run]
    if: ${{ always() && !cancelled() && needs.resolve-docker-pull-refs.result == 'success' && needs.resolve-artifacts.result == 'success' && needs.tests-to-run.outputs.run-profiler-tests == 'true'}}
    uses: ./.github/workflows/single-card-profiler-tests-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      # Sanity historically ran (wormhole_b0, N300) → wh_n300_civ2, post-commit only.
      enabled-skus: wh_n300_civ2
      test-selection: post-commit
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}
  t3000-apc-fast-tests:
    if: ${{ always() && !cancelled() && needs.resolve-docker-pull-refs.result == 'success' && needs.resolve-artifacts.result == 'success' && needs.tests-to-run.outputs.t3000-apc-fast-tests == 'true' }}
    needs: [resolve-docker-pull-refs, resolve-artifacts, tests-to-run]
    secrets: inherit
    uses: ./.github/workflows/t3000-fast-tests-impl.yaml
    with:
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      timeout: ${{ inputs.enable-watcher && 80 || 20 }}
      ref: ${{ inputs.ref || github.sha }}

  ops-unit-tests:
    needs: [resolve-docker-pull-refs, resolve-artifacts, tests-to-run]
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        test-group: [{ arch: wormhole_b0, runner-label: N300 }]
    if: ${{ always() && !cancelled() && needs.resolve-docker-pull-refs.result == 'success' && needs.resolve-artifacts.result == 'success' && needs.tests-to-run.outputs.ops-unit-tests == 'true' }}
    uses: ./.github/workflows/ops-post-commit.yaml
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      docker-image: ${{ needs.resolve-docker-pull-refs.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}

  ttsim-tests:
    needs: [resolve-docker-pull-refs, resolve-artifacts, tests-to-run]
    if: ${{ !cancelled() && needs.resolve-artifacts.result == 'success' && needs.tests-to-run.outputs.ttsim-tests == 'true' }}
    strategy:
      fail-fast: false
    uses: ./.github/workflows/ttsim.yaml
    secrets: inherit
    with:
      basic-docker-image: ${{ needs.resolve-artifacts.outputs.basic-dev-docker-image }}
      test-docker-image: ${{ needs.resolve-artifacts.outputs.ci-test-docker-image }}
      package-artifact-name: ${{ needs.resolve-artifacts.outputs.packages-artifact-name }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      run-ttsim-integration-tests: ${{ github.event_name == 'push' || inputs.run-ttsim-integration-tests }}
      run-metal-cpp-unit-tests: true

  # ── BrAIn investigation: GH #43725 ──────────────────────────────────────
  # Standalone job — no dependency on build-artifact or hardware runners.
  # Builds unit_tests_ttnn from source in CI Docker, runs
  # TestAsyncRuntimeAllocatedBuffers under ttsim v1.8.4 wh_x2 (N300)
  # WITHOUT TT_METAL_SLOW_DISPATCH_MODE so the fast-dispatch path is exercised.
  brain-ttsim-fast-dispatch-async-repro:
    name: "[BrAIn] TestAsyncRuntimeAllocatedBuffers — ttsim wh_x2 fast dispatch"
    if: ${{ inputs.brain-fast-dispatch-only == true }}
    runs-on: tt-ubuntu-2204-large-stable
    timeout-minutes: 90
    container:
      image: ghcr.io/tenstorrent/tt-metal/ubuntu-22.04-amd64:34d2f91cc25df7cba3634c04d98d7c1758563b3a
      volumes:
        - ${{ github.workspace }}:/work
    defaults:
      run:
        shell: bash
        working-directory: /work
    env:
      CC: clang-20
      CXX: clang++-20
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: CMake configure (ttnn tests only)
        run: |
          ./build_metal.sh \
            --build-dir build \
            --build-type Release \
            --toolchain-path cmake/x86_64-linux-clang-20-libstdcpp-toolchain.cmake \
            --build-ttnn-tests \
            --configure-only

      - name: Build unit_tests_ttnn
        run: cmake --build build --target unit_tests_ttnn -j$(nproc)

      - name: Download ttsim v1.8.4 (wh_x2 = N300 / 2-chip WH)
        run: |
          mkdir -p sim
          curl -fL --retry 5 --retry-delay 10 \
            "https://github.com/tenstorrent/ttsim/releases/download/v1.8.4/libttsim_wh_x2.so" \
            -o sim/libttsim.so
          cp tt_metal/soc_descriptors/wormhole_b0_80_arch.yaml sim/soc_descriptor.yaml
          echo "ttsim: $(ls -lh sim/libttsim.so)"

      - name: Run TestAsyncRuntimeAllocatedBuffers (fast dispatch — no slow-dispatch env)
        env:
          TT_METAL_SIMULATOR_HOME: /work/sim
          TT_METAL_SIMULATOR: /work/sim/libttsim.so
          TT_METAL_MOCK_CLUSTER_DESC_PATH: tests/tt_metal/tt_fabric/custom_mock_cluster_descriptors/n300_cluster_desc.yaml
          TT_METAL_DISABLE_SFPLOADMACRO: "1"
          GTEST_COLOR: "yes"
          TT_LOGGER_LEVEL: info
          # TT_METAL_SLOW_DISPATCH_MODE intentionally absent —
          # MultiCommandQueueSingleDeviceFixture skips when slow dispatch is set
        run: |
          mkdir -p test-results
          ./build/test/ttnn/unit_tests_ttnn \
            --gtest_filter="MultiCommandQueueSingleDeviceFixture.TestAsyncRuntimeAllocatedBuffers" \
            --gtest_output=xml:/work/test-results/async-buffer-results.xml
          echo "--- exit $? ---"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brain-async-buffer-test-results
          path: /work/test-results/
          retention-days: 7
