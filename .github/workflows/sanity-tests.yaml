name: "Sanity tests"

on:
  workflow_call:
    inputs:
      build-type:
        required: false
        default: Release
        type: string
        description: "Build type configuration (Release, Debug, RelWithDebInfo, ASan, TSan)"
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
        description: "Platform to build and test (e.g., 'Ubuntu 22.04', 'Ubuntu 24.04')"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      with-retries:
        required: false
        type: boolean
        default: false
        description: "Re-run failed jobs (max 3)"
      run-ttnn-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run TTNN unit tests"
      run-models-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run model unit tests"
      run-tt-train-cpp-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run TT-Train C++ unit tests"
      run-profiler-regression:
        required: false
        type: boolean
        default: true
        description: "Run profiler regression tests"
      run-t3000-apc-fast-tests:
        required: false
        type: boolean
        default: true
        description: "Run T3000 APC fast tests"
      run-ops-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run ops unit tests"
      enable-watcher:
        required: false
        type: boolean
        default: false
        description: "Enable watcher for long-running tests"
      enable-lightweight-kernel-asserts:
        required: false
        type: boolean
        default: false
        description: "Enable lightweight kernel asserts"
      enable-llk-asserts:
        required: false
        type: boolean
        default: false
        description: "Enable LLK asserts"
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
      # Pre-built artifacts (optional - if provided, skips build-artifact job)
      dev-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built dev Docker image tag (skips build if provided)"
      build-artifact-name:
        required: false
        type: string
        default: ""
        description: "Pre-built build artifact name (skips build if provided)"
      wheel-artifact-name:
        required: false
        type: string
        default: ""
        description: "Pre-built wheel artifact name (skips build if provided)"
    secrets:
      REDIS_CCACHE_PASSWORD:
        required: false
      REDIS_PASSWORD:
        required: false
      SFTP_BENCHMARK_WRITER_KEY:
        required: false
      SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME:
        required: false
      SFTP_FABRIC_BENCHMARK_WRITER_USERNAME:
        required: false
      SFTP_FABRIC_LATENCY_WRITER_USERNAME:
        required: false
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT:
        required: false
  workflow_dispatch:
    inputs:
      with-retries:
        default: false
        type: boolean
        description: "Re-run failed jobs (max 3)"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        default: Release
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
      enable-lto:
        required: false
        default: false
        type: boolean
        description: "Enable Link Time Optimization (LTO)"
      run-ttnn-unit-tests:
        required: false
        default: true
        type: boolean
        description: "Run TTNN unit tests"
      run-models-unit-tests:
        required: false
        default: true
        type: boolean
        description: "Run model unit tests"
      run-tt-train-cpp-unit-tests:
        required: false
        default: true
        type: boolean
        description: "Run TT-Train C++ unit tests"
      run-profiler-regression:
        required: false
        default: true
        type: boolean
        description: "Run profiler regression tests"
      run-t3000-apc-fast-tests:
        required: false
        default: true
        type: boolean
        description: "Run T3000 APC fast tests"
      run-ops-unit-tests:
        required: false
        default: true
        type: boolean
        description: "Run ops unit tests"
      enable-watcher:
        required: false
        default: false
        type: boolean
        description: "Enable watcher for long-running tests"
      enable-lightweight-kernel-asserts:
        required: false
        default: false
        type: boolean
        description: "Enable lightweight kernel asserts"
      enable-llk-asserts:
        required: false
        default: false
        type: boolean
        description: "Enable LLK asserts"
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
  push:
    branches: ["main"]

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write
  packages: write
  checks: write

run-name: Sanity tests${{ (github.event_name == 'workflow_dispatch' && inputs.with-retries) && ' (with retries)' || ''}}
jobs:
  # NOTE: build-artifact.yaml handles platform parsing internally.
  # Just pass platform and enable-lto inputs directly.
  build-artifact:
    if: ${{ inputs.dev-docker-image == '' }}
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets:
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      tracy: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      skip-tt-train: false
      enable-lto: ${{ inputs.enable-lto || false }}
      ref: ${{ inputs.ref || github.sha }}

  resolve-artifacts:
    runs-on: ubuntu-latest
    needs: [build-artifact]
    if: ${{ !cancelled() && (inputs.dev-docker-image != '' || needs.build-artifact.result == 'success') }}
    outputs:
      dev-docker-image: ${{ steps.resolve.outputs.dev-docker-image }}
      build-artifact-name: ${{ steps.resolve.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ steps.resolve.outputs.wheel-artifact-name }}
    steps:
      - id: resolve
        env:
          INPUT_DEV_DOCKER_IMAGE: ${{ inputs.dev-docker-image }}
          INPUT_BUILD_ARTIFACT_NAME: ${{ inputs.build-artifact-name }}
          INPUT_WHEEL_ARTIFACT_NAME: ${{ inputs.wheel-artifact-name }}
          BUILT_DEV_DOCKER_IMAGE: ${{ needs.build-artifact.outputs.dev-docker-image }}
          BUILT_BUILD_ARTIFACT_NAME: ${{ needs.build-artifact.outputs.build-artifact-name }}
          BUILT_WHEEL_ARTIFACT_NAME: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
        run: |
          # Validate pre-built artifact inputs - all three must be provided together
          img="$INPUT_DEV_DOCKER_IMAGE"
          build="$INPUT_BUILD_ARTIFACT_NAME"
          wheel="$INPUT_WHEEL_ARTIFACT_NAME"
          if [[ -n "$img" || -n "$build" || -n "$wheel" ]]; then
            if [[ -z "$img" || -z "$build" || -z "$wheel" ]]; then
              echo "Error: When using pre-built artifacts, all three inputs must be provided:"
              echo "  - dev-docker-image: '$INPUT_DEV_DOCKER_IMAGE'"
              echo "  - build-artifact-name: '$INPUT_BUILD_ARTIFACT_NAME'"
              echo "  - wheel-artifact-name: '$INPUT_WHEEL_ARTIFACT_NAME'"
              exit 1
            fi
          fi

          # Use provided artifacts if available, otherwise use built artifacts
          if [[ -n "$INPUT_DEV_DOCKER_IMAGE" ]]; then
            echo "dev-docker-image=$INPUT_DEV_DOCKER_IMAGE" >> "$GITHUB_OUTPUT"
            echo "build-artifact-name=$INPUT_BUILD_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
            echo "wheel-artifact-name=$INPUT_WHEEL_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "dev-docker-image=$BUILT_DEV_DOCKER_IMAGE" >> "$GITHUB_OUTPUT"
            echo "build-artifact-name=$BUILT_BUILD_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
            echo "wheel-artifact-name=$BUILT_WHEEL_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          fi

  tests-to-run:
    needs: [resolve-artifacts]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      ttnn-unit-tests: ${{ steps.set-ttnn-unit-tests.outputs.should-run }}
      models-unit-tests: ${{ steps.set-models-unit-tests.outputs.should-run }}
      tt-train-cpp-unit-tests: ${{ steps.set-tt-train-cpp-unit-tests.outputs.should-run }}
      run-profiler-regression: ${{ steps.set-run-profiler-regression.outputs.should-run }}
      t3000-apc-fast-tests: ${{ steps.set-t3000-apc-fast-tests.outputs.should-run }}
      ops-unit-tests: ${{ steps.set-ops-unit-tests.outputs.should-run }}
    steps:
      - id: set-ttnn-unit-tests
        env:
          SHOULD_RUN: ${{ github.event_name == 'push' || inputs.run-ttnn-unit-tests }}
        run: |
          echo "should-run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
      - id: set-models-unit-tests
        env:
          SHOULD_RUN: ${{ github.event_name == 'push' || inputs.run-models-unit-tests }}
        run: |
          echo "should-run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
      - id: set-tt-train-cpp-unit-tests
        env:
          SHOULD_RUN: ${{ github.event_name == 'push' || inputs.run-tt-train-cpp-unit-tests }}
        run: |
          echo "should-run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
      - id: set-run-profiler-regression
        env:
          SHOULD_RUN: ${{ github.event_name == 'push' || inputs.run-profiler-regression }}
        run: |
          echo "should-run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
      - id: set-t3000-apc-fast-tests
        env:
          SHOULD_RUN: ${{ github.event_name == 'push' || inputs.run-t3000-apc-fast-tests }}
        run: |
          echo "should-run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
      - id: set-ops-unit-tests
        env:
          SHOULD_RUN: ${{ github.event_name == 'push' || inputs.run-ops-unit-tests }}
        run: |
          echo "should-run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

  # TTNN FD Unit tests
  ttnn-unit-tests:
    needs: [resolve-artifacts, tests-to-run]
    secrets:
      REDIS_CCACHE_PASSWORD: ${{ secrets.REDIS_CCACHE_PASSWORD }}
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    uses: ./.github/workflows/ttnn-post-commit.yaml
    with:
      enabled-skus: "wh_n300_civ2"
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      timeout-minutes-override: ${{ inputs.enable-watcher && 240 || 0 }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}

  # FD Model Tests
  models-unit-tests:
    needs: [resolve-artifacts, tests-to-run]
    secrets:
      REDIS_CCACHE_PASSWORD: ${{ secrets.REDIS_CCACHE_PASSWORD }}
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    strategy:
      fail-fast: false
      matrix:
        test-group: [{ arch: wormhole_b0, runner-label: N300 }]
    uses: ./.github/workflows/models-post-commit.yaml
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}
      timeout: ${{ inputs.enable-watcher && 120 || 35 }}

  tt-train-cpp-unit-tests:
    needs: [resolve-artifacts, tests-to-run]
    secrets:
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    strategy:
      fail-fast: false
      matrix:
        test-group: [{ arch: wormhole_b0, runner-label: N300 }]
    if: ${{ always() && !cancelled() && needs.tests-to-run.outputs.tt-train-cpp-unit-tests == 'true' }}
    uses: ./.github/workflows/tt-train-post-commit.yaml
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}

  run-profiler-regression:
    needs: [resolve-artifacts, tests-to-run]

    strategy:
      fail-fast: false
      matrix:
        test-group: [{ arch: wormhole_b0, runner-label: N300 }]
    if: ${{ always() && !cancelled() && needs.tests-to-run.outputs.run-profiler-regression == 'true'}}
    uses: ./.github/workflows/run-profiler-regression.yaml
    secrets:
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    with:
      arch: ${{ matrix.test-group.arch}}
      runner-label: ${{ matrix.test-group.runner-label}}
      post_commit_only: true
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}
  t3000-apc-fast-tests:
    needs: [resolve-artifacts, tests-to-run]
    secrets:
      SFTP_BENCHMARK_WRITER_KEY: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
      SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME }}
      SFTP_FABRIC_BENCHMARK_WRITER_USERNAME: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_USERNAME }}
      SFTP_FABRIC_LATENCY_WRITER_USERNAME: ${{ secrets.SFTP_FABRIC_LATENCY_WRITER_USERNAME }}
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    uses: ./.github/workflows/t3000-fast-tests-impl.yaml
    with:
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}

  ops-unit-tests:
    needs: [resolve-artifacts, tests-to-run]
    secrets:
      SFTP_BENCHMARK_WRITER_KEY: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
      SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME }}
      SFTP_FABRIC_BENCHMARK_WRITER_USERNAME: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_USERNAME }}
      SFTP_FABRIC_LATENCY_WRITER_USERNAME: ${{ secrets.SFTP_FABRIC_LATENCY_WRITER_USERNAME }}
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    strategy:
      fail-fast: false
      matrix:
        test-group: [{ arch: wormhole_b0, runner-label: N300 }]
    if: ${{ always() && !cancelled() && needs.tests-to-run.outputs.ops-unit-tests == 'true' }}
    uses: ./.github/workflows/ops-post-commit.yaml
    with:
      arch: ${{ matrix.test-group.arch }}
      runner-label: ${{ matrix.test-group.runner-label }}
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      ref: ${{ inputs.ref || github.sha }}
