name: "[internal] Models merge-gate smoke tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      harbor-prefix:
        required: false
        type: string
        default: ""
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
        description: "Comma-separated SKUs to run (must match tests yaml and sku_config.yaml)."
      mlperf-read-only:
        required: false
        type: boolean
        default: true
        description: "Set to false to allow write access to MLPerf mount"
      per-test-timeout:
        required: false
        type: string
        default: ""
        description: >-
          Max allowed timeout (minutes) for any individual test SKU entry in the
          tests yaml. Verified during load-test-matrix via verify_time_budget.py.
          Empty skips the per-test ceiling check.

jobs:
  load-test-matrix:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/models_merge_gate_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true

      - name: Install dependencies
        run: pip3 install PyYAML

      - name: Verify test timeouts against budget
        run: |
          set -euo pipefail
          extra=()
          if [ -n "${{ inputs.per-test-timeout }}" ]; then
            extra+=(--max-per-test-timeout "${{ inputs.per-test-timeout }}")
          fi
          python3 .github/scripts/utils/verify_time_budget.py \
            "${{ env.TESTS_YAML_PATH }}" \
            ./.github/time_budget.yaml \
            merge_gate \
            "${extra[@]}"

      - name: Build test matrix based on enabled SKUs
        id: build-matrix
        env:
          TESTS_YAML: ${{ env.TESTS_YAML_PATH }}
        run: |
          set -euo pipefail
          # TODO: Remove this empty-yaml short-circuit once models_merge_gate_tests.yaml
          # has at least one test row; prepare_test_matrix.py fails on an empty yaml.
          test_count=$(python3 - <<'PY'
          import os, yaml
          with open(os.environ["TESTS_YAML"]) as f:
              tests = yaml.safe_load(f) or []
          print(len(tests))
          PY
          )
          if [ "$test_count" -eq 0 ]; then
            echo "::notice::No tests defined in ${{ env.TESTS_YAML_PATH }} yet; skipping hardware jobs."
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 .github/scripts/utils/prepare_test_matrix.py \
            "${{ env.TESTS_YAML_PATH }}" \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml \
            --event "${{ github.event_name }}"

  models-smoke-tests:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ (inputs.docker-image && (contains(join(matrix.test-group.runs_on, ','), 'dedicated-merge-gate') && inputs.docker-image || format('{0}{1}', inputs.harbor-prefix, inputs.docker-image))) || 'docker-image-unresolved!' }}
      env:
        ARCH_NAME: wormhole_b0
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        HF_HUB_OFFLINE: "1"
        HF_HUB_CACHE: /mnt/MLPerf/huggingface/hub
        HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        LOGURU_LEVEL: INFO
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        MLPERF_READ_ONLY: ${{ inputs.mlperf-read-only }}
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
        - ${{ format('/mnt/MLPerf:/mnt/MLPerf{0}', inputs.mlperf-read-only && ':ro' || ':rw') }}
      options: "--device /dev/tenstorrent --privileged -v /sys:/sys"
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job

      - name: Setup job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}

      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          mkdir -p generated/test_reports generated/test_logs
          SAFE_NAME=$(echo "${{ matrix.test-group.name }}" | tr ' /' '__')
          LOG_FILE="generated/test_logs/${SAFE_NAME}_${{ job.check_run_id }}.log"
          {
            ${{ matrix.test-group.cmd }}
          } 2>&1 | tee "$LOG_FILE"
          exit "${PIPESTATUS[0]}"

      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        if: ${{ !cancelled() }}
        timeout-minutes: 10
        with:
          prefix: "test_reports_"

      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
