      suite_name:
        description: "Which sweep suite to run?"
        type: string
      skip_on_timeout:
        description: "Skip remaining tests in running suite after first timeout?"
        type: boolean
        default: true
      upload_results:
        description: "Upload sweep results to Superset?"
        type: boolean
        default: true
      measure_device_perf:
        description: "Measure device performance using device profiler (--device-perf flag)."
        type: boolean
        default: true
      measure_e2e_perf:
        description: "Measure end-to-end performance with cold/cached comparison (--perf-with-cache flag)"
        type: boolean
        default: false
      measure_memory:
        description: "Capture peak L1 memory usage using graph trace (--measure-memory flag)."
        type: boolean
        default: false
      arch:
        required: true
        type: choice
        options:
          - wormhole_b0
          - blackhole
        default: "wormhole_b0"
      runner-label:
        description: "Single sweep only"
        required: true
        type: choice
        options:
          - N150
          - N300
          - P100a
          - P150b
          - n300-llmbox
          - topology-6u
          - BH-LLMBox
          - BH-DeskBox
          - BH-LoudBox
        default: "N150"
      log-level:
        description: "Log level for sweep execution. INFO level may overwhelm runners for long sweeps."
        required: true
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - CRITICAL
        default: "INFO"
      mesh_shape:
        description: "Filter by mesh shape (e.g., '2x4')."
        type: string
        required: false
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"

  schedule:
    - cron: "30 4 * * 0,1,2,4,5" # This cron schedule runs the workflow at 4:30 AM UTC on Sun, Mon, Tue, Thu, Fri (nightly runs)
    - cron: "0 4 * * 3,6" # This cron schedule runs the workflow at 4:00 AM UTC on Wed/Sat (comprehensive run)
    - cron: "0 3 * * *" # This cron schedule runs the workflow at 3:00 AM UTC daily (model traced runs)
    - cron: "0 2 * * *" # This cron schedule runs the workflow at 2:00 AM UTC daily (lead model runs)

jobs:
  call-sweeps-impl:
    uses: ./.github/workflows/ttnn-run-sweeps-impl.yaml
    secrets: inherit
    with:
      # Resolve the sweep name: for schedule triggers, map cron expression to named sweep;
      # for workflow_dispatch, use the selected input directly.
      sweep-name: >-
        ${{
          github.event.inputs.sweep_name ||
          (github.event.schedule == '30 4 * * 0,1,2,4,5' && 'ALL SWEEPS (Nightly)') ||
          (github.event.schedule == '0 4 * * 3,6' && 'ALL SWEEPS (Comprehensive)') ||
          (github.event.schedule == '0 3 * * *' && 'ALL SWEEPS (Model Traced)') ||
          (github.event.schedule == '0 2 * * *' && 'ALL SWEEPS (Lead Models)') ||
          'ALL SWEEPS (Nightly)'
        }}
      suite-name: ${{ github.event.inputs.suite_name || '' }}
      # For scheduled runs all flags default to on; for dispatch, use the provided inputs
      skip-on-timeout: ${{ github.event_name == 'schedule' || github.event.inputs.skip_on_timeout == 'true' }}
      upload-results: ${{ github.event_name == 'schedule' || github.event.inputs.upload_results == 'true' }}
      measure-device-perf: ${{ github.event_name == 'schedule' || github.event.inputs.measure_device_perf == 'true' }}
      measure-e2e-perf: ${{ github.event_name != 'schedule' && github.event.inputs.measure_e2e_perf == 'true' }}
      measure-memory: ${{ github.event_name == 'schedule' || github.event.inputs.measure_memory == 'true' }}
      arch: ${{ github.event.inputs.arch || 'wormhole_b0' }}
      runner-label: ${{ github.event.inputs['runner-label'] || 'N150' }}
      log-level: ${{ github.event.inputs['log-level'] || 'INFO' }}
      mesh-shape: ${{ github.event.inputs.mesh_shape || '' }}
      platform: ${{ github.event.inputs.platform || 'Ubuntu 22.04' }}
      build-type: ${{ github.event.inputs['build-type'] || 'Release' }}
      enable-lto: ${{ github.event.inputs['enable-lto'] == 'true' }}
      # Build with Tracy when device perf is enabled
      tracy: ${{ github.event_name == 'schedule' || github.event.inputs.measure_device_perf == 'true' }}
      # Use ops database for Model Traced and Lead Models runs
      use-database: >-
        ${{
          (github.event_name == 'schedule' && (github.event.schedule == '0 3 * * *' || github.event.schedule == '0 2 * * *')) ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.sweep_name == 'ALL SWEEPS (Model Traced)' || github.event.inputs.sweep_name == 'ALL SWEEPS (Lead Models)'))
        }}
