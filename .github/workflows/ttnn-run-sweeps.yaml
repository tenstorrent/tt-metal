name: "ttnn - Run sweeps"

run-name: >-
  ${{
    github.event.inputs.sweep_name == 'ALL SWEEPS (Nightly)' && 'ttnn - run sweeps nightly' ||
    github.event.inputs.sweep_name == 'ALL SWEEPS (Comprehensive)' && 'ttnn - run sweeps comprehensive' ||
    github.event.inputs.sweep_name == 'ALL SWEEPS (Model Traced)' && 'ttnn - run sweeps model traced' ||
    github.event.inputs.sweep_name == 'ALL SWEEPS (Lead Models)' && 'ttnn - run sweeps lead models' ||
    github.event.inputs.sweep_name && format('ttnn - run sweeps ({0})', github.event.inputs.sweep_name) ||
    github.event.schedule == '30 4 * * 0,1,2,4,5' && 'ttnn - run sweeps nightly (scheduled)' ||
    github.event.schedule == '0 4 * * 3,6' && 'ttnn - run sweeps comprehensive (scheduled)' ||
    github.event.schedule == '0 3 * * *' && 'ttnn - run sweeps model traced (scheduled)' ||
    github.event.schedule == '0 2 * * *' && 'ttnn - run sweeps lead models (scheduled)' ||
    'ttnn - Run sweeps scheduled'
  }}

on:
  workflow_dispatch:
    inputs:
      sweep_name:
        type: choice
        description: "Which sweep module to run?"
        required: true
        default: "ALL SWEEPS (Nightly)"
        options:
          - ALL SWEEPS (Nightly)
          - ALL SWEEPS (Comprehensive)
          - ALL SWEEPS (Model Traced)
          - ALL SWEEPS (Lead Models)
