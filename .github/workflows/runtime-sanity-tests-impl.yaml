name: "[internal] Runtime sanity tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: false
        type: string
        default: ""
      enabled-skus:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has-sim: ${{ steps.detect-sim.outputs.has-sim }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/runtime_sanity_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "sanity"
      - name: Build unified test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Detect sim SKUs in matrix
        id: detect-sim
        run: |
          matrix='${{ steps.build-matrix.outputs.matrix }}'
          has_sim=$(echo "$matrix" | jq -r 'any(.[]; .sku | startswith("sim_"))')
          echo "has-sim=$has_sim" >> "$GITHUB_OUTPUT"

  # Fetch ttsim simulator binaries once; only needed when the matrix has sim_* SKUs.
  fetch-ttsim:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.has-sim == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ttsim version
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: tt_metal/ttsim-version
          sparse-checkout-cone-mode: false
      - name: Read ttsim version
        id: ttsim-version
        run: echo "version=$(cat tt_metal/ttsim-version)" >> "$GITHUB_OUTPUT"
      - name: Download wormhole_b0 ttsim binary
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          repository: tenstorrent/ttsim
          tag: ${{ steps.ttsim-version.outputs.version }}
          fileName: libttsim_wh.so
          out-file-path: /tmp/ttsim
      - name: Download blackhole ttsim binary
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          repository: tenstorrent/ttsim
          tag: ${{ steps.ttsim-version.outputs.version }}
          fileName: libttsim_bh.so
          out-file-path: /tmp/ttsim
      - name: Upload ttsim binaries artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ttsim-binaries
          path: /tmp/ttsim/
          if-no-files-found: error
          retention-days: 1

  runtime-sanity-tests:
    needs: [load-test-matrix, fetch-ttsim]
    # fetch-ttsim is skipped when the matrix has no sim_* SKUs; allow that.
    if: ${{ !cancelled() && (needs.fetch-ttsim.result == 'success' || needs.fetch-ttsim.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        ARCH_NAME: ${{ (contains(matrix.test-group.sku, 'bh_') || contains(matrix.test-group.sku, 'blackhole')) && 'blackhole' || 'wormhole_b0' }}
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        LSAN_OPTIONS: suppressions=/usr/share/tt-metalium/lsan.supp
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: ${{ startsWith(matrix.test-group.sku, 'sim_') && '--label runner-mode=sim' || '--device /dev/tenstorrent' }}
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
          ref: ${{ inputs.ref || github.sha }}
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      - name: ⬇️  Setup TTSim
        if: ${{ startsWith(matrix.test-group.sku, 'sim_') }}
        uses: ./docker-job/.github/actions/setup-ttsim
        timeout-minutes: 5
        with:
          sku: ${{ matrix.test-group.sku }}
      - name: Ensure BH links online
        if: ${{ contains(matrix.test-group.sku, 'bh_loudbox') }}
        uses: tenstorrent/tt-metal/.github/actions/ensure-bh-links-online@main
        timeout-minutes: 10
      - name: ${{ matrix.test-group.name }}
        if: ${{ !startsWith(matrix.test-group.sku, 'sim_') }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          mkdir -p generated/test_reports
          echo "${{ matrix.test-group.cmd }}"
          ${{ matrix.test-group.cmd }}
      - name: ${{ matrix.test-group.name }} (simulator)
        if: ${{ startsWith(matrix.test-group.sku, 'sim_') }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          mkdir -p generated/test_reports
          echo "${{ matrix.test-group.cmd }}"
          cat > /tmp/sim_cmd.sh <<'SIM_CMD_EOF'
          ${{ matrix.test-group.cmd }}
          SIM_CMD_EOF
          .github/scripts/utils/host-load-sidecar.sh \
            --interval 1 \
            --label "${{ matrix.test-group.name }} (simulator)" \
            --output /work/mem_report.json \
            -- bash --noprofile --norc -eo pipefail /tmp/sim_cmd.sh
      - name: Upload mem report
        if: ${{ !cancelled() && startsWith(matrix.test-group.sku, 'sim_') }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mem-report-${{ matrix.test-group.name }}
          # /docker-job/ is the host-side mount of the container's /work/. The host-load sidecar
          # writes its CPU/memory/disk/network report to --output /work/mem_report.json; this
          # host path is what upload-artifact reads.
          path: ${{ github.workspace }}/docker-job/mem_report.json
          if-no-files-found: warn
          retention-days: 30
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
          owner: ${{ matrix.test-group.owner_id }}
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
