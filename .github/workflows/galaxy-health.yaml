name: "(Galaxy) Health"

on:
  workflow_dispatch:
    inputs:
      wormhole:
        required: false
        type: boolean
        default: true
      blackhole:
        required: false
        type: boolean
        default: false
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
  push:
    branches: ["main"]

run-name: "(Galaxy) Health"

permissions:
  packages: write
  contents: write

jobs:
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}

  galaxy-health-test:
    needs: build-artifact
    secrets: inherit
    uses: ./.github/workflows/galaxy-health-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      # Push to main: run both architectures. Manual: derive from checkboxes (same as galaxy e2e).
      enabled-skus: >-
        ${{
          github.event_name == 'push'
            && 'wh_galaxy,bh_galaxy'
            || (
              inputs.wormhole && inputs.blackhole
                && 'wh_galaxy,bh_galaxy'
                || (
                  inputs.wormhole
                    && 'wh_galaxy'
                    || (
                      inputs.blackhole
                        && 'bh_galaxy'
                        || ''
                    )
                )
            )
        }}
