name: LLK PR Review (TEST via llk-perf)
run-name: "LLK PR Review — PR #${{ github.event.inputs.pr_number }} (effort: ${{ github.event.inputs.effort }})"

# ⚠️ TEMPORARY TEST SHIM — DO NOT MERGE TO main.
# This file's real content (the nightly LLK perf workflow) has been replaced on
# this branch with the LLK PR review workflow. You pass the PR number to review
# at dispatch time.
#
# Why: a brand-new workflow can't be dispatched from a feature branch — GitHub
# only registers workflow_dispatch from the DEFAULT branch. llk-perf.yaml already
# exists on main with a workflow_dispatch trigger, so it IS registered; dispatching
# it with --ref <this-branch> runs THIS version. That's how we test before merging.
#
# Run it:  gh workflow run llk-perf.yaml --ref nstamatovic/llk_pr_reviewer_workflow -f pr_number=<PR>
# Revert before merge:  git checkout main -- .github/workflows/llk-perf.yaml
# The canonical workflow lives in llk-pr-review.yaml.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string
      effort:
        description: "Review effort level"
        required: false
        default: "max"
        type: choice
        options: [low, medium, high, max]

concurrency:
  group: llk-pr-review-test-${{ github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 45          # /code-review max fans out subagents; this bounds it
    permissions:
      contents: read             # read the checkout
      pull-requests: write       # post inline review comments
      issues: write              # post acknowledgement / summary
      id-token: write            # OIDC, if the key path requires it
    env:
      PR_NUMBER: ${{ github.event.inputs.pr_number }}
    steps:
      # 1. Full checkout so /code-review can compute the merge-base diff vs main.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Switch to the PR's head branch, and ensure a local `main` exists so
      #    /code-review can diff the PR against it (main...HEAD).
      - name: Check out the PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr checkout "${PR_NUMBER}"
          git fetch origin +refs/heads/main:refs/heads/main

      # 3. Fetch the private LLK review knowledge, kept out of the public tree and
      #    pulled at runtime into a scratch dir via a sparse checkout.
      - name: Fetch private LLK review knowledge
        uses: actions/checkout@v4
        with:
          repository: tenstorrent/llk_code_gen
          # Token with read access to the private knowledge repo.
          token: ${{ secrets.LLK_KNOWLEDGE_TOKEN }}
          path: .llk-review-knowledge-src
          sparse-checkout: dashboard/pr_review/knowledge
          sparse-checkout-cone-mode: false
          persist-credentials: false

      # 4. Assemble the knowledge into a single append-system-prompt file:
      #    a framing line, then each .md file.
      - name: Assemble review system prompt
        run: |
          set -euo pipefail
          src=".llk-review-knowledge-src/dashboard/pr_review/knowledge"
          out="${GITHUB_WORKSPACE}/.llk-review-system-prompt.md"
          {
            echo "You are the LLK PR review bot. Apply the knowledge below as authoritative."
            echo
            for f in "$src"/*.md; do
              [ -e "$f" ] || continue
              echo "# === $(basename "$f") ==="
              cat "$f"
              echo
            done
            cat <<'EOF'

          # === How to post inline review comments ===
          Post every finding as a LINE-ANCHORED inline comment on the PR diff, using the
          GitHub REST API via `gh api`. Anchor each comment to the file and line it is
          about. Use this exact form (the flag types matter):

            HEAD="$(git rev-parse HEAD)"
            gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/comments" --method POST \
              -f body="<finding text>" \
              -f commit_id="$HEAD" \
              -f path="<path/relative/to/repo/root>" \
              -f side="RIGHT" \
              -F line=<line-number>

          Rules — follow these or the call fails:
          - Pass `line` (and `start_line`, if a range) with `-F` (numeric), NEVER `-f`
            (`-f line=...` sends a string and the API rejects it with HTTP 422).
          - Do NOT pass `subject_type` — it is not a valid key for this endpoint.
          - For a multi-line range, add `-F start_line=<n> -f start_side="RIGHT"`.
          - `commit_id` must be the PR head SHA (`git rev-parse HEAD` after checkout).
          - `path` is relative to the repo root, exactly as it appears in the diff.
          - NEVER fall back to `gh pr review --comment` or `gh pr comment` — those post an
            unanchored summary, not a line comment. If an inline post fails, fix the
            command and retry; do not downgrade to a top-level comment.

          Determining the line number — do NOT eyeball it:
          - Find the exact line with `grep -n "<unique snippet of the code>" <file>`,
            and use the number of the line that holds the code your finding is about.
          - Before posting, verify with `sed -n "<line>p" <file>` that it prints the
            exact code you are commenting on; if it does not, fix the line number.
          - For a finding that spans several lines, anchor the whole range:
            `-F start_line=<first> -f start_side="RIGHT" -F line=<last>`.
          - The line must be a changed/added line shown in the PR diff; if it is not,
            anchor to the nearest changed line the finding refers to.
          EOF
          } > "$out"
          echo "Assembled $(wc -l < "$out") lines into $out"

      # 5. Run the review: /code-review at max effort, with the LLK MCP servers
      #    and the assembled knowledge, posting findings inline via --comment.
      - name: Run /code-review
        uses: anthropics/claude-code-action@v1
        env:
          # Route Claude through the TT-Chat LiteLLM proxy (Anthropic-compatible).
          # The proxy expects Bearer auth, which Claude Code sends when the token
          # is given as ANTHROPIC_AUTH_TOKEN (not ANTHROPIC_API_KEY → x-api-key).
          ANTHROPIC_BASE_URL: ${{ secrets.TT_CHAT_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.TT_CHAT_API_KEY }}
          # The proxy requires the "anthropic/" model prefix.
          ANTHROPIC_MODEL: anthropic/claude-opus-4-5-20251101
          ANTHROPIC_SMALL_FAST_MODEL: anthropic/claude-haiku-4-5-20251001
          # So /code-review --comment can detect the PR and post via gh.
          # GITHUB_TOKEN is the per-run automatic token; its write scope comes
          # from the job's `permissions:` block (pull-requests/issues: write),
          # so comments post as github-actions[bot] — no user PAT required.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Present only to satisfy the action's auth precheck; actual auth +
          # routing is via the ANTHROPIC_* env vars above (AUTH_TOKEN takes
          # precedence, so no x-api-key is sent to the proxy).
          anthropic_api_key: ${{ secrets.TT_CHAT_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true   # TEMP: diagnose whether /code-review found findings + tried to post
          prompt: "/code-review ${{ github.event.inputs.effort || 'max' }} --comment"
          # No --model here: the model comes from ANTHROPIC_MODEL (needs the
          # anthropic/ prefix for the proxy).
          claude_args: |
            --allowedTools "Bash(gh:*),Bash(git:*),Bash(grep:*),Bash(find:*),Bash(diff:*),Bash(head:*),Bash(sed:*),mcp__deepwiki,mcp__atlassian,mcp__glean_default"
            --max-turns 60
            --mcp-config tt_metal/tt-llk/.mcp.json
            --append-system-prompt-file ${{ github.workspace }}/.llk-review-system-prompt.md
