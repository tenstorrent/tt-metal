name: LLK PR Review (TEST via llk-perf)
run-name: "LLK PR Review — PR #${{ github.event.inputs.pr_number }} (effort: ${{ github.event.inputs.effort }})"

# ⚠️ TEMPORARY TEST SHIM — DO NOT MERGE TO main.
# This file's real content (the nightly LLK perf workflow) has been replaced on
# this branch with the LLK PR review workflow. You pass the PR number to review
# at dispatch time.
#
# Why: a brand-new workflow can't be dispatched from a feature branch — GitHub
# only registers workflow_dispatch from the DEFAULT branch. llk-perf.yaml already
# exists on main with a workflow_dispatch trigger, so it IS registered; dispatching
# it with --ref <this-branch> runs THIS version. That's how we test before merging.
#
# Run it:  gh workflow run llk-perf.yaml --ref nstamatovic/llk_pr_reviewer_workflow -f pr_number=<PR>
# Revert before merge:  git checkout main -- .github/workflows/llk-perf.yaml
# The canonical workflow lives in llk-pr-review.yaml — keep the two in sync.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string
      effort:
        description: "Reasoning effort for the review session (--effort)"
        required: false
        default: "max"
        type: choice
        options: [low, medium, high, max]

concurrency:
  group: llk-pr-review-test-${{ github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 45          # the command fans out subagents; this bounds it
    permissions:
      contents: read             # read the checkout
      pull-requests: write       # post inline review comments
      issues: write              # post acknowledgement / summary
      id-token: write            # OIDC, if the key path requires it
    env:
      PR_NUMBER: ${{ github.event.inputs.pr_number }}
    steps:
      # 1. Checkout so the command (and the knowledge assembly step) has the repo.
      #    The command fetches the diff itself via `gh pr diff`, so a shallow
      #    checkout of the default ref is enough.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Fetch the private LLK review knowledge, kept out of the public tree and
      #    pulled at runtime into a scratch dir via a sparse checkout.
      - name: Fetch private LLK review knowledge
        uses: actions/checkout@v4
        with:
          repository: tenstorrent/llk_code_gen
          # Token with read access to the private knowledge repo.
          token: ${{ secrets.LLK_KNOWLEDGE_TOKEN }}
          path: .llk-review-knowledge-src
          sparse-checkout: dashboard/pr_review/knowledge
          sparse-checkout-cone-mode: false
          persist-credentials: false

      # 3. Assemble the knowledge into a single append-system-prompt file:
      #    a framing line, then each .md file. (Posting mechanics are handled by
      #    the code-review command itself — it uses the action's inline-comment
      #    MCP tool — so we only inject domain knowledge here.)
      - name: Assemble review system prompt
        run: |
          set -euo pipefail
          src=".llk-review-knowledge-src/dashboard/pr_review/knowledge"
          out="${GITHUB_WORKSPACE}/.llk-review-system-prompt.md"
          {
            # Short framing only — the recall philosophy, cross-file requirement,
            # and "knowledge is authoritative" rules now live in the procedure
            # itself (review-procedure.md), so we don't repeat them here.
            echo "# ============================================================"
            echo "# LLK PR REVIEW — SYSTEM PROMPT"
            echo "# ============================================================"
            echo
            echo "You are the LLK PR review bot for Tenstorrent low-level kernel (LLK) code."
            echo "Follow the LLK REVIEW PROCEDURE below exactly. The LLK REVIEW KNOWLEDGE"
            echo "section is authoritative documented convention."
            echo
            echo "# ------------------------------------------------------------"
            echo "# LLK REVIEW PROCEDURE (follow exactly)"
            echo "# ------------------------------------------------------------"
            echo
            cat "${GITHUB_WORKSPACE}/.github/llk-review/review-procedure.md"
            echo
            echo "# ------------------------------------------------------------"
            echo "# LLK REVIEW KNOWLEDGE (authoritative)"
            echo "# ------------------------------------------------------------"
            echo
            for f in "$src"/*.md; do
              [ -e "$f" ] || continue
              echo "# === $(basename "$f") ==="
              cat "$f"
              echo
            done
          } > "$out"
          echo "Assembled $(wc -l < "$out") lines into $out"

      # 4. Run the review. We DO NOT use the marketplace code-review plugin: the
      #    forked LLK review procedure is injected via --append-system-prompt-file
      #    (assembled above), and the prompt simply asks the session to follow it.
      #    This avoids any dependency on plugin/command auto-discovery and lets us
      #    fully control the review logic (recall-oriented, two-tier output).
      - name: Run LLK review
        uses: anthropics/claude-code-action@v1
        env:
          # GITHUB_TOKEN is the per-run automatic token; its write scope comes
          # from the job's `permissions:` block (pull-requests/issues: write), so
          # comments post as github-actions[bot] — no user PAT needed.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Real Anthropic API key — sent as x-api-key to api.anthropic.com.
          anthropic_api_key: ${{ secrets.LLK_PR_REVIEW_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true   # TEMP: diagnose whether the review found findings + tried to post
          # The review procedure lives in the system prompt (assembled above).
          # The prompt names the PR and enables comment posting.
          prompt: "Review pull request ${{ github.repository }}/pull/${{ env.PR_NUMBER }}. Follow the LLK REVIEW PROCEDURE in your system prompt exactly. Comment posting is ENABLED: post inline comments for CONFIRMED issues and a single summary comment for SUSPECTED issues, as the procedure describes."
          # No --model override: the procedure's per-role haiku/sonnet/opus
          # subagents each use their intended model. --effort sets the session
          # reasoning effort. The allowlist must include Task (the procedure fans
          # out subagents), Read (subagents read changed files), the inline-comment
          # MCP tool used to post, and gh for diff/view/api/comment.
          claude_args: |
            --effort ${{ github.event.inputs.effort || 'max' }}
            --allowedTools "Task,Read,Bash(gh:*),Bash(git:*),Bash(grep:*),Bash(find:*),Bash(diff:*),Bash(head:*),Bash(sed:*),mcp__github_inline_comment__create_inline_comment,mcp__deepwiki,mcp__atlassian,mcp__glean_default"
            --max-turns 100
            --mcp-config tt_metal/tt-llk/.mcp.json
            --append-system-prompt-file ${{ github.workspace }}/.llk-review-system-prompt.md
