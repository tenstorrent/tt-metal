name: "[impl] SDK examples"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      package-artifact-name:
        required: true
        type: string
      runner:
        required: true
        type: string
      product:
        required: true
        type: string
      build-type:
        description: 'Build type of the installed packages (Release or ASan).'
        required: false
        type: string
        default: 'Release'
      enable-kernel-ccache:
        description: 'Enable kernel ccache for JIT compilation at runtime'
        default: false
        type: boolean

jobs:
  sdk-examples:
    environment: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'mainline' || '' }}
    runs-on: ${{ format('tt-ubuntu-2204-{0}-stable', inputs.runner) }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!'}}
      volumes:
        - /work
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: --device /dev/tenstorrent
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: Checkout actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: |
            .github/actions/download-artifact-with-retry
            .github/scripts/ccache_log_filter.sh
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/download-artifact-with-retry
        timeout-minutes: 15
        with:
          name: ${{ inputs.package-artifact-name || 'packages artifact unresolved!' }}
          path: /work/pkgs/

      - name: Install packages
        timeout-minutes: 10
        run: |
          set -euo pipefail
          apt update
          DEBIAN_FRONTEND=noninteractive TZ=UTC apt install -y -q libprotobuf-dev

          apt install -y ./pkgs/tt-metalium_*.deb ./pkgs/tt-metalium-jit_*.deb ./pkgs/tt-metalium-dev_*.deb

          if [ "${{ inputs.product }}" == "tt-metalium" ]; then
            apt install -y ./pkgs/tt-metalium-examples_*.deb
          fi
          if [ "${{ inputs.product }}" == "tt-nn" ]; then
            apt install -y ./pkgs/tt-nn_*.deb ./pkgs/tt-nn-dev_*.deb ./pkgs/tt-nn-examples_*.deb
          fi

      - name: Set up ASan environment
        if: inputs.build-type == 'ASan'
        run: |
          CLANG_RT_DIR="$(clang-20 -print-resource-dir)/lib/linux"
          echo "LD_LIBRARY_PATH=$CLANG_RT_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "ASAN_OPTIONS=detect_leaks=0:color=always" >> "$GITHUB_ENV"
          echo "LSAN_OPTIONS=suppressions=/usr/share/tt-metalium/lsan.supp" >> "$GITHUB_ENV"

      - name: Set up kernel ccache
        if: ${{ inputs.enable-kernel-ccache == true && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        run: |
          echo "Enabling TT Metal kernel ccache"
          echo "CCACHE_COMPILERCHECK=content" >> $GITHUB_ENV
          echo "CCACHE_REMOTE_ONLY=true" >> $GITHUB_ENV
          echo "CCACHE_NOHASHDIR=true" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=true" >> $GITHUB_ENV
          echo "CCACHE_COMPRESSLEVEL=3" >> $GITHUB_ENV
          echo "CCACHE_LOGFILE=/tmp/ccache.log" >> $GITHUB_ENV
          echo "CCACHE_BASEDIR=/work" >> $GITHUB_ENV
          echo "TT_METAL_CCACHE_KERNEL_SUPPORT=1" >> $GITHUB_ENV
          echo "CCACHE_TEMPDIR=/tmp/ccache" >> $GITHUB_ENV
          mkdir -p /tmp/ccache
          # Build Redis URL in bash so that the password is never embedded in a
          # workflow input string (GHA does not pass secrets through string inputs
          # to reusable workflows). This also ensures forks leave CCACHE_REMOTE_STORAGE
          # unset — the step is guarded by the fork check above.
          REDIS_USER="${{ vars.REDIS_CCACHE_USER }}"
          REDIS_PASSWORD="${{ secrets.REDIS_CCACHE_PASSWORD }}"
          REDIS_HOST="${{ vars.REDIS_CCACHE_HOST }}"
          REDIS_PORT="${{ vars.REDIS_CCACHE_PORT }}"
          REDIS_READONLY="${{ vars.REDIS_CCACHE_IS_READONLY }}"
          CCACHE_REMOTE_STORAGE="redis://${REDIS_USER}:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}"
          # ccache 4.13 bug: the read-only optional trips the write gate whenever
          # it has *any* value — even false. Only append it when actually true.
          if [ "${REDIS_READONLY}" = "true" ]; then
            CCACHE_REMOTE_STORAGE="${CCACHE_REMOTE_STORAGE}|read-only=true"
          fi
          echo "CCACHE_REMOTE_STORAGE=${CCACHE_REMOTE_STORAGE}" >> $GITHUB_ENV

      - name: Run examples
        id: test
        timeout-minutes: 15
        env:
          TT_METAL_HOME: /usr/libexec/tt-metalium # TODO: Need to get away from env vars!
          TT_METAL_WATCHER: 5
          TT_METAL_WATCHER_TEST_MODE: 1
          CC: ${{ inputs.build-type == 'ASan' && 'clang-20' || 'gcc-12' }}
          CXX: ${{ inputs.build-type == 'ASan' && 'clang++-20' || 'g++-12' }}
        run: |
          set -euo pipefail

          ASAN_BUILD="${{ inputs.build-type == 'ASan' && 'true' || 'false' }}"

          FAILED_EXAMPLES=""

          for example in /usr/share/${{ inputs.product }}/examples/*; do

            example_name=$(basename "$example")

            # https://github.com/actions/toolkit/issues/1001
            echo "::group::${example_name} - build"
            cd "$(mktemp -d)"

            CMAKE_ARGS=(-G Ninja -S "$example" -B .)
            if [ "$ASAN_BUILD" = "true" ]; then
              SANITIZE_FLAGS="-fno-omit-frame-pointer -fsanitize=address,leak,undefined"
              CMAKE_ARGS+=(
                "-DCMAKE_C_FLAGS=${SANITIZE_FLAGS}"
                "-DCMAKE_CXX_FLAGS=${SANITIZE_FLAGS} -Wno-c++11-narrowing"
                "-DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address,leak,undefined"
              )
            fi

            if ! LD_PRELOAD="" cmake "${CMAKE_ARGS[@]}" || ! LD_PRELOAD="" cmake --build .; then
              echo "::endgroup::"
              echo "::warning::${example_name} failed to compile — skipping"
              FAILED_EXAMPLES="${FAILED_EXAMPLES} ${example_name}(build)"
              continue
            fi
            echo "::endgroup::"

            exec_path=$(find . -maxdepth 2 -type f -executable -not -name "*.so")
            for exe in $exec_path; do
              exe_basename=$(basename "$exe")
              echo "::group::${exe_basename} - run"
              rc=0
              "$exe" || rc=$?
              if [ $rc -ne 0 ]; then
                echo "::error::${exe_basename} failed with exit code $rc"
                FAILED_EXAMPLES="${FAILED_EXAMPLES} ${exe_basename}(rc=$rc)"
              fi
              echo "::endgroup::"
            done
          done

          if [ -n "$FAILED_EXAMPLES" ]; then
            echo "::error::Failed examples:${FAILED_EXAMPLES}"
            exit 1
          fi

      - name: Publish ccache summary
        if: ${{ !cancelled() && inputs.enable-kernel-ccache == true }}
        run: |
          echo '## CCache Summary (kernel)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache -s >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Surface remote storage stats and errors from the ccache log.
          # Uses a filter script to avoid overflowing the 1024k step summary limit.
          if [ -f /tmp/ccache.log ]; then
            echo '## CCache Remote Storage (kernel)' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            "$GITHUB_WORKSPACE/.github/scripts/ccache_log_filter.sh" /tmp/ccache.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
