name: "Sanity tests nightly debug run"

run-name: "Sanity tests nightly debug run${{ github.event.schedule == '0 1 * * *' && ' with watcher' || (inputs.enable-watcher && ' with watcher' || '') }}${{ github.event.schedule == '0 2 * * *' && ' with LLK asserts' || (inputs.enable-llk-asserts && ' with LLK asserts' || '') }}"

on:
  schedule:
    # Runs nightly at 12:00 AM UTC
    - cron: "0 0 * * *"
    # Runs nightly at 1:00 AM UTC with watcher enabled
    - cron: "0 1 * * *"
    # Runs nightly at 2:00 AM UTC with LLK asserts enabled
    - cron: "0 2 * * *"

  workflow_dispatch:
    inputs:
      enable-lto:
        default: false
        type: boolean
        description: "Enable Link Time Optimization (LTO)"
      enable-watcher:
        default: false
        type: boolean
        description: "Enable watcher"
      enable-llk-asserts:
        default: false
        type: boolean
        description: "Enable LLK asserts"
      run-wormhole-tests:
        default: true
        type: boolean
        description: "Run Wormhole tests"
      run-blackhole-tests:
        default: true
        type: boolean
        description: "Run Blackhole tests"
      run-ttsim-tests:
        default: true
        type: boolean
        description: "Run TTSIM tests"

permissions:
  actions: read
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  packages: write
  checks: write

jobs:
  determine-debug-flags:
    name: Determine debug flags
    runs-on: ubuntu-latest
    outputs:
      enable-watcher: ${{ steps.check.outputs.enable-watcher }}
      enable-llk-asserts: ${{ steps.check.outputs.enable-llk-asserts }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event.schedule }}" == "0 1 * * *" || "${{ inputs.enable-watcher }}" == "true" ]]; then
            echo "enable-watcher=true" >> "$GITHUB_OUTPUT"
          else
            echo "enable-watcher=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${{ github.event.schedule }}" == "0 2 * * *" || "${{ inputs.enable-llk-asserts }}" == "true" ]]; then
            echo "enable-llk-asserts=true" >> "$GITHUB_OUTPUT"
          else
            echo "enable-llk-asserts=false" >> "$GITHUB_OUTPUT"
          fi

  # sanity-tests.yaml now builds its own artifacts and covers both the Wormhole and
  # Blackhole suites, so this workflow only invokes sanity-tests.yaml. Note: because
  # sanity-tests.yaml treats scheduled (cron) runs as Blackhole + sim only, the nightly
  # schedule below exercises the Blackhole + sim suite; the Wormhole suite is reachable
  # here only via a manual workflow_dispatch with run-wormhole-tests enabled.
  sanity-nightly-debug-ubuntu-22:
    name: Sanity tests nightly debug run (Ubuntu 22.04${{ needs.determine-debug-flags.outputs.enable-watcher == 'true' && ' with watcher' || '' }}${{ needs.determine-debug-flags.outputs.enable-llk-asserts == 'true' && ' with LLK asserts' || '' }})
    needs: [determine-debug-flags]
    if: ${{ always() && !cancelled() && (github.event_name == 'schedule' || inputs.run-wormhole-tests || inputs.run-blackhole-tests) }}
    uses: ./.github/workflows/sanity-tests.yaml
    secrets: inherit
    with:
      build-type: RelWithDebInfo
      platform: "Ubuntu 22.04"
      enable-lto: ${{ inputs.enable-lto || false }}
      enable-watcher: ${{ needs.determine-debug-flags.outputs.enable-watcher == 'true' }}
      enable-llk-asserts: ${{ needs.determine-debug-flags.outputs.enable-llk-asserts == 'true' }}
      run-wormhole: ${{ inputs.run-wormhole-tests || false }}
      run-blackhole: ${{ inputs.run-blackhole-tests || false }}
      run-sim: ${{ inputs.run-ttsim-tests || false }}

  sanity-nightly-debug-ubuntu-24:
    name: Sanity tests nightly debug run (Ubuntu 24.04${{ needs.determine-debug-flags.outputs.enable-watcher == 'true' && ' with watcher' || '' }}${{ needs.determine-debug-flags.outputs.enable-llk-asserts == 'true' && ' with LLK asserts' || '' }})
    needs: [determine-debug-flags]
    if: ${{ always() && !cancelled() && (github.event_name == 'schedule' || inputs.run-wormhole-tests || inputs.run-blackhole-tests) }}
    uses: ./.github/workflows/sanity-tests.yaml
    secrets: inherit
    with:
      build-type: RelWithDebInfo
      platform: "Ubuntu 24.04"
      enable-lto: ${{ inputs.enable-lto || false }}
      enable-watcher: ${{ needs.determine-debug-flags.outputs.enable-watcher == 'true' }}
      enable-llk-asserts: ${{ needs.determine-debug-flags.outputs.enable-llk-asserts == 'true' }}
      run-wormhole: ${{ inputs.run-wormhole-tests || false }}
      run-blackhole: ${{ inputs.run-blackhole-tests || false }}
      run-sim: false # ttsim requires gcc-12 which is not available on Ubuntu 24.04
