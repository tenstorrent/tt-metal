name: "[internal] Model unit tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
      model:
        required: false
        type: string
        default: "all"
      mlperf-read-only:
        required: false
        type: boolean
        default: true
        description: "Set to false to allow write access to MLPerf mount"
      tier:
        required: true
        type: string
        description: "Model tier to filter tests (1, 2, or 3)"
    outputs:
      matrix:
        description: "Filtered matrix of single-host legs that ran (consumed by ai_summary/run for INFRA_FAILURE reconciliation)."
        value: ${{ jobs.load-test-matrix.outputs.matrix }}
      matrix_multihost:
        description: "Filtered matrix of exabox multihost legs that ran."
        value: ${{ jobs.load-test-matrix.outputs.matrix_multihost }}

# Default to read-only. Only the multihost job needs id-token (ttop OIDC), which it grants on the
# job itself. Single-host legs pull the dev container image, so packages: read is the default.
permissions:
  contents: read
  packages: read

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.apply-filters.outputs.matrix }}
      matrix_multihost: ${{ steps.apply-filters.outputs.matrix_multihost }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/models_unit_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "unit" \
            "${{ inputs.tier }}"
      - name: Build unified test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Apply tier and model filters
        id: apply-filters
        # Pass values via env rather than inline ${{ }} so arbitrary cmd content in the matrix
        # (apostrophes, parentheses, etc.) cannot break the shell quoting of the assignment.
        env:
          MATRIX: ${{ steps.build-matrix.outputs.matrix }}
          TIER: ${{ inputs.tier }}
          MODEL: ${{ inputs.model }}
        run: |
          # Filter by tier
          FILTERED=$(echo "$MATRIX" | jq -c --argjson tier "$TIER" '[.[] | select(.tier == $tier)]')
          # Filter by model (substring match, case-insensitive; comma-separated OR-list)
          if [ "$MODEL" != "all" ]; then
            FILTERED=$(echo "$FILTERED" | jq -c --arg m "$MODEL" '
              ($m | ascii_downcase | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))) as $toks
              | [ .[] | select((.model | ascii_downcase) as $mm | any($toks[]; . as $t | $mm | contains($t))) ]')
          fi
          # Split into single-host (container) and multihost (exabox ttop) legs. Multihost legs are
          # tagged with "multihost": true by prepare_test_matrix.py when their SKU carries an
          # `allocation` block in sku_config.yaml (i.e. runs_on exabox-multihost-with-nfs).
          SINGLE=$(echo "$FILTERED" | jq -c '[.[] | select(.multihost != true)]')
          MULTI=$(echo "$FILTERED" | jq -c '[.[] | select(.multihost == true)]')
          emit() {  # $1 = output name, $2 = compact JSON array
            if [ -z "$2" ] || [ "$2" = "[]" ]; then
              echo "$1=[]" >> $GITHUB_OUTPUT
            else
              {
                echo "$1<<EOF"
                echo "$2"
                echo "EOF"
              } >> $GITHUB_OUTPUT
            fi
          }
          if [ "$SINGLE" = "[]" ] && [ "$MULTI" = "[]" ]; then
            echo "::warning::No tests found for tier=${TIER}, model=${MODEL}. Pipeline will be skipped."
          fi
          emit matrix "$SINGLE"
          emit matrix_multihost "$MULTI"

  models-unit-tests:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        # Only the per-runner BH cache modes (local-disk, lfc) need HF online
        # so first-use can populate the cache. Shared NFS modes (cloud-mlperf
        # for BH and the implicit WH mount) keep HF offline — those are :ro
        # and HF would try to write metadata (refs/main, .no_exist markers)
        # on every HEAD call even when the cache already has the model,
        # crashing with `OSError [Errno 30] Read-only file system`.
        HF_HUB_OFFLINE: ${{ (matrix.test-group['weights-cache-mode'] == 'local-disk' || matrix.test-group['weights-cache-mode'] == 'lfc') && '0' || '1' }}
        HF_HUB_CACHE: /mnt/MLPerf/huggingface/hub
        HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        LOGURU_LEVEL: INFO
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        MLPERF_READ_ONLY: ${{ inputs.mlperf-read-only }} # used by GPT-OSS 120B to toggle --skip-model-load
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
        # Mount the HF / tt_cache root so it always appears inside the container
        # at /mnt/MLPerf/huggingface, regardless of which BH cache mode the
        # runner uses. Host source comes from matrix.test-group['weights-cache-mode']
        # (populated from the weights-cache-mode field in .github/sku_config.yaml by prepare_test_matrix.py):
        #   cloud-mlperf            → host /mnt/MLPerf/huggingface (shared NFS)
        #   local-disk / lfc        → host /localdev/blackhole_demos/huggingface_data (per-runner)
        #   yyz4-mnt-models         → host /mnt/models/huggingface (YYZ4 Exabox nfs storage mount)
        #   (no mode → WH SKU)      → host /mnt/MLPerf (whole tree; preserves access to
        #                             /mnt/MLPerf/tt_dnn-models still used by one WH entry)
        # rw-ness: per-runner caches are :rw so first-use HF downloads can populate them;
        # shared NFS honors mlperf-read-only.
        - ${{ matrix.test-group['weights-cache-mode'] == 'cloud-mlperf' && format('/mnt/MLPerf/huggingface:/mnt/MLPerf/huggingface{0}', inputs.mlperf-read-only && ':ro' || ':rw') || (matrix.test-group['weights-cache-mode'] == 'yyz4-mnt-models' && format('/mnt/models/huggingface:/mnt/MLPerf/huggingface{0}', inputs.mlperf-read-only && ':ro' || ':rw')) || (matrix.test-group['weights-cache-mode'] == 'local-disk' || matrix.test-group['weights-cache-mode'] == 'lfc') && '/localdev/blackhole_demos/huggingface_data:/mnt/MLPerf/huggingface:rw' || format('/mnt/MLPerf:/mnt/MLPerf{0}', inputs.mlperf-read-only && ':ro' || ':rw') }}
      options: "--device /dev/tenstorrent --privileged -v /sys:/sys"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        uses: ./docker-job/.github/actions/run-with-log
        with:
          log-file: generated/test_logs/${{ matrix.test-group.name }}.log
          run: |
            mkdir -p generated/test_reports
            ${{ matrix.test-group.cmd }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - name: Generate gtest annotations on failure
        uses: tenstorrent/tt-metal/.github/actions/generate-gtest-failure-message@main
        if: ${{ failure() }}
      - name: 🤖 AI job summary
        if: always() && !cancelled()
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/job@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE/docker-job",
              "input_dirs": ["generated/test_logs"],
              "output_dir": "generated/ai_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          job-name: ${{ matrix.test-group.name }}
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()

  # Multihost model-unit tests. Modeled on the `multihost-tests` job in
  # demo-sp-multihost-impl.yaml: instead of running inside a single-host container, each leg
  # provisions an exabox cluster via the ttop composite actions, fans the build/wheel out to every
  # host with `mpirun --pernode`, resets + validates the cluster, runs the test (typically via
  # tt-run / mpirun), then tears the allocation down. Legs are selected purely by SKU: an entry
  # lands here (rather than in models-unit-tests) when its SKU carries an `allocation` block in
  # sku_config.yaml, which prepare_test_matrix.py surfaces as "multihost": true.
  models-unit-tests-multihost:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.matrix_multihost != '[]' }}
    # Only this job needs OIDC (ttop cluster auth); scoped here rather than workflow-wide.
    permissions:
      contents: read
      id-token: write
    name: ${{ matrix.test-group.name }}
    env:
      OMPI_MCA_btl_tcp_if_include: ens5f0np0
      PRTE_MCA_plm_ssh_args: "-o StrictHostKeyChecking=false -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"
      PRTE_MCA_plm_ssh_pass_libpath: /opt/openmpi-v5.0.7-ulfm/lib
      PRTE_MCA_prte_launch_agent: /opt/openmpi-v5.0.7-ulfm/bin/prted
      PRTE_MCA_prte_default_hostfile: /etc/ttop/hostfile
      PRTE_MCA_prte_fwd_environment: "true"
      PATH: "/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      VIRTUAL_ENV: /opt/venv
      HOME: /home/user
      PIP_CACHE_DIR: /home/user/.cache/pip
      LD_LIBRARY_PATH: /home/user/tt-metal/build/lib
      TT_METAL_HOME: /home/user/tt-metal
      TT_METAL_RUNTIME_ROOT: /home/user/tt-metal
      TT_METAL_CACHE: /home/user/.cache
      # Forwarded to the mpirun ranks (PRTE_MCA_prte_fwd_environment) so gated HF models can be
      # downloaded. Requires the token's HF account to have accepted the model's license.
      HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix_multihost) }}
    runs-on: ${{ matrix.test-group.runs_on }}
    outputs:
      test-result: ${{ steps.run-test.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20

      - name: Parse docker image
        id: parse-image
        run: |
          IMAGE="${{ inputs.docker-image }}"
          REPOSITORY="${IMAGE%:*}"
          TAG="${IMAGE##*:}"
          echo "repository=$REPOSITORY" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Extract allocation spec from SKU
        id: extract-spec
        run: |
          pip3 install PyYAML
          {
            echo "allocation_spec<<EOF"
            python3 .github/scripts/utils/extract_allocation_from_sku.py "${{ matrix.test-group.sku }}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Compute k8s-safe allocation name
        id: names
        # SKU names contain underscores (e.g. bh_spsg) which are invalid in k8s resource
        # names (RFC 1123 subdomain). Map underscores to hyphens for the allocation/env name.
        run: |
          SAFE_SKU=$(printf '%s' "${{ matrix.test-group.sku }}" | tr '_' '-')
          echo "alloc=ci-${{ github.run_id }}-${SAFE_SKU}-${{ strategy.job-index }}" >> $GITHUB_OUTPUT

      - name: Create allocation for ${{ matrix.test-group.name }}
        id: allocation
        uses: ./.github/actions/ttop-create-allocation
        timeout-minutes: 120
        with:
          allocationName: ${{ steps.names.outputs.alloc }}
          namespace: ttop-ci
          spec: ${{ steps.extract-spec.outputs.allocation_spec }}

      - name: Get allocation configs
        uses: ./.github/actions/ttop-get-allocation-data
        with:
          allocationName: ${{ steps.names.outputs.alloc }}
          allocationNamespace: ttop-ci

      - name: Create test environment
        uses: ./.github/actions/ttop-create-environment
        timeout-minutes: 30
        with:
          environmentName:  ${{ steps.names.outputs.alloc }}
          allocationName:  ${{ steps.names.outputs.alloc }}
          allocationNamespace: ttop-ci
          workerRepository: ${{ steps.parse-image.outputs.repository }}
          workerTag: ${{ steps.parse-image.outputs.tag }}
          useDevHostMount: 'true'
          sharedVolumeEnabled: 'true'
          path: /etc/ttop

      - name: Download Build Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.build-artifact-name }}
          path: /ci/artifacts

      - name: Download Python Wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.wheel-artifact-name }}
          path: /ci/artifacts

      - name: Unpack artifacts & install
        run: |
          # Move the cloned directory to workers. TODO: Clone directly to NFS
          rm -rf /ci/tt-metal
          cp -r "$GITHUB_WORKSPACE" /ci/tt-metal
          if ! command -v zstd >/dev/null 2>&1; then
            echo "zstd not found in runner context, installing fallback..."
            sudo apt-get update
            sudo apt-get install -y zstd
          fi
          shopt -s globstar nullglob
          build_archives=(/ci/artifacts/**/*.tar.zst)
          echo "Found ${#build_archives[@]} .tar.zst candidate(s) under /ci/artifacts"
          printf ' - %s\n' "${build_archives[@]}"
          if [ ${#build_archives[@]} -eq 0 ]; then
            echo "ERROR: Could not find any .tar.zst under /ci/artifacts"
            echo "Artifact directory layout:"
            ls -R /ci/artifacts
            exit 1
          fi
          BUILD_ARCHIVE="${build_archives[0]}"
          echo "Using build archive: ${BUILD_ARCHIVE}"

          # Unpack build artifact locally as well. Pipeline config generation runs on the runner
          # and expects test binaries under /ci/tt-metal/build/test.
          tar --zstd -xf "${BUILD_ARCHIVE}" -C /ci/tt-metal
          sudo rm -rf /home/user/tt-metal
          sudo mkdir -p /home/user
          sudo chown "$(id -u):$(id -g)" /home/user
          cp -r /ci/tt-metal /home/user/
          mpirun --pernode bash -lc 'rm -rf /home/user/tt-metal && cp -r /ci/tt-metal /home/user/'
          mpirun --pernode git -C /home/user/tt-metal submodule update --init --recursive

          # Unpack artifacts
          mpirun --pernode tar --zstd -xf "${BUILD_ARCHIVE}" -C /home/user/tt-metal
          ttnn_wheels=(/ci/artifacts/**/ttnn-*.whl)
          echo "Found ${#ttnn_wheels[@]} ttnn wheel candidate(s) under /ci/artifacts"
          printf ' - %s\n' "${ttnn_wheels[@]}"
          if [ ${#ttnn_wheels[@]} -eq 0 ]; then
            echo "ERROR: Could not find ttnn-*.whl under /ci/artifacts"
            echo "Artifact directory layout:"
            ls -R /ci/artifacts
            exit 1
          fi
          # Include pytest (+ pytest-timeout, needed by the --timeout flag) so test entries can
          # run pytest in the worker venv, which is otherwise runtime-only.
          mpirun --pernode uv pip install "${ttnn_wheels[@]}" pytest==9.0.3 pytest-timeout==2.4.0

      - name: Reset cards and validate cluster for ${{ matrix.test-group.name }}
        working-directory: /tmp
        timeout-minutes: 30
        run: |
          MAX_RECOVERY_ATTEMPTS=10

          echo "--- Pre-check: tt-smi visibility on all hosts ---"
          mpirun --pernode --tag-output \
            bash -lc '
              snapshot=$(tt-smi --snapshot_no_tty --snapshot)
              driver=$(jq -r ".host_info.Driver // \"unknown\"" <<< "$snapshot")
              tt_smi=$(jq -r ".host_sw_vers.tt_smi // \"unknown\"" <<< "$snapshot")
              echo "$(hostname): Driver=${driver} tt_smi=${tt_smi}"
            ' || true

          run_cluster_validation() {
            mpirun --pernode --tag-output \
              /home/user/tt-metal/build/tools/scaleout/run_cluster_validation \
              --send-traffic \
              --hard-fail \
              --cabling-descriptor-path /data/scaleout_configs/bh_glx_exabox/cabling_descriptor.textproto \
              --deployment-descriptor-path /data/scaleout_configs/bh_glx_exabox/deployment_descriptor.textproto \
              --num-iterations 5
          }

          echo "--- Checking cluster health before reset ---"
          if run_cluster_validation; then
            echo "SUCCESS: Cluster validation passed without reset"
            exit 0
          fi

          for attempt in $(seq 1 "$MAX_RECOVERY_ATTEMPTS"); do
            echo "=== Recovery attempt $attempt of $MAX_RECOVERY_ATTEMPTS ==="
            reset_success=false
            validation_success=false

            echo "--- Resetting cards with tt-smi ---"
            if mpirun --pernode tt-smi -glx_reset; then
              reset_success=true
            else
              echo "WARNING: Reset failed on attempt $attempt"
            fi

            if [ "$reset_success" = true ]; then
              echo "--- Sleeping 5s after reset to allow links/services to settle ---"
              sleep 5

              echo "--- Running cluster validation ---"
              if run_cluster_validation; then
                validation_success=true
              else
                echo "WARNING: Validation failed on attempt $attempt"
              fi
            else
              echo "WARNING: Skipping validation because reset failed on attempt $attempt"
            fi

            if [ "$reset_success" = true ] && [ "$validation_success" = true ]; then
              echo "SUCCESS: Reset and cluster validation passed on attempt $attempt"
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_RECOVERY_ATTEMPTS" ]; then
              echo "Sleeping 30s before retry..."
              sleep 30
            fi
          done

          echo "ERROR: Recovery failed after $MAX_RECOVERY_ATTEMPTS attempts"
          exit 1

      - name: Verify ttnn imports on workers
        working-directory: /tmp
        run: |
          mpirun --pernode --tag-output bash -lc '
            python3 -c "import ttnn; print(\"ttnn import: OK\")"
            python3 -c "import ttnn.device; print(\"ttnn.device import: OK\")"
          '

      - name: Check /mnt/models access on workers
        working-directory: /tmp
        run: |
          mpirun --pernode --tag-output bash -lc '
            test -r /mnt/models
          '

      - name: ${{ matrix.test-group.name }}
        id: run-test
        timeout-minutes: ${{ matrix.test-group.timeout }}
        # Keep runtime compilation and tt-run working directory on a single source root.
        # Avoid mixing /ci/tt-metal and /home/user/tt-metal include paths in one run.
        working-directory: /home/user/tt-metal
        run: |
          # Store command safely using heredoc
          CMD=$(cat << 'EOF'
          ${{ matrix.test-group.cmd }}
          EOF
          )

          echo "Running: ${{ matrix.test-group.name }}"
          echo "$CMD"
          eval "$CMD"

      - name: Delete test environment
        if: always()
        uses: ./.github/actions/ttop-delete-environment
        with:
          environmentName:  ${{ steps.names.outputs.alloc }}
          namespace: ttop-ci

      - name: Delete allocation
        if: always()
        uses: ./.github/actions/ttop-delete-allocation
        with:
          allocationName:  ${{ steps.names.outputs.alloc }}
          namespace: ttop-ci

      - uses: ./.github/actions/slack-report
        if: ${{ failure() }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
          owner: ${{ matrix.test-group.owner_id }}
