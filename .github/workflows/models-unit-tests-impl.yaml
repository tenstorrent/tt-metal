name: "[internal] Model unit tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
      model:
        required: false
        type: string
        default: "all"
      mlperf-read-only:
        required: false
        type: boolean
        default: true
        description: "Set to false to allow write access to MLPerf mount"
      tier:
        required: true
        type: string
        description: "Model tier to filter tests (1, 2, or 3)"
    outputs:
      matrix:
        description: "Filtered matrix of single-host legs that ran (consumed by ai_summary/run for INFRA_FAILURE reconciliation)."
        value: ${{ jobs.load-test-matrix.outputs.matrix }}
      matrix_multihost:
        description: "Filtered matrix of exabox multihost legs that ran."
        value: ${{ jobs.load-test-matrix.outputs.matrix_multihost }}

# Default to read-only. Only the multihost job needs id-token (ttop OIDC), which it grants on the
# job itself. Single-host legs pull the dev container image, so packages: read is the default.
permissions:
  contents: read
  packages: read

jobs:
  load-test-matrix:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.apply-filters.outputs.matrix }}
      matrix_multihost: ${{ steps.apply-filters.outputs.matrix_multihost }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/models_unit_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "unit" \
            "${{ inputs.tier }}"
      - name: Build unified test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Apply tier and model filters
        id: apply-filters
        # Pass values via env rather than inline ${{ }} so arbitrary cmd content in the matrix
        # (apostrophes, parentheses, etc.) cannot break the shell quoting of the assignment.
        env:
          MATRIX: ${{ steps.build-matrix.outputs.matrix }}
          TIER: ${{ inputs.tier }}
          MODEL: ${{ inputs.model }}
          SKUS: ${{ inputs.enabled-skus }}
        run: |
          # Filter by tier
          FILTERED=$(echo "$MATRIX" | jq -c --argjson tier "$TIER" '[.[] | select(.tier == $tier)]')
          # Filter by model (substring match, case-insensitive; comma-separated OR-list)
          if [ "$MODEL" != "all" ]; then
            FILTERED=$(echo "$FILTERED" | jq -c --arg m "$MODEL" '
              ($m | ascii_downcase | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))) as $toks
              | [ .[] | select((.model | ascii_downcase) as $mm | any($toks[]; . as $t | $mm | contains($t))) ]')
          fi
          # Split into single-host (container) and multihost (exabox ttop) legs. Multihost legs are
          # tagged with "multihost": true by prepare_test_matrix.py when their SKU carries an
          # `allocation` block in sku_config.yaml (i.e. runs_on exabox-multihost-with-nfs).
          SINGLE=$(echo "$FILTERED" | jq -c '[.[] | select(.multihost != true)]')
          MULTI=$(echo "$FILTERED" | jq -c '[.[] | select(.multihost == true)]')
          emit() {  # $1 = output name, $2 = compact JSON array
            if [ -z "$2" ] || [ "$2" = "[]" ]; then
              echo "$1=[]" >> $GITHUB_OUTPUT
            else
              {
                echo "$1<<EOF"
                echo "$2"
                echo "EOF"
              } >> $GITHUB_OUTPUT
            fi
          }
          if [ "$SINGLE" = "[]" ] && [ "$MULTI" = "[]" ]; then
            # No leg matched the requested SKU(s). Common when a dispatch picks an exabox SKU
            # (e.g. bh_sc4/bh_sc16) that no test entry defines yet: both jobs skip silently
            # otherwise, so name the SKUs to make the empty dispatch actionable.
            echo "::warning::No tests found for tier=${TIER}, model=${MODEL}, skus=[${SKUS}]. No test entry declares any of these SKUs; both single-host and multihost jobs will be skipped."
          fi
          emit matrix "$SINGLE"
          emit matrix_multihost "$MULTI"

  models-unit-tests:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        # Only the per-runner BH cache modes (local-disk, lfc) need HF online
        # so first-use can populate the cache. Shared NFS modes (cloud-mlperf
        # for BH and the implicit WH mount) keep HF offline — those are :ro
        # and HF would try to write metadata (refs/main, .no_exist markers)
        # on every HEAD call even when the cache already has the model,
        # crashing with `OSError [Errno 30] Read-only file system`.
        HF_HUB_OFFLINE: ${{ (matrix.test-group['weights-cache-mode'] == 'local-disk' || matrix.test-group['weights-cache-mode'] == 'lfc') && '0' || '1' }}
        HF_HUB_CACHE: /mnt/MLPerf/huggingface/hub
        HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        LOGURU_LEVEL: INFO
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        MLPERF_READ_ONLY: ${{ inputs.mlperf-read-only }} # used by GPT-OSS 120B to toggle --skip-model-load
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
        # Mount the HF / tt_cache root so it always appears inside the container
        # at /mnt/MLPerf/huggingface, regardless of which BH cache mode the
        # runner uses. Host source comes from matrix.test-group['weights-cache-mode']
        # (populated from the weights-cache-mode field in .github/sku_config.yaml by prepare_test_matrix.py):
        #   cloud-mlperf            → host /mnt/MLPerf/huggingface (shared NFS)
        #   local-disk / lfc        → host /localdev/blackhole_demos/huggingface_data (per-runner)
        #   yyz4-mnt-models         → host /mnt/models/huggingface (YYZ4 Exabox nfs storage mount)
        #   (no mode → WH SKU)      → host /mnt/MLPerf (whole tree; preserves access to
        #                             /mnt/MLPerf/tt_dnn-models still used by one WH entry)
        # rw-ness: per-runner caches are :rw so first-use HF downloads can populate them;
        # shared NFS honors mlperf-read-only.
        - ${{ matrix.test-group['weights-cache-mode'] == 'cloud-mlperf' && format('/mnt/MLPerf/huggingface:/mnt/MLPerf/huggingface{0}', inputs.mlperf-read-only && ':ro' || ':rw') || (matrix.test-group['weights-cache-mode'] == 'yyz4-mnt-models' && format('/mnt/models/huggingface:/mnt/MLPerf/huggingface{0}', inputs.mlperf-read-only && ':ro' || ':rw')) || (matrix.test-group['weights-cache-mode'] == 'local-disk' || matrix.test-group['weights-cache-mode'] == 'lfc') && '/localdev/blackhole_demos/huggingface_data:/mnt/MLPerf/huggingface:rw' || format('/mnt/MLPerf:/mnt/MLPerf{0}', inputs.mlperf-read-only && ':ro' || ':rw') }}
      options: "--device /dev/tenstorrent --privileged -v /sys:/sys -e TT_GH_CI_INFRA"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        uses: ./docker-job/.github/actions/run-with-log
        with:
          log-file: generated/test_logs/${{ matrix.test-group.name }}.log
          run: |
            mkdir -p generated/test_reports
            ${{ matrix.test-group.cmd }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - name: Generate gtest annotations on failure
        uses: tenstorrent/tt-metal/.github/actions/generate-gtest-failure-message@main
        if: ${{ failure() }}
      - name: 🤖 AI job summary
        if: always() && !cancelled()
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/job@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE/docker-job",
              "input_dirs": ["generated/test_logs"],
              "output_dir": "generated/ai_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          job-name: ${{ matrix.test-group.name }}
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()

  # Multihost (exabox) model-unit tests. Extracted into its own reusable workflow so the exabox
  # ttop allocation/reset/teardown lifecycle lives in one file (candidate for a future shared
  # setup/cleanup step, and to de-dup against demo-sp-multihost-impl.yaml) without touching the
  # single-host pipeline. Legs are selected purely by SKU: an entry is routed here (rather than to
  # models-unit-tests) when its SKU carries an `allocation` block in sku_config.yaml, which
  # prepare_test_matrix.py surfaces as "multihost": true and load-test-matrix collects into
  # matrix_multihost.
  models-unit-tests-multihost:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.matrix_multihost != '[]' }}
    # OIDC (ttop cluster auth) is needed only by this leg; grant it here rather than
    # workflow-wide. Job-level permissions replace inherited defaults, so restate reads too.
    permissions:
      contents: read
      packages: read
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/models-unit-tests-multihost-impl.yaml
    with:
      docker-image: ${{ inputs.docker-image }}
      build-artifact-name: ${{ inputs.build-artifact-name }}
      wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      matrix: ${{ needs.load-test-matrix.outputs.matrix_multihost }}
