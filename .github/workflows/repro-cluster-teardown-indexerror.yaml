# THROWAWAY diagnostic workflow — safe to delete after the investigation closes.
# Round 2: the synthetic requires_mesh_topology repro (round 1) did not reproduce
# the crash, and a follow-up check found most of the real failing test files
# (test_mla.py, test_kv_cache_table.py, sparse_mla/test_sparse_mla.py) don't
# even use that marker. This round instruments the real ttnn device-probe
# entry points (see conftest.py pytest_sessionstart) and repeatedly runs the
# actual production "MLA Chunked" test to catch a live failure with a full
# call trace. Triggers on push to this branch only, same reasoning as before.
name: "[investigation] Repro cluster-teardown IndexError"

on:
  push:
    branches:
      - ci-repro/cluster-teardown-indexerror
  workflow_dispatch:

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml

  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: Release
      build-wheel: true
      platform: "Ubuntu 22.04"

  repro:
    needs: [check-harbor, build-artifact]
    name: "repro (bh_galaxy, instrumented)"
    runs-on: [arch-blackhole, pipeline-functional, topology-6u, in-service]
    timeout-minutes: 40
    container:
      image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
        REPRO_INSTRUMENT_DEVICE_CALLS: "1"
        MESH_DEVICE: TG
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          ref: ${{ github.ref }}
          submodules: recursive
          path: docker-job
      - name: Mark repository as safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Setup job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
          wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}

      - name: Run production MLA Chunked test 8x with instrumentation
        id: repro
        run: |
          set -uo pipefail
          RUNS=8
          fail_count=0
          repro_count=0
          mkdir -p /tmp/repro_logs

          for i in $(seq 1 $RUNS); do
            echo "::group::run $i/$RUNS"
            if pytest models/demos/deepseek_v3_d_p/tests/test_mla.py::test_mla_chunked_prefill \
                -k "maxedge-1u and cpu and 8x4 and fabric2d" -vvv --tb=long \
                > "/tmp/repro_logs/run_$i.log" 2>&1; then
              echo "run $i: PASSED"
            else
              fail_count=$((fail_count+1))
              if grep -q "IndexError: unordered_map::at" "/tmp/repro_logs/run_$i.log"; then
                repro_count=$((repro_count+1))
                echo "run $i: FAILED — reproduced the IndexError"
              else
                echo "run $i: FAILED — different error"
              fi
            fi
            cat "/tmp/repro_logs/run_$i.log"
            echo "::endgroup::"
          done

          {
            echo "## Instrumented MLA Chunked repro"
            echo ""
            echo "Ran the real production test $RUNS times: $repro_count/$RUNS reproduced the IndexError, $fail_count/$RUNS failed total."
            if [ "$repro_count" -eq 0 ]; then
              echo ""
              echo "Did not reproduce this round either. See full run logs above (job log) for the [REPRO-INSTRUMENT] call trace on every run regardless of pass/fail."
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
