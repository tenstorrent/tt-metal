# THROWAWAY diagnostic workflow — safe to delete after the investigation closes.
# Round 3: round 2 proved the crash is real and 100% reproducible via the
# production MLA Chunked test, and pinpointed it to MetalContext's implicit
# default-context init (conftest.py:548 -> GetNumPCIeDevices -> MetalContext::
# instance() -> create_default_instance_implicit_locked()) — but that was
# inferred from log adjacency, not a real stack trace. This round adds native
# backtrace dumps at every candidate .at() call site in
# tt_metal/impl/context/metal_env.cpp (MetalEnvImpl ctor, is_base_routing_fw_enabled,
# should_enable_blackhole_dram_programmable_cores, set_hal) and
# tt_metal/llrt/tt_cluster.cpp (Cluster::set_hal's four sub-calls), built with
# RelWithDebInfo for symbol resolution, to get the actual throw site instead of
# a theory. Triggers on push to this branch only, same reasoning as before.
name: "[investigation] Repro cluster-teardown IndexError"

on:
  push:
    branches:
      - ci-repro/cluster-teardown-indexerror
  workflow_dispatch:

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml

  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: RelWithDebInfo
      build-wheel: true
      platform: "Ubuntu 22.04"

  repro:
    needs: [check-harbor, build-artifact]
    name: "repro (bh_galaxy, instrumented)"
    runs-on: [arch-blackhole, pipeline-functional, topology-6u, in-service]
    timeout-minutes: 40
    container:
      image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
        REPRO_INSTRUMENT_DEVICE_CALLS: "1"
        MESH_DEVICE: TG
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          ref: ${{ github.ref }}
          submodules: recursive
          path: docker-job
      - name: Mark repository as safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Setup job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
          wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}

      - name: Run production MLA Chunked test with native backtrace instrumentation
        id: repro
        run: |
          set -uo pipefail
          RUNS=3
          fail_count=0
          repro_count=0
          mkdir -p /tmp/repro_logs

          for i in $(seq 1 $RUNS); do
            echo "::group::run $i/$RUNS"
            if pytest models/demos/deepseek_v3_d_p/tests/test_mla.py::test_mla_chunked_prefill \
                -k "maxedge-1u and cpu and 8x4 and fabric2d" -vvv --tb=long \
                > "/tmp/repro_logs/run_$i.log" 2>&1; then
              echo "run $i: PASSED"
            else
              fail_count=$((fail_count+1))
              if grep -q "IndexError: unordered_map::at" "/tmp/repro_logs/run_$i.log"; then
                repro_count=$((repro_count+1))
                echo "run $i: FAILED — reproduced the IndexError"
              else
                echo "run $i: FAILED — different error"
              fi
            fi
            cat "/tmp/repro_logs/run_$i.log"
            echo "::endgroup::"
          done

          {
            echo "## Instrumented MLA Chunked repro (native backtrace)"
            echo ""
            echo "Ran the real production test $RUNS times: $repro_count/$RUNS reproduced the IndexError, $fail_count/$RUNS failed total."
            echo ""
            echo '```'
            grep -h "REPRO-INSTRUMENT" /tmp/repro_logs/run_*.log || echo "(no [REPRO-INSTRUMENT] lines captured)"
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
