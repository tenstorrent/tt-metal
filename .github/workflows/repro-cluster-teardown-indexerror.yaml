# THROWAWAY diagnostic workflow — safe to delete after the investigation closes.
# Round 3: round 2 proved the crash is real and 100% reproducible via the
# production MLA Chunked test, and pinpointed it to MetalContext's implicit
# default-context init (conftest.py:548 -> GetNumPCIeDevices -> MetalContext::
# instance() -> create_default_instance_implicit_locked()) — but that was
# inferred from log adjacency, not a real stack trace. Round 3 added native
# backtrace dumps at every candidate .at() call site in
# tt_metal/impl/context/metal_env.cpp (MetalEnvImpl ctor, is_base_routing_fw_enabled,
# should_enable_blackhole_dram_programmable_cores, set_hal) and
# tt_metal/llrt/tt_cluster.cpp (Cluster::set_hal's four sub-calls), built with
# RelWithDebInfo for symbol resolution — but a 3-sample bash loop on the scarce
# bh_galaxy (topology-6u) runner queued ~9h and came back clean.
#
# Round 4: nothing in the theory is actually Galaxy-specific — the candidate
# throw sites are chip_id/board_type-keyed maps built during any cluster/
# topology discovery, not gated on chip count. The only real requirement is an
# ethernet link that still needs to finish training when the process boots, so
# this should reproduce on any topology with a real inter-chip ethernet link
# (e.g. P150_X2/"bh_quietbox_2"), which uses a far larger, less contended
# runner pool than the specialty bh_galaxy rack — hence the 9h queue there.
# Also replaces the "hope 3 incidental samples land on it" approach with
# forcing the race on demand every iteration (see
# .github/scripts/ci_repro_force_retrain_loop.py) and looping many samples in
# one job/one queue-wait instead of restarting the whole pytest process (and
# paying a fresh CI queue) per sample.
name: "[investigation] Repro cluster-teardown IndexError"

on:
  push:
    branches:
      - ci-repro/cluster-teardown-indexerror
  workflow_dispatch:

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml

  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: RelWithDebInfo
      build-wheel: true
      platform: "Ubuntu 22.04"

  repro:
    needs: [check-harbor, build-artifact]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary target: real inter-chip ethernet link, far less contended runner pool.
          - name: "bh_quietbox_2 (P150_X2, instrumented)"
            runs-on: '["BH-Quietbox-2", "pipeline-perf", "in-service"]'
            runs: 50
          # Comparison: the original 32-chip Galaxy mesh where this was first observed.
          - name: "bh_galaxy (instrumented)"
            runs-on: '["arch-blackhole", "pipeline-functional", "topology-6u", "in-service"]'
            runs: 30
          # Negative control: a lone card with no ethernet partner has nothing to retrain
          # against, so this should NOT reproduce — if it does, the theory is wrong.
          - name: "bh_p150 (lone card, negative control)"
            runs-on: '["in-service", "arch-blackhole", "P150", "pipeline-functional"]'
            runs: 30
    name: "repro (${{ matrix.name }})"
    runs-on: ${{ fromJSON(matrix.runs-on) }}
    timeout-minutes: 40
    container:
      image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
        REPRO_INSTRUMENT_DEVICE_CALLS: "1"
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          ref: ${{ github.ref }}
          submodules: recursive
          path: docker-job
      - name: Mark repository as safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Setup job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
          wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}

      - name: Forced-retrain repro loop with native backtrace instrumentation
        id: repro
        run: python3 .github/scripts/ci_repro_force_retrain_loop.py ${{ matrix.runs }}

      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
