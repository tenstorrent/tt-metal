name: (triage) Auto Triage

on:
  workflow_dispatch:
    inputs:
      workflow_name:
        description: "Workflow file base name under .github/workflows (e.g., .github/workflows/galaxy-quick.yml → galaxy-quick; t3000-unit-tests; single-card-demo-tests), without .yml/.yaml extension"
        required: true
        type: string
      job_name:
        description: "Job/subjob name within the workflow"
        required: true
        type: string
      slack_ts:
        description: "Slack message timestamp for threading replies"
        required: false
        default: ""
        type: string
      send-slack-message:
        description: "Send slack message"
        required: false
        default: false
        type: boolean
      slack_channel_id:
        description: "Slack channel ID for sending notifications"
        required: false
        default: ''
        type: string
      cutoff_commit:
        description: "Optional commit SHA to ignore runs newer than this commit"
        required: false
        default: ""
        type: string


jobs:
  auto-triage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout tt-auto-triage tooling
        uses: actions/checkout@v4
        with:
          repository: tenstorrent/tt-auto-triage
          ref: fix/job-owner-representative-note
          path: .temp_tt_auto_triage

      - name: Prepare minimal slack message payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .auto_triage/output .auto_triage/data .auto_triage/auto_triage/data
          cat > .auto_triage/output/slack_message.json <<'EOF'
          {
            "case": 1,
            "scenario": "Deterministic failure with identified commit",
            "failing_test_name": "temp_slack_owner_extraction_test",
            "failure_message": "Temporary extraction-only Slack test run",
            "notes": "This temporary workflow validates parent-thread owner extraction and group representative resolution.",
            "commits": [],
            "relevant_developers": []
          }
          EOF

      - name: Download Slack users/groups for resolution
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install requests
          python3 .temp_tt_auto_triage/.github/actions/auto-triage/auto_triage/download_slack_directory.py \
            --output .auto_triage/auto_triage/data/slack_directory.json \
            --groups-output .auto_triage/auto_triage/data/slack_groups.json
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Run Slack reporter only
        if: inputs.send-slack-message == true
        uses: tenstorrent/tt-auto-triage/.github/actions/slack-report-auto-triage@fix/job-owner-representative-note
        with:
          channel_id: ${{ inputs.slack_channel_id != '' && inputs.slack_channel_id || secrets.SLACK_METAL_INFRA_CHANNEL_ID }}
          slack_message_path: .auto_triage/output/slack_message.json
          job_name: ${{ inputs.job_name }}
          workflow_name: ${{ inputs.workflow_name }}
          slack_ts: ${{ inputs.slack_ts }}
          allow_pings: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ inputs.slack_channel_id != '' && inputs.slack_channel_id || secrets.SLACK_METAL_INFRA_CHANNEL_ID }}
