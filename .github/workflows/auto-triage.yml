name: (triage) Auto Triage

on:
  workflow_dispatch:
    inputs:
      workflow_name:
        description: "Workflow file name to inspect (e.g., galaxy-quick)"
        required: true
        type: string
      job_name:
        description: "Job/subjob name within the workflow"
        required: true
        type: string
      slack_ts:
        description: "Slack message timestamp for threading replies"
        required: false
        default: ""
        type: string
      send-slack-message:
        description: "Send slack message"
        required: false
        default: false
        type: boolean
      slack_channel_id:
        description: "Slack channel ID for sending notifications"
        required: false
        default: ''
        type: string
      run_url:
        description: "Optional workflow run URL (e.g. https://github.com/tenstorrent/tt-metal/actions/runs/123). When set, auto-triage only considers runs at or before this run - useful for testing on errors that have already been fixed."
        required: false
        default: ""
        type: string


jobs:
  auto-triage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - name: Get run commit ref
        if: inputs.run_url != ''
        id: get-run-ref
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ inputs.run_url }}';
            const match = url.match(/\/actions\/runs\/(\d+)/);
            if (!match) core.setFailed('Invalid run URL - expected format: .../actions/runs/<run_id>');
            const runId = match[1];
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId
            });
            core.setOutput('head_sha', run.head_sha);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.run_url != '' && steps.get-run-ref.outputs.head_sha || github.ref }}

      - name: Run auto triage
        uses: tenstorrent/tt-auto-triage/.github/actions/auto-triage@fix/broken-pipe-and-cleanup
        with:
          workflow-name: ${{ inputs.workflow_name }}
          job-name: ${{ inputs.job_name }}
          copilot-pat: ${{ secrets.AUTO_TRIAGE_TOKEN }}
          slack_ts: ${{ inputs.slack_ts }}
          allow-pings: true
          send-slack-message: ${{ inputs.send-slack-message }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # SLACK_WEBHOOK_URL is removed in favor of SLACK_BOT_TOKEN + channel logic in the action
          SLACK_CHANNEL_ID: ${{ inputs.slack_channel_id != '' && inputs.slack_channel_id || 'C09EC0QNSB0' }}
