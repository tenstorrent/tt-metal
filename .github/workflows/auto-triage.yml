name: (triage) Auto Triage

on:
  workflow_dispatch:
    inputs:
      workflow_name:
        description: "Workflow file base name under .github/workflows (e.g., .github/workflows/galaxy-quick.yml → galaxy-quick; t3000-unit-tests; single-card-demo-tests), without .yml/.yaml extension"
        required: true
        type: string
      job_name:
        description: "Job/subjob name within the workflow"
        required: true
        type: string
      slack_ts:
        description: "Slack message timestamp for threading replies"
        required: false
        default: ""
        type: string
      send-slack-message:
        description: "Send slack message"
        required: false
        default: false
        type: boolean
      slack_channel_id:
        description: "Slack channel ID for sending notifications"
        required: false
        default: ''
        type: string
      cutoff_commit:
        description: "Optional commit SHA to ignore runs newer than this commit"
        required: false
        default: ""
        type: string
      slack-test-only:
        description: "Skip analysis and use canned Slack message (for E2E testing)"
        required: false
        default: false
        type: boolean
      e2e-post-mock-parent:
        description: "Post a mock aggregate parent message before running (for E2E testing)"
        required: false
        default: false
        type: boolean


jobs:
  auto-triage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # E2E test mode: post a mock aggregate message with @metal infra team as owner
      - name: "[E2E] Post mock parent message to Slack"
        id: mock_parent
        if: inputs.e2e-post-mock-parent == true
        shell: bash
        run: |
          set -euo pipefail
          CHANNEL="${{ inputs.slack_channel_id }}"
          if [ -z "$CHANNEL" ]; then
            CHANNEL="${{ secrets.SLACK_METAL_INFRA_CHANNEL_ID }}"
          fi

          MOCK_TEXT="*[E2E TEST — auto-triage disclaimer]* Aggregate Workflow Data run: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|this run>
          [Part 1/3]

           Regressions (Pass → Fail):
          (T3K) T3000 perf tests — workflow — run — a04266e
             • t3000-perf-tests / ${{ inputs.job_name }} @metal infra team"

          RESPONSE=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg channel "$CHANNEL" --arg text "$MOCK_TEXT" '{channel: $channel, text: $text}')")

          echo "Slack post response:"
          echo "$RESPONSE" | jq .

          OK=$(echo "$RESPONSE" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "::error::Failed to post mock parent: $(echo "$RESPONSE" | jq -r '.error')"
            exit 1
          fi

          THREAD_TS=$(echo "$RESPONSE" | jq -r '.ts')
          echo "mock_thread_ts=$THREAD_TS" >> "$GITHUB_OUTPUT"
          echo "Posted mock parent with ts=$THREAD_TS"

      - name: Run auto triage
        uses: tenstorrent/tt-auto-triage/.github/actions/auto-triage@fix/job-owner-representative-note
        with:
          workflow-name: ${{ inputs.workflow_name }}
          job-name: ${{ inputs.job_name }}
          copilot-pat: ${{ secrets.AUTO_TRIAGE_TOKEN }}
          slack_ts: ${{ inputs.e2e-post-mock-parent == true && steps.mock_parent.outputs.mock_thread_ts || inputs.slack_ts }}
          allow-pings: false
          send-slack-message: ${{ inputs.send-slack-message }}
          slack-test-only: ${{ inputs.slack-test-only && 'true' || 'false' }}
          cutoff-commit: ${{ inputs.cutoff_commit }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ inputs.slack_channel_id != '' && inputs.slack_channel_id || secrets.SLACK_METAL_INFRA_CHANNEL_ID }}

      # E2E verification: check the Slack thread for the disclaimer
      - name: "[E2E] Verify disclaimer in Slack thread"
        if: always() && inputs.e2e-post-mock-parent == true
        shell: bash
        run: |
          set -euo pipefail
          sleep 5
          THREAD_TS="${{ steps.mock_parent.outputs.mock_thread_ts }}"
          CHANNEL="${{ inputs.slack_channel_id }}"
          if [ -z "$CHANNEL" ]; then
            CHANNEL="${{ secrets.SLACK_METAL_INFRA_CHANNEL_ID }}"
          fi

          echo "Checking thread ts=$THREAD_TS in channel=$CHANNEL"
          RESPONSE=$(curl -s "https://slack.com/api/conversations.replies?channel=${CHANNEL}&ts=${THREAD_TS}" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN")

          echo "Thread messages:"
          echo "$RESPONSE" | jq -r '.messages[] | "---\n" + (.text // "(no text)")[0:2000]'

          DISCLAIMER="Metalinfra was chosen as the default owner"
          if echo "$RESPONSE" | jq -r '.messages[].text // ""' | grep -qi "$DISCLAIMER"; then
            echo "::notice::SUCCESS: Disclaimer text found in Slack thread!"
            echo "### E2E Disclaimer Test PASSED" >> "$GITHUB_STEP_SUMMARY"
            echo "Default-owner disclaimer appeared in the thread reply." >> "$GITHUB_STEP_SUMMARY"
            echo "**Thread:** https://tenstorrent.slack.com/archives/${CHANNEL}/p${THREAD_TS//./}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::FAIL: Disclaimer NOT found in Slack thread"
            echo "### E2E Disclaimer Test FAILED" >> "$GITHUB_STEP_SUMMARY"
            echo "Expected disclaimer text not found." >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$RESPONSE" | jq -r '.messages[].text // ""' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Dump debug artifacts
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### job_owner.json" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .auto_triage/data/job_owner.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "not found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
