name: "âš™ï¸ Setup and Test"

on:
  workflow_call:
    inputs:
      docker_image:
        description: "The Docker image to use for the container"
        required: true
        type: string
      runs_on:
        description: "The runner to use for the job"
        required: true
        type: string
      test_splits:
        description: "Number of test groups to split tests into (e.g., 4)"
        required: true
        type: number
      pytest_markers:
        description: "Pytest mark expression to select/deselect tests (e.g., 'not perf', 'nightly or not perf')"
        required: false
        default: "not perf and not quasar"
        type: string
      timeout_minutes:
        description: "Timeout in minutes for the test job"
        required: false
        default: 80
        type: number
      random_order:
        description: "Enable randomized test order"
        required: false
        default: false
        type: boolean
      coverage:
        description: "Enable code coverage testing for entire test suite"
        required: false
        default: false
        type: boolean
      use_durations:
        description: "Use previously collected test durations for balanced splitting"
        required: false
        default: true
        type: boolean

permissions:
  checks: write
  contents: read

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          matrix=$(echo "[$(seq -s, 1 ${{ inputs.test_splits }})]")
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  setup-and-test:
    needs: generate-matrix
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        test_group: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    container:
      image: harbor.ci.tenstorrent.net/${{ inputs.docker_image }}
      options: "--rm --device /dev/tenstorrent --ulimit nofile=4096:4096"
    name: "ðŸ¦„ Run tests (group ${{ matrix.test_group }}/${{ inputs.test_splits }})"
    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install SFPI
      - name: Install SFPI
        shell: bash
        run: |
          cd tests
          ./setup_testing_env.sh
          cd ..

      # Step 2.5: Download test duration data for balanced splitting
      # Downloads the latest available artifact from main branch only
      - name: Download test duration data
        if: ${{ inputs.use_durations }}
        uses: dawidd6/action-download-artifact@v12
        continue-on-error: true
        with:
          workflow: collect-test-durations.yml
          workflow_conclusion: success
          branch: main
          name: test-durations-${{ contains(inputs.runs_on, 'n150') && 'wormhole' || 'blackhole' }}
          path: tests/python_tests/
          if_no_artifact_found: warn
          search_artifacts: true
          check_artifacts: true

      # Step 3: Run the tests
      - name: Run tests
        shell: bash
        env:
          TEST_SPLITS: ${{ inputs.test_splits }}
        run: |
          CHIP_ARCH=unknown
          if [[ "${{ inputs.runs_on }}" =~ n150 ]]; then
            CHIP_ARCH=wormhole
          elif [[ "${{ inputs.runs_on }}" =~ p150 ]]; then
            CHIP_ARCH=blackhole
          fi
          export CHIP_ARCH
          echo "CHIP_ARCH=$CHIP_ARCH" >> $GITHUB_ENV
          SPLITS=$TEST_SPLITS
          cd tests/python_tests/

          COVERAGE_FLAG=""
          if [[ "${{ inputs.coverage }}" == "true" ]]; then
            COVERAGE_FLAG="--coverage"
          fi

          DURATIONS_FLAG=""
          if [[ "${{ inputs.use_durations }}" == "true" ]] && [[ -f ".test_durations" ]]; then
            DURATIONS_FLAG="--durations-path=.test_durations"
            echo "Using duration-based test splitting from .test_durations"
          else
            echo "Duration file not found or not enabled, using default splitting"
          fi

          echo "Compiling artefacts"
          pytest $COVERAGE_FLAG --compile-producer -n 10 \
                -m "${{ inputs.pytest_markers }}" \
                ${{ inputs.random_order && '--random-order-bucket=global' || '' }} \
                --splits $SPLITS --group ${{ matrix.test_group }} $DURATIONS_FLAG \
                --override-ini="addopts=-v" --timeout=60 \
                --junitxml=pytest-report-${CHIP_ARCH}-${{ matrix.test_group }}-compile.xml .

          echo "Running tests"
          pytest $COVERAGE_FLAG --compile-consumer -x \
                -m "${{ inputs.pytest_markers }}" \
                ${{ inputs.random_order && '--random-order-bucket=global' || '' }} \
                --splits $SPLITS --group ${{ matrix.test_group }} $DURATIONS_FLAG \
                --override-ini="addopts=-v" --timeout=60 \
                --junitxml=pytest-report-${CHIP_ARCH}-${{ matrix.test_group }}-run.xml .

          junitparser merge pytest-report-${CHIP_ARCH}-${{ matrix.test_group }}-compile.xml \
                   pytest-report-${CHIP_ARCH}-${{ matrix.test_group }}-run.xml \
                   pytest-report-${CHIP_ARCH}-${{ matrix.test_group }}.xml

          if [[ "${{ inputs.coverage }}" == "true" ]]; then
            if [ ! -f "/tmp/tt-llk-build/merged_coverage.info" ]; then
              echo "Error: Coverage file /tmp/tt-llk-build/merged_coverage.info not found." >&2
              echo "Ensure coverage artefcats was generated!" >&2
              exit 1
            fi
            cd ../../
            cp /tmp/tt-llk-build/merged_coverage.info code-coverage-${CHIP_ARCH}-${{ matrix.test_group }}.info
          fi

      # Step 4: Zip performance data if perf tests were run
      - name: Zip performance data
        if: always() && contains(inputs.pytest_markers, 'perf') && hashFiles('perf_data/**') != ''
        shell: bash
        run: |
          zip -r perf_data-${{ env.CHIP_ARCH }}-${{ matrix.test_group }}.zip perf_data/
          echo "Performance data zipped successfully"

      # Step 4.1: Upload generated info file per runner
      - name: Upload code coverage for this runner
        uses: actions/upload-artifact@v4
        if: ${{ inputs.coverage }}
        with:
          name: code-coverage-${{ env.CHIP_ARCH }}-${{ matrix.test_group }}
          path: code-coverage-${{ env.CHIP_ARCH }}-${{ matrix.test_group }}.info

      # Step 5: Upload performance data
      - name: Upload performance data
        uses: actions/upload-artifact@v4
        if: always() && contains(inputs.pytest_markers, 'perf') && hashFiles('perf_data-*.zip') != ''
        with:
          name: perf-data-${{ env.CHIP_ARCH }}-${{ matrix.test_group }}
          path: perf_data-${{ env.CHIP_ARCH }}-${{ matrix.test_group }}.zip

      - name: Upload JUnit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: >-
            ${{ (contains(inputs.pytest_markers, 'perf') && !contains(inputs.pytest_markers, 'not perf'))
                && 'perf-' || '' }}junit-report-${{ env.CHIP_ARCH }}-${{ matrix.test_group }}
          path: tests/python_tests/pytest-report-${{ env.CHIP_ARCH }}-${{ matrix.test_group }}.xml

      # Step 7: Publish the test results
      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: tests/python_tests/pytest-report-*-${{ matrix.test_group }}.xml
          include_passed: true
          annotate_only: true

  merge-coverage:
    name: "Merge coverage files"
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.docker_image }}
    needs: setup-and-test
    if: inputs.coverage == true
    permissions:
      contents: read
    steps:
      - name: Set CHIP_ARCH
        shell: bash
        run: |
          CHIP_ARCH=unknown
          if [[ "${{ inputs.runs_on }}" =~ n150 ]]; then
            CHIP_ARCH=wormhole
          elif [[ "${{ inputs.runs_on }}" =~ p150 ]]; then
            CHIP_ARCH=blackhole
          fi
          echo "CHIP_ARCH=$CHIP_ARCH" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: code-coverage-${{ env.CHIP_ARCH }}*
          path: ./merged_coverage_files
      - name: Unzip artefacts, merge coverage data, and generate HTML report
        shell: bash
        run: |
          # Get first file with full path
          first=$(find ./merged_coverage_files/ -name "*.info" | head -n 1)
          cp "$first" merged.info

          # Merge all other files
          for f in $(find ./merged_coverage_files/ -name "*.info"); do
            if [ "$f" != "$first" ]; then
              lcov -q -a merged.info -a "$f" -o ./merged.info
            fi
          done

          lcov -q --remove ./merged.info '*tests/*' \
            -o ./code_coverage_for_${{ env.CHIP_ARCH }}.info

      - name: Upload merged coverage .info file
        uses: actions/upload-artifact@v4
        with:
          name: code_coverage_for_${{ env.CHIP_ARCH }}
          path: ./code_coverage_for_${{ env.CHIP_ARCH }}.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./code_coverage_for_${{ env.CHIP_ARCH }}.info
          name: coverage-report-${{ env.CHIP_ARCH }}
          verbose: true
