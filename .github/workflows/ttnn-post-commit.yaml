name: "[internal] ttnn unit tests impl"

on:
  workflow_call:
    inputs:
      enabled-skus:
        required: true
        type: string
        description: "Comma-separated SKUs (e.g. wh_n300_civ2). Maps to runs_on via .github/sku_config.yaml."
      docker-image:
        required: true
        type: string
      harbor-prefix:
        required: false
        type: string
        default: ""
      wheel-artifact-name:
        required: true
        type: string
      enable-watcher:
        required: false
        type: boolean
        default: false
      enable-lightweight-kernel-asserts:
        description: "Enable lightweight kernel asserts"
        required: false
        type: boolean
        default: false
      enable-llk-asserts:
        description: "Enable LLK asserts"
        required: false
        type: boolean
        default: false
      merge-gate-call:
        required: false
        type: boolean
        default: false
      test-category:
        required: false
        type: string
        default: sanity
        description: "Time-budget workflow key passed to verify_time_budget.py (e.g. smoke for merge-gate, sanity for APC/post-commit)."
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
      timeout-minutes-override:
        required: false
        type: number
        default: 0
        description: "If > 0, skip time budget verification and use this as job timeout (e.g. 240 for APC watcher, 120 for BHPC watcher)."
      collect-coverage:
        required: false
        type: boolean
        default: false
        description: "When true, collect LLVM profraw data and upload per-job profdata artifact for coverage aggregation."

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter-matrix.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ${{ inputs.test-category == 'smoke' && './tests/pipeline_reorg/ttnn_smoke_merge_gate_tests.yaml' || './tests/pipeline_reorg/ttnn-tests.yaml' }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          ref: ${{ inputs.ref || github.sha }}
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true

      - name: Install dependencies
        run: |
          pip3 install PyYAML

      - name: Verify test timeouts against budget
        if: ${{ inputs.timeout-minutes-override == 0 }}
        run: |
          set -e
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "${{ inputs.test-category }}"

      - name: Build test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml

      - name: Filter matrix by merge_gate
        id: filter-matrix
        run: |
          matrix='${{ steps.build-matrix.outputs.matrix }}'
          if [[ "${{ inputs.test-category }}" == "smoke" ]]; then
            filtered="$matrix"
          else
            merge_gate="${{ inputs.merge-gate-call }}"
            filtered=$(echo "$matrix" | jq -c --argjson mg "$merge_gate" 'map(select((.merge_gate // false) == $mg))')
          fi
          len=$(echo "$filtered" | jq 'length')
          if [ "$len" -eq 0 ]; then
            echo "::error::No tests left after filtering for merge_gate=$merge_gate"
            exit 1
          fi
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$filtered" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  ttnn:
    needs: load-test-matrix
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    environment: ${{ github.ref == 'refs/heads/main' && 'mainline' || '' }}
    container:
      image: ${{ matrix.test-group.sku != 'bh_p100' && format('{0}{1}', inputs.harbor-prefix, inputs.docker-image) || inputs.docker-image || 'docker-image-unresolved!'}}
      env:
        LOGURU_LEVEL: INFO
        PYTHONPATH: /work
        TT_LOGGER_LEVEL: warn
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: "--device /dev/tenstorrent -e TT_GH_CI_INFRA"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          ref: ${{ inputs.ref || github.sha }}
          filter: blob:none
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher || false }}
          enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
          enable-kernel-ccache: true
          # Kernel ccache uses separate Redis backend (REDIS_CCACHE_*) from build ccache (REDIS_*)
          # This allows different retention policies for runtime JIT vs. C++ build artifacts
          redis-ccache-storage: redis://${{ vars.REDIS_CCACHE_USER }}:${{ secrets.REDIS_CCACHE_PASSWORD }}@${{ vars.REDIS_CCACHE_HOST }}:${{ vars.REDIS_CCACHE_PORT }}${{ vars.REDIS_CCACHE_IS_READONLY == 'true' && '|read-only=true' || '' }}
          auto-triage: ${{ !inputs.enable-watcher }}

      - name: Set ttnn fast runtime if exists in config
        if: ${{ matrix.test-group.fast_runtime_mode_off }}
        run: |
          echo "TTNN_CONFIG_OVERRIDES={\"enable_fast_runtime_mode\": false}" >> $GITHUB_ENV

      - name: Set up coverage profiling
        if: ${{ inputs.collect-coverage }}
        run: |
          mkdir -p /work/coverage
          echo "LLVM_PROFILE_FILE=/work/coverage/%p-%m.profraw" >> "$GITHUB_ENV"

      - name: ${{ matrix.test-group.name }} tests
        timeout-minutes: ${{ inputs.timeout-minutes-override > 0 && inputs.timeout-minutes-override || matrix.test-group.timeout }}
        run: |
          python3 tools/tt-power-sidecar/tt_power_sidecar.py \
            --backend sysfs \
            --out /work/power_report.json \
            -- bash -c '${{ matrix.test-group.cmd }}'

      - name: Upload power report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: power-report-${{ matrix.test-group.name }}
          # /docker-job/ is the host-side mount of the Docker runner's /work/ directory.
          # The sidecar writes --out /work/power_report.json inside the container;
          # this host path is what the upload-artifact action reads.
          path: ${{ github.workspace }}/docker-job/power_report.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload profdata artifact
        if: ${{ inputs.collect-coverage && always() }}
        run: |
          if ! ls /work/coverage/*.profraw 1>/dev/null 2>&1; then
            echo "No profraw files found, skipping upload"
            exit 0
          fi
          llvm-profdata-20 merge -sparse /work/coverage/*.profraw \
            -o /work/coverage/job.profdata
          echo "Merged $(ls /work/coverage/*.profraw | wc -l) profraw files into job.profdata ($(du -h /work/coverage/job.profdata | cut -f1))"
        shell: bash
      - name: Upload profdata
        if: ${{ inputs.collect-coverage && always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: profdata-ttnn-${{ matrix.test-group.name }}
          path: ${{ github.workspace }}/docker-job/coverage/job.profdata
          if-no-files-found: ignore
          retention-days: 1

      - name: 📊 CCache Report
        if: ${{ !cancelled() }}
        run: |
          echo '## CCache Summary (kernel)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache -s >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Surface remote storage stats and errors from the ccache log.
          # Uses a filter script to avoid overflowing the 1024k step summary limit.
          if [ -f /tmp/ccache.log ]; then
            echo '## CCache Remote Storage (kernel)' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            .github/scripts/ccache_log_filter.sh /tmp/ccache.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"

      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
