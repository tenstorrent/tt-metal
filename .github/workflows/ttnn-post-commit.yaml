name: "[internal] ttnn unit tests impl"

on:
  workflow_call:
    inputs:
      enabled-skus:
        required: true
        type: string
        description: "Comma-separated SKUs (e.g. wh_n300_civ2). Maps to runs_on via .github/sku_config.yaml."
      docker-image:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      enable-watcher:
        required: false
        type: boolean
        default: false
      enable-lightweight-kernel-asserts:
        description: 'Enable lightweight kernel asserts'
        required: false
        type: boolean
        default: false
      enable-llk-asserts:
        description: 'Enable LLK asserts'
        required: false
        type: boolean
        default: false
      merge-gate-call:
        required: false
        type: boolean
        default: false
      changed-ops:
        required: false
        type: string
        default: ""
        description: "Comma-separated TTNN op families that changed (from find-changed-files.sh), or 'all'. Empty = run all (no filtering)."
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
      timeout-minutes-override:
        required: false
        type: number
        default: 0
        description: "If > 0, skip time budget verification and use this as job timeout (e.g. 240 for APC watcher, 120 for BHPC watcher)."

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter-matrix.outputs.matrix }}
      has-tests: ${{ steps.filter-matrix.outputs.has-tests }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/ttnn-tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true

      - name: Install dependencies
        run: |
          pip3 install PyYAML

      - name: Verify test timeouts against budget
        if: ${{ inputs.timeout-minutes-override == 0 }}
        run: |
          set -e
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "sanity"

      - name: Build test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml

      - name: Filter matrix by merge_gate and changed-ops
        id: filter-matrix
        env:
          CHANGED_OPS: "${{ inputs.changed-ops }}"
        run: |
          set -euo pipefail
          merge_gate="${{ inputs.merge-gate-call }}"
          matrix='${{ steps.build-matrix.outputs.matrix }}'

          # Step 1: Filter by merge_gate flag.
          # - merge-gate-call=true  → keep only entries with merge_gate: true (selective)
          # - merge-gate-call=false → run ALL entries (post-commit runs the full suite)
          if [[ "$merge_gate" == "true" ]]; then
            filtered=$(echo "$matrix" | jq -c 'map(select(.merge_gate == true))')
          else
            filtered="$matrix"
          fi

          # Step 2: If changed-ops is provided and not empty, filter by ops_filter.
          # This enables change-aware test routing: only run test groups whose
          # ops_filter overlaps with the changed operation families.
          # - "all" in changed-ops means run everything (skip this filter)
          # - Empty changed-ops means run everything (backwards compatible)
          if [[ -n "$CHANGED_OPS" && "$CHANGED_OPS" != "all" ]]; then
            echo "Filtering by changed-ops: $CHANGED_OPS"
            # Convert changed-ops CSV to a JSON array for jq
            changed_ops_json=$(echo "$CHANGED_OPS" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$"; ""))')
            # Filter: keep tests where ops_filter has any overlap with changed ops,
            # or where ops_filter contains "all" (these always run).
            filtered=$(echo "$filtered" | jq -c --argjson cops "$changed_ops_json" '
              map(select(
                (.ops_filter // "all") as $of |
                ($of | split(",") | map(gsub("^\\s+|\\s+$"; ""))) as $filters |
                (($filters | index("all")) != null) or
                ([$filters[] as $f | $cops[] as $c | select($f == $c)] | length > 0)
              ))
            ')
            echo "After ops_filter: $(echo "$filtered" | jq 'length') test(s) remaining"
          fi

          len=$(echo "$filtered" | jq 'length')
          if [ "$len" -eq 0 ]; then
            echo "::warning::No tests left after filtering (merge_gate=$merge_gate, changed-ops=$CHANGED_OPS)"
            echo "has-tests=false" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has-tests=true" >> "$GITHUB_OUTPUT"
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$filtered" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  ttnn:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.has-tests == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    environment: ${{ github.ref == 'refs/heads/main' && 'mainline' || '' }}
    container:
      image: ${{ matrix.test-group.sku != 'bh_p100' && format('harbor.ci.tenstorrent.net/{0}', inputs.docker-image) || inputs.docker-image || 'docker-image-unresolved!'}}
      env:
        LOGURU_LEVEL: INFO
        PYTHONPATH: /work
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: "--device /dev/tenstorrent -e TT_GH_CI_INFRA"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher || false }}
          enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
          enable-kernel-ccache: true
          # Kernel ccache uses separate Redis backend (REDIS_CCACHE_*) from build ccache (REDIS_*)
          # This allows different retention policies for runtime JIT vs. C++ build artifacts
          redis-ccache-storage: redis://${{ vars.REDIS_CCACHE_USER }}:${{ secrets.REDIS_CCACHE_PASSWORD }}@${{ vars.REDIS_CCACHE_HOST }}:${{ vars.REDIS_CCACHE_PORT }}|read-only=${{ vars.REDIS_CCACHE_IS_READONLY }}
          auto-triage: ${{ !inputs.enable-watcher }}

      - name: Set ttnn fast runtime if exists in config
        if: ${{ matrix.test-group.fast_runtime_mode_off }}
        run: |
          echo "TTNN_CONFIG_OVERRIDES={\"enable_fast_runtime_mode\": false}" >> $GITHUB_ENV

      - name: ${{ matrix.test-group.name }} tests
        timeout-minutes: ${{ inputs.timeout-minutes-override > 0 && inputs.timeout-minutes-override || matrix.test-group.timeout }}
        run: |
          ${{ matrix.test-group.cmd }}

      - name: 📊 CCache Report
        if: ${{ !cancelled() }}
        run: |
          echo "::group::CCache Statistics"
          ccache --show-stats || echo "ccache stats not available"
          echo "::endgroup::"

      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
          owner: ${{ matrix.test-group.owner_id }}

      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"

      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
