name: "[impl] Nightly tt-metal L2 tests impl"

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      runner-label:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      timeout:
        required: false
        type: number
        default: 150
      run_sdxl_tests:
        required: false
        type: boolean
        default: true
      run_train_tests:
        required: false
        type: boolean
        default: true
      run_compute_fused_tests:
        required: false
        type: boolean
        default: true
      enable-llk-asserts:
        required: false
        type: boolean
        default: false
        description: "Enable LLK asserts"
      ttsim-version:
        required: false
        type: string
        default: "v1.4.6"
      non-harbor-docker-image:
        required: false
        type: string
        default: ""
        description: "Non-harbor docker image for jobs running on ubuntu-latest (cannot pull from harbor)"

# This is a fallback timeout for tests that are not marked with pytest.mark.timeout(xxx)
env:
  TEST_BUDGET_SECONDS: 600

jobs:
  ttnn-sdxl-tests:
    if: ${{ inputs.run_sdxl_tests && inputs.runner-label != 'P100a' }}
    container:
      image: ${{ (inputs.runner-label == 'P150b' && inputs.docker-image) || inputs.non-harbor-docker-image || 'docker-image-unresolved!' }}
      env:
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        ARCH_NAME: ${{ inputs.arch }}
        LOGURU_LEVEL: INFO
        # Only use MLPerf HF cache on non-CIv2 runners (P150b uses LFC via TT_GH_CI_INFRA)
        HF_HUB_CACHE: ${{ inputs.runner-label == 'P150b' && '' || '/mnt/MLPerf/huggingface/hub' }}
        TT_MM_THROTTLE_PERF: ${{ inputs.arch == 'blackhole' && '0' || '5' }}
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: "--device /dev/tenstorrent ${{ inputs.runner-label == 'P150b' && '-e TT_GH_CI_INFRA=1' || '' }}"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    name: ttnn nightly sdxl tests ${{ inputs.arch }} ${{ inputs.runner-label }}
    runs-on: >-
      ${{
        ((inputs.runner-label == 'P150b') && format('tt-ubuntu-2204-{0}-stable', inputs.runner-label))
        || fromJSON(format('["{0}", "in-service"]', inputs.runner-label))
      }}
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts }}
      - name: ttnn nightly sdxl tests (wormhole)
        if: ${{ inputs.arch == 'wormhole_b0' }}
        timeout-minutes: ${{ inputs.timeout }}
        run: |
          pytest models/demos/stable_diffusion_xl_base/tests/pcc/test_unet_loop.py --loop-iter-num=50 -xv -m "not disable_fast_runtime_mode" --timeout=${{ env.TEST_BUDGET_SECONDS }}
          pytest models/demos/stable_diffusion_xl_base/refiner/tests/pcc/test_unet_loop.py --loop-iter-num=50 -xv -m "not disable_fast_runtime_mode" --timeout=${{ env.TEST_BUDGET_SECONDS }}
          pytest models/demos/stable_diffusion_xl_base/lora/tests/test_lora_rollback.py -xv -m "not disable_fast_runtime_mode" --timeout=${{ env.TEST_BUDGET_SECONDS }}
      - name: ttnn nightly sdxl tests (blackhole P150b)
        if: ${{ inputs.arch == 'blackhole' && inputs.runner-label == 'P150b' }}
        timeout-minutes: ${{ inputs.timeout }}
        run: |
          pytest models/demos/stable_diffusion_xl_base/tests/pcc/test_unet_loop.py --loop-iter-num=50 -xv -m "not disable_fast_runtime_mode" --timeout=${{ env.TEST_BUDGET_SECONDS }}
          pytest models/demos/stable_diffusion_xl_base/refiner/tests/pcc/test_unet_loop.py --loop-iter-num=50 -xv -m "not disable_fast_runtime_mode" --timeout=${{ env.TEST_BUDGET_SECONDS }}
      - name: ttnn nightly sdxl demo cfg parallel test (N300 only)
        if: ${{ inputs.runner-label == 'N300' }}
        timeout-minutes: ${{ inputs.timeout }}
        run: pytest models/demos/stable_diffusion_xl_base/demo/demo.py -k "device_vae and device_encoders and with_trace and use_cfg_parallel" --timeout=${{ env.TEST_BUDGET_SECONDS }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()

  ttnn-train-nightly-tests:
    if: ${{ inputs.run_train_tests }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        TT_METAL_HOME: /work
        ARCH_NAME: ${{ inputs.arch }}
        LOGURU_LEVEL: INFO
        ENABLE_NIGHTLY_TT_TRAIN_TESTS: 1
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    name: tt-train nightly tests ${{ inputs.arch }} ${{ inputs.runner-label }}
    runs-on: >-
      ${{
        (inputs.runner-label == 'P100a' && 'tt-ubuntu-2204-P100a-viommu-stable')
        || format('tt-ubuntu-2204-{0}-stable', inputs.runner-label)
      }}
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts }}
      - name: tt-train nightly tests
        timeout-minutes: ${{ inputs.timeout }}
        run: build/tt-train/tests/ttml_tests --gtest_filter=*NIGHTLY_*
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
  ttnn-compute-fused-tests:
    if: ${{ inputs.run_compute_fused_tests }}
    container:
      image: ${{ inputs.non-harbor-docker-image || inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        TT_METAL_HOME: /work
        ARCH_NAME: ${{ inputs.arch }}
        LOGURU_LEVEL: INFO
        TT_METAL_SIMULATOR_HOME: /work/sim
        TT_METAL_SIMULATOR: /work/sim/libttsim.so
        TT_METAL_SLOW_DISPATCH_MODE: 1
        TT_METAL_DISABLE_SFPLOADMACRO: 1
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    name: ttnn compute-fused validation tests ${{ inputs.arch }} ${{ inputs.runner-label }}
    runs-on: ubuntu-latest
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts }}
      - name: Compute ttsim asset name
        id: ttsim-info
        run: |
          case "${{ inputs.arch }}" in
            wormhole_b0) suffix="wh"; soc="wormhole_b0_80_arch.yaml" ;;
            blackhole)   suffix="bh"; soc="blackhole_140_arch.yaml" ;;
            *) echo "::error::Unknown architecture: ${{ inputs.arch }}"; exit 1 ;;
          esac
          echo "asset_name=libttsim_${suffix}.so" >> "$GITHUB_OUTPUT"
          echo "soc_desc=${soc}" >> "$GITHUB_OUTPUT"
      - name: Download ttsim binary
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          repository: tenstorrent/ttsim
          tag: ${{ inputs.ttsim-version }}
          fileName: ${{ steps.ttsim-info.outputs.asset_name }}
          out-file-path: /tmp/ttsim
      - name: Install ttsim
        run: |
          set -euo pipefail
          mkdir -p $TT_METAL_SIMULATOR_HOME
          mv /tmp/ttsim/${{ steps.ttsim-info.outputs.asset_name }} $TT_METAL_SIMULATOR_HOME/libttsim.so
          cp /work/tt_metal/soc_descriptors/${{ steps.ttsim-info.outputs.soc_desc }} $TT_METAL_SIMULATOR_HOME/soc_descriptor.yaml
      - name: ttnn compute-fused validation tests
        timeout-minutes: 20
        run: pytest tests/ttnn/nightly/unit_tests/operations_compute_only/fused -xv --timeout=${{ env.TEST_BUDGET_SECONDS }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
