name: "Clang Tidy (Reusable)"

on:
  workflow_call:
    inputs:
      platform:
        required: false
        type: string
        default: "Ubuntu 24.04"
        description: "Platform to analyze"
      architecture:
        required: false
        type: string
        default: "amd64"
      ci-build-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built CI Build Docker image tag"
      prereq-targets:
        required: false
        type: string
        default: ""
        description: "Prerequisite targets to build without analysis (space-separated)"
      scan-targets:
        required: false
        type: string
        default: ""
        description: "Specific target(s) to scan (space-separated). If empty, scans all targets."
      post-pr-suggestions:
        required: false
        type: boolean
        default: false
        description: "Export clang-tidy fixes and post inline review suggestions on the PR diff"

jobs:
  clang-tidy:
    name: 🤖 Clang Tidy ${{ inputs.scan-targets && format('({0})', inputs.scan-targets) || '' }}
    timeout-minutes: 240
    # Prio runner pool is reserved for merge-queue traffic.
    runs-on: ${{ github.event_name == 'merge_group' && 'tt-ubuntu-2204-large-prio-stable' || 'tt-ubuntu-2204-large-stable' }}
    environment: ${{ github.ref == 'refs/heads/main' && 'mainline' || '' }}
    permissions:
      pull-requests: write
      contents: write # to allow posting inline PR review suggestions and auto-closing conversations
    env:
      CCACHE_S3_BUCKET: ccache
      CCACHE_S3_PREFIX: tt-metal
      CCACHE_S3_READONLY: "false"
      CCACHE_S3_DEBUG: "false"
    container:
      image: ${{ inputs.ci-build-docker-image }}
      env:
        CCACHE_REMOTE_ONLY: "true"
        CCACHE_TEMPDIR: /tmp/ccache
        CCACHE_COMPRESS: "true"
        CCACHE_COMPRESSLEVEL: "3"
        # Log ccache operations to a file so remote storage errors are visible in CI.
        # Errors (storage helper failures, S3 timeouts) would otherwise be silent.
        CCACHE_LOGFILE: /tmp/ccache.log
        CCACHE_BASEDIR: /work
      volumes:
        - ${{ github.workspace }}:/work
        # HOME is hardcoded for no clear reason: https://github.com/actions/runner/issues/863
        - /home/ubuntu/.ccache-ci:/github/home/.ccache
      # Group 1457 is for the shared ccache drive
      # tmpfs is for efficiency
      options: >
        --group-add 1457
        --tmpfs /tmp
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: Configure S3 ccache storage
        # Failing internal jobs draws attention immediately so we can fix them and make them fast.
        # Forks will never have secrets; don't fail the job for them, they'll just run slower
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          if [ -z "${{ secrets.GARAGE_S3_ACCESS_KEY }}" ] || [ -z "${{ secrets.GARAGE_S3_SECRET_KEY }}" ]; then
            echo "Garage S3 credentials are missing. Did you forget 'secrets: inherit'?"
            exit 1
          fi
          echo "AWS_ACCESS_KEY_ID=${{ secrets.GARAGE_S3_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.GARAGE_S3_SECRET_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=garage" >> $GITHUB_ENV
          CCACHE_REMOTE_STORAGE="s3://${CCACHE_S3_BUCKET}|region=garage|prefix=${CCACHE_S3_PREFIX}|endpoint_url=http://garage.garage.svc.cluster.local:3900"
          if [ "${CCACHE_S3_READONLY}" = "true" ]; then
            CCACHE_REMOTE_STORAGE="${CCACHE_REMOTE_STORAGE}|read-only=true"
          fi
          echo "CCACHE_REMOTE_STORAGE=${CCACHE_REMOTE_STORAGE}" >> $GITHUB_ENV
          echo "CCACHE_REMOTE_STORAGE: ${CCACHE_REMOTE_STORAGE}"
          if [ "${CCACHE_S3_DEBUG}" = "true" ]; then
            echo "CRSH_LOGFILE=/tmp/ccache-storage-s3.log" >> $GITHUB_ENV
          fi
          echo "AWS_ENDPOINT_URL_S3=http://garage.garage.svc.cluster.local:3900" >> $GITHUB_ENV

      - name: Verify S3 connectivity (write / read-back / delete)
        # NOTE: this probe is intentionally NON-FATAL. ccache treats the remote
        # cache as a soft dependency (remote errors degrade to local misses), so a
        # transient Garage hiccup must not turn into a hard build failure. We warn
        # and continue rather than `exit 1`. The probe is purely diagnostic.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          # Use a per-job unique key so concurrent jobs (this is a reusable workflow
          # invoked by many pipelines against the same bucket/prefix) don't clobber
          # each other's PUT/GET/DELETE windows and cause spurious 404 read-backs.
          KEY=".s3-connectivity-test-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${RANDOM}"
          BASE="http://garage.garage.svc.cluster.local:3900/${CCACHE_S3_BUCKET}/${CCACHE_S3_PREFIX}/${KEY}"
          PAYLOAD="ccache-s3-connectivity-ok"
          SIGV4="aws:amz:garage:s3"
          CREDS="${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}"
          probe() {
            # PUT
            echo "${PAYLOAD}" | curl -fsS -X PUT --aws-sigv4 "${SIGV4}" --user "${CREDS}" \
              "${BASE}" --data-binary @- -o /dev/null || return 1
            # GET and verify
            local result
            result=$(curl -fsS --aws-sigv4 "${SIGV4}" --user "${CREDS}" "${BASE}") || return 1
            [ "${result}" = "${PAYLOAD}" ] || { echo "Read-back mismatch: got '${result}'"; return 1; }
            # DELETE (best effort cleanup)
            curl -fsS -X DELETE --aws-sigv4 "${SIGV4}" --user "${CREDS}" "${BASE}" -o /dev/null || true
            return 0
          }
          if probe; then
            echo "S3 connectivity verified: write/read-back/delete all OK"
          else
            echo "::warning::S3 connectivity probe failed; ccache will degrade remote misses to local. Continuing."
          fi

      - name: Configure ctcache
        # Same fork gate as ccache: forks have no secrets so skip silently.
        # ctcache is writable from all non-fork refs (including PR branches)
        # so repeated commits to a branch benefit from cached clang-tidy results.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          # ctcache is not published on PyPI — install from pinned commit SHA (tag 1.2.0)
          # Pinned to SHA (not tag) to avoid supply-chain risk from mutable git tags
          uv pip install --quiet "ctcache @ git+https://github.com/matus-chochlik/ctcache.git@e33c063ca6e52b48bcefbc45d46d8c150ffa81ca" boto3  # 1.2.0

          # Namespace encodes the clang-tidy version so a toolchain upgrade auto-invalidates
          CT_VERSION=$(clang-tidy-20 --version 2>/dev/null | grep -oP 'version \K[0-9]+' || echo "20")
          {
            echo "CTCACHE_S3_BUCKET=ctcache"
            echo "CTCACHE_S3_FOLDER=ct${CT_VERSION}"
            echo "CTCACHE_KEEP_COMMENTS=1"
            # Note: CTCACHE_SAVE_OUTPUT is intentionally NOT set — S3 store_in_cache_with_data
            # is a TODO no-op in ctcache 1.2.0, so saving output would silently write nothing.
            echo "AWS_ACCESS_KEY_ID=${{ secrets.GARAGE_S3_ACCESS_KEY }}"
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.GARAGE_S3_SECRET_KEY }}"
            echo "AWS_ENDPOINT_URL=http://garage.garage.svc.cluster.local:3900"
            echo "AWS_DEFAULT_REGION=garage"
            echo "HTTP_PROXY=http://proxy.restricted-proxy.svc.cluster.local:3128"
            echo "HTTPS_PROXY=http://proxy.restricted-proxy.svc.cluster.local:3128"
          } >> "$GITHUB_ENV"
          echo "ctcache S3 folder: ct${CT_VERSION}"
          # Pre-resolve the ctcache binary once so the per-TU wrapper script
          # skips a repeated PATH scan across thousands of invocations.
          CTCACHE_BIN=$(command -v clang-tidy-cache || true)
          echo "CTCACHE_BIN=${CTCACHE_BIN}" >> "$GITHUB_ENV"

          # Diagnose connectivity at the HTTP level before boto3
          # 403 from curl is expected (Garage rejects unsigned requests) — confirms proxy reaches Garage
          echo "--- Garage HTTP probe (403 = Garage reachable, proxy working) ---"
          curl -s -o /dev/null -w "Garage root HTTP status: %{http_code}\n" \
            -x "http://proxy.restricted-proxy.svc.cluster.local:3128" \
            http://garage.garage.svc.cluster.local:3900/ || echo "Garage root: curl failed (unreachable)"

          # Verify connectivity — warn but don't fail if Garage is unreachable
          AWS_ACCESS_KEY_ID="${{ secrets.GARAGE_S3_ACCESS_KEY }}" \
          AWS_SECRET_ACCESS_KEY="${{ secrets.GARAGE_S3_SECRET_KEY }}" \
          AWS_ENDPOINT_URL="http://garage.garage.svc.cluster.local:3900" \
          AWS_DEFAULT_REGION="garage" \
          HTTP_PROXY="http://proxy.restricted-proxy.svc.cluster.local:3128" \
          HTTPS_PROXY="http://proxy.restricted-proxy.svc.cluster.local:3128" \
          python3 - << 'PYEOF'
          import boto3, botocore, os, sys
          print(f"Endpoint: {os.environ.get('AWS_ENDPOINT_URL', '')}")
          print(f"HTTP_PROXY: {os.environ.get('HTTP_PROXY', '(not set)')}")
          try:
              s3 = boto3.client("s3",
                  endpoint_url=os.environ["AWS_ENDPOINT_URL"],
                  aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
                  aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
                  region_name=os.environ["AWS_DEFAULT_REGION"],
                  config=botocore.config.Config(s3={"addressing_style": "path"}),
              )
              s3.list_objects_v2(Bucket="ctcache", MaxKeys=1)
              print("ctcache Garage S3 connection OK")
              # Signal to downstream steps that S3 is reachable
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("CTCACHE_S3_OK=1\n")
          except Exception as e:
              print(f"::warning::ctcache Garage S3 unreachable ({e}) — analysis will run without caching")
              sys.exit(0)
          PYEOF

      - name: Create ccache tmpdir
        run: |
          mkdir -p /tmp/ccache

      - name: Bootstrap local actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false
      - name: Check out repo
        uses: ./.github/actions/checkout
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          clean: true
          private-submodule-token: ${{ secrets.TT-OPS-CODE-GEN-CLONE }}

      - name: Configure git safe.directory
        run: git config --global --add safe.directory /work

      - name: 📦 Restore CPM source cache
        id: cpm-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cpmcache.tar.zst
          key: cpm-z22-${{ hashFiles('third_party/CMakeLists.txt', 'tt_metal/third_party/umd/third_party/CMakeLists.txt', 'tt-train/cmake/dependencies.cmake') }}
          restore-keys: cpm-z22-

      - name: Unpack CPM cache
        run: |
          [ -f .cpmcache.tar.zst ] && tar -I 'zstd -T0' -xf .cpmcache.tar.zst || true

      - name: Pre-create fixes dir
        run: mkdir -p .build/clang-tidy/fixes

      - name: 🔧 CMake configure
        run: |
          # --warnings-as-errors=* turns each clang-tidy diagnostic into a failing
          # compile edge; the build preset's -k0 keeps going so all fixes still export.
          cmake --preset clang-tidy-fix-parallel \
            -DCMAKE_CXX_CLANG_TIDY="$(pwd)/cmake/clang-tidy-export-fixes-wrapper.sh;$(pwd)/.build/clang-tidy/fixes;--warnings-as-errors=*" \
            -DCMAKE_C_CLANG_TIDY="$(pwd)/cmake/clang-tidy-export-fixes-wrapper.sh;$(pwd)/.build/clang-tidy/fixes;--warnings-as-errors=*"

      - name: Pack CPM cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        run: |
          [ -d .cpmcache ] && tar -I 'zstd -T0 --ultra -22' -cf .cpmcache.tar.zst .cpmcache || true

      - name: Save CPM source cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cpmcache.tar.zst
          key: ${{ steps.cpm-cache.outputs.cache-primary-key }}

      - name: Prepare ccache summary
        run: ccache -z

      - name: Build prerequisite targets (without analysis)
        if: ${{ inputs.prereq-targets != '' }}
        timeout-minutes: 30
        run: |
          echo "Building prerequisite targets (will not be analyzed): ${{ inputs.prereq-targets }}"
          for target in ${{ inputs.prereq-targets }}; do
            echo "Building target: $target"
            cmake --build --preset clang-tidy-fix-parallel --target "$target"
          done

      - name: 🔍 Analyze code with clang-tidy
        timeout-minutes: 120
        run: |
          # Record the exit code rather than failing here: violations fail compile
          # edges but still export, so the gate below decides pass/fail from counts.
          targets=()
          for target in ${{ inputs.scan-targets }}; do
            targets+=(--target "$target")
          done
          echo "Scanning ${{ inputs.scan-targets || 'all targets' }}"
          build_exit=0
          cmake --build --preset clang-tidy-fix-parallel "${targets[@]}" || build_exit=$?
          echo "cmake --build exited with code ${build_exit}"
          echo "CLANG_TIDY_BUILD_EXIT=${build_exit}" >> "$GITHUB_ENV"

      - name: Count clang-tidy violations
        run: |
          FIXES_DIR=".build/clang-tidy/fixes"
          # Each diagnostic is one "- DiagnosticName:" list item; nested notes are not.
          VIOLATIONS=$(cat "$FIXES_DIR"/*.yaml 2>/dev/null \
            | grep -cE '^[[:space:]]*-[[:space:]]+DiagnosticName:' || true)
          VIOLATIONS=${VIOLATIONS:-0}
          echo "CLANG_TIDY_VIOLATIONS=${VIOLATIONS}" >> "$GITHUB_ENV"
          echo "clang-tidy found ${VIOLATIONS} violation(s)"
          {
            echo '## Clang-Tidy Violations'
            echo "Found **${VIOLATIONS}** violation(s)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Apply clang-tidy fixes to working tree
        # success() so a genuine build failure (partial YAMLs) doesn't post misleading fixes.
        if: ${{ inputs.post-pr-suggestions && github.event_name == 'pull_request' && success() }}
        run: |
          FIXES_DIR=".build/clang-tidy/fixes"
          if ls "$FIXES_DIR"/*.yaml 2>/dev/null | grep -q .; then
            if command -v clang-apply-replacements-20 &>/dev/null; then
              clang-apply-replacements-20 "$FIXES_DIR"
            else
              clang-apply-replacements "$FIXES_DIR"
            fi
          else
            echo "No fix files found in $FIXES_DIR — nothing to suggest"
          fi

      - name: Post inline clang-tidy suggestions on PR
        if: ${{ inputs.post-pr-suggestions && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && success() }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          # /tmp is noexec (--tmpfs /tmp). Install reviewdog to /usr/local/bin instead.
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh \
            | sh -s -- -b /usr/local/bin v0.21.0
          git diff | reviewdog \
            -f diff \
            -name clang-tidy \
            -reporter github-pr-review \
            -filter-mode diff_context \
            -level warning \
            -fail-level none \
            -fail-on-error false

      - name: Fail on clang-tidy violations
        # !cancelled() so it still gates when posting steps are skipped (non-PR runs).
        if: ${{ !cancelled() }}
        run: |
          VIOLATIONS="${CLANG_TIDY_VIOLATIONS:-0}"
          BUILD_EXIT="${CLANG_TIDY_BUILD_EXIT:-0}"
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::clang-tidy found ${VIOLATIONS} violation(s)"
            exit 1
          fi
          # No violations but the build failed: a real compile/link error, not a diagnostic.
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "::error::clang-tidy build failed (exit ${BUILD_EXIT}) with no violations"
            exit 1
          fi
          echo "clang-tidy found no violations"

      - name: Publish Ccache summary
        if: always()
        run: |
          # -sv (verbose) prints the local/remote storage breakdown and the
          # uncacheable-reason table; plain -s hides remote Hits/Misses/Errors.
          CCACHE_STATS=$(ccache -sv)
          echo "$CCACHE_STATS"
          echo '## CCache Summary' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$CCACHE_STATS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Surface remote storage stats and errors from the ccache log.
          # Uses a filter script to avoid overflowing the 1024k step summary limit.
          if [ -f /tmp/ccache.log ]; then
            echo '## CCache Remote Storage' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            .github/scripts/ccache_log_filter.sh /tmp/ccache.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          # Helper debug log — only written when CCACHE_S3_DEBUG=true enables CRSH_LOGFILE.
          if [ -f /tmp/ccache-storage-s3.log ]; then
            echo "=== ccache-storage-s3 log (first 30 lines) ==="
            head -30 /tmp/ccache-storage-s3.log
            echo "=== ccache-storage-s3 log (last 80 lines) ==="
            tail -80 /tmp/ccache-storage-s3.log
            echo '## CCache Storage Helper Log' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -30 /tmp/ccache-storage-s3.log >> $GITHUB_STEP_SUMMARY
            echo '--- (last 200 lines) ---' >> $GITHUB_STEP_SUMMARY
            tail -200 /tmp/ccache-storage-s3.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Publish ctcache summary
        if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        run: |
          {
            echo '## ctcache Summary'
            if command -v clang-tidy-cache &>/dev/null; then
              echo '```'
              clang-tidy-cache --show-stats 2>/dev/null || echo "stats unavailable"
              echo '```'
            fi
          } >> $GITHUB_STEP_SUMMARY
