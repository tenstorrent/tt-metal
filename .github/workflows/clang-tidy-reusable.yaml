name: "Clang Tidy (Reusable)"

on:
  workflow_call:
    inputs:
      platform:
        required: false
        type: string
        default: "Ubuntu 24.04"
        description: "Platform to analyze"
      architecture:
        required: false
        type: string
        default: "amd64"
      ci-build-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built CI Build Docker image tag"
      prereq-targets:
        required: false
        type: string
        default: ""
        description: "Prerequisite targets to build without analysis (space-separated)"
      scan-targets:
        required: false
        type: string
        default: ""
        description: "Specific target(s) to scan (space-separated). If empty, scans all targets."
      post-pr-suggestions:
        required: false
        type: boolean
        default: false
        description: "Export clang-tidy fixes and post inline review suggestions on the PR diff"

jobs:
  clang-tidy:
    name: 🤖 Clang Tidy ${{ inputs.scan-targets && format('({0})', inputs.scan-targets) || '' }}
    timeout-minutes: 240
    runs-on: tt-ubuntu-2204-large-stable
    environment: ${{ github.ref == 'refs/heads/main' && 'mainline' || '' }}
    permissions:
      pull-requests: write
      contents: write # to allow posting inline PR review suggestions and auto-closing conversations
    container:
      image: ${{ inputs.ci-build-docker-image }}
      env:
        CCACHE_REMOTE_ONLY: "true"
        CCACHE_TEMPDIR: /tmp/ccache
      volumes:
        - ${{ github.workspace }}:/work
        # HOME is hardcoded for no clear reason: https://github.com/actions/runner/issues/863
        - /home/ubuntu/.ccache-ci:/github/home/.ccache
      # Group 1457 is for the shared ccache drive
      # tmpfs is for efficiency
      options: >
        --group-add 1457
        --tmpfs /tmp
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: Check Redis credentials
        # Failing internal jobs draws attention immediately so we can fix them and make them fast.
        # Forks will never have secrets; don't fail the job for them, they'll just run slower
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          if [ -z "${{ secrets.REDIS_PASSWORD }}" ]; then
            echo "Redis password is missing. Did you forget 'secrets: inherit'?"
            exit 1
          fi
          # Conditionally set this here so that it remains unset on forks,
          # otherwise it resolves an invalid URL and the job fails
          REDIS_USER="${{ vars.REDIS_USER }}"
          REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
          REDIS_HOST="${{ vars.REDIS_HOST }}"
          REDIS_PORT="${{ vars.REDIS_PORT }}"
          # ccache 4.13 bug: read-only is std::optional<bool>; the write gate checks
          # `if (entry.config.read_only)` which is true whenever the optional HAS a value —
          # including when that value is false.  Omit the property entirely unless we
          # actually want read-only mode; ccache's default when absent is writable.
          CCACHE_REMOTE_STORAGE="redis://${REDIS_USER}:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}"
          if [ "${{ vars.REDIS_IS_READONLY }}" = "true" ]; then
            CCACHE_REMOTE_STORAGE="${CCACHE_REMOTE_STORAGE}|read-only=true"
          fi
          echo "CCACHE_REMOTE_STORAGE=${CCACHE_REMOTE_STORAGE}" >> $GITHUB_ENV
          echo "CCACHE_REMOTE_STORAGE: ${CCACHE_REMOTE_STORAGE}"

      - name: Configure ctcache
        # Same fork gate as ccache: forks have no secrets so skip silently.
        # ctcache is writable from all non-fork refs (including PR branches)
        # so repeated commits to a branch benefit from cached clang-tidy results.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          # ctcache is not published on PyPI — install from pinned commit SHA (tag 1.2.0)
          # Pinned to SHA (not tag) to avoid supply-chain risk from mutable git tags
          uv pip install --quiet "ctcache @ git+https://github.com/matus-chochlik/ctcache.git@e33c063ca6e52b48bcefbc45d46d8c150ffa81ca" boto3  # 1.2.0

          # Namespace encodes the clang-tidy version so a toolchain upgrade auto-invalidates
          CT_VERSION=$(clang-tidy-20 --version 2>/dev/null | grep -oP 'version \K[0-9]+' || echo "20")
          {
            echo "CTCACHE_S3_BUCKET=ctcache"
            echo "CTCACHE_S3_FOLDER=ct${CT_VERSION}"
            echo "CTCACHE_KEEP_COMMENTS=1"
            # Note: CTCACHE_SAVE_OUTPUT is intentionally NOT set — S3 store_in_cache_with_data
            # is a TODO no-op in ctcache 1.2.0, so saving output would silently write nothing.
            echo "AWS_ACCESS_KEY_ID=${{ secrets.GARAGE_S3_ACCESS_KEY }}"
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.GARAGE_S3_SECRET_KEY }}"
            echo "AWS_ENDPOINT_URL=http://garage.garage.svc.cluster.local:3900"
            echo "AWS_DEFAULT_REGION=us-east-1"
            echo "HTTP_PROXY=http://proxy.restricted-proxy.svc.cluster.local:3128"
            echo "HTTPS_PROXY=http://proxy.restricted-proxy.svc.cluster.local:3128"
          } >> "$GITHUB_ENV"
          echo "ctcache S3 folder: ct${CT_VERSION}"
          # Pre-resolve the ctcache binary once so the per-TU wrapper script
          # skips a repeated PATH scan across thousands of invocations.
          CTCACHE_BIN=$(command -v clang-tidy-cache || true)
          echo "CTCACHE_BIN=${CTCACHE_BIN}" >> "$GITHUB_ENV"

          # Diagnose connectivity at the HTTP level before boto3
          # 403 from curl is expected (Garage rejects unsigned requests) — confirms proxy reaches Garage
          echo "--- Garage HTTP probe (403 = Garage reachable, proxy working) ---"
          curl -s -o /dev/null -w "Garage root HTTP status: %{http_code}\n" \
            -x "http://proxy.restricted-proxy.svc.cluster.local:3128" \
            http://garage.garage.svc.cluster.local:3900/ || echo "Garage root: curl failed (unreachable)"

          # Verify connectivity — warn but don't fail if Garage is unreachable
          AWS_ACCESS_KEY_ID="${{ secrets.GARAGE_S3_ACCESS_KEY }}" \
          AWS_SECRET_ACCESS_KEY="${{ secrets.GARAGE_S3_SECRET_KEY }}" \
          AWS_ENDPOINT_URL="http://garage.garage.svc.cluster.local:3900" \
          AWS_DEFAULT_REGION="us-east-1" \
          HTTP_PROXY="http://proxy.restricted-proxy.svc.cluster.local:3128" \
          HTTPS_PROXY="http://proxy.restricted-proxy.svc.cluster.local:3128" \
          python3 - << 'PYEOF'
          import boto3, botocore, os, sys
          print(f"Endpoint: {os.environ.get('AWS_ENDPOINT_URL', '')}")
          print(f"HTTP_PROXY: {os.environ.get('HTTP_PROXY', '(not set)')}")
          try:
              s3 = boto3.client("s3",
                  endpoint_url=os.environ["AWS_ENDPOINT_URL"],
                  aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
                  aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
                  region_name=os.environ["AWS_DEFAULT_REGION"],
                  config=botocore.config.Config(s3={"addressing_style": "path"}),
              )
              s3.list_objects_v2(Bucket="ctcache", MaxKeys=1)
              print("ctcache Garage S3 connection OK")
              # Signal to downstream steps that S3 is reachable
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("CTCACHE_S3_OK=1\n")
          except Exception as e:
              print(f"::warning::ctcache Garage S3 unreachable ({e}) — analysis will run without caching")
              sys.exit(0)
          PYEOF

      - name: Create ccache tmpdir
        run: |
          mkdir -p /tmp/ccache

      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          clean: true

      - name: Configure git safe.directory
        run: git config --global --add safe.directory /work

      - name: 📦 Restore CPM source cache
        id: cpm-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cpmcache.tar.zst
          key: cpm-z22-${{ hashFiles('third_party/CMakeLists.txt', 'tt_metal/third_party/umd/third_party/CMakeLists.txt', 'tt-train/cmake/dependencies.cmake') }}
          restore-keys: cpm-z22-

      - name: Unpack CPM cache
        run: |
          [ -f .cpmcache.tar.zst ] && tar -I 'zstd -T0' -xf .cpmcache.tar.zst || true

      - name: Pre-create fixes dir
        run: mkdir -p .build/clang-tidy/fixes

      - name: 🔧 CMake configure
        run: |
          cmake --preset clang-tidy-fix-parallel \
            -DCMAKE_CXX_CLANG_TIDY="$(pwd)/cmake/clang-tidy-export-fixes-wrapper.sh;$(pwd)/.build/clang-tidy/fixes;--warnings-as-errors=*" \
            -DCMAKE_C_CLANG_TIDY="$(pwd)/cmake/clang-tidy-export-fixes-wrapper.sh;$(pwd)/.build/clang-tidy/fixes;--warnings-as-errors=*"

      - name: Pack CPM cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        run: |
          [ -d .cpmcache ] && tar -I 'zstd -T0 --ultra -22' -cf .cpmcache.tar.zst .cpmcache || true

      - name: Save CPM source cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cpmcache.tar.zst
          key: ${{ steps.cpm-cache.outputs.cache-primary-key }}

      - name: Prepare ccache summary
        run: ccache -z

      - name: Build prerequisite targets (without analysis)
        if: ${{ inputs.prereq-targets != '' }}
        timeout-minutes: 30
        run: |
          echo "Building prerequisite targets (will not be analyzed): ${{ inputs.prereq-targets }}"
          for target in ${{ inputs.prereq-targets }}; do
            echo "Building target: $target"
            cmake --build --preset clang-tidy-fix-parallel --target "$target"
          done

      - name: 🔍 Analyze code with clang-tidy
        timeout-minutes: 120
        run: |
          # For PR suggestion jobs: allow clang-tidy violations (they become inline comments).
          # For all other jobs: violations fail the build.
          _ALLOW_VIOLATIONS="${{ inputs.post-pr-suggestions && github.event_name == 'pull_request' }}"
          if [ -n "${{ inputs.scan-targets }}" ]; then
            echo "Scanning specific targets: ${{ inputs.scan-targets }}"
            for target in ${{ inputs.scan-targets }}; do
              echo "Scanning target: $target"
              cmake --build --preset clang-tidy-fix-parallel --target "$target" \
                || [ "$_ALLOW_VIOLATIONS" = "true" ]
            done
          else
            echo "Scanning all targets"
            cmake --build --preset clang-tidy-fix-parallel \
              || [ "$_ALLOW_VIOLATIONS" = "true" ]
          fi

      - name: Apply clang-tidy fixes to working tree
        if: ${{ inputs.post-pr-suggestions && github.event_name == 'pull_request' && !cancelled() }}
        run: |
          FIXES_DIR=".build/clang-tidy/fixes"
          if ls "$FIXES_DIR"/*.yaml 2>/dev/null | grep -q .; then
            if command -v clang-apply-replacements-20 &>/dev/null; then
              clang-apply-replacements-20 "$FIXES_DIR"
            else
              clang-apply-replacements "$FIXES_DIR"
            fi
          else
            echo "No fix files found in $FIXES_DIR — nothing to suggest"
          fi

      - name: Post inline clang-tidy suggestions on PR
        if: ${{ inputs.post-pr-suggestions && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && !cancelled() }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          # /tmp is noexec (--tmpfs /tmp). Install reviewdog to /usr/local/bin instead.
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh \
            | sh -s -- -b /usr/local/bin v0.21.0
          git diff | reviewdog \
            -f diff \
            -name clang-tidy \
            -reporter github-pr-review \
            -filter-mode diff_context \
            -level warning \
            -fail-level none \
            -fail-on-error false

      - name: Publish Ccache summary
        if: always()
        run: |
          echo '## CCache Summary' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache -s >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Publish ctcache summary
        if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        run: |
          {
            echo '## ctcache Summary'
            if command -v clang-tidy-cache &>/dev/null; then
              echo '```'
              clang-tidy-cache --show-stats 2>/dev/null || echo "stats unavailable"
              echo '```'
            fi
          } >> $GITHUB_STEP_SUMMARY
