name: "Clang Tidy (Reusable)"

on:
  workflow_call:
    inputs:
      platform:
        required: false
        type: string
        default: "Ubuntu 24.04"
        description: "Platform to analyze"
      architecture:
        required: false
        type: string
        default: "amd64"
      ci-build-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built CI Build Docker image tag"
      do-full-scan:
        required: true
        type: string
        description: "Whether to do a full scan or incremental"
      merge-base:
        required: false
        type: string
        default: ""
        description: "Merge base commit for incremental scans"
      prereq-targets:
        required: false
        type: string
        default: ""
        description: "Prerequisite targets to build without analysis (space-separated, built after switching to current ref but before restoring shim)"
      scan-targets:
        required: false
        type: string
        default: ""
        description: "Specific target(s) to scan (space-separated). If empty, scans all targets."

jobs:
  clang-tidy:
    name: 🤖 Clang Tidy ${{ inputs.scan-targets && format('({0})', inputs.scan-targets) || '' }}
    timeout-minutes: 240
    runs-on: tt-ubuntu-2204-xlarge-stable
    environment: ${{ github.ref == 'refs/heads/main' && 'mainline' || '' }}
    container:
      image: harbor.ci.tenstorrent.net/${{ inputs.ci-build-docker-image }}
      env:
        CCACHE_REMOTE_ONLY: "true"
        CCACHE_TEMPDIR: /tmp/ccache
      volumes:
        - ${{ github.workspace }}:/work
        # HOME is hardcoded for no clear reason: https://github.com/actions/runner/issues/863
        - /home/ubuntu/.ccache-ci:/github/home/.ccache
      # Group 1457 is for the shared ccache drive
      # tmpfs is for efficiency
      options: >
        --group-add 1457
        --tmpfs /tmp
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: Check Redis credentials
        # Failing internal jobs draws attention immediately so we can fix them and make them fast.
        # Forks will never have secrets; don't fail the job for them, they'll just run slower
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          if [ -z "${{ secrets.REDIS_PASSWORD }}" ]; then
            echo "Redis password is missing. Did you forget 'secrets: inherit'?"
            exit 1
          fi
          # Conditionally set this here so that it remains unset on forks,
          # otherwise it resolves an invalid URL and the job fails
          REDIS_USER="${{ vars.REDIS_USER }}"
          REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
          REDIS_HOST="${{ vars.REDIS_HOST }}"
          REDIS_PORT="${{ vars.REDIS_PORT }}"
          REDIS_READONLY="${{ vars.REDIS_IS_READONLY }}"
          CCACHE_PARTS=(
            "redis://${REDIS_USER}:${REDIS_PASSWORD}"
            "@${REDIS_HOST}:${REDIS_PORT}"
            "|read-only=${REDIS_READONLY}"
          )
          CCACHE_REMOTE_STORAGE=$(IFS=''; echo "${CCACHE_PARTS[*]}")
          echo "CCACHE_REMOTE_STORAGE=${CCACHE_REMOTE_STORAGE}" >> $GITHUB_ENV
          echo "CCACHE_REMOTE_STORAGE: ${CCACHE_REMOTE_STORAGE}"

      - name: Configure ctcache
        # Same fork gate as ccache: forks have no secrets so skip silently.
        # Unlike ccache, ctcache is writable from ALL non-fork refs (including PR branches)
        # so repeated commits to a branch benefit from cached clang-tidy results.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        run: |
          python3 -m pip install --quiet clang-tidy-cache redis

          # Namespace encodes the clang-tidy version so a toolchain upgrade auto-invalidates
          CT_VERSION=$(clang-tidy-20 --version 2>/dev/null | grep -oP 'version \K[0-9]+' || echo "20")
          {
            echo "CTCACHE_REDIS_HOST=${{ vars.REDIS_HOST }}"
            echo "CTCACHE_REDIS_PORT=${{ vars.REDIS_PORT }}"
            echo "CTCACHE_REDIS_USERNAME=${{ vars.REDIS_USER }}"
            echo "CTCACHE_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}"
            echo "CTCACHE_REDIS_NAMESPACE=/ctcache/ct${CT_VERSION}"
            echo "CTCACHE_REDIS_READ_ONLY=false"
            echo "CTCACHE_REDIS_CONNECT_TIMEOUT=2.0"
            echo "CTCACHE_KEEP_COMMENTS=1"
            echo "CTCACHE_SAVE_OUTPUT=1"
          } >> "$GITHUB_ENV"
          echo "ctcache namespace: /ctcache/ct${CT_VERSION}"

          # Verify connectivity — warn but don't fail if Redis is down
          python3 - << 'PYEOF'
          import redis, os, sys
          try:
              r = redis.Redis(
                  host=os.environ["CTCACHE_REDIS_HOST"],
                  port=int(os.environ["CTCACHE_REDIS_PORT"]),
                  username=os.environ["CTCACHE_REDIS_USERNAME"],
                  password=os.environ["CTCACHE_REDIS_PASSWORD"],
                  socket_connect_timeout=2,
              )
              r.ping()
              print("ctcache Redis connection OK")
          except Exception as e:
              print(f"::warning::ctcache Redis unreachable ({e}) — analysis will run without caching")
              sys.exit(0)
          PYEOF

      - name: Create ccache tmpdir
        run: |
          mkdir -p /tmp/ccache

      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          clean: true

      - name: Configure git safe.directory
        run: git config --global --add safe.directory /work

      - name: Check out baseline
        if: ${{ inputs.do-full-scan != 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.merge-base }}
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          clean: true

      - name: Create shim
        run: |
          # Use a script rather than a symlink so we can overwrite it later (with the ctcache
          # wrapper) without changing the command text that Ninja tracks for incremental builds.
          cat > ./clang-tidy-shim << 'SHIMEOF'
          #!/bin/bash
          exec /usr/bin/true "$@"
          SHIMEOF
          chmod +x ./clang-tidy-shim

      - name: 🔧 CMake configure
        run: |
          CLANG_TIDY_CMD="$(pwd)/clang-tidy-shim;--warnings-as-errors=*"
          cmake --preset clang-tidy \
            -DCMAKE_CXX_CLANG_TIDY="$CLANG_TIDY_CMD" \
            -DCMAKE_C_CLANG_TIDY="$CLANG_TIDY_CMD"

      - name: Prepare baseline ccache summary
        if: ${{ inputs.do-full-scan != 'true' }}
        run: |
          # Zero out the stats so we can see how we did this build
          # NOTE: may be inaccurate if we have >1 build runner on the same machine, using the same local cache
          ccache -z

      - name: 🛠️ Baseline Build
        if: ${{ inputs.do-full-scan != 'true' }}
        timeout-minutes: 60
        run: |
          cmake --build --preset clang-tidy

      - name: Publish Ccache summary
        if: ${{ inputs.do-full-scan != 'true' }}
        run: |
          echo '## CCache Summary' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache -s >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache -s

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          clean: false

      - name: Prepare ccache summary
        run: |
          # Zero out the stats so we can see how we did this build
          ccache -z

      - name: Build prerequisite targets (without analysis)
        if: ${{ inputs.prereq-targets != '' }}
        timeout-minutes: 30
        run: |
          echo "Building prerequisite targets (will not be analyzed): ${{ inputs.prereq-targets }}"
          for target in ${{ inputs.prereq-targets }}; do
            echo "Building target: $target"
            cmake --build --preset clang-tidy --target "$target"
          done

      - name: Restore shim
        run: |
          # Overwrite the no-op shim with the real analysis wrapper.
          # We keep the filename ./clang-tidy-shim unchanged so Ninja doesn't force-rebuild every TU.
          if command -v clang-tidy-cache &>/dev/null; then
            cat > ./clang-tidy-shim << 'SHIMEOF'
          #!/bin/bash
          exec clang-tidy-cache --directories_with_clang_tidy=/work clang-tidy-20 "$@"
          SHIMEOF
            chmod +x ./clang-tidy-shim
            echo "ctcache shim active (results cached in Redis namespace ${CTCACHE_REDIS_NAMESPACE:-/ctcache})"
          else
            cat > ./clang-tidy-shim << 'SHIMEOF'
          #!/bin/bash
          exec clang-tidy-20 "$@"
          SHIMEOF
            chmod +x ./clang-tidy-shim
            echo "::warning::clang-tidy-cache not found — running clang-tidy-20 directly (no result caching)"
          fi

      - name: 🔍 Analyze code with clang-tidy
        timeout-minutes: 120
        run: |
          if [ -n "${{ inputs.scan-targets }}" ]; then
            echo "Scanning specific targets: ${{ inputs.scan-targets }}"
            for target in ${{ inputs.scan-targets }}; do
              echo "Scanning target: $target"
              cmake --build --preset clang-tidy --target "$target"
            done
          else
            echo "Scanning all targets"
            cmake --build --preset clang-tidy
          fi

      - name: Publish Ccache summary
        run: |
          echo '## CCache Summary' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache -s >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Publish ctcache summary
        if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        run: |
          python3 - << 'PYEOF'
          import os, redis, sys
          try:
              r = redis.Redis(
                  host=os.environ["CTCACHE_REDIS_HOST"],
                  port=int(os.environ["CTCACHE_REDIS_PORT"]),
                  username=os.environ["CTCACHE_REDIS_USERNAME"],
                  password=os.environ["CTCACHE_REDIS_PASSWORD"],
                  socket_connect_timeout=2,
              )
              ns = os.environ.get("CTCACHE_REDIS_NAMESPACE", "/ctcache")
              count = r.dbsize()
              print(f"## ctcache Summary")
              print(f"Namespace: `{ns}`")
              print(f"Total keys in Redis DB: {count}")
          except Exception as e:
              print(f"ctcache stats unavailable: {e}")
          PYEOF
          # Also print clang-tidy-cache stats if available
          if command -v clang-tidy-cache &>/dev/null; then
            clang-tidy-cache --show-stats 2>/dev/null || true
          fi
