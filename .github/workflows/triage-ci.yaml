name: "(triage) Notify full-ci-triage"

on:
  workflow_dispatch:

jobs:
  notify-full-ci-triage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify full-ci-triage Slack channel
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0B1F8Z7GQM",
              "text": "<@U0AK4BVCFM0> are you here?\nTriage ping from `${{ github.workflow }}` on `${{ github.ref_name }}`: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
