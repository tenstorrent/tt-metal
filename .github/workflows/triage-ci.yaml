name: "(triage) Export Evan Slack threads"

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Number of days of Slack history to export"
        required: false
        default: "30"
      data-report-model:
        description: "Cursor model for Slack data gathering report"
        required: false
        type: choice
        options:
          - auto
          - claude-4-sonnet
          - claude-4-opus
          - claude-3.7-sonnet
          - gpt-5
          - gpt-5-mini
          - gpt-4.1
          - o3
          - gemini-2.5-pro
          - gemini-2.5-flash
        default: "auto"
      data-gathering-mode:
        description: "If checked, run Cursor agent to generate Slack stats report"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  export-slack-author-threads:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure SLACK_BOT_TOKEN is configured
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "Missing secret SLACK_BOT_TOKEN"
            exit 1
          fi

      - name: Install Cursor CLI (kept for upcoming analysis steps)
        run: |
          set -euo pipefail
          install_script="$(mktemp)"
          curl --fail --show-error --silent --location \
            --proto '=https' --tlsv1.2 \
            https://cursor.com/install \
            -o "$install_script"
          bash "$install_script"
          rm -f "$install_script"
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Export Evan top-level Slack messages and thread replies
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          set -euo pipefail
          python tools/ci/export_slack_author_threads.py \
            --channel-id C05GRJC4J4A \
            --author-user-id U08GTDV8MDH \
            --days "${{ github.event.inputs.days || 30 }}" \
            --output build_ci/raw_data/slack_C05GRJC4J4A_U08GTDV8MDH_threads.json

      - name: Upload Slack export artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4
        with:
          name: slack-C05GRJC4J4A-U08GTDV8MDH-threads
          path: build_ci/raw_data/slack_C05GRJC4J4A_U08GTDV8MDH_threads.json
          retention-days: 7

      - name: Ensure CURSOR_API_KEY is configured (data gathering mode)
        if: ${{ inputs['data-gathering-mode'] }}
        env:
          CURSOR_API_KEY: ${{ secrets.EVAN_CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "Missing secret EVAN_CURSOR_API_KEY"
            exit 1
          fi

      - name: Generate Slack data gathering report with Cursor agent
        if: ${{ inputs['data-gathering-mode'] }}
        env:
          CURSOR_API_KEY: ${{ secrets.EVAN_CURSOR_API_KEY }}
        uses: ./.github/actions/generate-slack-data-report
        with:
          input-json-path: build_ci/raw_data/slack_C05GRJC4J4A_U08GTDV8MDH_threads.json
          report-path: build_ci/raw_data/slack_C05GRJC4J4A_U08GTDV8MDH_report.md
          model: ${{ github.event.inputs['data-report-model'] || 'auto' }}

      - name: Upload data gathering report artifact
        if: ${{ inputs['data-gathering-mode'] }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4
        with:
          name: slack-C05GRJC4J4A-U08GTDV8MDH-report
          path: build_ci/raw_data/slack_C05GRJC4J4A_U08GTDV8MDH_report.md
          retention-days: 7

      - name: Publish report to run summary
        if: ${{ inputs['data-gathering-mode'] }}
        run: |
          set -euo pipefail
          report_path="build_ci/raw_data/slack_C05GRJC4J4A_U08GTDV8MDH_report.md"
          {
            echo "# Slack Data Gathering Report"
            echo
            cat "$report_path"
          } >> "$GITHUB_STEP_SUMMARY"
