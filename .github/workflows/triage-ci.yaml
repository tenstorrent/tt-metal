name: "(triage) Create Issues Test"

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  create-issues:
    uses: tenstorrent/tt-auto-triage/.github/workflows/triage-ci.yaml@ebanerjee/triage-create-issues
    with:
      create-issues: true
      assign-owners: false
      slack-notify: false
      issue-repo: ebanerjeeTT/issue_dump
      target-repo: tenstorrent/tt-metal
      max-issues: "10"
      slack-channel-id: C0APK6215B5
    secrets:
      AGGREGATE_READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_WRITE_TOKEN: ${{ secrets.AUTO_TRIAGE_TOKEN }}
      CURSOR_API_KEY: ${{ secrets.EVAN_CURSOR_API_KEY }}
