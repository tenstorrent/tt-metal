name: "(triage) Export Evan Slack threads"

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Number of days of Slack history to export"
        required: false
        default: "30"

permissions:
  contents: read

jobs:
  export-slack-author-threads:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure SLACK_BOT_TOKEN is configured
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "Missing secret SLACK_BOT_TOKEN"
            exit 1
          fi

      - name: Install Cursor CLI (kept for upcoming analysis steps)
        run: |
          set -euo pipefail
          install_script="$(mktemp)"
          curl --fail --show-error --silent --location \
            --proto '=https' --tlsv1.2 \
            https://cursor.com/install \
            -o "$install_script"
          bash "$install_script"
          rm -f "$install_script"
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Export Evan top-level Slack messages and thread replies
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          set -euo pipefail
          python tools/ci/export_slack_author_threads.py \
            --channel-id C05GRJC4J4A \
            --author-user-id U08GTDV8MDH \
            --days "${{ github.event.inputs.days || 30 }}" \
            --output build_ci/raw_data/slack_C05GRJC4J4A_U08GTDV8MDH_threads.json

      - name: Upload Slack export artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # @v4
        with:
          name: slack-C05GRJC4J4A-U08GTDV8MDH-threads
          path: build_ci/raw_data/slack_C05GRJC4J4A_U08GTDV8MDH_threads.json
          retention-days: 7
