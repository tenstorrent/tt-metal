name: "(triage) Bug Escapes"

on:
  workflow_dispatch:
    inputs:
      consecutive-runs:
        description: "Number of recent runs to evaluate per job"
        type: string
        default: "3"

permissions:
  contents: read
  actions: read

jobs:
  bug-escapes:
    uses: tenstorrent/tt-auto-triage/.github/workflows/bug-escapes-ci.yaml@ebanerjee/bug-escapes
    with:
      consecutive-runs: ${{ inputs.consecutive-runs }}
    secrets:
      GITHUB_READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
