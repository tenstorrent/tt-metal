name: "(triage) Issue Lifecycle Manager"

on:
  workflow_dispatch:
    inputs:
      close-issues:
        description: "Actually close resolved issues (false = dry-run)"
        type: boolean
        default: false
      issue-repo:
        description: "Repository containing the open auto-triage issues"
        required: false
        default: "ebanerjeeTT/issue_dump"
      target-repo:
        description: "Repository to check workflow run history against"
        required: false
        default: "tenstorrent/tt-metal"
      runs-to-evaluate:
        description: "How many recent runs to fetch and require consensus across"
        required: false
        default: "3"

permissions:
  contents: read
  actions: read

jobs:
  lifecycle:
    uses: tenstorrent/tt-auto-triage/.github/workflows/lifecycle-ci.yaml@ebanerjee/issue-lifecycle
    with:
      close-issues: ${{ inputs.close-issues }}
      issue-repo: ${{ inputs.issue-repo || 'ebanerjeeTT/issue_dump' }}
      target-repo: ${{ inputs.target-repo || 'tenstorrent/tt-metal' }}
      runs-to-evaluate: ${{ inputs.runs-to-evaluate || '3' }}
    secrets:
      GITHUB_READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_WRITE_TOKEN: ${{ secrets.EVAN_RESTRICTED_TOKEN }}
      CURSOR_API_KEY: ${{ secrets.EVAN_CURSOR_API_KEY }}
