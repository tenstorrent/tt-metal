name: "(triage) Slack Notify Test"

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  slack-notify:
    uses: tenstorrent/tt-auto-triage/.github/workflows/triage-ci.yaml@ebanerjee/triage-slack-notify
    with:
      create-issues: false
      assign-owners: false
      slack-notify: true
      issue-repo: ebanerjeeTT/issue_dump
      target-repo: tenstorrent/tt-metal
      slack-channel-id: C0APK6215B5
    secrets:
      ISSUE_WRITE_TOKEN: ${{ secrets.AUTO_TRIAGE_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
