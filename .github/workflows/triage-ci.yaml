name: "(triage) Bug Escape Detection / Verify"

on:
  workflow_dispatch:
    inputs:
      # --- Verification mode (fill these to skip detection and verify a specific escape) ---
      fix-commit-sha:
        description: "Verify mode: fix commit SHA (leave blank for detection mode)"
        type: string
        default: ""
      verify-test-pipeline:
        description: "Verify mode: workflow file path (e.g. .github/workflows/t3000-perf-tests.yaml)"
        type: string
        default: ""
      verify-test-job:
        description: "Verify mode: job display name"
        type: string
        default: ""
      verify-test-name:
        description: "Verify mode: full pytest path"
        type: string
        default: ""
      poll-interval-seconds:
        description: "Verify mode: seconds between status checks"
        type: string
        default: "30"
      # --- Detection mode (used when fix-commit-sha is blank) ---
      max-phase:
        description: "Detection mode: stop after this phase (0-4)"
        type: string
        default: "4"
      test-workflows:
        description: "Detection mode: comma-separated workflow paths (empty = all)"
        type: string
        default: ""
      consecutive-runs:
        description: "Detection mode: consecutive failing runs required"
        type: string
        default: "3"
      lookback-days:
        description: "Detection mode: days to look back for failures"
        type: string
        default: "14"

permissions:
  contents: write
  actions: write

jobs:
  detect:
    if: inputs.fix-commit-sha == ''
    uses: tenstorrent/tt-auto-triage/.github/workflows/bug-escapes-ci.yaml@ebanerjee/bug-escapes
    with:
      max-phase: ${{ inputs.max-phase }}
      test-workflows: ${{ inputs.test-workflows }}
      consecutive-runs: ${{ inputs.consecutive-runs }}
      lookback-days: ${{ inputs.lookback-days }}
    secrets:
      GITHUB_READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CURSOR_API_KEY: ${{ secrets.EVAN_CURSOR_API_KEY }}

  # Inlined (not via uses:) so we can pass GITHUB_WRITE_TOKEN directly.
  # GitHub's auto-generated GITHUB_TOKEN (even with contents:write) cannot create
  # branches at commits containing .github/workflows/ — it lacks 'workflow' OAuth scope.
  # GITHUB_WRITE_TOKEN must be a PAT with repo+workflow scopes stored in this repo's secrets.
  verify:
    if: inputs.fix-commit-sha != ''
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout tt-auto-triage (verify scripts)
        uses: actions/checkout@v4
        with:
          repository: tenstorrent/tt-auto-triage
          ref: ebanerjee/bug-escapes
          path: triage

      - name: Checkout tt-metal (for YAML discovery and branch creation)
        uses: actions/checkout@v4
        with:
          repository: tenstorrent/tt-metal
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_WRITE_TOKEN }}
          path: tt-metal

      - name: Install dependencies
        run: pip3 install PyYAML

      - name: Run verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_WRITE_TOKEN }}
          FIX_COMMIT_SHA: ${{ inputs.fix-commit-sha }}
          TEST_PIPELINE: ${{ inputs.verify-test-pipeline }}
          TEST_JOB: ${{ inputs.verify-test-job }}
          TEST_NAME: ${{ inputs.verify-test-name }}
          REPO_DIR: ${{ github.workspace }}/tt-metal
          POLL_INTERVAL: ${{ inputs.poll-interval-seconds }}
          MAX_WAIT_MINUTES: "120"
          OWNER_REPO: tenstorrent/tt-metal
        run: |
          set -euo pipefail
          chmod +x triage/bug-escapes/verify/verify.sh
          triage/bug-escapes/verify/verify.sh

      - name: Upload verification result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-result
          path: triage/bug-escapes/verify/output/
          retention-days: 30
          if-no-files-found: warn
