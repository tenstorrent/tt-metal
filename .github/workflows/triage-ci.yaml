name: "(triage) Issue Lifecycle Manager"

on:
  workflow_dispatch:
    inputs:
      close-issues:
        description: "Actually close resolved issues (false = dry-run)"
        type: boolean
        default: false
      check-passing-only:
        description: "Fast mode: close passing jobs deterministically without AI"
        type: boolean
        default: false
      llm-backend:
        description: "LLM backend: 'copilot' or 'cursor'"
        required: false
        default: "copilot"
      issue-repo:
        description: "Repository containing the open auto-triage issues"
        required: false
        default: "tenstorrent/tt-metal"
      target-repo:
        description: "Repository to check workflow run history against"
        required: false
        default: "tenstorrent/tt-metal"
      runs-to-evaluate:
        description: "How many recent runs to fetch and require consensus across"
        required: false
        default: "3"

permissions:
  contents: read
  actions: read

jobs:
  cursor-cli-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure CURSOR_API_KEY is configured
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "Missing secret CURSOR_API_KEY"
            exit 1
          fi

      - name: Install Cursor CLI
        run: |
          set -euo pipefail
          install_script="$(mktemp)"
          curl --fail --show-error --silent --location \
            --proto '=https' --tlsv1.2 \
            https://cursor.com/install \
            -o "$install_script"
          bash "$install_script"
          rm -f "$install_script"
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Run simple Cursor prompt
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail
          output="$(agent -p "Reply with exactly: CURSOR_CI_OK")"
          echo "Agent output: $output"
          if [[ "$output" != *"CURSOR_CI_OK"* ]]; then
            echo "Unexpected agent output; expected CURSOR_CI_OK"
            exit 1
          fi
