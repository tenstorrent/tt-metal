name: "(triage) Slack Data Export"

on:
  workflow_dispatch:
    inputs:
      channel-id:
        description: "Slack channel ID to export"
        required: false
        default: "C0APK6215B5"
      author-user-id:
        description: "Slack user ID to filter author threads (empty = skip author export)"
        required: false
        default: ""
      days:
        description: "Lookback window in days for author threads"
        required: false
        default: "30"
      channel-days:
        description: "Lookback window in days for channel activity export"
        required: false
        default: "14"

permissions:
  contents: read
  issues: read

jobs:
  slack-export:
    uses: tenstorrent/tt-auto-triage/.github/workflows/slack-export-ci.yaml@ebanerjee/slack-export
    with:
      channel-id: ${{ inputs.channel-id || 'C0APK6215B5' }}
      author-user-id: ${{ inputs.author-user-id || '' }}
      days: ${{ inputs.days || '30' }}
      channel-days: ${{ inputs.channel-days || '14' }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      GITHUB_WRITE_TOKEN: ${{ secrets.EVAN_RESTRICTED_TOKEN }}
