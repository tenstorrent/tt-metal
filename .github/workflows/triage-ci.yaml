name: "(triage) Draft PR Creation"

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: "Issue number from ebanerjeeTT/issue_dump"
        required: true
      try-to-fix:
        description: "If true, try to fix root cause. If false, just disable the test."
        type: boolean
        default: false
      issue-repo:
        description: "Repository containing the triage issues"
        required: false
        default: "ebanerjeeTT/issue_dump"
      target-pr-repo:
        description: "Repository where the draft PR will be created"
        required: false
        default: "ebanerjeeTT/tt-metal"
      model:
        description: "Cursor model to use"
        type: choice
        options:
          - claude-4-sonnet
          - claude-4-opus
          - claude-3.7-sonnet
          - gpt-5
          - gpt-5-mini
          - gpt-4.1
          - o3
          - gemini-2.5-pro
          - gemini-2.5-flash
        default: "claude-4-sonnet"

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  draft-pr:
    uses: tenstorrent/tt-auto-triage/.github/workflows/draft-pr-ci.yaml@ebanerjee/draft-pr-creation
    with:
      issue-number: ${{ inputs.issue-number }}
      try-to-fix: ${{ inputs.try-to-fix }}
      issue-repo: ${{ inputs.issue-repo || 'ebanerjeeTT/issue_dump' }}
      target-pr-repo: ${{ inputs.target-pr-repo || 'ebanerjeeTT/tt-metal' }}
      model: ${{ inputs.model || 'claude-4-sonnet' }}
    secrets:
      CURSOR_API_KEY: ${{ secrets.EVAN_CURSOR_API_KEY }}
      GITHUB_WRITE_TOKEN: ${{ secrets.EVAN_RESTRICTED_TOKEN }}
