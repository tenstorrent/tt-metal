name: "(triage) Bug Escape Detection"

on:
  workflow_dispatch:
    inputs:
      max-phase:
        description: "Stop after this phase (0=smoke, 1=discover, 2=candidates, 3=fixpoints, 4=full)"
        type: string
        default: "4"
      test-workflows:
        description: "Comma-separated workflow paths (empty = all)"
        type: string
        default: ""
      consecutive-runs:
        description: "Consecutive failing runs required"
        type: string
        default: "3"
      lookback-days:
        description: "Days to look back for failures"
        type: string
        default: "14"
      max-candidates:
        description: "Max confirmed failures before Phase 2 stops"
        type: string
        default: "999"

jobs:
  bug-escapes:
    uses: tenstorrent/tt-auto-triage/.github/workflows/bug-escapes-ci.yaml@ebanerjee/bug-escapes
    with:
      max-phase: ${{ inputs.max-phase }}
      test-workflows: ${{ inputs.test-workflows }}
      consecutive-runs: ${{ inputs.consecutive-runs }}
      lookback-days: ${{ inputs.lookback-days }}
      max-candidates: ${{ inputs.max-candidates }}
    secrets:
      GITHUB_READ_TOKEN: ${{ secrets.GITHUB_READ_TOKEN }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
