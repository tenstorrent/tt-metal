name: "(triage) Hourly triage kickoff"

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:       # manual trigger for testing

jobs:
  ping-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send triage instructions to BrAIn
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request

          SLACK_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          BRAIN_UID   = "U0AK4BVCFM0"
          CHANNEL     = "C0B1F8Z7GQM"

          text = (
              f"<@{BRAIN_UID}> Run the full triage pipeline in order:\n\n"
              "1. `/run-lifecycle false true copilot`\n"
              "2. `/make-new-issues 1`\n"
              "3. `/check-for-existing-issues` on the issue you just made\n\n"
              "If the issue does *not* already exist in tt-metal:\n"
              "4. `/promote-to-metal`\n"
              "5. `/assign-issue`\n"
              "6. `/draft-slack-message` (include pings for the owners you found)\n\n"
              "Combine steps 4-6 into a *single Slack message* -- one concise summary of "
              "what the issue is and who should take care of it. No separate messages per step."
          )

          data = json.dumps({"channel": CHANNEL, "text": text}).encode()
          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=data,
              headers={
                  "Authorization": f"Bearer {SLACK_TOKEN}",
                  "Content-Type": "application/json"
              }
          )
          with urllib.request.urlopen(req, timeout=30) as r:
              resp = json.loads(r.read())

          if not resp.get("ok"):
              raise RuntimeError(f"Slack post failed: {resp.get('error')}")
          print("BrAIn notified.")
          PYEOF
