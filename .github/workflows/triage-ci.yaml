name: "(triage) Create CI Triage Issues"

on:
  workflow_dispatch:
    inputs:
      max-issues:
        description: "Maximum issues to create (0 = unlimited)"
        type: number
        default: 0
      workflow-filter:
        description: "Comma-separated workflow name substrings to restrict analysis. Empty = all."
        type: string
        default: ""
      consecutive-failures-high-volume:
        description: "Consecutive failures required for high-volume workflows"
        type: number
        default: 4
      consecutive-failures-low-volume:
        description: "Consecutive failures required for low-volume workflows"
        type: number
        default: 2
      high-volume-runs-per-day:
        description: "Threshold (>) for classifying a workflow as high-volume"
        type: number
        default: 5
      llm-backend:
        description: "LLM backend: 'copilot' or 'cursor'"
        type: string
        default: "copilot"
      issue-repo:
        description: "Repository where new issues will be created"
        type: string
        default: "tenstorrent/tt-metal"
      target-repo:
        description: "Repository to check workflow run history against"
        type: string
        default: "tenstorrent/tt-metal"

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  create-issues:
    uses: tenstorrent/tt-auto-triage/.github/workflows/triage-create-issues.yaml@main
    with:
      issue-repo: ${{ inputs.issue-repo }}
      target-repo: ${{ inputs.target-repo }}
      max-issues: ${{ fromJSON(inputs.max-issues) }}
      llm-backend: ${{ inputs.llm-backend }}
      workflow-filter: ${{ inputs.workflow-filter }}
      consecutive-failures-high-volume: ${{ fromJSON(inputs.consecutive-failures-high-volume) }}
      consecutive-failures-low-volume: ${{ fromJSON(inputs.consecutive-failures-low-volume) }}
      high-volume-runs-per-day: ${{ fromJSON(inputs.high-volume-runs-per-day) }}
    secrets:
      AGGREGATE_READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_WRITE_TOKEN: ${{ secrets.TT_METAL_TICKETING_TOKEN }}
      COPILOT_PAT: ${{ secrets.AUTO_TRIAGE_TOKEN }}
