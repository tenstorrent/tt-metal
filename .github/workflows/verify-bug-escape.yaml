name: "(triage) Verify Bug Escape"

on:
  workflow_dispatch:
    inputs:
      fix-commit-sha:
        description: "The commit SHA believed to have fixed the bug"
        type: string
        required: true
      test-pipeline:
        description: "Workflow file path (e.g. .github/workflows/galaxy-e2e-tests.yaml)"
        type: string
        required: true
      test-job:
        description: "Job display name (e.g. BH Galaxy CCL tests)"
        type: string
        required: true
      test-name:
        description: "Full pytest path (e.g. tests/.../test_foo.py::test_bar)"
        type: string
        required: true
      poll-interval-seconds:
        description: "Seconds between run status checks"
        type: string
        default: "120"
      max-wait-minutes:
        description: "Max minutes to wait for verification runs"
        type: string
        default: "120"

jobs:
  verify-bug-escape:
    uses: tenstorrent/tt-auto-triage/.github/workflows/verify-bug-escape-ci.yaml@ebanerjee/bug-escapes
    with:
      fix-commit-sha: ${{ inputs.fix-commit-sha }}
      test-pipeline: ${{ inputs.test-pipeline }}
      test-job: ${{ inputs.test-job }}
      test-name: ${{ inputs.test-name }}
      poll-interval-seconds: ${{ inputs.poll-interval-seconds }}
      max-wait-minutes: ${{ inputs.max-wait-minutes }}
    secrets:
      GITHUB_WRITE_TOKEN: ${{ secrets.GITHUB_READ_TOKEN }}
