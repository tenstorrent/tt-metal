name: "[internal] Blackhole Multi-card sanity tests impl"

on:
  workflow_call:
    inputs:
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
        description: "Comma-separated SKUs (e.g. bh_quietbox_2, bh_p300). Maps to runs_on via .github/sku_config.yaml."
      enable-watcher:
        description: "Enable watcher"
        default: false
        type: boolean
      enable-llk-asserts:
        required: false
        type: boolean
        default: false
        description: "Enable LLK asserts"

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/blackhole_multi_card_sanity_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "sanity"
      - name: Build test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml

  multi-card-unit-tests:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.matrix != '[]' }}
    strategy:
      # Do not fail-fast because we need to ensure all tests go to completion
      # so we try not to get hanging machines
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved' }}
      env:
        ARCH_NAME: blackhole
        LOGURU_LEVEL: INFO
        LD_LIBRARY_PATH: /work/build/lib
        PYTHONPATH: /work
        TT_METAL_HOME: /work
        GTEST_OUTPUT: xml:/work/generated/test_reports/
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - ${{ (!contains(join(matrix.test-group.runs_on, ' '), 'viommu') && '/dev/hugepages-1G:/dev/hugepages-1G') || '/no_hugepages' }}
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          private-submodule-token: ${{ secrets.TT-OPS-CODE-GEN-CLONE }}
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher || false }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
          # PERF jobs (tracy profiler on) need a wider hang-detection window because
          # the heavy traffic (e.g. layer3 isl_6k4 combine) can stall the NOC for >5s
          # under genuine bandwidth pressure without being deadlocked. Other jobs
          # keep the default 5s.
          hang-detection-timeout: ${{ contains(matrix.test-group.name, 'PERF') && '20.0' || '5.0' }}
      - uses: tenstorrent/tt-metal/.github/actions/ensure-bh-links-online@main
        timeout-minutes: 10
      - name: ${{ matrix.test-group.name }} tests
        timeout-minutes: ${{ matrix.test-group.timeout }}
        uses: ./docker-job/.github/actions/run-with-log
        with:
          log-file: generated/test_logs/${{ matrix.test-group.name }}.log
          run: ${{ matrix.test-group.cmd }}
      - name: Print tt-smi data on failure
        if: ${{ failure() }}
        run: |
          tt-smi -s
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - name: Generate gtest annotations on failure
        uses: tenstorrent/tt-metal/.github/actions/generate-gtest-failure-message@main
        if: ${{ failure() }}
      - name: 🤖 AI job summary
        if: always() && !cancelled()
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/job@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE/docker-job",
              "input_dirs": ["generated/test_logs"],
              "output_dir": "generated/ai_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          job-name: ${{ matrix.test-group.name }}
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()

  ai-run-summary:
    name: "AI Run Summary"
    needs: [load-test-matrix, multi-card-unit-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
      - id: ai-run-summary
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/run@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE",
              "input_dir": "ai_job_summaries",
              "output_dir": "ai_run_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          expected-jobs: ${{ needs.load-test-matrix.outputs.matrix }}
          run-result: ${{ needs.multi-card-unit-tests.result }}
      - name: Show report
        if: always() && steps.ai-run-summary.outputs.report-file != ''
        continue-on-error: true
        shell: bash
        env:
          REPORT_FILE: ${{ steps.ai-run-summary.outputs.report-file }}
        run: |
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
            cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Report file not found: $REPORT_FILE"
          fi
