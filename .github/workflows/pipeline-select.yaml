name: "(Single) Choose your pipeline"

on:
  workflow_dispatch:
    inputs:
      trigger_type:
        description: "Trigger type. 'manual' = custom selection below; other options = predefined configs."
        type: choice
        options:
          - manual
          - models-mandatory
          - models-extended
        default: manual
      extra-tag:
        required: true
        type: string
        default: "in-service"
      single-card-demo:
        description: 'Demo tests. Input ''all'', ''disabled'', or a list of requested models as JSON array, for example: ["resnet", "sdxl"]'
        default: disabled
        type: string
      single-card-perf-models:
        required: false
        type: boolean
        default: false
      single-card-perf-device-models:
        required: false
        type: boolean
        default: false
      single-card-ttnn-models-frequent:
        required: false
        type: boolean
        default: false
      cpp-unit:
        required: false
        type: boolean
        default: false
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        default: Release
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"

run-name: ${{ inputs.trigger_type == 'manual' && 'custom' || inputs.trigger_type }} pipeline
jobs:
  # Centralized logic to determine what should run
  determine-tests:
    runs-on: ubuntu-latest
    outputs:
      run-demo: ${{ steps.logic.outputs.run-demo }}
      run-perf-models: ${{ steps.logic.outputs.run-perf-models }}
      run-perf-device-models: ${{ steps.logic.outputs.run-perf-device-models }}
      run-ttnn-models-frequent: ${{ steps.logic.outputs.run-ttnn-models-frequent }}
      run-cpp-unit: ${{ steps.logic.outputs.run-cpp-unit }}
    steps:
      - name: Checkout security scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/scripts/security
          sparse-checkout-cone-mode: true
      - name: Determine test execution
        id: logic
        env:
          INPUT_TRIGGER_TYPE: ${{ inputs.trigger_type }}
          INPUT_SINGLE_CARD_DEMO: ${{ inputs.single-card-demo }}
          INPUT_SINGLE_CARD_PERF_MODELS: ${{ inputs.single-card-perf-models }}
          INPUT_SINGLE_CARD_PERF_DEVICE_MODELS: ${{ inputs.single-card-perf-device-models }}
          INPUT_SINGLE_CARD_TTNN_MODELS_FREQUENT: ${{ inputs.single-card-ttnn-models-frequent }}
          INPUT_CPP_UNIT: ${{ inputs.cpp-unit }}
        run: |
          source .github/scripts/security/input-validation.sh
          validate_no_newlines \
              "INPUT_TRIGGER_TYPE" "$INPUT_TRIGGER_TYPE" \
              "INPUT_SINGLE_CARD_DEMO" "$INPUT_SINGLE_CARD_DEMO" \
              "INPUT_SINGLE_CARD_PERF_MODELS" "$INPUT_SINGLE_CARD_PERF_MODELS" \
              "INPUT_SINGLE_CARD_PERF_DEVICE_MODELS" "$INPUT_SINGLE_CARD_PERF_DEVICE_MODELS" \
              "INPUT_SINGLE_CARD_TTNN_MODELS_FREQUENT" "$INPUT_SINGLE_CARD_TTNN_MODELS_FREQUENT" \
              "INPUT_CPP_UNIT" "$INPUT_CPP_UNIT"
          case "$INPUT_TRIGGER_TYPE" in
            "manual")
              printf '%s\n' "run-demo=$([[ "$INPUT_SINGLE_CARD_DEMO" != "disabled" ]] && echo "true" || echo "false")" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-perf-models=${INPUT_SINGLE_CARD_PERF_MODELS}" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-perf-device-models=${INPUT_SINGLE_CARD_PERF_DEVICE_MODELS}" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-ttnn-models-frequent=${INPUT_SINGLE_CARD_TTNN_MODELS_FREQUENT}" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-cpp-unit=${INPUT_CPP_UNIT}" >> "${GITHUB_OUTPUT}"
              ;;
            "models-mandatory")
              printf '%s\n' "run-demo=false" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-perf-models=false" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-perf-device-models=true" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-ttnn-models-frequent=true" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-cpp-unit=true" >> "${GITHUB_OUTPUT}"
              ;;
            "models-extended")
              printf '%s\n' "run-demo=true" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-perf-models=true" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-perf-device-models=true" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-ttnn-models-frequent=true" >> "${GITHUB_OUTPUT}"
              printf '%s\n' "run-cpp-unit=true" >> "${GITHUB_OUTPUT}"
              ;;
          esac
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets:
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
    with:
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-type: ${{ inputs.build-type || 'Release' }}
      enable-lto: ${{ inputs.enable-lto || false }}
      build-wheel: true
      tracy: ${{ needs.determine-tests.outputs.run-perf-device-models == 'true' }}
  single-card-demo-tests:
    if: ${{ needs.determine-tests.outputs.run-demo == 'true' }}
    needs: [build-artifact, determine-tests]
    secrets:
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
    uses: ./.github/workflows/single-card-demo-tests-impl.yaml
    with:
      extra-tag: ${{ inputs.extra-tag }}
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      requested-models: ${{ inputs.trigger_type == 'manual' && inputs.single-card-demo || 'all' }}
      arch: wormhole_b0
  single-card-perf-models-tests:
    if: ${{ needs.determine-tests.outputs.run-perf-models == 'true' }}
    needs: [build-artifact, determine-tests]
    secrets:
      SFTP_BENCHMARK_WRITER_HOSTNAME: ${{ secrets.SFTP_BENCHMARK_WRITER_HOSTNAME }}
      SFTP_BENCHMARK_WRITER_KEY: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
      SFTP_BENCHMARK_WRITER_USERNAME: ${{ secrets.SFTP_BENCHMARK_WRITER_USERNAME }}
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    uses: ./.github/workflows/perf-models-impl.yaml
    with:
      extra-tag: ${{ inputs.extra-tag }}
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
  single-card-perf-device-models-tests:
    if: ${{ needs.determine-tests.outputs.run-perf-device-models == 'true' }}
    needs: [build-artifact, determine-tests]
    secrets:
      SFTP_BENCHMARK_WRITER_HOSTNAME: ${{ secrets.SFTP_BENCHMARK_WRITER_HOSTNAME }}
      SFTP_BENCHMARK_WRITER_KEY: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
      SFTP_BENCHMARK_WRITER_USERNAME: ${{ secrets.SFTP_BENCHMARK_WRITER_USERNAME }}
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    uses: ./.github/workflows/perf-device-models-impl.yaml
    with:
      extra-tag: ${{ inputs.extra-tag }}
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
  single-card-ttnn-models-frequent:
    if: ${{ needs.determine-tests.outputs.run-ttnn-models-frequent == 'true' }}
    needs: [build-artifact, determine-tests]
    secrets:
      SFTP_BENCHMARK_WRITER_HOSTNAME: ${{ secrets.SFTP_BENCHMARK_WRITER_HOSTNAME }}
      SFTP_BENCHMARK_WRITER_KEY: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
      SFTP_BENCHMARK_WRITER_USERNAME: ${{ secrets.SFTP_BENCHMARK_WRITER_USERNAME }}
    uses: ./.github/workflows/fast-dispatch-full-regressions-and-models-impl.yaml
    with:
      extra-tag: ${{ inputs.extra-tag }}
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
  cpp-unit-tests:
    if: ${{ needs.determine-tests.outputs.run-cpp-unit == 'true' }}
    needs: [build-artifact, determine-tests]
    uses: ./.github/workflows/cpp-post-commit.yaml
    with:
      arch: wormhole_b0
      runner-label: tt-ubuntu-2204-n300-stable
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
