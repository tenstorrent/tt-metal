name: "[internal] metal - Run profiler regression impl"

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      runner-label:
        required: true
        type: string
      post_commit_only:
        description: "If true, run post-commit-only (exclude @pytest.mark.skip_post_commit). If false, run full profiler regression."
        required: false
        type: boolean
        default: true
      timeout:
        required: false
        type: number
        default: 37
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      enable-watcher:
        description: 'Enable watcher'
        default: false
        type: boolean
      enable-lightweight-kernel-asserts:
        description: 'Enable lightweight kernel asserts'
        default: false
        type: boolean
      enable-llk-asserts:
        description: 'Enable LLK asserts'
        default: false
        type: boolean
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
  workflow_dispatch:
    inputs:
      arch:
        required: true
        type: choice
        options:
          - wormhole_b0
          - blackhole
      runner-label:
        required: true
        type: choice
        options:
          - N150
          - N300
          - BH
      post_commit_only:
        description: "Run post-commit-only (exclude @pytest.mark.skip_post_commit)"
        required: false
        type: boolean
        default: true
      timeout:
        required: false
        type: number
        default: 45
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      enable-watcher:
        description: 'Enable watcher'
        default: false
        type: boolean

jobs:
  profiler-regression:
    strategy:
      # Do not fail-fast because we need to ensure all tests go to completion
      # so we try not to get hanging machines
      fail-fast: false
      matrix:
        test-group: [
          {name: profiler-sync-midrun, group: sync_midrun},
          {name: profiler-basic, group: basic},
          {name: profiler-trace, group: trace},
          {name: profiler-dispatch, group: dispatch},
          {name: profiler-events, group: events},
          {name: profiler-noc-events, group: noc_events},
          {name: profiler-fabric, group: fabric},
          {name: profiler-advanced, group: advanced},
        ]
    name: ${{ matrix.test-group.name }}
    runs-on: >-
      ${{
        format('tt-ubuntu-2204-{0}-viommu-stable', inputs.runner-label)
      }}
    container:
      image: ${{ (inputs.docker-image && format('harbor.ci.tenstorrent.net/{0}', inputs.docker-image)) || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        ARCH_NAME: ${{ inputs.arch }}
        LOGURU_LEVEL: INFO
        PROFILER_SCRIPTS_ROOT: /work/tools/tracy
        PROFILER_TEST_SCRIPTS_ROOT: /work/tests/tt_metal/tools/profiler
        PROFILER_ARTIFACTS_DIR: /work/generated/profiler
        PROFILER_OUTPUT_DIR: /work/generated/profiler/reports
        DONT_USE_VIRTUAL_ENVIRONMENT: 1
        GITHUB_ACTIONS: true
        # TODO: Revisit the addition of this env var https://github.com/tenstorrent/tt-metal/issues/20161
        TRACY_NO_INVARIANT_CHECK: 1
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: "--device /dev/tenstorrent -e TT_GH_CI_INFRA"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher }}
          enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts }}
          auto-triage: ${{ !inputs.enable-watcher }}
      - name: Run ${{ matrix.test-group.name }} tests
        timeout-minutes: ${{ inputs.timeout }}
        run: |
          if [[ "${{ inputs.post_commit_only }}" == "true" ]]; then
            ./tests/scripts/run_profiler_regressions.sh --post-commit --group ${{ matrix.test-group.group }}
          else
            ./tests/scripts/run_profiler_regressions.sh --full --group ${{ matrix.test-group.group }}
          fi
      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
          owner: U06CXU895AP # Michael Chiou
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
