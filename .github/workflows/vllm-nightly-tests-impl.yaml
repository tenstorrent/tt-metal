name: "[internal] vLLM nightly tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      vllm-commit:
        description: "vLLM branch or sha"
        required: false
        default: dev
        type: string
      model:
        description: "Model to test (or 'all' for all models)"
        required: false
        type: string
        default: "all"
      prebuilt-run-id:
        description: "Run ID to reuse build/wheel artifacts from (empty = current run)"
        required: false
        type: string
        default: ""

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate test matrix
        id: generate
        run: |
          # Owner mapping:
          # Pavle Petrovic (U08E1JCDVNX), Salar Hosseini Khorasgani (U08CEGF78ET) - Llama models
          # Djordje Ivanovic (U053W15B6JF) - Qwen3-32B models
          # Gongyu Wang (U07RY6B5FLJ) - Qwen 2.5 VL models
          # Sarva Sanjay (U08H31YMN4Q) - Qwen 3 VL models
          # Ambrose Ling (U08GELBB1AP) - BH tests
          # Tomasz Cheda (U091SNDA4TS) - Structured output tests
          # Radoica Draskic (U08BH66EXAL) - DP tests
          # Harry Andrews (U08TJ70UFRT), Stuti Raizada (U06F3ER8X9A) - GPT-OSS

          # TEMPORARY: Shield runner matrix for ai-summary iteration (branch ppetrovic/ai-summary-runner).
          # All legs target pp-shield-testing (single n150). Revert before merging.
          all_tests='[
            {
              "name": "[N150] Llama-3.1-8B-Instruct",
              "model": "meta-llama/Llama-3.1-8B-Instruct",
              "server-timeout": 10,
              "benchmark-timeout": 5,
              "runner-label": "pp-shield-testing",
              "mesh-device": "N150",
              "tt-llama-text-ver": "tt_transformers",
              "additional-server-args": "--max_num_seqs 32 --max-model-len 32768 --async-scheduling",
              "multimodal": false
            },
            {
              "name": "[N150] Gemma-3-4B-it",
              "model": "google/gemma-3-4b-it",
              "server-timeout": 10,
              "benchmark-timeout": 5,
              "runner-label": "pp-shield-testing",
              "mesh-device": "N150",
              "tt-llama-text-ver": "tt_transformers",
              "override-tt-config": "{\"l1_small_size\": 4096, \"fabric_config\": \"FABRIC_1D\"}",
              "additional-server-args": "--max_num_seqs 32 --max-model-len 32768 --async-scheduling",
              "multimodal": true
            },
            {
              "name": "[N150] Qwen2.5-VL-3B-Instruct",
              "model": "Qwen/Qwen2.5-VL-3B-Instruct",
              "server-timeout": 10,
              "benchmark-timeout": 5,
              "runner-label": "pp-shield-testing",
              "mesh-device": "N150",
              "tt-llama-text-ver": "tt_transformers",
              "additional-server-args": "--max_num_seqs 32 --max-model-len 32768 --async-scheduling",
              "multimodal": true
            }
          ]'

          # Filter matrix based on model selection
          if [ "${{ inputs.model }}" = "all" ]; then
            matrix="$all_tests"
          else
            matrix=$(echo "$all_tests" | jq -c "[.[] | select(.model == \"${{ inputs.model }}\")]")
          fi

          echo "matrix=$(echo "$matrix" | jq -c .)" >> $GITHUB_OUTPUT

  vllm-tests:
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: pp-shield-testing
    container:
      image: ${{ inputs.docker-image }}
      env:
        TT_METAL_HOME: /work
        vllm_dir: /work/vllm
        VLLM_TARGET_DEVICE: "tt"
        PYTHONPATH: /work:/work/vllm
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
        VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1
        HF_HUB_OFFLINE: 0
        HF_HUB_CACHE: /root/ai-summary/hub
        TT_CACHE_HOME: /root/ai-summary/tt_cache
        FILE_SERVER_PID: "./server.pid"
        FILE_SERVER_LOG: "./output/vllm_server.log"
        FILE_BENCHMARK_LOG: "./output/vllm_benchmark.log"
        FILE_BENCHMARK_STRUCTURED_OUTPUT_LOG: "./output/vllm_benchmark_structured_output.log"
        FILE_MULTIMODAL_TEST_LOG: "./output/vllm_multimodal_test.log"
        FILE_SAMPLING_TEST_LOG: "./output/vllm_sampling_tests.log"
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /home/ubuntu/ai-summary:/root/ai-summary
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️ Setup Metal
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          prebuilt-run-id: ${{ inputs.prebuilt-run-id }}

      - name: Ensure BH Eth links online
        if: ${{ contains(matrix.test-group.mesh-device, 'P150') }}
        uses: tenstorrent/tt-metal/.github/actions/ensure-bh-links-online@main
        timeout-minutes: 10
        with:
          runner-label: ${{ matrix.test-group.runner-label }}

      - name: 🔑 Load HF token from runner
        shell: bash
        run: |
          TOKEN_FILE=/root/ai-summary/.hf_token
          if [ -f "$TOKEN_FILE" ]; then
            TOKEN=$(cat "$TOKEN_FILE")
            echo "::add-mask::$TOKEN"
            echo "HF_TOKEN=$TOKEN" >> "$GITHUB_ENV"
            echo "HF token loaded from $TOKEN_FILE"
          else
            echo "::warning::HF token file not found at $TOKEN_FILE — gated model downloads will 401"
          fi

      - name: ⬇️ Checkout vLLM
        uses: actions/checkout@v4
        with:
          repository: tenstorrent/vllm
          path: docker-job/vllm
          ref: ${{ inputs.vllm-commit }}
          fetch-depth: 0

      - name: 📀 Install vLLM
        run: |
          uv pip install vllm/ --extra-index-url https://download.pytorch.org/whl/cpu --index-strategy unsafe-best-match

      - name: 📂 Create output directory
        run: |
          mkdir -p output

      - name: 🚀 Run server
        timeout-minutes: 1
        run: |
          OVERRIDE_TT_CONFIG_RAW='${{ matrix.test-group.override-tt-config }}'
          if [ -n "$OVERRIDE_TT_CONFIG_RAW" ]; then
            OVERRIDE_TT_CONFIG=(--override-tt-config "$OVERRIDE_TT_CONFIG_RAW")
          else
            OVERRIDE_TT_CONFIG=()
          fi

          if [ -n "${{ matrix.test-group.additional-server-args }}" ]; then
            ADDITIONAL_SERVER_ARGS=(${{ matrix.test-group.additional-server-args }})
          else
            ADDITIONAL_SERVER_ARGS=()
          fi

          export MESH_DEVICE="${{ matrix.test-group.mesh-device }}"
          if [ -n "${{ matrix.test-group.tt-llama-text-ver }}" ]; then
            export TT_LLAMA_TEXT_VER="${{ matrix.test-group.tt-llama-text-ver }}"
          fi
          if [ -n "${{ matrix.test-group.tt-qwen3-text-ver }}" ]; then
            export TT_QWEN3_TEXT_VER="${{ matrix.test-group.tt-qwen3-text-ver }}"
          fi

          # Keep TT cache separate from HF hub
          export HF_MODEL="${{ matrix.test-group.model }}"
          MODEL_NAME="${HF_MODEL/\//--}"
          export TT_CACHE_PATH="$TT_CACHE_HOME/$MODEL_NAME"

          # vLLM environment variables
          export VLLM_RPC_TIMEOUT=300000

          if [ -n "${{ matrix.test-group.tt_mm_throttle_perf }}" ]; then
            export TT_MM_THROTTLE_PERF="${{ matrix.test-group.tt_mm_throttle_perf }}"
          fi

          # Build the VLLM server arguments array
          declare -a VLLM_SERVER_ARGS
          VLLM_SERVER_ARGS+=(--model "$HF_MODEL")
          VLLM_SERVER_ARGS+=("${ADDITIONAL_SERVER_ARGS[@]}")
          VLLM_SERVER_ARGS+=("${OVERRIDE_TT_CONFIG[@]}")

          echo "vLLM server args: ${VLLM_SERVER_ARGS[@]}"

          python3 vllm/examples/server_example_tt.py "${VLLM_SERVER_ARGS[@]}" > "${FILE_SERVER_LOG}" 2>&1 &

          # Store server's pid for cleanup
          echo $! > ${FILE_SERVER_PID}

      - name: ⏰ Wait for server to be ready
        run: |
          echo "Waiting for server..."

          timeout_seconds=$(( ${{ matrix.test-group.server-timeout }} * 60 ))
          elapsed=0
          interval=20

          while [ $elapsed -lt $timeout_seconds ]; do
            if curl -sf http://localhost:8000/health; then
              echo "Server is up! 🚀 [$elapsed sec]"
              exit 0
            fi
            sleep $interval
            elapsed=$((elapsed + interval))
          done

          echo "❌ Server did not become ready in time (${timeout_seconds}s)."
          echo "Check out the server log in a step below."
          exit 1

      - name: 📐 Run benchmark
        timeout-minutes: ${{ matrix.test-group.benchmark-timeout }}
        run: |
          if [ -n "${{ matrix.test-group.additional-benchmark-args }}" ]; then
            ADDITIONAL_BENCHMARK_ARGS=(${{ matrix.test-group.additional-benchmark-args }})
          else
            ADDITIONAL_BENCHMARK_ARGS=()
          fi

          vllm bench serve \
            --backend vllm \
            --model ${{ matrix.test-group.model }} \
            --dataset-name random \
            --random-input-len 100 \
            --random-output-len 100 \
            --num-prompts 32 \
            --ignore-eos \
            --percentile-metrics ttft,tpot,itl,e2el \
            --save-result \
            --result-filename output/vllm_result.json \
            "${ADDITIONAL_BENCHMARK_ARGS[@]}" \
            2>&1 | tee ${FILE_BENCHMARK_LOG}

          # If the backend fails, the benchmark will still complete successfully but with all-zero results.
          # It will contain a warning message, though
          warning_message="All requests failed"
          if grep -q "$warning_message" "${FILE_BENCHMARK_LOG}"; then
            echo "❌ All requests failed"
            echo "Check out the server log in a step below."
            exit 1
          fi
      - name: 📐 Run structured output benchmark
        if: ${{ matrix.test-group.structured-output }}
        timeout-minutes: ${{ matrix.test-group.benchmark-timeout }}
        run: |
          if [ -n "${{ matrix.test-group.additional-benchmark-args }}" ]; then
            ADDITIONAL_BENCHMARK_ARGS=(${{ matrix.test-group.additional-benchmark-args }})
          else
            ADDITIONAL_BENCHMARK_ARGS=()
          fi

          if [ -n "${{ matrix.test-group.additional-structured-output-args }}" ]; then
            ADDITIONAL_STRUCTURED_OUTPUT_ARGS=(${{ matrix.test-group.additional-structured-output-args }})
          else
            ADDITIONAL_STRUCTURED_OUTPUT_ARGS=()
          fi

          python3 vllm/benchmarks/benchmark_serving_structured_output.py \
            --backend vllm \
            --model ${{ matrix.test-group.model }} \
            --num-prompts 32 \
            --percentile-metrics ttft,tpot,itl,e2el \
            --dataset json-unique \
            --output-len 1024 \
            --save-result \
            --result-filename output/vllm_result_structured.json \
            "${ADDITIONAL_BENCHMARK_ARGS[@]}" \
            "${ADDITIONAL_STRUCTURED_OUTPUT_ARGS[@]}" \
            2>&1 | tee ${FILE_BENCHMARK_STRUCTURED_OUTPUT_LOG}

          # The benchmark returns zero even if responses are not correct.
          success_message="correct_rate(%) 100.0"
          if grep -q "$success_message" "${FILE_BENCHMARK_STRUCTURED_OUTPUT_LOG}"; then
            echo "✅ Structured output benchmark completed successfully"
          else
            echo "❌ Structured output benchmark failed"
            echo "Check out the server log in a step below."
            exit 1
          fi

      - name: 🖼️ Run multimodal test
        if: ${{ matrix.test-group.multimodal }}
        timeout-minutes: ${{ matrix.test-group.benchmark-timeout }}
        run: |
          curl http://localhost:8000/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "X-User-ID: vllm_test" \
            -d '{
              "model": "${{ matrix.test-group.model }}",
              "messages": [
                {
                  "role": "user",
                  "content": [
                    {
                      "type": "text",
                      "text": "Describe this image in 50 words."
                    },
                    {
                      "type": "image_url",
                      "image_url": {
                        "url": "https://huggingface.co/datasets/huggingface/documentation-images/resolve/main/cats.jpeg"
                      }
                    }
                  ]
                }
              ],
              "max_tokens": 512,
              "temperature": 0.0,
              "top_p": 0.9,
              "top_k": 10,
              "repetition_penalty": 1.0,
              "stream": false,
              "ignore_eos": false
          }' \
          2>&1 | tee ${FILE_MULTIMODAL_TEST_LOG}

          # If the test fails, the response will not contain the expected word
          keyword="cat"
          if ! grep -q -i "$keyword" "${FILE_MULTIMODAL_TEST_LOG}"; then
            echo "❌ The keyword \"$keyword\" not found in the response"
            echo "Check out the server log in a step below."
            exit 1
          fi
      - name: 🧪 Run sampling tests
        if: ${{ matrix.test-group.sampling-tests }}
        timeout-minutes: 10
        run: |
          FILTER="${{ matrix.test-group.sampling-test-filter }}"
          if [ -n "$FILTER" ]; then
            pytest vllm/tests/tt -v -k "$FILTER" --tt-server-url=http://localhost:8000 --tt-model-name=${{ matrix.test-group.model }} 2>&1 | tee "${FILE_SAMPLING_TEST_LOG}"
          else
            pytest vllm/tests/tt -v --tt-server-url=http://localhost:8000 --tt-model-name=${{ matrix.test-group.model }} 2>&1 | tee "${FILE_SAMPLING_TEST_LOG}"
          fi
          # Preserve pytest exit code (tee masks it)
          exit ${PIPESTATUS[0]}

      - name: 🧹 Cleanup server process
        if: always()
        run: |
          if [ -f "${FILE_SERVER_PID}" ]; then
            pid=$(cat "${FILE_SERVER_PID}")
            if kill -0 "$pid" 2>/dev/null; then
              kill "$pid"
              echo "✅ Server process with PID $pid terminated."
              rm -f "${FILE_SERVER_PID}"
            else
              echo "❌ Server process already down!"
              echo "Check out the server log in a step below."
              exit 1
            fi
          else
            echo "❌ PID file not found. Server may not have started correctly."
            exit 1
          fi

      - name: Show server log
        if: always()
        continue-on-error: true
        run: |
          cat "${FILE_SERVER_LOG}"

      - name: Show report
        if: always()
        continue-on-error: true
        run: |
          cat output/vllm_result.json

      - name: Show structured output report
        if: ${{ always() && matrix.test-group.structured-output }}
        continue-on-error: true
        run: |
          cat output/vllm_result_structured.json

      - name: 🤖 AI job summary
        if: always() && !cancelled()
        continue-on-error: true
        uses: ppetrovicTT/tt-github-actions/.github/actions/ai_job_summary@ppetrovic/ai-summary
        with:
          config-path: docker-job/.github/ai-summary/vllm-nightly.yaml
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          job-name: ${{ matrix.test-group.name }}

      - name: Set artifact prefix
        if: ${{ !cancelled() }}
        id: set-artifact-prefix
        run: |
          # Replace spaces with underscores
          SAFE_NAME=$(echo "${{ matrix.test-group.name }}" | tr ' ' '_')
          echo "prefix=vllm_output_${SAFE_NAME}_" >> $GITHUB_OUTPUT

      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          path: docker-job/output/
          prefix: ${{ steps.set-artifact-prefix.outputs.prefix }}

      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()

  ai-run-summary:
    name: "AI Run Summary"
    needs: vllm-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: ai-run-summary
        uses: ppetrovicTT/tt-github-actions/.github/actions/ai_run_summary@ppetrovic/ai-summary
        with:
          config-path: .github/ai-summary/vllm-nightly.yaml
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          jobs-filter: "vllm-tests / "

      - name: Show report
        if: always() && steps.ai-run-summary.outputs.report-file != ''
        continue-on-error: true
        shell: bash
        env:
          REPORT_FILE: ${{ steps.ai-run-summary.outputs.report-file }}
        run: |
          if [ -f "$REPORT_FILE" ]; then
            echo "::group::AI Run Summary"
            cat "$REPORT_FILE"
            echo "::endgroup::"
          else
            echo "::warning::Report file not found: $REPORT_FILE"
          fi
