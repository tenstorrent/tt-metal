name: "All Models Demo Tests"

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Select device to test on'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - n150
          - n300
          - p100
          - p150
          - p300
          - wh-qb
          - bh-qb2
          - wh-6u
          - bh-6u
      regenerate-ttnn-cache:
        description: "Mount model cache volume read-write to regenerate TTNN cache (otherwise read-only)."
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 18 * * 0" # every Sunday at 6pm UTC
  workflow_call:
    inputs:
      device:
        required: false
        type: string
        default: 'all'
      regenerate-ttnn-cache:
        required: false
        type: boolean
        default: false

jobs:
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-wheel: true
      version: 22.04

  # N150 Tests (Wormhole single chip)
  n150-tests:
    if: ${{ inputs.device == 'all' || inputs.device == 'n150' }}
    needs: build-artifact
    secrets: inherit
    uses: ./.github/workflows/all-models-demo-tests-impl.yaml
    with:
      device-type: 'n150'
      runner-label: 'N150'
      arch: 'wormhole_b0'
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      regenerate-ttnn-cache: ${{ inputs.regenerate-ttnn-cache || false }}

  # N300 Tests (Wormhole dual chip)
  n300-tests:
    if: ${{ inputs.device == 'all' || inputs.device == 'n300' }}
    needs: build-artifact
    secrets: inherit
    uses: ./.github/workflows/all-models-demo-tests-impl.yaml
    with:
      device-type: 'n300'
      runner-label: 'N300'
      arch: 'wormhole_b0'
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      regenerate-ttnn-cache: ${{ inputs.regenerate-ttnn-cache || false }}

  # P100 Tests (Blackhole single chip)
  p100-tests:
    if: ${{ inputs.device == 'all' || inputs.device == 'p100' }}
    needs: build-artifact
    secrets: inherit
    uses: ./.github/workflows/all-models-demo-tests-impl.yaml
    with:
      device-type: 'p100'
      runner-label: 'P100'
      arch: 'blackhole'
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      regenerate-ttnn-cache: ${{ inputs.regenerate-ttnn-cache || false }}

  # P150 Tests (Blackhole single chip)
  p150-tests:
    if: ${{ inputs.device == 'all' || inputs.device == 'p150' }}
    needs: build-artifact
    secrets: inherit
    uses: ./.github/workflows/all-models-demo-tests-impl.yaml
    with:
      device-type: 'p150'
      runner-label: 'P150'
      arch: 'blackhole'
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      regenerate-ttnn-cache: ${{ inputs.regenerate-ttnn-cache || false }}

  # P300 Tests (Blackhole dual chip)
  p300-tests:
    if: ${{ inputs.device == 'all' || inputs.device == 'p300' }}
    needs: build-artifact
    secrets: inherit
    uses: ./.github/workflows/all-models-demo-tests-impl.yaml
    with:
      device-type: 'p300'
      runner-label: 'P300-viommu'
      arch: 'blackhole'
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      regenerate-ttnn-cache: ${{ inputs.regenerate-ttnn-cache || false }}
      extra-tag: 'in-service'

  # WH QuietBox Tests (4xN300)
  wh-quietbox-tests:
    if: ${{ inputs.device == 'all' || inputs.device == 'wh-qb' }}
    needs: build-artifact
    secrets: inherit
    uses: ./.github/workflows/all-models-demo-tests-impl.yaml
    with:
      device-type: 'WH-QB'
      runner-label: 'config-t3000'
      arch: 'wormhole_b0'
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      regenerate-ttnn-cache: ${{ inputs.regenerate-ttnn-cache || false }}

  # BH QuietBox Tests (2xP300)
  bh-quietbox-tests:
    if: ${{ inputs.device == 'all' || inputs.device == 'bh-qb2' }}
    needs: build-artifact
    secrets: inherit
    uses: ./.github/workflows/all-models-demo-tests-impl.yaml
    with:
      device-type: 'BH-QB2'
      runner-label: 'BH-QB-GE'
      arch: 'blackhole'
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      regenerate-ttnn-cache: ${{ inputs.regenerate-ttnn-cache || false }}

  # WH Galaxy Tests (Wormhole Galaxy 32 chips)
  wh-galaxy-tests:
    if: ${{ inputs.device == 'all' || inputs.device == 'wh-6u' }}
    needs: build-artifact
    secrets: inherit
    uses: ./.github/workflows/all-models-demo-tests-impl.yaml
    with:
      device-type: 'WH-6U'
      runner-label: 'topology-6u'
      arch: 'wormhole_b0'
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      regenerate-ttnn-cache: ${{ inputs.regenerate-ttnn-cache || false }}
      extra-tag: 'in-service'

  # BH Galaxy Tests (Blackhole Galaxy 32 chips)
  bh-galaxy-tests:
    if: ${{ inputs.device == 'all' || inputs.device == 'bh-6u' }}
    needs: build-artifact
    secrets: inherit
    uses: ./.github/workflows/all-models-demo-tests-impl.yaml
    with:
      device-type: 'BH-6U'
      runner-label: 'topology-6u'
      arch: 'blackhole'
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      regenerate-ttnn-cache: ${{ inputs.regenerate-ttnn-cache || false }}
      extra-tag: 'in-service'
