name: "[internal] Galaxy Quick tests"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      extra-tag:
        required: false
        type: string
        default: "in-service"
      scheduled:
        required: false
        type: boolean
        default: false
      build-type:
        required: false
        type: string
        default: "Release"
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
      enable-lto:
        required: false
        type: boolean
        default: false

jobs:
  quick-dual-glx-health:
    runs-on:
      - ${{ inputs.extra-tag }}
    container:
      image: ${{ inputs.docker-image }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: --device /dev/tenstorrent
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: docker-job

      - name: ⬇️ Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}

      - name: Run health tests
        timeout-minutes: 10
        run: |
          mpirun --allow-run-as-root --host g10glx03,g10glx04 \
            --mca btl_tcp_if_exclude docker0,lo \
            ./build/tools/scaleout/run_cluster_validation \
            --cabling-descriptor-path tools/tests/scaleout/cabling_descriptors/WH_GALAXY_big_mesh_8x8_torus-2d.textproto \
            --hard-fail \
            --send-traffic \
            --num-iterations 1

      - name: Upload test reports
        uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"

      - name: Cleanup
        uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
