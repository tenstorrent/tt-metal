name: "[internal]Galaxy Quick tests"
on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      extra-tag:
        required: false
        type: string
        default: "in-service"
      blackhole:
        required: false
        type: boolean
        default: false
      scheduled:
        required: false
        type: boolean
        default: false
      build-type:
        required: false
        type: string
        default: "Release"
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
      enable-lto:
        required: false
        type: boolean
        default: false

env:
  WORK_DIR: /work
  GITHUB_ACTION_PATH: tenstorrent/tt-metal/.github/actions

jobs:
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type }}
      platform: ${{ inputs.platform }}
      enable-lto: ${{ inputs.enable-lto }}
      build-wheel: true

  quick-dual-glx-health:
    needs: build-artifact
    runs-on:
      - ${{ inputs.extra-tag }}
    container:
      image: ${{ inputs.docker-image }}
      env:
        TT_METAL_HOME: ${{ env.WORK_DIR }}
        PYTHONPATH: ${{ env.WORK_DIR }}
        LD_LIBRARY_PATH: ${{ env.WORK_DIR }}/build/lib
        LOGURU_LEVEL: INFO
      volumes:
        - ${{ github.workspace }}/docker-job:${{ env.WORK_DIR }}
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: --device /dev/tenstorrent
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.WORK_DIR }}
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: docker-job

      - name: ⬇️ Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
          wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}

      - name: Run health tests
        timeout-minutes: 10
        run: |
          mpirun --host g10glx03,g10glx04 \
            --mca btl_tcp_if_exclude docker0,lo \
            ./build/tools/scaleout/run_cluster_validation \
            --cabling-descriptor-path tools/tests/scaleout/cabling_descriptors/WH_GALAXY_big_mesh_8x8_torus-2d.textproto \
            --hard-fail \
            --send-traffic \
            --num-iterations 1

      - name: Upload test reports
        uses: ${{ env.GITHUB_ACTION_PATH }}/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"

      - name: Check for benchmark and latency data
        id: check-data
        if: ${{ !cancelled() && github.ref_name == 'main' }}
        uses: ${{ env.GITHUB_ACTION_PATH }}/check-latency-bw-results@main
        with:
          path: ${{ env.WORK_DIR }}
          arch: blackhole
          check_bw: true
          check_latency: true

      - name: Upload benchmark data
        if: |
          !cancelled() &&
          github.ref_name == 'main' &&
          steps.check-data.outputs.has_benchmark_data == 'true'
        uses: ${{ env.GITHUB_ACTION_PATH }}/upload-data-via-sftp@main
        with:
          ssh-private-key: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
          sftp-batchfile: ${{ env.WORK_DIR }}/.github/actions/upload-data-via-sftp/fabric_bandwidth_benchmark_data_batchfile.txt
          username: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_USERNAME }}
          hostname: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME }}
          path: ${{ env.WORK_DIR }}

      - name: Upload latency data
        if: |
          !cancelled() &&
          github.ref_name == 'main' &&
          steps.check-data.outputs.has_latency_data == 'true'
        uses: ${{ env.GITHUB_ACTION_PATH }}/upload-data-via-sftp@main
        with:
          ssh-private-key: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
          sftp-batchfile: ${{ env.WORK_DIR }}/.github/actions/upload-data-via-sftp/fabric_latency_benchmark_data_batchfile.txt
          username: ${{ secrets.SFTP_FABRIC_LATENCY_WRITER_USERNAME }}
          hostname: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME }}
          path: ${{ env.WORK_DIR }}

      - name: Cleanup
        uses: ${{ env.GITHUB_ACTION_PATH }}/cleanup@main
        if: always()

  multi-host-glx-2x:
    needs: build-artifact
    runs-on:
      - ${{ inputs.extra-tag }}
    env:
      BUILD_DIR: ${{ github.workspace }}/build
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ⬇️ Download Build Artifacts
        uses: actions/download-artifact@v4
        timeout-minutes: 10
        with:
          name: ${{ needs.build-artifact.outputs.build-artifact-name }}

      - name: Extract build files
        run: tar --zstd -xvf ttm_${{ inputs.platform == 'Ubuntu 22.04' && 'ubuntu-22.04' || 'ubuntu-20.04' }}-${{ inputs.build-type == 'Release' && 'release' || 'debug' }}.tar.zst

      - name: ⬇️ Download Wheel
        uses: actions/download-artifact@v4
        timeout-minutes: 10
        with:
          name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}

      - name: Capture runner's home directory
        id: capture-home
        run: echo "home=${HOME}" >> $GITHUB_OUTPUT

      - name: Run multi-host tests
        uses: ./.github/actions/docker-run
        timeout-minutes: 30
        with:
          docker_image: ${{ needs.build-artifact.outputs.dev-docker-image }}
          docker_password: ${{ secrets.GITHUB_TOKEN }}
          docker_opts: |
            -e LD_LIBRARY_PATH=${{ env.BUILD_DIR }}/lib
            -e PYTHONPATH=${{ github.workspace }}
            -e TT_METAL_HOME=${{ github.workspace }}
            -e ARCH_NAME=wormhole_b0
            -e GTEST_OUTPUT="xml:${{ github.workspace }}/generated/test_reports/"
            -v /etc/mpirun:/etc/mpirun:ro
            -v ${{ steps.capture-home.outputs.home }}/.ssh:${{ steps.capture-home.outputs.home }}/.ssh:ro
            --device /dev/tenstorrent
            --pid=host
            --hostname=mpirun-host
          install_wheel: true
          run_args: |
            # Setup shared venv and switch to it (handles multi-host race conditions)
            eval "$(./tests/scripts/multihost/setup_shared_venv.sh --activate)"
            ./tests/scripts/multihost/run_dual_galaxy_tests.sh

      - name: Upload test reports
        uses: ${{ env.GITHUB_ACTION_PATH }}/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_multi_host_"