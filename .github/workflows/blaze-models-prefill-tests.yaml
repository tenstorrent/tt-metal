name: "Blaze Models Prefill tests"

on:
  workflow_dispatch:
    inputs:
      test-type:
        # Authoritative list of valid tokens lives in the test matrix
        # (tests/pipeline_reorg/blaze_models_prefill_tests.yaml) and is enforced
        # by the validate-test-type job below. This text is just UX help.
        description: >-
          Comma-separated stages to run, e.g. "mla,prefill_block,kimi_moe".
          Empty or "all" runs every stage. Valid stages: moe_gate, mla, mla_chunked,
          kv_cache_table, prefill_block, prefill_transformer, kimi_mla, kimi_moe,
          kimi_prefill_block, kimi_chunked, dsa_mla, dsa_mla_glm, glm_moe, glm_prefill_block, prefill_block_determinism,
          prefill_transformer_determinism.
          The "module" group also runs every stage; the "sdpa_perf" group runs the
          ring joint SDPA perf checks.
        required: false
        type: string
        default: "all"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
  schedule:
    - cron: "0 5 * * *" # Run at 5:00 AM UTC every day

jobs:
  validate-test-type:
    # Fail fast on a bad selection before spending a build on it. Emits the
    # normalized selection (empty/"all" -> "all") consumed by the impl filter.
    runs-on: ubuntu-slim
    outputs:
      test-type: ${{ steps.validate.outputs.selection }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/blaze_models_prefill_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Validate test-type selection
        id: validate
        # Pass the user input via env (not direct ${{ }} interpolation) to avoid
        # shell injection from the workflow_dispatch input.
        env:
          TEST_TYPE: ${{ inputs.test-type }}
        run: |
          python3 .github/scripts/utils/validate_test_type_selection.py \
            "${{ env.TESTS_YAML_PATH }}" \
            "${TEST_TYPE}"

  check-harbor:
    needs: validate-test-type
    uses: ./.github/workflows/check-harbor.yaml

  build-artifact:
    needs: [validate-test-type, check-harbor]
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}

  Galaxy-Blaze-models-prefill:
    needs: [validate-test-type, check-harbor, build-artifact]
    # Skip when only the perf checks were requested (they run in the focused job below).
    if: ${{ needs.validate-test-type.outputs.test-type != 'sdpa_perf' }}
    permissions:
      id-token: write
      contents: read
    secrets: inherit
    uses: ./.github/workflows/blaze-models-prefill-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: bh_sc1
      sp-config: sc1
      test-type: ${{ needs.validate-test-type.outputs.test-type }}
      # Keep the perf checks in a focused job so the long functional run remains unchanged.
      exclude-test-group: sdpa_perf
      resource-prefix: module

  Galaxy-Blaze-models-prefill-SDPA-Perf-tests:
    needs: [validate-test-type, check-harbor, build-artifact]
    # Runs for the default "all" and when the sdpa_perf group is selected (alone or with others).
    if: ${{ needs.validate-test-type.outputs.test-type == 'all' || contains(needs.validate-test-type.outputs.test-type, 'sdpa_perf') }}
    permissions:
      id-token: write
      contents: read
    secrets: inherit
    uses: ./.github/workflows/blaze-models-prefill-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: bh_sc1
      sp-config: sc1
      # Select the perf entry by its test_group so adding more perf checks needs no workflow edit.
      test-type: sdpa_perf
      resource-prefix: sdpa-perf

  ai-run-summary:
    name: "AI Run Summary"
    # One run-level summary across both test groups. Each impl invocation
    # uploads its leg matrix as test_matrix_<resource-prefix>; we merge them
    # into expected-jobs so legs that produced no ai_job_summary artifact are
    # reconciled as infra failures rather than silently dropped.
    needs: [Galaxy-Blaze-models-prefill, Galaxy-Blaze-models-prefill-SDPA-Perf-tests]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
      - name: Download per-group matrices
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: test_matrix_*
          path: matrices
          merge-multiple: true
        continue-on-error: true
      - name: Merge matrices into expected-jobs union
        id: merge
        run: |
          if compgen -G "matrices/test_matrix_*.json" > /dev/null; then
            merged=$(jq -cs 'add // []' matrices/test_matrix_*.json)
          else
            merged='[]'
          fi
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$merged" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Aggregate upstream run result
        id: run-result
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          RESULT=$(jq -rn --argjson n "$NEEDS" '
            [$n[].result] as $r |
            if   any($r[]; . == "failure")   then "failure"
            elif any($r[]; . == "cancelled") then "cancelled"
            elif any($r[]; . == "success")   then "success"
            else                                  "skipped"
            end')
          echo "run-result=$RESULT" >> "$GITHUB_OUTPUT"
      - id: ai-run-summary
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/run@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE",
              "input_dir": "ai_job_summaries",
              "output_dir": "ai_run_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          expected-jobs: ${{ steps.merge.outputs.matrix }}
          run-result: ${{ steps.run-result.outputs.run-result }}
      - name: Show report
        if: always() && steps.ai-run-summary.outputs.report-file != ''
        continue-on-error: true
        env:
          REPORT_FILE: ${{ steps.ai-run-summary.outputs.report-file }}
        run: |
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
            cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Report file not found: $REPORT_FILE"
          fi
