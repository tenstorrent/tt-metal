name: LLK State Audit

on:
  pull_request:
    paths:
      - "tt_metal/tt-llk/**"
      - ".github/workflows/llk-state-audit.yaml"
  push:
    branches:
      - main
    paths:
      - "tt_metal/tt-llk/**"
      - ".github/workflows/llk-state-audit.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: llk-state-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify generated state map
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tt_metal/tt-llk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run audit unit tests
        run: python3 -m unittest discover -s tests/python_tests/tools -p 'test_llk_state_*.py'

      - name: Validate reviewed effect model
        run: python3 -m tools.llk_state_audit check --root .

      - name: Reject stale generated artifacts
        run: python3 -m tools.llk_state_audit verify --root .
