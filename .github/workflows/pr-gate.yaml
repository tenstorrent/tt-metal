name: PR Gate
# This pipeline is the minimum bar a PR must pass before it can be merged.
# It is intended to be fast and lightweight to trigger automatically on every
# change in every PR and provide quick feedback without overloading the CI.

# Requirements for all jobs in this workflow:
# - A new job must cancel a previously scheduled/running job.
#   PRs only care about the latest commit and multiple pushes may happen in quick succession.
# - End-to-end (excluding wait times for runners) must be less than 5mins.
#   This includes the cost of checking out the code, preparing a runner, etc.
# - Individual test cases must be less than 1s.

on:
  workflow_dispatch:
  push:
    branches:
      - afuller/tests-shift-left
#  pull_request:
#    types:
#      - opened
#      - reopened
#      - synchronize
#      - ready_for_review
#    branches:
#      - "main"

#concurrency:
#  # Use github.run_id on main branch (or any protected branch)
#  # This ensure that no runs get cancelled on main
#  # Use github.event.pull_request.number on pull requests, so it's unique per pull request
#  # and will cancel obsolete runs
#  # Use github.ref on other branches, so it's unique per branch
#  # Possibly PRs can also just use `github.ref`, but for now just copy/pasting from
#  # https://www.meziantou.net/how-to-cancel-github-workflows-when-pushing-new-commits-on-a-branch.htm
#  # group: ${{ github.workflow }}-${{ github.ref_protected && github.run_id || github.event.pull_request.number || github.ref }}
#  # cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    uses: ./.github/workflows/build-artifact.yaml
    with:
      os: "ubuntu-22.04-amd64"

  metal-tests:
    needs: build
    runs-on:
      - in-service
      - cloud-virtual-machine
      # - BH
    container:
      image: ubuntu:22.04
      env:
        ENV_VAR: foo
      volumes:
        - ${{ github.workspace }}/docker-job:/work # subdir to workaround https://github.com/actions/runner/issues/691
      options: --device /dev/tenstorrent
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: Inspect
        shell: bash
        run: |
          set -x
          pwd
          ls -al
          whoami
          touch foo
          ls -al

      - uses: actions/download-artifact@v4
        with:
          name: TTMetal_build_any
          path: /work/
      - name: Extract files
        run: tar -xvf ttm_any.tar
      - name: Inspect post DL / extract
        run: |
          set -x
          pwd
          ls -al
      - name: Run a test
        run: |
          ./build/test/tt_metal/test_add_two_ints

  check_images:
    runs-on: ubuntu-latest
    env:
      OS: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Compute BUILD_TAG
        id: build_tag
        run: |
          set -x
          BUILD_TAG=$(cat scripts/docker/requirements_dev.txt pyproject.toml | sha1sum | cut -d' ' -f1)
          echo "BUILD_TAG=$BUILD_TAG" >> $GITHUB_ENV

      - name: Compute TEST_TAG
        id: test_tag
        run: |
          TEST_TAG=$(cat tt_metal/python_env/requirements-dev.txt pyproject.toml | sha1sum | cut -d' ' -f1)
          echo "TEST_TAG=$TEST_TAG" >> $GITHUB_ENV

      - name: Query BUILD_IMAGE_EXISTS
        id: build_image_exists
        run: |
          BUILD_IMAGE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" ghcr.io/tenstorrent/tt-metal/tt-metalium/${{ env.OS }}-amd64:${{ env.BUILD_TAG }})
          if [ "$BUILD_IMAGE_EXISTS" == "200" ]; then
            echo "BUILD_IMAGE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "BUILD_IMAGE_EXISTS=false" >> $GITHUB_ENV

      - name: Query TEST_IMAGE_EXISTS
        id: test_image_exists
        run: |
          TEST_IMAGE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" ghcr.io/tenstorrent/tt-metal/tt-metalium/${{ env.OS }}-amd64:${{ env.TEST_TAG }})
          if [ "$TEST_IMAGE_EXISTS" == "200" ]; then
            echo "TEST_IMAGE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "TEST_IMAGE_EXISTS=false" >> $GITHUB_ENV

      - name: Output results
        run: |
          echo "BUILD_IMAGE_EXISTS=${{ env.BUILD_IMAGE_EXISTS }}"
          echo "TEST_IMAGE_EXISTS=${{ env.TEST_IMAGE_EXISTS }}"
