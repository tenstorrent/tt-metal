      # - name: Inspect post DL / extract
      #   run: |
      #     set -x
      #     pwd
      #     ls -al
      - name: Run a test
        env:
          LD_LIBRARY_PATH: /work/build/lib
        run: |
          ./build/test/tt_metal/unit_tests_device
      - name: Cleanup
        if: always()
        run: |
          set -x
          ls -al /__w
          ls -al /__w/tt-metal
          ls -al /__w/tt-metal/tt-metal
