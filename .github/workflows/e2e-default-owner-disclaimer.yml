name: "(test) E2E default-owner disclaimer"

on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: "Slack channel to post to"
        required: true
        default: "C09EC0QNSB0"
        type: string

jobs:
  e2e-disclaimer-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    steps:
      - name: Checkout tt-metal (for workflow context)
        uses: actions/checkout@v4
        with:
          ref: brain-default-owner-flag

      - name: Checkout tt-auto-triage PR branch
        uses: actions/checkout@v4
        with:
          repository: tenstorrent/tt-auto-triage
          ref: fix/job-owner-representative-note
          path: .tt-auto-triage
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 1: Post mock aggregate-workflow-data parent message
      - name: Post mock parent message to Slack
        id: post_parent
        shell: bash
        run: |
          set -euo pipefail
          MOCK_TEXT="*[E2E TEST]* Aggregate Workflow Data run: <https://github.com/tenstorrent/tt-metal/actions/runs/test-e2e-$(date +%s)|this run>
          [Part 1/3]

           Regressions (Pass → Fail):
          (T3K) T3000 perf tests — workflow — run — a04266e
             • t3000-perf-tests / t3k_DiT_SD3.5_model_perf_tests @metal infra team"

          RESPONSE=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg channel "${{ inputs.channel_id }}" --arg text "$MOCK_TEXT" '{channel: $channel, text: $text}')")

          echo "Slack API response:"
          echo "$RESPONSE" | jq .

          OK=$(echo "$RESPONSE" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "::error::Failed to post mock message: $(echo "$RESPONSE" | jq -r '.error')"
            exit 1
          fi

          THREAD_TS=$(echo "$RESPONSE" | jq -r '.ts')
          CHANNEL=$(echo "$RESPONSE" | jq -r '.channel')
          echo "thread_ts=$THREAD_TS" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Posted mock parent message: ts=$THREAD_TS channel=$CHANNEL"

      # Step 2: Create mock triage output + directory structure
      - name: Create mock triage data
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .auto_triage/output .auto_triage/data .auto_triage/auto_triage/data

          cat > .auto_triage/output/slack_message.json << 'PAYLOAD'
          {
            "case": "3",
            "scenario": "Failure likely outside tt-metal",
            "workflow_name": "t3000-perf-tests",
            "failing_job_name": "t3k_DiT_SD3.5_model_perf_tests",
            "failing_test_name": "tests/perf/test_dit_sd35.py",
            "failure_message": "[E2E TEST] Mock failure for default-owner disclaimer verification",
            "failing_run_url": "https://github.com/tenstorrent/tt-metal/actions/runs/test-e2e",
            "failing_run_label": "Run #0 (E2E test)",
            "commits": [],
            "notes": "E2E test: verifying default-owner disclaimer appears when metalinfra is fallback owner.",
            "slack_message": "E2E test payload."
          }
          PAYLOAD

      # Step 3: Run fetch_job_owner.sh (extracts @metal infra team from parent, sets is_default_owner)
      - name: Extract job owner from Slack thread
        shell: bash
        env:
          SLACK_TS: ${{ steps.post_parent.outputs.thread_ts }}
          CHANNEL_ID: ${{ steps.post_parent.outputs.channel }}
          JOB_NAME: "t3k_DiT_SD3.5_model_perf_tests"
          JOB_OWNER_FILE: ".auto_triage/data/job_owner.json"
          SLACK_DATA_DIR: ".auto_triage/auto_triage/data"
          FETCH_JOB_OWNER_DEBUG: "1"
        run: |
          set -euo pipefail
          SCRIPT=".tt-auto-triage/.github/actions/slack-report-auto-triage/scripts/fetch_job_owner.sh"
          chmod +x "$SCRIPT"
          bash "$SCRIPT"
          echo "job_owner.json:"
          cat .auto_triage/data/job_owner.json | jq .

      # Step 4: Run build_slack_payload.sh (renders the Slack message with disclaimer)
      - name: Build Slack payload
        id: build
        shell: bash
        env:
          MESSAGE_PATH: ".auto_triage/output/slack_message.json"
          SLACK_TS: ${{ steps.post_parent.outputs.thread_ts }}
          ALLOW_PINGS: "false"
          JOB_NAME: "t3k_DiT_SD3.5_model_perf_tests"
          WORKFLOW_NAME: "t3000-perf-tests"
          GITHUB_REPOSITORY: "tenstorrent/tt-metal"
          GITHUB_RUN_ID: "${{ github.run_id }}"
          GITHUB_RUN_NUMBER: "${{ github.run_number }}"
        run: |
          set -euo pipefail
          # Copy jq scripts to the right location
          SCRIPTS=".tt-auto-triage/.github/actions/slack-report-auto-triage/scripts"
          chmod +x "$SCRIPTS"/*.sh 2>/dev/null || true

          # build_slack_payload.sh looks for scripts relative to its own directory
          bash "$SCRIPTS/build_slack_payload.sh"

          echo "Slack payload:"
          cat .auto_triage/slack_payload.json | jq .

          # Check if disclaimer is in the payload
          DISCLAIMER="Metalinfra was chosen as the default owner"
          if cat .auto_triage/slack_payload.json | jq -r '.text // ""' | grep -qi "$DISCLAIMER"; then
            echo "::notice::Disclaimer found in payload!"
          else
            echo "::warning::Disclaimer NOT found in payload text"
          fi

      # Step 5: Post the payload to Slack thread
      - name: Post triage reply to Slack thread
        if: steps.build.outputs.has_payload == 'true'
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD_FILE=".auto_triage/slack_payload.json"
          CHANNEL="${{ steps.post_parent.outputs.channel }}"

          # Add channel to payload
          jq --arg ch "$CHANNEL" '. + {channel: $ch}' "$PAYLOAD_FILE" > /tmp/final_payload.json

          echo "Sending to Slack:"
          cat /tmp/final_payload.json | jq .

          RESPONSE=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/final_payload.json)

          echo "Slack send response:"
          echo "$RESPONSE" | jq .

          OK=$(echo "$RESPONSE" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "::error::Failed to post reply: $(echo "$RESPONSE" | jq -r '.error')"
            exit 1
          fi

      # Step 6: Verify the thread
      - name: Verify disclaimer in Slack thread
        shell: bash
        run: |
          set -euo pipefail
          sleep 3

          THREAD_TS="${{ steps.post_parent.outputs.thread_ts }}"
          CHANNEL="${{ steps.post_parent.outputs.channel }}"

          RESPONSE=$(curl -s "https://slack.com/api/conversations.replies?channel=${CHANNEL}&ts=${THREAD_TS}" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN")

          echo "Thread messages:"
          echo "$RESPONSE" | jq -r '.messages[] | "---\n" + (.text // "(no text)")[0:2000]'

          DISCLAIMER="Metalinfra was chosen as the default owner"
          if echo "$RESPONSE" | jq -r '.messages[].text // ""' | grep -qi "$DISCLAIMER"; then
            echo "::notice::SUCCESS: Disclaimer text found in Slack thread!"
            echo "### E2E Test PASSED" >> "$GITHUB_STEP_SUMMARY"
            echo "The default-owner disclaimer appeared in the Slack thread reply." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Thread:** https://tenstorrent.slack.com/archives/${CHANNEL}/p${THREAD_TS//./}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::FAIL: Disclaimer text NOT found in Slack thread"
            echo "### E2E Test FAILED" >> "$GITHUB_STEP_SUMMARY"
            echo "Expected disclaimer not found." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### job_owner.json" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .auto_triage/data/job_owner.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "not found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Slack payload" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .auto_triage/slack_payload.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "not found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
