name: "Build tt-metal docker artifact"

# =============================================================================
# NAMING CONVENTION: Docker Image Tags
# =============================================================================
# This workflow outputs use the "-tag" suffix (e.g., ci-build-tag, dev-tag)
# to indicate these are Docker image tags that were built/verified.
#
# Consuming workflows (like build-artifact.yaml) accept these values via
# inputs with the "-docker-image" suffix (e.g., ci-build-docker-image) to
# indicate these are pre-built Docker images to use.
#
# Example usage:
#   build-docker-images:
#     uses: ./.github/workflows/build-docker-artifact.yaml
#   build:
#     uses: ./.github/workflows/build-artifact.yaml
#     with:
#       ci-build-docker-image: ${{ needs.build-docker-images.outputs.ci-build-tag }}
#
# TOOL IMAGES:
# Third-party tools (ccache, mold, doxygen, etc.) are built once and pushed to
# GHCR to avoid repeatedly hitting upstream endpoints. These tool images are
# versioned by tool version + install script hash, and are pulled by the main
# Dockerfile during builds.
# =============================================================================

# Required to push images to GHCR (organization or user). Without this you may see:
# "denied: installation not allowed to Create organization package"
permissions:
  packages: write

env:
  BAKE_OUTPUT: type=image,push=true,compression=zstd,compression-level=22,force-compression=true,oci-mediatypes=true

on:
  workflow_call:
    inputs:
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
        description: "Platform to build Docker images for"
      architecture:
        required: false
        type: string
        default: "amd64"
      build-manylinux:
        required: false
        type: boolean
        default: true
        description: |
          When true, build the manylinux image. Set to false when build-all-docker-images
          calls this workflow for both platforms (22.04 and 24.04) in parallel—only the
          22.04 run should build manylinux to avoid duplicate work. Standalone callers
          should leave true.
      tool-tags:
        required: false
        type: string
        default: ""
        description: |
          JSON object containing all tool image tags (from build-docker-tools.yaml).
          When provided, skips building tool images and uses these tags instead.
          Tags are converted to bake context overrides for Dockerfile builds.
          Example: needs.build-tools.outputs.tool-tags
      force-rebuild:
        required: false
        type: boolean
        default: false
        description: "Force rebuild of all Docker images even if they exist in registry"
      precomputed-platform-data:
        required: false
        type: string
        default: ""
        description: |
          JSON from preflight (main image tags and existence for this platform). When set, skips tag computation.
    outputs:
      ci-build-tag:
        description: "Docker tag for the CI Build Docker image for building TT-Metalium et al"
        value: ${{ jobs.image-tags.outputs.ci-build-tag }}
      ci-test-tag:
        description: "Docker tag for the CI Test Docker image for testing TT-Metalium et al"
        value: ${{ jobs.image-tags.outputs.ci-test-tag }}
      dev-tag:
        description: "Docker tag for the dev Docker image for developing TT-Metalium et al"
        value: ${{ jobs.image-tags.outputs.dev-tag }}
      basic-dev-tag:
        description: "Docker tag for the basic dev Docker image for basic development"
        value: ${{ jobs.image-tags.outputs.basic-dev-tag }}
      basic-ttnn-runtime-tag:
        description: "Docker tag for the basic TTNN runtime Docker image for running TTNN"
        value: ${{ jobs.image-tags.outputs.basic-ttnn-runtime-tag }}
      manylinux-tag:
        description: "Docker tag for the manylinux Docker image for building TT-Metalium et al"
        value: ${{ jobs.image-tags.outputs.manylinux-tag }}
      tool-tags:
        description: "JSON object containing all tool image tags"
        value: ${{ inputs.tool-tags || jobs.tools.outputs.tool-tags }}
      python-ci-build-venv-tag:
        description: "Docker tag for the Python CI Build venv image"
        value: ${{ jobs.venvs.outputs.ci-build-venv-tag || jobs.image-tags.outputs.ci-build-venv-tag }}
      python-ci-test-venv-tag:
        description: "Docker tag for the Python CI Test venv image"
        value: ${{ jobs.venvs.outputs.ci-test-venv-tag || jobs.image-tags.outputs.ci-test-venv-tag }}
  workflow_dispatch:
    inputs:
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
            - "Ubuntu 22.04"
            - "Ubuntu 24.04"
        description: "Platform to build Docker images for"
      architecture:
        required: false
        type: choice
        default: "amd64"
        options:
            - "amd64"
      build-manylinux:
        required: false
        type: boolean
        default: true
        description: |
          When true, build the manylinux image. Set to false when build-all-docker-images
          calls this workflow for both platforms (22.04 and 24.04) in parallel—only the
          22.04 run should build manylinux to avoid duplicate work. Standalone callers
          should leave true.

jobs:
  # =============================================================================
  # TOOL IMAGES: Build third-party tool images if not provided via input
  # =============================================================================
  tools:
    name: "🔧 Tool images"
    if: inputs.tool-tags == ''
    uses: ./.github/workflows/build-docker-tools.yaml
    secrets: inherit

  # =============================================================================
  # PYTHON VENV IMAGES: Pre-built Python virtual environments (builds missing venvs)
  # =============================================================================
  venvs:
    name: "🐍 Python venvs"
    needs: [image-tags]
    if: |
      needs.image-tags.outputs.dev-exists != 'true' ||
      needs.image-tags.outputs.basic-dev-exists != 'true' ||
      needs.image-tags.outputs.basic-ttnn-runtime-exists != 'true'
    uses: ./.github/workflows/build-docker-python-venvs.yaml
    with:
      platform: ${{ inputs.platform }}
      force-rebuild: ${{ inputs.force-rebuild }}
      precomputed-venv-data: ${{ inputs.precomputed-platform-data }}
    secrets: inherit

  # =============================================================================
  # MAIN DOCKER IMAGES: Compute tags and check existence, or use precomputed data
  # =============================================================================
  image-tags:
    name: "📋 Compute image tags"
    runs-on: ubuntu-latest
    outputs:
      ci-build-exists: ${{ steps.data.outputs.ci-build-exists }}
      ci-build-tag: ${{ steps.data.outputs.ci-build-tag }}
      ci-test-exists: ${{ steps.data.outputs.ci-test-exists }}
      ci-test-tag: ${{ steps.data.outputs.ci-test-tag }}
      dev-exists: ${{ steps.data.outputs.dev-exists }}
      dev-tag: ${{ steps.data.outputs.dev-tag }}
      basic-dev-exists: ${{ steps.data.outputs.basic-dev-exists }}
      basic-dev-tag: ${{ steps.data.outputs.basic-dev-tag }}
      basic-ttnn-runtime-exists: ${{ steps.data.outputs.basic-ttnn-runtime-exists }}
      basic-ttnn-runtime-tag: ${{ steps.data.outputs.basic-ttnn-runtime-tag }}
      manylinux-exists: ${{ steps.data.outputs.manylinux-exists }}
      manylinux-tag: ${{ steps.data.outputs.manylinux-tag }}
      distro: ${{ steps.data.outputs.distro }}
      version: ${{ steps.data.outputs.version }}
      python-version: ${{ steps.data.outputs.python-version }}
      ci-build-venv-tag: ${{ steps.data.outputs.ci-build-venv-tag }}
      ci-test-venv-tag: ${{ steps.data.outputs.ci-test-venv-tag }}
    steps:
      - name: Checkout repo
        if: inputs.precomputed-platform-data == ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse platform
        if: inputs.precomputed-platform-data == ''
        id: platform
        uses: ./.github/actions/parse-platform
        with:
          platform: ${{ inputs.platform }}

      - name: Get platform data
        id: data
        env:
          PRECOMPUTED: ${{ inputs.precomputed-platform-data }}
          FORCE_REBUILD: ${{ inputs.force-rebuild }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.platform.outputs.version }}
        run: |
          set -euo pipefail

          if [ -n "$PRECOMPUTED" ]; then
            echo "Using precomputed platform data"
            DATA="$PRECOMPUTED"
          else
            echo "Computing platform data..."
            ARGS="$VERSION $REPO"
            [ "$FORCE_REBUILD" = "true" ] && ARGS+=" --force-rebuild"
            DATA=$(.github/scripts/compute-platform-data.sh $ARGS)
          fi

          # Extract outputs
          .github/scripts/extract-outputs.sh "$DATA" \
            "ci-build-exists:.ci_build_exists" \
            "ci-build-tag:.ci_build_tag" \
            "ci-test-exists:.ci_test_exists" \
            "ci-test-tag:.ci_test_tag" \
            "dev-exists:.dev_exists" \
            "dev-tag:.dev_tag" \
            "basic-dev-exists:.basic_dev_exists" \
            "basic-dev-tag:.basic_dev_tag" \
            "basic-ttnn-runtime-exists:.basic_ttnn_exists" \
            "basic-ttnn-runtime-tag:.basic_ttnn_tag" \
            "manylinux-exists:.manylinux_exists" \
            "manylinux-tag:.manylinux_tag" \
            "distro:.distro" \
            "version:.version" \
            "python-version:.python_version" \
            "ci-build-venv-tag:.ci_build_venv_tag" \
            "ci-test-venv-tag:.ci_test_venv_tag"

  # Build Ubuntu images (ci-build, ci-test, dev, basic-dev, basic-ttnn-runtime)
  # Uses docker buildx bake CLI with context overrides for pre-built GHCR tool/venv images.
  ubuntu:
    name: "🐳 Ubuntu images"
    needs: [image-tags, tools, venvs]
    # Run if distro is ubuntu AND (main images missing OR basic images missing).
    # When precomputed, venvs is skipped; allow run when venvs skipped or succeeded.
    if: |
      always() && !failure() && !cancelled() &&
      (needs.venvs.result == 'success' || needs.venvs.result == 'skipped') &&
      needs.image-tags.outputs.distro == 'ubuntu' &&
      (needs.image-tags.outputs.dev-exists != 'true' ||
       needs.image-tags.outputs.basic-dev-exists != 'true' ||
       needs.image-tags.outputs.basic-ttnn-runtime-exists != 'true')
    timeout-minutes: 90
    runs-on: tt-ubuntu-2204-large-stable
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare bake overrides
        id: bake
        env:
          TOOL_TAGS: ${{ inputs.tool-tags || needs.tools.outputs.tool-tags }}
          CI_BUILD_VENV_TAG: ${{ needs.venvs.outputs.ci-build-venv-tag || needs.image-tags.outputs.ci-build-venv-tag }}
          CI_TEST_VENV_TAG: ${{ needs.venvs.outputs.ci-test-venv-tag || needs.image-tags.outputs.ci-test-venv-tag }}
        run: |
          set -euo pipefail

          # Validate TOOL_TAGS JSON before processing
          if [ -n "${TOOL_TAGS}" ]; then
            if ! echo "${TOOL_TAGS}" | jq -e . > /dev/null 2>&1; then
              echo "ERROR: TOOL_TAGS is not valid JSON"
              echo "Received: ${TOOL_TAGS}"
              exit 1
            fi
            echo "✓ TOOL_TAGS JSON is valid"
          fi

          TARGETS=""
          SET=""

          # Helper: add context overrides for a target from tool-tags JSON
          add_tool_contexts() {
            local target="$1"
            shift
            for tool in "$@"; do
              local tag
              tag=$(echo "$TOOL_TAGS" | jq -r ".\"${tool}-tag\"")
              SET+="${target}.contexts.${tool}-layer=docker-image://${tag}"$'\n'
            done
          }

          # Helper: add venv context overrides for a target
          add_venv_contexts() {
            local target="$1"
            SET+="${target}.contexts.ci-build-venv-layer=docker-image://${CI_BUILD_VENV_TAG}"$'\n'
            SET+="${target}.contexts.ci-test-venv-layer=docker-image://${CI_TEST_VENV_TAG}"$'\n'
          }

          ALL_TOOLS=(ccache mold doxygen cba gdb cmake yq sfpi openmpi)

          # Main images (ci-build, ci-test, dev) - all 9 tools + 2 venvs
          if [ "${{ needs.image-tags.outputs.dev-exists }}" != "true" ]; then
            for target in ci-build ci-test dev; do
              TARGETS+="${target},"
              add_tool_contexts "$target" "${ALL_TOOLS[@]}"
              add_venv_contexts "$target"
              SET+="${target}.output=${BAKE_OUTPUT}"$'\n'
            done
            SET+="ci-build.tags=${{ needs.image-tags.outputs.ci-build-tag }}"$'\n'
            SET+="ci-test.tags=${{ needs.image-tags.outputs.ci-test-tag }}"$'\n'
            SET+="dev.tags=${{ needs.image-tags.outputs.dev-tag }}"$'\n'
          fi

          # Basic images - cmake, sfpi, openmpi, ccache only
          BASIC_TOOLS=(cmake sfpi openmpi ccache)
          if [ "${{ needs.image-tags.outputs.basic-dev-exists }}" != "true" ]; then
            TARGETS+="basic-dev,"
            add_tool_contexts "basic-dev" "${BASIC_TOOLS[@]}"
            SET+="basic-dev.tags=${{ needs.image-tags.outputs.basic-dev-tag }}"$'\n'
            SET+="basic-dev.output=${BAKE_OUTPUT}"$'\n'
          fi
          if [ "${{ needs.image-tags.outputs.basic-ttnn-runtime-exists }}" != "true" ]; then
            TARGETS+="basic-ttnn-runtime,"
            add_tool_contexts "basic-ttnn-runtime" "${BASIC_TOOLS[@]}"
            SET+="basic-ttnn-runtime.tags=${{ needs.image-tags.outputs.basic-ttnn-runtime-tag }}"$'\n'
            SET+="basic-ttnn-runtime.output=${BAKE_OUTPUT}"$'\n'
          fi

          TARGETS="${TARGETS%,}"

          echo "targets=$TARGETS" >> $GITHUB_OUTPUT
          {
            echo "set<<EOF"
            echo "$SET"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Ubuntu images
        if: steps.bake.outputs.targets != ''
        uses: ./.github/actions/manual-docker-bake
        with:
          targets: ${{ steps.bake.outputs.targets }}
          set-lines: ${{ steps.bake.outputs.set }}
          ubuntu-version: ${{ needs.image-tags.outputs.version }}
          python-version: ${{ needs.image-tags.outputs.python-version }}

  # Build ManyLinux image (runs in parallel with Ubuntu)
  # Uses docker buildx bake CLI with context overrides for pre-built GHCR tool images.
  manylinux:
    name: "🐳 ManyLinux image"
    needs: [image-tags, tools]
    # Run if manylinux needs build AND this run is responsible for manylinux
    # Use always() to run even when tools job is skipped (tool-tags provided via input)
    # When build-manylinux input is false (e.g. second platform in build-all-docker-images), skip
    if: |
      always() && !failure() && !cancelled() &&
      needs.image-tags.outputs.manylinux-exists != 'true' &&
      inputs.build-manylinux != false
    timeout-minutes: 90
    runs-on: tt-ubuntu-2204-large-stable
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare bake overrides
        id: bake
        env:
          TOOL_TAGS: ${{ inputs.tool-tags || needs.tools.outputs.tool-tags }}
        run: |
          set -euo pipefail

          # Validate TOOL_TAGS JSON before processing
          if [ -n "${TOOL_TAGS}" ]; then
            if ! echo "${TOOL_TAGS}" | jq -e . > /dev/null 2>&1; then
              echo "ERROR: TOOL_TAGS is not valid JSON"
              echo "Received: ${TOOL_TAGS}"
              exit 1
            fi
            echo "✓ TOOL_TAGS JSON is valid"
          fi

          SET=""

          for tool in ccache mold sfpi openmpi; do
            tag=$(echo "$TOOL_TAGS" | jq -r ".\"${tool}-tag\"")
            SET+="manylinux.contexts.${tool}-layer=docker-image://${tag}"$'\n'
          done

          SET+="manylinux.tags=${{ needs.image-tags.outputs.manylinux-tag }}"$'\n'
          SET+="manylinux.output=${BAKE_OUTPUT}"$'\n'

          {
            echo "set<<EOF"
            echo "$SET"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push ManyLinux image
        uses: ./.github/actions/manual-docker-bake
        with:
          targets: manylinux
          set-lines: ${{ steps.bake.outputs.set }}

  # tag-latest updates the 'latest' tags for all images after builds complete.
  # It depends on ubuntu and manylinux jobs to ensure images are actually built
  # before tagging. Using always() with failure/cancelled checks ensures this
  # job runs even when build jobs are skipped (images already exist).
  tag-latest:
    name: "🏷️ Update latest tags"
    needs: [image-tags, ubuntu, manylinux]
    if: |
      always() &&
      !failure() &&
      !cancelled() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions/push-latest-image-to-ghcr
          sparse-checkout-cone-mode: false

      # Tag as latest if image existed before or we built it in this run (ubuntu/manylinux succeeded).
      - name: "Push latest CI Build tag"
        if: needs.image-tags.outputs.ci-build-exists == 'true' || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.ci-build-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest CI Test tag"
        if: needs.image-tags.outputs.ci-test-exists == 'true' || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.ci-test-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Dev tag"
        if: needs.image-tags.outputs.dev-exists == 'true' || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.dev-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Basic Dev tag"
        if: needs.image-tags.outputs.basic-dev-exists == 'true' || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.basic-dev-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Basic TTNN Runtime tag"
        if: needs.image-tags.outputs.basic-ttnn-runtime-exists == 'true' || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.basic-ttnn-runtime-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Manylinux tag"
        if: (needs.image-tags.outputs.manylinux-exists == 'true' || needs.manylinux.result == 'success') && inputs.build-manylinux != false
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.manylinux-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
