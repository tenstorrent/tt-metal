name: "Build tt-metal docker artifact"

# =============================================================================
# Builds all Docker images for a platform using precomputed data from preflight.
#
# Expects:
#   - tool-tags: JSON with all tool image tags (from build-docker-tools)
#   - platform-data: JSON with all platform tags, exists flags, version info
#
# Outputs use the "-tag" suffix (e.g., ci-build-tag, dev-tag).
# =============================================================================

permissions:
  packages: write

env:
  BAKE_OUTPUT: type=image,push=true,compression=zstd,compression-level=22,force-compression=true,oci-mediatypes=true

on:
  workflow_call:
    inputs:
      build-manylinux:
        required: false
        type: boolean
        default: true
        description: "Build manylinux image (set false for 24.04 to avoid duplicate work)"
      tool-tags:
        required: true
        type: string
        description: "JSON object containing all tool image tags"
      platform-data:
        required: true
        type: string
        description: "JSON from preflight containing all platform tags and existence flags"
    outputs:
      ci-build-tag:
        value: ${{ fromJson(inputs.platform-data).ci_build_tag }}
      ci-test-tag:
        value: ${{ fromJson(inputs.platform-data).ci_test_tag }}
      dev-tag:
        value: ${{ fromJson(inputs.platform-data).dev_tag }}
      basic-dev-tag:
        value: ${{ fromJson(inputs.platform-data).basic_dev_tag }}
      basic-ttnn-runtime-tag:
        value: ${{ fromJson(inputs.platform-data).basic_ttnn_tag }}
      manylinux-tag:
        value: ${{ fromJson(inputs.platform-data).manylinux_tag }}
      tool-tags:
        value: ${{ inputs.tool-tags }}
      python-ci-build-venv-tag:
        value: ${{ fromJson(inputs.platform-data).ci_build_venv_tag }}
      python-ci-test-venv-tag:
        value: ${{ fromJson(inputs.platform-data).ci_test_venv_tag }}

jobs:
  # Build venv images if needed (required by main images)
  venvs:
    name: "🐍 Python venvs"
    if: |
      fromJson(inputs.platform-data).dev_exists != true ||
      fromJson(inputs.platform-data).basic_dev_exists != true ||
      fromJson(inputs.platform-data).basic_ttnn_exists != true
    uses: ./.github/workflows/build-docker-python-venvs.yaml
    with:
      platform-data: ${{ inputs.platform-data }}
    secrets: inherit

  # Build Ubuntu images (ci-build, ci-test, dev, basic-dev, basic-ttnn-runtime)
  ubuntu:
    name: "🐳 Ubuntu images"
    needs: [venvs]
    if: |
      always() && !failure() && !cancelled() &&
      fromJson(inputs.platform-data).distro == 'ubuntu' &&
      (fromJson(inputs.platform-data).dev_exists != true ||
       fromJson(inputs.platform-data).basic_dev_exists != true ||
       fromJson(inputs.platform-data).basic_ttnn_exists != true)
    timeout-minutes: 90
    runs-on: tt-ubuntu-2204-large-stable
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare bake overrides
        id: bake
        env:
          PLATFORM_DATA: ${{ inputs.platform-data }}
          TOOL_TAGS: ${{ inputs.tool-tags }}
        run: |
          set -euo pipefail

          CI_BUILD_VENV_TAG=$(echo "$PLATFORM_DATA" | jq -r '.ci_build_venv_tag')
          CI_TEST_VENV_TAG=$(echo "$PLATFORM_DATA" | jq -r '.ci_test_venv_tag')
          DEV_EXISTS=$(echo "$PLATFORM_DATA" | jq -r '.dev_exists')
          BASIC_DEV_EXISTS=$(echo "$PLATFORM_DATA" | jq -r '.basic_dev_exists')
          BASIC_TTNN_EXISTS=$(echo "$PLATFORM_DATA" | jq -r '.basic_ttnn_exists')
          CI_BUILD_TAG=$(echo "$PLATFORM_DATA" | jq -r '.ci_build_tag')
          CI_TEST_TAG=$(echo "$PLATFORM_DATA" | jq -r '.ci_test_tag')
          DEV_TAG=$(echo "$PLATFORM_DATA" | jq -r '.dev_tag')
          BASIC_DEV_TAG=$(echo "$PLATFORM_DATA" | jq -r '.basic_dev_tag')
          BASIC_TTNN_TAG=$(echo "$PLATFORM_DATA" | jq -r '.basic_ttnn_tag')

          TARGETS=""
          SET=""

          add_tool_contexts() {
            local target="$1"
            shift
            for tool in "$@"; do
              local tag
              tag=$(echo "$TOOL_TAGS" | jq -r ".\"${tool}-tag\"")
              SET+="${target}.contexts.${tool}-layer=docker-image://${tag}"$'\n'
            done
          }

          add_venv_contexts() {
            local target="$1"
            SET+="${target}.contexts.ci-build-venv-layer=docker-image://${CI_BUILD_VENV_TAG}"$'\n'
            SET+="${target}.contexts.ci-test-venv-layer=docker-image://${CI_TEST_VENV_TAG}"$'\n'
          }

          ALL_TOOLS=(ccache mold doxygen cba gdb cmake yq sfpi openmpi)

          if [ "$DEV_EXISTS" != "true" ]; then
            for target in ci-build ci-test dev; do
              TARGETS+="${target},"
              add_tool_contexts "$target" "${ALL_TOOLS[@]}"
              add_venv_contexts "$target"
              SET+="${target}.output=${BAKE_OUTPUT}"$'\n'
            done
            SET+="ci-build.tags=${CI_BUILD_TAG}"$'\n'
            SET+="ci-test.tags=${CI_TEST_TAG}"$'\n'
            SET+="dev.tags=${DEV_TAG}"$'\n'
          fi

          BASIC_TOOLS=(cmake sfpi openmpi ccache)
          if [ "$BASIC_DEV_EXISTS" != "true" ]; then
            TARGETS+="basic-dev,"
            add_tool_contexts "basic-dev" "${BASIC_TOOLS[@]}"
            SET+="basic-dev.tags=${BASIC_DEV_TAG}"$'\n'
            SET+="basic-dev.output=${BAKE_OUTPUT}"$'\n'
          fi
          if [ "$BASIC_TTNN_EXISTS" != "true" ]; then
            TARGETS+="basic-ttnn-runtime,"
            add_tool_contexts "basic-ttnn-runtime" "${BASIC_TOOLS[@]}"
            SET+="basic-ttnn-runtime.tags=${BASIC_TTNN_TAG}"$'\n'
            SET+="basic-ttnn-runtime.output=${BAKE_OUTPUT}"$'\n'
          fi

          TARGETS="${TARGETS%,}"

          echo "targets=$TARGETS" >> $GITHUB_OUTPUT
          {
            echo "set<<EOF"
            echo "$SET"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Ubuntu images
        if: steps.bake.outputs.targets != ''
        uses: ./.github/actions/manual-docker-bake
        with:
          targets: ${{ steps.bake.outputs.targets }}
          set-lines: ${{ steps.bake.outputs.set }}
          ubuntu-version: ${{ fromJson(inputs.platform-data).version }}
          python-version: ${{ fromJson(inputs.platform-data).python_version }}

  # Build ManyLinux image (runs in parallel with Ubuntu)
  manylinux:
    name: "🐳 ManyLinux image"
    if: |
      inputs.build-manylinux == true &&
      fromJson(inputs.platform-data).manylinux_exists != true
    timeout-minutes: 90
    runs-on: tt-ubuntu-2204-large-stable
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare bake overrides
        id: bake
        env:
          PLATFORM_DATA: ${{ inputs.platform-data }}
          TOOL_TAGS: ${{ inputs.tool-tags }}
        run: |
          set -euo pipefail

          MANYLINUX_TAG=$(echo "$PLATFORM_DATA" | jq -r '.manylinux_tag')

          SET=""
          for tool in ccache mold sfpi openmpi; do
            tag=$(echo "$TOOL_TAGS" | jq -r ".\"${tool}-tag\"")
            SET+="manylinux.contexts.${tool}-layer=docker-image://${tag}"$'\n'
          done

          SET+="manylinux.tags=${MANYLINUX_TAG}"$'\n'
          SET+="manylinux.output=${BAKE_OUTPUT}"$'\n'

          {
            echo "set<<EOF"
            echo "$SET"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push ManyLinux image
        uses: ./.github/actions/manual-docker-bake
        with:
          targets: manylinux
          set-lines: ${{ steps.bake.outputs.set }}

  # Update 'latest' tags on main branch pushes
  tag-latest:
    name: "🏷️ Update latest tags"
    needs: [ubuntu, manylinux]
    if: |
      always() && !failure() && !cancelled() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions/push-latest-image-to-ghcr
          sparse-checkout-cone-mode: false

      - name: "Push latest CI Build tag"
        if: fromJson(inputs.platform-data).ci_build_exists == true || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ fromJson(inputs.platform-data).ci_build_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest CI Test tag"
        if: fromJson(inputs.platform-data).ci_test_exists == true || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ fromJson(inputs.platform-data).ci_test_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Dev tag"
        if: fromJson(inputs.platform-data).dev_exists == true || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ fromJson(inputs.platform-data).dev_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Basic Dev tag"
        if: fromJson(inputs.platform-data).basic_dev_exists == true || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ fromJson(inputs.platform-data).basic_dev_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Basic TTNN Runtime tag"
        if: fromJson(inputs.platform-data).basic_ttnn_exists == true || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ fromJson(inputs.platform-data).basic_ttnn_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Manylinux tag"
        if: |
          inputs.build-manylinux == true &&
          (fromJson(inputs.platform-data).manylinux_exists == true || needs.manylinux.result == 'success')
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ fromJson(inputs.platform-data).manylinux_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
