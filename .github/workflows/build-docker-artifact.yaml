name: "Build tt-metal docker artifact"

# =============================================================================
# Builds all Docker images for a platform using precomputed data from preflight.
#
# Expects:
#   - tool-tags: JSON with all tool image tags (from build-docker-tools)
#   - platform-data: JSON with all platform tags, exists flags, version info
#
# Outputs use the "-tag" suffix (e.g., ci-build-tag, dev-light-tag, dev-tag).
#
# Bake steps use the checked harbor-prefix input for docker-image:// layer contexts;
# runtime pull strings for test jobs use check-harbor + resolve-docker-pull-refs
# (or inline format) in calling workflows.
# =============================================================================

permissions:
  contents: read
  packages: write

env:
  BAKE_OUTPUT: type=image,push=true,compression=zstd,compression-level=22,force-compression=true,oci-mediatypes=true

on:
  workflow_call:
    inputs:
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
        description: "Platform to build Docker images for"
      architecture:
        required: false
        type: string
        default: "amd64"
        description: "Architecture for legacy callers; only amd64 is currently supported"
      ref:
        required: false
        type: string
        default: ""
        description: "Git ref to checkout (defaults to github.sha if not provided)"
      build-manylinux:
        required: false
        type: boolean
        default: true
        description: "Build manylinux image (set false for 24.04 to avoid duplicate work)"
      tool-tags:
        required: false
        type: string
        default: ""
        description: "JSON object containing all tool image tags"
      platform-data:
        required: false
        type: string
        default: ""
        description: "JSON from preflight containing all platform tags and existence flags"
      skip-llk-build:
        required: false
        type: boolean
        default: false
        description: >-
          When true, metadata still computes LLK tag / existence, but the build-llk-images job is skipped
          (caller builds the LLK image separately, e.g. build-all-docker-images).
      harbor-prefix:
        required: false
        type: string
        default: ""
        description: "Checked Harbor pull-through prefix from check-harbor; empty to pull GHCR directly"
    outputs:
      ci-build-light-tag:
        value: ${{ jobs.metadata.outputs.ci_build_light_tag }}
      ci-build-tag:
        value: ${{ jobs.metadata.outputs.ci_build_tag }}
      ci-test-light-tag:
        value: ${{ jobs.metadata.outputs.ci_test_light_tag }}
      ci-test-tag:
        value: ${{ jobs.metadata.outputs.ci_test_tag }}
      dev-light-tag:
        value: ${{ jobs.metadata.outputs.dev_light_tag }}
      dev-tag:
        value: ${{ jobs.metadata.outputs.dev_tag }}
      basic-dev-tag:
        value: ${{ jobs.metadata.outputs.basic_dev_tag }}
      basic-ttnn-runtime-tag:
        value: ${{ jobs.metadata.outputs.basic_ttnn_tag }}
      manylinux-tag:
        value: ${{ jobs.metadata.outputs.manylinux_tag }}
      tool-tags:
        value: ${{ jobs.metadata.outputs.tool_tags }}
      python-ci-build-venv-tag:
        value: ${{ jobs.metadata.outputs.ci_build_venv_tag }}
      python-ci-test-venv-tag:
        value: ${{ jobs.metadata.outputs.ci_test_venv_tag }}
      llk-ci-tag:
        # MIGRATION STAGING: requires tt_llk submodule; simplify when LLK moves in-tree
        description: "Docker tag for the LLK CI Docker image (Ubuntu 22.04); requires tt_llk submodule checkout"
        value: ${{ jobs.metadata.outputs.llk-ci-tag }}
  workflow_dispatch:
    inputs:
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build Docker images for"
      architecture:
        required: false
        type: choice
        default: "amd64"
        options:
          - "amd64"
      harbor-prefix:
        required: false
        type: string
        default: ""
        description: "Harbor prefix to use for prebuilt layer contexts (empty for direct GHCR)"

jobs:
  metadata:
    name: "Artifact metadata"
    runs-on: ubuntu-latest
    outputs:
      platform_data: ${{ steps.metadata.outputs.platform_data }}
      ci_build_light_tag: ${{ steps.metadata.outputs.ci_build_light_tag }}
      ci_build_tag: ${{ steps.metadata.outputs.ci_build_tag }}
      ci_test_light_tag: ${{ steps.metadata.outputs.ci_test_light_tag }}
      ci_test_tag: ${{ steps.metadata.outputs.ci_test_tag }}
      dev_light_tag: ${{ steps.metadata.outputs.dev_light_tag }}
      dev_tag: ${{ steps.metadata.outputs.dev_tag }}
      basic_dev_tag: ${{ steps.metadata.outputs.basic_dev_tag }}
      basic_ttnn_tag: ${{ steps.metadata.outputs.basic_ttnn_tag }}
      manylinux_tag: ${{ steps.metadata.outputs.manylinux_tag }}
      ci_build_venv_tag: ${{ steps.metadata.outputs.ci_build_venv_tag }}
      ci_test_venv_tag: ${{ steps.metadata.outputs.ci_test_venv_tag }}
      tool_tags: ${{ steps.metadata.outputs.tool_tags }}
      tool_data: ${{ steps.metadata.outputs.tool_data }}
      llk-ci-exists: ${{ steps.llk-images.outputs.llk-ci-exists }}
      llk-ci-tag: ${{ steps.llk-images.outputs.llk-ci-tag }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 1
          submodules: recursive

      - name: Extract workflow metadata
        id: metadata
        env:
          INPUT_PLATFORM_DATA: ${{ inputs.platform-data }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_ARCHITECTURE: ${{ inputs.architecture }}
          TOOL_TAGS_INPUT: ${{ inputs.tool-tags }}
          GITHUB_REPOSITORY_VALUE: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "${INPUT_ARCHITECTURE}" != "amd64" ]; then
            echo "::error::build-docker-artifact currently supports only amd64 when computing metadata internally"
            exit 1
          fi

          if [ -n "$INPUT_PLATFORM_DATA" ]; then
            PLATFORM_DATA=$(echo "$INPUT_PLATFORM_DATA" | jq -ce '.')
          else
            case "${INPUT_PLATFORM:-Ubuntu 22.04}" in
              "Ubuntu 24.04")
                VERSION="24.04"
                ;;
              "Ubuntu 22.04"|"")
                VERSION="22.04"
                ;;
              *)
                echo "::error::Unsupported platform '${INPUT_PLATFORM}' for build-docker-artifact"
                exit 1
                ;;
            esac
            PLATFORM_DATA=$(.github/scripts/compute-platform-data.sh "$VERSION" "$GITHUB_REPOSITORY_VALUE")
            PLATFORM_DATA=$(echo "$PLATFORM_DATA" | jq -ce '.')
          fi

          FINAL_IMAGES_MISSING=$(echo "$PLATFORM_DATA" | jq -r '
            [
              .ci_build_light_exists,
              .ci_build_exists,
              .ci_test_light_exists,
              .ci_test_exists,
              .dev_light_exists,
              .dev_exists,
              .basic_dev_exists,
              .basic_ttnn_exists,
              .manylinux_exists
            ] | any(. != "true")
          ')

          if [ -n "$TOOL_TAGS_INPUT" ]; then
            # Tool-tags supplied by caller (e.g. build-all-docker-images already ran
            # compute-tool-data + build-docker-tools) — use as-is, skip existence check.
            TOOL_TAGS=$(echo "$TOOL_TAGS_INPUT" | jq -ce '.')
            echo "tool_data=" >> "$GITHUB_OUTPUT"
          elif [ "$FINAL_IMAGES_MISSING" != "true" ]; then
            # All final images are already present. Only compute canonical tool tags
            # for outputs; avoid per-tool manifest checks on the registry.
            TOOL_TAGS=$(.github/scripts/compute-tool-tags.sh "$GITHUB_REPOSITORY_VALUE" | jq -ce '.')
            TOOL_DATA=$(jq -cn --argjson tool_tags "$TOOL_TAGS" \
              '{tool_tags: $tool_tags, any_missing: "false"}')
            {
              echo "tool_data<<EOJSON"
              echo "$TOOL_DATA"
              echo "EOJSON"
            } >> "$GITHUB_OUTPUT"
          else
            # Standalone call: check which tool images are missing so build-tools can
            # build only what's needed before the bake jobs run.
            TOOL_DATA=$(.github/scripts/compute-tool-data.sh "$GITHUB_REPOSITORY_VALUE")
            TOOL_TAGS=$(echo "$TOOL_DATA" | jq -ce '.tool_tags')
            {
              echo "tool_data<<EOJSON"
              echo "$TOOL_DATA"
              echo "EOJSON"
            } >> "$GITHUB_OUTPUT"
          fi

          echo "platform_data=$PLATFORM_DATA" >> "$GITHUB_OUTPUT"
          echo "ci_build_light_tag=$(echo "$PLATFORM_DATA" | jq -r '.ci_build_light_tag')" >> "$GITHUB_OUTPUT"
          echo "ci_build_tag=$(echo "$PLATFORM_DATA" | jq -r '.ci_build_tag')" >> "$GITHUB_OUTPUT"
          echo "ci_test_light_tag=$(echo "$PLATFORM_DATA" | jq -r '.ci_test_light_tag')" >> "$GITHUB_OUTPUT"
          echo "ci_test_tag=$(echo "$PLATFORM_DATA" | jq -r '.ci_test_tag')" >> "$GITHUB_OUTPUT"
          echo "dev_light_tag=$(echo "$PLATFORM_DATA" | jq -r '.dev_light_tag')" >> "$GITHUB_OUTPUT"
          echo "dev_tag=$(echo "$PLATFORM_DATA" | jq -r '.dev_tag')" >> "$GITHUB_OUTPUT"
          echo "basic_dev_tag=$(echo "$PLATFORM_DATA" | jq -r '.basic_dev_tag')" >> "$GITHUB_OUTPUT"
          echo "basic_ttnn_tag=$(echo "$PLATFORM_DATA" | jq -r '.basic_ttnn_tag')" >> "$GITHUB_OUTPUT"
          echo "manylinux_tag=$(echo "$PLATFORM_DATA" | jq -r '.manylinux_tag')" >> "$GITHUB_OUTPUT"
          echo "ci_build_venv_tag=$(echo "$PLATFORM_DATA" | jq -r '.ci_build_venv_tag')" >> "$GITHUB_OUTPUT"
          echo "ci_test_venv_tag=$(echo "$PLATFORM_DATA" | jq -r '.ci_test_venv_tag')" >> "$GITHUB_OUTPUT"
          echo "tool_tags=$TOOL_TAGS" >> "$GITHUB_OUTPUT"

      - name: Check LLK CI image
        id: llk-images
        run: |
          set -euo pipefail
          LLK="tt_metal/tt-llk"
          if [ ! -d "$LLK" ] || [ ! -f "$LLK/.github/Dockerfile.base" ]; then
            echo "::error::LLK source missing (expected $LLK with .github/Dockerfile.base)." \
              "Ensure the repository is fully checked out."
            exit 1
          fi
          DOCKER_TAG=$(./.github/scripts/llk-get-docker-tag.sh)
          TAG="ghcr.io/${{ github.repository }}/tt-llk-ci-ubuntu-22-04:${DOCKER_TAG}"
          echo "llk-ci-tag=$TAG" >> "$GITHUB_OUTPUT"
          if docker manifest inspect "$TAG" > /dev/null 2>&1; then
            echo "LLK CI image exists: $TAG"
            echo "llk-ci-exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "LLK CI image missing: $TAG"
            echo "llk-ci-exists=false" >> "$GITHUB_OUTPUT"
          fi

  # Build missing tool images before any bake step tries to pull them.
  # Skipped when tool-tags input was provided (caller already ran build-docker-tools)
  # or when all tool images already exist in the registry.
  build-tools:
    name: "🔧 Build tool images"
    needs: [metadata]
    if: ${{ inputs.tool-tags == '' && fromJson(needs.metadata.outputs.tool_data).any_missing == 'true' }}
    uses: ./.github/workflows/build-docker-tools.yaml
    with:
      tool-data: ${{ needs.metadata.outputs.tool_data }}
    secrets: inherit

  # Build venv images only if missing final images require them.
  venvs:
    name: "🐍 Python venvs"
    needs: [metadata]
    if: |
      (fromJson(needs.metadata.outputs.platform_data).ci_build_venv_required == 'true' &&
       fromJson(needs.metadata.outputs.platform_data).ci_build_venv_exists != 'true') ||
      (fromJson(needs.metadata.outputs.platform_data).ci_test_venv_required == 'true' &&
       fromJson(needs.metadata.outputs.platform_data).ci_test_venv_exists != 'true')
    uses: ./.github/workflows/build-docker-python-venvs.yaml
    with:
      platform-data: ${{ needs.metadata.outputs.platform_data }}
    secrets: inherit

  # Build Ubuntu images (ci-build-light, ci-build, ci-test-light, ci-test, dev-light, dev, basic-dev, basic-ttnn-runtime)
  ubuntu:
    name: "🐳 Ubuntu images"
    needs: [metadata, venvs, build-tools]
    if: |
      always() && !failure() && !cancelled() &&
      fromJson(needs.metadata.outputs.platform_data).distro == 'ubuntu' &&
      (fromJson(needs.metadata.outputs.platform_data).ci_build_light_exists != 'true' ||
       fromJson(needs.metadata.outputs.platform_data).ci_build_exists != 'true' ||
       fromJson(needs.metadata.outputs.platform_data).ci_test_light_exists != 'true' ||
       fromJson(needs.metadata.outputs.platform_data).ci_test_exists != 'true' ||
       fromJson(needs.metadata.outputs.platform_data).dev_light_exists != 'true' ||
       fromJson(needs.metadata.outputs.platform_data).dev_exists != 'true' ||
       fromJson(needs.metadata.outputs.platform_data).basic_dev_exists != 'true' ||
       fromJson(needs.metadata.outputs.platform_data).basic_ttnn_exists != 'true')
    timeout-minutes: 90
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          ref: ${{ inputs.ref || github.sha }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate tool tags input
        env:
          TOOL_TAGS: ${{ needs.metadata.outputs.tool_tags }}
        run: |
          set -euo pipefail
          if [ -z "$TOOL_TAGS" ]; then
            echo "::error::tool-tags input is empty"
            exit 1
          fi
          if ! echo "$TOOL_TAGS" | jq -e 'type == "object"' > /dev/null; then
            echo "::error::tool-tags input is empty or invalid JSON"
            exit 1
          fi
          echo "tool-tags input validated successfully"

      - name: Prepare bake overrides
        id: bake
        env:
          PLATFORM_DATA: ${{ needs.metadata.outputs.platform_data }}
          TOOL_TAGS: ${{ needs.metadata.outputs.tool_tags }}
          HARBOR_PREFIX: ${{ inputs.harbor-prefix }}
        run: |
          set -euo pipefail

          CI_BUILD_VENV_TAG=$(echo "$PLATFORM_DATA" | jq -r '.ci_build_venv_tag')
          CI_TEST_VENV_TAG=$(echo "$PLATFORM_DATA" | jq -r '.ci_test_venv_tag')
          CI_BUILD_LIGHT_EXISTS=$(echo "$PLATFORM_DATA" | jq -r '.ci_build_light_exists')
          CI_BUILD_EXISTS=$(echo "$PLATFORM_DATA" | jq -r '.ci_build_exists')
          CI_TEST_LIGHT_EXISTS=$(echo "$PLATFORM_DATA" | jq -r '.ci_test_light_exists')
          CI_TEST_EXISTS=$(echo "$PLATFORM_DATA" | jq -r '.ci_test_exists')
          DEV_LIGHT_EXISTS=$(echo "$PLATFORM_DATA" | jq -r '.dev_light_exists')
          DEV_EXISTS=$(echo "$PLATFORM_DATA" | jq -r '.dev_exists')
          BASIC_DEV_EXISTS=$(echo "$PLATFORM_DATA" | jq -r '.basic_dev_exists')
          BASIC_TTNN_EXISTS=$(echo "$PLATFORM_DATA" | jq -r '.basic_ttnn_exists')
          CI_BUILD_LIGHT_TAG=$(echo "$PLATFORM_DATA" | jq -r '.ci_build_light_tag')
          CI_BUILD_TAG=$(echo "$PLATFORM_DATA" | jq -r '.ci_build_tag')
          CI_TEST_LIGHT_TAG=$(echo "$PLATFORM_DATA" | jq -r '.ci_test_light_tag')
          CI_TEST_TAG=$(echo "$PLATFORM_DATA" | jq -r '.ci_test_tag')
          DEV_LIGHT_TAG=$(echo "$PLATFORM_DATA" | jq -r '.dev_light_tag')
          DEV_TAG=$(echo "$PLATFORM_DATA" | jq -r '.dev_tag')
          BASIC_DEV_TAG=$(echo "$PLATFORM_DATA" | jq -r '.basic_dev_tag')
          BASIC_TTNN_TAG=$(echo "$PLATFORM_DATA" | jq -r '.basic_ttnn_tag')

          TARGETS=""
          SET=""

          # Add tool layer contexts with Harbor prefix for pull-through cache
          add_tool_contexts() {
            local target="$1"
            shift
            for tool in "$@"; do
              local tag
              tag=$(echo "$TOOL_TAGS" | jq -r ".\"${tool}-tag\"")
              SET+="${target}.contexts.${tool}-layer=docker-image://${HARBOR_PREFIX}${tag}"$'\n'
            done
          }

          # Add one venv layer context with Harbor prefix for pull-through cache
          add_venv_context() {
            local target="$1"
            local layer="$2"
            local tag="$3"
            SET+="${target}.contexts.${layer}=docker-image://${HARBOR_PREFIX}${tag}"$'\n'
          }

          ALL_TOOLS=($(.github/scripts/get-target-tools.sh ci-build))

          add_main_target() {
            local target="$1"
            local tag="$2"
            TARGETS+="${target},"
            add_tool_contexts "$target" "${ALL_TOOLS[@]}"
            SET+="${target}.tags=${tag}"$'\n'
            SET+="${target}.output=${BAKE_OUTPUT}"$'\n'
          }

          [ "$CI_BUILD_LIGHT_EXISTS" != "true" ] && add_main_target "ci-build-light" "$CI_BUILD_LIGHT_TAG"
          if [ "$CI_BUILD_EXISTS" != "true" ]; then
            add_main_target "ci-build" "$CI_BUILD_TAG"
            add_venv_context "ci-build" "ci-build-venv-layer" "$CI_BUILD_VENV_TAG"
          fi
          [ "$CI_TEST_LIGHT_EXISTS" != "true" ] && add_main_target "ci-test-light" "$CI_TEST_LIGHT_TAG"
          if [ "$CI_TEST_EXISTS" != "true" ]; then
            add_main_target "ci-test" "$CI_TEST_TAG"
            add_venv_context "ci-test" "ci-test-venv-layer" "$CI_TEST_VENV_TAG"
          fi
          [ "$DEV_LIGHT_EXISTS" != "true" ] && add_main_target "dev-light" "$DEV_LIGHT_TAG"
          if [ "$DEV_EXISTS" != "true" ]; then
            add_main_target "dev" "$DEV_TAG"
            add_venv_context "dev" "ci-test-venv-layer" "$CI_TEST_VENV_TAG"
          fi

          BASIC_TOOLS=($(.github/scripts/get-target-tools.sh basic-dev))
          if [ "$BASIC_DEV_EXISTS" != "true" ]; then
            TARGETS+="basic-dev,"
            add_tool_contexts "basic-dev" "${BASIC_TOOLS[@]}"
            SET+="basic-dev.tags=${BASIC_DEV_TAG}"$'\n'
            SET+="basic-dev.output=${BAKE_OUTPUT}"$'\n'
          fi
          if [ "$BASIC_TTNN_EXISTS" != "true" ]; then
            TARGETS+="basic-ttnn-runtime,"
            add_tool_contexts "basic-ttnn-runtime" "${BASIC_TOOLS[@]}"
            SET+="basic-ttnn-runtime.tags=${BASIC_TTNN_TAG}"$'\n'
            SET+="basic-ttnn-runtime.output=${BAKE_OUTPUT}"$'\n'
          fi

          TARGETS="${TARGETS%,}"

          echo "targets=$TARGETS" >> $GITHUB_OUTPUT
          {
            echo "set<<EOF"
            echo "$SET"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Ubuntu images
        if: steps.bake.outputs.targets != ''
        uses: ./.github/actions/manual-docker-bake
        with:
          targets: ${{ steps.bake.outputs.targets }}
          set-lines: ${{ steps.bake.outputs.set }}
          ubuntu-version: ${{ fromJson(needs.metadata.outputs.platform_data).version }}
          python-version: ${{ fromJson(needs.metadata.outputs.platform_data).python_version }}
          harbor-prefix: ${{ inputs.harbor-prefix }}

  # Build ManyLinux image (runs in parallel with Ubuntu)
  manylinux:
    name: "🐳 ManyLinux image"
    needs: [metadata, build-tools]
    if: |
      always() && !failure() && !cancelled() &&
      inputs.build-manylinux == true &&
      fromJson(needs.metadata.outputs.platform_data).manylinux_exists != 'true'
    timeout-minutes: 90
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          ref: ${{ inputs.ref || github.sha }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate tool tags input
        env:
          TOOL_TAGS: ${{ needs.metadata.outputs.tool_tags }}
        run: |
          set -euo pipefail
          if [ -z "$TOOL_TAGS" ]; then
            echo "::error::tool-tags input is empty"
            exit 1
          fi
          if ! echo "$TOOL_TAGS" | jq -e 'type == "object"' > /dev/null; then
            echo "::error::tool-tags input is empty or invalid JSON"
            exit 1
          fi
          echo "tool-tags input validated successfully"

      - name: Prepare bake overrides
        id: bake
        env:
          PLATFORM_DATA: ${{ needs.metadata.outputs.platform_data }}
          TOOL_TAGS: ${{ needs.metadata.outputs.tool_tags }}
          HARBOR_PREFIX: ${{ inputs.harbor-prefix }}
        run: |
          set -euo pipefail

          MANYLINUX_TAG=$(echo "$PLATFORM_DATA" | jq -r '.manylinux_tag')

          SET=""
          # Add tool layer contexts with Harbor prefix for pull-through cache
          MANYLINUX_TOOLS=($(.github/scripts/get-target-tools.sh manylinux))
          for tool in "${MANYLINUX_TOOLS[@]}"; do
            tag=$(echo "$TOOL_TAGS" | jq -r ".\"${tool}-tag\"")
            SET+="manylinux.contexts.${tool}-layer=docker-image://${HARBOR_PREFIX}${tag}"$'\n'
          done

          SET+="manylinux.tags=${MANYLINUX_TAG}"$'\n'
          SET+="manylinux.output=${BAKE_OUTPUT}"$'\n'

          {
            echo "set<<EOF"
            echo "$SET"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push ManyLinux image
        uses: ./.github/actions/manual-docker-bake
        with:
          targets: manylinux
          set-lines: ${{ steps.bake.outputs.set }}
          harbor-prefix: ${{ inputs.harbor-prefix }}

  build-llk-images:
    name: "🐳️ Build LLK Docker images"
    needs: [metadata]
    if: |
      needs.metadata.outputs.llk-ci-exists != 'true' &&
      inputs.skip-llk-build != true
    timeout-minutes: 90
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          ref: ${{ inputs.ref || github.sha }}
          submodules: recursive
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push LLK images
        shell: bash
        env:
          # Use Google Mirror for Docker Hub (Harbor doesn't proxy docker.io)
          LLK_UBUNTU_BASE_IMAGE: mirror.gcr.io/ubuntu:22.04
        run: .github/scripts/llk-build-docker-images.sh

  # Update 'latest' tags on main branch pushes
  tag-latest:
    name: "🏷️ Update latest tags"
    needs: [metadata, ubuntu, manylinux, build-llk-images]
    if: |
      always() && !failure() && !cancelled() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: .github/actions/push-latest-image-to-ghcr
          sparse-checkout-cone-mode: false

      - name: "Push latest CI Build tag"
        if: fromJson(needs.metadata.outputs.platform_data).ci_build_exists == 'true' || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ fromJson(needs.metadata.outputs.platform_data).ci_build_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest CI Build Light tag"
        if: fromJson(needs.metadata.outputs.platform_data).ci_build_light_exists == 'true' || needs.ubuntu.result == 'success'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ fromJson(needs.metadata.outputs.platform_data).ci_build_light_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

