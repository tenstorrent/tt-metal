name: "Build tt-metal docker artifact"

# =============================================================================
# NAMING CONVENTION: Docker Image Tags
# =============================================================================
# This workflow outputs use the "-tag" suffix (e.g., ci-build-tag, dev-tag)
# to indicate these are Docker image tags that were built/verified.
#
# Consuming workflows (like build-artifact.yaml) accept these values via
# inputs with the "-docker-image" suffix (e.g., ci-build-docker-image) to
# indicate these are pre-built Docker images to use.
#
# Example usage:
#   build-docker-images:
#     uses: ./.github/workflows/build-docker-artifact.yaml
#   build:
#     uses: ./.github/workflows/build-artifact.yaml
#     with:
#       ci-build-docker-image: ${{ needs.build-docker-images.outputs.ci-build-tag }}
#
# TOOL IMAGES:
# Third-party tools (ccache, mold, doxygen, etc.) are built once and pushed to
# GHCR to avoid repeatedly hitting upstream endpoints. These tool images are
# versioned by tool version + install script hash, and are pulled by the main
# Dockerfile during builds.
# =============================================================================

# Required to push images to GHCR (organization or user). Without this you may see:
# "denied: installation not allowed to Create organization package"
permissions:
  packages: write

on:
  workflow_call:
    inputs:
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
        description: "Platform to build Docker images for"
      architecture:
        required: false
        type: string
        default: "amd64"
      build-manylinux:
        required: false
        type: boolean
        default: true
        description: |
          When true, build the manylinux image. Set to false when build-all-docker-images
          calls this workflow for both platforms (22.04 and 24.04) in parallel—only the
          22.04 run should build manylinux to avoid duplicate work. Standalone callers
          should leave true.
      tool-tags:
        required: false
        type: string
        default: ""
        description: |
          JSON object containing all tool image tags (from build-docker-tools.yaml).
          When provided, skips building tool images and uses these tags instead.
          Tags are converted to bake context overrides for Dockerfile builds.
          Example: needs.build-tools.outputs.tool-tags
    outputs:
      ci-build-tag:
        description: "Docker tag for the CI Build Docker image for building TT-Metalium et al"
        value: ${{ jobs.image-tags.outputs.ci-build-tag }}
      ci-test-tag:
        description: "Docker tag for the CI Test Docker image for testing TT-Metalium et al"
        value: ${{ jobs.image-tags.outputs.ci-test-tag }}
      dev-tag:
        description: "Docker tag for the dev Docker image for developing TT-Metalium et al"
        value: ${{ jobs.image-tags.outputs.dev-tag }}
      basic-dev-tag:
        description: "Docker tag for the basic dev Docker image for basic development"
        value: ${{ jobs.image-tags.outputs.basic-dev-tag }}
      basic-ttnn-runtime-tag:
        description: "Docker tag for the basic TTNN runtime Docker image for running TTNN"
        value: ${{ jobs.image-tags.outputs.basic-ttnn-runtime-tag }}
      manylinux-tag:
        description: "Docker tag for the manylinux Docker image for building TT-Metalium et al"
        value: ${{ jobs.image-tags.outputs.manylinux-tag }}
      # Tool image tags as JSON bundle
      tool-tags:
        description: "JSON object containing all tool image tags"
        value: ${{ inputs.tool-tags || jobs.tools.outputs.tool-tags }}
      # Python venv image tags
      python-ci-build-venv-tag:
        description: "Docker tag for the Python CI Build venv image"
        value: ${{ jobs.venvs.outputs.ci-build-venv-tag }}
      python-ci-test-venv-tag:
        description: "Docker tag for the Python CI Test venv image"
        value: ${{ jobs.venvs.outputs.ci-test-venv-tag }}
  workflow_dispatch:
    inputs:
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
            - "Ubuntu 22.04"
            - "Ubuntu 24.04"
        description: "Platform to build Docker images for"
      architecture:
        required: false
        type: choice
        default: "amd64"
        options:
            - "amd64"
      build-manylinux:
        required: false
        type: boolean
        default: true
        description: |
          When true, build the manylinux image. Set to false when build-all-docker-images
          calls this workflow for both platforms (22.04 and 24.04) in parallel—only the
          22.04 run should build manylinux to avoid duplicate work. Standalone callers
          should leave true.

jobs:
  # =============================================================================
  # TOOL IMAGES: Build third-party tool images if not provided via input
  # =============================================================================
  tools:
    name: "🔧 Tool images"
    if: inputs.tool-tags == ''
    uses: ./.github/workflows/build-docker-tools.yaml
    secrets: inherit

  # =============================================================================
  # PYTHON VENV IMAGES: Pre-built Python virtual environments
  # =============================================================================
  venvs:
    name: "🐍 Python venvs"
    uses: ./.github/workflows/build-docker-python-venvs.yaml
    with:
      platform: ${{ inputs.platform }}
    secrets: inherit

  # =============================================================================
  # MAIN DOCKER IMAGES: Compute tags and check existence
  # =============================================================================
  image-tags:
    name: "📋 Compute image tags"
    runs-on: ubuntu-latest
    outputs:
      ci-build-exists: ${{ steps.images.outputs.ci-build-exists }}
      ci-build-tag: ${{ steps.tags.outputs.ci-build-tag }}
      ci-test-exists: ${{ steps.images.outputs.ci-test-exists }}
      ci-test-tag: ${{ steps.tags.outputs.ci-test-tag }}
      dev-exists: ${{ steps.images.outputs.dev-exists }}
      dev-tag: ${{ steps.tags.outputs.dev-tag }}
      basic-dev-exists: ${{ steps.images.outputs.basic-dev-exists }}
      basic-dev-tag: ${{ steps.tags.outputs.basic-dev-tag }}
      basic-ttnn-runtime-exists: ${{ steps.images.outputs.basic-ttnn-runtime-exists }}
      basic-ttnn-runtime-tag: ${{ steps.tags.outputs.basic-ttnn-runtime-tag }}
      manylinux-exists: ${{ steps.images.outputs.manylinux-exists }}
      manylinux-tag: ${{ steps.tags.outputs.manylinux-tag }}
      distro: ${{ steps.platform.outputs.distro }}
      version: ${{ steps.platform.outputs.version }}
      python-version: ${{ steps.python-version.outputs.version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse platform
        id: platform
        uses: ./.github/actions/parse-platform
        with:
          platform: ${{ inputs.platform }}

      - name: Determine Python version
        id: python-version
        run: |
          VERSION="${{ steps.platform.outputs.version }}"
          # Use Python 3.12 for Ubuntu 24.04, Python 3.10 for Ubuntu 22.04
          if [ "$VERSION" = "24.04" ]; then
            PYTHON_VERSION="3.12"
          else
            PYTHON_VERSION="3.10"
          fi
          echo "version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"
          echo "Determined Python version: $PYTHON_VERSION for version=$VERSION"

      - name: Set environment variables
        run: |
          DISTRO="${{ steps.platform.outputs.distro }}"
          VERSION="${{ steps.platform.outputs.version }}"
          ARCH="${{ inputs.architecture || 'amd64' }}"

          echo "CI_BUILD_IMAGE_NAME=${DISTRO}-${VERSION}-ci-build-${ARCH}" >> $GITHUB_ENV
          echo "CI_TEST_IMAGE_NAME=${DISTRO}-${VERSION}-ci-test-${ARCH}" >> $GITHUB_ENV
          echo "DEV_IMAGE_NAME=${DISTRO}-${VERSION}-dev-${ARCH}" >> $GITHUB_ENV
          echo "BASIC_DEV_IMAGE_NAME=${DISTRO}-${VERSION}-basic-dev-${ARCH}" >> $GITHUB_ENV
          echo "BASIC_TTNN_RUNTIME_IMAGE_NAME=${DISTRO}-${VERSION}-basic-ttnn-runtime-${ARCH}" >> $GITHUB_ENV
          echo "MANYLINUX_IMAGE_NAME=manylinux-${ARCH}" >> $GITHUB_ENV

      - name: Compute tags
        id: tags
        run: |
          # Include workflow and Dockerfile.tools. The hash script extracts COPY sources from
          # any Dockerfile passed as extra, so Dockerfile.tools brings in all tool install
          # scripts (install-sfpi.sh, etc.). When a tool is updated, both tool image tag and
          # main image hash change, triggering a rebuild.
          EXTRA_FILES=".github/workflows/build-docker-artifact.yaml dockerfile/Dockerfile.tools"

          HASH=$(.github/scripts/dockerfile-hash.sh dockerfile/Dockerfile $EXTRA_FILES)
          echo "ci-build-tag=ghcr.io/${{ github.repository }}/tt-metalium/${{ env.CI_BUILD_IMAGE_NAME }}:${HASH}" >> $GITHUB_OUTPUT
          echo "ci-test-tag=ghcr.io/${{ github.repository }}/tt-metalium/${{ env.CI_TEST_IMAGE_NAME }}:${HASH}" >> $GITHUB_OUTPUT
          echo "dev-tag=ghcr.io/${{ github.repository }}/tt-metalium/${{ env.DEV_IMAGE_NAME }}:${HASH}" >> $GITHUB_OUTPUT

          # basic-dev uses tool images (cmake, sfpi, openmpi, ccache), so include tool-related files in hash
          BASIC_DEV_EXTRA_FILES="$EXTRA_FILES"
          BASIC_DEV_HASH=$(.github/scripts/dockerfile-hash.sh dockerfile/Dockerfile.basic-dev $BASIC_DEV_EXTRA_FILES)
          echo "basic-dev-tag=ghcr.io/${{ github.repository }}/tt-metalium/${{ env.BASIC_DEV_IMAGE_NAME }}:${BASIC_DEV_HASH}" >> $GITHUB_OUTPUT

          BASIC_TTNN_RUNTIME_HASH=$(.github/scripts/dockerfile-hash.sh dockerfile/Dockerfile.basic-dev $BASIC_DEV_EXTRA_FILES)
          echo "basic-ttnn-runtime-tag=ghcr.io/${{ github.repository }}/tt-metalium/${{ env.BASIC_TTNN_RUNTIME_IMAGE_NAME }}:${BASIC_TTNN_RUNTIME_HASH}" >> $GITHUB_OUTPUT

          # Manylinux image uses tool images (ccache, mold, sfpi, openmpi). EXTRA_FILES
          # already includes all tool install scripts, so manylinux hash updates when any
          # tool changes (e.g. OpenMPI build method change affecting library SONAMEs).
          MANYLINUX_EXTRA_FILES="$EXTRA_FILES"
          MANYLINUX_HASH=$(.github/scripts/dockerfile-hash.sh dockerfile/Dockerfile.manylinux $MANYLINUX_EXTRA_FILES)
          echo "manylinux-tag=ghcr.io/${{ github.repository }}/tt-metalium/${{ env.MANYLINUX_IMAGE_NAME }}:${MANYLINUX_HASH}" >> $GITHUB_OUTPUT

      # Assume if dev-tag exists, the others will exist too
      - name: Query images exist
        id: images
        run: |
          if docker manifest inspect ${{ steps.tags.outputs.dev-tag }} > /dev/null 2>&1; then
            echo "${{ steps.tags.outputs.dev-tag }} exists"
            echo "ci-build-exists=true" >> $GITHUB_OUTPUT
            echo "ci-test-exists=true" >> $GITHUB_OUTPUT
            echo "dev-exists=true" >> $GITHUB_OUTPUT
          else
            echo "${{ steps.tags.outputs.dev-tag }} does not exist"
            echo "ci-build-exists=false" >> $GITHUB_OUTPUT
            echo "ci-test-exists=false" >> $GITHUB_OUTPUT
            echo "dev-exists=false" >> $GITHUB_OUTPUT
          fi

          if docker manifest inspect ${{ steps.tags.outputs.basic-dev-tag }} > /dev/null 2>&1; then
            echo "${{ steps.tags.outputs.basic-dev-tag }} exists"
            echo "basic-dev-exists=true" >> $GITHUB_OUTPUT
          else
            echo "${{ steps.tags.outputs.basic-dev-tag }} does not exist"
            echo "basic-dev-exists=false" >> $GITHUB_OUTPUT
          fi
          if docker manifest inspect ${{ steps.tags.outputs.basic-ttnn-runtime-tag }} > /dev/null 2>&1; then
            echo "${{ steps.tags.outputs.basic-ttnn-runtime-tag }} exists"
            echo "basic-ttnn-runtime-exists=true" >> $GITHUB_OUTPUT
          else
            echo "${{ steps.tags.outputs.basic-ttnn-runtime-tag }} does not exist"
            echo "basic-ttnn-runtime-exists=false" >> $GITHUB_OUTPUT
          fi

          if docker manifest inspect ${{ steps.tags.outputs.manylinux-tag }} > /dev/null 2>&1; then
            echo "${{ steps.tags.outputs.manylinux-tag }} exists"
            echo "manylinux-exists=true" >> $GITHUB_OUTPUT
          else
            echo "${{ steps.tags.outputs.manylinux-tag }} does not exist"
            echo "manylinux-exists=false" >> $GITHUB_OUTPUT
          fi

  # Build Ubuntu images (ci-build, ci-test, dev, basic-dev, basic-ttnn-runtime)
  # Uses docker/bake-action with context overrides for pre-built GHCR tool/venv images.
  ubuntu:
    name: "🐳 Ubuntu images"
    needs: [image-tags, tools, venvs]
    # Run if distro is ubuntu AND (main images missing OR basic images missing)
    # Use always() to run even when tools job is skipped (tool-tags provided via input)
    if: |
      always() && !failure() && !cancelled() &&
      needs.image-tags.outputs.distro == 'ubuntu' &&
      (needs.image-tags.outputs.dev-exists != 'true' ||
       needs.image-tags.outputs.basic-dev-exists != 'true' ||
       needs.image-tags.outputs.basic-ttnn-runtime-exists != 'true')
    timeout-minutes: 90
    runs-on: tt-ubuntu-2204-large-stable
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare bake overrides
        id: bake
        env:
          TOOL_TAGS: ${{ inputs.tool-tags || needs.tools.outputs.tool-tags }}
          CI_BUILD_VENV_TAG: ${{ needs.venvs.outputs.ci-build-venv-tag }}
          CI_TEST_VENV_TAG: ${{ needs.venvs.outputs.ci-test-venv-tag }}
        run: |
          BAKE_OUTPUT="type=image,push=true,compression=zstd,compression-level=3,force-compression=true,oci-mediatypes=true"
          TARGETS=""
          SET=""

          # Helper: add context overrides for a target from tool-tags JSON
          add_tool_contexts() {
            local target="$1"
            shift
            for tool in "$@"; do
              local tag
              tag=$(echo "$TOOL_TAGS" | jq -r ".\"${tool}-tag\"")
              SET+="${target}.contexts.${tool}-layer=docker-image://${tag}"$'\n'
            done
          }

          # Helper: add venv context overrides for a target
          add_venv_contexts() {
            local target="$1"
            SET+="${target}.contexts.ci-build-venv-layer=docker-image://${CI_BUILD_VENV_TAG}"$'\n'
            SET+="${target}.contexts.ci-test-venv-layer=docker-image://${CI_TEST_VENV_TAG}"$'\n'
          }

          ALL_TOOLS=(ccache mold doxygen cba gdb cmake yq sfpi openmpi)

          # Main images (ci-build, ci-test, dev) - all 9 tools + 2 venvs
          if [ "${{ needs.image-tags.outputs.dev-exists }}" != "true" ]; then
            for target in ci-build ci-test dev; do
              TARGETS+="${target},"
              add_tool_contexts "$target" "${ALL_TOOLS[@]}"
              add_venv_contexts "$target"
              SET+="${target}.output=${BAKE_OUTPUT}"$'\n'
            done
            SET+="ci-build.tags=${{ needs.image-tags.outputs.ci-build-tag }}"$'\n'
            SET+="ci-test.tags=${{ needs.image-tags.outputs.ci-test-tag }}"$'\n'
            SET+="dev.tags=${{ needs.image-tags.outputs.dev-tag }}"$'\n'
          fi

          # Basic images - cmake, sfpi, openmpi, ccache only
          BASIC_TOOLS=(cmake sfpi openmpi ccache)
          if [ "${{ needs.image-tags.outputs.basic-dev-exists }}" != "true" ]; then
            TARGETS+="basic-dev,"
            add_tool_contexts "basic-dev" "${BASIC_TOOLS[@]}"
            SET+="basic-dev.tags=${{ needs.image-tags.outputs.basic-dev-tag }}"$'\n'
            SET+="basic-dev.output=${BAKE_OUTPUT}"$'\n'
          fi
          if [ "${{ needs.image-tags.outputs.basic-ttnn-runtime-exists }}" != "true" ]; then
            TARGETS+="basic-ttnn-runtime,"
            add_tool_contexts "basic-ttnn-runtime" "${BASIC_TOOLS[@]}"
            SET+="basic-ttnn-runtime.tags=${{ needs.image-tags.outputs.basic-ttnn-runtime-tag }}"$'\n'
            SET+="basic-ttnn-runtime.output=${BAKE_OUTPUT}"$'\n'
          fi

          TARGETS="${TARGETS%,}"

          echo "targets=$TARGETS" >> $GITHUB_OUTPUT
          {
            echo "set<<EOF"
            echo "$SET"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push images
        if: steps.bake.outputs.targets != ''
        uses: docker/bake-action@v6
        env:
          UBUNTU_VERSION: ${{ needs.image-tags.outputs.version }}
          PYTHON_VERSION: ${{ needs.image-tags.outputs.python-version }}
        with:
          source: .
          files: dockerfile/docker-bake.hcl
          targets: ${{ steps.bake.outputs.targets }}
          set: ${{ steps.bake.outputs.set }}

  # Build ManyLinux image (runs in parallel with Ubuntu)
  # Uses docker/bake-action with context overrides for pre-built GHCR tool images.
  manylinux:
    name: "🐳 ManyLinux image"
    needs: [image-tags, tools]
    # Run if manylinux needs build AND this run is responsible for manylinux
    # Use always() to run even when tools job is skipped (tool-tags provided via input)
    # When build-manylinux input is false (e.g. second platform in build-all-docker-images), skip
    if: |
      always() && !failure() && !cancelled() &&
      needs.image-tags.outputs.manylinux-exists != 'true' &&
      inputs.build-manylinux != false
    timeout-minutes: 90
    runs-on: tt-ubuntu-2204-large-stable
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare bake overrides
        id: bake
        env:
          TOOL_TAGS: ${{ inputs.tool-tags || needs.tools.outputs.tool-tags }}
        run: |
          BAKE_OUTPUT="type=image,push=true,compression=zstd,compression-level=3,force-compression=true,oci-mediatypes=true"
          SET=""

          for tool in ccache mold sfpi openmpi; do
            tag=$(echo "$TOOL_TAGS" | jq -r ".\"${tool}-tag\"")
            SET+="manylinux.contexts.${tool}-layer=docker-image://${tag}"$'\n'
          done

          SET+="manylinux.tags=${{ needs.image-tags.outputs.manylinux-tag }}"$'\n'
          SET+="manylinux.output=${BAKE_OUTPUT}"$'\n'

          {
            echo "set<<EOF"
            echo "$SET"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push ManyLinux image
        uses: docker/bake-action@v6
        with:
          source: .
          files: dockerfile/docker-bake.hcl
          targets: manylinux
          set: ${{ steps.bake.outputs.set }}

  # tag-latest runs after image-tags only (not after build jobs) because adding
  # needs.ubuntu would cause this job to be skipped when builds are skipped
  # (images already exist). The trade-off: on a push to main where images were just built
  # on a branch, tag-latest may run before the build jobs complete, so "latest" could lag
  # one run. This self-corrects on the next merge.
  tag-latest:
    name: "🏷️ Update latest tags"
    needs: image-tags
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions/push-latest-image-to-ghcr
          sparse-checkout-cone-mode: false

      - name: "Push latest CI Build tag"
        if: needs.image-tags.outputs.ci-build-exists == 'true'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.ci-build-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest CI Test tag"
        if: needs.image-tags.outputs.ci-test-exists == 'true'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.ci-test-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Dev tag"
        if: needs.image-tags.outputs.dev-exists == 'true'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.dev-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Basic Dev tag"
        if: needs.image-tags.outputs.basic-dev-exists == 'true'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.basic-dev-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Basic TTNN Runtime tag"
        if: needs.image-tags.outputs.basic-ttnn-runtime-exists == 'true'
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.basic-ttnn-runtime-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push latest Manylinux tag"
        if: needs.image-tags.outputs.manylinux-exists == 'true' && inputs.build-manylinux != false
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.image-tags.outputs.manylinux-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
