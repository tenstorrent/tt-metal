name: Build test and publish upstream tests

on:
  workflow_dispatch:
    inputs:
      request-force-publish:
        default: "passing-only"
        type: string
        description: >-
          Control image publishing: 'passing-only' (default), 'all',
          or JSON array of hw_topology values like ["wh-6u", "bh"]
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
  schedule:
    - cron: '0 12 * * *'

# Consolidated to 2 images; topology is a runtime parameter.
env:
  UPSTREAM_IMAGE_NAME: ghcr.io/tenstorrent/tt-metal/upstream-tests
  UPSTREAM_PROFILER_IMAGE_NAME: ghcr.io/tenstorrent/tt-metal/upstream-profiler-tests

jobs:
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-type: ${{ inputs.build-type || 'Release' }}
      enable-lto: ${{ inputs.enable-lto || false }}
      build-wheel: true
      build-umd-tests: true
      tracy: true
  get-image-tags:
    runs-on: ubuntu-latest
    outputs:
      image-tag-suffix: ${{ steps.set-image-tag-suffix.outputs.image-tag-suffix }}
      upstream-image-tag: ${{ steps.set-image-tags.outputs.upstream-image-tag }}
      upstream-profiler-image-tag: ${{ steps.set-image-tags.outputs.upstream-profiler-image-tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Get tag to use everywhere
        id: set-image-tag-suffix
        run: echo "image-tag-suffix=$(git describe)" >> "$GITHUB_OUTPUT"
      - name: Set image tags
        id: set-image-tags
        run: |
          image_suffix="${{ steps.set-image-tag-suffix.outputs.image-tag-suffix }}"
          echo "upstream-image-tag=${{ env.UPSTREAM_IMAGE_NAME }}:${image_suffix}" >> "$GITHUB_OUTPUT"
          echo "upstream-profiler-image-tag=${{ env.UPSTREAM_PROFILER_IMAGE_NAME }}:${image_suffix}" \
            >> "$GITHUB_OUTPUT"
  build-images:
    needs:
      - build-artifact
      - get-image-tags
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        image-config:
          - image-tag: ${{ needs.get-image-tags.outputs.upstream-image-tag }}
            test-command: dockerfile/upstream_test_images/run_upstream_tests_vanilla.sh
            default-hw-topology: blackhole
            build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
            wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
          - image-tag: ${{ needs.get-image-tags.outputs.upstream-profiler-image-tag }}
            test-command: tests/scripts/single_card/run_bh_upstream_profiler_tests.sh
            default-hw-topology: blackhole
            build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
            wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
    runs-on: tt-ubuntu-2204-large-stable
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts from metal
        id: download-artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0
        with:
          name: ${{ matrix.image-config.build-artifact-name }}
      - run: mkdir -p _tt-metal
      - run: tar --zstd -xvf ttm_any.tar.zst -C _tt-metal/
      - run: ls -hal _tt-metal
      - name: Download Python Wheel
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0
        with:
          name: ${{ matrix.image-config.wheel-artifact-name }}
      - name: Verify Wheel exists
        shell: bash
        run: ls -la *.whl
      - name: Prepare test scripts for build context
        shell: bash
        run: |
          # Copy only the test scripts and model configs needed at runtime
          # instead of cloning the entire repo inside the container
          mkdir -p _test_scripts _test_scripts_extra _model_tests _tests

          # Upstream test runner scripts
          cp dockerfile/upstream_test_images/run_upstream_tests_vanilla.sh _test_scripts/
          mkdir -p _test_scripts_extra/single_card && cp tests/scripts/single_card/run_bh_upstream_profiler_tests.sh _test_scripts_extra/single_card/
          mkdir -p _test_scripts_extra/wh_6u && cp tests/scripts/wh_6u/run_wh_6u_upstream_profiler_tests.sh _test_scripts_extra/wh_6u/

          # Test directories referenced by the test scripts
          cp -r tests/ttnn/ _tests/ttnn/ || true
          cp -r tests/tt_metal/ _tests/tt_metal/ || true
          cp -r tests/tt_eager/ _tests/tt_eager/ || true
          cp -r tests/didt/ _tests/didt/ || true
          cp -r tests/scripts/ _tests/scripts/ || true
          cp -r tests/conftest.py _tests/ || true

          # Model test directories referenced by test suites
          cp -r models/demos/ _model_tests/demos/ || true
          cp -r models/tt_transformers/ _model_tests/tt_transformers/ || true

          # Cabling descriptor configs referenced by cluster validation tests
          mkdir -p _extra_sources/tools/tests/scaleout/cabling_descriptors
          cp -r tools/tests/scaleout/cabling_descriptors/ _extra_sources/tools/tests/scaleout/cabling_descriptors/ || true
          mkdir -p _extra_sources/tt_metal/fabric/cabling_descriptors
          cp -r tt_metal/fabric/cabling_descriptors/ _extra_sources/tt_metal/fabric/cabling_descriptors/ || true
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Dockerfile
        shell: bash
        run: |
          sudo apt update
          sudo apt install -y gettext
          export TEST_COMMAND=${{ matrix.image-config.test-command }}
          export HW_TOPOLOGY=${{ matrix.image-config.default-hw-topology }}
          export TT_METAL_RUNTIME_VERSION=latest
          export TT_METAL_COMMIT_SHA=${{ github.sha }}
          envsubst < dockerfile/upstream_test_images/Dockerfile.template \
            > dockerfile/upstream_test_images/Dockerfile-generated
          cat dockerfile/upstream_test_images/Dockerfile-generated
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: dockerfile/upstream_test_images/Dockerfile-generated
          platforms: linux/amd64
          pull: true
          tags: ${{ matrix.image-config.image-tag }}
          context: ${{ github.workspace }}
          outputs: |
            type=registry,push=true,compression=zstd,compression-level=3,force-compression=true,oci-mediatypes=true
  test-wh-6u-image:
    needs:
      - get-image-tags
      - build-images
    runs-on:
      - arch-wormhole_b0
      - topology-6u
      - in-service
      - pipeline-functional
    steps:
      - name: Pull image
        timeout-minutes: 10
        run: docker pull ${{ needs.get-image-tags.outputs.upstream-image-tag }}
      - name: Run image
        timeout-minutes: 45
        env:
          SOURCE_LLAMA_DIR: /mnt/MLPerf/tt_dnn-models/llama/Llama3.3-70B-Instruct
          LLAMA_DIR: /mnt/MLPerf/tt_dnn-models/llama/Llama3.3-70B-Instruct
        run: |
          docker run --network none -v /dev/hugepages-1G:/dev/hugepages-1G \
            --device /dev/tenstorrent -v $SOURCE_LLAMA_DIR:$LLAMA_DIR:ro \
            -e LLAMA_DIR \
            ${{ needs.get-image-tags.outputs.upstream-image-tag }} wh_6u
      - name: Run profiler image
        timeout-minutes: 10
        run: |
          docker run --network none -v /dev/hugepages-1G:/dev/hugepages-1G \
            --device /dev/tenstorrent \
            ${{ needs.get-image-tags.outputs.upstream-profiler-image-tag }} wh_6u
  test-bh-glx-image:
    needs:
      - get-image-tags
      - build-images
    runs-on:
      - arch-blackhole
      - topology-6u
      - in-service
      - pipeline-functional
    steps:
      - name: Pull image
        timeout-minutes: 10
        run: docker pull ${{ needs.get-image-tags.outputs.upstream-image-tag }}
      - name: Run image
        timeout-minutes: 65
        env:
          HF_MODEL: /mnt/MLPerf/tt_dnn-models/meta-llama/Llama-3.1-8B-Instruct
          TT_CACHE_PATH: /mnt/MLPerf/tt_dnn-models/meta-llama/Llama-3.1-8B-Instruct
        run: |
          docker run --network none -v /dev/hugepages-1G:/dev/hugepages-1G \
            --device /dev/tenstorrent -v $HF_MODEL:$HF_MODEL:ro \
            -e HF_MODEL -e TT_CACHE_PATH \
            ${{ needs.get-image-tags.outputs.upstream-image-tag }} blackhole_glx
  test-bh-multicard-image:
    needs:
      - get-image-tags
      - build-images
    strategy:
      fail-fast: false
      matrix:
        bh-config:
          - runner-label: BH-LLMBox
            hw-topology: blackhole_llmbox
            extra-tag: pipeline-perf
          - runner-label: BH-DeskBox
            hw-topology: blackhole_deskbox
            extra-tag: pipeline-functional
          - runner-label: BH-LoudBox
            hw-topology: blackhole_loudbox
            extra-tag: pipeline-functional
          - runner-label: BH-QB-GE
            hw-topology: blackhole_qb_ge
            extra-tag: pipeline-perf
    runs-on:
      - ${{ matrix.bh-config.runner-label }}
      - in-service
      - ${{ matrix.bh-config.extra-tag }}
    steps:
      - name: Run image
        timeout-minutes: 30
        env:
          HF_MODEL: >-
            ${{ matrix.bh-config.extra-tag == 'pipeline-perf'
            && '/localdev/blackhole_demos/huggingface_data'
            || '/mnt/MLPerf/tt_dnn-models' }}/meta-llama/Llama-3.1-8B-Instruct
          TT_CACHE_PATH: >-
            ${{ matrix.bh-config.extra-tag == 'pipeline-perf'
            && '/localdev/blackhole_demos/huggingface_data'
            || '/mnt/MLPerf/tt_dnn-models' }}/meta-llama/Llama-3.1-8B-Instruct
        run: |
          docker run --network none -v /dev/hugepages-1G:/dev/hugepages-1G \
            --device /dev/tenstorrent -v $HF_MODEL:$HF_MODEL:ro \
            -e HF_MODEL -e TT_CACHE_PATH \
            ${{ needs.get-image-tags.outputs.upstream-image-tag }} \
            ${{ matrix.bh-config.hw-topology }}
  test-bh-p300-image:
    needs:
      - get-image-tags
      - build-images
    strategy:
      fail-fast: false
      matrix:
        bh-config:
          - runner-label: P300
    runs-on:
      - ${{ matrix.bh-config.runner-label }}
      - in-service
    steps:
      - name: Download Llama model weights from LFC
        timeout-minutes: 15
        run: |
          mkdir -p /localdev/blackhole_demos/huggingface_data/meta-llama
          base_url="http://yyz2-lfcache564.yyz2.tenstorrent.com/mldata/"
          model_path="model_checkpoints/pytorch/huggingface/meta-llama/Llama-3.1-8B-Instruct/"
          wget -r -nH -x --cut-dirs=5 -np --progress=dot:giga \
            -R "index.html*" \
            -P /localdev/blackhole_demos/huggingface_data/meta-llama \
            "${base_url}${model_path}"
      - name: Run image
        timeout-minutes: 60
        env:
          HF_MODEL: /localdev/blackhole_demos/huggingface_data/meta-llama/Llama-3.1-8B-Instruct
          TT_CACHE_PATH: /localdev/blackhole_demos/huggingface_data/meta-llama/Llama-3.1-8B-Instruct
        run: |
          docker run --network none --device /dev/tenstorrent \
            -v $HF_MODEL:$HF_MODEL:ro -e HF_MODEL -e TT_CACHE_PATH \
            ${{ needs.get-image-tags.outputs.upstream-image-tag }} blackhole_p300
  test-bh-image:
    needs:
      - get-image-tags
      - build-images
    strategy:
      fail-fast: false
      matrix:
        bh-card:
          - P100
          - P150
    runs-on:
      - ${{ matrix.bh-card }}
      - in-service
      - cloud-virtual-machine
      - pipeline-functional
    steps:
      - name: Run image
        timeout-minutes: 40
        env:
          HF_MODEL: >-
            ${{ contains(runner.name, 'gh')
            && '/localdev/blackhole_demos/huggingface_data'
            || '/mnt/MLPerf/tt_dnn-models' }}/meta-llama/Llama-3.1-8B-Instruct
          TT_CACHE_PATH: >-
            ${{ contains(runner.name, 'gh')
            && '/localdev/blackhole_demos/huggingface_data'
            || '/mnt/MLPerf/tt_dnn-models' }}/meta-llama/Llama-3.1-8B-Instruct
        run: |
          docker run -v /dev/hugepages-1G:/dev/hugepages-1G --device /dev/tenstorrent \
            -v $HF_MODEL:$HF_MODEL:ro -e HF_MODEL -e TT_CACHE_PATH \
            ${{ needs.get-image-tags.outputs.upstream-image-tag }} blackhole
      - name: Run profiler image
        timeout-minutes: 10
        run: |
          docker run -v /dev/hugepages-1G:/dev/hugepages-1G --device /dev/tenstorrent \
            ${{ needs.get-image-tags.outputs.upstream-profiler-image-tag }} blackhole
  calculate-to-publish:
    if: ${{ !cancelled() }}
    needs:
      - get-image-tags
      - test-wh-6u-image
      - test-bh-image
      - test-bh-p300-image
      - test-bh-multicard-image
      - test-bh-glx-image
    runs-on: ubuntu-latest
    outputs:
      images-to-push: ${{ steps.calculate-images.outputs.images-to-push }}
    steps:
      - uses: actions/checkout@v4
      - name: Calculate images to publish
        id: calculate-images
        shell: bash
        run: |
          set -euo pipefail

          config_file=".github/workflows/job_configs/upstream-tests.json"
          if [[ ! -f "$config_file" ]]; then
            echo "ERROR: Configuration file $config_file not found" >&2
            exit 1
          fi

          echo "Using configuration from $config_file"

          hw_topologies=($(jq -r '.hw_topologies | keys[]' "$config_file"))

          # With consolidated images, all topologies map to the same 2 images
          upstream_image_tag="${{ needs.get-image-tags.outputs.upstream-image-tag }}"
          upstream_profiler_image_tag="${{ needs.get-image-tags.outputs.upstream-profiler-image-tag }}"

          declare -A test_job_results=(
            ["test-bh-image"]="${{ needs.test-bh-image.result }}"
            ["test-wh-6u-image"]="${{ needs.test-wh-6u-image.result }}"
            ["test-bh-multicard-image"]="${{ needs.test-bh-multicard-image.result }}"
            ["test-bh-p300-image"]="${{ needs.test-bh-p300-image.result }}"
            ["test-bh-glx-image"]="${{ needs.test-bh-glx-image.result }}"
          )

          request_input='${{ inputs.request-force-publish || 'passing-only' }}'
          echo "Processing request: $request_input"

          # Determine if we should publish based on test results
          should_publish=false

          if [[ "$request_input" == "all" ]]; then
            echo "Mode: Publishing all images regardless of test status"
            should_publish=true
          elif [[ "$request_input" == "passing-only" ]]; then
            echo "Mode: Publishing only if all tests pass"
            all_passed=true
            for job_name in "${!test_job_results[@]}"; do
              result="${test_job_results[$job_name]}"
              echo "  $job_name: $result"
              if [[ "$result" != "success" ]]; then
                all_passed=false
              fi
            done
            if [[ "$all_passed" == "true" ]]; then
              should_publish=true
            else
              echo "Some test jobs did not pass; checking individual topology results"
              for hw_topology in "${hw_topologies[@]}"; do
                test_job=$(jq -r ".hw_topologies[\"$hw_topology\"].test_job" "$config_file")
                test_result="${test_job_results[$test_job]}"
                if [[ "$test_result" == "success" ]]; then
                  should_publish=true
                  break
                fi
              done
            fi
          else
            echo "Mode: Force publishing for specific topologies"
            should_publish=true
          fi

          if [[ "$should_publish" == "true" ]]; then
            images_to_push_json=$(jq -c -n \
              --arg vanilla "$upstream_image_tag" \
              --arg profiler "$upstream_profiler_image_tag" \
              '[{"image-tag": $vanilla}, {"image-tag": $profiler}]')
          else
            images_to_push_json="[]"
            echo "No images to push -- all test jobs failed"
          fi

          echo "Final images to push:"
          echo "$images_to_push_json" | jq '.'
          echo "images-to-push=$images_to_push_json" >> "$GITHUB_OUTPUT"
  push-latest:
    if: >-
      ${{
        !cancelled() &&
        needs.calculate-to-publish.result == 'success' &&
        needs.calculate-to-publish.outputs.images-to-push != '[]'
      }}
    needs:
      - calculate-to-publish
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        image-config: ${{ fromJSON(needs.calculate-to-publish.outputs.images-to-push) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ matrix.image-config.image-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
