name: "(triage) Notify assignees via Slack"

# Dispatched by BrAIn as the final step of triage.
# BrAIn passes a message (with GitHub handles) + the list of handles to resolve.
# This workflow converts each GitHub handle to a Slack <@UID> mention and posts
# the final message to the channel. Exists because BrAIn lacks native Slack access.

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Message to post. Use GitHub handles (e.g. bkeith-TT) where you want Slack pings — they'll be substituted."
        required: true
        type: string
      assignees:
        description: "Comma-separated GitHub handles to resolve and substitute into the message"
        required: true
        type: string
      channel:
        description: "Slack channel ID to post into (default: C0B1F8Z7GQM = full-ci-triage)"
        required: false
        default: "C0B1F8Z7GQM"
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve handles and post to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          INPUT_MESSAGE:   ${{ inputs.message }}
          INPUT_ASSIGNEES: ${{ inputs.assignees }}
          INPUT_CHANNEL:   ${{ inputs.channel }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.parse

          SLACK_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          MESSAGE   = os.environ["INPUT_MESSAGE"]
          ASSIGNEES = [a.strip() for a in os.environ["INPUT_ASSIGNEES"].split(",") if a.strip()]
          CHANNEL   = os.environ.get("INPUT_CHANNEL", "C0B1F8Z7GQM")

          # Hardcoded GitHub handle -> Slack UID (team roster)
          GH_TO_SLACK = {
              "tt-rkim":     "U014XCQ9CF8",
              "ttmchiou":    "U085LTYEC00",
              "blozano-tt":  "U07J3K6KS1K",
              "afuller-TT":  "U088NCP32NP",
              "roseli-TT":   "U08DEGUJY3H",
              "ebanerjeeTT": "U08GTDV8MDH",
              "nsextonTT":   "U08TVGQGGAE",
              "arshahTT":    "U0908S3LUMD",
              "jlakisTT":    "U0982FCD80N",
              "jbakerTT":    "U096E1BFQQ0",
          }

          def lookup_by_email(email):
              try:
                  url = "https://slack.com/api/users.lookupByEmail?" + urllib.parse.urlencode({"email": email})
                  req = urllib.request.Request(url, headers={"Authorization": f"Bearer {SLACK_TOKEN}"})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      resp = json.loads(r.read())
                  if resp.get("ok"):
                      return resp["user"]["id"]
              except Exception as e:
                  print(f"  email lookup {email}: {e}")
              return None

          def resolve_uid(handle):
              uid = GH_TO_SLACK.get(handle)
              if uid:
                  return uid
              # Fallback: strip -TT / TT- suffix and try <name>@tenstorrent.com
              clean = handle.lower().replace("-tt", "").replace("tt-", "")
              uid = lookup_by_email(f"{clean}@tenstorrent.com")
              if uid:
                  print(f"  {handle} -> {uid} (via email fallback)")
              return uid

          # Substitute each GitHub handle in the message with <@UID>
          final_message = MESSAGE
          for handle in ASSIGNEES:
              uid = resolve_uid(handle)
              if uid:
                  final_message = final_message.replace(handle, f"<@{uid}>")
                  print(f"  {handle} -> <@{uid}>")
              else:
                  print(f"  {handle} -> no UID found, left as-is")

          # Post to channel
          data = json.dumps({"channel": CHANNEL, "text": final_message}).encode()
          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=data,
              headers={"Authorization": f"Bearer {SLACK_TOKEN}", "Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req, timeout=30) as r:
              resp = json.loads(r.read())

          print(f"Slack: ok={resp.get('ok')} error={resp.get('error')!r}")
          if not resp.get("ok"):
              raise RuntimeError(f"Slack post failed: {resp.get('error')}")
          print("Done.")
          PYEOF
