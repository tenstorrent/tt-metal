name: "(triage) Notify assignees via Slack"

# Dispatched by BrAIn as the final step of triage.
# BrAIn passes a message (with GitHub handles) + the list of handles to resolve.
# This workflow converts each GitHub handle to a Slack <@UID> mention and posts
# the final message to the channel. Exists because BrAIn lacks native Slack access.
#
# Resolution chain (no string manipulation, all exact-match lookups):
#   1. GitHub GraphQL SAML identity → Entra ID email → Slack users.lookupByEmail
#   2. GitHub public profile email   → Slack users.lookupByEmail
#   3. Handle left as-is in message if both fail
#
# Requires:
#   EVAN_PAT       — PAT with read:org scope (for SAML GraphQL query)
#   SLACK_BOT_TOKEN — bot token with users:read.email scope (for lookupByEmail)

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Message to post. Use GitHub handles (e.g. bkeith-TT) where you want Slack pings — they'll be substituted."
        required: true
        type: string
      assignees:
        description: "Comma-separated GitHub handles to resolve and substitute into the message"
        required: true
        type: string
      channel:
        description: "Slack channel ID to post into (default: C0B1F8Z7GQM = full-ci-triage)"
        required: false
        default: "C0B1F8Z7GQM"
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve handles and post to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ORG_READ_TOKEN:  ${{ secrets.EVAN_PAT }}
          INPUT_MESSAGE:   ${{ inputs.message }}
          INPUT_ASSIGNEES: ${{ inputs.assignees }}
          INPUT_CHANNEL:   ${{ inputs.channel }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys, urllib.request, urllib.parse

          SLACK_TOKEN     = os.environ["SLACK_BOT_TOKEN"]
          ORG_READ_TOKEN  = os.environ["ORG_READ_TOKEN"]
          MESSAGE         = os.environ["INPUT_MESSAGE"]
          ASSIGNEES       = [a.strip() for a in os.environ["INPUT_ASSIGNEES"].split(",") if a.strip()]
          CHANNEL         = os.environ.get("INPUT_CHANNEL", "C0B1F8Z7GQM")
          GH_ORG          = "tenstorrent"

          def gh_graphql(query, token):
              data = json.dumps({"query": query}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=data,
                  headers={"Authorization": f"bearer {token}", "Content-Type": "application/json"}
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      result = json.loads(r.read())
                  if "errors" in result:
                      print(f"  [graphql] errors: {result['errors']}", file=sys.stderr)
                      return None
                  return result.get("data")
              except Exception as e:
                  print(f"  [graphql] {e}", file=sys.stderr)
                  return None

          def gh_rest(path, token):
              req = urllib.request.Request(
                  f"https://api.github.com/{path}",
                  headers={"Authorization": f"token {token}", "Accept": "application/vnd.github+json"}
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"  [gh rest] {path}: {e}", file=sys.stderr)
                  return None

          def slack_lookup_by_email(email):
              url = "https://slack.com/api/users.lookupByEmail?" + urllib.parse.urlencode({"email": email})
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {SLACK_TOKEN}"})
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      resp = json.loads(r.read())
                  if resp.get("ok"):
                      return resp["user"]["id"]
                  if resp.get("error") not in ("users_not_found", "missing_scope"):
                      print(f"  [slack] lookupByEmail({email}): {resp.get('error')}", file=sys.stderr)
              except Exception as e:
                  print(f"  [slack] lookupByEmail({email}): {e}", file=sys.stderr)
              return None

          def saml_email(gh_handle):
              """Get corporate email via GitHub org SAML identity (requires read:org)."""
              query = """
              {
                organization(login: "%s") {
                  samlIdentityProvider {
                    externalIdentities(first: 1, login: "%s") {
                      nodes {
                        samlIdentity { nameId }
                      }
                    }
                  }
                }
              }
              """ % (GH_ORG, gh_handle)
              data = gh_graphql(query, ORG_READ_TOKEN)
              if not data:
                  return None
              try:
                  nodes = data["organization"]["samlIdentityProvider"]["externalIdentities"]["nodes"]
                  if nodes:
                      name_id = nodes[0]["samlIdentity"]["nameId"]
                      if name_id and "@" in name_id:
                          return name_id
              except (KeyError, TypeError, IndexError):
                  pass
              return None

          def public_email(gh_handle):
              """Get public email from GitHub user profile (often empty)."""
              user = gh_rest(f"users/{gh_handle}", ORG_READ_TOKEN)
              if user and user.get("email"):
                  return user["email"]
              return None

          def resolve_uid(gh_handle):
              # 1. SAML identity → corporate email → Slack UID
              email = saml_email(gh_handle)
              if email:
                  uid = slack_lookup_by_email(email)
                  if uid:
                      print(f"  {gh_handle} → {uid} (SAML: {email})")
                      return uid

              # 2. GitHub public profile email → Slack UID
              email = public_email(gh_handle)
              if email:
                  uid = slack_lookup_by_email(email)
                  if uid:
                      print(f"  {gh_handle} → {uid} (public email: {email})")
                      return uid

              print(f"  {gh_handle} → unresolved")
              return None

          # Substitute each GitHub handle in the message with <@UID>
          final_message = MESSAGE
          for handle in ASSIGNEES:
              uid = resolve_uid(handle)
              if uid:
                  final_message = final_message.replace(handle, f"<@{uid}>")

          # Post to channel
          data = json.dumps({"channel": CHANNEL, "text": final_message}).encode()
          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=data,
              headers={"Authorization": f"Bearer {SLACK_TOKEN}", "Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req, timeout=30) as r:
              resp = json.loads(r.read())

          print(f"Slack: ok={resp.get('ok')} error={resp.get('error')!r}")
          if not resp.get("ok"):
              raise RuntimeError(f"Slack post failed: {resp.get('error')}")
          print("Done.")
          PYEOF
