name: "(Runtime) Integration Tests"

# Nightly schedule restores coverage previously run via L2 Nightly; staggered to reduce runner contention.
# Manual validation completed before enabling (see PR #40962 discussion).
on:
  schedule:
    - cron: "0 5 * * *" # 05:00 UTC daily
  workflow_dispatch:
    inputs:
      wormhole:
        description: "Run on Wormhole"
        required: false
        type: boolean
        default: true
      blackhole:
        description: "Run on Blackhole"
        required: false
        type: boolean
        default: true
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"

jobs:
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-wheel: true
      enable-lto: ${{ inputs.enable-lto || false }}

  runtime-integration-tests:
    needs: build-artifact
    uses: ./.github/workflows/runtime-integration-tests-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: >-
        ${{
          github.event_name == 'schedule'
            && 'wh_n150_civ2,bh_p150b_civ2,bh_quietbox'
            || format('{0}{1}',
              inputs.wormhole && 'wh_n150_civ2' || '',
              inputs.blackhole && format('{0}bh_p150b_civ2,bh_quietbox',
                inputs.wormhole && ',' || '') || ''
            )
        }}
