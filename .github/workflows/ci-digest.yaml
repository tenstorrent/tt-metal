name: "CI Digest"

on:
  schedule:
    - cron: "0 * * * *"  # top of every hour; each digest's slot is gated by its schedule
  workflow_dispatch:
    inputs:
      force:
        description: "run every team now, ignoring their schedule"
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-digest
  cancel-in-progress: false

jobs:
  digest:
    name: "digest · ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: disaggregated-prefill
            schedule: "0 8 * * *"  # 08:00 UTC daily (minute must be 0)
            slack_channel: "C0B7VTPPMRD"  # SLACK_BOT_TOKEN bot must be a member of this channel
            workflows:  # file names; must be shell-safe (no spaces) — passed unquoted to --workflows
              - blackhole-e2e-tests.yaml
              - t3000-e2e-tests.yaml
              - galaxy-deepseek-prefill-tests.yaml
              - demo-sp-release.yaml
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Generate digest
        id: digest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/ci_digest.py --out-dir out \
            --name "${{ matrix.name }}" \
            --schedule "${{ matrix.schedule }}" \
            --workflows ${{ join(matrix.workflows, ' ') }} ${{ inputs.force && '--force' || '' }}
          shopt -s nullglob
          files=(out/ci-digest-*.md)
          if [ ${#files[@]} -gt 0 ]; then
            { echo; cat "${files[0]}"; } >> "$GITHUB_STEP_SUMMARY"
            echo "produced=true" >> "$GITHUB_OUTPUT"
            jf=(out/ci-digest-*.json)
            ag=$(python3 -c "import json,sys; print(str(json.load(open(sys.argv[1]))['all_green']).lower())" "${jf[0]}")
            echo "all_green=$ag" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload digest
        if: steps.digest.outputs.produced == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-digest-${{ matrix.name }}-${{ github.run_id }}
          path: out/

      - name: Resolve this job's id
        if: steps.digest.outputs.produced == 'true' && matrix.slack_channel != ''
        id: jobid
        uses: tenstorrent/tt-github-actions/.github/actions/job_id@main
        with:
          job_name: "digest · ${{ matrix.name }}"

      # #summary-<job_id> anchors directly to this job's step summary on the
      # run-attempt page; if the anchor ever drifts it still opens the page.
      - name: Notify Slack
        if: steps.digest.outputs.produced == 'true' && matrix.slack_channel != ''
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true  # fail the step on a Slack API error (default false swallows it)
          payload: |
            channel: "${{ matrix.slack_channel }}"
            text: "🗞️ ${{ matrix.name }} digest: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}#summary-${{ steps.jobid.outputs.job_id }}|open summary> ${{ steps.digest.outputs.all_green == 'true' && ':git-approved:' || ':git-check-failed:' }}"
