name: 🚀 LLK Run Performance Tests

on:
  workflow_dispatch:
    inputs:
      artifact_prefix:
        description: "Prefix for artifact names"
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      artifact_prefix:
        description: "Prefix for artifact names to avoid conflicts when multiple workflows run in the same workflow run"
        required: false
        default: ""
        type: string

permissions:
  checks: write
  contents: read
  packages: write

env:
  LLK_PATH: tt_metal/third_party/tt_llk

# NOTE: Concurrency disabled for testing to prevent cancellation conflicts
# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref_protected && github.run_id || github.ref }}
#   cancel-in-progress: true

jobs:
  build-images:
    name: "🐳️ Docker setup"
    uses: ./.github/workflows/build-docker-artifact.yaml
    secrets: inherit

  setup-and-test-wormhole:
    name: "🌀 Performance tests (Wormhole)"
    uses: ./.github/workflows/llk-setup-and-test.yaml
    needs: build-images
    with:
      docker_image: ${{ needs.build-images.outputs.llk-ci-tag }}
      runs_on: tt-ubuntu-2204-n150-stable
      test_splits: 5
      pytest_markers: "perf"
      timeout_minutes: 240
      use_durations: true
      artifact_prefix: ${{ inputs.artifact_prefix }}

  setup-and-test-blackhole:
    name: "🕳️ Performance tests (Blackhole)"
    uses: ./.github/workflows/llk-setup-and-test.yaml
    needs: build-images
    with:
      docker_image: ${{ needs.build-images.outputs.llk-ci-tag }}
      runs_on: tt-ubuntu-2204-p150b-stable
      test_splits: 5
      pytest_markers: "perf"
      timeout_minutes: 240
      use_durations: true
      artifact_prefix: ${{ inputs.artifact_prefix }}

  check-all-green:
    name: "✅ Check all green"
    if: always()
    needs:
      - build-images
      - setup-and-test-wormhole
      - setup-and-test-blackhole
    runs-on: ubuntu-latest
    steps:
      - name: Check if the required jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: build-images, setup-and-test-wormhole, setup-and-test-blackhole

