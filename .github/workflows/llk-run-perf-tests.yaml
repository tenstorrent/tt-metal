name: "LLK Run Performance Tests"

on:
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch:
  workflow_call:

permissions:
  checks: write
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_protected && github.run_id ||
    github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: "Detect changes"
    runs-on: ubuntu-latest
    if: |
      contains(fromJSON('["workflow_dispatch","workflow_call","schedule"]'), github.event_name) ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'llk:performance-tests'))
    outputs:
      wormhole: ${{ steps.set.outputs.wormhole }}
      blackhole: ${{ steps.set.outputs.blackhole }}
      common: ${{ steps.set.outputs.common }}
      sfpi: ${{ steps.set.outputs.sfpi }}
      performance: ${{ steps.set.outputs.performance }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 200

      - name: Detect which directories changed
        uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'schedule'
        with:
          filters: |
            wormhole:
              - 'tt_metal/tt-llk/tt_llk_wormhole_b0/**'
            blackhole:
              - 'tt_metal/tt-llk/tt_llk_blackhole/**'
            common:
              - 'tt_metal/tt-llk/common/**'
            sfpi:
              - 'tt_metal/sfpi-info.sh'
              - 'tt_metal/sfpi-version'
            performance:
              - 'tt_metal/tt-llk/**/*perf**'
              - 'tt_metal/tt-llk/**/*profiler**'

      - name: Resolve test triggers (nightly vs changes)
        id: set
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "wormhole=true" >> $GITHUB_OUTPUT
            echo "blackhole=true" >> $GITHUB_OUTPUT
            echo "common=true" >> $GITHUB_OUTPUT
            echo "sfpi=true" >> $GITHUB_OUTPUT
            echo "performance=true" >> $GITHUB_OUTPUT
          else
            echo "wormhole=${{ steps.filter.outputs.wormhole }}" >> $GITHUB_OUTPUT
            echo "blackhole=${{ steps.filter.outputs.blackhole }}" >> $GITHUB_OUTPUT
            echo "common=${{ steps.filter.outputs.common }}" >> $GITHUB_OUTPUT
            echo "sfpi=${{ steps.filter.outputs.sfpi }}" >> $GITHUB_OUTPUT
            echo "performance=${{ steps.filter.outputs.performance }}" >> $GITHUB_OUTPUT
          fi

  build-images:
    name: "Docker setup"
    uses: ./.github/workflows/build-docker-artifact.yaml
    needs: detect-changes
    secrets: inherit

  run-perf-wormhole:
    name: "LLK Performance tests (Wormhole)"
    uses: ./.github/workflows/llk-perf-tests-impl.yaml
    needs: [build-images, detect-changes]
    if: ${{ needs.detect-changes.outputs.wormhole == 'true' ||
            needs.detect-changes.outputs.common == 'true' ||
            needs.detect-changes.outputs.sfpi == 'true' ||
            needs.detect-changes.outputs.performance == 'true' ||
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'workflow_call' }}
    secrets: inherit
    with:
      docker-image: ${{ needs.build-images.outputs.llk-ci-tag }}
      enabled-skus: wh_n150_civ2
      pytest-markers: "perf"

  run-perf-blackhole:
    name: "LLK Performance tests (Blackhole)"
    uses: ./.github/workflows/llk-perf-tests-impl.yaml
    needs: [build-images, detect-changes]
    if: ${{ needs.detect-changes.outputs.blackhole == 'true' ||
            needs.detect-changes.outputs.common == 'true' ||
            needs.detect-changes.outputs.sfpi == 'true' ||
            needs.detect-changes.outputs.performance == 'true' ||
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'workflow_call' }}
    secrets: inherit
    with:
      docker-image: ${{ needs.build-images.outputs.llk-ci-tag }}
      enabled-skus: bh_p150b_civ2
      pytest-markers: "perf"

  check-all-green:
    name: "Check all green"
    if: |
      always() && (
      contains(fromJSON('["workflow_dispatch","workflow_call","schedule"]'), github.event_name) ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'llk:performance-tests'))
      )
    needs:
      - build-images
      - run-perf-wormhole
      - run-perf-blackhole
    runs-on: ubuntu-latest
    steps:
      - name: Check if the required jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: run-perf-wormhole, run-perf-blackhole
