name: "[internal] Blackhole Multi-card unit tests impl"

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      runner-label:
        required: false
        type: string
        default: "BH-LLMBox"
      fast-only:
        required: false
        type: boolean
        default: false
        description: "If true, run only tests with test-type == fast; otherwise run all tests."
      enable-watcher:
        description: 'Enable watcher'
        default: false
        type: boolean
      bh-dram-init-case:
        description: 'Select a comma-separated list of Blackhole DRAM init buckets; use default for legacy behavior'
        required: false
        type: string
        default: default

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      has_tests: ${{ steps.generate.outputs.has_tests }}
    steps:
      - name: Generate filtered matrix
        id: generate
        run: |
          # Investigation branch: run only the known-problematic fast unit test group.
          all_tests_yaml=$(cat <<'YAML_EOF'
          - name: cpp fast unit tests (eth, single erisc)
            cmd: |
              ./build/test/tt_metal/unit_tests_eth
              TT_METAL_SLOW_DISPATCH_MODE=true ./build/test/tt_metal/unit_tests_eth
              TT_METAL_DISABLE_MULTI_AERISC=1 ./build/test/tt_metal/tt_fabric/fabric_unit_tests --gtest_filter="Fabric1D*Fixture.*"
              TT_METAL_DISABLE_MULTI_AERISC=1 build/test/tt_metal/unit_tests_eth
              TT_METAL_DISABLE_MULTI_AERISC=1 build/test/tt_metal/unit_tests_debug_tools --gtest_filter=DPrintMeshFixture.ActiveEthTestPrint
              TT_METAL_DISABLE_MULTI_AERISC=1 build/test/tt_metal/unit_tests_debug_tools --gtest_filter=WatcherAssertTest.TensixTestWatcherPause
              TT_METAL_DISABLE_MULTI_AERISC=1 build/test/tt_metal/unit_tests_debug_tools --gtest_filter=WatcherAssertTest.TestWatcherAssert
              TT_METAL_DISABLE_MULTI_AERISC=1 build/test/tt_metal/unit_tests_debug_tools --gtest_filter=MeshWatcherFixture.ActiveEthTestWatcherSanitizeEth
              TT_METAL_DISABLE_MULTI_AERISC=1 build/test/tt_metal/unit_tests_dispatch --gtest_filter=UnitMeshRandomProgramFixture.ActiveEthTestPrograms
              TT_METAL_DISABLE_MULTI_AERISC=1 build/test/tt_metal/unit_tests_dispatch --gtest_filter=UnitMeshRandomProgramTraceFixture.ActiveEthTestProgramsTrace
            timeout: 240
          YAML_EOF
          )
          filtered_tests=$(echo "$all_tests_yaml" | ruby -r yaml -r json -e 'puts YAML.load(STDIN.read).to_json')

          echo "Filtered tests: $filtered_tests"

          # Check if there are any tests to run
          test_count=$(echo "$filtered_tests" | jq 'length')
          if [ "$test_count" -eq 0 ]; then
            echo "No tests match the filter criteria"
            echo "has_tests=false" >> $GITHUB_OUTPUT
          else
            echo "has_tests=true" >> $GITHUB_OUTPUT
            # Use delimiter format so matrix JSON with newlines in cmd values is valid
            {
              echo "matrix<<MATRIX_EOF"
              echo "{\"test-group\":$filtered_tests}"
              echo "MATRIX_EOF"
            } >> $GITHUB_OUTPUT
          fi
  multi-card-unit-tests:
    needs: generate-matrix
    if: ${{ needs.generate-matrix.outputs.has_tests == 'true' }}
    strategy:
      # Do not fail-fast because we need to ensure all tests go to completion
      # so we try not to get hanging machines
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    name: ${{ inputs.arch }} ${{ inputs.runner-label }} ${{ matrix.test-group.name }} [bh-dram-init:sequence]
    runs-on:
      - in-service
      - arch-blackhole
      - ${{ inputs.runner-label }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved' }}
      env:
        ARCH_NAME: ${{ inputs.arch }}
        LOGURU_LEVEL: INFO
        LD_LIBRARY_PATH: /work/build/lib
        PYTHONPATH: /work
        TT_METAL_HOME: /work
        GTEST_OUTPUT: xml:/work/generated/test_reports/
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - ${{ (!contains(inputs.runner-label, 'viommu') && '/dev/hugepages-1G:/dev/hugepages-1G') || '/no_hugepages' }}
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher || false }}
      - uses: tenstorrent/tt-metal/.github/actions/ensure-bh-links-online@main
        timeout-minutes: 10
        with:
          runner-label: ${{ inputs.runner-label }}
      - name: Summarize Blackhole DRAM init selector sequence
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Blackhole DRAM init selector sequence

          - `none`
          - `dram_core_reset_assert`
          - `dram_core_reset_assert,dram_bank_to_noc_tables`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index,dram_reset_pc`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index,dram_reset_pc,dram_cq_launch_rdptr`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index,dram_reset_pc,dram_cq_launch_rdptr,dram_fw_reset_deassert`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index,dram_reset_pc,dram_cq_launch_rdptr,dram_fw_reset_deassert,dram_watcher_init`
          - `dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index,dram_reset_pc,dram_cq_launch_rdptr,dram_fw_reset_deassert,dram_watcher_init,dram_watcher_mailbox_read`

          EOF
      - name: ${{ matrix.test-group.name }} tests
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          selectors=(
            "none"
            "dram_core_reset_assert"
            "dram_core_reset_assert,dram_bank_to_noc_tables"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index,dram_reset_pc"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index,dram_reset_pc,dram_cq_launch_rdptr"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index,dram_reset_pc,dram_cq_launch_rdptr,dram_fw_reset_deassert"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index,dram_reset_pc,dram_cq_launch_rdptr,dram_fw_reset_deassert,dram_watcher_init"
            "dram_core_reset_assert,dram_bank_to_noc_tables,dram_core_info,dram_fw_reset_assert,dram_fw_binary,dram_launch_msg,dram_go_msg,dram_fw_launch_rdptr,dram_fw_go_msg_index,dram_reset_pc,dram_cq_launch_rdptr,dram_fw_reset_deassert,dram_watcher_init,dram_watcher_mailbox_read"
          )

          mapfile -t test_commands <<'COMMANDS_EOF'
          ${{ matrix.test-group.cmd }}
          COMMANDS_EOF

          failed_selectors=()
          failed_commands=()

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Selector run results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          for selector in "${selectors[@]}"; do
            echo "Running selector string: $selector"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### \`$selector\`" >> "$GITHUB_STEP_SUMMARY"

            export TT_METAL_BH_DRAM_INIT_CASE="$selector"
            selector_failed=0

            for command in "${test_commands[@]}"; do
              if [[ -z "$command" ]]; then
                continue
              fi

              echo "::group::[$selector] $command"
              set +e
              bash -lc "$command"
              status=$?
              set -e
              echo "::endgroup::"

              if [[ $status -ne 0 ]]; then
                selector_failed=1
                failed_commands+=("$selector :: exit $status :: $command")
                echo "::error title=Blackhole selector command failed::selector=$selector exit_code=$status command=$command"
              fi
            done

            if [[ $selector_failed -eq 0 ]]; then
              echo "- pass" >> "$GITHUB_STEP_SUMMARY"
            else
              failed_selectors+=("$selector")
              echo "- fail" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          if [[ ${#failed_selectors[@]} -ne 0 ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## Failed selectors" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            for selector in "${failed_selectors[@]}"; do
              echo "- \`$selector\`" >> "$GITHUB_STEP_SUMMARY"
            done

            printf 'Failed selectors:\n' >&2
            printf '  %s\n' "${failed_selectors[@]}" >&2
            printf 'Failed commands:\n' >&2
            printf '  %s\n' "${failed_commands[@]}" >&2
            exit 1
          fi
      - name: Check latency/BW results
        id: check-data
        if: ${{ !cancelled() && matrix.test-group.name == 'fabric sanity benchmark' }}
        uses: ./docker-job/.github/actions/check-latency-bw-results
        with:
          path: /work
          arch: blackhole
          check_bw: "true"
          check_latency: "true"
      - name: Upload BW results
        ## Only upload fabric benchmark data for main branch
        if: ${{ !cancelled() && github.ref_name == 'main' && steps.check-data.outputs.has_benchmark_data == 'true' }}
        uses: tenstorrent/tt-metal/.github/actions/upload-data-via-sftp@main
        with:
          ssh-private-key: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
          sftp-batchfile: /work/.github/actions/upload-data-via-sftp/fabric_bandwidth_benchmark_data_batchfile.txt
          username: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_USERNAME }}
          hostname: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME }}
          path: /work
      - name: Upload latency data
        ## Only upload fabric latency data for main branch
        if: ${{ !cancelled() && github.ref_name == 'main' && steps.check-data.outputs.has_latency_data == 'true' }}
        uses: tenstorrent/tt-metal/.github/actions/upload-data-via-sftp@main
        with:
          ssh-private-key: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
          sftp-batchfile: /work/.github/actions/upload-data-via-sftp/fabric_latency_benchmark_data_batchfile.txt
          username: ${{ secrets.SFTP_FABRIC_LATENCY_WRITER_USERNAME }}
          hostname: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME }}
          path: /work
      - name: Print tt-smi data on failure
        if: ${{ failure() }}
        run: |
          tt-smi -s
      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
          owner: U0883RN6CRE # William Ly
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - name: Generate gtest annotations on failure
        uses: tenstorrent/tt-metal/.github/actions/generate-gtest-failure-message@main
        if: ${{ failure() }}
