name: "[internal] Blackhole Multi-card unit tests impl"

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      runner-label:
        required: false
        type: string
        default: "BH-LoudBox"
      fast-only:
        required: false
        type: boolean
        default: false
        description: "If true, run only tests with test-type == fast; otherwise run all tests."
      enable-watcher:
        description: "Enable watcher"
        default: false
        type: boolean
      enable-llk-asserts:
        required: false
        type: boolean
        default: false
        description: "Enable LLK asserts"
      model:
        description: "Filter tests by model-name (default: all)"
        required: false
        type: string
        default: "all"
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      has_tests: ${{ steps.generate.outputs.has_tests }}
    steps:
      - name: Generate filtered matrix
        id: generate
        run: |
          # Define all test groups as YAML (test-type: "fast" = run when fast-only; others run in full matrix)
          # Convert to JSON for jq filtering; multi-line cmd blocks stay readable
          all_tests_yaml=$(cat <<'YAML_EOF'
          - name: fabric fast unit tests (1D, 2D, single erisc)
            cmd: |
              ./build/test/tt_metal/tt_fabric/fabric_unit_tests --gtest_filter="Fabric1D*Fixture.*"
              ./build/test/tt_metal/tt_fabric/fabric_unit_tests --gtest_filter="Fabric2D*Fixture.*"
              TT_METAL_DISABLE_MULTI_AERISC=1 ./build/test/tt_metal/tt_fabric/fabric_unit_tests --gtest_filter="Fabric1D*Fixture.*"
            timeout: 15
            test-type: fast
          - name: Host IO fast unit test (viommu only)
            cmd: TT_METAL_SLOW_DISPATCH_MODE=1 pytest -svv models/demos/deepseek_v3_b1/tests/unit_tests/test_host_io.py
            timeout: 10
            test-type: fast-viommu
          - name: ttnn ops fast unit tests (ccl, DRAM prefetcher)
            cmd: |
              pytest tests/ttnn/unit_tests/operations/ccl/blackhole_CI/box/all_post_commit
              # Disabled due to issue https://github.com/tenstorrent/tt-metal/issues/41040
              # pytest tests/ttnn/unit_tests/operations/transformers/test_prefetcher_BH.py
            timeout: 15
            test-type: fast
          - name: sdpa nightly tests (QB2 only)
            cmd: pytest tests/nightly/blackhole/sdpa/ -svv
            timeout: 20
            test-type: fast-qb2
          - name: ring sdpa PERF tests (QB2 only)
            cmd: |
              SDPA_PERF_CHECKS=1 pytest tests/nightly/blackhole/sdpa/test_ring_joint_sdpa.py::test_ring_joint_attention_perf_check -svv
              SDPA_PERF_CHECKS=1 pytest tests/nightly/blackhole/sdpa/test_ring_joint_sdpa.py::test_ring_mla_chunked_perf_check -svv
              SDPA_PERF_CHECKS=1 pytest tests/nightly/blackhole/sdpa/test_exp_ring_joint_sdpa.py::test_exp_ring_joint_attention_perf_check -svv
            timeout: 10
            test-type: fast-qb2
          # NOTE: All slow / loudbox / qb multi-card BH tests have been migrated
          # into tests/pipeline_reorg/blackhole_e2e_tests.yaml and are now run by
          # the blackhole-e2e-tests workflow. This file only carries the
          # fast / fast-viommu / fast-qb2 legs that blackhole-post-commit invokes
          # with fast-only: true.
          YAML_EOF
          )
          all_tests=$(echo "$all_tests_yaml" | ruby -r yaml -r json -e 'puts YAML.load(STDIN.read).to_json')

          # Filter: *-viommu test types run only when runner-label contains viommu; when fast_only, run only fast + fast-viommu (on viommu)
          fast_only="${{ inputs.fast-only }}"
          runner_label="${{ inputs.runner-label }}"
          viommu_json="false"
          if [[ "$runner_label" == *viommu* ]]; then viommu_json="true"; fi
          loudbox_json="false"
          if [[ "$runner_label" == *LoudBox* ]]; then loudbox_json="true"; fi
          qb2_json="false"
          if [[ "$runner_label" == *Quietbox-2* ]]; then qb2_json="true"; fi

          if [ "$fast_only" == "true" ]; then
            filtered_tests=$(echo "$all_tests" | jq -c --argjson viommu "$viommu_json" --argjson loudbox "$loudbox_json" --argjson qb2 "$qb2_json" \
              '[.[] | select(((.["test-type"] == "fast") or (.["test-type"] == "fast-viommu" and $viommu) or (.["test-type"] == "fast-qb2" and $qb2)) and ((.["test-type"] != "loudbox") or $loudbox))]')
          else
            filtered_tests=$(echo "$all_tests" | jq -c --argjson viommu "$viommu_json" --argjson loudbox "$loudbox_json" --argjson qb2 "$qb2_json" \
              '[.[] | select(((.["test-type"] != "fast-viommu" and .["test-type"] != "slow-viommu") or $viommu) and ((.["test-type"] != "fast-qb2") or $qb2) and ((.["test-type"] != "loudbox") or $loudbox))]')
          fi

          # Filter by model if specified
          model_filter="${{ inputs.model }}"
          if [ "$model_filter" != "all" ]; then
            filtered_tests=$(echo "$filtered_tests" | jq -c --arg model "$model_filter" \
              '[.[] | select(.["model-name"] == $model)]')
          fi

          echo "Filtered tests: $filtered_tests"

          # Check if there are any tests to run
          test_count=$(echo "$filtered_tests" | jq 'length')
          if [ "$test_count" -eq 0 ]; then
            echo "No tests match the filter criteria"
            echo "has_tests=false" >> $GITHUB_OUTPUT
          else
            echo "has_tests=true" >> $GITHUB_OUTPUT
            # Use delimiter format so matrix JSON with newlines in cmd values is valid
            {
              echo "matrix<<MATRIX_EOF"
              echo "{\"test-group\":$filtered_tests}"
              echo "MATRIX_EOF"
            } >> $GITHUB_OUTPUT
          fi
  multi-card-unit-tests:
    needs: generate-matrix
    if: ${{ needs.generate-matrix.outputs.has_tests == 'true' }}
    strategy:
      # Do not fail-fast because we need to ensure all tests go to completion
      # so we try not to get hanging machines
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    name: ${{ inputs.arch }} ${{ inputs.runner-label }} ${{ matrix.test-group.name }}
    runs-on:
      - in-service
      - arch-blackhole
      - ${{ inputs.runner-label }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved' }}
      env:
        ARCH_NAME: ${{ inputs.arch }}
        LOGURU_LEVEL: INFO
        LD_LIBRARY_PATH: /work/build/lib
        PYTHONPATH: /work
        TT_METAL_HOME: /work
        GTEST_OUTPUT: xml:/work/generated/test_reports/
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - ${{ (!contains(inputs.runner-label, 'viommu') && '/dev/hugepages-1G:/dev/hugepages-1G') || '/no_hugepages' }}
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher || false }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
          # PERF jobs (tracy profiler on) need a wider hang-detection window because
          # the heavy traffic (e.g. layer3 isl_6k4 combine) can stall the NOC for >5s
          # under genuine bandwidth pressure without being deadlocked. Other jobs
          # keep the default 5s.
          hang-detection-timeout: ${{ contains(matrix.test-group.name, 'PERF') && '20.0' || '5.0' }}
      - uses: tenstorrent/tt-metal/.github/actions/ensure-bh-links-online@main
        timeout-minutes: 10
      - name: ${{ matrix.test-group.name }} tests
        timeout-minutes: ${{ matrix.test-group.timeout }}
        uses: ./docker-job/.github/actions/run-with-log
        with:
          log-file: generated/test_logs/${{ matrix.test-group.name }}.log
          run: ${{ matrix.test-group.cmd }}
      - name: Check latency/BW results
        id: check-data
        if: ${{ !cancelled() && matrix.test-group.name == 'fabric sanity benchmark' }}
        uses: ./docker-job/.github/actions/check-latency-bw-results
        with:
          path: /work
          arch: blackhole
          check_bw: "true"
          check_latency: "true"
      - name: Upload BW results
        ## Only upload fabric benchmark data for main branch
        if: ${{ !cancelled() && github.ref_name == 'main' && steps.check-data.outputs.has_benchmark_data == 'true' }}
        uses: tenstorrent/tt-metal/.github/actions/upload-data-via-sftp@main
        with:
          ssh-private-key: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
          sftp-batchfile: /work/.github/actions/upload-data-via-sftp/fabric_bandwidth_benchmark_data_batchfile.txt
          username: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_USERNAME }}
          hostname: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME }}
          path: /work
      - name: Upload latency data
        ## Only upload fabric latency data for main branch
        if: ${{ !cancelled() && github.ref_name == 'main' && steps.check-data.outputs.has_latency_data == 'true' }}
        uses: tenstorrent/tt-metal/.github/actions/upload-data-via-sftp@main
        with:
          ssh-private-key: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
          sftp-batchfile: /work/.github/actions/upload-data-via-sftp/fabric_latency_benchmark_data_batchfile.txt
          username: ${{ secrets.SFTP_FABRIC_LATENCY_WRITER_USERNAME }}
          hostname: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME }}
          path: /work
      - name: Print tt-smi data on failure
        if: ${{ failure() }}
        run: |
          tt-smi -s
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - name: Generate gtest annotations on failure
        uses: tenstorrent/tt-metal/.github/actions/generate-gtest-failure-message@main
        if: ${{ failure() }}
      - name: 🤖 AI job summary
        if: always() && !cancelled()
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/job@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE/docker-job",
              "input_dirs": ["generated/test_logs"],
              "output_dir": "generated/ai_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          job-name: ${{ matrix.test-group.name }}

  ai-run-summary:
    name: "AI Run Summary"
    needs: [generate-matrix, multi-card-unit-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
      - id: extract-matrix
        env:
          MATRIX_WRAPPER: ${{ needs.generate-matrix.outputs.matrix }}
        run: |
          # generate-matrix exposes a `{"test-group": [...]}` wrapper for
          # GitHub `matrix:` consumption; ai_summary/run wants the flat
          # array of leg dicts. Extract it (or default to []).
          if [ -z "$MATRIX_WRAPPER" ]; then
            EXPECTED="[]"
          else
            EXPECTED=$(echo "$MATRIX_WRAPPER" | jq -c '.["test-group"] // []')
          fi
          {
            echo "matrix<<EOF"
            echo "$EXPECTED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - id: ai-run-summary
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/run@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE",
              "input_dir": "ai_job_summaries",
              "output_dir": "ai_run_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          expected-jobs: ${{ steps.extract-matrix.outputs.matrix }}
          run-result: ${{ needs.multi-card-unit-tests.result }}
      - name: Show report
        if: always() && steps.ai-run-summary.outputs.report-file != ''
        continue-on-error: true
        shell: bash
        env:
          REPORT_FILE: ${{ steps.ai-run-summary.outputs.report-file }}
        run: |
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
            cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Report file not found: $REPORT_FILE"
          fi
