name: "[internal] Models end-to-end tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
      model:
        required: false
        type: string
        default: "all"
      mlperf-read-only:
        required: false
        type: boolean
        default: true
        description: "Set to false to allow write access to MLPerf mount"
      tier:
        required: true
        type: string
        description: "Model tier to filter tests (1, 2, or 3)"

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.apply-filters.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/models_e2e_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "e2e"
      - name: Build unified test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Apply tier and model filters, then group by model
        id: apply-filters
        run: |
          MATRIX='${{ steps.build-matrix.outputs.matrix }}'
          # Filter by tier
          FILTERED=$(echo "$MATRIX" | jq -c --argjson tier ${{ inputs.tier }} '[.[] | select(.tier == $tier)]')
          # Filter by model (substring match, case-insensitive)
          if [ "${{ inputs.model }}" != "all" ]; then
            FILTERED=$(echo "$FILTERED" | jq -c --arg m "${{ inputs.model }}" '[.[] | select(.model | test($m; "i"))]')
          fi
          # Group by model_group (falling back to model). One matrix entry per
          # group; each group will dispatch to the per-model reusable workflow,
          # which renders as a collapsible group in the Actions UI.
          GROUPED=$(echo "$FILTERED" | jq -c '
            [ group_by(.model_group // .model)[]
              | { model: (.[0].model_group // .[0].model), tests: . } ]
          ')
          if [ "$GROUPED" = "[]" ]; then
            echo "::warning::No tests found for tier=${{ inputs.tier }}, model=${{ inputs.model }}. Pipeline will be skipped."
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix<<EOF" >> $GITHUB_OUTPUT
            echo "$GROUPED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

  models-e2e-tests:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.group.model }}
    uses: ./.github/workflows/models-e2e-per-model.yaml
    secrets: inherit
    with:
      docker-image: ${{ inputs.docker-image }}
      build-artifact-name: ${{ inputs.build-artifact-name }}
      wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      model: ${{ matrix.group.model }}
      tests-json: ${{ toJson(matrix.group.tests) }}
      mlperf-read-only: ${{ inputs.mlperf-read-only }}
