name: "[internal] Models end-to-end tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
      model:
        required: false
        type: string
        default: "all"
      mlperf-read-only:
        required: false
        type: boolean
        default: true
        description: "Set to false to allow write access to MLPerf mount"
      tier:
        required: true
        type: string
        description: "Model tier to filter tests (1, 2, or 3)"
    outputs:
      matrix:
        description: "Filtered matrix of legs that ran (consumed by ai_summary/run for INFRA_FAILURE reconciliation)."
        value: ${{ jobs.load-test-matrix.outputs.matrix }}

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.apply-filters.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/models_e2e_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "e2e" \
            "${{ inputs.tier }}"
      - name: Build unified test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Apply tier and model filters
        id: apply-filters
        run: |
          MATRIX='${{ steps.build-matrix.outputs.matrix }}'
          # Filter by tier
          FILTERED=$(echo "$MATRIX" | jq -c --argjson tier ${{ inputs.tier }} '[.[] | select(.tier == $tier)]')
          # Filter by model (substring match, case-insensitive)
          if [ "${{ inputs.model }}" != "all" ]; then
            FILTERED=$(echo "$FILTERED" | jq -c --arg m "${{ inputs.model }}" '[.[] | select(.model | test($m; "i"))]')
          fi
          if [ "$FILTERED" = "[]" ]; then
            echo "::warning::No tests found for tier=${{ inputs.tier }}, model=${{ inputs.model }}. Pipeline will be skipped."
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix<<EOF" >> $GITHUB_OUTPUT
            echo "$FILTERED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

  models-e2e-tests:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        # Only the per-runner BH cache modes (local-disk, lfc) need HF online
        # so first-use can populate the cache. Shared NFS modes (cloud-mlperf
        # for BH and the implicit WH mount) keep HF offline — those are :ro
        # and HF would try to write metadata (refs/main, .no_exist markers)
        # on every HEAD call even when the cache already has the model,
        # crashing with `OSError [Errno 30] Read-only file system`.
        HF_HUB_OFFLINE: ${{ (matrix.test-group['weights-cache-mode'] == 'local-disk' || matrix.test-group['weights-cache-mode'] == 'lfc') && '0' || '1' }}
        HF_HUB_CACHE: /mnt/MLPerf/huggingface/hub
        HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        LOGURU_LEVEL: INFO
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        MLPERF_READ_ONLY: ${{ inputs.mlperf-read-only }} # used by GPT-OSS 120B to toggle --skip-model-load
        # --- Plan B (#45127 LLK hunt) — JIT kernels with DWARF into a fixed cache so the
        # --- llk_api_analyzer step below can recover which LLK APIs each compute kernel used.
        TT_METAL_RISCV_DEBUG_INFO: "1"
        TT_METAL_CACHE: /work/generated/llk_kcache
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
        # Mount the HF / tt_cache root so it always appears inside the container
        # at /mnt/MLPerf/huggingface, regardless of which BH cache mode the
        # runner uses. Host source comes from matrix.test-group['weights-cache-mode']
        # (populated from the weights-cache-mode field in .github/sku_config.yaml by prepare_test_matrix.py):
        #   cloud-mlperf            → host /mnt/MLPerf/huggingface (shared NFS)
        #   local-disk / lfc        → host /localdev/blackhole_demos/huggingface_data (per-runner)
        #   yyz4-mnt-models         → host /mnt/models/huggingface (YYZ4 Exabox nfs storage mount)
        #   (no mode → WH SKU)      → host /mnt/MLPerf (whole tree; preserves access to
        #                             /mnt/MLPerf/tt_dnn-models still used by one WH entry)
        # rw-ness: per-runner caches are :rw so first-use HF downloads can populate them;
        # shared NFS honors mlperf-read-only.
        - ${{ matrix.test-group['weights-cache-mode'] == 'cloud-mlperf' && format('/mnt/MLPerf/huggingface:/mnt/MLPerf/huggingface{0}', inputs.mlperf-read-only && ':ro' || ':rw') || (matrix.test-group['weights-cache-mode'] == 'yyz4-mnt-models' && format('/mnt/models/huggingface:/mnt/MLPerf/huggingface{0}', inputs.mlperf-read-only && ':ro' || ':rw')) || (matrix.test-group['weights-cache-mode'] == 'local-disk' || matrix.test-group['weights-cache-mode'] == 'lfc') && '/localdev/blackhole_demos/huggingface_data:/mnt/MLPerf/huggingface:rw' || format('/mnt/MLPerf:/mnt/MLPerf{0}', inputs.mlperf-read-only && ':ro' || ':rw') }}
      options: "--device /dev/tenstorrent --privileged -v /sys:/sys"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        uses: ./docker-job/.github/actions/run-with-log
        with:
          log-file: generated/test_logs/${{ matrix.test-group.name }}.log
          run: |
            mkdir -p generated/test_reports
            # Perf/accuracy are enforced by the "Validate perf and accuracy targets"
            # step below; the in-test checks are warning-only, so the tests write
            # complete benchmark JSON before validation runs.
            ${{ matrix.test-group.cmd }}
      # --- Plan B (#45127 LLK hunt): analyze the JIT kernels this run produced. ---
      # Runs even when the test hangs/times out or fails at 0% accuracy — the compute
      # kernels are JIT-compiled (with DWARF, via TT_METAL_RISCV_DEBUG_INFO) before the
      # numeric check, so the DWARF ELFs already exist in $TT_METAL_CACHE.
      - name: LLK API analysis (#45127)
        if: ${{ always() }}
        shell: bash
        working-directory: /work
        run: |
          set -x
          # The runtime venv (/opt/venv) has no pip → bootstrap it, then install the
          # analyzer deps. Fall back to a --target dir on PYTHONPATH if the venv is locked.
          python3 -m ensurepip --upgrade >/dev/null 2>&1 || true
          python3 -m pip install --no-cache-dir pyelftools tabulate >/dev/null 2>&1 \
            || python3 -m pip install --no-cache-dir --break-system-packages pyelftools tabulate >/dev/null 2>&1 || true
          if ! python3 -c "import elftools" 2>/dev/null; then
            python3 -m pip install --no-cache-dir -t /tmp/pylibs pyelftools tabulate >/dev/null 2>&1 || true
            export PYTHONPATH="/tmp/pylibs:${PYTHONPATH}"
          fi
          python3 -c "import elftools, tabulate; print('analyzer deps OK')" || echo "WARN: analyzer deps missing"
          CACHE="${TT_METAL_CACHE:-$HOME/.cache/tt-metal-cache}"
          echo "Analyzing JIT kernels under: $CACHE"
          echo "trisc ELFs found: $(find "$CACHE" -name 'trisc*.elf' 2>/dev/null | wc -l)"
          mkdir -p generated
          export PYTHONPATH="/work:${PYTHONPATH}"
          python3 -m tt_metal.tools.llk_api_analyzer "$CACHE" -f table -l llk_core,llk_api -o generated/llk_report_table.md || true
          python3 -m tt_metal.tools.llk_api_analyzer "$CACHE" -f csv   -l llk_core,llk_api -o generated/llk_report.csv || true
          echo "===================== #45127-active signature counts ====================="
          for s in "dim_stride_target=FACE_ROW_MAJOR" "unpack_tilize" "unpack_bcastA_B" "dim_stride_target=IGNORE"; do
            echo "  $s : $(grep -c "$s" generated/llk_report_table.md 2>/dev/null || echo 0)"
          done
          # The log is the reliable channel (artifact path is finicky in this container mount),
          # so dump the culprit rows fully here. Use the markdown table (pipe-delimited; the CSV
          # has commas inside the format fields). Table cols: 1='' 2=LLK API 3=TTNN Ops 4=Op Args ...
          echo "===================== FULL #45127-active table rows (LLK API | op | formats) ====================="
          grep -E "FACE_ROW_MAJOR|unpack_tilize|unpack_bcastA_B" generated/llk_report_table.md 2>/dev/null | head -400 || true
          echo "===================== distinct TTNN ops that hit each #45127 path ====================="
          for s in FACE_ROW_MAJOR unpack_tilize unpack_bcastA_B; do
            echo "--- $s ---"
            grep -E "$s" generated/llk_report_table.md 2>/dev/null | awk -F'|' '{print $3}' | sort -u | head -40 || true
          done
          # Per-kernel text report → name the exact compute kernel(s) that hit the #45127 paths.
          python3 -m tt_metal.tools.llk_api_analyzer "$CACHE" -f text -l llk_core,llk_api -o generated/llk_report_text.txt || true
          echo "===================== kernels containing tilize_uninit / FACE_ROW_MAJOR (name + path) ====================="
          awk '/^### kernel:/{k=$0} /^    path:/{p=$0}
               /_llk_unpack_tilize_uninit_|_llk_unpack_tilize_|FACE_ROW_MAJOR/{if(k!=""){print k; print p; k=""}}' \
               generated/llk_report_text.txt 2>/dev/null | head -80 || true
      - name: Upload LLK report (#45127)
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: llk-report-45127
          # container writes to /work (= workspace/docker-job); list both prefixes so
          # whichever the action's workspace root resolves to gets picked up.
          path: |
            generated/llk_report_table.md
            generated/llk_report.csv
            generated/llk_report_text.txt
            docker-job/generated/llk_report_table.md
            docker-job/generated/llk_report.csv
          if-no-files-found: warn
      - name: Save environment data
        id: save-environment-data
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          if [ -d "generated/benchmark_data" ]; then
            echo "has_benchmark_data=true" >> $GITHUB_OUTPUT
            python3 .github/scripts/data_analysis/create_benchmark_with_environment_json.py "${{ matrix.test-group.sku }}"
          else
            echo "::warning::Benchmark data directory 'generated/benchmark_data' does not exist"
            echo "has_benchmark_data=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload benchmark data
        if: ${{ !cancelled() && steps.save-environment-data.conclusion == 'success' && steps.save-environment-data.outputs.has_benchmark_data == 'true' }}
        uses: tenstorrent/tt-metal/.github/actions/upload-data-via-sftp@main
        with:
          ssh-private-key: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
          sftp-batchfile: .github/actions/upload-data-via-sftp/benchmark_data_batchfile.txt
          path: /work
          username: ${{ secrets.SFTP_BENCHMARK_WRITER_USERNAME }}
          hostname: ${{ secrets.SFTP_BENCHMARK_WRITER_HOSTNAME }}
      - name: Validate perf and accuracy targets
        if: ${{ !cancelled() && steps.save-environment-data.conclusion == 'success' && steps.save-environment-data.outputs.has_benchmark_data == 'true' }}
        shell: bash
        run: |
          python3 .github/scripts/utils/validate_perf_targets.py \
            --path-profile repo-root \
            --sku "${{ matrix.test-group.sku }}"
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - name: Generate gtest annotations on failure
        uses: tenstorrent/tt-metal/.github/actions/generate-gtest-failure-message@main
        if: ${{ failure() }}
      - name: 🤖 AI job summary
        if: always() && !cancelled()
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/job@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE/docker-job",
              "input_dirs": ["generated/test_logs"],
              "output_dir": "generated/ai_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          job-name: ${{ matrix.test-group.name }}
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
