name: "[internal] ttnn sweep validation impl"

on:
  workflow_call:
    inputs:
      manifest-path:
        required: true
        type: string
      scope-targets:
        required: true
        type: string
      models:
        required: true
        type: string
      trace-ids:
        required: true
        type: string
      caller-id:
        required: false
        type: string
      allow-partial-hash-changes:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: Release
      build-wheel: true
      platform: Ubuntu 22.04
      enable-lto: false

  prepare-validation-inputs:
    name: Prepare validation inputs
    runs-on: ubuntu-latest
    outputs:
      master-json-artifact-name: ${{ steps.set-artifact-names.outputs.master-json-artifact-name }}
      preflight-artifact-name: ${{ steps.set-artifact-names.outputs.preflight-artifact-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display validation request
        env:
          MANIFEST_PATH: ${{ inputs.manifest-path }}
          SCOPE_TARGETS: ${{ inputs.scope-targets }}
          MODELS: ${{ inputs.models }}
          TRACE_IDS: ${{ inputs.trace-ids }}
          CALLER_ID: ${{ inputs.caller-id }}
          ALLOW_PARTIAL_HASH_CHANGES: ${{ inputs.allow-partial-hash-changes }}
        run: |
          echo "========================================"
          echo " Sweep Validation v2"
          echo "========================================"
          echo "  Branch:        ${GITHUB_REF_NAME}"
          echo "  Manifest:      ${MANIFEST_PATH}"
          echo "  Scope targets: ${SCOPE_TARGETS}"
          echo "  Models:        ${MODELS}"
          echo "  Trace IDs:     ${TRACE_IDS}"
          echo "  Allow partial: ${ALLOW_PARTIAL_HASH_CHANGES}"
          if [ -n "${CALLER_ID}" ]; then
            echo "  Caller ID:     ${CALLER_ID}"
          fi
          echo "========================================"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyyaml psycopg2-binary tqdm

      - name: Set artifact names
        id: set-artifact-names
        run: |
          echo "master-json-artifact-name=ttnn-operations-master-json" >> "$GITHUB_OUTPUT"
          echo "preflight-artifact-name=validation-preflight" >> "$GITHUB_OUTPUT"

      - name: Generate JSON from database via manifest
        env:
          TTNN_OPS_DATABASE_URL: ${{ secrets.TTNN_OPS_LEAD_MODELS_DATABASE_URL }}
          MANIFEST_PATH: ${{ inputs.manifest-path }}
        run: |
          python tests/sweep_framework/load_ttnn_ops_data_v2.py reconstruct-manifest \
            "$MANIFEST_PATH" \
            model_tracer/traced_operations/ttnn_operations_master.json

      - name: Run config hash preflight
        env:
          MANIFEST_PATH: ${{ inputs.manifest-path }}
          SCOPE_TARGETS: ${{ inputs.scope-targets }}
          MODELS: ${{ inputs.models }}
          TRACE_IDS: ${{ inputs.trace-ids }}
          ALLOW_PARTIAL_HASH_CHANGES: ${{ inputs.allow-partial-hash-changes }}
        run: |
          mkdir -p validation_artifacts
          python3 - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          from model_tracer.generic_ops_tracer import recompute_config_hashes

          json_path = Path("model_tracer/traced_operations/ttnn_operations_master.json")
          recomputed_path = Path("validation_artifacts/ttnn_operations_master.recomputed.json")
          report_path = Path("validation_artifacts/config_hash_preflight.txt")

          if not json_path.exists():
              report_path.write_text(
                  f"Missing reconstructed master JSON: {json_path}\n",
                  encoding="utf-8",
              )
              raise SystemExit(1)

          with json_path.open("r", encoding="utf-8") as f:
              before = json.load(f)

          shutil.copyfile(json_path, recomputed_path)
          changed = recompute_config_hashes(str(recomputed_path))

          with recomputed_path.open("r", encoding="utf-8") as f:
              after = json.load(f)

          total_configs = sum(
              len(op_data.get("configurations", []))
              for op_data in before.get("operations", {}).values()
          )

          changed_entries = []
          for op_name, op_data in before.get("operations", {}).items():
              before_configs = op_data.get("configurations", [])
              after_configs = after.get("operations", {}).get(op_name, {}).get("configurations", [])
              if len(before_configs) != len(after_configs):
                  report_path.write_text(
                      "\n".join(
                          [
                              "Config hash preflight",
                              f"- JSON: {json_path}",
                              f"- Error: configuration count mismatch for operation {op_name}",
                              f"- Before configs: {len(before_configs)}",
                              f"- After configs: {len(after_configs)}",
                          ]
                      )
                      + "\n",
                      encoding="utf-8",
                  )
                  raise SystemExit(1)

              for index, (before_config, after_config) in enumerate(zip(before_configs, after_configs)):
                  old_hash = before_config.get("config_hash")
                  new_hash = after_config.get("config_hash")
                  if old_hash != new_hash:
                      changed_entries.append(
                          {
                              "operation": op_name,
                              "config_id": before_config.get("config_id", index),
                              "old_hash": old_hash,
                              "new_hash": new_hash,
                          }
                      )

          allow_partial = os.environ["ALLOW_PARTIAL_HASH_CHANGES"].lower() == "true"
          percent_changed = (changed / total_configs * 100.0) if total_configs else 0.0
          all_changed = total_configs > 0 and changed == total_configs

          decision = "pass"
          if all_changed:
              decision = "fail_all_changed"
          elif changed > 0 and not allow_partial:
              decision = "fail_partial_changed"
          elif changed > 0 and allow_partial:
              decision = "continue_partial_changed"

          report_lines = [
              "Config hash preflight",
              f"- Manifest: {os.environ['MANIFEST_PATH']}",
              f"- Scope targets: {os.environ['SCOPE_TARGETS']}",
              f"- Models: {os.environ['MODELS']}",
              f"- Trace IDs: {os.environ['TRACE_IDS']}",
              f"- JSON: {json_path}",
              f"- Configurations checked: {total_configs}",
              f"- Hashes changed: {changed}",
              f"- Percent changed: {percent_changed:.2f}%",
              f"- Allow partial changes: {allow_partial}",
              f"- Decision: {decision}",
          ]
          if changed_entries:
              report_lines.append("")
              report_lines.append("Changed hashes:")
              for entry in changed_entries:
                  report_lines.append(
                      f"- {entry['operation']} config_id={entry['config_id']}: "
                      f"{entry['old_hash']} -> {entry['new_hash']}"
                  )
          report_path.write_text("\n".join(report_lines) + "\n", encoding="utf-8")

          if changed_entries:
              print(report_path.read_text(encoding="utf-8"))
          if all_changed:
              raise SystemExit(1)
          if changed > 0 and not allow_partial:
              raise SystemExit(1)
          PY

      - name: Upload master JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ttnn-operations-master-json
          path: model_tracer/traced_operations/ttnn_operations_master.json
          retention-days: 1

      - name: Upload preflight artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-preflight
          path: validation_artifacts/config_hash_preflight.txt
          retention-days: 1

