name: "[internal] Release, build, test, and publish"
on:
  workflow_call:
    inputs:
      dry-run:
        description: "Dry-run: If true, do not upload tag or draft release."
        required: false
        default: false
        type: boolean
      platform:
        description: "Platform for building and testing (e.g., 'Ubuntu 22.04', 'Ubuntu 24.04')"
        required: false
        default: "Ubuntu 22.04"
        type: string
      tag-version:
        description: "Tag version to create, e.g. 'rc' for release candidate, 'dev' for dev development, or '' for normal release"
        required: true
        default: ""
        type: string
      is-release-candidate:
        description: "If true, this is a release candidate, and some steps will be skipped"
        required: false
        default: "false"
        type: string
      main-platform:
        description: "Main platform that all test workflows should run on"
        required: false
        default: "Ubuntu 22.04"
        type: string
      tests-yaml-gist-url:
        description: "URL to gist containing release_tests.yaml (optional, falls back to local file if not provided)"
        required: false
        default: ""
        type: string

    secrets:
      PYPI_BUCKET:
        required: false
      PYPI_REGION:
        required: false
      PYPI_ROLE:
        required: false
      REDIS_PASSWORD:
        required: false
permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # Parse platform to extract distro/version for downstream workflows.
  # NOTE: This parse-platform is needed because create-docker-release-image and
  # release-docs jobs use the parsed distro/version values to construct image tags.
  # This is different from workflows that just pass platform to build-artifact.yaml.
  parse-platform:
    runs-on: ubuntu-latest
    outputs:
      distro: ${{ steps.parse.outputs.distro }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false
      - id: parse
        uses: ./.github/actions/parse-platform
        secrets:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          platform: ${{ inputs.platform }}

  build-artifact-tracy:
    name: "Build artifact with tracy (for testing)"
    needs: parse-platform
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets:
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
    with:
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-wheel: true
      tracy: true
      fetch-depth: 0
      secrets:
        REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      enable-lto: false

  build-artifact-release:
    name: "Build artifact for release (without tracy)"
    needs: parse-platform
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets:
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
    with:
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-wheel: true
      tracy: false
      fetch-depth: 0
      skip-tt-train: false
      enable-lto: false

  determine-test-skus:
    runs-on: ubuntu-latest
    outputs:
      enabled-skus: ${{ steps.select-skus.outputs.enabled-skus }}
    steps:
      - name: Select SKUs based on platform
        id: select-skus
        env:
          PLATFORM: ${{ inputs.platform }}
          MAIN_PLATFORM: ${{ inputs.main-platform }}
        run: |
          if [[ "$PLATFORM" == "$MAIN_PLATFORM" ]]; then
            # Main platform runs all tests including multi-card
            echo "enabled-skus=wh_n150,wh_n150_civ2,wh_n300,wh_n300_civ2,wh_n300_perf,wh_llmbox_perf_release,wh_galaxy_release,bh_p100,bh_p150,bh_p150_perf,bh_llmbox,bh_loudbox,bh_p300" >> "$GITHUB_OUTPUT"
          else
            # Other platforms run only single-card tests
            echo "enabled-skus=wh_n150,wh_n150_civ2,wh_n300,wh_n300_civ2,wh_n300_perf" >> "$GITHUB_OUTPUT"
          fi

  release-demo-tests:
    needs: [build-artifact-tracy, determine-test-skus]
    if: ${{ inputs.tag-version != '' }}
    secrets:
      HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
      SFTP_BENCHMARK_WRITER_HOSTNAME: ${{ secrets.SFTP_BENCHMARK_WRITER_HOSTNAME }}
      SFTP_BENCHMARK_WRITER_KEY: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
      SFTP_BENCHMARK_WRITER_USERNAME: ${{ secrets.SFTP_BENCHMARK_WRITER_USERNAME }}
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    uses: ./.github/workflows/release-demo-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact-tracy.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact-tracy.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact-tracy.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.determine-test-skus.outputs.enabled-skus }}
      mlperf-read-only: ${{ !(github.ref == 'refs/heads/stable' || startsWith(github.ref, 'refs/tags/v')) }}
      tests-yaml-gist-url: ${{ inputs.tests-yaml-gist-url }}

  # We need to tag the image used to reproduce the release later
  push-image-to-ghcr:
    needs: build-artifact-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Push dev docker image to GHCR with release tag
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.build-artifact-release.outputs.dev-docker-image }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          new-tag: ${{ inputs.tag-version || 'latest' }}
  create-docker-release-image:
    strategy:
      matrix:
        image: [release, release-models]
    needs:
      - build-artifact-release
      - parse-platform
    uses: ./.github/workflows/publish-release-image.yaml
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable' || startsWith(github.ref, 'refs/tags/v') || inputs.dry-run }}
    with:
      platform: ${{ needs.parse-platform.outputs.distro }}-${{ needs.parse-platform.outputs.version }}
      version: ${{ inputs.tag-version }}
      tag-latest: ${{ inputs.is-release-candidate != 'true' }}
      wheel-artifact-name: ${{ needs.build-artifact-release.outputs.wheel-artifact-name }}
      dry-run: ${{ inputs.dry-run }}
      image: ${{ matrix.image }}

  # Only run docs release once per run on the main platform
  docs-release:
    needs: [build-artifact-release, parse-platform]
    if: ${{ inputs.platform == inputs.main-platform && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable' || startsWith(github.ref, 'refs/tags/v') || inputs.dry-run) }}
    uses: ./.github/workflows/docs-latest-public.yaml
    with:
      version: ${{ inputs.tag-version }}
      docker-image: ${{ needs.build-artifact-release.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact-release.outputs.wheel-artifact-name }}
      dry-run: ${{ inputs.dry-run }}

  publish-wheels:
    name: "Publish wheels to internal PyPI"
    needs: build-artifact-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for AWS OIDC
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.PYPI_ROLE }}
          aws-region: ${{ secrets.PYPI_REGION }}

      - name: Install s3pypi
        run: |
          pip install s3pypi

      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build-artifact-release.outputs.wheel-artifact-name }}
          path: ./wheels

      - name: Publish wheels to internal PyPI
        if: ${{ github.ref == 'refs/heads/main' && !inputs.dry-run }}
        run: |
          found_wheel_files=$(find ./wheels -type f -name "*.whl" -exec realpath {} \;)
          for wheel in $found_wheel_files; do
            echo "Publishing wheel: $wheel"
            s3pypi upload "$wheel" --put-root-index --bucket ${{ secrets.PYPI_BUCKET }}
          done
