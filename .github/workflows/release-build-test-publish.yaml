name: "[internal] Release, build, test, and publish"
on:
  workflow_call:
    inputs:
      dry-run:
        description: "Dry-run: If true, do not upload tag or draft release."
        required: false
        default: false
        type: boolean
      platform:
        description: "Platform for building and testing (e.g., 'Ubuntu 22.04', 'Ubuntu 24.04')"
        required: false
        default: "Ubuntu 22.04"
        type: string
      tag-version:
        description: "Tag version to create, e.g. 'rc' for release candidate, 'dev' for dev development, or '' for normal release"
        required: true
        default: ""
        type: string
      is-release-candidate:
        description: "If true, this is a release candidate, and some steps will be skipped"
        required: false
        default: "false"
        type: string
      main-platform:
        description: "Main platform that all test workflows should run on"
        required: false
        default: "Ubuntu 22.04"
        type: string
      tests-yaml-gist-url:
        description: "URL to gist containing release_tests.yaml (optional, falls back to local file if not provided)"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  checks: read

jobs:
  # Parse platform to extract distro/version for downstream workflows.
  # NOTE: This parse-platform is needed because create-docker-release-image and
  # release-docs jobs use the parsed distro/version values to construct image tags.
  # This is different from workflows that just pass platform to build-artifact.yaml.
  parse-platform:
    runs-on: ubuntu-latest
    outputs:
      distro: ${{ steps.parse.outputs.distro }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false
      - id: parse
        uses: ./.github/actions/parse-platform
        with:
          platform: ${{ inputs.platform }}

  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  build-artifact:
    needs: [check-harbor, parse-platform]
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-wheel: true
      tracy: false
      fetch-depth: 0
      skip-tt-train: false
      enable-lto: false

  build-artifact-tracy:
    name: "Build artifact with tracy (for testing)"
    needs: parse-platform
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-wheel: true
      tracy: true
      wheel-ref: ${{ format('refs/tags/{0}', inputs.tag-version) }}
      fetch-depth: 0
      skip-tt-train: false
      enable-lto: false

  build-artifact-release:
    name: "Build artifact for release (without tracy)"
    needs: parse-platform
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-wheel: true
      tracy: false
      wheel-ref: ${{ format('refs/tags/{0}', inputs.tag-version) }}
      fetch-depth: 0
      skip-tt-train: false
      enable-lto: false

  determine-test-skus:
    runs-on: ubuntu-latest
    outputs:
      enabled-skus: ${{ steps.select-skus.outputs.enabled-skus }}
    steps:
      - name: Select SKUs based on platform
        id: select-skus
        run: |
          if [[ "${{ inputs.platform }}" == "${{ inputs.main-platform }}" ]]; then
            # Main platform runs all tests including multi-card
            echo "enabled-skus=wh_n150,wh_n150_civ2,wh_n300,wh_n300_civ2,wh_n300_perf,wh_llmbox_perf,wh_galaxy,bh_p100,bh_p150,bh_p150_perf,bh_loudbox,bh_p300" >> "$GITHUB_OUTPUT"
          else
            # Other platforms run only single-card tests
            echo "enabled-skus=wh_n150,wh_n150_civ2,wh_n300,wh_n300_civ2,wh_n300_perf" >> "$GITHUB_OUTPUT"
          fi

  release-demo-tests:
    needs: [check-harbor, build-artifact-tracy, determine-test-skus]
    if: ${{ inputs.tag-version != '' }}
    secrets: inherit
    uses: ./.github/workflows/release-demo-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact-tracy.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact-tracy.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact-tracy.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.determine-test-skus.outputs.enabled-skus }}
      mlperf-read-only: ${{ !(github.ref == 'refs/heads/stable' || startsWith(github.ref, 'refs/tags/v')) }}
      tests-yaml-gist-url: ${{ inputs.tests-yaml-gist-url }}

  # Polls the "RTL Sim CI test" GitHub check on stable HEAD (posted by the
  # tt-umd-simulators polling agent -- GitLab issue #71). Runs in parallel
  # with release-demo-tests so other tests still surface failures, and is
  # non-blocking for now (continue-on-error). 60-min budget covers the sim
  # pipeline's typical 30-60 min runtime.
  #
  # Only runs when github.ref == refs/heads/stable. Other paths (cron-on-main
  # dev release, manual dispatches on main) tag artifacts from github.sha per
  # release-verify-or-create-tag.yaml line 73, so a stable-HEAD check would
  # give a false-green for them.
  check-rtl-sim-status:
    needs: [build-artifact-tracy, determine-test-skus]
    # This reusable workflow runs as a per-platform matrix, but the RTL sim
    # check is platform-independent. Gate to the main platform so only one job
    # files, avoiding two concurrent invocations racing to create duplicate
    # tickets (the search-then-create de-dup is not atomic).
    if: ${{ github.ref == 'refs/heads/stable' && inputs.platform == inputs.main-platform }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      # Needed for create_jira_issue.py below.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Verify RTL Sim CI test check is green on stable HEAD
        id: rtl-sim
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail

          SHA=$(gh api repos/tenstorrent/tt-metal/branches/stable --jq .commit.sha)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Checking 'RTL Sim CI test' check on stable HEAD $SHA"

          # Record the failure for the downstream Jira step. Kept as step
          # outputs so the poll step can exit 0 (continue-on-error already makes
          # this job non-blocking) and let the Jira/re-assert steps run.
          emit_failure() {  # $1=conclusion  $2=url  $3=detail
            # $3 is arbitrary external check text; use a random delimiter so it
            # cannot collide with a line in the content and corrupt the output.
            local d="DETAIL_EOF_${RANDOM}${RANDOM}${RANDOM}"
            {
              echo "sim-failed=true"
              echo "conclusion=$1"
              echo "url=$2"
              echo "detail<<$d"
              printf '%s\n' "$3"
              echo "$d"
            } >> "$GITHUB_OUTPUT"
          }

          for i in $(seq 1 120); do  # 120 * 30s = 60 min
            read -r STATUS CONCLUSION URL < <(
              gh api "repos/tenstorrent/tt-metal/commits/$SHA/check-runs?check_name=RTL+Sim+CI+test&filter=latest" \
                --jq '(.check_runs[0] // {}) | "\(.status // "missing") \(.conclusion // "-") \(.html_url // "-")"'
            )
            case "$STATUS:$CONCLUSION" in
              completed:success)
                echo "::notice::Check passed on $SHA. $URL"
                echo "sim-failed=false" >> "$GITHUB_OUTPUT"
                exit 0 ;;
              completed:*)
                echo "::error::Check on $SHA: conclusion=$CONCLUSION. $URL"
                # Per-test detail the polling agent embeds in the check output
                # (output.summary / output.text) from failed_tests.tsv. Empty
                # until the sim pipeline forwards it; the ticket still records
                # the failure and links to the sim results.
                DETAIL=$(gh api "repos/tenstorrent/tt-metal/commits/$SHA/check-runs?check_name=RTL+Sim+CI+test&filter=latest" \
                  --jq '[.check_runs[0].output.summary, .check_runs[0].output.text] | map(select(. != null and . != "")) | join("\n")' 2>/dev/null || true)
                emit_failure "$CONCLUSION" "$URL" "$DETAIL"
                exit 0 ;;
            esac
            echo "  [$i/120] status=$STATUS — re-polling in 30s ($URL)"
            sleep 30
          done

          echo "::error::Timed out after 60 min on $SHA (last status=$STATUS, last URL=$URL)."
          emit_failure "timed_out (no result within 60 min)" "$URL" ""
          exit 0

      # Files one RELEASE issue per *relevant* failed test (see the relevance
      # map .github/actions/scripts/ai_ip_tests.json). Falls back to a
      # single aggregate ticket if the check carried no per-test detail.
      - name: File Jira issue(s) for relevant failed RTL sim tests
        if: ${{ steps.rtl-sim.outputs.sim-failed == 'true' }}
        env:
          JIRA_BASE_URL: "https://tenstorrent.atlassian.net"
          JIRA_USER_EMAIL: ${{ secrets.JIRA_RELEASE_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_RELEASE_API_TOKEN }}
          JIRA_PROJECT_KEY: "RELEASE"
          JIRA_ISSUE_TYPE: "Bug"
          RTL_SIM_DETAIL: ${{ steps.rtl-sim.outputs.detail }}
          RTL_SIM_SHA: ${{ steps.rtl-sim.outputs.sha }}
          RTL_SIM_URL: ${{ steps.rtl-sim.outputs.url }}
          RTL_SIM_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${JIRA_USER_EMAIL}" ] || [ -z "${JIRA_API_TOKEN}" ]; then
            echo "::notice::JIRA_RELEASE_* secrets not configured; skipping Jira filing."
            exit 0
          fi
          python3 .github/actions/scripts/file_rtl_sim_jira.py

      - name: Re-assert sim failure
        if: ${{ steps.rtl-sim.outputs.sim-failed == 'true' }}
        run: |
          echo "RTL sim check failed on stable HEAD; a RELEASE Jira issue was filed/updated."
          exit 1

  # We need to tag the image used to reproduce the release later
  push-image-to-ghcr:
    needs: build-artifact-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
      - name: Push dev docker image to GHCR with release tag
        uses: ./.github/actions/push-latest-image-to-ghcr
        with:
          docker-image-tag: ${{ needs.build-artifact-release.outputs.dev-docker-image }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          new-tag: ${{ inputs.tag-version || 'latest' }}

  create-docker-release-image:
    strategy:
      matrix:
        image: [release, release-models]
    needs:
      - build-artifact-release
      - check-harbor
      - parse-platform
    uses: ./.github/workflows/publish-release-image.yaml
    secrets: inherit
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable' || startsWith(github.ref, 'refs/tags/v') || inputs.dry-run }}
    with:
      platform: ${{ needs.parse-platform.outputs.distro }}-${{ needs.parse-platform.outputs.version }}
      version: ${{ inputs.tag-version }}
      tag-latest: ${{ inputs.is-release-candidate != 'true' }}
      wheel-artifact-name: ${{ needs.build-artifact-release.outputs.wheel-artifact-name }}
      dry-run: ${{ inputs.dry-run }}
      image: ${{ matrix.image }}
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}

  resolve-docs-version:
    runs-on: ubuntu-latest
    outputs:
      docs-version: ${{ steps.set-version.outputs.docs-version }}
    steps:
      - name: Resolve docs deployment version
        id: set-version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/stable" ]]; then
            echo "docs-version=latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "docs-version=${{ inputs.tag-version }}" >> "$GITHUB_OUTPUT"
          else
            # Fallback should not happen due to release-docs guard, but keeps output valid.
            echo "docs-version=latest" >> "$GITHUB_OUTPUT"
          fi

  # Only run docs release once per run on the main platform.
  # Restricted to main/stable or final release tags (vX.Y.Z); pre-release tags
  # like v0.69.0-rc1 or v0.68.0-dev20260319 are excluded so they don't accumulate
  # on gh-pages and inflate the Pages artifact past the 10 GB limit. See #45440.
  release-docs:
    needs: [build-artifact-release, parse-platform, resolve-docs-version]
    if: ${{ inputs.platform == inputs.main-platform && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable' || (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')) || inputs.dry-run) }}
    uses: ./.github/workflows/docs-latest-public.yaml
    with:
      version: ${{ needs.resolve-docs-version.outputs.docs-version }}
      docker-image: ${{ needs.build-artifact-release.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.build-artifact-release.outputs.wheel-artifact-name }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit

  publish-wheels:
    name: "Publish wheels to internal PyPI"
    needs: build-artifact-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for AWS OIDC
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PYPI_ROLE }}
          aws-region: ${{ secrets.PYPI_REGION }}

      - name: Install s3pypi
        run: |
          pip install s3pypi

      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build-artifact-release.outputs.wheel-artifact-name }}
          path: ./wheels

      - name: Publish wheels to internal PyPI
        if: ${{ github.ref == 'refs/heads/main' && !inputs.dry-run }}
        run: |
          found_wheel_files=$(find ./wheels -type f -name "*.whl" -exec realpath {} \;)
          for wheel in $found_wheel_files; do
            echo "Publishing wheel: $wheel"
            s3pypi upload "$wheel" --put-root-index --bucket ${{ secrets.PYPI_BUCKET }}
          done
