name: "Blackhole post-commit tests"

on:
  workflow_call:
    inputs:
      runner-label:
        description: 'Valid inputs: ["P100", "P150"] (both cards), ["P100"] (P100 only), ["P150"] (P150 only)'
        required: false
        type: string
        default: '["P150"]'
      enable-watcher:
        description: "Enable watcher in BH Post commit"
        default: false
        type: boolean
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: string
        default: "Release"
        description: "Build type configuration (Release, Debug, RelWithDebInfo, ASan, TSan)"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      run-ttnn-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run TTNN unit tests"
      run-models-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run model unit tests"
      run-profiler-regression:
        required: false
        type: boolean
        default: true
        description: "Run profiler regression tests"
      run-umd-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run UMD unit tests"
      run-ops-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run ops unit tests"
      run-tt-cnn-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run TT-CNN unit tests"
      run-blackhole-multi-card-fast-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run Blackhole multi-card fast unit tests"
      # Pre-built artifacts (optional - if provided, skips build-artifact job)
      dev-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built dev Docker image tag (skips build if provided)"
      build-artifact-name:
        required: false
        type: string
        default: ""
        description: "Pre-built build artifact name (skips build if provided)"
      wheel-artifact-name:
        required: false
        type: string
        default: ""
        description: "Pre-built wheel artifact name (skips build if provided)"
    secrets:
      REDIS_CCACHE_PASSWORD:
        required: false
      REDIS_PASSWORD:
        required: false
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT:
        required: false
  workflow_dispatch:
    inputs:
      runner-label:
        description: 'Valid inputs: ["P100", "P150"] (both cards), ["P100"] (P100 only), ["P150"] (P150 only)'
        required: false
        type: string
        default: '["P150"]'
      enable-watcher:
        description: "Enable watcher in BH Post commit"
        default: false
        type: boolean
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        description: "Build type for the workflow"
        required: false
        default: Release
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
      enable-lto:
        required: false
        default: false
        type: boolean
        description: "Enable Link Time Optimization (LTO)"
      run-ttnn-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run TTNN unit tests"
      run-models-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run model unit tests"
      run-profiler-regression:
        required: false
        type: boolean
        default: true
        description: "Run profiler regression tests"
      run-umd-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run UMD unit tests"
      run-ops-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run ops unit tests"
      run-tt-cnn-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run TT-CNN unit tests"
      run-blackhole-multi-card-fast-unit-tests:
        required: false
        type: boolean
        default: true
        description: "Run Blackhole multi-card fast unit tests"
  schedule:
    - cron: "0 */4 * * *"
    - cron: "0 7 * * *" # Every day at 7:00 UTC
  # Pause this since not enough runners to support every commit to main
  # push:
  #  branches: ["main"]

run-name: >-
  ${{ inputs.runner-label == '["P100"]' && 'Blackhole post-commit tests (P100)'
  || (inputs.enable-watcher == true && 'Blackhole post-commit tests (watcher enabled)')
  || ((github.event_name == 'schedule' && github.event.schedule == '0 7 * * *')
  && 'Blackhole post-commit tests (P100 nightly)')
  || 'Blackhole post-commit tests' }}

permissions:
  actions: read
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  packages: write
  checks: write

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      civ2-matrix: ${{ steps.set-matrix.outputs.civ2-matrix }}
      civ2-viommu-matrix: ${{ steps.set-matrix.outputs.civ2-viommu-matrix }}
    steps:
      - id: set-matrix
        shell: bash
        env:
          RUNNER_LABEL: ${{ inputs.runner-label || '["P150"]' }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          # Store runner-label with fallback in a variable for reuse
          runner_label="$RUNNER_LABEL"

          # Check if this is a scheduled P100-only run at 7:00 UTC (daily)
          if [[ "$EVENT_NAME" = "schedule" && "$EVENT_SCHEDULE" = "0 7 * * *" ]]; then
            matrix='["P100"]'
            civ2_matrix='["P100a"]'
            civ2_viommu_matrix='["P100a-viommu"]'
          else
            matrix="$runner_label"
            civ2_matrix="$runner_label"
            civ2_viommu_matrix="$runner_label"

            # Transform P100 to P100a for civ2_matrix (only if P100 exists, not P100a)
            if [[ "$runner_label" == *"P100"* && "$runner_label" != *"P100a"* ]]; then
              civ2_matrix=$(echo "$civ2_matrix" | sed 's/"P100"/"P100a"/g')
            fi

            # Transform P150 to P150b for civ2_matrix (only if P150 exists, not P150b)
            if [[ "$runner_label" == *"P150"* && "$runner_label" != *"P150b"* ]]; then
              civ2_matrix=$(echo "$civ2_matrix" | sed 's/"P150"/"P150b"/g')
            fi

            # Transform P100 to P100a for civ2_viommu_matrix (only if P100 exists, not P100a)
            if [[ "$runner_label" == *"P100"* && "$runner_label" != *"P100a"* ]]; then
              civ2_viommu_matrix=$(echo "$civ2_viommu_matrix" | sed 's/"P100"/"P100a-viommu"/g')
            fi

            # Transform P150 to P150b-viommu for civ2_viommu_matrix (only if P150 exists, not P150b)
            if [[ "$runner_label" == *"P150"* && "$runner_label" != *"P150b"* ]]; then
              civ2_viommu_matrix=$(echo "$civ2_viommu_matrix" | sed 's/"P150"/"P150b-viommu"/g')
            fi
          fi
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "civ2-matrix=$civ2_matrix" >> $GITHUB_OUTPUT
          echo "civ2-viommu-matrix=$civ2_viommu_matrix" >> $GITHUB_OUTPUT

          # Print matrices
          echo "Final matrix values:"
          echo "matrix: $matrix"
          echo "civ2_matrix: $civ2_matrix"

  build-artifact:
    if: ${{ inputs.dev-docker-image == '' }}
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets:
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      tracy: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-umd-tests: true
      enable-lto: ${{ inputs.enable-lto || false }}

  resolve-artifacts:
    runs-on: ubuntu-latest
    needs: [build-artifact]
    if: ${{ !cancelled() && (inputs.dev-docker-image != '' || needs.build-artifact.result == 'success') }}
    outputs:
      dev-docker-image: ${{ steps.resolve.outputs.dev-docker-image }}
      build-artifact-name: ${{ steps.resolve.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ steps.resolve.outputs.wheel-artifact-name }}
    steps:
      - id: resolve
        env:
          INPUT_DEV_DOCKER_IMAGE: ${{ inputs.dev-docker-image }}
          INPUT_BUILD_ARTIFACT_NAME: ${{ inputs.build-artifact-name }}
          INPUT_WHEEL_ARTIFACT_NAME: ${{ inputs.wheel-artifact-name }}
          NEEDS_DEV_DOCKER_IMAGE: ${{ needs.build-artifact.outputs.dev-docker-image }}
          NEEDS_BUILD_ARTIFACT_NAME: ${{ needs.build-artifact.outputs.build-artifact-name }}
          NEEDS_WHEEL_ARTIFACT_NAME: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
        run: |
          # Validate pre-built artifact inputs - all three must be provided together
          if [[ -n "$INPUT_DEV_DOCKER_IMAGE" || -n "$INPUT_BUILD_ARTIFACT_NAME" || -n "$INPUT_WHEEL_ARTIFACT_NAME" ]]; then
            if [[ -z "$INPUT_DEV_DOCKER_IMAGE" || -z "$INPUT_BUILD_ARTIFACT_NAME" || -z "$INPUT_WHEEL_ARTIFACT_NAME" ]]; then
              echo "Error: When using pre-built artifacts, all three inputs must be provided:"
              echo "  - dev-docker-image: '$INPUT_DEV_DOCKER_IMAGE'"
              echo "  - build-artifact-name: '$INPUT_BUILD_ARTIFACT_NAME'"
              echo "  - wheel-artifact-name: '$INPUT_WHEEL_ARTIFACT_NAME'"
              exit 1
            fi
          fi

          # Use provided artifacts if available, otherwise use built artifacts
          if [[ -n "$INPUT_DEV_DOCKER_IMAGE" ]]; then
            echo "dev-docker-image=$INPUT_DEV_DOCKER_IMAGE" >> "$GITHUB_OUTPUT"
            echo "build-artifact-name=$INPUT_BUILD_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
            echo "wheel-artifact-name=$INPUT_WHEEL_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "dev-docker-image=$NEEDS_DEV_DOCKER_IMAGE" >> "$GITHUB_OUTPUT"
            echo "build-artifact-name=$NEEDS_BUILD_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
            echo "wheel-artifact-name=$NEEDS_WHEEL_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          fi

  run-profiler-regression:
    needs: [resolve-artifacts, generate-matrix]
    if: ${{ always() && !cancelled() && (inputs.run-profiler-regression == true || github.event_name == 'schedule') }}
    uses: ./.github/workflows/run-profiler-regression.yaml
    secrets:
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-matrix.outputs.civ2-matrix) }}
    with:
      arch: "blackhole"
      runner-label: ${{ matrix.test-group }}
      post_commit_only: true
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
  umd-unit-tests:
    needs: [resolve-artifacts, generate-matrix]
    if: ${{ always() && !cancelled() && (inputs.run-umd-unit-tests == true || github.event_name == 'schedule') }}
    secrets:
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    uses: ./.github/workflows/umd-unit-tests.yaml
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-matrix.outputs.civ2-matrix) }}
    with:
      arch: blackhole
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
  models-unit-tests:
    needs: [resolve-artifacts, generate-matrix]
    if: ${{ always() && !cancelled() && (inputs.run-models-unit-tests == true || github.event_name == 'schedule') }}
    uses: ./.github/workflows/models-post-commit.yaml
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    with:
      arch: blackhole
      runner-label: ${{ matrix.test-group }}
      secrets:
        SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
  ttnn-unit-tests:
    needs: [resolve-artifacts, generate-matrix]
    if: ${{ always() && !cancelled() && (inputs.run-ttnn-unit-tests == true || github.event_name == 'schedule') }}
    secrets:
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    uses: ./.github/workflows/ttnn-post-commit.yaml
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-matrix.outputs.civ2-matrix) }}
    with:
      enabled-skus: ${{ (matrix.test-group == 'P100' || matrix.test-group == 'P100a') && 'bh_p100' || 'bh_p150b_civ2' }}
      secrets:
        REDIS_CCACHE_PASSWORD: ${{ secrets.REDIS_CCACHE_PASSWORD }}
        SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      timeout-minutes-override: ${{ inputs.enable-watcher && 120 || 0 }}
  ops-unit-tests:
    needs: [resolve-artifacts, generate-matrix]
    if: ${{ always() && !cancelled() && (inputs.run-ops-unit-tests == true || github.event_name == 'schedule') }}
    secrets:
      REDIS_CCACHE_PASSWORD: ${{ secrets.REDIS_CCACHE_PASSWORD }}
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-matrix.outputs.civ2-matrix) }}
    uses: ./.github/workflows/ops-post-commit.yaml
    with:
      arch: blackhole
      runner-label: ${{ matrix.test-group }}
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      secrets:
        SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
      enable-watcher: ${{ inputs.enable-watcher || false }}

  # TT-CNN Unit Tests
  tt-cnn-unit-tests:
    needs: [resolve-artifacts, generate-matrix]
    if: ${{ always() && !cancelled() && (inputs.run-tt-cnn-unit-tests == true || github.event_name == 'schedule') }}
    secrets:
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    uses: ./.github/workflows/tt-cnn-post-commit.yaml
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.generate-matrix.outputs.civ2-matrix) }}
    with:
      arch: blackhole
      runner-label: ${{ matrix.test-group }}
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      secrets:
        SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
      enable-watcher: ${{ inputs.enable-watcher || false }}

  # Multi-card post-commit tests
  blackhole-multi-card-fast-unit-tests:
    if: ${{ always() && !cancelled() && (!contains(fromJson(needs.generate-matrix.outputs.matrix), 'P100') || github.event_name == 'schedule' || inputs.run-blackhole-multi-card-fast-unit-tests == true) }}
    needs: [resolve-artifacts, generate-matrix]
    secrets:
      SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
    uses: ./.github/workflows/blackhole-multi-card-unit-tests-impl.yaml
    strategy:
      fail-fast: false
      matrix:
        test-group: ["BH-LLMBox", "BH-LoudBox", "P300-viommu"]
    with:
      arch: blackhole
      runner-label: ${{ matrix.test-group }}
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      fast-only: true
