name: "BrAIn Slack Sync"

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Number of calendar days of history to fetch (ignored if after_ts is set)"
        required: false
        default: "7"
        type: string
      after_ts:
        description: "Slack timestamp — only fetch messages AFTER this time (overrides days_back)"
        required: false
        default: ""
        type: string
      before_ts:
        description: "Slack timestamp — only fetch messages BEFORE this time"
        required: false
        default: ""
        type: string

jobs:
  fetch-slack-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Slack messages
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          INPUT_DAYS_BACK: ${{ inputs.days_back }}
          INPUT_AFTER_TS: ${{ inputs.after_ts }}
          INPUT_BEFORE_TS: ${{ inputs.before_ts }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import time
          import urllib.request
          import urllib.parse
          import urllib.error

          SLACK_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          DAYS_BACK = os.environ.get("INPUT_DAYS_BACK", "7")
          AFTER_TS = os.environ.get("INPUT_AFTER_TS", "")
          BEFORE_TS = os.environ.get("INPUT_BEFORE_TS", "")

          CHANNELS = ["C05GRJC4J4A", "C08SJ7MGESY"]

          def compute_oldest():
              """Return the 'oldest' param for conversations.history."""
              if AFTER_TS:
                  return AFTER_TS
              days = int(DAYS_BACK) if DAYS_BACK else 7
              return str(time.time() - days * 86400)

          def fetch_channel(channel_id):
              """Fetch all messages from a channel, paginated."""
              all_messages = []
              cursor = None
              oldest = compute_oldest()

              while True:
                  params = {
                      "channel": channel_id,
                      "limit": "200",
                      "oldest": oldest,
                  }
                  if BEFORE_TS:
                      params["latest"] = BEFORE_TS
                  if cursor:
                      params["cursor"] = cursor

                  url = "https://slack.com/api/conversations.history?" + urllib.parse.urlencode(params)
                  req = urllib.request.Request(url, headers={
                      "Authorization": f"Bearer {SLACK_TOKEN}",
                      "Content-Type": "application/json; charset=utf-8",
                  })

                  try:
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          data = json.loads(resp.read().decode("utf-8"))
                  except urllib.error.HTTPError as e:
                      print(f"HTTP error {e.code} for channel {channel_id}: {e.read().decode()}")
                      raise

                  if not data.get("ok"):
                      raise RuntimeError(f"Slack API error for {channel_id}: {data.get('error', data)}")

                  messages = data.get("messages", [])
                  all_messages.extend(messages)
                  print(f"  Fetched {len(messages)} messages (total so far: {len(all_messages)})")

                  # Pagination
                  meta = data.get("response_metadata", {})
                  cursor = meta.get("next_cursor", "")
                  if not cursor:
                      break

              return all_messages

          os.makedirs("slack_output", exist_ok=True)

          for ch in CHANNELS:
              print(f"Fetching channel {ch} ...")
              msgs = fetch_channel(ch)
              out_path = f"slack_output/slack_{ch}.json"
              with open(out_path, "w") as f:
                  json.dump(msgs, f)
              print(f"  Wrote {len(msgs)} messages to {out_path}")

          print("Done.")
          PYEOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brain-slack-messages
          path: slack_output/
          retention-days: 30
