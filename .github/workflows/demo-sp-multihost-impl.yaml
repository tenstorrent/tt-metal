name: "[internal] Demo SP Multihost Pipeline Tests"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      sp-config:
        required: false
        type: string
        default: "sp1"
        description: "Single pod configuration (sp1, sp4, sp5)"

jobs:
  load-test-matrix:
    name: Load Test Matrix for ${{ inputs.sp-config }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter-tests.outputs.matrix }}
      allocation_spec: ${{ steps.extract-allocation.outputs.allocation_spec }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/demo_sp_multihost_tests.yaml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install PyYAML

      - name: Validate SKU exists
        run: |
          if ! grep -q "bh_${{ inputs.sp-config }}:" .github/sku_config.yaml; then
            echo "::error::SKU 'bh_${{ inputs.sp-config }}' not found in .github/sku_config.yaml"
            exit 1
          fi
          echo "✓ SKU 'bh_${{ inputs.sp-config }}' exists in sku_config.yaml"

      - name: Extract allocation configuration from SKU
        id: extract-allocation
        run: |
          {
            echo "allocation_spec<<EOF"
            python3 .github/scripts/utils/extract_allocation_from_sku.py "bh_${{ inputs.sp-config }}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "e2e"

      - name: Build test matrix
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "bh_${{ inputs.sp-config }}" \
            ./.github/sku_config.yaml

      - name: Filter tests by sp_config
        id: filter-tests
        env:
          MATRIX: ${{ steps.build-matrix.outputs.matrix }}
        run: |
          FILTERED=$(echo "$MATRIX" | jq -c --arg sp "${{ inputs.sp-config }}" '[.[] | select(.sp_config == $sp)]')
          if [ "$FILTERED" = "[]" ]; then
            echo "::error::No tests found for sp_config '${{ inputs.sp-config }}' in ${TESTS_YAML_PATH}"
            exit 1
          fi
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$FILTERED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Filtered tests for ${{ inputs.sp-config }}:"
          echo "$FILTERED" | jq .

  multihost-tests:
    name: ${{ matrix.test-group.name }}
    needs: load-test-matrix
    env:
      OMPI_MCA_btl_tcp_if_include: ens5f0np0
      PRTE_MCA_plm_ssh_args: "-o StrictHostKeyChecking=false -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"
      PRTE_MCA_plm_ssh_pass_libpath: /opt/openmpi-v5.0.7-ulfm/lib
      PRTE_MCA_prte_launch_agent: /opt/openmpi-v5.0.7-ulfm/bin/prted
      PRTE_MCA_prte_default_hostfile: /ci/ttrun/hostfile
      PRTE_MCA_prte_fwd_environment: "true"
      PATH: "/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      VIRTUAL_ENV: /opt/venv
      HOME: /home/user
      PIP_CACHE_DIR: /home/user/.cache/pip
      PYTHONPATH: /home/user/tt-metal
      LD_LIBRARY_PATH: /home/user/tt-metal/build/lib
      TT_METAL_RUNTIME_ROOT: /home/user/tt-metal
      TT_METAL_CACHE: /home/user/.cache
    strategy:
      max-parallel: 1  # Run tests sequentially to avoid resource contention
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.test-group.runs_on }}
    outputs:
      test-result: ${{ steps.run-test.outcome }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse docker image
        id: parse-image
        run: |
          IMAGE="${{ inputs.docker-image }}"
          REPOSITORY="${IMAGE%:*}"
          TAG="${IMAGE##*:}"
          echo "repository=$REPOSITORY" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create allocation for ${{ matrix.test-group.name }}
        id: allocation
        uses: ./.github/actions/ttop-create-allocation
        timeout-minutes: 30
        with:
          allocationName: ci-${{ github.run_id }}-${{ inputs.sp-config }}-${{ strategy.job-index }}
          namespace: ttop-ci
          spec: |
            ${{ needs.load-test-matrix.outputs.allocation_spec }}

      - name: Get Allocation data
        uses: ./.github/actions/ttop-get-allocation-data
        id: get-allocation-data
        with:
          allocationName: ci-${{ github.run_id }}-${{ inputs.sp-config }}-${{ strategy.job-index }}
          namespace: ttop-ci

      - name: Create test environment
        uses: ./.github/actions/ttop-create-environment
        timeout-minutes: 5
        with:
          environmentName:  ci-${{ github.run_id }}-${{ inputs.sp-config }}-${{ strategy.job-index }}
          allocationName:  ci-${{ github.run_id }}-${{ inputs.sp-config }}-${{ strategy.job-index }}
          allocationNamespace: ttop-ci
          workerRepository: ${{ steps.parse-image.outputs.repository }}
          workerTag: ${{ steps.parse-image.outputs.tag }}
          useDevHostMount: 'true'
          sharedVolumeEnabled: 'true'

      - name: Setup tt-run for test
        uses: ./.github/actions/ttop-configure-tt-run
        timeout-minutes: 5
        with:
          directory: /ci/ttrun
          mgdFile: /tmp/dummy/doesnotexist.textproto
          copyToWorkers: false
          ranksData: ${{ steps.get-allocation-data.outputs.ranksData }}

      - name: 📦 Download Build Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.build-artifact-name }}
          path: /ci/artifacts

      - name: 🧪 Download Python Wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.wheel-artifact-name }}
          path: /ci/artifacts

      - name: Unpack artifacts & install
        run: |
          # Move the cloned directory to workers. TODO: Clone directly to NFS
          cp -r "$GITHUB_WORKSPACE" /ci/tt-metal
          if ! command -v zstd >/dev/null 2>&1; then
            echo "zstd not found on runner, installing..."
            sudo apt-get update
            sudo apt-get install -y zstd
          fi
          shopt -s globstar nullglob
          build_archives=(/ci/artifacts/**/*.tar.zst)
          echo "Found ${#build_archives[@]} .tar.zst candidate(s) under /ci/artifacts"
          printf ' - %s\n' "${build_archives[@]}"
          if [ ${#build_archives[@]} -eq 0 ]; then
            echo "ERROR: Could not find any .tar.zst under /ci/artifacts"
            echo "Artifact directory layout:"
            ls -R /ci/artifacts
            exit 1
          fi
          BUILD_ARCHIVE="${build_archives[0]}"
          echo "Using build archive: ${BUILD_ARCHIVE}"

          # Unpack build artifact locally as well. Pipeline config generation runs on the runner
          # and expects test binaries under /ci/tt-metal/build/test.
          tar --zstd -xf "${BUILD_ARCHIVE}" -C /ci/tt-metal
          mpirun --pernode cp -r /ci/tt-metal /home/user
          mpirun --pernode git -C /home/user/tt-metal submodule update --init --recursive

          # Unpack artifacts
          mpirun --pernode tar --zstd -xf "${BUILD_ARCHIVE}" -C /home/user/tt-metal
          ttnn_wheels=(/ci/artifacts/**/ttnn-*.whl)
          echo "Found ${#ttnn_wheels[@]} ttnn wheel candidate(s) under /ci/artifacts"
          printf ' - %s\n' "${ttnn_wheels[@]}"
          if [ ${#ttnn_wheels[@]} -eq 0 ]; then
            echo "ERROR: Could not find ttnn-*.whl under /ci/artifacts"
            echo "Artifact directory layout:"
            ls -R /ci/artifacts
            exit 1
          fi
          mpirun --pernode pip install "${ttnn_wheels[@]}"

      - name: Reset cards and validate cluster for ${{ matrix.test-group.name }}
        working-directory: /tmp
        timeout-minutes: 30
        run: |
          MAX_RECOVERY_ATTEMPTS=3

          echo "--- Pre-check: tt-smi visibility on all hosts ---"
          mpirun --pernode --tag-output \
            bash -lc 'echo "$(hostname): $(tt-smi --snapshot_no_tty --snapshot | jq -r .host_info.Driver)"' || true

          for attempt in $(seq 1 "$MAX_RECOVERY_ATTEMPTS"); do
            echo "=== Recovery attempt $attempt of $MAX_RECOVERY_ATTEMPTS ==="

            echo "--- Resetting cards with tt-smi ---"
            if ! mpirun --pernode --tag-output tt-smi -glx_reset; then
              echo "WARNING: Reset failed on attempt $attempt"
              if [ "$attempt" -eq "$MAX_RECOVERY_ATTEMPTS" ]; then
                echo "ERROR: Reset failed after $MAX_RECOVERY_ATTEMPTS attempts"
                exit 1
              fi
              echo "Sleeping 30s before retry..."
              sleep 30
              continue
            fi

            echo "--- Sleeping 5s after reset to allow links/services to settle ---"
            sleep 5

            echo "--- Running cluster validation ---"
            if mpirun --pernode --tag-output \
              /home/user/tt-metal/build/tools/scaleout/run_cluster_validation \
              --send-traffic \
              --hard-fail \
              --cabling-descriptor-path /data/scaleout_configs/bh_glx_exabox/cabling_descriptor.textproto \
              --deployment-descriptor-path /data/scaleout_configs/bh_glx_exabox/deployment_descriptor.textproto \
              --num-iterations 10; then
              echo "SUCCESS: Recovery completed on attempt $attempt"
              exit 0
            fi

            echo "WARNING: Validation failed on attempt $attempt"
            if [ "$attempt" -lt "$MAX_RECOVERY_ATTEMPTS" ]; then
              echo "Sleeping 30s before retry..."
              sleep 30
            fi
          done

          echo "ERROR: Recovery failed after $MAX_RECOVERY_ATTEMPTS attempts"
          exit 1

      - name: Verify Python env on workers
        working-directory: /tmp
        run: |
          mpirun --pernode --tag-output bash -lc '
            echo "host=$(hostname)"
            echo "python3=$(command -v python3)"
            python3 -V
            python3 -c "import ttnn.device; print(\"ttnn.device import: OK\")"
            python3 -c "import transformers; print(\"transformers=\" + transformers.__version__)"
          '

      - name: ${{ matrix.test-group.name }}
        id: run-test
        timeout-minutes: ${{ matrix.test-group.timeout }}
        working-directory: /ci/tt-metal
        run: |
          # Store command safely using heredoc
          CMD=$(cat << 'EOF'
          ${{ matrix.test-group.cmd }}
          EOF
          )

          echo "Running: ${{ matrix.test-group.name }}"
          echo "$CMD"
          eval "$CMD"

      - name: Delete test environment
        if: always()
        uses: ./.github/actions/ttop-delete-environment
        with:
          environmentName:  ci-${{ github.run_id }}-${{ inputs.sp-config }}-${{ strategy.job-index }}
          namespace: ttop-ci

      - name: Delete allocation
        if: always()
        uses: ./.github/actions/ttop-delete-allocation
        with:
          allocationName:  ci-${{ github.run_id }}-${{ inputs.sp-config }}-${{ strategy.job-index }}
          namespace: ttop-ci

      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
          owner: ${{ matrix.test-group.owner_id }}
