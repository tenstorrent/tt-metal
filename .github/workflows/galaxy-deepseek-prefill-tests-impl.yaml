name: "[internal] Galaxy DeepSeek Prefill tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
      test-type:
        required: false
        type: string
        default: "all"
      exclude-test-group:
        required: false
        type: string
        default: ""
  workflow_dispatch:

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.apply-test-type-filter.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/galaxy_deepseek_prefill_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "demo"
      - name: Build unified test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Apply test-type filter
        id: apply-test-type-filter
        run: |
          MATRIX='${{ steps.build-matrix.outputs.matrix }}'
          # test-type is a comma-separated selection (validated upstream). An empty
          # value or any "all" token means run the full matrix; otherwise keep entries
          # whose test_type OR test_group matches any selected token.
          TEST_TYPE="${{ inputs.test-type }}"
          EXCLUDE_GROUP="${{ inputs.exclude-test-group }}"
          if [ -z "$TEST_TYPE" ] || \
            echo "$TEST_TYPE" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -Fxq "all"; then
            # Optionally drop a test_group from the "all" run (e.g. perf checks that
            # need their own profiler build are run via a separate impl invocation).
            if [ -n "$EXCLUDE_GROUP" ]; then
              MATRIX=$(echo "$MATRIX" | jq -c --arg g "$EXCLUDE_GROUP" '[.[] | select(.test_group != $g)]')
            fi
            echo "matrix<<EOF" >> $GITHUB_OUTPUT
            echo "$MATRIX" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            FILTERED=$(echo "$MATRIX" | jq -c --arg sel "$TEST_TYPE" '
              ($sel | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))) as $tokens
              | [ .[] | . as $e | select(($tokens | index($e.test_type)) or ($tokens | index($e.test_group))) ]
            ')
            if [ "$FILTERED" = "[]" ]; then
              echo "::error::No tests found for test-type '$TEST_TYPE'. Ensure each selected test-type or test-group is defined in the test matrix (TESTS_YAML_PATH=${TESTS_YAML_PATH})."
              exit 1
            fi
            echo "matrix<<EOF" >> $GITHUB_OUTPUT
            echo "$FILTERED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

  galaxy-deepseek-tests:
    needs: load-test-matrix
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: Mark repository as safe directory
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        uses: ./docker-job/.github/actions/run-with-log
        with:
          log-file: generated/test_logs/${{ matrix.test-group.name }}.log
          run: ${{ matrix.test-group.cmd }}
      - name: Publish PCC summary
        if: ${{ !cancelled() }}
        run: |
          PCC_DIR="/tmp/pcc_summaries"
          if [ -d "$PCC_DIR" ]; then
            for f in "$PCC_DIR"/pcc_summary_*.md; do
              [ -f "$f" ] && cat "$f" >> "$GITHUB_STEP_SUMMARY"
            done
          fi
      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
          owner: ${{ matrix.test-group.owner_id }}
      - name: 🤖 AI job summary
        if: always() && !cancelled()
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/job@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE/docker-job",
              "input_dirs": ["generated/test_logs"],
              "output_dir": "generated/ai_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          job-name: ${{ matrix.test-group.name }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()

  ai-run-summary:
    name: "AI Run Summary"
    needs: [load-test-matrix, galaxy-deepseek-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
      - id: ai-run-summary
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/run@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE",
              "input_dir": "ai_job_summaries",
              "output_dir": "ai_run_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          expected-jobs: ${{ needs.load-test-matrix.outputs.matrix }}
          run-result: ${{ needs.galaxy-deepseek-tests.result }}
      - name: Show report
        if: always() && steps.ai-run-summary.outputs.report-file != ''
        continue-on-error: true
        shell: bash
        env:
          REPORT_FILE: ${{ steps.ai-run-summary.outputs.report-file }}
        run: |
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
            cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Report file not found: $REPORT_FILE"
          fi
