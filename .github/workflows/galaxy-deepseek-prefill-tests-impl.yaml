name: "[internal] Galaxy DeepSeek Prefill tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
      test-type:
        required: false
        type: string
        default: "all"
  workflow_dispatch:

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.apply-test-type-filter.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/galaxy_deepseek_prefill_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "demo"
      - name: Build unified test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Apply test-type filter
        id: apply-test-type-filter
        run: |
          MATRIX='${{ steps.build-matrix.outputs.matrix }}'
          if [ "${{ inputs.test-type }}" = "all" ]; then
            echo "matrix<<EOF" >> $GITHUB_OUTPUT
            echo "$MATRIX" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            FILTERED=$(echo "$MATRIX" | jq -c --arg t "${{ inputs.test-type }}" '[.[] | select(.test_type == $t)]')
            if [ "$FILTERED" = "[]" ]; then
              echo "::error::No tests found for test-type '${{ inputs.test-type }}'. Ensure the test-type is defined in the test matrix (TESTS_YAML_PATH=${TESTS_YAML_PATH})."
              exit 1
            fi
            echo "matrix<<EOF" >> $GITHUB_OUTPUT
            echo "$FILTERED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

  galaxy-deepseek-tests:
    needs: load-test-matrix
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: docker-job
      - name: Mark repository as safe directory
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          mkdir -p generated/test_logs
          # tee combined stdout+stderr to a per-leg .log for ai-summary.
          # Brace group: cmd may be multiple shell statements.
          # PIPESTATUS: preserve real exit code (tee would mask it).
          SAFE_NAME=$(echo "${{ matrix.test-group.name }}" | tr ' /' '__')
          LOG_FILE="generated/test_logs/${SAFE_NAME}_${{ job.check_run_id }}.log"
          {
            ${{ matrix.test-group.cmd }}
          } 2>&1 | tee "$LOG_FILE"
          exit ${PIPESTATUS[0]}
      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
          owner: ${{ matrix.test-group.owner_id }}
      - name: 🤖 AI job summary
        if: always() && !cancelled()
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/job@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE/docker-job",
              "input_dirs": ["generated/test_logs"],
              "output_dir": "generated/ai_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          job-name: ${{ matrix.test-group.name }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()

  ai-run-summary:
    name: "AI Run Summary"
    needs: [load-test-matrix, galaxy-deepseek-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: ai-run-summary
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/run@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE",
              "input_dir": "ai_job_summaries",
              "output_dir": "ai_run_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          expected-jobs: ${{ needs.load-test-matrix.outputs.matrix }}
          run-result: ${{ needs.galaxy-deepseek-tests.result }}
      - name: Show report
        if: always() && steps.ai-run-summary.outputs.report-file != ''
        continue-on-error: true
        shell: bash
        env:
          REPORT_FILE: ${{ steps.ai-run-summary.outputs.report-file }}
        run: |
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
            cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Report file not found: $REPORT_FILE"
          fi
