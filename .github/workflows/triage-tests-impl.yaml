name: "[internal] Triage tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
      test-category:
        required: false
        type: string
        default: unit
        description: "Time-budget workflow key passed to verify_time_budget.py (smoke for merge-gate, unit for L2/standalone)."
      enable-watcher:
        description: "Enable watcher"
        default: false
        type: boolean
      enable-lightweight-kernel-asserts:
        description: "Enable lightweight kernel asserts"
        default: false
        type: boolean
      enable-llk-asserts:
        description: "Enable LLK asserts"
        default: false
        type: boolean
      run-hang-report-test:
        description: "true: run ONLY the hang-report test; false: run only the core triage tests"
        default: false
        type: boolean

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.apply-filters.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ${{ inputs.test-category == 'smoke' && './tests/pipeline_reorg/triage_smoke_merge_gate_tests.yaml' || './tests/pipeline_reorg/triage_tests.yaml' }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "${{ inputs.test-category }}"
      - name: Build unified test matrix based on enabled SKUs
        id: prepare
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Select hang-report vs core triage rows
        id: apply-filters
        env:
          MATRIX: ${{ steps.prepare.outputs.matrix }}
          RUN_HANG_REPORT: ${{ inputs.run-hang-report-test }}
        run: |
          # run-hang-report-test selects which rows run (they are disjoint):
          #   true  -> only the hang-report test (nightly's unique coverage)
          #   false -> only the core triage tests (already gated on merge-gate)
          if [[ "${{ inputs.test-category }}" == "smoke" ]]; then
            selected="$MATRIX"
          elif [[ "$RUN_HANG_REPORT" == "true" ]]; then
            selected=$(echo "$MATRIX" | jq -c '[.[] | select((.tags // []) | index("hang-report"))]')
          else
            selected=$(echo "$MATRIX" | jq -c '[.[] | select((.tags // []) | index("hang-report") | not)]')
          fi
          count=$(echo "$selected" | jq 'length')
          if [[ "$count" -eq 0 ]]; then
            echo "::warning::No triage tests selected for enabled SKU(s) '${{ inputs.enabled-skus }}'; matrix is empty and jobs will be skipped."
          fi
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$selected" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  triage-tests:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        LOGURU_LEVEL: INFO
        TT_LOGGER_LEVEL: warn
        PYTHONPATH: /work
        TT_METAL_HOME: /work
        ARCH_NAME: ${{ contains(matrix.test-group.sku, 'bh_') && 'blackhole' || 'wormhole_b0' }}
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        LSAN_OPTIONS: suppressions=/usr/share/tt-metalium/lsan.supp
        TT_METAL_RESET_DEVICE_AFTER_HANG: "1"
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: "--device /dev/tenstorrent -e TT_GH_CI_INFRA"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher }}
          enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts }}
          auto-triage: false # Disable auto-triage because we need to run triage tests explicitly
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          mkdir -p generated/test_reports
          uv pip install -r tools/triage/requirements.txt
          echo "${{ matrix.test-group.cmd }}"
          ${{ matrix.test-group.cmd }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - name: Generate test annotations on failure
        uses: tenstorrent/tt-metal/.github/actions/generate-gtest-failure-message@main
        if: ${{ failure() }}
