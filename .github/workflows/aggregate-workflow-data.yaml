name: (triage) Aggregate Workflow Data
on:
  push:
    branches:
      - mchiou/0-aggregate-workflow-report
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back for workflow runs'
        required: false
        default: '15'
      force-fresh:
        description: 'Force fresh fetch (skip using past artifacts and redownload everything)'
        required: false
        type: boolean
        default: false
      slack-channel-id:
        description: 'Override Slack channel ID for notifications (default: C08SJ7MGESY)'
        required: false
        default: 'C08SJ7MGESY'
      fake-regressions-json:
        description: |
          (Testing only) JSON array of ≤3 fake regression objects. When set, skips fetch+analyze
          and sends these directly to Slack + auto-triage. Max 3 entries enforced.
          Example: [{"name":"Fake Pipeline A","workflow_path":".github/workflows/sanity-tests.yaml","failing_jobs":[{"name":"Fake Job 1","url":"https://github.com/tenstorrent/tt-metal/actions/runs/1"}]},{"name":"Fake Pipeline B","workflow_path":".github/workflows/blackhole-post-commit.yaml","failing_jobs":[{"name":"Fake Job 2","url":"https://github.com/tenstorrent/tt-metal/actions/runs/2"}]},{"name":"Fake Pipeline C","workflow_path":".github/workflows/galaxy-perf-tests.yaml","failing_jobs":[{"name":"Fake Job 3","url":"https://github.com/tenstorrent/tt-metal/actions/runs/3"}]}]
        required: false
        default: ''

jobs:
  fetch-data:
    if: ${{ !github.event.inputs['fake-regressions-json'] }}
    runs-on: ubuntu-latest
    outputs:
      cache-path: ${{ steps.fetch.outputs.cache-path }}
      commits-path: ${{ steps.fetch.outputs.commits-path }}
      annotations-root: ${{ steps.fetch.outputs.annotations-root }}
      annotations-index-path: ${{ steps.fetch.outputs.annotations-index-path }}
      gtest-logs-root: ${{ steps.fetch.outputs.gtest-logs-root }}
      gtest-logs-index-path: ${{ steps.fetch.outputs.gtest-logs-index-path }}
      other-logs-root: ${{ steps.fetch.outputs.other-logs-root }}
      other-logs-index-path: ${{ steps.fetch.outputs.other-logs-index-path }}
      last-success-timestamps-path: ${{ steps.fetch.outputs.last-success-timestamps-path }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: true

      - name: Install fetch-workflow-data dependencies
        shell: bash
        working-directory: .github/actions/fetch-workflow-data
        run: npm install
      - name: Fetch workflow data
        id: fetch
        uses: ./.github/actions/fetch-workflow-data
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          days: ${{ github.event.inputs.days || 15 }}
          force-fresh: ${{ github.event.inputs.force-fresh || false }}
          workflow_ids: |
            [
              ".github/workflows/sanity-tests.yaml",
              ".github/workflows/blackhole-post-commit.yaml",
              ".github/workflows/blackhole-e2e-tests.yaml",
              ".github/workflows/blackhole-demo-tests.yaml",
              ".github/workflows/galaxy-profiler-tests.yaml",
              ".github/workflows/galaxy-multi-user-isolation-tests.yaml",
              ".github/workflows/galaxy-deepseek-tests.yaml",
              ".github/workflows/galaxy-perf-tests.yaml",
              ".github/workflows/galaxy-demo-tests.yaml",
              ".github/workflows/galaxy-unit-tests.yaml",
              ".github/workflows/galaxy-integration-tests.yaml",
              ".github/workflows/galaxy-stress-tests.yaml",
              ".github/workflows/galaxy-e2e-tests.yaml",
              ".github/workflows/galaxy-sanity.yaml",
              ".github/workflows/galaxy-health.yaml",
              ".github/workflows/t3000-perf-tests.yaml",
              ".github/workflows/t3000-e2e-tests.yaml",
              ".github/workflows/t3000-integration-tests.yaml",
              ".github/workflows/t3000-profiler-tests.yaml",
              ".github/workflows/t3000-demo-tests.yaml",
              ".github/workflows/t3000-unit-tests.yaml",

              ".github/workflows/models-t1-e2e-tests.yaml",
              ".github/workflows/models-t1-unit-tests.yaml",
              ".github/workflows/models-t2-e2e-tests.yaml",
              ".github/workflows/models-t2-unit-tests.yaml",
              ".github/workflows/models-t3-e2e-tests.yaml",
              ".github/workflows/models-t3-unit-tests.yaml",

              ".github/workflows/perf-device-models.yaml",
              ".github/workflows/perf-models.yaml",
              ".github/workflows/fast-dispatch-full-regressions-and-models.yaml",
              ".github/workflows/single-card-demo-tests.yaml",
              ".github/workflows/tt-metal-l2-nightly.yaml",
              ".github/workflows/ttnn-run-sweeps.yaml",
              ".github/workflows/vllm-nightly-tests.yaml",
              ".github/workflows/metal-run-microbenchmarks.yaml",
              ".github/workflows/sanity-tests-debug.yaml",
              ".github/workflows/merge-gate.yaml",
              ".github/workflows/pr-gate.yaml",
              ".github/workflows/runtime-sanity-tests.yaml",
              ".github/workflows/runtime-unit-tests.yaml",
              ".github/workflows/runtime-integration-tests.yaml",
              ".github/workflows/runtime-perf-tests.yaml"
            ]
      - name: Upload workflow data
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workflow-data
          path: ${{ github.workspace }}/workflow-data.json
          retention-days: 1

      - name: Upload annotations artifact (if any)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workflow-annotations
          path: |
            ${{ steps.fetch.outputs.annotations-root }}/
            ${{ steps.fetch.outputs.annotations-index-path }}
          retention-days: 1

      - name: Upload commits artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: commits-main
          path: ${{ steps.fetch.outputs.commits-path }}
          retention-days: 1

      - name: Upload gtest logs artifact (if any)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workflow-gtest-logs
          path: |
            ${{ steps.fetch.outputs.gtest-logs-root }}/
            ${{ steps.fetch.outputs.gtest-logs-index-path }}
          retention-days: 1

      - name: Upload other logs artifact (if any)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workflow-other-logs
          path: |
            ${{ steps.fetch.outputs.other-logs-root }}/
            ${{ steps.fetch.outputs.other-logs-index-path }}
          retention-days: 1

      - name: Upload last success timestamps artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: last-success-timestamps
          path: ${{ steps.fetch.outputs.last-success-timestamps-path }}
          retention-days: 1

      - name: Debug cache file
        run: ls -l ${{ github.workspace }}/workflow-data.json || echo "File not found"

  analyze-data:
    needs: fetch-data
    if: always()
    runs-on: ubuntu-latest
    outputs:
      has_failed_workflows: ${{ steps.set-outputs.outputs.has_failed_workflows }}
      has_regressions: ${{ steps.set-outputs.outputs.has_regressions }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: true

      - name: Inject fake regressions (testing only)
        id: inject-fake
        if: ${{ github.event.inputs['fake-regressions-json'] != '' }}
        shell: bash
        run: |
          set -euo pipefail
          FAKE_JSON='${{ github.event.inputs['fake-regressions-json'] }}'
          mkdir -p "$GITHUB_WORKSPACE/regression-notification-inputs"
          # Enforce max 3 entries
          echo "$FAKE_JSON" | jq -c '.[0:3]' \
            > "$GITHUB_WORKSPACE/regression-notification-inputs/regressed-workflows.json"
          ACTUAL_COUNT=$(jq 'length' "$GITHUB_WORKSPACE/regression-notification-inputs/regressed-workflows.json")
          echo "Injecting $ACTUAL_COUNT fake regression(s) (max 3)"
          # Write failed-workflows.json (just the names)
          jq '[.[].name]' "$GITHUB_WORKSPACE/regression-notification-inputs/regressed-workflows.json" \
            > "$GITHUB_WORKSPACE/regression-notification-inputs/failed-workflows.json"
          # Empty alert-all message
          touch "$GITHUB_WORKSPACE/regression-notification-inputs/alert-all-message.txt"
          echo "has_failed_workflows=true" >> "$GITHUB_OUTPUT"
          echo "has_regressions=true" >> "$GITHUB_OUTPUT"
          echo "failed_workflows_path=$GITHUB_WORKSPACE/regression-notification-inputs/failed-workflows.json" >> "$GITHUB_OUTPUT"
          echo "regressed_workflows_path=$GITHUB_WORKSPACE/regression-notification-inputs/regressed-workflows.json" >> "$GITHUB_OUTPUT"
          echo "alert_all_message_path=$GITHUB_WORKSPACE/regression-notification-inputs/alert-all-message.txt" >> "$GITHUB_OUTPUT"

      - name: Upload fake regression notification inputs artifact
        if: ${{ github.event.inputs['fake-regressions-json'] != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workflow-regression-notification-inputs
          path: ${{ github.workspace }}/regression-notification-inputs/
          retention-days: 1

      - name: Discover previous successful run id
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        id: prev
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = '.github/workflows/aggregate-workflow-data.yaml';
            const resp = await github.request('GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs', {
              owner,
              repo,
              workflow_id,
              branch: 'main',
              status: 'completed',
              per_page: 10
            });
            const runs = (resp.data.workflow_runs || []).filter(r => r.event === 'schedule' && r.conclusion === 'success');
            const run = runs[0];
            const selectedId = run ? String(run.id) : '';
            core.info(`Selected previous run id: ${selectedId || 'none'}`);
            core.setOutput('run_id', selectedId);
      - name: Install analyze-workflow-data dependencies
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        shell: bash
        working-directory: .github/actions/analyze-workflow-data
        run: npm install
      - name: Download previous workflow data artifact (if any)
        if: ${{ !github.event.inputs['fake-regressions-json'] && steps.prev.outputs.run_id != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workflow-data
          path: ${{ github.workspace }}/prev
          run-id: ${{ steps.prev.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Echo selected previous run id
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        run: |
          echo "Selected previous run id: ${{ steps.prev.outputs.run_id }}"
      - name: List artifacts for selected previous run (debug)
        if: ${{ !github.event.inputs['fake-regressions-json'] && steps.prev.outputs.run_id != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = Number('${{ steps.prev.outputs.run_id }}');
            const arts = await github.rest.actions.listWorkflowRunArtifacts({ owner, repo, run_id, per_page: 100 });
            core.info(`Artifacts for run ${run_id}:`);
            for (const a of arts.data.artifacts) {
              core.info(`- name=${a.name} id=${a.id} expired=${a.expired} size=${a.size_in_bytes}`);
            }
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download workflow data
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workflow-data
          path: ${{ github.workspace }}
      - name: Download annotations (if any)
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workflow-annotations
          path: ${{ github.workspace }}/annotations
      - name: Download gtest logs (if any)
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workflow-gtest-logs
          path: ${{ github.workspace }}/logs/gtest
      - name: Download other logs (if any)
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workflow-other-logs
          path: ${{ github.workspace }}/logs/other
      - name: Download commits index
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: commits-main
          path: ${{ github.workspace }}
      - name: Download last success timestamps
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: last-success-timestamps
          path: ${{ github.workspace }}
      - name: Analyze workflow data
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        id: analyze
        uses: ./.github/actions/analyze-workflow-data
        with:
          days: ${{ github.event.inputs.days || 15 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          cache-path: ${{ github.workspace }}/workflow-data.json
          previous-cache-path: ${{ github.workspace }}/prev/workflow-data.json
          annotations-index-path: ${{ github.workspace }}/annotations/annotations-index.json
          commits-path: ${{ github.workspace }}/commits-main.json
          gtest-logs-index-path: ${{ github.workspace }}/logs/gtest/gtest-logs-index.json
          other-logs-index-path: ${{ github.workspace }}/logs/other/other-logs-index.json
          last-success-timestamps-path: ${{ github.workspace }}/last-success-timestamps.json
          alert-all: 'false'
      - name: Upload status changes artifact
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workflow-status-changes
          path: ${{ steps.analyze.outputs.status_changes_path }}
          retention-days: 1
      - name: Upload regression notification inputs artifact
        if: ${{ !github.event.inputs['fake-regressions-json'] }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workflow-regression-notification-inputs
          path: |
            ${{ steps.analyze.outputs.failed_workflows_path }}
            ${{ steps.analyze.outputs.regressed_workflows_path }}
            ${{ steps.analyze.outputs.alert_all_message_path }}
          retention-days: 1

      - name: Set job outputs
        id: set-outputs
        if: always()
        shell: bash
        env:
          FAKE_HAS_FAILED: ${{ steps.inject-fake.outputs.has_failed_workflows }}
          FAKE_HAS_REGRESSIONS: ${{ steps.inject-fake.outputs.has_regressions }}
          ANALYZE_HAS_FAILED: ${{ steps.analyze.outputs.has_failed_workflows }}
          ANALYZE_HAS_REGRESSIONS: ${{ steps.analyze.outputs.has_regressions }}
        run: |
          # Use env vars instead of GHA || expressions to avoid null/empty coalescing bugs
          HAS_FAILED="${FAKE_HAS_FAILED:-$ANALYZE_HAS_FAILED}"
          HAS_REGRESSIONS="${FAKE_HAS_REGRESSIONS:-$ANALYZE_HAS_REGRESSIONS}"
          echo "has_failed_workflows=${HAS_FAILED}" >> "$GITHUB_OUTPUT"
          echo "has_regressions=${HAS_REGRESSIONS}" >> "$GITHUB_OUTPUT"
          echo "DEBUG: FAKE_HAS_FAILED='${FAKE_HAS_FAILED}' ANALYZE_HAS_FAILED='${ANALYZE_HAS_FAILED}' => HAS_FAILED='${HAS_FAILED}'"
          echo "DEBUG: FAKE_HAS_REGRESSIONS='${FAKE_HAS_REGRESSIONS}' ANALYZE_HAS_REGRESSIONS='${ANALYZE_HAS_REGRESSIONS}' => HAS_REGRESSIONS='${HAS_REGRESSIONS}'"

  handle-failures:
    needs: analyze-data
    if: ${{ needs.analyze-data.outputs.has_failed_workflows == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      slack_ts: ${{ steps.slack-report.outputs.slack_ts }}
      slack_ts_map: ${{ steps.slack-report.outputs.slack_ts_map }}
      slack_notification_status: ${{ steps.slack-status.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: true
      - name: Download regression notification inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workflow-regression-notification-inputs
          path: ${{ github.workspace }}/regression-notification-inputs
      - name: Handle failed workflows
        run: |
          echo "The following workflows have failed:"
          jq -r '.[]' "${GITHUB_WORKSPACE}/regression-notification-inputs/failed-workflows.json"
          # Add any additional failure handling steps here
      - name: Post regressions to Slack
        id: slack-report
        continue-on-error: true
        uses: ./.github/actions/slack-report-analyze-workflow-data
        with:
          channel_id: ${{ github.event.inputs.slack-channel-id || 'C08SJ7MGESY' }}
          regressed_workflows_path: ${{ github.workspace }}/regression-notification-inputs/regressed-workflows.json
          alert_all_message_path: ${{ github.workspace }}/regression-notification-inputs/alert-all-message.txt
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      - name: Record Slack notification status
        if: ${{ always() }}
        id: slack-status
        shell: bash
        run: |
          slack_ts="${{ steps.slack-report.outputs.slack_ts }}"
          if [ -n "$slack_ts" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

  trigger-auto-triage:
    needs: [analyze-data, handle-failures]
    if: ${{ always() && needs.analyze-data.result == 'success' && needs.analyze-data.outputs.has_regressions == 'true' && needs.handle-failures.outputs.slack_notification_status == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        working-directory: .github/actions/trigger-auto-triage-for-regressions
        run: npm install
      - name: Download regression notification inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workflow-regression-notification-inputs
          path: ${{ github.workspace }}/regression-notification-inputs
      - name: Trigger auto-triage for regressed jobs
        uses: ./.github/actions/trigger-auto-triage-for-regressions
        with:
          regressed_workflows_path: ${{ github.workspace }}/regression-notification-inputs/regressed-workflows.json
          github_token: ${{ secrets.GITHUB_TOKEN }}
          slack_ts: ${{ needs.handle-failures.outputs.slack_ts }}
          slack_ts_map: ${{ needs.handle-failures.outputs.slack_ts_map }}
          slack_channel_id: ${{ github.event.inputs.slack-channel-id || 'C08SJ7MGESY' }}
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          send-slack-message: true
