name: (triage) Aggregate Workflow Data
on:
  push:
    branches:
      - brain/e2e-two-pings-test
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back for workflow runs'
        required: false
        default: '15'
      force-fresh:
        description: 'Force fresh fetch (skip using past artifacts and redownload everything)'
        required: false
        type: boolean
        default: false
      slack-channel-id:
        description: 'Slack channel ID for notifications. Leave empty to use repo secret SLACK_METAL_INFRA_CHANNEL_ID.'
        required: false
      failures-to-elevate:
        description: 'TEST MODE. When set to N>0, discards real regressions and replaces them with N currently-stayed-failing JOBS (not pipelines). Produces exactly N top-level Slack messages, suppresses the "X other pipelines are failing" footer. Empty/0 = normal production behavior.'
        required: false
        default: ''
      max-auto-triage-dispatches:
        description: 'Hard cap on total auto-triage dispatches per run. Empty = unlimited. Pair with failures-to-elevate for safe dispatch-driven testing.'
        required: false
        default: ''

jobs:
  # ──────────────────────────────────────────────────────────────────
  # E2E TEST: Replace fetch-data + analyze-data with a single fake job
  # that produces hardcoded outputs + artifacts.
  # ──────────────────────────────────────────────────────────────────
  fake-analyze:
    runs-on: ubuntu-latest
    outputs:
      has_failed_workflows: 'true'
      has_regressions: 'true'
    steps:
      - name: Create fake regression artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/regression-inputs"

          # regressed-workflows.json — format expected by trigger-auto-triage-for-regressions/index.js
          # Each entry: { workflow_path, name, failing_jobs: [{name, url}] }
          cat > "$GITHUB_WORKSPACE/regression-inputs/regressed-workflows.json" << 'REGRJSON'
          [
            {
              "workflow_path": ".github/workflows/t3000-perf-tests.yaml",
              "name": "T3000 perf tests",
              "failing_jobs": [
                {
                  "name": "t3k_DiT_SD3.5_model_perf_tests",
                  "url": "https://github.com/tenstorrent/tt-metal/actions"
                }
              ]
            }
          ]
          REGRJSON

          # failed-workflows.json
          cat > "$GITHUB_WORKSPACE/regression-inputs/failed-workflows.json" << 'FAILJSON'
          ["t3000-perf-tests"]
          FAILJSON

          # alert-all-message.txt (empty — no alert-all for this test)
          touch "$GITHUB_WORKSPACE/regression-inputs/alert-all-message.txt"

          echo "Created fake regression artifacts:"
          ls -la "$GITHUB_WORKSPACE/regression-inputs/"
          cat "$GITHUB_WORKSPACE/regression-inputs/regressed-workflows.json"

      - name: Upload regression notification inputs artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: workflow-regression-notification-inputs
          path: ${{ github.workspace }}/regression-inputs/
          retention-days: 1

  handle-failures:
    needs: fake-analyze
    if: ${{ always() && needs.fake-analyze.result == 'success' && needs.fake-analyze.outputs.has_failed_workflows == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      slack_ts: ${{ steps.slack-report.outputs.slack_ts }}
      slack_ts_map: ${{ steps.slack-report.outputs.slack_ts_map }}
      slack_notification_status: ${{ steps.slack-status.outputs.status }}
    steps:
      - name: Post E2E test message to Slack
        id: slack-report
        shell: bash
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL_ID: ${{ github.event.inputs.slack-channel-id || secrets.SLACK_METAL_INFRA_CHANNEL_ID }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"${CHANNEL_ID}\",
              \"text\": \"[E2E TEST -- auto-triage disclaimer] Aggregate Workflow Data run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|this run>\\n[Part 1/3]\\n Regressions (Pass -> Fail):\\n(T3K) T3000 perf tests -- workflow -- run -- a04266e\\n   * t3000-perf-tests / t3k_DiT_SD3.5_model_perf_tests @metal infra team\"
            }")
          echo "$RESPONSE" | tee /tmp/slack_response.json

          OK=$(echo "$RESPONSE" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "Slack API error: $(echo "$RESPONSE" | jq -r '.error')"
            exit 1
          fi

          SLACK_TS=$(echo "$RESPONSE" | jq -r '.ts')
          echo "slack_ts=${SLACK_TS}" >> "$GITHUB_OUTPUT"

          # Build a slack_ts_map so trigger-auto-triage can find the per-job thread.
          # Key format: "<workflow display name> / <job name>"
          SLACK_TS_MAP="{\"T3000 perf tests / t3k_DiT_SD3.5_model_perf_tests\": \"${SLACK_TS}\"}"
          echo "slack_ts_map=${SLACK_TS_MAP}" >> "$GITHUB_OUTPUT"

          echo "Posted Slack message, ts=${SLACK_TS}"

      - name: Record Slack notification status
        if: ${{ always() }}
        id: slack-status
        shell: bash
        run: |
          slack_ts="${{ steps.slack-report.outputs.slack_ts }}"
          if [ -n "$slack_ts" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

  trigger-auto-triage:
    needs: [fake-analyze, handle-failures]
    if: ${{ always() && needs.fake-analyze.result == 'success' && needs.fake-analyze.outputs.has_regressions == 'true' && needs.handle-failures.outputs.slack_notification_status == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        working-directory: .github/actions/trigger-auto-triage-for-regressions
        run: npm install
      - name: Download regression notification inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: workflow-regression-notification-inputs
          path: ${{ github.workspace }}/regression-notification-inputs
      - name: Trigger auto-triage for regressed jobs
        uses: ./.github/actions/trigger-auto-triage-for-regressions
        with:
          regressed_workflows_path: ${{ github.workspace }}/regression-notification-inputs/regressed-workflows.json
          github_token: ${{ secrets.GITHUB_TOKEN }}
          slack_ts: ${{ needs.handle-failures.outputs.slack_ts }}
          slack_ts_map: ${{ needs.handle-failures.outputs.slack_ts_map }}
          slack_channel_id: ${{ github.event.inputs.slack-channel-id || secrets.SLACK_METAL_INFRA_CHANNEL_ID }}
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          send-slack-message: true
          max_dispatches: ${{ github.event.inputs.max-auto-triage-dispatches || '1' }}
