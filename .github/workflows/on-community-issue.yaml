name: "Issue Notification"
on:
  issues:
    types: [opened]
jobs:
  gh-slack-bridge:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Set username and number based on event type
        id: set-variables
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_LOGIN: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          PR_LOGIN: ${{ github.event.pull_request.user.login }}
          PR_NUMBER_VAL: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "issues" ]; then
            echo "USERNAME=$ISSUE_LOGIN" >> "$GITHUB_ENV"
            echo "NUMBER=$ISSUE_NUMBER" >> "$GITHUB_ENV"
            echo "EVENT_URL=$ISSUE_URL" >> "$GITHUB_ENV"
            echo "EVENT_TYPE=issue" >> "$GITHUB_ENV"
            echo "GH_COMMAND=issue" >> "$GITHUB_ENV"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            echo "USERNAME=$PR_LOGIN" >> "$GITHUB_ENV"
            echo "NUMBER=$PR_NUMBER_VAL" >> "$GITHUB_ENV"
            echo "EVENT_URL=$PR_URL" >> "$GITHUB_ENV"
            echo "EVENT_TYPE=PR" >> "$GITHUB_ENV"
            echo "GH_COMMAND=pr" >> "$GITHUB_ENV"
          elif [ "$EVENT_NAME" = "push" ]; then
            echo "USERNAME=$ACTOR" >> "$GITHUB_ENV"
            echo "EVENT_URL=https://github.com/${REPO}/commit/${SHA}" >> "$GITHUB_ENV"
            echo "EVENT_TYPE=push" >> "$GITHUB_ENV"
          fi
      - name: Check if organization member
        id: is_organization_member
        env:
          GITHUB_ORG: tenstorrent
          ORG_READ_GITHUB_TOKEN: ${{ secrets.ORG_READ_GITHUB_TOKEN }}
        run: |
          http_status=$(curl -o /dev/null -s -w '%{http_code}' -H "Authorization: Bearer $ORG_READ_GITHUB_TOKEN" "https://api.github.com/orgs/${GITHUB_ORG}/members/${USERNAME}")
          if [ "$http_status" -eq 204 ]; then
            echo "Detected org member"
            echo "is_member=true" >> $GITHUB_OUTPUT
          else
            echo "Detected community member"
            echo "is_member=false" >> $GITHUB_OUTPUT
          fi
      - name: Add community label
        if: ${{ steps.is_organization_member.outputs.is_member == 'false' && env.GH_COMMAND && env.NUMBER }}
        run: |
          gh $GH_COMMAND edit "$NUMBER" --add-label "$LABELS"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          LABELS: community
      - name: Send Notification
        if: ${{ steps.is_organization_member.outputs.is_member == 'false' }}
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "A new ${{ env.EVENT_TYPE }} has been created by a non-org member `${{ env.USERNAME }}`: ${{ env.EVENT_URL }}",
              "channel": "C07AZJ5DLL8"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_CHANNEL_WEBHOOK_URL }}
