# THROWAWAY — smoke test for the MINFRA-978 release-time title rework.
# Delete this file before merging the backstop PR. Runs automatically on push
# to this branch only; creates no tags, artifacts, or releases.
name: "[throwaway] Title rework smoke test"

on:
  push:
    branches:
      - dgnidash/minfra-978-release-title-backstop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
      - name: Seed a sample changelog (real PRs; mix of poor and clear titles)
        run: |
          {
            echo '## Uncategorized'
            echo '- updaet teh tensor bindings rename for blaze [PR 47376](https://github.com/tenstorrent/tt-metal/pull/47376)'
            echo '- #45520: dedicated tanhshrink SFPU op fixing bf16 catastrophic cancellation [PR 47323](https://github.com/tenstorrent/tt-metal/pull/47323)'
            echo '- Bump transformers to 5.10.2 [PR 47218](https://github.com/tenstorrent/tt-metal/pull/47218)'
            echo '- fix teh thing [PR 47569](https://github.com/tenstorrent/tt-metal/pull/47569)'
          } > CHANGELOG.txt
          echo "===== BEFORE ====="
          cat CHANGELOG.txt
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Run title rework
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUG_CHECKER_API_KEY: ${{ secrets.BUG_CHECKER_API_KEY }}
        run: |
          pip install --quiet anthropic==0.91.0
          python3 .github/actions/scripts/release_notes_rewrite_titles.py CHANGELOG.txt
      - name: Show result
        run: |
          echo "===== AFTER ====="
          cat CHANGELOG.txt
