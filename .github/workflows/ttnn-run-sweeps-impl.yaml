name: "[internal] ttnn run sweeps impl"

on:
  workflow_call:
    inputs:
      matrix:
        description: "JSON matrix of sweep batches for this hw group"
        required: true
        type: string
      sweep-name:
        description: "Resolved sweep name"
        required: true
        type: string
      dev-docker-image:
        description: "Dev Docker image"
        required: true
        type: string
      build-artifact-name:
        description: "Build artifact name"
        required: true
        type: string
      wheel-artifact-name:
        description: "Wheel artifact name"
        required: true
        type: string
      skip-on-timeout:
        type: string
        default: "true"
      measure-device-perf:
        type: string
        default: "true"
      measure-e2e-perf:
        type: string
        default: "false"
      measure-memory:
        type: string
        default: "false"
      mesh-shape:
        type: string
        default: ""

permissions:
  contents: read

jobs:
  ttnn-run-sweeps-parallel:
    name: ${{ matrix.batch_display }}
    strategy:
      # Do not fail-fast because we need to ensure all tests go to completion
      # so we try not to get hanging machines
      fail-fast: false
      max-parallel: 20
      matrix:
        include: ${{ fromJSON(inputs.matrix).include }}
    container:
      image: ${{ inputs.dev-docker-image }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        ARCH_NAME: ${{ matrix.arch }}
        RUNNER_LABEL: ${{ matrix.runner_label }}
        LOGURU_LEVEL: INFO
        GITHUB_ACTIONS: true
        TT_SMI_RESET_COMMAND: ${{ matrix.tt_smi_cmd }}
        TEST_GROUP_NAME: ${{ matrix.test_group_name }}
        TRACY_NO_INVARIANT_CHECK: 1
        TTNN_OPS_DATABASE_URL: ${{ (inputs['sweep-name'] == 'ALL SWEEPS (Model Traced)' || inputs['sweep-name'] == 'ALL SWEEPS (Lead Models)') && secrets.TTNN_OPS_LEAD_MODELS_DATABASE_URL || '' }}
        LEAD_MODELS_RUN: ${{ startsWith(matrix.test_group_name, 'lead-models') && '1' || '0' }}
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    timeout-minutes: 60
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      - name: 📋 Display parallel sweep configuration
        run: |
          echo "::group::🔧 Parallel Sweeps Execution - Configuration"
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│              Parallel Sweeps Configuration                  │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│ Run Mode:             Parallel Execution (${{ matrix.test_group_name }})"
          echo "│ Batch:                ${{ matrix.batch_display }}"
          echo "│ Module Selector:      ${{ matrix.module_selector }}"
          echo "│ Suite Override:       ${{ matrix.suite_name || 'none' }}"
          echo "│ Architecture:         ${{ matrix.arch }}"
          echo "│ Runner:               ${{ toJSON(matrix.runs_on) }}"
          echo "│ Skip on Timeout:      ${{ inputs.skip-on-timeout }}"
          echo "│ Measure Device Perf:  ${{ inputs.measure-device-perf }}"
          echo "│ Measure E2E Perf:     ${{ inputs.measure-e2e-perf }}"
          echo "│ Measure Memory:       ${{ inputs.measure-memory }}"
          echo "│ Use Database:         ${{ inputs['sweep-name'] == 'ALL SWEEPS (Model Traced)' || inputs['sweep-name'] == 'ALL SWEEPS (Lead Models)' }}"
          echo "│ Mesh Shape Filter:    ${{ inputs.mesh-shape || 'none' }}"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"
      - name: Download sweep vectors
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0
        with:
          name: sweeps-vectors
          path: /work/tests/sweep_framework/vectors_export
      - name: Run ttnn sweeps (batch)
        run: |
          MODULE_SELECTOR="${{ matrix.module_selector }}"
          SUITE_NAME="${{ matrix.suite_name }}"

          # Set skip-on-timeout flag
          SKIP_ON_TIMEOUT_FLAG=""
          if [[ "${{ inputs.skip-on-timeout }}" == "true" ]]; then
            SKIP_ON_TIMEOUT_FLAG="--skip-on-timeout"
          fi

          # Enable device performance when requested
          DEVICE_PERF_FLAG=""
          if [[ "${{ inputs.measure-device-perf }}" == "true" ]]; then
            DEVICE_PERF_FLAG="--device-perf"
          fi

          # Enable e2e performance when requested
          E2E_PERF_FLAG=""
          if [[ "${{ inputs.measure-e2e-perf }}" == "true" ]]; then
            E2E_PERF_FLAG="--perf-with-cache"
          fi

          # Enable memory measurement when requested
          MEMORY_FLAG=""
          if [[ "${{ inputs.measure-memory }}" == "true" ]]; then
            MEMORY_FLAG="--measure-memory"
          fi

          CMD=(
            python3 tests/sweep_framework/sweeps_runner.py
            --module-name "$MODULE_SELECTOR"
            --vector-source vectors_export
            --result-dest results_export
            --tag ci-main
            --summary
          )

          if [[ -n "$SKIP_ON_TIMEOUT_FLAG" ]]; then
            CMD+=("$SKIP_ON_TIMEOUT_FLAG")
          fi

          if [[ -n "$DEVICE_PERF_FLAG" ]]; then
            CMD+=("$DEVICE_PERF_FLAG")
          fi

          if [[ -n "$E2E_PERF_FLAG" ]]; then
            CMD+=("$E2E_PERF_FLAG")
          fi

          if [[ -n "$MEMORY_FLAG" ]]; then
            CMD+=("$MEMORY_FLAG")
          fi

          if [[ -n "$SUITE_NAME" ]]; then
            CMD+=(--suite-name "$SUITE_NAME")
          fi

          "${CMD[@]}"
      - name: Compute artifact suffix
        shell: bash
        run: |
          DISPLAY_LABEL="${{ matrix.batch_display }}"
          SUITE_LABEL="${{ matrix.suite_name }}"
          GROUP_LABEL="${{ matrix.test_group_name }}"
          FINGERPRINT="$GROUP_LABEL|$DISPLAY_LABEL"
          if [[ -n "$SUITE_LABEL" ]]; then
            FINGERPRINT="$FINGERPRINT|$SUITE_LABEL"
          fi
          echo "BATCH_SUFFIX=$(echo -n "$FINGERPRINT" | sha256sum | cut -d' ' -f1 | cut -c1-12)" >> $GITHUB_ENV
      - name: Upload sweep results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: sweeps-results-${{ matrix.test_group_name }}-batch-${{ env.BATCH_SUFFIX }}
          path: /work/tests/sweep_framework/results_export/
          retention-days: 1
