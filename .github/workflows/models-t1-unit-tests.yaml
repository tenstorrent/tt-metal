name: "(Tier 1) Models Unit Tests"

on:
  schedule:
    # Twice a day at 04:00 and 20:00 UTC — all models, all SKUs
    - cron: "0 4,20 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "Select model to test"
        required: true
        default: all
        type: choice
        options:
          - all
          - llama3.1-8b
          - qwen3-32b-galaxy
          - qwen3.6-27b
          - gpt-oss-120b
          - whisper
          - gemma-4-12b
          - gemma-4-26b-a4b
          - gemma-4-31b
          - dit-common
          # llama3.3-70b-galaxy: disabled — see #42139
          - flux.1-schnell
          - flux.1-dev
      sku:
        description: "Select SKU to test (not all models are configured for all SKUs. If a combination is non-existent no test will be run)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - "wh_n150 (N150)"
          - "wh_n300 (N300)"
          - "wh_llmbox (T3000)"
          - "wh_llmbox_perf (T3000 perf)"
          - "wh_galaxy (WH Galaxy)"
          - "wh_galaxy_perf (WH Galaxy perf)"
          - "bh_p150 (P150)"
          - "bh_p300 (P300)"
          - "bh_quietbox_2 (BH QB2)"
          - "bh_galaxy (BH Galaxy)"
          # Exabox multihost SKUs - routed to the models-unit-tests-multihost job. Dispatch-only:
          # deliberately excluded from the scheduled ALL_SKUS set so cron runs don't allocate
          # scarce exabox hardware.
          - "bh_sc1 (BH Single Galaxy)"
          - "bh_sc4 (BH Supercluster 4)"
          - "bh_sc4-blitz (BH Supercluster 4 / Blitz)"
          - "bh_sc16 (BH Supercluster 16)"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      mlperf-write-access:
        required: false
        type: boolean
        default: false
        description: "Enable read-write access to /mnt/MLPerf (e.g. to regenerate tensor cache). Default is read-only."

permissions:
  packages: write
  contents: write

run-name: "(Tier 1) Models Unit${{ github.event_name == 'schedule' && ' [scheduled]' || '' }}"

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  resolve-skus:
    runs-on: ubuntu-latest
    outputs:
      enabled-skus: ${{ steps.resolve.outputs.enabled-skus }}
      model: ${{ steps.resolve.outputs.model }}
    steps:
      - name: Resolve SKU and model selection
        id: resolve
        run: |
          ALL_SKUS="wh_n150,wh_n300,wh_llmbox,wh_llmbox_perf,wh_galaxy,wh_galaxy_perf,bh_p150,bh_p300,bh_quietbox_2,bh_galaxy"
          EVENT="${{ github.event_name }}"
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            SKU_INPUT="${{ inputs.sku || 'all' }}"
            if [[ "$SKU_INPUT" == "all" ]]; then
              echo "enabled-skus=$ALL_SKUS" >> $GITHUB_OUTPUT
            else
              SKU_NAME=$(echo "$SKU_INPUT" | sed 's/ (.*//')
              echo "enabled-skus=$SKU_NAME" >> $GITHUB_OUTPUT
            fi
            echo "model=${{ inputs.model }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Scheduled runs: all models, all SKUs
          echo "enabled-skus=$ALL_SKUS" >> $GITHUB_OUTPUT
          echo "model=all" >> $GITHUB_OUTPUT
  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}
  models-unit-tests:
    needs: [check-harbor, build-artifact, resolve-skus]
    secrets: inherit
    # OIDC only on this caller (the reusable workflow's multihost job needs ttop auth), not
    # workflow-wide. Job-level permissions replace inherited defaults, so restate what tests need.
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/models-unit-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.resolve-skus.outputs.enabled-skus }}
      model: ${{ needs.resolve-skus.outputs.model }}
      mlperf-read-only: ${{ inputs.mlperf-write-access != true }}
      tier: "1"
