name: "[Tier 2] Models Unit Tests"

on:
  schedule:
    # fast-dispatch-full-regressions-and-models.yaml — Gemma-3-4B + Shallow UNet on wh_n150/wh_n300
    - cron: "0 5,14,23 * * *"
    # t3000-unit-tests.yaml — Loudbox tier-2 unit (Llama 8B t2, Mixtral, Gemma-27B, GPT-OSS 20B, Qwen2.5-VL-72B, Shallow UNet, …)
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "Select model to test"
        required: true
        default: all
        type: choice
        options:
          - all
          - llama3.1-8b
          - llama3.3-70b
          - llama90b-vl
          - qwen3-32b
          - qwen2.5-32b
          - qwen2.5-coder-32b
          - qwen2.5-72b-vl
          - mistral-7b
          - gemma-3-4b
          - gemma-3-27b
          - mixtral-8x7b
          - shallow-unet
          - gpt-oss-20b
      sku:
        description: "Select SKU to test (not all models are configured for all SKUs. If a combination is non-existent no test will be run)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - "wh_llmbox_perf (T3000)"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      mlperf-read-only:
        required: false
        type: boolean
        default: true
        description: "Mount /mnt/MLPerf as read-only (uncheck for read-write access)"

permissions:
  packages: write
  contents: write

run-name: >-
  [Tier 2] Models Unit${{
    github.event_name == 'schedule'
    && format(' ({0})', github.event.schedule)
    || ''
  }}

jobs:
  resolve-skus:
    runs-on: ubuntu-latest
    outputs:
      enabled-skus: ${{ steps.resolve.outputs.enabled-skus }}
      model: ${{ steps.resolve.outputs.model }}
    steps:
      - name: Resolve SKU and model (scheduled runs mirror legacy pipeline scope)
        id: resolve
        run: |
          ALL_SKUS="wh_llmbox_perf"
          EVENT="${{ github.event_name }}"
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            SKU_INPUT="${{ inputs.sku || 'all' }}"
            if [[ "$SKU_INPUT" == "all" ]]; then
              echo "enabled-skus=$ALL_SKUS" >> $GITHUB_OUTPUT
            else
              SKU_NAME=$(echo "$SKU_INPUT" | sed 's/ (.*//')
              echo "enabled-skus=$SKU_NAME" >> $GITHUB_OUTPUT
            fi
            echo "model=${{ inputs.model }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          SCHEDULE="${{ github.event.schedule }}"
          case "$SCHEDULE" in
            "0 5,14,23 * * *")
              # fast-dispatch — tier-2 entries on single-card SKUs (Gemma-3-4B, Shallow UNet)
              echo "enabled-skus=wh_n150,wh_n300" >> $GITHUB_OUTPUT
              echo "model=all" >> $GITHUB_OUTPUT
              ;;
            "0 */2 * * *")
              # t3000-unit — tier-2 jobs on wh_llmbox_perf
              echo "enabled-skus=wh_llmbox_perf" >> $GITHUB_OUTPUT
              echo "model=all" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::Unhandled schedule '$SCHEDULE'; update resolve-skus in models-t2-unit-tests.yaml"
              exit 1
              ;;
          esac
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}
  models-unit-tests:
    needs: [build-artifact, resolve-skus]
    secrets: inherit
    uses: ./.github/workflows/models-unit-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.resolve-skus.outputs.enabled-skus }}
      model: ${{ needs.resolve-skus.outputs.model }}
      mlperf-read-only: ${{ inputs.mlperf-read-only != false }}
      tier: "2"
