name: "(Tier 2) Models Unit Tests"

on:
  schedule:
    # Once a day at 01:00 UTC — all models, all SKUs
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "Select model to test"
        required: true
        default: all
        type: choice
        options:
          - all
          - llama3.1-8b
          - llama3.3-70b
          - llama3.2-90b-vision
          - qwen3-32b
          - qwen2.5-32b
          - qwen2.5-coder-32b
          - qwen2.5-vl-72b
          - mistral-7b
          - gemma-3-4b
          - gemma-3-27b
          - gemma-4-e2b
          - gemma-4-e4b
          - gemma-4-26b-a4b
          - gemma-4-31b
          - mixtral-8x7b
          - shallow-unet
          - gpt-oss-20b
      sku:
        description: "Select SKU to test (not all models are configured for all SKUs. If a combination is non-existent no test will be run)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - "wh_n150 (N150)"
          - "wh_n300 (N300)"
          - "wh_llmbox (T3000)"
          - "wh_llmbox_perf (T3000 perf)"
          - "wh_galaxy (WH Galaxy)"
          - "wh_galaxy_perf (WH Galaxy perf)"
          - "bh_p150 (P150)"
          - "bh_p300 (P300)"
          - "bh_quietbox_2 (BH QB2)"
          - "bh_galaxy (BH Galaxy)"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      mlperf-read-only:
        required: false
        type: boolean
        default: true
        description: "Mount /mnt/MLPerf as read-only (uncheck for read-write access)"

permissions:
  packages: write
  contents: write

run-name: "(Tier 2) Models Unit${{ github.event_name == 'schedule' && ' [scheduled]' || '' }}"

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  resolve-skus:
    runs-on: ubuntu-latest
    outputs:
      enabled-skus: ${{ steps.resolve.outputs.enabled-skus }}
      model: ${{ steps.resolve.outputs.model }}
    steps:
      - name: Resolve SKU and model selection
        id: resolve
        run: |
          ALL_SKUS="wh_n150,wh_n300,wh_llmbox,wh_llmbox_perf,wh_galaxy,wh_galaxy_perf,bh_p150,bh_p300,bh_quietbox_2,bh_galaxy"
          EVENT="${{ github.event_name }}"
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            SKU_INPUT="${{ inputs.sku || 'all' }}"
            if [[ "$SKU_INPUT" == "all" ]]; then
              echo "enabled-skus=$ALL_SKUS" >> $GITHUB_OUTPUT
            else
              SKU_NAME=$(echo "$SKU_INPUT" | sed 's/ (.*//')
              echo "enabled-skus=$SKU_NAME" >> $GITHUB_OUTPUT
            fi
            echo "model=${{ inputs.model }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Scheduled runs: all models, all SKUs
          echo "enabled-skus=$ALL_SKUS" >> $GITHUB_OUTPUT
          echo "model=all" >> $GITHUB_OUTPUT
  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}
  models-unit-tests:
    needs: [build-artifact, resolve-skus]
    secrets: inherit
    # OIDC only on this caller (the reusable workflow's multihost job needs ttop auth), not
    # workflow-wide. Job-level permissions replace inherited defaults, so restate what tests need.
    permissions:
      contents: read
      packages: read
      id-token: write
    uses: ./.github/workflows/models-unit-tests-impl.yaml
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ needs.resolve-skus.outputs.enabled-skus }}
      model: ${{ needs.resolve-skus.outputs.model }}
      mlperf-read-only: ${{ inputs.mlperf-read-only != false }}
      tier: "2"
