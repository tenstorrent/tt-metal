name: "(Blackhole) e2e tests"

on:
  workflow_dispatch:
    inputs:
      system-type:
        description: 'Select system type to test'
        required: false
        default: "all"
        type: choice
        options:
          - all
          - P150 CIv2 (1xP150)
          - Quietbox (4xP150)
          - DeskBox (2xP150)
          - LoudBox (8xP150)
          - P300 (1xP300)
          - QuietBox 2 (2xP300)
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      model:
        description: 'Select model to test (filters rows by model-name in tests/pipeline_reorg/blackhole_e2e_tests.yaml; untagged rows always run)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - deepseek
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
  workflow_call:
    inputs:
      system-type:
        description: 'Select system type to test'
        required: false
        default: "all"
        type: string
      model:
        required: false
        type: string
        default: 'all'
        description: "Select model to test (filters rows by model-name; untagged rows always run)"
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: string
        default: "Release"
        description: "Build type configuration (Release, Debug, RelWithDebInfo, ASan, TSan)"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
  schedule:
    - cron: "0 */8 * * *"  # Every 8 hours at 0:00, 8:00, and 16:00 UTC

jobs:
  generate-card-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          all_systems='[
            {"name": "P150 CIv2 (1xP150)", "sku": "bh_p150b_civ2"},
            {"name": "Quietbox (4xP150)", "sku": "bh_llmbox"},
            {"name": "DeskBox (2xP150)", "sku": "bh_deskbox"},
            {"name": "LoudBox (8xP150)", "sku": "bh_loudbox"},
            {"name": "P300 (1xP300)", "sku": "bh_p300"},
            {"name": "QuietBox 2 (2xP300)", "sku": "bh_quietbox_2"}
          ]'
          selected_system_type="${{ inputs.system-type || 'all' }}"
          if [[ "${{ github.event_name }}" == "schedule" || "$selected_system_type" == "all" ]]; then
            matrix_output=$(echo "{\"test-group\": $all_systems}" | jq -c .)
          else
            filtered=$(echo "$all_systems" | jq -c --arg name "$selected_system_type" '[.[] | select(.name == $name)]')
            if [[ "$filtered" == "[]" ]]; then
              echo "Error: No system found matching system-type=\"$selected_system_type\". Valid options: all, or one of the system names from the matrix." >&2
              exit 1
            fi
            matrix_output=$(echo "{\"test-group\": $filtered}" | jq -c .)
          fi
          echo "Selected system type: $selected_system_type"
          echo "matrix=$matrix_output" >> $GITHUB_OUTPUT
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      tracy: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}
  blackhole-e2e-tests:
    needs: [build-artifact, generate-card-matrix]
    secrets: inherit
    uses: ./.github/workflows/blackhole-e2e-tests-impl.yaml
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-card-matrix.outputs.matrix) }}
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ matrix.test-group.sku }}
      model: ${{ inputs.model || 'all' }}
