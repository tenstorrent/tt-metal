name: "(Blackhole) e2e tests"

on:
  workflow_dispatch:
    inputs:
      system-type:
        description: 'Select system type to test'
        required: false
        default: "all"
        type: choice
        options:
          - all
          - P150 CIv2 (1xP150)
          - LoudBox (8xP150)
          - P300 (1xP300)
          - QuietBox 2 (2xP300)
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      model:
        description: 'Select model to test (filters rows strictly by model-name in tests/pipeline_reorg/blackhole_e2e_tests.yaml; use "all" to run every row including untagged)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - deepseek_prefill
      test-selection:
        description: 'Select e2e tests to run: all tests, or one test id'
        required: false
        default: 'all'
        type: choice
        options:
          - all
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
  workflow_call:
    inputs:
      system-type:
        description: 'Select system type to test'
        required: false
        default: "all"
        type: string
      model:
        required: false
        type: string
        default: 'all'
        description: "Select model to test (filters rows by model-name; untagged rows always run)"
      test-selection:
        required: false
        type: string
        default: 'all'
        description: "Select all tests, or one test id from tests/pipeline_reorg/blackhole_e2e_tests.yaml"
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: string
        default: "Release"
        description: "Build type configuration (Release, Debug, RelWithDebInfo, ASan, TSan)"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
  schedule:
    - cron: "0 */8 * * *"  # Every 8 hours at 0:00, 8:00, and 16:00 UTC

jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  generate-card-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          all_systems='[
            {"name": "P150 CIv2 (1xP150)", "sku": "bh_p150b_civ2"},
            {"name": "LoudBox (8xP150)", "sku": "bh_loudbox"},
            {"name": "P300 (1xP300)", "sku": "bh_p300"},
            {"name": "QuietBox 2 (2xP300)", "sku": "bh_quietbox_2"}
          ]'
          selected_system_type="${{ inputs.system-type || 'all' }}"
          if [[ "${{ github.event_name }}" == "schedule" || "$selected_system_type" == "all" ]]; then
            matrix_output=$(echo "{\"test-group\": $all_systems}" | jq -c .)
          else
            filtered=$(echo "$all_systems" | jq -c --arg name "$selected_system_type" '[.[] | select(.name == $name)]')
            if [[ "$filtered" == "[]" ]]; then
              echo "Error: No system found matching system-type=\"$selected_system_type\". Valid options: all, or one of the system names from the matrix." >&2
              exit 1
            fi
            matrix_output=$(echo "{\"test-group\": $filtered}" | jq -c .)
          fi
          echo "Selected system type: $selected_system_type"
          echo "matrix=$matrix_output" >> $GITHUB_OUTPUT
  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      tracy: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}
  blackhole-e2e-tests:
    needs: [check-harbor, build-artifact, generate-card-matrix]
    secrets: inherit
    uses: ./.github/workflows/blackhole-e2e-tests-impl.yaml
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-card-matrix.outputs.matrix) }}
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      enabled-skus: ${{ matrix.test-group.sku }}
      model: ${{ inputs.model || 'all' }}
      test-selection: ${{ inputs.test-selection || 'all' }}

  ai-run-summary:
    name: "AI Run Summary"
    # Single run-level summary across all SKU invocations of the impl.
    # Each impl invocation uploads its already-computed leg matrix as
    # test_matrix_<sku>; here we download + merge them to form
    # expected-jobs, so the matrix script runs only once per SKU (in
    # the impl) and there's no logic duplication across workflows.
    needs: [build-artifact, generate-card-matrix, blackhole-e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
      - name: Download per-SKU matrices
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: test_matrix_*
          path: matrices
          merge-multiple: true
        continue-on-error: true
      - name: Merge matrices into expected-jobs union
        id: merge
        run: |
          # Files land flat (merge-multiple) as test_matrix_<sku>.json.
          # Default to [] when no artifacts arrived (e.g., every impl
          # leg failed before upload).
          if compgen -G "matrices/test_matrix_*.json" > /dev/null; then
            merged=$(jq -cs 'add // []' matrices/test_matrix_*.json)
          else
            merged='[]'
          fi
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$merged" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Aggregate upstream run result
        id: run-result
        env:
          # Most-severe-wins so build/matrix failures aren't masked when
          # blackhole-e2e-tests gets skipped because of an upstream fail.
          NEEDS: ${{ toJSON(needs) }}
        run: |
          RESULT=$(jq -rn --argjson n "$NEEDS" '
            [$n[].result] as $r |
            if   any($r[]; . == "failure")   then "failure"
            elif any($r[]; . == "cancelled") then "cancelled"
            elif any($r[]; . == "success")   then "success"
            else                                  "skipped"
            end')
          echo "run-result=$RESULT" >> "$GITHUB_OUTPUT"
      - id: ai-run-summary
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/run@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE",
              "input_dir": "ai_job_summaries",
              "output_dir": "ai_run_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          expected-jobs: ${{ steps.merge.outputs.matrix }}
          run-result: ${{ steps.run-result.outputs.run-result }}
      - name: Show report
        if: always() && steps.ai-run-summary.outputs.report-file != ''
        continue-on-error: true
        shell: bash
        env:
          REPORT_FILE: ${{ steps.ai-run-summary.outputs.report-file }}
        run: |
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
            cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Report file not found: $REPORT_FILE"
          fi
