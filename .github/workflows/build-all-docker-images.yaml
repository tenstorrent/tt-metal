name: "Build all Docker images"
# =============================================================================
# This workflow builds ALL Docker images needed by the CI pipeline by calling
# build-docker-artifact.yaml once per platform in parallel. build-docker-artifact
# is the single source of truth for hash calculation and image builds.
#
# NOTE: build-docker-artifact uses manual `docker buildx bake` execution
# (via .github/actions/manual-docker-bake), not docker/bake-action.
#
# It should be called once at the start of the pipeline (e.g., by merge-gate.yaml),
# and all subsequent jobs should use the pre-built images via the outputs.
#
# NAMING CONVENTION: Outputs use "ubuntu-XXXX-*-tag" format to distinguish
# platform-specific images. These map to build-artifact.yaml inputs like:
#   ci-build-docker-image: ${{ needs.docker-images.outputs.ubuntu-2204-ci-build-tag }}
# =============================================================================

env:
  BAKE_OUTPUT: type=image,push=true,compression=zstd,compression-level=22,force-compression=true,oci-mediatypes=true

on:
  workflow_call:
    inputs:
      force-rebuild:
        required: false
        type: boolean
        default: false
        description: "Force rebuild of all Docker images even if they exist in registry"
    outputs:
      # Ubuntu 22.04 images (from build-docker-artifact platform=Ubuntu 22.04)
      ubuntu-2204-ci-build-tag:
        description: "Docker tag for Ubuntu 22.04 CI Build image"
        value: ${{ jobs.build-2204.outputs.ci-build-tag }}
      ubuntu-2204-ci-test-tag:
        description: "Docker tag for Ubuntu 22.04 CI Test image"
        value: ${{ jobs.build-2204.outputs.ci-test-tag }}
      ubuntu-2204-dev-tag:
        description: "Docker tag for Ubuntu 22.04 Dev image"
        value: ${{ jobs.build-2204.outputs.dev-tag }}
      ubuntu-2204-basic-dev-tag:
        description: "Docker tag for Ubuntu 22.04 Basic Dev image"
        value: ${{ jobs.build-2204.outputs.basic-dev-tag }}
      ubuntu-2204-basic-ttnn-runtime-tag:
        description: "Docker tag for Ubuntu 22.04 Basic TTNN Runtime image"
        value: ${{ jobs.build-2204.outputs.basic-ttnn-runtime-tag }}
      # Ubuntu 24.04 images (from build-docker-artifact platform=Ubuntu 24.04)
      ubuntu-2404-ci-build-tag:
        description: "Docker tag for Ubuntu 24.04 CI Build image"
        value: ${{ jobs.build-2404.outputs.ci-build-tag }}
      ubuntu-2404-ci-test-tag:
        description: "Docker tag for Ubuntu 24.04 CI Test image"
        value: ${{ jobs.build-2404.outputs.ci-test-tag }}
      ubuntu-2404-dev-tag:
        description: "Docker tag for Ubuntu 24.04 Dev image"
        value: ${{ jobs.build-2404.outputs.dev-tag }}
      ubuntu-2404-basic-dev-tag:
        description: "Docker tag for Ubuntu 24.04 Basic Dev image"
        value: ${{ jobs.build-2404.outputs.basic-dev-tag }}
      ubuntu-2404-basic-ttnn-runtime-tag:
        description: "Docker tag for Ubuntu 24.04 Basic TTNN Runtime image"
        value: ${{ jobs.build-2404.outputs.basic-ttnn-runtime-tag }}
      # ManyLinux image (shared; same tag from either platform run)
      manylinux-tag:
        description: "Docker tag for ManyLinux image"
        value: ${{ jobs.build-2204.outputs.manylinux-tag }}
      llk-ci-tag:
        description: "Docker tag for LLK CI image (Ubuntu 22.04)"
        value: ${{ jobs.preflight.outputs.llk-ci-tag }}
  workflow_dispatch:
    inputs:
      force-rebuild:
        required: false
        type: boolean
        default: false
        description: "Force rebuild of all Docker images even if they exist in registry"

permissions:
  packages: write

jobs:
  # Preflight: Harbor check + compute tool and platform data on a single runner
  # Outputs raw JSON blobs that downstream workflows parse with fromJson()
  preflight:
    name: "Check Harbor + Calculate Tags"
    runs-on: tt-ubuntu-2204-small-stable
    outputs:
      harbor-prefix: ${{ steps.harbor.outputs.harbor-prefix }}
      tool-data: ${{ steps.tool-data.outputs.data }}
      platform-2204-data: ${{ steps.platform-2204.outputs.data }}
      platform-2404-data: ${{ steps.platform-2404.outputs.data }}
      llk-ci-tag: ${{ steps.llk-check.outputs.llk-ci-tag }}
      llk-needs-build: ${{ steps.llk-check.outputs.llk-needs-build }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Check Harbor availability
        id: harbor
        run: |
          HEALTH_RESPONSE=$(curl --max-time 10 -sf "https://harbor.ci.tenstorrent.net/api/v2.0/health" 2>/dev/null) || true
          if [ -n "$HEALTH_RESPONSE" ]; then
            echo "$HEALTH_RESPONSE" | jq -r '.components[] | select(.status != "healthy") | "\(.name):\(.status)"' | while IFS=: read -r name status; do
              echo "::warning title=Harbor Component Unhealthy::Component $name has status: $status"
            done
            OVERALL_STATUS=$(echo "$HEALTH_RESPONSE" | jq -r '.status')
            if [ "$OVERALL_STATUS" = "healthy" ]; then
              echo "harbor-prefix=${{ vars.HARBOR_PREFIX }}" >> $GITHUB_OUTPUT
              echo "✓ Harbor is available"
            else
              echo "harbor-prefix=" >> $GITHUB_OUTPUT
              echo "⚠ Harbor unhealthy, falling back to direct GHCR"
            fi
          else
            echo "harbor-prefix=" >> $GITHUB_OUTPUT
            echo "⚠ Harbor unavailable, falling back to direct GHCR"
          fi

      - name: Compute tool data
        id: tool-data
        env:
          FORCE_REBUILD: ${{ inputs.force-rebuild }}
        run: |
          set -euo pipefail
          ARGS="${{ github.repository }}"
          [ "$FORCE_REBUILD" = "true" ] && ARGS+=" --force-rebuild"
          DATA=$(.github/scripts/compute-tool-data.sh $ARGS)
          {
            echo "data<<EOJSON"
            echo "$DATA"
            echo "EOJSON"
          } >> "$GITHUB_OUTPUT"

      - name: Compute Ubuntu 22.04 platform data
        id: platform-2204
        env:
          FORCE_REBUILD: ${{ inputs.force-rebuild }}
        run: |
          set -euo pipefail
          ARGS="22.04 ${{ github.repository }}"
          [ "$FORCE_REBUILD" = "true" ] && ARGS+=" --force-rebuild"
          DATA=$(.github/scripts/compute-platform-data.sh $ARGS)
          {
            echo "data<<EOJSON"
            echo "$DATA"
            echo "EOJSON"
          } >> "$GITHUB_OUTPUT"

      - name: Compute Ubuntu 24.04 platform data
        id: platform-2404
        env:
          FORCE_REBUILD: ${{ inputs.force-rebuild }}
        run: |
          set -euo pipefail
          ARGS="24.04 ${{ github.repository }}"
          [ "$FORCE_REBUILD" = "true" ] && ARGS+=" --force-rebuild"
          DATA=$(.github/scripts/compute-platform-data.sh $ARGS)
          {
            echo "data<<EOJSON"
            echo "$DATA"
            echo "EOJSON"
          } >> "$GITHUB_OUTPUT"

      - name: Debug - Print computed data
        run: |
          echo "::group::Tool Data"
          echo '${{ steps.tool-data.outputs.data }}' | jq .
          echo "::endgroup::"
          echo "::group::Ubuntu 22.04 Platform Data"
          echo '${{ steps.platform-2204.outputs.data }}' | jq .
          echo "::endgroup::"
          echo "::group::Ubuntu 24.04 Platform Data"
          echo '${{ steps.platform-2404.outputs.data }}' | jq .
          echo "::endgroup::"

      - name: Check LLK CI image
        id: llk-check
        run: |
          set -euo pipefail
          LLK="tt_metal/third_party/tt_llk"
          # MIGRATION: Uses migrated script in parent repo (.github/scripts/llk-get-docker-tag.sh)
          # instead of the submodule's script, so changes to build scripts trigger rebuilds
          if [ ! -d "$LLK" ] || [ ! -f "$LLK/.github/Dockerfile.base" ]; then
            echo "::error::tt_llk submodule is missing or not checked out (expected $LLK with .github/Dockerfile.base). Initialize submodules in CI checkout or fix .gitmodules."
            exit 1
          fi
          DOCKER_TAG=$(./.github/scripts/llk-get-docker-tag.sh)
          TAG="ghcr.io/${{ github.repository }}/tt-llk-ci-ubuntu-22-04:${DOCKER_TAG}"
          echo "llk-ci-tag=$TAG" >> "$GITHUB_OUTPUT"
          if docker manifest inspect "$TAG" > /dev/null 2>&1; then
            echo "LLK CI image exists"
            echo "llk-needs-build=false" >> "$GITHUB_OUTPUT"
          else
            echo "LLK CI image needs to be built"
            echo "llk-needs-build=true" >> "$GITHUB_OUTPUT"
          fi

  build-llk:
    name: "Build LLK CI image"
    needs: [preflight]
    if: needs.preflight.outputs.llk-needs-build == 'true'
    timeout-minutes: 90
    runs-on: tt-ubuntu-2204-large-stable
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push LLK images
        shell: bash
        env:
          LLK_UBUNTU_BASE_IMAGE: mirror.gcr.io/ubuntu:22.04
        run: .github/scripts/llk-build-docker-images.sh

  # Tool images
  build-tools:
    name: "Build tool images"
    needs: [preflight]
    uses: ./.github/workflows/build-docker-tools.yaml
    with:
      tool-data: ${{ needs.preflight.outputs.tool-data }}
    secrets: inherit

  # Ubuntu 22.04: full build; this run also builds manylinux once for all platforms
  build-2204:
    name: "Ubuntu 22.04"
    needs: [preflight, build-tools, build-llk]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/build-docker-artifact.yaml
    with:
      build-manylinux: true
      skip-llk-build: true
      tool-tags: ${{ needs.build-tools.outputs.tool-tags }}
      platform-data: ${{ needs.preflight.outputs.platform-2204-data }}
    secrets: inherit

  # Ubuntu 24.04: full build in parallel with build-2204; manylinux is skipped here
  build-2404:
    name: "Ubuntu 24.04"
    needs: [preflight, build-tools, build-llk]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/build-docker-artifact.yaml
    with:
      build-manylinux: false
      skip-llk-build: true
      tool-tags: ${{ needs.build-tools.outputs.tool-tags }}
      platform-data: ${{ needs.preflight.outputs.platform-2404-data }}
    secrets: inherit

  # Prewarm Harbor cache after all image-producing jobs complete
  prewarm-cache:
    name: "Prewarm cache from GHCR via HARBOR"
    needs: [preflight, build-tools, build-llk, build-2204, build-2404]
    if: always() && !failure() && !cancelled() && needs.preflight.outputs.harbor-prefix != ''
    runs-on: tt-ubuntu-2204-large-stable
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions/prewarm-images
          sparse-checkout-cone-mode: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Harbor Container Registry
        uses: docker/login-action@v3
        with:
          registry: harbor.ci.tenstorrent.net
          username: ${{ secrets.HARBOR_PUSH_USER }}
          password: ${{ secrets.HARBOR_PUSH_PASSWORD }}

      - name: Prewarm tool images cache
        uses: ./.github/actions/prewarm-images
        with:
          harbor-prefix: ${{ needs.preflight.outputs.harbor-prefix }}
          images: ${{ needs.build-tools.outputs.tool-tags }}
          title: "tool images"
          json-keys: "ccache-tag mold-tag doxygen-tag cba-tag gdb-tag cmake-tag yq-tag sfpi-tag openmpi-tag"

      - name: Build Ubuntu 22.04 image list
        id: images-2204
        run: |
          IMAGES=$(jq -n \
            --arg ci_build '${{ needs.build-2204.outputs.ci-build-tag }}' \
            --arg ci_test '${{ needs.build-2204.outputs.ci-test-tag }}' \
            --arg dev '${{ needs.build-2204.outputs.dev-tag }}' \
            --arg basic_dev '${{ needs.build-2204.outputs.basic-dev-tag }}' \
            --arg basic_ttnn '${{ needs.build-2204.outputs.basic-ttnn-runtime-tag }}' \
            --arg manylinux '${{ needs.build-2204.outputs.manylinux-tag }}' \
            --arg venv_build '${{ needs.build-2204.outputs.python-ci-build-venv-tag }}' \
            --arg venv_test '${{ needs.build-2204.outputs.python-ci-test-venv-tag }}' \
            '[ $ci_build, $ci_test, $dev, $basic_dev, $basic_ttnn, $manylinux, $venv_build, $venv_test ] | map(select(. != ""))')
          {
            echo "list<<EOF"
            echo "$IMAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prewarm Ubuntu 22.04 images cache
        uses: ./.github/actions/prewarm-images
        with:
          harbor-prefix: ${{ needs.preflight.outputs.harbor-prefix }}
          images: ${{ steps.images-2204.outputs.list }}
          title: "Ubuntu 22.04 images"

      - name: Build Ubuntu 24.04 image list
        id: images-2404
        run: |
          IMAGES=$(jq -n \
            --arg ci_build '${{ needs.build-2404.outputs.ci-build-tag }}' \
            --arg ci_test '${{ needs.build-2404.outputs.ci-test-tag }}' \
            --arg dev '${{ needs.build-2404.outputs.dev-tag }}' \
            --arg basic_dev '${{ needs.build-2404.outputs.basic-dev-tag }}' \
            --arg basic_ttnn '${{ needs.build-2404.outputs.basic-ttnn-runtime-tag }}' \
            --arg venv_build '${{ needs.build-2404.outputs.python-ci-build-venv-tag }}' \
            --arg venv_test '${{ needs.build-2404.outputs.python-ci-test-venv-tag }}' \
            '[ $ci_build, $ci_test, $dev, $basic_dev, $basic_ttnn, $venv_build, $venv_test ] | map(select(. != ""))')
          {
            echo "list<<EOF"
            echo "$IMAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prewarm Ubuntu 24.04 images cache
        uses: ./.github/actions/prewarm-images
        with:
          harbor-prefix: ${{ needs.preflight.outputs.harbor-prefix }}
          images: ${{ steps.images-2404.outputs.list }}
          title: "Ubuntu 24.04 images"

      - name: Prewarm LLK CI image
        uses: ./.github/actions/prewarm-images
        with:
          harbor-prefix: ${{ needs.preflight.outputs.harbor-prefix }}
          images: '["${{ needs.preflight.outputs.llk-ci-tag }}"]'
          title: "LLK CI image"
