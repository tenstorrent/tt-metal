name: "Build all Docker images"
# =============================================================================
# This workflow builds ALL Docker images needed by the CI pipeline by calling
# build-docker-artifact.yaml once per platform in parallel. build-docker-artifact
# is the single source of truth for hash calculation and image builds.
#
# NOTE: build-docker-artifact uses manual `docker buildx bake` execution
# (via .github/actions/manual-docker-bake), not docker/bake-action.
#
# It should be called once at the start of the pipeline (e.g., by merge-gate.yaml),
# and all subsequent jobs should use the pre-built images via the outputs.
#
# NAMING CONVENTION: Outputs use "ubuntu-XXXX-*-tag" format to distinguish
# platform-specific images. These map to build-artifact.yaml inputs like:
#   ci-build-docker-image: ${{ needs.docker-images.outputs.ubuntu-2204-ci-build-tag }}
# =============================================================================

env:
  BAKE_OUTPUT: type=image,push=true,compression=zstd,compression-level=22,force-compression=true,oci-mediatypes=true

on:
  workflow_call:
    inputs:
      force-rebuild:
        required: false
        type: boolean
        default: false
        description: "Force rebuild of all Docker images even if they exist in registry"
      prewarm-harbor:
        required: false
        type: boolean
        default: false
        description: "Prewarm built images into Harbor from GHCR"
      runs-on-large:
        required: false
        type: string
        default: "tt-ubuntu-2204-large-stable"
        description: "Runner label for large CPU jobs (e.g. LLK CI image build)"
      runs-on-medium:
        required: false
        type: string
        default: "tt-ubuntu-2204-medium-stable"
        description: "Runner label for medium CPU jobs (e.g. Harbor prewarm)"
      check-harbor-runs-on:
        required: false
        type: string
        default: "tt-ubuntu-light"
        description: "Runner label for the Harbor health check job"
    outputs:
      # Ubuntu 22.04 images (from build-docker-artifact platform=Ubuntu 22.04)
      ubuntu-2204-ci-build-light-tag:
        description: "Docker tag for Ubuntu 22.04 CI Build Light image"
        value: ${{ jobs.build-2204.outputs.ci-build-light-tag }}
      ubuntu-2204-ci-build-tag:
        description: "Docker tag for Ubuntu 22.04 CI Build image"
        value: ${{ jobs.build-2204.outputs.ci-build-tag }}
      ubuntu-2204-ci-test-light-tag:
        description: "Docker tag for Ubuntu 22.04 CI Test Light image"
        value: ${{ jobs.build-2204.outputs.ci-test-light-tag }}
      ubuntu-2204-ci-test-tag:
        description: "Docker tag for Ubuntu 22.04 CI Test image"
        value: ${{ jobs.build-2204.outputs.ci-test-tag }}
      ubuntu-2204-dev-tag:
        description: "Docker tag for Ubuntu 22.04 Dev image"
        value: ${{ jobs.build-2204.outputs.dev-tag }}
      ubuntu-2204-dev-light-tag:
        description: "Docker tag for Ubuntu 22.04 Dev Light image"
        value: ${{ jobs.build-2204.outputs.dev-light-tag }}
      ubuntu-2204-basic-dev-tag:
        description: "Docker tag for Ubuntu 22.04 Basic Dev image"
        value: ${{ jobs.build-2204.outputs.basic-dev-tag }}
      ubuntu-2204-basic-ttnn-runtime-tag:
        description: "Docker tag for Ubuntu 22.04 Basic TTNN Runtime image"
        value: ${{ jobs.build-2204.outputs.basic-ttnn-runtime-tag }}
      ubuntu-2204-python-ci-build-venv-tag:
        description: "Docker tag for Ubuntu 22.04 Python CI Build venv image"
        value: ${{ jobs.build-2204.outputs.python-ci-build-venv-tag }}
      ubuntu-2204-python-ci-test-venv-tag:
        description: "Docker tag for Ubuntu 22.04 Python CI Test venv image"
        value: ${{ jobs.build-2204.outputs.python-ci-test-venv-tag }}
      # Ubuntu 24.04 images (from build-docker-artifact platform=Ubuntu 24.04)
      ubuntu-2404-ci-build-light-tag:
        description: "Docker tag for Ubuntu 24.04 CI Build Light image"
        value: ${{ jobs.build-2404.outputs.ci-build-light-tag }}
      ubuntu-2404-ci-build-tag:
        description: "Docker tag for Ubuntu 24.04 CI Build image"
        value: ${{ jobs.build-2404.outputs.ci-build-tag }}
      ubuntu-2404-ci-test-light-tag:
        description: "Docker tag for Ubuntu 24.04 CI Test Light image"
        value: ${{ jobs.build-2404.outputs.ci-test-light-tag }}
      ubuntu-2404-ci-test-tag:
        description: "Docker tag for Ubuntu 24.04 CI Test image"
        value: ${{ jobs.build-2404.outputs.ci-test-tag }}
      ubuntu-2404-dev-tag:
        description: "Docker tag for Ubuntu 24.04 Dev image"
        value: ${{ jobs.build-2404.outputs.dev-tag }}
      ubuntu-2404-dev-light-tag:
        description: "Docker tag for Ubuntu 24.04 Dev Light image"
        value: ${{ jobs.build-2404.outputs.dev-light-tag }}
      ubuntu-2404-basic-dev-tag:
        description: "Docker tag for Ubuntu 24.04 Basic Dev image"
        value: ${{ jobs.build-2404.outputs.basic-dev-tag }}
      ubuntu-2404-basic-ttnn-runtime-tag:
        description: "Docker tag for Ubuntu 24.04 Basic TTNN Runtime image"
        value: ${{ jobs.build-2404.outputs.basic-ttnn-runtime-tag }}
      ubuntu-2404-python-ci-build-venv-tag:
        description: "Docker tag for Ubuntu 24.04 Python CI Build venv image"
        value: ${{ jobs.build-2404.outputs.python-ci-build-venv-tag }}
      ubuntu-2404-python-ci-test-venv-tag:
        description: "Docker tag for Ubuntu 24.04 Python CI Test venv image"
        value: ${{ jobs.build-2404.outputs.python-ci-test-venv-tag }}
      # ManyLinux image (shared; same tag from either platform run)
      manylinux-tag:
        description: "Docker tag for ManyLinux image"
        value: ${{ jobs.build-2204.outputs.manylinux-tag }}
      llk-ci-tag:
        description: "Docker tag for LLK CI image (Ubuntu 22.04)"
        value: ${{ jobs.preflight.outputs.llk-ci-tag }}
  workflow_dispatch:
    inputs:
      force-rebuild:
        required: false
        type: boolean
        default: false
        description: "Force rebuild of all Docker images even if they exist in registry"
      prewarm-harbor:
        required: false
        type: boolean
        default: true
        description: "Prewarm built images into Harbor from GHCR"

permissions:
  contents: read
  packages: write

jobs:
  # Check Harbor availability via reusable workflow
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
    with:
      runs-on: ${{ inputs.check-harbor-runs-on || 'tt-ubuntu-light' }}

  # Preflight: compute tool and platform data on a single runner
  # Outputs raw JSON blobs that downstream workflows parse with fromJson()
  preflight:
    name: "Calculate Tags"
    needs: [check-harbor]
    runs-on: ubuntu-latest
    outputs:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      tool-data: ${{ steps.tool-data.outputs.data }}
      platform-2204-data: ${{ steps.platform-2204.outputs.data }}
      platform-2404-data: ${{ steps.platform-2404.outputs.data }}
      llk-ci-tag: ${{ steps.llk-check.outputs.llk-ci-tag }}
      llk-needs-build: ${{ steps.llk-check.outputs.llk-needs-build }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Compute Ubuntu 22.04 platform data
        id: platform-2204
        env:
          FORCE_REBUILD: ${{ inputs.force-rebuild }}
        run: |
          set -euo pipefail
          ARGS="22.04 ${{ github.repository }}"
          [ "$FORCE_REBUILD" = "true" ] && ARGS+=" --force-rebuild"
          DATA=$(.github/scripts/compute-platform-data.sh $ARGS)
          {
            echo "data<<EOJSON"
            echo "$DATA"
            echo "EOJSON"
          } >> "$GITHUB_OUTPUT"

      - name: Compute Ubuntu 24.04 platform data
        id: platform-2404
        env:
          FORCE_REBUILD: ${{ inputs.force-rebuild }}
        run: |
          set -euo pipefail
          ARGS="24.04 ${{ github.repository }}"
          [ "$FORCE_REBUILD" = "true" ] && ARGS+=" --force-rebuild"
          DATA=$(.github/scripts/compute-platform-data.sh $ARGS)
          {
            echo "data<<EOJSON"
            echo "$DATA"
            echo "EOJSON"
          } >> "$GITHUB_OUTPUT"

      - name: Compute tool data
        id: tool-data
        env:
          FORCE_REBUILD: ${{ inputs.force-rebuild }}
          PLATFORM_2204_DATA: ${{ steps.platform-2204.outputs.data }}
          PLATFORM_2404_DATA: ${{ steps.platform-2404.outputs.data }}
        run: |
          set -euo pipefail

          FINAL_IMAGES_MISSING=$(jq -nr \
            --argjson p2204 "$PLATFORM_2204_DATA" \
            --argjson p2404 "$PLATFORM_2404_DATA" '
              [
                $p2204.ci_build_light_exists,
                $p2204.ci_build_exists,
                $p2204.ci_test_light_exists,
                $p2204.ci_test_exists,
                $p2204.dev_light_exists,
                $p2204.dev_exists,
                $p2204.basic_dev_exists,
                $p2204.basic_ttnn_exists,
                $p2204.manylinux_exists,
                $p2404.ci_build_light_exists,
                $p2404.ci_build_exists,
                $p2404.ci_test_light_exists,
                $p2404.ci_test_exists,
                $p2404.dev_light_exists,
                $p2404.dev_exists,
                $p2404.basic_dev_exists,
                $p2404.basic_ttnn_exists
              ] | any(. != "true")
            ')

          ARGS="${{ github.repository }}"
          if [ "$FORCE_REBUILD" = "true" ]; then
            ARGS+=" --force-rebuild"
            DATA=$(.github/scripts/compute-tool-data.sh $ARGS)
          elif [ "$FINAL_IMAGES_MISSING" = "true" ]; then
            DATA=$(.github/scripts/compute-tool-data.sh $ARGS)
          else
            TOOL_TAGS=$(.github/scripts/compute-tool-tags.sh "${{ github.repository }}" | jq -ce '.')
            DATA=$(jq -cn --argjson tool_tags "$TOOL_TAGS" \
              '{tool_tags: $tool_tags, any_missing: "false"}')
          fi

          {
            echo "data<<EOJSON"
            echo "$DATA"
            echo "EOJSON"
          } >> "$GITHUB_OUTPUT"

      - name: Debug - Print computed data
        env:
          TOOL_DATA: ${{ steps.tool-data.outputs.data }}
          PLATFORM_2204_DATA: ${{ steps.platform-2204.outputs.data }}
          PLATFORM_2404_DATA: ${{ steps.platform-2404.outputs.data }}
        run: |
          echo "::group::Tool Data"
          echo "$TOOL_DATA" | jq .
          echo "::endgroup::"
          echo "::group::Ubuntu 22.04 Platform Data"
          echo "$PLATFORM_2204_DATA" | jq .
          echo "::endgroup::"
          echo "::group::Ubuntu 24.04 Platform Data"
          echo "$PLATFORM_2404_DATA" | jq .
          echo "::endgroup::"

      - name: Check LLK CI image
        id: llk-check
        run: |
          set -euo pipefail
          LLK="tt_metal/tt-llk"
          # MIGRATION: Uses migrated script in parent repo (.github/scripts/llk-get-docker-tag.sh)
          # instead of the submodule's script, so changes to build scripts trigger rebuilds
          if [ ! -d "$LLK" ] || [ ! -f "$LLK/.github/Dockerfile.base" ]; then
            echo "::error::LLK source missing (expected $LLK with .github/Dockerfile.base). Ensure the repository is fully checked out."
            exit 1
          fi
          DOCKER_TAG=$(./.github/scripts/llk-get-docker-tag.sh)
          TAG="ghcr.io/${{ github.repository }}/tt-llk-ci-ubuntu-22-04:${DOCKER_TAG}"
          echo "llk-ci-tag=$TAG" >> "$GITHUB_OUTPUT"
          if docker manifest inspect "$TAG" > /dev/null 2>&1; then
            echo "LLK CI image exists"
            echo "llk-needs-build=false" >> "$GITHUB_OUTPUT"
          else
            echo "LLK CI image needs to be built"
            echo "llk-needs-build=true" >> "$GITHUB_OUTPUT"
          fi

  build-llk:
    name: "Build LLK CI image"
    needs: [preflight]
    if: needs.preflight.outputs.llk-needs-build == 'true'
    timeout-minutes: 90
    runs-on: ${{ inputs.runs-on-large || 'tt-ubuntu-2204-large-stable' }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          fetch-depth: 1
          submodules: recursive
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push LLK images
        shell: bash
        env:
          LLK_UBUNTU_BASE_IMAGE: mirror.gcr.io/ubuntu:22.04
        run: .github/scripts/llk-build-docker-images.sh

  # Tool images
  build-tools:
    name: "Build tool images"
    needs: [preflight]
    uses: ./.github/workflows/build-docker-tools.yaml
    with:
      tool-data: ${{ needs.preflight.outputs.tool-data }}
    secrets: inherit

  # Ubuntu 22.04: full build; this run also builds manylinux once for all platforms
  build-2204:
    name: "Ubuntu 22.04"
    needs: [preflight, build-tools]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/build-docker-artifact.yaml
    with:
      build-manylinux: true
      skip-llk-build: true
      harbor-prefix: ${{ needs.preflight.outputs.harbor-prefix }}
      tool-tags: ${{ needs.build-tools.outputs.tool-tags }}
      platform-data: ${{ needs.preflight.outputs.platform-2204-data }}
    secrets: inherit

  # Ubuntu 24.04: full build in parallel with build-2204; manylinux is skipped here
  build-2404:
    name: "Ubuntu 24.04"
    needs: [preflight, build-tools]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/build-docker-artifact.yaml
    with:
      build-manylinux: false
      skip-llk-build: true
      harbor-prefix: ${{ needs.preflight.outputs.harbor-prefix }}
      tool-tags: ${{ needs.build-tools.outputs.tool-tags }}
      platform-data: ${{ needs.preflight.outputs.platform-2404-data }}
    secrets: inherit

  # Prewarm Harbor cache after image-producing jobs complete
  prewarm-cache:
    name: "Prewarm cache from GHCR via HARBOR"
    needs: [preflight, build-2204, build-2404, build-llk]
    if: always() && !failure() && !cancelled() && inputs.prewarm-harbor && needs.preflight.outputs.harbor-prefix != ''
    runs-on: ${{ inputs.runs-on-medium || 'tt-ubuntu-2204-medium-stable' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: .github/actions/prewarm-images
          sparse-checkout-cone-mode: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Harbor Container Registry
        uses: docker/login-action@v3
        with:
          registry: harbor.ci.tenstorrent.net
          username: ${{ secrets.HARBOR_PUSH_USER }}
          password: ${{ secrets.HARBOR_PUSH_PASSWORD }}

      - name: Build LLK CI image list
        id: images-llk
        run: |
          IMAGES=$(jq -n --arg llk '${{ needs.preflight.outputs.llk-ci-tag }}' '[ $llk ] | map(select(. != ""))')
          {
            echo "list<<EOF"
            echo "$IMAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prewarm LLK CI image
        uses: ./.github/actions/prewarm-images
        with:
          harbor-prefix: ${{ needs.preflight.outputs.harbor-prefix }}
          images: ${{ steps.images-llk.outputs.list }}
          title: "LLK CI image"

      - name: Build Ubuntu 22.04 image list
        id: images-2204
        run: |
          IMAGES=$(jq -n \
            --arg ci_build_light '${{ needs.build-2204.outputs.ci-build-light-tag }}' \
            --arg ci_build '${{ needs.build-2204.outputs.ci-build-tag }}' \
            --arg ci_test_light '${{ needs.build-2204.outputs.ci-test-light-tag }}' \
            --arg ci_test '${{ needs.build-2204.outputs.ci-test-tag }}' \
            --arg dev_light '${{ needs.build-2204.outputs.dev-light-tag }}' \
            --arg dev '${{ needs.build-2204.outputs.dev-tag }}' \
            --arg manylinux '${{ needs.build-2204.outputs.manylinux-tag }}' \
            '[ $ci_build_light, $ci_build, $ci_test_light, $ci_test, $dev_light, $dev, $manylinux ] | map(select(. != ""))')
          {
            echo "list<<EOF"
            echo "$IMAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prewarm Ubuntu 22.04 images cache
        uses: ./.github/actions/prewarm-images
        with:
          harbor-prefix: ${{ needs.preflight.outputs.harbor-prefix }}
          images: ${{ steps.images-2204.outputs.list }}
          title: "Ubuntu 22.04 images"

      - name: Build Ubuntu 24.04 image list
        id: images-2404
        run: |
          IMAGES=$(jq -n \
            --arg ci_build_light '${{ needs.build-2404.outputs.ci-build-light-tag }}' \
            --arg ci_build '${{ needs.build-2404.outputs.ci-build-tag }}' \
            --arg ci_test_light '${{ needs.build-2404.outputs.ci-test-light-tag }}' \
            --arg ci_test '${{ needs.build-2404.outputs.ci-test-tag }}' \
            --arg dev_light '${{ needs.build-2404.outputs.dev-light-tag }}' \
            --arg dev '${{ needs.build-2404.outputs.dev-tag }}' \
            '[ $ci_build_light, $ci_build, $ci_test_light, $ci_test, $dev_light, $dev ] | map(select(. != ""))')
          {
            echo "list<<EOF"
            echo "$IMAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prewarm Ubuntu 24.04 images cache
        uses: ./.github/actions/prewarm-images
        with:
          harbor-prefix: ${{ needs.preflight.outputs.harbor-prefix }}
          images: ${{ steps.images-2404.outputs.list }}
          title: "Ubuntu 24.04 images"
