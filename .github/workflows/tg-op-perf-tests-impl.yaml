name: "[internal] TG op perf tests impl"
on:
  workflow_call:
    inputs:
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      extra-tag:
        required: false
        type: string
        default: in-service
      topology:
        required: false
        type: string
        default: config-tg
jobs:
  tg-op-perf-tests:
    strategy:
      fail-fast: false
      matrix:
        test-group: [{ name: TG Op Perf Unit Tests, arch: wormhole_b0, cmd: pytest
                -k TG tests/ttnn/multidevice_perf_tests/, timeout: 5, tracy: true }]
    name: ${{ matrix.test-group.name }}
    env:
      ARCH_NAME: ${{ matrix.test-group.arch }}
      LOGURU_LEVEL: INFO
      PYTHONPATH: ${{ github.workspace }}
    runs-on:
      - arch-wormhole_b0
      - bare-metal
      - pipeline-perf
      - ${{ inputs.extra-tag }}
      - ${{ inputs.topology }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - name: Enable performance mode
        run: |
          sudo cpupower frequency-set -g performance
      - uses: ./.github/actions/ensure-active-weka-mount
      - name: ⬇️ Download Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 10
        with:
          name: ${{ inputs.build-artifact-name || 'build artifact not specified' }}
      - name: Extract files
        run: tar --zstd -xvf ttm_any.tar.zst
      - name: ⬇️ Download Wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 10
        with:
          name: ${{ inputs.wheel-artifact-name || 'wheel artifact not specified' }}
      - name: Run op perf regression tests
        timeout-minutes: 10
        uses: ./.github/actions/docker-run
        env:
          LOGURU_LEVEL: INFO
          TEST_CMD: ${{ matrix.test-group.cmd }}
        with:
          docker_image: ${{ inputs.docker-image }}
          docker_password: ${{ secrets.GITHUB_TOKEN }}
          docker_opts: |
            -e TT_METAL_HOME=${{ github.workspace }}
            -e ARCH_NAME=${{ matrix.test-group.arch }}
            -e LD_LIBRARY_PATH=${{ github.workspace }}/build/lib
            -e "TEST_CMD=${{ matrix.test-group.cmd }}"
          install_wheel: true
          run_args: |
            # Write command to script file to safely handle quotes and special characters
            cat > /tmp/test_cmd.sh << 'SCRIPT_EOF'
            #!/bin/bash
            set -euo pipefail
            SCRIPT_EOF
            printf '%s\n' "$TEST_CMD" >> /tmp/test_cmd.sh
            chmod +x /tmp/test_cmd.sh
            bash /tmp/test_cmd.sh
      - name: Disable performance mode
        if: always()
        run: |
          sudo cpupower frequency-set -g ondemand
