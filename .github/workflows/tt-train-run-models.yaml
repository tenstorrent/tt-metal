name: "[Internal] tt-train - Run models and collect metrics"

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      runner-label:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      timeout:
        required: false
        type: number
        default: 45
      enable-watcher:
        required: false
        type: boolean
        default: false
      enable-lightweight-kernel-asserts:
        description: 'Enable lightweight kernel asserts'
        required: false
        type: boolean
        default: false
      enable-llk-asserts:
        description: 'Enable LLK asserts'
        required: false
        type: boolean
        default: false
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"

jobs:
  models:
    strategy:
      # Do not fail-fast because we need to ensure all tests go to completion
      # so we try not to get hanging machines
      fail-fast: false
      matrix:
        test-group: [
          {name: tt-train, cmd: python tt-train/scripts/run_models.py; ls -l},
        ]
    name: ${{ matrix.test-group.name }} ${{ inputs.arch }} ${{ inputs.runner-label }}
    runs-on: >-
      ${{
        ((inputs.runner-label == 'N300') && format('tt-ubuntu-2204-{0}-stable', inputs.runner-label))
        || format('tt-ubuntu-2204-{0}-viommu-stable', inputs.runner-label)
      }}
    container:
      image: harbor.ci.tenstorrent.net/${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        TT_METAL_RUNTIME_ROOT: /work
        LD_LIBRARY_PATH: /work/build/lib
        TEST_DATA_DIR: /work/data
        ENABLE_CI_ONLY_TT_TRAIN_TESTS: 1
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher || false }}
          enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
          auto-triage: ${{ !inputs.enable-watcher }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          # We shouldn't need this once tt-train python build is stable
          pip install "gitpython==3.1.41" "pydantic==2.9.2" "numpy>=1.24.4,<2" "pyyaml>=5.4"

      - name: ${{ matrix.test-group.name }} tests
        timeout-minutes: ${{ inputs.timeout }}
        run: |
          ${{ matrix.test-group.cmd }}

      - name: Upload metrics data to AWS SFTP bucket
        uses: tenstorrent/tt-metal/.github/actions/upload-data-via-sftp@main
        with:
          ssh-private-key: ${{ secrets.TT_TRAIN_AWS_KEY }}
          sftp-batchfile: /work/.github/actions/upload-data-via-sftp/tt_train_model_metrics.txt
          username: ${{ secrets.TT_TRAIN_AWS_USERNAME }}
          hostname: ${{ secrets.TT_TRAIN_AWS_HOSTNAME }}
          path: /work

      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          path: /work/generated_metrics
          prefix: "metrics_"

      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
