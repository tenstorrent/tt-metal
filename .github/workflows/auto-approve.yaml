name: Auto-approve dependency bumps

# Automatically approves PRs where the component author bumps their own
# dependency version file — no human review needed.
#
# Currently covers:
#   - SFPI:  @nathan-TT bumping tt_metal/sfpi-version
#   - ttsim: @mcraigheadTT bumping .github/workflows/ttsim.yaml
#
# To add a new component: add a new job following the same pattern.
#
# Security note: pull_request_target runs with write access to the base repo
# even for fork PRs. We mitigate this by:
#   1. Gating on a known author per job
#   2. Verifying the PR touches ONLY the allowlisted files via API — no checkout
#   3. Never executing any code from the PR branch

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # SFPI — @nathan-TT bumping tt_metal/sfpi-version
  # ---------------------------------------------------------------------------
  auto-approve-sfpi:
    name: Auto-approve SFPI bump
    runs-on: ubuntu-latest
    # Fast-exit: only run for nathan-TT non-draft PRs
    if: |
      github.event.pull_request.user.login == 'nathan-TT' &&
      !github.event.pull_request.draft
    steps:
      - name: Verify only SFPI files are changed
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Fetch changed files via API (no code checkout needed)
          FILES=$(gh api "repos/tenstorrent/tt-metal/pulls/${PR_NUMBER}/files" \
            --jq '.[].filename')

          echo "Changed files in PR #${PR_NUMBER}:"
          echo "$FILES"

          # Allowed files for SFPI version bumps.
          # Add to this list only when the SFPI bump scope genuinely expands.
          ALLOWED=(
            "tt_metal/sfpi-version"
            "tt_metal/sfpi-info.sh"
          )

          SAFE=true
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            match=false
            for allowed in "${ALLOWED[@]}"; do
              if [[ "$file" == "$allowed" ]]; then
                match=true
                break
              fi
            done
            if [[ "$match" == "false" ]]; then
              echo "FAIL: Unexpected file not in SFPI allowlist: $file"
              SAFE=false
            fi
          done <<< "$FILES"

          if [[ "$SAFE" == "true" ]]; then
            echo "All changed files are in the SFPI allowlist — safe to auto-approve."
            echo "safe=true" >> "$GITHUB_OUTPUT"
          else
            echo "PR contains files outside the SFPI allowlist — skipping auto-approve."
            echo "safe=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve PR
        if: steps.verify.outputs.safe == 'true'
        env:
          # Must be a token for an account in tenstorrent/codeowner-bypass.
          # Reuses the existing codeowners bypass PAT — already a member of
          # tenstorrent/codeowner-bypass. See codeowners-group-analysis.yaml.
          GH_TOKEN: ${{ secrets.CODEOWNERS_GROUP_ANALYSIS_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr review "$PR_NUMBER" \
            --repo tenstorrent/tt-metal \
            --approve \
            --body "🤖 Auto-approved: SFPI version bump from @nathan-TT (component author). Only tt_metal/sfpi-version was modified."

  # ---------------------------------------------------------------------------
  # ttsim — @mcraigheadTT bumping .github/workflows/ttsim.yaml
  # ---------------------------------------------------------------------------
  auto-approve-ttsim:
    name: Auto-approve ttsim bump
    runs-on: ubuntu-latest
    # Fast-exit: only run for mcraigheadTT non-draft PRs
    if: |
      github.event.pull_request.user.login == 'mcraigheadTT' &&
      !github.event.pull_request.draft
    steps:
      - name: Verify only ttsim files are changed
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Fetch changed files via API (no code checkout needed)
          FILES=$(gh api "repos/tenstorrent/tt-metal/pulls/${PR_NUMBER}/files" \
            --jq '.[].filename')

          echo "Changed files in PR #${PR_NUMBER}:"
          echo "$FILES"

          # Allowed files for ttsim version bumps.
          # ttsim.yaml holds the version string; the skip list is updated
          # alongside new versions to suppress newly-failing tests.
          ALLOWED=(
            ".github/workflows/ttsim.yaml"
            "tests/pipeline_reorg/ttsim-skip-list.yaml"
          )

          SAFE=true
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            match=false
            for allowed in "${ALLOWED[@]}"; do
              if [[ "$file" == "$allowed" ]]; then
                match=true
                break
              fi
            done
            if [[ "$match" == "false" ]]; then
              echo "FAIL: Unexpected file not in ttsim allowlist: $file"
              SAFE=false
            fi
          done <<< "$FILES"

          if [[ "$SAFE" == "true" ]]; then
            echo "All changed files are in the ttsim allowlist — safe to auto-approve."
            echo "safe=true" >> "$GITHUB_OUTPUT"
          else
            echo "PR contains files outside the ttsim allowlist — skipping auto-approve."
            echo "safe=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve PR
        if: steps.verify.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ secrets.CODEOWNERS_GROUP_ANALYSIS_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr review "$PR_NUMBER" \
            --repo tenstorrent/tt-metal \
            --approve \
            --body "🤖 Auto-approved: ttsim version bump from @mcraigheadTT (component author)."
