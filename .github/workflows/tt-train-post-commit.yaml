name: "[internal] tt-train C++ tests impl"

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      runner-label:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      timeout:
        required: false
        type: number
        default: 45
      enable-watcher:
        required: false
        type: boolean
        default: false
      enable-lightweight-kernel-asserts:
        description: 'Enable lightweight kernel asserts'
        required: false
        type: boolean
        default: false
      enable-llk-asserts:
        description: 'Enable LLK asserts'
        required: false
        type: boolean
        default: false
      gtest_filter:
        required: false
        default: "-*NIGHTLY*"
        type: string
        description: "Filter for gtest"
      ref:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
      wheel-artifact-name:
        required: false
        type: string

jobs:
  models:
    strategy:
      # Do not fail-fast because we need to ensure all tests go to completion
      # so we try not to get hanging machines
      fail-fast: false
      matrix:
        test-group: [
          {name: tt-train, cmd: ./tests/ttml_tests --gtest_output=xml:generated/test_reports/ctest_report.xml},
        ]
        test-group-py: [
          {name: tt-train, cmd: python -m pytest tests/python},
        ]
    name: ${{ matrix.test-group.name }} ${{ inputs.arch }} ${{ inputs.runner-label }}
    # tt-train in N300 is timing out on CIv2-viommu: https://github.com/tenstorrent/tt-metal/issues/29443
    runs-on: >-
      ${{
        ((inputs.runner-label == 'N300') && format('tt-ubuntu-2204-{0}-stable', inputs.runner-label))
        || format('tt-ubuntu-2204-{0}-viommu-stable', inputs.runner-label)
      }}
    environment: ${{ github.ref == 'refs/heads/main' && 'mainline' || '' }}
    container:
      image: harbor.ci.tenstorrent.net/${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        TT_METAL_RUNTIME_ROOT: /work
        LD_LIBRARY_PATH: /work/build/lib
        PYTHONPATH: /work
        TEST_DATA_DIR: /work/data
        ENABLE_CI_ONLY_TT_TRAIN_TESTS: 1
        TT_LOGGER_LEVEL: warn
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
          filter: blob:none
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher || false }}
          enable-lightweight-kernel-asserts: ${{ inputs.enable-lightweight-kernel-asserts || false }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
          enable-kernel-ccache: true
          redis-ccache-storage: redis://${{ vars.REDIS_CCACHE_USER }}:${{ secrets.REDIS_CCACHE_PASSWORD }}@${{ vars.REDIS_CCACHE_HOST }}:${{ vars.REDIS_CCACHE_PORT }}|read-only=${{ vars.REDIS_CCACHE_IS_READONLY }}
          auto-triage: ${{ !inputs.enable-watcher }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}

      - name: Install ttml module
        timeout-minutes: 10
        if: ${{ inputs.wheel-artifact-name }}
        run: |
          SITE_PACKAGES=$(uv pip show ttnn | sed -n 's/^Location: //p')
          TTML_SRC_DIR="$TT_METAL_HOME/tt-train/sources/ttml"
          TTML_BUILD_DIR="$TT_METAL_HOME/build/tt-train/sources/ttml"
          echo "$TTML_SRC_DIR" > "$SITE_PACKAGES/ttml.pth"
          echo "$TTML_BUILD_DIR" > "$SITE_PACKAGES/_ttml.pth"

      - name: ${{ matrix.test-group.name }} tests
        timeout-minutes: ${{ inputs.timeout }}
        if: ${{ !inputs.wheel-artifact-name }}
        env:
          GTEST_FILTER: ${{ inputs.gtest_filter }}
        run: |
          cd /work/build/tt-train
          mkdir -p generated/test_reports /work/generated/test_logs
          ldd tests/ttml_tests || true
          LOG_FILE="/work/generated/test_logs/tt_train_cpp_${{ job.check_run_id }}.log"
          {
            python3 /work/tools/tt-power-sidecar/tt_power_sidecar.py \
              --backend sysfs \
              --out /work/power_report.json \
              -- bash -c '${{ matrix.test-group.cmd }}'
          } 2>&1 | tee "$LOG_FILE"
          exit "${PIPESTATUS[0]}"

      - name: ${{ matrix.test-group-py.name }} tests
        timeout-minutes: ${{ inputs.timeout }}
        if: ${{ inputs.wheel-artifact-name }}
        run: |
          cd /work/tt-train
          mkdir -p /work/generated/test_logs
          LOG_FILE="/work/generated/test_logs/tt_train_py_${{ job.check_run_id }}.log"
          {
            python3 /work/tools/tt-power-sidecar/tt_power_sidecar.py \
              --backend sysfs \
              --out /work/power_report.json \
              -- bash -c '${{ matrix.test-group-py.cmd }}'
          } 2>&1 | tee "$LOG_FILE"
          exit "${PIPESTATUS[0]}"

      - name: Upload power report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: power-report-tt-train
          # /docker-job/ is the host-side mount of the Docker runner's /work/ directory.
          # The sidecar writes --out /work/power_report.json inside the container;
          # this host path is what the upload-artifact action reads.
          path: ${{ github.workspace }}/docker-job/power_report.json
          if-no-files-found: warn
          retention-days: 30

      - name: 📊 CCache Report
        if: ${{ !cancelled() }}
        run: |
          echo "::group::CCache Statistics"
          ccache --show-stats || echo "ccache stats not available"
          echo "::endgroup::"

      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          path: /work/build/tt-train/generated/test_reports/
          prefix: "test_reports_"

      - name: 🤖 AI job summary
        if: always() && !cancelled()
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/job@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE/docker-job",
              "input_dirs": ["generated/test_logs"],
              "output_dir": "generated/ai_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          job-name: ${{ matrix.test-group.name }} ${{ inputs.arch }} ${{ inputs.runner-label }}

      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
