name: "(Blackhole) Sanity Tests"

on:
  workflow_dispatch:
    inputs:
      system-type:
        description: 'Select system type to test'
        required: false
        default: "all"
        type: choice
        options:
          - all
          - P150 family (P150 + P150b CIv2 viommu + multi-card)
          - P100 family (P100 + P100a CIv2 viommu)
          - P150 (1xP150)
          - P150 CIv2 viommu (1xP150)
          - P100 (1xP100)
          - P100a CIv2 viommu (1xP100)
          - Quietbox (4xP150)
          - LoudBox (8xP150)
          - P300 (1xP300)
      enable-watcher:
        required: false
        default: false
        type: boolean
        description: "Enable watcher"
      enable-llk-asserts:
        required: false
        default: false
        type: boolean
        description: "Enable LLK asserts"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
  workflow_call:
    inputs:
      system-type:
        description: 'Select system type to test'
        required: false
        default: "all"
        type: string
      enable-watcher:
        required: false
        type: boolean
        default: false
        description: "Enable watcher"
      enable-llk-asserts:
        required: false
        type: boolean
        default: false
        description: "Enable LLK asserts"
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: string
        default: "Release"
        description: "Build type configuration (Release, Debug, RelWithDebInfo, ASan, TSan)"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      dev-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built dev Docker image tag (skips build if provided)"
      build-artifact-name:
        required: false
        type: string
        default: ""
        description: "Pre-built build artifact name (skips build if provided)"
      wheel-artifact-name:
        required: false
        type: string
        default: ""
        description: "Pre-built wheel artifact name (skips build if provided)"
  schedule:
    # Default cadence: every 4 hours on P150 family (post-commit gate).
    - cron: "0 */4 * * *"
    # P100 nightly: P100 / P100a CIv2 viommu only.
    - cron: "0 7 * * *"

run-name: >-
  ${{ (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *' && '(Blackhole) Sanity Tests (P100 nightly)')
      || (inputs.enable-watcher && '(Blackhole) Sanity Tests (watcher enabled)')
      || '(Blackhole) Sanity Tests' }}

permissions:
  actions: read
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  packages: write
  checks: write

jobs:
  generate-card-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      ttnn-matrix: ${{ steps.set-matrix.outputs.ttnn-matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          # SKU groupings:
          #   P150 family: single-card P150 (models) + P150b CIv2 viommu (profiler/umd/tt-cnn/DS-b1 ops)
          #                + multi-card (Quietbox / LoudBox / P300 viommu).
          #   P100 family: single-card P100 (models) + P100a CIv2 viommu (profiler/umd/tt-cnn/DS-b1 ops).
          p150_family='[
            {"name": "P150 (1xP150)", "sku": "bh_p150"},
            {"name": "P150 CIv2 viommu (1xP150)", "sku": "bh_p150b_civ2_viommu"},
            {"name": "Quietbox (4xP150)", "sku": "bh_llmbox"},
            {"name": "LoudBox (8xP150)", "sku": "bh_loudbox"},
            {"name": "P300 (1xP300)", "sku": "bh_p300"}
          ]'
          p100_family='[
            {"name": "P100 (1xP100)", "sku": "bh_p100"},
            {"name": "P100a CIv2 viommu (1xP100)", "sku": "bh_p100a_civ2_viommu"}
          ]'

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "0 7 * * *" ]]; then
              selection="P100 family"
            else
              selection="P150 family"
            fi
          else
            selection="${{ inputs.system-type || 'all' }}"
          fi

          echo "Resolved selection: '$selection'"

          case "$selection" in
            "all")
              matrix_systems=$(jq -c '. + input' <(echo "$p150_family") <(echo "$p100_family"))
              ttnn_skus='["bh_p150b_civ2", "bh_p100"]'
              ;;
            "P150 family"*)
              matrix_systems="$p150_family"
              ttnn_skus='["bh_p150b_civ2"]'
              ;;
            "P100 family"*)
              matrix_systems="$p100_family"
              ttnn_skus='["bh_p100"]'
              ;;
            *)
              all_systems=$(jq -c '. + input' <(echo "$p150_family") <(echo "$p100_family"))
              matrix_systems=$(echo "$all_systems" | jq -c --arg name "$selection" '[.[] | select(.name == $name)]')
              if [[ "$matrix_systems" == "[]" ]]; then
                echo "Error: No system found matching system-type='$selection'." >&2
                exit 1
              fi
              # ttnn-tests.yaml only has BH entries for bh_p100 and bh_p150b_civ2;
              # collapse the individual sanity SKU selection to whichever one applies.
              if echo "$selection" | grep -q "P100"; then
                ttnn_skus='["bh_p100"]'
              else
                ttnn_skus='["bh_p150b_civ2"]'
              fi
              ;;
          esac

          matrix_output=$(echo "{\"test-group\": $matrix_systems}" | jq -c .)
          ttnn_matrix_output=$(echo "{\"sku\": $ttnn_skus}" | jq -c .)
          echo "Matrix output: $matrix_output"
          echo "TTNN matrix output: $ttnn_matrix_output"
          echo "matrix=$matrix_output" >> $GITHUB_OUTPUT
          echo "ttnn-matrix=$ttnn_matrix_output" >> $GITHUB_OUTPUT

  build-artifact:
    if: ${{ inputs.dev-docker-image == '' }}
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true
      tracy: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-umd-tests: true
      enable-lto: ${{ inputs.enable-lto || false }}

  resolve-artifacts:
    runs-on: ubuntu-latest
    needs: [build-artifact]
    if: ${{ !cancelled() && (inputs.dev-docker-image != '' || needs.build-artifact.result == 'success') }}
    outputs:
      dev-docker-image: ${{ steps.resolve.outputs.dev-docker-image }}
      build-artifact-name: ${{ steps.resolve.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ steps.resolve.outputs.wheel-artifact-name }}
    steps:
      - id: resolve
        run: |
          if [[ -n "${{ inputs.dev-docker-image }}" || -n "${{ inputs.build-artifact-name }}" || -n "${{ inputs.wheel-artifact-name }}" ]]; then
            if [[ -z "${{ inputs.dev-docker-image }}" || -z "${{ inputs.build-artifact-name }}" || -z "${{ inputs.wheel-artifact-name }}" ]]; then
              echo "Error: When using pre-built artifacts, all three inputs must be provided:"
              echo "  - dev-docker-image: '${{ inputs.dev-docker-image }}'"
              echo "  - build-artifact-name: '${{ inputs.build-artifact-name }}'"
              echo "  - wheel-artifact-name: '${{ inputs.wheel-artifact-name }}'"
              exit 1
            fi
          fi

          if [[ -n "${{ inputs.dev-docker-image }}" ]]; then
            echo "dev-docker-image=${{ inputs.dev-docker-image }}" >> "$GITHUB_OUTPUT"
            echo "build-artifact-name=${{ inputs.build-artifact-name }}" >> "$GITHUB_OUTPUT"
            echo "wheel-artifact-name=${{ inputs.wheel-artifact-name }}" >> "$GITHUB_OUTPUT"
          else
            echo "dev-docker-image=${{ needs.build-artifact.outputs.dev-docker-image }}" >> "$GITHUB_OUTPUT"
            echo "build-artifact-name=${{ needs.build-artifact.outputs.build-artifact-name }}" >> "$GITHUB_OUTPUT"
            echo "wheel-artifact-name=${{ needs.build-artifact.outputs.wheel-artifact-name }}" >> "$GITHUB_OUTPUT"
          fi

  blackhole-sanity-tests:
    needs: [resolve-artifacts, generate-card-matrix]
    secrets: inherit
    uses: ./.github/workflows/blackhole-sanity-tests-impl.yaml
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-card-matrix.outputs.matrix) }}
    with:
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.resolve-artifacts.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enabled-skus: ${{ matrix.test-group.sku }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}

  # TTNN BH unit tests are sourced from the shared cross-arch tests/pipeline_reorg/ttnn-tests.yaml
  # and dispatched through ttnn-post-commit.yaml. The runs are pooled under this Sanity Tests
  # workflow alongside the inlined blackhole-sanity-tests-impl jobs above.
  blackhole-ttnn-unit-tests:
    needs: [resolve-artifacts, generate-card-matrix]
    secrets: inherit
    uses: ./.github/workflows/ttnn-post-commit.yaml
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-card-matrix.outputs.ttnn-matrix) }}
    with:
      enabled-skus: ${{ matrix.sku }}
      docker-image: ${{ needs.resolve-artifacts.outputs.dev-docker-image }}
      wheel-artifact-name: ${{ needs.resolve-artifacts.outputs.wheel-artifact-name }}
      enable-watcher: ${{ inputs.enable-watcher || false }}
      timeout-minutes-override: ${{ inputs.enable-watcher && 120 || 0 }}
      enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
