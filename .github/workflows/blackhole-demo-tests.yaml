name: "(Blackhole) Demo tests"

on:
  workflow_dispatch:
    inputs:
      regenerate-ttnn-cache:
        description: "Mount model cache volume read-write to regenerate TTNN cache (otherwise read-only)."
        required: false
        type: boolean
        default: false
      model:
        description: 'Select model to test'
        required: false
        default: 'llama3.1-8b'
        type: choice
        options:
          - all
          - whisper
          - llama3.1-8b
          - llama3-8b
          - unet-shallow
          - stable_diffusion_xl
          - llama3.3-70b
          - qwen3-32b
          - qwen2.5-32b-instruct
          - qwen2.5-72b-instruct
          - qwen2.5-vl-32b-instruct
          - qwen2.5-vl-72b
          - qwen3-vl-32b
          - mistral-small-3.1-24b
          - gpt-oss-20b
          - gpt-oss-120b
          - mochi
          - flux.1-dev
          - mochi
          - wan2.2-t2v-a14b
      system-type:
        description: 'Select system type to test'
        required: false
        default: "all"
        type: choice
        options:
          - all
          - P150 (1xP150)
          - P150 CIv2 (1xP150)
          - Quietbox (4xP150)
          - DeskBox (2xP150)
          - LoudBox (8xP150)
          - P300 (1xP300)
          - QuietBox 2 (2xP300)
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
  workflow_call:
    inputs:
      regenerate-ttnn-cache:
        required: false
        type: boolean
        default: false
        description: "Mount model cache volume read-write to regenerate TTNN cache (otherwise read-only)."
      model:
        required: false
        type: string
        default: 'all'
        description: "Select model to test"
      system-type:
        description: 'Select system type to test'
        required: false
        default: "all"
        type: string
      platform:
        required: false
        type: string
        default: "Ubuntu 22.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: string
        default: "Release"
        description: "Build type configuration (Release, Debug, RelWithDebInfo, ASan, TSan)"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
  schedule:
    - cron: "0 4 * * *"  # Every day at 4:00 UTC

jobs:
  generate-model-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Build per-model matrix
        id: set-matrix
        env:
          SELECTED_MODEL: ${{ inputs.model || 'all' }}
          SYSTEM_TYPE_FILTER: ${{ inputs.system-type || 'all' }}
        run: |
          set -e
          # Compute the distinct list of models that have at least one test
          # entry targeting an SKU on the requested system. This keeps the
          # run page from showing model groups that have no jobs to run after
          # the system-type filter is applied.
          models=$(python3 - <<'PY'
          import json, os, sys, yaml

          with open("tests/pipeline_reorg/blackhole_demo_tests.yaml") as f:
              tests = yaml.safe_load(f) or []
          with open(".github/blackhole_demo_systems.yaml") as f:
              systems = yaml.safe_load(f) or {}

          sku_to_system = {s["sku"]: s["name"] for s in systems.get("systems", [])}
          selected_model = os.environ["SELECTED_MODEL"]
          system_filter = os.environ["SYSTEM_TYPE_FILTER"]

          all_models = []
          matching_models = []
          for t in tests:
              m = t.get("model-name")
              if not m:
                  continue
              if m not in all_models:
                  all_models.append(m)
              if selected_model != "all" and m != selected_model:
                  continue
              if system_filter != "all":
                  if not any(sku_to_system.get(sku) == system_filter
                             for sku in (t.get("skus") or {}).keys()):
                      continue
              if m not in matching_models:
                  matching_models.append(m)

          if not matching_models:
              print(
                  f"::error::No tests match model='{selected_model}', "
                  f"system-type='{system_filter}'. Available models: {all_models}",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(json.dumps(matching_models))
          PY
          )
          matrix_output=$(echo "{\"model\": $models}" | jq -c .)
          echo "Selected model: $SELECTED_MODEL"
          echo "System-type filter: $SYSTEM_TYPE_FILTER"
          echo "Matrix output: $matrix_output"
          echo "matrix=$matrix_output" >> $GITHUB_OUTPUT
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      tracy: true
      build-wheel: true
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      enable-lto: ${{ inputs.enable-lto || false }}
  blackhole-demo-tests:
    needs: [build-artifact, generate-model-matrix]
    secrets: inherit
    uses: ./.github/workflows/blackhole-demo-tests-impl.yaml
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-model-matrix.outputs.matrix) }}
    name: ${{ matrix.model }}
    with:
      docker-image: ${{ needs.build-artifact.outputs.dev-docker-image }}
      build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
      wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
      regenerate-ttnn-cache: ${{ inputs.regenerate-ttnn-cache || false  }}
      model: ${{ matrix.model }}
      system-type-filter: ${{ inputs.system-type || 'all' }}
