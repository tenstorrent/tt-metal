          - {model: "yolov8x", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/yolov8x/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "yolov8x", arch: "blackhole", platform: "P150", test-path: "models/demos/yolov8x/tests/perf/", timeout: 45, runs-on: ["P150", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "swin_v2", arch: "wormhole_b0", platform: "N300", test-path: "models/experimental/swin_v2/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "swin_v2", arch: "blackhole", platform: "P150", test-path: "models/experimental/swin_v2/tests/perf/", timeout: 45, runs-on: ["P150", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "swin_s", arch: "wormhole_b0", platform: "N300", test-path: "models/experimental/swin_s/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "swin_s", arch: "blackhole", platform: "P150", test-path: "models/experimental/swin_s/tests/perf/", timeout: 45, runs-on: ["P150", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "yolov5x", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/yolov5x/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "yolov5x", arch: "blackhole", platform: "P150", test-path: "models/demos/yolov5x/tests/perf/", timeout: 45, runs-on: ["P150", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
