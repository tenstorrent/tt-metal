          - {model: "yolov11m", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/yolov11m/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
