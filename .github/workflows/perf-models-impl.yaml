          - {model: "yolov6l", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/yolov6l/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
