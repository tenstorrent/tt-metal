          - {model: "yolov7", arch: "blackhole", platform: "P150", test-path: "models/demos/yolov7/tests/perf/", timeout: 45, runs-on: ["P150", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "distilbert", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/wormhole/distilbert/tests/test_perf_distilbert.py", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
