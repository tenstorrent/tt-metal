name: "[internal] Perf models impl"

on:
  workflow_call:
    inputs:
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      model:
        required: false
        type: string
        default: "all"
      extra-tag:
        required: false
        type: string
        default: "in-service"

jobs:
  models-perf:
    strategy:
      # Do not fail-fast because we need to ensure all tests go to completion
      # so we try not to get hanging machines
      fail-fast: false
      matrix:
        include:
          # LLM Models - N300 WH B0 only
          - {model: "falcon7b", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/falcon7b_common/tests", timeout: 20, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "mamba", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/wormhole/mamba/tests", timeout: 20, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          
          # CNN Models - Both platforms
          - {model: "functional_unet", arch: "wormhole_b0", platform: "N300", test-path: "models/experimental/functional_unet/tests", timeout: 10, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: "--timeout=480"}
          - {model: "functional_unet", arch: "blackhole", platform: "P150", test-path: "models/experimental/functional_unet/tests", timeout: 10, runs-on: ["P150", "pipeline-functional", "cloud-virtual-machine", "${{ inputs.extra-tag }}"], machine-type: "virtual_machine", extra-args: "--timeout=480"}
          - {model: "stable_diffusion", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/wormhole/stable_diffusion/tests", timeout: 10, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: "--timeout=480"}
          - {model: "stable_diffusion", arch: "blackhole", platform: "P150", test-path: "models/demos/blackhole/stable_diffusion/tests", timeout: 10, runs-on: ["P150", "pipeline-functional", "cloud-virtual-machine", "${{ inputs.extra-tag }}"], machine-type: "virtual_machine", extra-args: "--timeout=480"}
          
          # Other Models - Both platforms
          - {model: "yolov10x", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/yolov10x/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "yolov10x", arch: "blackhole", platform: "P150", test-path: "models/demos/yolov10x/tests/perf/", timeout: 45, runs-on: ["P150", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "sentence_bert", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/sentence_bert/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "sentence_bert", arch: "blackhole", platform: "P150", test-path: "models/demos/sentence_bert/tests/perf/", timeout: 45, runs-on: ["P150", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
