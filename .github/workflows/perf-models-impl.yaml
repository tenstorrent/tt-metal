          - {model: "vgg_unet", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/vgg_unet/tests/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "vgg_unet", arch: "blackhole", platform: "P150", test-path: "models/demos/vgg_unet/tests/", timeout: 45, runs-on: ["P150", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "yolov9c", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/yolov9c/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "yolov9c", arch: "blackhole", platform: "P150", test-path: "models/demos/yolov9c/tests/perf/", timeout: 45, runs-on: ["P150", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "vanilla_unet", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/vanilla_unet/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
