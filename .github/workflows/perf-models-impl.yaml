          - {model: "ufld_v2", arch: "wormhole_b0", platform: "N300", test-path: "models/demos/ufld_v2/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "ufld_v2", arch: "blackhole", platform: "P150", test-path: "models/demos/ufld_v2/tests/perf/", timeout: 45, runs-on: ["P150", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "efficientnetb0", arch: "wormhole_b0", platform: "N300", test-path: "models/experimental/efficientnetb0/tests/perf/", timeout: 45, runs-on: ["N300", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}
          - {model: "efficientnetb0", arch: "blackhole", platform: "P150", test-path: "models/experimental/efficientnetb0/tests/perf/", timeout: 45, runs-on: ["P150", "pipeline-perf", "bare-metal", "${{ inputs.extra-tag }}"], machine-type: "bare_metal", extra-args: ""}

    name: "${{ matrix.model }} (${{ matrix.platform }} ${{ matrix.arch }})"
    runs-on: ${{ matrix.runs-on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        ARCH_NAME: ${{ matrix.arch }}
        LOGURU_LEVEL: INFO
        GITHUB_ACTIONS: true
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        HF_HUB_CACHE: ${{ ((matrix.arch == 'wormhole_b0' || (matrix.arch == 'blackhole' && (matrix.model == 'functional_unet' || matrix.model == 'stable_diffusion'))) && '/mnt/MLPerf/huggingface/hub') || '' }}
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: ⬇️  Setup Job
        uses: tenstorrent/tt-metal/.github/actions/setup-job@main
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      - name: Run ${{ matrix.model }} model_perf test
        timeout-minutes: ${{ matrix.timeout }}
        uses: tenstorrent/tt-metal/.github/actions/single-card-perf-test@main
        with:
          commands: pytest -n auto ${{ matrix.test-path }} -m models_performance_bare_metal ${{ matrix.extra-args }}
        if: ${{ !cancelled() && (inputs.model == 'all' || inputs.model == matrix.model) }}
      - name: Merge all the generated reports
        timeout-minutes: 10
        run: |
          # Merge all the generated reports
          env python3 models/perf/merge_perf_results.py
        if: ${{ !cancelled() }}

      - name: Save environment data
        if: ${{ !cancelled() }}
        shell: bash
        env:
          ARCH_NAME: ${{ matrix.arch }}
        run: python3 .github/scripts/data_analysis/create_benchmark_with_environment_json.py

      - name: Upload benchmark data
        if: ${{ !cancelled() }}
        uses: tenstorrent/tt-metal/.github/actions/upload-data-via-sftp@main
        with:
          ssh-private-key: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
          sftp-batchfile: .github/actions/upload-data-via-sftp/benchmark_data_batchfile.txt
          username: ${{ secrets.SFTP_BENCHMARK_WRITER_USERNAME }}
          hostname: ${{ secrets.SFTP_BENCHMARK_WRITER_HOSTNAME }}
          path: /work

      # TODO: Fix the pipeline before enabling notifications.
      #- uses: tenstorrent/tt-metal/.github/actions/slack-report@main
      #  if: ${{ failure() }}
      #  with:
      #    slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
      - name: Check perf report exists
        id: check-perf-report
        if: ${{ !cancelled() }}
        run: |
          ls -hal
          export PERF_REPORT_FILENAME=Models_Perf_$(date +%Y_%m_%d).csv
          ls -hal $PERF_REPORT_FILENAME
          echo "perf_report_filename=$PERF_REPORT_FILENAME" >> "$GITHUB_OUTPUT"
      - name: Upload perf report
        if: ${{ !cancelled() && steps.check-perf-report.conclusion == 'success' }}
        uses: actions/upload-artifact@v4
        timeout-minutes: 10
        with:
          name: perf-report-csv-${{ matrix.model }}-${{ matrix.arch }}-${{ matrix.machine-type }}
          path: "${{ steps.check-perf-report.outputs.perf_report_filename }}"
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          path: generated/test_reports/
          prefix: "test_reports_"
