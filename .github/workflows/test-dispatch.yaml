name: "Custom test dispatch"

on:
  workflow_dispatch:
    inputs:
      arch:
        required: true
        type: choice
        options:
          - wormhole_b0
          - blackhole
      runner-label:
        description: 'Optional: N150, N300, BH, config-t3000, topology-6u. for example: ["in-service", "config-t3000"]'
        required: true
        type: string
        default: '["in-service"]'
      tracy:
        required: false
        type: boolean
        default: false
        description: "Build with tracy enabled"
      command:
        required: true
        type: string
      description:
        type: string
        default: "Custom test dispatch"
        required: false
      commit:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"

run-name: ${{ inputs.description }}
jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  # NOTE: build-artifact.yaml handles platform parsing internally.
  # Just pass platform and enable-lto inputs directly.
  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      tracy: ${{ inputs.tracy }}
      build-wheel: true
      ref: ${{ inputs.commit || github.sha }}
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-type: ${{ inputs.build-type || 'Release' }}
      enable-lto: ${{ inputs.enable-lto || false }}
  test-dispatch:
    needs: [check-harbor, build-artifact]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      # 3-D matrix: 2 boards x 2 shapes x 5 shards = 20 cells off the ONE
      # arch-agnostic build. include entries attach per-board (label, arch)
      # and per-shape (perf_shape) — GitHub merges an include entry into every
      # cell whose existing keys it matches, so `hw:` entries fan across all
      # shapes/shards and `shape:` entries fan across all boards/shards.
      # inputs.arch / inputs.runner-label are unused — boards are fixed here.
      matrix:
        hw: [N150, P100a]
        shape: [small, large]
        shard: [1, 2, 3, 4, 5]
        include:
          - hw: N150
            label: tt-ubuntu-2204-N150-viommu-stable
            arch: wormhole_b0
          - hw: P100a
            label: tt-ubuntu-2204-P100a-viommu-stable
            arch: blackhole
          - shape: small
            perf_shape: "1,1,32,32"
          - shape: large
            perf_shape: "1,1,1024,1024"
    runs-on: ${{ matrix.label }}
    container:
      image: ${{ contains(matrix.label, 'tt-ubuntu-2204') && needs.check-harbor.outputs.harbor-prefix || '' }}${{ needs.build-artifact.outputs.dev-docker-image || 'docker-image-unresolved' }}
      env:
        ARCH_NAME: ${{ matrix.arch }}
        PERF_SHAPE: ${{ matrix.perf_shape }}   # test_eltwise_operations.py reads this
        LOGURU_LEVEL: INFO
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        TT_METAL_HOME: /work
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - ${{ !contains(matrix.label, 'viommu') && '/dev/hugepages-1G:/dev/hugepages-1G' || '/nohugepages:/nohugepages' }}
        - ${{ !contains(matrix.label, 'tt-ubuntu-2204') && '/mnt/MLPerf:/mnt/MLPerf:ro' || '/donotmount:/donotmount:ro' }}
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 10
        with:
          fetch-depth: 1
          submodules: recursive
          path: docker-job
          ref: ${{ inputs.commit || github.sha }}
      - name: 📦 Download Build Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 10
        with:
          name: ${{ needs.build-artifact.outputs.build-artifact-name }}
          path: docker-job
      - name: 📂 Extract Build Files
        timeout-minutes: 10
        working-directory: docker-job
        run: tar --zstd -xf ttm_any.tar.zst
        shell: bash
      - name: 🧪 Download Python Wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 10
        with:
          name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
          path: docker-job
      - name: 💿 Install Wheel
        timeout-minutes: 10
        working-directory: docker-job
        run: |
          echo "📂 In directory: $(pwd)"
          echo "📄 Files:"
          ls -la
          WHEEL_FILENAME=$(ls -1 *.whl)
          echo "📦 Installing $WHEEL_FILENAME"
          uv pip install "$WHEEL_FILENAME"
        shell: bash
      - name: Run regression in loop
        env:
          SHARD: ${{ matrix.shard }}
          SHARD_TOTAL: "5"
        run: |
          uv pip install pytest-repeat
          ${{ inputs.command }}
        shell: bash
      - name: 🏷️ Name shard result
        if: always()
        working-directory: /work
        run: |
          f=$(ls -1 eltwise_perf_results_*_final.json 2>/dev/null | head -1)
          if [ -n "$f" ]; then mv "$f" "shard-${{ matrix.shard }}.json"; fi
        shell: bash
      - name: 📤 Upload shard result JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Per-board, per-shape, per-shard artifact so the combine job can
          # group by (board, shape).
          name: eltwise-perf-results-${{ matrix.hw }}-${{ matrix.shape }}-shard-${{ matrix.shard }}
          path: /work/shard-${{ matrix.shard }}.json
          if-no-files-found: error
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()

  combine-results:
    needs: test-dispatch
    if: always()
    runs-on: ubuntu-latest
    # One combine per (board, shape): merge that combo's 5 shards into a single
    # named JSON. 2 boards x 2 shapes = 4 combine jobs. Runs even if some cells
    # failed (if: always()).
    strategy:
      fail-fast: false
      matrix:
        hw: [N150, P100a]
        shape: [small, large]
    steps:
      - name: ⬇️ Download this (board, shape) shard results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: eltwise-perf-results-${{ matrix.hw }}-${{ matrix.shape }}-shard-*
          merge-multiple: true
          path: shards
      - name: 🧩 Merge shards into one JSON
        run: |
          set -euo pipefail
          echo "Shard files for ${{ matrix.hw }}/${{ matrix.shape }}:"; ls -la shards/
          curl -fsSL https://raw.githubusercontent.com/Aswincloud/ttnn-performance-dashboard/main/perf_measurement_script.py -o driver.py
          python3 driver.py --merge shards/shard-*.json
          # Name the combined file after the board+shape so our repo can tell them apart.
          f=$(ls -1 eltwise_perf_results_*_final.json | head -1)
          mv "$f" "eltwise_perf_results_${{ matrix.hw }}_${{ matrix.shape }}.json"
          echo "Combined:"; ls -la "eltwise_perf_results_${{ matrix.hw }}_${{ matrix.shape }}.json"
        shell: bash
      - name: 📤 Upload combined per-(board,shape) JSON
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eltwise-perf-results-${{ matrix.hw }}-${{ matrix.shape }}
          path: eltwise_perf_results_${{ matrix.hw }}_${{ matrix.shape }}.json
          if-no-files-found: error
