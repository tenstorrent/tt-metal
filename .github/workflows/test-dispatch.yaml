name: "Custom test dispatch"

on:
  workflow_dispatch:
    inputs:
      arch:
        required: true
        type: choice
        options:
          - wormhole_b0
          - blackhole
      runner-label:
        description: 'Optional: N150, N300, BH, config-t3000, topology-6u. for example: ["in-service", "config-t3000"]'
        required: true
        type: string
        default: '["in-service"]'
      tracy:
        required: false
        type: boolean
        default: false
        description: "Build with tracy enabled"
      command:
        required: true
        type: string
      description:
        type: string
        default: "Custom test dispatch"
        required: false
      commit:
        required: false
        type: string
        default: ""
        description: "Commit SHA to test (default: HEAD)"
      platform:
        required: false
        type: choice
        default: "Ubuntu 22.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to build and test"
      build-type:
        required: false
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"

run-name: ${{ inputs.description }}
jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml
  # NOTE: build-artifact.yaml handles platform parsing internally.
  # Just pass platform and enable-lto inputs directly.
  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      tracy: ${{ inputs.tracy }}
      build-wheel: true
      ref: ${{ inputs.commit || github.sha }}
      platform: ${{ inputs.platform || 'Ubuntu 22.04' }}
      build-type: ${{ inputs.build-type || 'Release' }}
      enable-lto: ${{ inputs.enable-lto || false }}
  test-dispatch:
    needs: [check-harbor, build-artifact]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    runs-on: ${{ fromJSON(inputs.runner-label) }}
    container:
      image: ${{ contains(inputs.runner-label, 'tt-ubuntu-2204') && needs.check-harbor.outputs.harbor-prefix || '' }}${{ needs.build-artifact.outputs.dev-docker-image || 'docker-image-unresolved' }}
      env:
        ARCH_NAME: ${{ inputs.arch }}
        LOGURU_LEVEL: INFO
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        TT_METAL_HOME: /work
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - ${{ !contains(inputs.runner-label, 'viommu') && '/dev/hugepages-1G:/dev/hugepages-1G' || '/nohugepages:/nohugepages' }}
        - ${{ !contains(inputs.runner-label, 'tt-ubuntu-2204') && '/mnt/MLPerf:/mnt/MLPerf:ro' || '/donotmount:/donotmount:ro' }}
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 10
        with:
          fetch-depth: 1
          submodules: recursive
          path: docker-job
          ref: ${{ inputs.commit || github.sha }}
      - name: 📦 Download Build Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 10
        with:
          name: ${{ needs.build-artifact.outputs.build-artifact-name }}
          path: docker-job
      - name: 📂 Extract Build Files
        timeout-minutes: 10
        working-directory: docker-job
        run: tar --zstd -xf ttm_any.tar.zst
        shell: bash
      - name: 🧪 Download Python Wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 10
        with:
          name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
          path: docker-job
      - name: 💿 Install Wheel
        timeout-minutes: 10
        working-directory: docker-job
        run: |
          echo "📂 In directory: $(pwd)"
          echo "📄 Files:"
          ls -la
          WHEEL_FILENAME=$(ls -1 *.whl)
          echo "📦 Installing $WHEEL_FILENAME"
          uv pip install "$WHEEL_FILENAME"
        shell: bash
      - name: Run regression in loop
        env:
          SHARD: ${{ matrix.shard }}
          SHARD_TOTAL: "5"
        run: |
          uv pip install pytest-repeat
          ${{ inputs.command }}
        shell: bash
      - name: 🏷️ Name shard result
        if: always()
        working-directory: /work
        run: |
          f=$(ls -1 eltwise_perf_results_*_final.json 2>/dev/null | head -1)
          if [ -n "$f" ]; then mv "$f" "shard-${{ matrix.shard }}.json"; fi
        shell: bash
      - name: 📤 Upload shard result JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eltwise-perf-results-shard-${{ matrix.shard }}
          path: /work/shard-${{ matrix.shard }}.json
          if-no-files-found: error
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()

  combine-results:
    needs: test-dispatch
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Download all shard results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: eltwise-perf-results-shard-*
          merge-multiple: true
          path: shards
      - name: 🧩 Merge shards into one JSON
        run: |
          set -euo pipefail
          echo "Shard files downloaded:"; ls -la shards/
          curl -fsSL https://raw.githubusercontent.com/Aswincloud/ttnn-performance-dashboard/main/perf_measurement_script.py -o driver.py
          python3 driver.py --merge shards/shard-*.json
          echo "Combined file:"; ls -1 eltwise_perf_results_*_final.json
        shell: bash
      - name: 📤 Upload combined perf results JSON
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eltwise-perf-results
          path: eltwise_perf_results_*_final.json
          if-no-files-found: error
