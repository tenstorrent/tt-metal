name: "[internal] Runtime unit tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
      collect-coverage:
        required: false
        type: boolean
        default: false
        description: "When true, collect LLVM profraw data and upload per-job profdata artifact for coverage aggregation."

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/runtime_unit_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "unit"
      - name: Build unified test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml

  runtime-unit-tests:
    needs: load-test-matrix
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      # Pull the canonical GHCR image directly rather than via the Harbor
      # pull-through mirror. A job-level `container:` image is resolved and pulled by
      # the runner harness *before any step runs*, so there is no opportunity to retry
      # or fall back if an individual silicon runner transiently cannot resolve
      # harbor.ci.tenstorrent.net. check-harbor probes from a different runner, so a
      # globally-healthy Harbor can still yield an unresolvable image on the box that
      # actually pulls (DNS split-brain). GHCR-direct is the path the multi-host SKUs
      # and the Harbor-outage fallback already use, so harbor-prefix is intentionally
      # not applied here.
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        ARCH_NAME: ${{ contains(matrix.test-group.sku, 'bh_') && 'blackhole' || 'wormhole_b0' }}
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        LSAN_OPTIONS: suppressions=/usr/share/tt-metalium/lsan.supp
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
      - name: Ensure BH links online
        if: ${{ contains(matrix.test-group.sku, 'bh_loudbox') || contains(matrix.test-group.sku, 'bh_galaxy') }}
        uses: tenstorrent/tt-metal/.github/actions/ensure-bh-links-online@main
        timeout-minutes: 10
      - name: Set up coverage profiling
        if: ${{ inputs.collect-coverage }}
        run: |
          mkdir -p /work/coverage
          echo "LLVM_PROFILE_FILE=/work/coverage/%p-%m.profraw" >> "$GITHUB_ENV"
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          mkdir -p generated/test_reports
          echo "${{ matrix.test-group.cmd }}"
          ${{ matrix.test-group.cmd }}
      - name: Upload profdata artifact
        if: ${{ inputs.collect-coverage && always() }}
        run: |
          profraw_count=$(find /work/coverage -name "*.profraw" | wc -l)
          if [ "$profraw_count" -eq 0 ]; then
            echo "No profraw files found, skipping upload"
            exit 0
          fi
          # Use find+xargs to avoid ARG_MAX limits when many processes emit profraw files.
          find /work/coverage -name "*.profraw" -print0 | \
            xargs -0 llvm-profdata-20 merge -sparse -o /work/coverage/job.profdata
          echo "Merged ${profraw_count} profraw files into job.profdata ($(du -h /work/coverage/job.profdata | cut -f1))"
        shell: bash
      - name: Upload profdata
        if: ${{ inputs.collect-coverage && always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: profdata-metal-runtime-${{ matrix.test-group.name }}
          path: ${{ github.workspace }}/docker-job/coverage/job.profdata
          if-no-files-found: ignore
          retention-days: 1
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_METAL_INFRA_PIPELINE_STATUS_ALERT }}
          owner: ${{ matrix.test-group.owner_id }}
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
