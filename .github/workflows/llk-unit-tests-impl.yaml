name: "[internal] LLK unit tests impl"

on:
  workflow_call:
    inputs:
      docker-image:
        required: true
        type: string
      build-artifact-name:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
        description: "Comma-separated SKU list, or the literal ALL_SKUS_IN_TESTS."
      dispatch-mode:
        required: true
        type: string
        description: "'fd' for fast dispatch, 'sd' for slow dispatch."
      include-nightly-only:
        required: false
        type: boolean
        default: false
        description: "When true, include entries flagged nightly_only"
      enable-llk-asserts:
        required: false
        type: boolean
        default: true
        description: "Enable LLK asserts"

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter-matrix.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/llk_unit_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "unit"
      - name: Build unified test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Filter matrix by dispatch-mode and nightly inclusion
        id: filter-matrix
        env:
          MATRIX: ${{ steps.build-matrix.outputs.matrix }}
          DISPATCH_MODE: ${{ inputs.dispatch-mode }}
          INCLUDE_NIGHTLY: ${{ inputs.include-nightly-only }}
        run: |
          filtered=$(echo "$MATRIX" | jq -c \
            --arg dm "$DISPATCH_MODE" \
            --argjson inc_nightly "$INCLUDE_NIGHTLY" \
            '[.[] | select(.dispatch_mode == $dm) | select($inc_nightly or ((.nightly_only // false) | not))]')
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$filtered" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  llk-unit-tests:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: >-
      ${{ matrix.test-group.name }}${{
        (matrix.test-group.gtest_shard_total || 1) > 1
        && format(' shard {0}/{1}', matrix.test-group.gtest_shard_index, matrix.test-group.gtest_shard_total)
        || ''
      }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        ARCH_NAME: ${{ matrix.test-group.arch }}
        LOGURU_LEVEL: INFO
        TT_LOGGER_LEVEL: warn
        LD_LIBRARY_PATH: /work/build/lib
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        TT_METAL_HOME: /work
        GTEST_TOTAL_SHARDS: ${{ matrix.test-group.gtest_shard_total || 1 }}
        GTEST_SHARD_INDEX: ${{ matrix.test-group.gtest_shard_index || 0 }}
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts }}
          auto-triage: true
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          mkdir -p generated/test_reports
          ${{ inputs.dispatch-mode == 'sd' && 'TT_METAL_SLOW_DISPATCH_MODE=1 ' || '' }}${{ matrix.test-group.cmd }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - name: Generate gtest annotations on failure
        uses: tenstorrent/tt-metal/.github/actions/generate-gtest-failure-message@main
        if: ${{ failure() }}
