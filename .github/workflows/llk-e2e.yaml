name: "LLK e2e Tests"

on:
  schedule:
    # Run every night at 1AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      pytest_markers:
        description: "Pytest mark expression for testing (e.g., 'nightly', 'perf')"
        required: false
        default: "not perf"
        type: string

permissions:
  checks: write
  contents: read
  packages: write

jobs:
  build-images:
    name: "Docker setup"
    uses: ./.github/workflows/build-docker-artifact.yaml

  e2e-test-wormhole:
    name: "LLK e2e (Wormhole)"
    needs: build-images
    uses: ./.github/workflows/llk-e2e-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-images.outputs.llk-ci-tag }}
      enabled-skus: wh_n150_civ2
      pytest-markers: ${{ inputs.pytest_markers || 'not perf and not quasar' }}
      runs-on-for-coverage: tt-ubuntu-2204-n150-stable
      coverage: true

  e2e-test-blackhole:
    name: "LLK e2e (Blackhole)"
    needs: build-images
    uses: ./.github/workflows/llk-e2e-impl.yaml
    secrets: inherit
    with:
      docker-image: ${{ needs.build-images.outputs.llk-ci-tag }}
      enabled-skus: bh_p150b_civ2
      pytest-markers: ${{ inputs.pytest_markers || 'not perf and not quasar' }}
      runs-on-for-coverage: tt-ubuntu-2204-p150b-stable
      coverage: true

  e2e-summary:
    name: "LLK e2e summary"
    if: always()
    needs:
      - e2e-test-wormhole
      - e2e-test-blackhole
    runs-on: ubuntu-latest
    steps:
      - name: Check e2e test results
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  report-status:
    name: "Report status"
    runs-on: ubuntu-latest
    if: always()
    needs: e2e-summary
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Report status
        uses: ./.github/actions/report-failure
        with:
          test_name: "LLK e2e Tests"
          slack_bot_token: ${{ secrets.LLK_SLACK_REPORTING_BOT_TOKEN }}
          slack_channel_id: ${{ secrets.LLK_CI_STATUS_CHANNEL_ID }}
          status: ${{ needs.e2e-summary.result }}
