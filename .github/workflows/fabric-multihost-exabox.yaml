name: "(SC4) Health check & Fabric Test"

on:
  schedule:
    - cron: "0 5 * * *" # Runs every day at 5:00 AM UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: read # pull the pinned DC-validation image from GHCR

run-name: Fabric Test on a BH Quad
jobs:
  check-harbor:
    uses: ./.github/workflows/check-harbor.yaml

  build-artifact:
    needs: check-harbor
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      harbor-prefix: ${{ needs.check-harbor.outputs.harbor-prefix }}
      build-wheel: true
      platform: "Ubuntu 22.04"
      skip-tt-train: false
      ref: ${{ github.sha }}

  create-allocation:
    name: Create Allocation for 32x4 RINGxRING
    needs: build-artifact
    timeout-minutes: 30
    runs-on:
      group: exabox
      labels: exabox-multihost
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20

      - name: Extract allocation spec from SKU
        id: extract-spec
        run: |
          pip3 install PyYAML
          {
            echo "allocation_spec<<EOF"
            python3 .github/scripts/utils/extract_allocation_from_sku.py "bh_sc4-mgd"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create allocation
        id: allocation
        uses: ./.github/actions/ttop-create-allocation
        with:
          allocationName: ci-${{ github.run_id }}-metal
          namespace: ttop-ci
          spec: ${{ steps.extract-spec.outputs.allocation_spec }}

  run:
    name: Run test
    needs: [build-artifact, create-allocation]
    runs-on:
      group: exabox
      labels: exabox-multihost-with-nfs
    env:
      PATH: "/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      VIRTUAL_ENV: /opt/venv
      HOME: /home/user
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20

      - name: Parse docker image
        id: parse-image
        run: |
          IMAGE="${{ needs.build-artifact.outputs.dev-docker-image }}"
          REPOSITORY="${IMAGE%:*}"
          TAG="${IMAGE##*:}"
          echo "repository=$REPOSITORY" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Get Allocation data
        uses: ./.github/actions/ttop-get-allocation-data
        with:
          allocationName: ci-${{ github.run_id }}-metal
          allocationNamespace: ttop-ci

      - name: Create environment
        uses: ./.github/actions/ttop-create-environment
        timeout-minutes: 30
        with:
          environmentName: ci-${{ github.run_id }}-metal
          allocationName: ci-${{ github.run_id }}-metal
          allocationNamespace: ttop-ci
          workerRepository: ${{ steps.parse-image.outputs.repository }}
          workerTag: ${{ steps.parse-image.outputs.tag }}
          useDevHostMount: 'true'
          sharedVolumeEnabled: 'true'
          path: /etc/ttop

      - name: 📦 Download Build Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build-artifact.outputs.build-artifact-name }}
          path: /ci/artifacts

      - name: 🧪 Download Python Wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}
          path: /ci/artifacts

      - name: Unpack artifacts & install
        run: |
          # Move the cloned directory to workers. TODO: Clone directly to NFS
          rm -rf /ci/tt-metal
          cp -r "$GITHUB_WORKSPACE" /ci/tt-metal
          if ! command -v zstd >/dev/null 2>&1; then
            echo "zstd not found in runner context, installing fallback..."
            sudo apt-get update
            sudo apt-get install -y zstd
          fi
          shopt -s globstar nullglob
          build_archives=(/ci/artifacts/**/*.tar.zst)
          echo "Found ${#build_archives[@]} .tar.zst candidate(s) under /ci/artifacts"
          printf ' - %s\n' "${build_archives[@]}"
          if [ ${#build_archives[@]} -eq 0 ]; then
            echo "ERROR: Could not find any .tar.zst under /ci/artifacts"
            echo "Artifact directory layout:"
            ls -R /ci/artifacts
            exit 1
          fi
          BUILD_ARCHIVE="${build_archives[0]}"
          echo "Using build archive: ${BUILD_ARCHIVE}"

          sudo rm -rf /home/user/tt-metal
          sudo mkdir -p /home/user/tt-metal
          sudo chown "$(id -u):$(id -g)" /home/user/tt-metal
          tar --zstd -xf "${BUILD_ARCHIVE}" -C /home/user/tt-metal

          mpirun --pernode bash -lc 'rm -rf /home/user/tt-metal && cp -r /ci/tt-metal /home/user/'
          mpirun --pernode git -C /home/user/tt-metal submodule update --init --recursive

          # Unpack artifacts
          mpirun --pernode tar --zstd -xf "${BUILD_ARCHIVE}" -C /home/user/tt-metal
          ttnn_wheels=(/ci/artifacts/**/ttnn-*.whl)
          echo "Found ${#ttnn_wheels[@]} ttnn wheel candidate(s) under /ci/artifacts"
          printf ' - %s\n' "${ttnn_wheels[@]}"
          if [ ${#ttnn_wheels[@]} -eq 0 ]; then
            echo "ERROR: Could not find ttnn-*.whl under /ci/artifacts"
            echo "Artifact directory layout:"
            ls -R /ci/artifacts
            exit 1
          fi
          mpirun --pernode uv pip install "${ttnn_wheels[@]}"

      - name: Reset cards and validate cluster
        working-directory: /tmp
        timeout-minutes: 30
        run: |
          MAX_RECOVERY_ATTEMPTS=10

          echo "--- Pre-check: tt-smi visibility on all hosts ---"
          mpirun --pernode --tag-output \
            bash -lc '
              snapshot=$(tt-smi --snapshot_no_tty --snapshot)
              driver=$(jq -r ".host_info.Driver // \"unknown\"" <<< "$snapshot")
              tt_smi=$(jq -r ".host_sw_vers.tt_smi // \"unknown\"" <<< "$snapshot")
              echo "$(hostname): Driver=${driver} tt_smi=${tt_smi}"
            ' || true

          run_cluster_validation() {
            mpirun --pernode --tag-output \
              /home/user/tt-metal/build/tools/scaleout/run_cluster_validation \
              --send-traffic \
              --hard-fail \
              --cabling-descriptor-path /data/scaleout_configs/bh_glx_exabox/cabling_descriptor.textproto \
              --deployment-descriptor-path /data/scaleout_configs/bh_glx_exabox/deployment_descriptor.textproto \
              --num-iterations 5
          }

          echo "--- Checking cluster health before reset ---"
          if run_cluster_validation; then
            echo "SUCCESS: Cluster validation passed without reset"
            exit 0
          fi

          for attempt in $(seq 1 "$MAX_RECOVERY_ATTEMPTS"); do
            echo "=== Recovery attempt $attempt of $MAX_RECOVERY_ATTEMPTS ==="
            reset_success=false
            validation_success=false

            echo "--- Resetting cards with tt-smi ---"
            if mpirun --pernode tt-smi -glx_reset; then
              reset_success=true
            else
              echo "WARNING: Reset failed on attempt $attempt"
            fi

            if [ "$reset_success" = true ]; then
              echo "--- Sleeping 5s after reset to allow links/services to settle ---"
              sleep 5

              echo "--- Running cluster validation ---"
              if run_cluster_validation; then
                validation_success=true
              else
                echo "WARNING: Validation failed on attempt $attempt"
              fi
            else
              echo "WARNING: Skipping validation because reset failed on attempt $attempt"
            fi

            if [ "$reset_success" = true ] && [ "$validation_success" = true ]; then
              echo "SUCCESS: Reset and cluster validation passed on attempt $attempt"
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_RECOVERY_ATTEMPTS" ]; then
              echo "Sleeping 30s before retry..."
              sleep 30
            fi
          done

          echo "ERROR: Recovery failed after $MAX_RECOVERY_ATTEMPTS attempts"
          exit 1

      - name: Verify ttnn imports on workers
        working-directory: /tmp
        run: |
          mpirun --pernode --tag-output bash -lc '
            python3 -c "import ttnn; print(\"ttnn import: OK\")"
            python3 -c "import ttnn.device; print(\"ttnn.device import: OK\")"
          '

      - name: Run Physical discovery test
        timeout-minutes: 10
        run: |
          mpirun --tag-output -x LD_LIBRARY_PATH -x TT_METAL_RUNTIME_ROOT --pernode /home/user/tt-metal/build/test/tt_metal/tt_fabric/test_physical_discovery

      - name: Run System Health Check
        timeout-minutes: 10
        run: |
          mpirun --tag-output -x LD_LIBRARY_PATH -x TT_METAL_RUNTIME_ROOT --pernode \
            /home/user/tt-metal/build/test/tt_metal/tt_fabric/test_system_health --min-connections 2

      - name: Run Fabric Test
        timeout-minutes: 20
        working-directory: /home/user/tt-metal
        run: |
          TTRUN_DIR=/etc/ttop
          PIPELINE_HOSTS=$(awk 'NF {printf "%s,", $1}' "${TTRUN_DIR}/hostfile" | sed 's/,$//')

          tt-run --skip-mgd-check --skip-executable-check \
            --rank-binding "${TTRUN_DIR}/rank_bindings.yaml" \
            --mpi-args "--tag-output --host $PIPELINE_HOSTS --map-by rankfile:file=${TTRUN_DIR}/rankfile --bind-to hwt:overload-allowed --wdir ${TT_METAL_HOME}" \
            /home/user/tt-metal/build/test/tt_metal/tt_fabric/test_infra/test_tt_fabric --test_config /home/user/tt-metal/tests/tt_metal/tt_fabric/test_infra/test_yamls/test_bh_glx_superpod_short_running.yaml

  cleanup:
    name: Cleanup
    needs: [run, create-allocation]
    if: always()
    runs-on:
      group: exabox
      labels: exabox-multihost
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20

      - name: Delete environment
        uses: ./.github/actions/ttop-delete-environment
        with:
          environmentName: ci-${{ github.run_id }}-metal
          namespace: ttop-ci

      - name: Delete allocation
        uses: ./.github/actions/ttop-delete-allocation
        with:
          allocationName: ci-${{ github.run_id }}-metal
          namespace: ttop-ci

  # ===========================================================================
  # DC validation (issue #50505): single BH galaxy, pinned upstream image.
  #
  # Runs on its OWN single-galaxy (bh_sc1) allocation so the runtime topology
  # matches the single-galaxy `--config 4x8` test. The shared quad allocation
  # above is 32x4 and would mismatch a single-galaxy test. run_fabric_tests.sh
  # --image keeps the pinned image loaded and runs the test INSIDE it.
  # ===========================================================================
  create-allocation-dc:
    name: Create Allocation for DC validation (single galaxy)
    needs: build-artifact
    timeout-minutes: 30
    runs-on:
      group: exabox
      labels: exabox-multihost
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20

      - name: Extract allocation spec from SKU
        id: extract-spec
        run: |
          pip3 install PyYAML
          {
            echo "allocation_spec<<EOF"
            python3 .github/scripts/utils/extract_allocation_from_sku.py "bh_sc1"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create allocation
        id: allocation
        uses: ./.github/actions/ttop-create-allocation
        with:
          allocationName: ci-${{ github.run_id }}-dc
          namespace: ttop-ci
          spec: ${{ steps.extract-spec.outputs.allocation_spec }}

  run-dc:
    name: Run DC validation test
    needs: [build-artifact, create-allocation-dc]
    runs-on:
      group: exabox
      labels: exabox-multihost-with-nfs
    env:
      PATH: "/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      VIRTUAL_ENV: /opt/venv
      HOME: /home/user
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20

      - name: Parse docker image
        id: parse-image
        run: |
          IMAGE="${{ needs.build-artifact.outputs.dev-docker-image }}"
          echo "repository=${IMAGE%:*}" >> $GITHUB_OUTPUT
          echo "tag=${IMAGE##*:}" >> $GITHUB_OUTPUT

      - name: Get Allocation data
        uses: ./.github/actions/ttop-get-allocation-data
        with:
          allocationName: ci-${{ github.run_id }}-dc
          allocationNamespace: ttop-ci

      - name: Create environment
        uses: ./.github/actions/ttop-create-environment
        timeout-minutes: 30
        with:
          environmentName: ci-${{ github.run_id }}-dc
          allocationName: ci-${{ github.run_id }}-dc
          allocationNamespace: ttop-ci
          workerRepository: ${{ steps.parse-image.outputs.repository }}
          workerTag: ${{ steps.parse-image.outputs.tag }}
          useDevHostMount: 'true'
          sharedVolumeEnabled: 'true'
          path: /etc/ttop

      - name: Reset cards (single galaxy)
        timeout-minutes: 15
        run: |
          mpirun --pernode tt-smi -glx_reset || echo "WARNING: glx_reset failed; continuing"

      # HOME (/home/user) must exist and be writable: docker login writes creds
      # there, and mpi-docker mounts -v $HOME:$HOME into the DC container.
      - name: Prepare home directory
        run: |
          sudo mkdir -p /home/user
          sudo chown "$(id -u):$(id -g)" /home/user

      # run_fabric_tests.sh auto-detects the MPI interface with `ip` (iproute2),
      # which is not installed on the exabox runner. Install it and dump the
      # interfaces so we can pin --mpi-if if auto-detection can't pick one.
      - name: Install iproute2 for MPI interface detection
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends iproute2
          echo "--- available interfaces ---"; ip -br link || true

      - name: Log in to GHCR (DC-validation image)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Verbatim BH command from issue #50505; --image keeps the pinned image loaded.
      - name: DC validation - 2D Torus XY Neighbor Exchange (BH, pinned image)
        timeout-minutes: 20
        run: |
          # mpi-docker hardcodes `mpirun-ulfm`, which this runner does not have
          # (tt-run also reports "mpirun-ulfm not found, falling back to mpirun").
          # Provide a shim on PATH that forwards to the plain mpirun that works here.
          if ! command -v mpirun-ulfm >/dev/null 2>&1; then
            printf '#!/bin/bash\nexec mpirun "$@"\n' | sudo tee /usr/local/bin/mpirun-ulfm >/dev/null
            sudo chmod +x /usr/local/bin/mpirun-ulfm
          fi
          set -o pipefail
          ./tools/scaleout/exabox/run_fabric_tests.sh \
            --hosts "$(hostname)" \
            --image ghcr.io/tenstorrent/tt-metal/upstream-tests-bh-glx:v0.76.0-dev20260719-4-g7361a7ac160 \
            --config 4x8 \
            --test-config tests/tt_metal/tt_metal/perf_microbenchmark/routing/test_fabric_sanity_neighbor_exchange.yaml \
            --filter name.2DTorusXYNeighborExchange 2>&1 | tee dc_result.log
          # run_fabric_tests.sh exits 0 even on failure; enforce a real pass/fail.
          grep -q "ALL FABRIC TESTS PASSED" dc_result.log && ! grep -q "DID NOT FULLY PASS" dc_result.log \
            || { echo "::error::DC validation (single galaxy) did not pass"; exit 1; }

  cleanup-dc:
    name: Cleanup DC validation
    needs: [run-dc, create-allocation-dc]
    if: always()
    runs-on:
      group: exabox
      labels: exabox-multihost
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20

      - name: Delete environment
        uses: ./.github/actions/ttop-delete-environment
        with:
          environmentName: ci-${{ github.run_id }}-dc
          namespace: ttop-ci

      - name: Delete allocation
        uses: ./.github/actions/ttop-delete-allocation
        with:
          allocationName: ci-${{ github.run_id }}-dc
          namespace: ttop-ci

  # ===========================================================================
  # DC validation on the QUAD (issue #50505). The ttop worker hosts have no
  # docker, so run_fabric_tests.sh --image (mpi-docker) can't run here. Instead
  # we deploy the PINNED image AS the ttop worker environment and run the
  # neighbor-exchange test with tt-run over mpirun (the way the SC4 job runs its
  # fabric test) -- no docker needed on the hosts, and the image is still what's
  # exercised (it IS the worker image).
  # ===========================================================================
  create-allocation-dc-quad:
    name: Create Allocation for DC validation (quad)
    needs: build-artifact
    timeout-minutes: 30
    runs-on:
      group: exabox
      labels: exabox-multihost
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20

      - name: Extract allocation spec from SKU
        id: extract-spec
        run: |
          pip3 install PyYAML
          {
            echo "allocation_spec<<EOF"
            python3 .github/scripts/utils/extract_allocation_from_sku.py "bh_sc4-mgd"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create allocation
        id: allocation
        uses: ./.github/actions/ttop-create-allocation
        with:
          allocationName: ci-${{ github.run_id }}-dc-quad
          namespace: ttop-ci
          spec: ${{ steps.extract-spec.outputs.allocation_spec }}

  run-dc-quad:
    name: Run DC validation test (quad)
    needs: create-allocation-dc-quad
    runs-on:
      group: exabox
      labels: exabox-multihost-with-nfs
    env:
      PATH: "/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      VIRTUAL_ENV: /opt/venv
      HOME: /home/user
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20

      - name: Get Allocation data
        uses: ./.github/actions/ttop-get-allocation-data
        with:
          allocationName: ci-${{ github.run_id }}-dc-quad
          allocationNamespace: ttop-ci

      # Deploy the PINNED DC image as the ttop worker environment (instead of the
      # freshly-built dev image), so the test runs inside the pinned image.
      - name: Create environment (pinned image workers)
        uses: ./.github/actions/ttop-create-environment
        timeout-minutes: 30
        with:
          environmentName: ci-${{ github.run_id }}-dc-quad
          allocationName: ci-${{ github.run_id }}-dc-quad
          allocationNamespace: ttop-ci
          workerRepository: ghcr.io/tenstorrent/tt-metal/upstream-tests-bh-glx
          workerTag: v0.76.0-dev20260719-4-g7361a7ac160
          useDevHostMount: 'true'
          sharedVolumeEnabled: 'true'
          path: /etc/ttop

      - name: Reset cards
        timeout-minutes: 15
        run: |
          mpirun --pernode tt-smi -glx_reset || echo "WARNING: glx_reset failed; continuing"

      # Same tt-run invocation as the SC4 fabric test, but running the DC
      # neighbor-exchange test config against the pinned-image workers.
      - name: DC validation (quad) - 2D Torus XY Neighbor Exchange (BH, pinned image workers)
        timeout-minutes: 20
        working-directory: /home/user/tt-metal
        run: |
          TTRUN_DIR=/etc/ttop
          PIPELINE_HOSTS=$(awk 'NF {printf "%s,", $1}' "${TTRUN_DIR}/hostfile" | sed 's/,$//')

          set -o pipefail
          tt-run --skip-mgd-check --skip-executable-check \
            --rank-binding "${TTRUN_DIR}/rank_bindings.yaml" \
            --mpi-args "--tag-output --host $PIPELINE_HOSTS --map-by rankfile:file=${TTRUN_DIR}/rankfile --bind-to hwt:overload-allowed --wdir ${TT_METAL_HOME}" \
            /home/user/tt-metal/build/test/tt_metal/tt_fabric/test_infra/test_tt_fabric \
            --test_config tests/tt_metal/tt_metal/perf_microbenchmark/routing/test_fabric_sanity_neighbor_exchange.yaml \
            --filter name.2DTorusXYNeighborExchange 2>&1 | tee dc_quad_result.log
          # Require the per-rank success marker so a partial/no-op run can't pass.
          grep -q "All tests completed successfully" dc_quad_result.log \
            || { echo "::error::DC validation (quad) did not pass"; exit 1; }

  cleanup-dc-quad:
    name: Cleanup DC validation (quad)
    needs: [run-dc-quad, create-allocation-dc-quad]
    if: always()
    runs-on:
      group: exabox
      labels: exabox-multihost
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20

      - name: Delete environment
        uses: ./.github/actions/ttop-delete-environment
        with:
          environmentName: ci-${{ github.run_id }}-dc-quad
          namespace: ttop-ci

      - name: Delete allocation
        uses: ./.github/actions/ttop-delete-allocation
        with:
          allocationName: ci-${{ github.run_id }}-dc-quad
          namespace: ttop-ci
