name: "LLK onboarding perf"

on:
  push:
    branches:
      - nstojicTT-feature-onboarding-test
    paths:
      - "tt_metal/tt-llk/tests/sources/eltwise_onboarding.cpp"
      - "tt_metal/tt-llk/tests/python_tests/perf_eltwise_onboarding.py"
      - ".github/workflows/onboarding_perf*.yaml"

  workflow_dispatch:
    inputs:
      chip_arch:
        description: "Target architecture to run the onboarding test on"
        required: true
        default: "wormhole"
        type: choice
        options:
          - wormhole
          - blackhole

permissions:
  checks: write
  contents: read # checkout
  packages: write # pull the LLK CI docker image

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  onboarding-perf:
    name: "Onboarding perf (${{ inputs.chip_arch || 'wormhole' }})"
    uses: ./.github/workflows/onboarding_perf-impl.yaml
    secrets: inherit
    with:
      chip_arch: ${{ inputs.chip_arch || 'wormhole' }}
