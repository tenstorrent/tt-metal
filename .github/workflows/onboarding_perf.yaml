name: "LLK onboarding perf"
# Entry point for the onboarding perf test.
# This file owns *when* the pipeline runs; the actual work lives in the
# reusable implementation workflow (onboarding_perf-impl.yaml).
#
# Compare with the production pair llk-perf.yaml / llk-perf-impl.yaml: this is a
# deliberately slimmed-down version that runs ONLY the onboarding test, on a
# single board, with no nightly schedule and no Slack/summary plumbing.

on:
  # Manual trigger from the Actions tab. A workflow_dispatch workflow must exist
  # on the default branch to show up in the UI, but can then be dispatched
  # against any branch/ref -- which is how you run it on your own branch.
  workflow_dispatch:
    inputs:
      chip_arch:
        description: "Target architecture to run the onboarding test on"
        required: true
        default: "wormhole"
        type: choice
        options:
          - wormhole
          - blackhole

permissions:
  checks: write # publish JUnit results as a check
  contents: read # checkout
  packages: write # pull the LLK CI docker image

concurrency:
  # One onboarding run per branch; a newer dispatch cancels the in-flight one.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  onboarding-perf:
    name: "Onboarding perf (${{ inputs.chip_arch }})"
    # The caller -> callee handoff. `secrets: inherit` forwards org secrets the
    # docker build needs; `with:` passes the chosen architecture through.
    uses: ./.github/workflows/onboarding_perf-impl.yaml
    secrets: inherit
    with:
      chip_arch: ${{ inputs.chip_arch }}
