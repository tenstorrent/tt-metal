name: "[internal] Blackhole e2e tests impl"

on:
  workflow_call:
    inputs:
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
      enable-watcher:
        required: false
        type: boolean
        default: false
        description: "Enable watcher"
      enable-llk-asserts:
        required: false
        type: boolean
        default: false
        description: "Enable LLK asserts"

jobs:
  load-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/blackhole_e2e_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          echo "Verifying that timeouts defined in tests.yaml are within the allowed limits..."
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            "e2e"
      - name: Build unified test matrix based on enabled SKUs
        id: build-matrix
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml

  blackhole-e2e-tests:
    needs: load-test-matrix
    # Skip entire job when test matrix is empty (to prevent GHA from erroring out the workflow on an empty strategy.matrix).
    if: ${{ needs.load-test-matrix.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        ARCH_NAME: blackhole
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
        GTEST_OUTPUT: xml:/work/generated/test_reports/
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        # join() is required because contains() on an array does element-equality, not substring;
        # viommu-backed runner labels need substring matching to skip the hugepages mount.
        - ${{ (!contains(join(matrix.test-group.runs_on, ' '), 'viommu') && '/dev/hugepages-1G:/dev/hugepages-1G') || '/no_hugepages' }}
      options: "--device /dev/tenstorrent -e TT_GH_CI_INFRA"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: docker-job
      - name: Mark repository as safe directory
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
          enable-watcher: ${{ inputs.enable-watcher || false }}
          enable-llk-asserts: ${{ inputs.enable-llk-asserts || false }}
      - uses: tenstorrent/tt-metal/.github/actions/ensure-bh-links-online@main
        # Skip on single-card SKUs; multi-card systems need the link-up gate.
        # All BH single-card SKUs are bh_p100* (P100 / P100a) or bh_p150* (P150 / P150b CIv2);
        # multi-card SKUs use bh_deskbox / bh_llmbox / bh_loudbox / bh_p300 / bh_quietbox_*.
        if: ${{ !startsWith(matrix.test-group.sku, 'bh_p100') && !startsWith(matrix.test-group.sku, 'bh_p150') }}
        timeout-minutes: 10
        with:
          runner-label: ${{ (matrix.test-group.sku == 'bh_deskbox' && 'BH-DeskBox') || (matrix.test-group.sku == 'bh_loudbox' && 'BH-LoudBox') || (matrix.test-group.sku == 'bh_llmbox' && 'BH-LLMBox') || (matrix.test-group.sku == 'bh_quietbox_2' && 'BH-QB-GE') || (matrix.test-group.sku == 'bh_p300' && 'P300-viommu') || '' }}
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        run: |
          ${{ matrix.test-group.cmd }}
      - name: Print tt-smi data on failure
        if: ${{ failure() }}
        run: |
          tt-smi -s
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - name: Generate gtest annotations on failure
        uses: tenstorrent/tt-metal/.github/actions/generate-gtest-failure-message@main
        if: ${{ failure() }}
      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() && matrix.test-group.owner_id != null }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          owner: ${{ matrix.test-group.owner_id }}
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
