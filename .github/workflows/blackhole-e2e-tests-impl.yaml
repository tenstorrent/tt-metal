name: "[internal] Blackhole e2e tests impl"

on:
  workflow_call:
    inputs:
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      enabled-skus:
        required: true
        type: string
      model:
        required: false
        type: string
        default: "all"
        description: "Filter test rows by model-name (strict: only rows whose model-name matches will run; use 'all' to run every row)"
      test-selection:
        required: false
        type: string
        default: "all"
        description: "Filter test rows by id"

jobs:
  load-test-matrix:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.apply-filters.outputs.matrix }}
    env:
      TESTS_YAML_PATH: ./tests/pipeline_reorg/blackhole_e2e_tests.yaml
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          sparse-checkout: |
            .github
            tests/pipeline_reorg
          sparse-checkout-cone-mode: true
      - name: Install dependencies
        run: pip3 install PyYAML
      - name: Verify test timeouts against budget
        run: |
          set -e
          python3 .github/scripts/utils/verify_time_budget.py \
            ${{ env.TESTS_YAML_PATH }} \
            ./.github/time_budget.yaml \
            e2e
      - name: Build test matrix for enabled SKUs
        id: prepare
        run: |
          python3 .github/scripts/utils/prepare_test_matrix.py \
            ${{ env.TESTS_YAML_PATH }} \
            "${{ inputs.enabled-skus }}" \
            ./.github/sku_config.yaml
      - name: Apply test matrix filters
        id: apply-filters
        env:
          MATRIX: ${{ steps.prepare.outputs.matrix }}
          MODEL: ${{ inputs.model }}
          TEST_SELECTION: ${{ inputs.test-selection }}
        run: |
          selected="$MATRIX"

          if [[ "$TEST_SELECTION" != "all" ]]; then
            selection_exists=$(python3 - <<'PY'
          import os
          import yaml

          selection = os.environ["TEST_SELECTION"]
          tests_path = os.environ["TESTS_YAML_PATH"]

          with open(tests_path, "r") as f:
              tests = yaml.safe_load(f) or []

          matches = any(test.get("id") == selection for test in tests)

          print("true" if matches else "false")
          PY
          )
            if [[ "$selection_exists" != "true" ]]; then
              echo "::error::Unknown e2e test-selection '$TEST_SELECTION'. Use 'all' or an id from $TESTS_YAML_PATH."
              exit 1
            fi

            selected=$(echo "$selected" | jq -c --arg id "$TEST_SELECTION" '[.[] | select(.id == $id)]')
          fi

          filtered="$selected"
          if [[ "$MODEL" != "all" && -n "$MODEL" ]]; then
            filtered=$(echo "$filtered" | jq -c --arg model "$MODEL" '[.[] | select(.["model-name"] == $model)]')
          fi


          count=$(echo "$filtered" | jq 'length')
          if [[ "$count" -eq 0 ]]; then
            echo "::warning::No e2e tests match model '$MODEL' and test-selection '$TEST_SELECTION' for enabled SKU(s) '${{ inputs.enabled-skus }}'; e2e matrix is empty and jobs will be skipped."
          fi
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$filtered" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Write test matrix to file
        env:
          # Same as load-test-matrix outputs.matrix above.
          MATRIX: ${{ steps.apply-filters.outputs.matrix }}
        run: |
          echo "$MATRIX" > test_matrix_${{ inputs.enabled-skus }}.json
      - name: Upload test matrix
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test_matrix_${{ inputs.enabled-skus }}
          path: test_matrix_${{ inputs.enabled-skus }}.json
          retention-days: 1

  blackhole-e2e-tests:
    needs: load-test-matrix
    if: ${{ needs.load-test-matrix.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        test-group: ${{ fromJson(needs.load-test-matrix.outputs.matrix) }}
    name: ${{ matrix.test-group.name }}
    runs-on: ${{ matrix.test-group.runs_on }}
    container:
      image: ${{ inputs.docker-image || 'docker-image-unresolved!' }}
      env:
        ARCH_NAME: blackhole
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        LOGURU_LEVEL: INFO
        GTEST_OUTPUT: xml:/work/generated/test_reports/
        HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - ${{ (!contains(join(matrix.test-group.runs_on, ' '), 'viommu') && '/dev/hugepages-1G:/dev/hugepages-1G') || '/no_hugepages' }}
        - "${{ (matrix.test-group['weights-cache-mode'] == 'cloud-mlperf' && '/mnt/MLPerf/huggingface:/localdev/blackhole_demos/huggingface_data:ro') || (matrix.test-group['weights-cache-mode'] == 'local-disk' && '/localdev/blackhole_demos/huggingface_data:/localdev/blackhole_demos/huggingface_data:ro') || '/no_hf_cache' }}"
        - "${{ (matrix.test-group['model-name'] == 'deepseek_prefill' && '/mnt/MLPerf/deepseek-prefill-cache:/mnt/MLPerf/deepseek-prefill-cache:ro') || '/no_deepseek_traces' }}"
      options: "--device /dev/tenstorrent -e TT_GH_CI_INFRA"
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 20
        with:
          submodules: recursive
          path: docker-job
      - name: Mark repository as safe directory
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      - uses: tenstorrent/tt-metal/.github/actions/ensure-bh-links-online@main
        if: ${{ !startsWith(matrix.test-group.sku, 'bh_p100') && !startsWith(matrix.test-group.sku, 'bh_p150') }}
        timeout-minutes: 10
      - name: ${{ matrix.test-group.name }}
        timeout-minutes: ${{ matrix.test-group.timeout }}
        uses: ./docker-job/.github/actions/run-with-log
        with:
          log-file: generated/test_logs/${{ matrix.test-group.name }}.log
          run: ${{ matrix.test-group.cmd }}
      - name: Check latency/BW results
        id: check-data
        if: ${{ !cancelled() && matrix.test-group.upload_fabric_data == true }}
        uses: ./docker-job/.github/actions/check-latency-bw-results
        with:
          path: /work
          arch: blackhole
          check_bw: "true"
          check_latency: "true"
      - name: Upload BW results
        if: ${{ !cancelled() && github.ref_name == 'main' && matrix.test-group.upload_fabric_data == true && steps.check-data.outcome == 'success' && steps.check-data.outputs.has_benchmark_data == 'true' }}
        uses: tenstorrent/tt-metal/.github/actions/upload-data-via-sftp@main
        with:
          ssh-private-key: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
          sftp-batchfile: /work/.github/actions/upload-data-via-sftp/fabric_bandwidth_benchmark_data_batchfile.txt
          username: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_USERNAME }}
          hostname: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME }}
          path: /work
      - name: Upload latency data
        if: ${{ !cancelled() && github.ref_name == 'main' && matrix.test-group.upload_fabric_data == true && steps.check-data.outcome == 'success' && steps.check-data.outputs.has_latency_data == 'true' }}
        uses: tenstorrent/tt-metal/.github/actions/upload-data-via-sftp@main
        with:
          ssh-private-key: ${{ secrets.SFTP_BENCHMARK_WRITER_KEY }}
          sftp-batchfile: /work/.github/actions/upload-data-via-sftp/fabric_latency_benchmark_data_batchfile.txt
          username: ${{ secrets.SFTP_FABRIC_LATENCY_WRITER_USERNAME }}
          hostname: ${{ secrets.SFTP_FABRIC_BENCHMARK_WRITER_HOSTNAME }}
          path: /work
      - name: Print tt-smi data on failure
        if: ${{ failure() }}
        run: |
          tt-smi -s
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - name: Generate gtest annotations on failure
        uses: tenstorrent/tt-metal/.github/actions/generate-gtest-failure-message@main
        if: ${{ failure() }}
      - name: 🤖 AI job summary
        if: always() && !cancelled()
        continue-on-error: true
        uses: tenstorrent/tt-github-actions/.github/actions/ai_summary/job@main
        with:
          config: |
            {
              "model": "${{ vars.AI_SUMMARY_MODEL }}",
              "workspace": "$GITHUB_WORKSPACE/docker-job",
              "input_dirs": ["generated/test_logs"],
              "output_dir": "generated/ai_summaries"
            }
          api-key: ${{ secrets.TT_CHAT_API_KEY }}
          api-url: ${{ secrets.TT_CHAT_URL }}
          job-name: ${{ matrix.test-group.name }}
      - uses: tenstorrent/tt-metal/.github/actions/slack-report@main
        if: ${{ failure() && matrix.test-group.owner_id != null }}
        with:
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          owner: ${{ matrix.test-group.owner_id }}
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
