name: "Code analysis"

on:
  schedule:
    # Run daily at 6 PM PST (2 AM UTC next day)
    - cron: "0 2 * * *"
  workflow_call:
    inputs:
      platform:
        required: false
        type: string
        default: "Ubuntu 24.04"
        description: "Platform to analyze (e.g., 'Ubuntu 22.04', 'Ubuntu 24.04')"
      architecture:
        required: false
        type: string
        default: "amd64"
      # Pre-built Docker image tags (optional - if provided, skips docker build)
      ci-build-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built CI Build Docker image tag"
      dev-docker-image:
        required: false
        type: string
        default: ""
        description: "Pre-built Dev Docker image tag"
      build-type:
        required: false
        type: string
        default: "Release"
        description: "Build type configuration (Release, Debug, RelWithDebInfo, ASan, TSan)"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      force-scan:
        required: false
        type: boolean
        default: false
        description: "Force a full scan even if no C++ changes are detected"
  workflow_dispatch:
    inputs:
      architecture:
        required: false
        type: string
        default: "amd64"
      platform:
        required: false
        type: choice
        default: "Ubuntu 24.04"
        options:
          - "Ubuntu 22.04"
          - "Ubuntu 24.04"
        description: "Platform to analyze"
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - ASan
          - TSan
        description: "Build type configuration"
      enable-lto:
        required: false
        type: boolean
        default: false
        description: "Enable Link Time Optimization (LTO)"
      force-scan:
        required: false
        type: boolean
        default: false
        description: "Force a full scan even if no C++ changes are detected"

jobs:
  # NOTE: Platform parsing is handled by build-docker-artifact.yaml internally.
  # This workflow only needs to pass the platform string.

  determine-scan-type:
    runs-on: ubuntu-latest
    outputs:
      do-full-scan: ${{ steps.compute-outputs.outputs.do-full-scan }}
      do-scan: ${{ steps.compute-outputs.outputs.do-scan }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git safe.directory
        run: git config --global --add safe.directory ${{ github.workspace }}

      - id: find-changes
        uses: tenstorrent/tt-metal/.github/actions/find-changed-files@v0.63.0

      - id: compute-outputs
        shell: bash
        run: |
          # Full scan on main, when .clang-tidy config changed, or when forced
          if [[ "${{ inputs.force-scan }}" == "true" ]] || \
             [[ "${{ github.ref_name }}" == "main" ]] || \
             [[ "${{ steps.find-changes.outputs.clang-tidy-config-changed }}" == "true" ]]; then
            do_full_scan="true"
          else
            do_full_scan="false"
          fi

          # Skip scan entirely if no code/cmake changes and not a full scan
          if [[ "$do_full_scan" == "true" ]] || \
             [[ "${{ steps.find-changes.outputs.any-code-changed }}" == "true" ]] || \
             [[ "${{ steps.find-changes.outputs.cmake-changed }}" == "true" ]]; then
            do_scan="true"
          else
            do_scan="false"
          fi

          echo "Do a scan: $do_scan"
          echo "Do a full scan: $do_full_scan"
          echo "do-full-scan=$do_full_scan" >> "$GITHUB_OUTPUT"
          echo "do-scan=$do_scan" >> "$GITHUB_OUTPUT"

  # Only build docker images if pre-built tags are not provided
  build-docker-image:
    if: ${{ always() && !failure() && !cancelled() && inputs.ci-build-docker-image == '' }}
    uses: ./.github/workflows/build-docker-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      platform: ${{ inputs.platform || 'Ubuntu 24.04' }}
      architecture: ${{ inputs.architecture || 'amd64' }}

  # Full scan: single job that analyzes everything (main, config changes)
  clang-tidy-full:
    name: "\U0001F916 Clang Tidy (Full)"
    needs: [ build-docker-image, determine-scan-type ]
    if: >-
      ${{ always() && !failure() && !cancelled() &&
          needs.determine-scan-type.outputs.do-scan == 'true' &&
          needs.determine-scan-type.outputs.do-full-scan == 'true' }}
    uses: ./.github/workflows/clang-tidy-reusable.yaml
    secrets: inherit
    with:
      platform: ${{ inputs.platform || 'Ubuntu 24.04' }}
      architecture: ${{ inputs.architecture || 'amd64' }}
      ci-build-docker-image: >-
        ${{ inputs.ci-build-docker-image ||
            needs.build-docker-image.outputs.ci-build-tag ||
            'docker-image-unresolved!' }}
      prereq-targets: ''
      scan-targets: ''

  # Incremental scan: parallel jobs for different targets (PR branches)
  clang-tidy-incremental-tt-metal:
    name: "\U0001F916 Clang Tidy (Metalium)"
    needs: [ build-docker-image, determine-scan-type ]
    if: >-
      ${{ always() && !failure() && !cancelled() &&
          needs.determine-scan-type.outputs.do-scan == 'true' &&
          needs.determine-scan-type.outputs.do-full-scan != 'true' }}
    uses: ./.github/workflows/clang-tidy-reusable.yaml
    secrets: inherit
    with:
      platform: ${{ inputs.platform || 'Ubuntu 24.04' }}
      architecture: ${{ inputs.architecture || 'amd64' }}
      ci-build-docker-image: >-
        ${{ inputs.ci-build-docker-image ||
            needs.build-docker-image.outputs.ci-build-tag ||
            'docker-image-unresolved!' }}
      prereq-targets: ''
      scan-targets: 'tt_metal'

  clang-tidy-incremental-ttnn:
    name: "\U0001F916 Clang Tidy (TTNN)"
    needs: [ build-docker-image, determine-scan-type ]
    if: >-
      ${{ always() && !failure() && !cancelled() &&
          needs.determine-scan-type.outputs.do-scan == 'true' &&
          needs.determine-scan-type.outputs.do-full-scan != 'true' }}
    uses: ./.github/workflows/clang-tidy-reusable.yaml
    secrets: inherit
    with:
      platform: ${{ inputs.platform || 'Ubuntu 24.04' }}
      architecture: ${{ inputs.architecture || 'amd64' }}
      ci-build-docker-image: >-
        ${{ inputs.ci-build-docker-image ||
            needs.build-docker-image.outputs.ci-build-tag ||
            'docker-image-unresolved!' }}
      prereq-targets: 'tt_metal'
      scan-targets: 'ttnn'

  clang-tidy-incremental-tt-train:
    name: "\U0001F916 Clang Tidy (tt-train)"
    needs: [ build-docker-image, determine-scan-type ]
    if: >-
      ${{ always() && !failure() && !cancelled() &&
          needs.determine-scan-type.outputs.do-scan == 'true' &&
          needs.determine-scan-type.outputs.do-full-scan != 'true' }}
    uses: ./.github/workflows/clang-tidy-reusable.yaml
    secrets: inherit
    with:
      platform: ${{ inputs.platform || 'Ubuntu 24.04' }}
      architecture: ${{ inputs.architecture || 'amd64' }}
      ci-build-docker-image: >-
        ${{ inputs.ci-build-docker-image ||
            needs.build-docker-image.outputs.ci-build-tag ||
            'docker-image-unresolved!' }}
      prereq-targets: 'tt_metal ttnn'
      scan-targets: 'tt-train'

  clang-tidy-incremental-catchall:
    name: "\U0001F916 Clang Tidy (catchall)"
    needs: [ build-docker-image, determine-scan-type ]
    if: >-
      ${{ always() && !failure() && !cancelled() &&
          needs.determine-scan-type.outputs.do-scan == 'true' &&
          needs.determine-scan-type.outputs.do-full-scan != 'true' }}
    uses: ./.github/workflows/clang-tidy-reusable.yaml
    secrets: inherit
    with:
      platform: ${{ inputs.platform || 'Ubuntu 24.04' }}
      architecture: ${{ inputs.architecture || 'amd64' }}
      ci-build-docker-image: >-
        ${{ inputs.ci-build-docker-image ||
            needs.build-docker-image.outputs.ci-build-tag ||
            'docker-image-unresolved!' }}
      prereq-targets: 'tt_metal ttnn'
      scan-targets: ''
