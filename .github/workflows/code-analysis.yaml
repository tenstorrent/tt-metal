name: "Trace Models (N300 Single Card)"

on:
  workflow_dispatch:
    inputs:
      build-type:
        required: false
        type: choice
        default: Release
        options:
          - Release
          - RelWithDebInfo
        description: "Build type configuration"

run-name: "Trace Models (N300 Single Card)"

jobs:
  build-artifact:
    uses: ./.github/workflows/build-artifact.yaml
    permissions:
      packages: write
    secrets: inherit
    with:
      build-type: ${{ inputs.build-type || 'Release' }}
      build-wheel: true

  trace-models:
    needs: build-artifact
    strategy:
      fail-fast: false
      matrix:
        model:
          - name: "llama-3.2-11b-vision"
            cmd: >-
              HF_MODEL=meta-llama/Llama-3.2-11B-Vision-Instruct
              python model_tracer/generic_ops_tracer.py
              models/tt_transformers/demo/simple_text_demo.py
              --store -o traced_outputs/llama_3_2_11b_vision
          - name: "llama-3.2-1b"
            cmd: >-
              HF_MODEL=meta-llama/Llama-3.2-1B-Instruct
              python model_tracer/generic_ops_tracer.py
              models/tt_transformers/demo/simple_text_demo.py
              --store -o traced_outputs/llama_3_2_1b
          - name: "qwen-2.5-coder-7b"
            cmd: >-
              HF_MODEL=Qwen/Qwen2.5-Coder-7B-Instruct
              python model_tracer/generic_ops_tracer.py
              models/tt_transformers/demo/simple_text_demo.py
              --store -o traced_outputs/qwen_2_5_coder_7b
          - name: "mistral-7b-v0.3"
            cmd: >-
              HF_MODEL=mistralai/Mistral-7B-Instruct-v0.3
              python model_tracer/generic_ops_tracer.py
              models/tt_transformers/demo/simple_text_demo.py
              --store -o traced_outputs/mistral_7b_v0_3
          - name: "deepseek-llm-7b"
            cmd: >-
              HF_MODEL=deepseek-ai/deepseek-llm-7b-chat
              python model_tracer/generic_ops_tracer.py
              models/tt_transformers/demo/simple_text_demo.py
              --store -o traced_outputs/deepseek_llm_7b
          - name: "phi-3-mini-128k"
            cmd: >-
              HF_MODEL=microsoft/Phi-3-mini-128k-instruct
              python model_tracer/generic_ops_tracer.py
              models/tt_transformers/demo/simple_text_demo.py
              --store -o traced_outputs/phi_3_mini_128k
          - name: "llama-krikri-8b"
            cmd: >-
              HF_MODEL=ilsp/Llama-Krikri-8B-Instruct
              python model_tracer/generic_ops_tracer.py
              models/tt_transformers/demo/simple_text_demo.py
              --store -o traced_outputs/llama_krikri_8b
    name: "Trace ${{ matrix.model.name }}"
    runs-on:
      - N300
      - in-service
      - cloud-virtual-machine
    container:
      image: ${{ needs.build-artifact.outputs.dev-docker-image || 'docker-image-unresolved!' }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        ARCH_NAME: wormhole_b0
        LOGURU_LEVEL: INFO
        GITHUB_ACTIONS: true
        HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        HF_HUB_CACHE: /mnt/MLPerf/huggingface/hub
      volumes:
        - ${{ github.workspace }}/docker-job:/work
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: >-
        --device /dev/tenstorrent
        --cap-add=ALL
        --security-opt seccomp=unconfined
        --ulimit nproc=65536:65536
        --ulimit nofile=65536:65536
        --privileged
        -v /sys:/sys
    defaults:
      run:
        shell: bash
        working-directory: /work
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: docker-job

      - name: Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ needs.build-artifact.outputs.build-artifact-name }}
          wheel-artifact-name: ${{ needs.build-artifact.outputs.wheel-artifact-name }}

      - name: Run tracer for ${{ matrix.model.name }}
        timeout-minutes: 120
        run: |
          mkdir -p traced_outputs
          ${{ matrix.model.cmd }}

      - name: Zip trace output
        if: ${{ !cancelled() }}
        run: |
          cd traced_outputs
          MODEL_DIR=$(ls -d */ 2>/dev/null | head -1)
          if [ -n "$MODEL_DIR" ]; then
            tar -czf /work/${{ matrix.model.name }}-traces.tar.gz .
          else
            echo "No trace output directory found, zipping all files"
            tar -czf /work/${{ matrix.model.name }}-traces.tar.gz .
          fi

      - name: Upload trace artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ matrix.model.name }}
          path: /work/${{ matrix.model.name }}-traces.tar.gz
          retention-days: 30

      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()

  aggregate-traces:
    needs: trace-models
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all trace artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: traces-*
          path: all-traces
          merge-multiple: false

      - name: Create combined archive
        run: |
          mkdir -p combined-traces
          for dir in all-traces/traces-*/; do
            if [ -d "$dir" ]; then
              model_name=$(basename "$dir" | sed 's/traces-//')
              mkdir -p "combined-traces/$model_name"
              for archive in "$dir"/*.tar.gz; do
                if [ -f "$archive" ]; then
                  tar -xzf "$archive" -C "combined-traces/$model_name"
                fi
              done
            fi
          done
          tar -czf all-model-traces-n300.tar.gz -C combined-traces .
          ls -lh all-model-traces-n300.tar.gz

      - name: Upload combined traces
        uses: actions/upload-artifact@v4
        with:
          name: all-model-traces-n300
          path: all-model-traces-n300.tar.gz
          retention-days: 90
