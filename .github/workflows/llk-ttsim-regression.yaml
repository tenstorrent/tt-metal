name: "⚙️ LLK ttsim Regression"

# Runs the LLK Python test suite against the ttsim functional simulator on a
# hardware-less runner (same flavor used by the Quasar build). ttsim is still
# under active development so many tests are expected to fail — this job is
# strictly *informational*: it never surfaces a failed check or a failed job
# status. The uploaded HTML report is the deliverable; the job summary shows
# current pass/fail/skip counts for quick scanning.

on:
  workflow_call:
    inputs:
      docker_image:
        description: "The Docker image to use for the container"
        required: true
        type: string
      runs_on:
        description: "The runner to use for the job (no TT hardware needed)"
        required: false
        default: "tt-ubuntu-2204-xlarge-stable"
        type: string
      timeout_minutes:
        description: "Timeout in minutes for each per-architecture job"
        required: false
        default: 120
        type: number
      workers:
        description: "Number of xdist workers per run"
        required: false
        default: 10
        type: number
      per_test_timeout_seconds:
        description: "Per-test timeout (passed as --timeout to pytest via the script)"
        required: false
        default: 300
        type: number

# No `checks: write` — this workflow deliberately does not publish a
# GitHub check (ttsim failures are expected while the simulator is WIP,
# so a pass/fail check would be misleading either way). The run's own
# outcome plus the per-arch `$GITHUB_STEP_SUMMARY` and uploaded artifacts
# serve as the status surface.
permissions:
  contents: read

env:
  LLK_PATH: tt_metal/tt-llk

jobs:
  ttsim-regression:
    name: "ttsim regression (${{ matrix.architecture }})"
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        architecture: [blackhole, wormhole]
    container:
      image: ${{ inputs.docker_image }}
    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v6

      # Step 2: Install SFPI (required to compile LLK ELFs even for ttsim).
      - name: Install SFPI
        shell: bash
        working-directory: ${{ env.LLK_PATH }}
        run: |
          cd tests
          ./setup_testing_env.sh
          cd ..

      # Step 3: Run the ttsim regression. `run_ttsim_regression.sh` auto-
      # provisions the simulator (downloads libttsim_<arch>.so pinned in
      # tests/ttsim-version, copies the matching soc_descriptor.yaml from
      # tt_metal/soc_descriptors/, and exports TT_METAL_SIMULATOR). We
      # point the cache at the job workspace so nothing leaks to HOME and
      # so the .so+yaml are easy to inspect in the artifacts on demand.
      #
      # continue-on-error: true — ttsim is WIP and many tests are expected
      # to fail; the HTML report is the deliverable, not a green check.
      - name: Run ttsim regression
        id: regression
        shell: bash
        working-directory: ${{ env.LLK_PATH }}/tests
        continue-on-error: true
        env:
          TTSIM_CACHE_DIR: ${{ github.workspace }}/ttsim-cache
        run: |
          ./run_ttsim_regression.sh \
            --architecture ${{ matrix.architecture }} \
            --workers ${{ inputs.workers }} \
            --timeout ${{ inputs.per_test_timeout_seconds }}

      # Step 4: Rename the timestamped outputs to stable per-architecture
      # names so the artifact has predictable filenames (the script writes
      # ttsim_<timestamp>.xml / .html and maintains latest.{xml,html}
      # symlinks, which don't survive artifact upload cleanly).
      # The ttsim-version pin file is also copied so the weekly Slack
      # digest job can surface the simulator version without an extra checkout.
      - name: Stage report artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          RESULTS_DIR="${GITHUB_WORKSPACE}/${{ env.LLK_PATH }}/tests/python_tests/ttsim_results"
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/ttsim-report-${{ matrix.architecture }}"
          mkdir -p "${ARTIFACT_DIR}"
          if [[ -f "${RESULTS_DIR}/latest.xml" ]]; then
            cp -L "${RESULTS_DIR}/latest.xml"  "${ARTIFACT_DIR}/ttsim-${{ matrix.architecture }}.xml"
          fi
          if [[ -f "${RESULTS_DIR}/latest.html" ]]; then
            cp -L "${RESULTS_DIR}/latest.html" "${ARTIFACT_DIR}/ttsim-${{ matrix.architecture }}.html"
          fi
          # Include the version pin so the weekly digest can read the
          # simulator version from the artifact (no extra checkout needed).
          VERSION_FILE="${GITHUB_WORKSPACE}/${{ env.LLK_PATH }}/tests/ttsim-version"
          if [[ -f "${VERSION_FILE}" ]]; then
            cp "${VERSION_FILE}" "${ARTIFACT_DIR}/ttsim-version"
          fi
          ls -la "${ARTIFACT_DIR}/"

      # Step 5: Upload the per-architecture report (XML + HTML) as a single
      # artifact. `if: always()` so partial runs still produce a report,
      # matching the guarantee the shell script already makes locally.
      - name: Upload ttsim report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ttsim-report-${{ matrix.architecture }}
          path: ttsim-report-${{ matrix.architecture }}/
          if-no-files-found: warn

      # Step 6: Neutral summary. Instead of publishing a pass/fail check
      # (which would either lie by claiming success, or add scary red X's
      # while ttsim ISA coverage grows in), we render an informational
      # markdown table into $GITHUB_STEP_SUMMARY and emit the same counts
      # as step outputs. Downstream jobs (e.g. weekly Slack digest) can
      # aggregate the outputs without re-parsing the XML.
      - name: Summarize ttsim results
        id: summarize
        if: always()
        shell: bash
        env:
          ARCH: ${{ matrix.architecture }}
          XML_PATH: ttsim-report-${{ matrix.architecture }}/ttsim-${{ matrix.architecture }}.xml
        run: |
          set -euo pipefail

          # Read ttsim version from the in-tree pin file for the summary.
          TTSIM_VERSION="unknown"
          TTSIM_VERSION_FILE="${GITHUB_WORKSPACE}/${{ env.LLK_PATH }}/tests/ttsim-version"
          if [[ -f "$TTSIM_VERSION_FILE" ]]; then
            # shellcheck source=/dev/null
            source "$TTSIM_VERSION_FILE"
            TTSIM_VERSION="${ttsim_version:-unknown}"
          fi

          if [[ ! -f "$XML_PATH" ]]; then
            echo "No JUnit XML found at $XML_PATH — the regression likely never produced a report." >> "$GITHUB_STEP_SUMMARY"
            for k in total passed failed errored skipped pass_pct; do
              echo "${k}=0" >> "$GITHUB_OUTPUT"
            done
            echo "status=no-report" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pure-stdlib parse: the LLK CI image ships junitparser, but this
          # step deliberately avoids the dependency so it also works if
          # someone reuses this workflow from a slimmer image.
          python3 - <<'PY' > /tmp/ttsim-summary.env
          import os
          import xml.etree.ElementTree as ET

          path = os.environ["XML_PATH"]
          root = ET.parse(path).getroot()
          suites = root.iter("testsuite") if root.tag == "testsuites" else [root]

          total = failed = skipped = 0
          for s in suites:
              total   += int(s.attrib.get("tests",    0) or 0)
              failed  += int(s.attrib.get("failures", 0) or 0)
              skipped += int(s.attrib.get("skipped",  0) or 0)
          passed = max(total - failed - skipped, 0)
          pass_pct = (100.0 * passed / total) if total else 0.0

          print(f"total={total}")
          print(f"passed={passed}")
          print(f"failed={failed}")
          print(f"skipped={skipped}")
          print(f"pass_pct={pass_pct:.1f}")
          print("status=parsed")
          PY

          cat /tmp/ttsim-summary.env >> "$GITHUB_OUTPUT"

          # shellcheck source=/dev/null
          source /tmp/ttsim-summary.env

          {
            echo "## ttsim regression: ${ARCH}"
            echo ""
            echo "Informational run. ttsim is under active development; failures here reflect simulator gaps, not tt-metal regressions."
            echo ""
            echo "| Metric | Value |"
            echo "|---|---:|"
            echo "| 🏷️ ttsim version | v${TTSIM_VERSION} |"
            echo "| 🔢 Total | ${total} |"
            echo "| ✅ Passed | ${passed} |"
            echo "| ❌ Failed | ${failed} |"
            echo "| ⏩ Skipped | ${skipped} |"
            echo "| 📈 Pass rate | ${pass_pct}% |"
            echo ""
            echo "HTML report: available in the \`ttsim-report-${ARCH}\` artifact of this run."
          } >> "$GITHUB_STEP_SUMMARY"

    # (Deliberately no job-level `outputs:` — matrix jobs in GitHub Actions
    # don't aggregate outputs across cells (only one cell's values survive,
    # nondeterministically), so downstream jobs that want per-arch counts
    # should download and parse the uploaded artifacts instead. The Slack
    # digest in `llk-ttsim-weekly.yaml` does exactly that.)
