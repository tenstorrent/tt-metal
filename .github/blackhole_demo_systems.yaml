# SKU → weights-cache-mode + system-name mapping for the Blackhole demo CI.
#
# Read by both .github/workflows/blackhole-demo-tests.yaml (orchestrator) and
# .github/scripts/utils/prepare_test_matrix.py so the orchestrator's
# system-type filter and per-job container volume mount stay consistent.
#
# Each entry must carry:
#   sku                  — matches a key under skus: in .github/sku_config.yaml
#   name                 — workflow_dispatch system-type display name
#   weights-cache-mode   — one of: local-disk, cloud-mlperf, lfc, yyz4-mnt-models
#   num_devices          — informational; for run-page disambiguation only

systems:
  - sku: bh_p150_perf
    name: "P150 (1xP150)"
    weights-cache-mode: local-disk
    num_devices: 1
  - sku: bh_p150
    name: "P150 (1xP150)"
    weights-cache-mode: cloud-mlperf
    num_devices: 1
  - sku: bh_p150b_civ2
    name: "P150 CIv2 (1xP150)"
    weights-cache-mode: lfc
    num_devices: 1
  - sku: bh_loudbox
    name: "LoudBox (8xP150)"
    weights-cache-mode: cloud-mlperf
    num_devices: 8
  - sku: bh_p300
    name: "P300 (1xP300)"
    weights-cache-mode: lfc
    num_devices: 2
  - sku: bh_quietbox_2
    name: "QuietBox 2 (2xP300)"
    weights-cache-mode: yyz4-mnt-models
    num_devices: 4
