# Fractional allocation of each SKU pool per team — usage-based v2.
# Generated from Snowflake TTDATASF.SW_TEST.CICD_JOB, 28-day window (Apr 2026).
#
# Coverage: pipeline_reorg jobs AND all legacy (bucket 2) workflows that run on
# dedicated hardware. CPU-only build jobs (ubuntu-latest / large-stable runners)
# and release pipelines (build-test-publish, in-release) are excluded — they do
# not draw from the hardware pools tracked here.
#
# ─── How each estimate was made ─────────────────────────────────────────────
#
# Data source
#   SELECT SPLIT_PART(j.NAME, ' / ', 1) AS workflow_prefix,
#          j.JOB_LABEL,
#          SUM(j.JOB_EXECUTION_TIME) / 28.0 * 7 / 3600  AS weekly_hours
#   FROM   TTDATASF.SW_TEST.CICD_JOB  j
#   JOIN   TTDATASF.SW_TEST.CICD_PIPELINE p ON j.CICD_PIPELINE_ID = p.CICD_PIPELINE_ID
#   WHERE  p.PROJECT = 'tt-metal'
#     AND  p.PIPELINE_START_TS >= DATEADD('day', -28, CURRENT_TIMESTAMP())
#     AND  j.JOB_EXECUTION_TIME > 0
#   GROUP BY 1, 2
#   HAVING weekly_hours > 5
#
# Unlike v1 (pipeline_reorg timeout × runs/week), all numbers here are ACTUAL
# wall-clock execution time averaged over 28 days and scaled to one week.
# This captures both pipeline_reorg jobs and all legacy workflows in a single pass.
#
# SKU mapping  (JOB_LABEL string → hardware pool)
#   tt-ubuntu-2204-N150-*-stable          → N150   (CIv2 bare-metal Wormhole N150)
#   tt-ubuntu-2204-N300-*-stable          → N300   (CIv2 bare-metal Wormhole N300)
#   {N150,N300},in-service[,cloud-vm]     → N150/N300  (cloud or bare-metal WH)
#   N300,pipeline-perf,bare-metal         → N300   (bare-metal WH N300 perf pool)
#   config-t3000,arch-wormhole_b0         → LLMBOX (T3000 4-card chassis)
#   topology-6u,arch-wormhole_b0          → galaxy (6U Galaxy chassis)
#   multi-host-galaxy / multi-host-glx-*  → galaxy (multi-host Galaxy jobs)
#   tt-ubuntu-2204-P150b-*-stable         → p150b  (CIv2 Blackhole P150b)
#   arch-blackhole + BH-LLMBox            → p150b  (BH QuietBox  – 4×P150b)
#   arch-blackhole + BH-LoudBox           → p150b  (BH LoudBox   – 8×P150b)
#   arch-blackhole + BH-DeskBox           → p150b  (BH DeskBox   – 2×P150b)
#   cloud-virtual-machine + P150          → p150b  (cloud P150b)
#   multi-host-bh-lb-2x,arch-blackhole    → p150b  (multi-host BH LoudBox)
#   BH-QB-GE / P300-viommu                → p300b  (BH QuietBox2 – 2×P300b)
#   tt-ubuntu-2204-large-stable / xlarge  → (excluded – CPU-only build runner)
#
# Team attribution  (workflow prefix heuristic; legacy workflows have no team: field)
#
#   models:   fd-nightly, single-card-*, galaxy-demo-tests, galaxy-model-perf-tests,
#             models-unit-tests*, models-e2e-tests, models-perf, vllm-tests,
#             blackhole-demo-tests*, tt-train-*, t3000-demo-tests
#             Rationale: fast-dispatch nightly model suites, demo tests, vllm serving,
#             and training jobs are all owned by the models team.
#
#   ttnn:     ttnn-unit-tests*, ttnn-smoke-tests*, ttnn-basic-tests*, ttnn-merge-gate-*,
#             ttnn-examples*, ttnn sweeps {N150,N300,T3K},
#             galaxy-perf-tests, galaxy-e2e-tests, galaxy-unit-tests, galaxy-sanity-test,
#             galaxy-integration-tests
#             Rationale: all TTNN-prefixed regression suites plus the Galaxy test
#             suites driven by the TTNN team.
#
#   runtime:  blackhole-multi-card-{fast-,}unit-tests*, tt-metal-l2-tests*,
#             t3000-{unit,e2e,integration,perf}-tests, t3000-apc-fast-tests,
#             fast-dispatch-unit-tests*, metalium-{smoke,basic,examples}*,
#             cpp-unit-tests*, ops-unit-tests*, sd-unit-tests*, tt-cnn-unit-tests*,
#             run-profiler-regression*, sanity tests nightly debug run*,
#             blackhole nightly debug run*, triage-tests*, umd-unit-tests*, fabric-unit-tests*,
#             device-perf, didt-tests
#             Rationale: dispatch/metalium/hardware-level tests, multi-card BH suites,
#             nightly debug runs, and device perf are all runtime-team infrastructure.
#
#   scaleout: multi-host-glx-{2x,4x}, multi-host-bh-lb-2x, Galaxy-DeepSeek-tests
#             Rationale: multi-host topology tests owned by scaleout team.
#
#   shield:   ttsim-{integration,unit}-tests
#             Note: ttsim runs on CPU-only runners (large-stable) and does not consume
#             any hardware pool — shield's ttsim usage is therefore zero h/wk on HW.
#
#   llk:      llk-test-wormhole, llk-test-blackhole
#             Rationale: LLK kernel test suites; llk-build-quasar is CPU-only (excluded).
#
# Excluded workflows
#   build-artifact, build, build-sweeps, asan-build, build-asan, build-tsan,
#   code-analysis, clang-tidy-light, build-artifact-profiler, llk-build-quasar,
#   fabric-cpu-only-unit-tests, Build artifacts (Ubuntu {22,24}.04)
#     → all run on tt-ubuntu-2204-large-stable (CPU-only runner, no accelerator)
#   build-test-publish (Ubuntu {22,24}.04) with in-release label
#     → release pipeline; hardware usage is real but charged to release/infra, not teams
#   trigger-post-commit
#     → GHA orchestration job; N300 runner time is coordination overhead, not test time
#   test-wh-6u-image
#     → infra image-build smoke test; not a team workload
#
# ─── Fractions ───────────────────────────────────────────────────────────────
# Values sum to ≤ 1.0 per pool. Remainder (if any) = untracked jobs / headroom.

