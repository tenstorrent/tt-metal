# Total machine-hours available per SKU per week.
# This is the denominator for all budget calculations.
# Update when hardware capacity changes or fleet size grows.
#
# Source: Snowflake TTDATASF.SW_TEST.CICD_JOB, 28-day average (tt-metal only).
# tt-metal is currently the sole user of all these SKUs (cross-repo query
# returned zero usage for tt-xla, tt-mlir, tt-shield, tt-forge-*, tt-exalens).
# Values = observed weekly usage + 20% headroom, rounded up to nearest 100.
#
# CIv1 (in-service bare-metal) and CIv2 (cloud-provisioned) are combined
# under each canonical SKU name used by budget_check.py's RUNNER_SKU_MAP.

