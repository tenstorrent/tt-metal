# this file contains the time budgets allocated for merge gate and pr gate tests for each sku.
# the calculations are based on deciding to allocate 50% of available machine hours to merge gate and pr gate tests.
# merge gate sees an average of 15 full runs per hour during peak (13:00-21:00 UTC). Runs roughly 3x per merge.
# pr gate sees an average of 20 full runs per hour during peak. Runs roughly 4x per merge.
# from pools.yaml, we decide that 50% of available machine hours per week are allocated to merge gate and pr gate tests.
# below we list the total machine hours allocated per run
# the formula is: for each sku in pools.yaml, divide by 7 and 24 to get available machine hours per hour (or effective number of machines)
# then divide by 2 for the total merge gate + pr gate allocation.
# then choose to dedicate 60% of the total allocation to merge gate and 40% to pr gate.
# divide the merge gate allocation by 15 to get the time budget per run.
# divide the pr gate allocation by 20 to get the time budget per run.
#
# Closed form (minutes per run):
#   merge_gate = weekly_hours / 140
#   pr_gate    = weekly_hours / 280
# Values rounded to the nearest whole minute.

