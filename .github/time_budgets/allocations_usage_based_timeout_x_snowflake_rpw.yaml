# ttnn    1,159 h/wk – ttnn-smoke (573 h), ttnn-basic (586 h)
# llk       636 h/wk – llk-test-wormhole (635 h)
# models    232 h/wk – models-unit-tests (140 h), single-card-demo (50 h), vllm-tests (36 h)
