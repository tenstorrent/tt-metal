# Fractional allocation of each SKU pool per team — usage-based, pipeline_reorg only.
# Generated from Snowflake TTDATASF.SW_TEST.CICD_JOB, 28-day window (Apr 2026).
#
# Coverage: ONLY jobs corresponding to tests/pipeline_reorg/*.yaml test suites.
# Legacy (bucket-2) workflows — fd-nightly, ttnn-unit-tests, tt-metal-l2-tests,
# blackhole nightly debug run, metalium-*, cpp-unit-tests, fast-dispatch-unit-tests,
# ttsim-*, llk-test-*, etc. — are excluded.
#
# See allocations_usage_based_v2.yaml for the version that includes bucket-2 as well.
#
# ─── Methodology ─────────────────────────────────────────────────────────────
#
# Data source: same Snowflake query as v2 (28-day actual execution time scaled to
# weekly hours). Rows are filtered to only include workflow_prefix values that
# correspond to pipeline_reorg test YAMLs in tests/pipeline_reorg/:
#
#   galaxy-demo-tests, galaxy-model-perf-tests, galaxy-perf-tests,
#   galaxy-sanity-test, galaxy-unit-tests, galaxy-e2e-tests,
#   models-unit-tests (all variants), models-e2e-tests, models-perf,
#   t3000-unit-tests, t3000-e2e-tests, t3000-integration-tests,
#   t3000-perf-tests, t3000-demo-tests, t3000-apc-fast-tests,
#   vllm-tests (all SKU variants),
#   Galaxy-DeepSeek-tests,
#   multi-host-glx-2x, multi-host-glx-4x, multi-host-bh-lb-2x,
#   blackhole-multi-card-unit-tests (all chassis variants),
#   blackhole-multi-card-fast-unit-tests (all chassis variants),
#   blackhole-demo-tests (all chassis variants),
#   single-card-demo-tests, single-card-ttnn-models-frequent
#
# Team attribution uses the `team:` field from the corresponding pipeline_reorg YAML:
#   models:   galaxy-demo/model-perf, models-unit/e2e, vllm-tests, single-card-*,
#             t3000-demo-tests, blackhole-demo-tests
#   ttnn:     galaxy-perf/e2e/unit/sanity-tests
#   runtime:  t3000-unit/e2e/integration/perf, blackhole-multi-card-*
#   scaleout: multi-host-*, Galaxy-DeepSeek-tests
#
# SKU mapping is identical to v2 (see that file for full label → pool table).
#
# ─── Fractions ───────────────────────────────────────────────────────────────

