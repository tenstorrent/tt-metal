  wh_llmbox:
    runs_on:
      - arch-wormhole_b0
      - config-t3000
      - pipeline-functional
      - in-service

  wh_llmbox_perf:
    runs_on:
      - arch-wormhole_b0
      - config-t3000
      - pipeline-perf
      - in-service

  wh_llmbox_perf_release:
    runs_on:
      - arch-wormhole_b0
      - config-t3000
      - pipeline-perf
      - in-release

  bh_p100:
    runs_on:
      - cloud-virtual-machine
      - P100
      - in-service

  wh_galaxy:
    runs_on:
      - arch-wormhole_b0
      - pipeline-functional
      - topology-6u
      - in-service

  wh_galaxy_perf:
    runs_on:
      - arch-wormhole_b0
      - pipeline-perf
      - topology-6u
      - in-service

  wh_galaxy_release:
    runs_on:
      - arch-wormhole_b0
      - pipeline-functional
      - topology-6u
      - in-release

  wh_galaxy_perf_release:
    runs_on:
      - arch-wormhole_b0
      - pipeline-perf
      - topology-6u
      - in-release

  bh_galaxy:
    runs_on:
      - arch-blackhole
      - pipeline-functional
      - topology-6u
      - in-service

  bh_galaxy_perf:
    runs_on:
      - arch-blackhole
      - pipeline-perf
      - topology-6u
      - in-service

  bh_galaxy_release:
    runs_on:
      - arch-blackhole
      - pipeline-functional
      - topology-6u
      - in-release

  bh_galaxy_perf_release:
    runs_on:
      - arch-blackhole
      - pipeline-perf
      - topology-6u
      - in-release

  wh_n150:
    runs_on:
      - N150
      - in-service
      - cloud-virtual-machine

  wh_n300:
    runs_on:
      - N300
      - in-service
      - cloud-virtual-machine

  wh_n150_civ2:
    runs_on:
      - tt-ubuntu-2204-N150-viommu-stable

  wh_n300_civ2:
    runs_on:
      - tt-ubuntu-2204-N300-viommu-stable

  wh_llmbox_civ2:
    runs_on:
      - tt-ubuntu-2204-N300-llmbox-stable

  bh_p100_perf:
    runs_on:
      - pipeline-perf
      - P100
      - in-service

  bh_p100a_civ2_viommu:
    runs_on:
      - tt-ubuntu-2204-P100a-viommu-stable

  bh_p150b_civ2_viommu:
    runs_on:
      - tt-ubuntu-2204-P150b-viommu-stable

  bh_p150b_civ2:
    runs_on:
      - tt-ubuntu-2204-P150b-stable

  wh_n300_perf:
    runs_on:
      - N300
      - in-service
      - bare-metal
      - pipeline-perf

  bh_p150:
    runs_on:
      - in-service
      - arch-blackhole
      - P150
      - pipeline-functional

  bh_p150_perf:
    runs_on:
      - in-service
      - arch-blackhole
      - P150
      - pipeline-perf

  bh_llmbox:
    runs_on:
