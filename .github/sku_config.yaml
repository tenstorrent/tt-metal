  bh_loudbox:
    runs_on:
      - in-service
      - arch-blackhole
      - BH-LoudBox
      - pipeline-functional

  bh_p300:
    runs_on:
      - in-service
      - arch-blackhole
      - P300-viommu
      - pipeline-yyz2-lfc
  bh_p300_viommu:
    runs_on:
      - pipeline-yyz2-lfc
      - P300-viommu
      - in-service

  bh_quietbox:
    runs_on:
      - BH-LLMBox
      - pipeline-functional
      - in-service

  bh_quietbox_perf:
    runs_on:
      - BH-LLMBox
      - pipeline-perf
      - in-service

  bh_deskbox:
    runs_on:
      - BH-DeskBox
      - pipeline-functional
      - in-service

  bh_loudbox_civ2_viommu:
    runs_on:
      - tt-ubuntu-2204-BH-LoudBox-viommu-stable

  bh_quietbox_2:
    runs_on:
      - BH-QB-GE
      - pipeline-perf
      - in-service

  bh_sp1:
    runs_on:
      - exabox-multihost-with-nfs
    mgd: |
      mesh_descriptors {
        name: \"M0\"
        arch: BLACKHOLE
        device_topology { dims: [ 32,4 ] dim_types: [ RING,RING ] }
        host_topology   { dims: [ 4,1 ] }
        channels { count: 2 policy: RELAXED }
      }
      top_level_instance { mesh { mesh_descriptor: \"M0\" mesh_id: 0 } }

  bh_sp4:
    runs_on:
      - exabox-multihost-with-nfs
    explicit_nodes: "bh-glx-c01u02,bh-glx-c01u08,bh-glx-c02u02,bh-glx-c02u08,bh-glx-c03u02,bh-glx-c03u08,bh-glx-c04u02,bh-glx-c04u08,bh-glx-c05u02,bh-glx-c05u08,bh-glx-c06u02,bh-glx-c06u08,bh-glx-c07u02,bh-glx-c07u08,bh-glx-c08u02,bh-glx-c08u08"
    mgd: |
      mesh_descriptors {
        name: \"SP4_M0\"
        arch: BLACKHOLE
        device_topology { dims: [ 32,4 ] dim_types: [ RING,RING ] }
        host_topology   { dims: [ 4,1 ] }
        channels { count: 2 policy: RELAXED }
      }
      graph_descriptors {
        name: \"SP4_G0\"
        type: \"FABRIC\"
        instances { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 0 } }
        instances { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 1 } }
        instances { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 2 } }
        instances { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 3 } }
        connections {
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 0 } }
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 1 } }
          channels { count: 1 policy: STRICT }
          assign_z_direction: true
        }
        connections {
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 0 } }
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 2 } }
          channels { count: 1 policy: STRICT }
          assign_z_direction: true
        }
        connections {
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 0 } }
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 3 } }
          channels { count: 1 policy: STRICT }
          assign_z_direction: true
        }
        connections {
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 1 } }
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 2 } }
          channels { count: 1 policy: STRICT }
          assign_z_direction: true
        }
        connections {
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 1 } }
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 3 } }
          channels { count: 1 policy: STRICT }
          assign_z_direction: true
        }
        connections {
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 2 } }
          nodes { mesh { mesh_descriptor: \"SP4_M0\" mesh_id: 3 } }
          channels { count: 1 policy: STRICT }
          assign_z_direction: true
        }
      }
      top_level_instance { graph { graph_descriptor: \"SP4_G0\" graph_id: 0 } }
