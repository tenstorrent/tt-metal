# This file defines the mapping from SKUs to GitHub Actions runner labels (runs_on).
# This is the single source of truth for how SKUs map to runner configurations.

# Each SKU entry contains:
#   runs_on: Array of GitHub Actions runner labels that tests for this SKU.
#   allocation: (Optional) Configuration for TTOP allocation
#     type: "Count" or "MGD"
#     count: Number of nodes (for Count type)
#     match_labels: Dictionary of Kubernetes labels
#     topology_keys: List of topology keys (for MGD type)
#   mgd: (Optional) MGD configuration text for runtime topology
skus:
  wh_llmbox:
    runs_on:
      - arch-wormhole_b0
      - config-t3000
      - pipeline-functional
      - in-service

  wh_llmbox_perf:
    runs_on:
      - arch-wormhole_b0
      - config-t3000
      - pipeline-perf
      - in-service

  bh_p100:
    runs_on:
      - cloud-virtual-machine
      - P100
      - in-service

  wh_galaxy:
    runs_on:
      - arch-wormhole_b0
      - pipeline-functional
      - topology-6u
      - in-service

  wh_galaxy_merge_gate:
    runs_on:
      - arch-wormhole_b0
      - pipeline-functional
      - topology-6u
      - in-service-dedicated-merge-gate

  wh_galaxy_perf:
    runs_on:
      - arch-wormhole_b0
      - pipeline-perf
      - topology-6u
      - in-service

  bh_galaxy:
    runs_on:
      - arch-blackhole
      - pipeline-functional
      - topology-6u
      - in-service

  bh_galaxy_perf:
    runs_on:
      - arch-blackhole
      - pipeline-perf
      - topology-6u
      - in-service

  wh_n150:
    runs_on:
      - N150
      - in-service
      - cloud-virtual-machine

  wh_n300:
    runs_on:
      - N300
      - in-service
      - cloud-virtual-machine

  wh_n150_civ2:
    runs_on:
      - tt-ubuntu-2204-N150-viommu-stable

  wh_n300_civ2:
    runs_on:
      - tt-ubuntu-2204-N300-viommu-stable

  wh_llmbox_civ2:
    runs_on:
      - tt-ubuntu-2204-N300-llmbox-stable

  wh_llmbox_civ2_viommu:
    runs_on:
      - tt-ubuntu-2204-N300-llmbox-viommu-stable

  wh_llmbox_civ2_prio:
    runs_on:
      - tt-ubuntu-2204-N300-llmbox-viommu-prio-stable

  bh_p100_perf:
    runs_on:
      - pipeline-perf
      - P100
      - in-service

  bh_p100a_civ2_viommu:
    runs_on:
      - tt-ubuntu-2204-P100a-viommu-stable

  bh_p150b_civ2_viommu:
    runs_on:
      - tt-ubuntu-2204-P150b-viommu-stable

  bh_p150b_civ2_viommu_prio:
    runs_on:
      - tt-ubuntu-2204-P150b-viommu-prio-stable

  bh_p150b_civ2:
    runs_on:
      - tt-ubuntu-2204-P150b-stable

  wh_n300_perf:
    runs_on:
      - N300
      - in-service
      - bare-metal
      - pipeline-perf

  bh_p150:
    runs_on:
      - in-service
      - arch-blackhole
      - P150
      - pipeline-functional

  bh_p150_perf:
    runs_on:
      - in-service
      - arch-blackhole
      - P150
      - pipeline-perf

  bh_loudbox:
    runs_on:
      - in-service
      - arch-blackhole
      - BH-LoudBox
      - pipeline-functional

  bh_p300:
    runs_on:
      - in-service
      - arch-blackhole
      - P300-viommu
      - pipeline-yyz2-lfc
  bh_p300_viommu:
    runs_on:
      - pipeline-yyz2-lfc
      - P300-viommu
      - in-service

  bh_loudbox_civ2_viommu:
    runs_on:
      - tt-ubuntu-2204-BH-LoudBox-viommu-stable

  bh_quietbox_2:
    runs_on:
      - BH-Quietbox-2
      - pipeline-perf
      - in-service

  bh_spsg:
    runs_on:
      - exabox-multihost-with-nfs
    allocation:
      type: Count
      count: 1
      match_labels:
        exabox.tenstorrent.com/purpose: ci-metal
        exabox.tenstorrent.com/superpod: A29

  bh_sp1:
    runs_on:
      - exabox-multihost-with-nfs
    allocation:
      type: Count
      count: 4
      match_labels:
        exabox.tenstorrent.com/purpose: ci-metal
        exabox.tenstorrent.com/superpod: A29

  bh_sp4:
    runs_on:
      - exabox-multihost-with-nfs
    allocation:
      type: Count
      count: 16
      match_labels:
        exabox.tenstorrent.com/purpose: ci-metal
        exabox.tenstorrent.com/superpod: A29

  # Synthetic CPU SKUs for ttsim simulator jobs. Tests using these SKUs run on
  # ubuntu-latest; the impl is expected to invoke .github/actions/setup-ttsim
  # gated on `startsWith(sku, 'sim_')` to download the matching libttsim_<arch>.so
  # and export the simulator env vars. The arch suffix on the SKU name selects
  # the ttsim binary (sim_wormhole_b0 → libttsim_wh.so, sim_blackhole → libttsim_bh.so).
  sim_wormhole_b0:
    runs_on:
      - ubuntu-latest
  sim_blackhole:
    runs_on:
      - ubuntu-latest
