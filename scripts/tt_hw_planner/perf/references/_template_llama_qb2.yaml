#
# Template reference: copy this file to <name>.yaml (drop the leading
# underscore) and fill in the FIXME fields from your real reference run.
# Files starting with "_" are ignored by the reference loader so this
# template never accidentally pollutes the suggestion engine.
#
# Suggested workflow:
#   1. Pick a peer model you know runs well on QB2 (e.g. Llama 3.1 8B).
#   2. Run a clean perf-collect, apply any known-good optimizer blocks,
#      run another clean perf-collect. Note the run_id.
#   3. Inspect joined.json from that run. For each distinct submodule
#      role (q_proj, k_proj, v_proj, o_proj, sdpa, gate_proj, up_proj,
#      down_proj, rms_norm, residual_add, lm_head, embed_tokens), pick
#      a representative layer (e.g. layer 5 of 32) and copy the median
#      runtime + utilization from its joined rows into a new entry.
#   4. Copy this file to e.g. `llama_3.1_8b_qb2_bfp8.yaml`, drop the
#      leading underscore, and fill in the FIXMEs.
#   5. Verify with: `tt_hw_planner perf suggest <test-run-id>` on a
#      similar-family model. You should see your reference's metrics
#      and config in the recommendations.

schema_version: 1

provenance:
