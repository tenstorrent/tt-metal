  box: "QB2"
  mesh_shape: [1, 4]
  dtype: "bfp8_b"
  source_run_id: "FIXME-run_YYYYMMDDTHHMMSSZ"
  curator: "FIXME-your-handle"
  notes: |
    FIXME — describe what optimizer blocks were applied in what order,
    any known caveats, what tt-metal commit this was measured on, etc.

