# Pin the concurrently-edited attention path to its committed behaviour: with both of these off,
# attention_ltx.py's uncommitted dedup-gather work is inert, so the fold A/B is measured against
# main and cannot be perturbed by the other worker landing an edit between two of these runs.
LTX_DEDUP_GATE_GATHER: "0"
LTX_DEDUP_GATE_MUTANT: "0"
# T2V + cached prompt embeddings: generate() runs only denoise/upsample, never the image or Gemma
# encoder, so warming them only compiles kernels this run cannot execute. On a cold build_key that
# costs 112s of a 290s reservation. Identical across A/A'/B/C, so it cannot bias the A/B.
LTX_WARMUP_ENCODERS: "0"
