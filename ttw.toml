# tt-workflows config — LTX 3s loop on the ltx-perf-tip base (broker-native).
[project]
name = "ltx-3s-ltxperf"
knowledge_dir = "opt/ttw/knowledge"
context_doc = "opt/ttw/knowledge/context.md"

[host]
device_host = ""
remote_root = "/home/smarton/tt-metal/.claude/worktrees/ltxperf-tip"
remote_scratch = "/home/smarton/tt-metal/.claude/worktrees/ltxperf-tip/tmp"

[build]
cpp_build_cmd = "bash build_metal.sh"
data_build_cmd = "true"
cpp_paths = "tt_metal/ ttnn/ *.cpp *.hpp *.cmake"

[run]
preflight_cmd = ""
verify_cmd = "bash tmp/run_ltx.sh"
worry_threshold_s = 120
timeout_s = 280

[gate]
# qgate = decoded-frame mean-PCC of the 8-step output vs the 11-step ref (compare_videos).
metric_name = "qgate"
metric_threshold = 0.85
metric_lower = 0
require_timings = 1
require_screenshot = 0
require_report = 0
require_commit = 1
screenshot_glob = "opt/screenshots/*_after.png"
screenshot_dir = "opt/screenshots"
screenshot_name = "after.png"
screenshot_diff_name = ""

[report]
report_cmd = ""
report_html = "opt/REPORT.html"

[workspace]
tmp_dir = "tmp"
require_clean_workspace = 0

[log]
iters_jsonl = "opt/iters.jsonl"

[loop]
push_remote = "origin"
stuck_after = 4
min_improvement = 0.02
stop_file = "STOP"
worker_model = ""
fallback_model = "composer-2.5"
heartbeat_s = 1200
goal_metric = "ms_view"
goal_value = 3000
