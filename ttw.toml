# tt-workflows config — LTX 1080p-high opt loop. BROKER-NATIVE device execution
# (tt-device-mcp), not devrun/ssh: the supervisor drives jobs via the broker MCP.
# These keys configure the device-independent machinery (loopd snapshot, iterlog,
# done gate, report). Goal = 1080p-high E2E 8.2s -> 6.0s.

[project]
name = "ltx-1080p-6s"
knowledge_dir = "opt"
context_doc = "opt/LOOP_TASK.md"

[host]
device_host = ""
remote_root = "/home/smarton/tt-metal/.claude/worktrees/ltxperf-tip"
remote_scratch = "/home/smarton/tt-metal/.claude/worktrees/ltxperf-tip/tmp"

[build]
cpp_build_cmd = "bash build_metal.sh -c"
data_build_cmd = "true"
cpp_paths = "tt_metal/ ttnn/ *.cpp *.hpp *.cmake"

[run]
verify_cmd = ""
worry_threshold_s = 900
timeout_s = 600

[gate]
# TIER 1: traced denoise STEP_MS delta vs baseline (lower-better), measured on-device.
# TIER 2 (a tier-1 miss is NOT a rejection): VBench absolute quality, scored off-device.
metric_name = "denoise_ms"
metric_threshold = 6111
metric_lower = 1
quality_cmd = ""
require_timings = 1
require_screenshot = 0
require_report = 0
require_commit = 1

[report]
report_html = "opt/REPORT.html"

[workspace]
tmp_dir = "tmp"
require_clean_workspace = 0

[log]
iters_jsonl = "opt/iters.jsonl"

[loop]
push_remote = "origin"
stuck_after = 4
min_improvement = 0.02
stop_file = "STOP"
fallback_model = "composer-2.5"
heartbeat_s = 300
# ms_view (summed traced denoise STEP_MS) is lower-better; goal denoise ~4800ms => ~6.0s E2E.
goal_metric = "ms_view"
goal_value = 4800
