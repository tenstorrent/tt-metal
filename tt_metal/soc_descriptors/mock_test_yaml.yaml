# Mock SOC descriptor used by the tt-umd mock build.
# Mirrors the constants in tt-umd/mock/soc_descriptor.cpp:
#   GRID_SIZE = (2, 4)
#   TENSIX_CORES_NOC0 = (0,0),(0,1),(1,0),(1,1)
#   DISPATCH/ROUTER cores at y=2
#   DRAM/PCIE cores at y=3
# Sizes follow grendel_implementation.hpp.

grid:
  x_size: 2
  y_size: 4

arc:
  []

pcie:
  [0-3, 1-3]

dram:
  [[0-3, 1-3]]

dram_views:
  [
    {
      channel: 0,
      eth_endpoint: [0, 0],
      worker_endpoint: [0, 0],
      address_offset: 0
    }
  ]

dram_view_size:
  4294967296

eth:
  []

functional_workers:
  [0-0, 1-0,
   0-1, 1-1]

harvested_workers:
  []

router_only:
  [0-2, 1-2]

worker_l1_size:
  1572864

dram_bank_size:
  4294967296

eth_l1_size:
  0

arch_name: QUASAR

features:
  unpacker:
    version: 1
    inline_srca_trans_without_srca_trans_instr: False
  math:
    dst_size_alignment: 32768
  packer:
    version: 1
  overlay:
    version: 1
