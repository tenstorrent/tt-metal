[pytest]
# Pin the rootdir to this tool directory so `python -m pytest tests/` does NOT
# ascend to the tt-metal repo-root conftest.py (which imports `models` and is
# irrelevant here) — that import would abort collection with a confusing
# ModuleNotFoundError before any test runs. This suite is hermetic (no
# clang/repo/models needed); the canonical runner remains
# `python3 tests/test_checks.py`.
