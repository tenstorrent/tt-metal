operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [256, 256]
    format: "Float16_b"
  - name: "elwsub_out"
    dims: [256, 256]
    format: "Float16_b"

operations:
  - output: "elwsub_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwsub"
        unpacker: "UnpackerAB"
        math_fidelity: "LoFi"
    packer: "Packer"
    block_size: [64, 128]
