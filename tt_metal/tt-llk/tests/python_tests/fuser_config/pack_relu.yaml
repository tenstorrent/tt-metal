operands:
  - name: "input_A"
    dims: [32, 32]
    format: "Float16_b"
  - name: "input_B"
    dims: [32, 32]
    format: "Float16_b"
  - name: "out_no_relu"
    dims: [32, 32]
    format: "Float16_b"
  - name: "out_zero_relu"
    dims: [32, 32]
    format: "Float16_b"
  - name: "out_min_thresh"
    dims: [32, 32]
    format: "Float16_b"
  - name: "out_max_thresh"
    dims: [32, 32]
    format: "Float16_b"

operations:
  # Stage 1: NO_RELU — Datacopy A then negate.
  # Input [0, 1.1] → Neg → [-1.1, 0]. No relu, negatives preserved.
  - output: "out_no_relu"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "LoFi"
      - type: "UnarySfpu"
        operation: "Neg"
        approximation_mode: false
        iterations: 32
    packer: "Packer"
    pack_relu: "NO_RELU"
    block_size: [32, 32]
  # Stage 2: ZERO_RELU — Elwsub(A, B).
  # A - B ∈ [-1.1, 1.1], mix of pos/neg. ZERO_RELU zeros negatives.
  - output: "out_zero_relu"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwsub"
        unpacker: "UnpackerAB"
        math_fidelity: "LoFi"
    packer: "Packer"
    pack_relu: "ZERO_RELU"
    block_size: [32, 32]
  # Stage 3: MIN_THRESHOLD_RELU — Datacopy A.
  # A ∈ [0.0, 1.1]. Values ≤ 0.5 zeroed, values > 0.5 kept.
  - output: "out_min_thresh"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "LoFi"
    packer: "Packer"
    pack_relu: "MIN_THRESHOLD_RELU"
    relu_threshold: 0.5
    block_size: [32, 32]
  # Stage 4: MAX_THRESHOLD_RELU — Elwmul(A, B).
  # A * B ∈ [0, 1.21]. Clamped to [0, 0.5] by max threshold=0.5.
  - output: "out_max_thresh"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwmul"
        unpacker: "UnpackerAB"
        math_fidelity: "LoFi"
    packer: "Packer"
    pack_relu: "MAX_THRESHOLD_RELU"
    relu_threshold: 0.5
    block_size: [32, 32]
