operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [256, 256]
    format: "Float16_b"
  - name: "elwmul_out"
    dims: [256, 256]
    format: "Float16_b"

operations:
  - output: "elwmul_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwmul"
        unpacker: "UnpackerAB"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [64, 128]
