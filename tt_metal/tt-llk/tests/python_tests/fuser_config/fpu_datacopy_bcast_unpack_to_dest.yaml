dest_acc: true

operands:
  - name: "input_A"
    dims: [64, 64]
    format: "Float32"
  - name: "input_B"
    dims: [64, 64]
    format: "Float32"
  - name: "row_bcast_out"
    dims: [64, 64]
    format: "Float32"
  - name: "col_bcast_out"
    dims: [64, 64]
    format: "Float32"
  - name: "scalar_bcast_out"
    dims: [64, 64]
    format: "Float32"
  - name: "datacopy_out"
    dims: [64, 64]
    format: "Float32"

operations:
  - output: "row_bcast_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        broadcast_type: "ROW"
        unpack_to_dest: true
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]

  - output: "col_bcast_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        broadcast_type: "COL"
        unpack_to_dest: true
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]

  - output: "scalar_bcast_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        broadcast_type: "SCALAR"
        unpack_to_dest: true
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]

  - output: "datacopy_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        unpack_to_dest: true
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]
