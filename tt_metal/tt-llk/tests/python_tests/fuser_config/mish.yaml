operations:
  - math:
      - type: "Fpu"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "LoFi"
        src_a: "input_A"
        src_b: "input_B"
        src_a_dims: [256, 256]
        src_b_dims: [256, 256]
        src_a_format: "Float16_b"
        src_b_format: "Float16_b"
      - type: "UnarySfpu"
        operation: "Exp"
        approximation_mode: false
        iterations: 32
        dst_dest_tile_index: 0
      - type: "UnarySfpu"
        operation: "Log1p"
        approximation_mode: false
        iterations: 32
        dst_dest_tile_index: 0
      - type: "UnarySfpu"
        operation: "Tanh"
        approximation_mode: false
        iterations: 32
        dst_dest_tile_index: 0
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwmul"
        unpacker: "UnpackerA"
        reuse_dest: "DEST_TO_SRCB"
        math_fidelity: "LoFi"
    packer: "Packer"
    output: "mish"
    output_dims: [256, 256]
    output_format: "Float16_b"
    block_size: [32, 32]
