operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [256, 256]
    format: "Float16_b"
    const_value: 1.0
  - name: "reduce_block_max_out"
    dims: [256, 256]
    format: "Float16_b"

operations:
  - output: "reduce_block_max_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "ReduceBlockMax"
        unpacker: "ReduceBlockMaxUnpacker"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [64, 128]
