dest_acc: true

operands:
  - name: "input_A"
    dims: [32, 32]
    format: "Float32"
    # const_value: 1.0
  - name: "input_B"
    dims: [32, 32]
    format: "Float32"
    const_value: 1.0
  - name: "reduced_output"
    dims: [32, 32]
    format: "Float32"

operations:
  - output: "reduced_output"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Reduce"
        reduce_dim: "REDUCE_ROW"
        reduce_pool: "SUM"
        unpacker: "ReduceUnpacker"
        enforce_fp32_accumulation: true
        math_fidelity: "HiFi4"
    packer: "Packer"
