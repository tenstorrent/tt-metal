operands:
  - name: "input_A"
    dims: [64, 64]
    format: "Float16_b"
  - name: "input_B"
    dims: [64, 64]
    format: "Float16_b"
    const_value: 1.0
  - name: "reduced_output"
    dims: [64, 64]
    format: "Float16_b"

operations:
  - output: "reduced_output"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Reduce"
        reduce_dim: "REDUCE_COL"
        reduce_pool: "MAX"
        unpacker: "ReduceUnpacker"
        math_fidelity: "HiFi2"
    packer: "Packer"
