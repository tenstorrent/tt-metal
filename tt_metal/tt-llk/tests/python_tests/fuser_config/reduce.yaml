operations:
  - src_a: "input_A"
    src_b: "input_B"
    output: "reduced_output"
    src_a_dims: [64, 64]
    src_b_dims: [64, 64]
    output_dims: [64, 64]
    src_b_const_value: 1.0
    input_format: "Float16_b"
    output_format: "Float16_b"
    math:
      - type: "Fpu"
        operation: "Reduce"
        reduce_dim: "REDUCE_COL"
        reduce_pool: "MAX"
        unpacker: "ReduceUnpacker"
        math_fidelity: "HiFi2"
    packer: "Packer"
