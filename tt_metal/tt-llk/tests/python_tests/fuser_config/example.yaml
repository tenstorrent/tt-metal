dest_acc: true
loop_factor: 16

operations:
  - output: "datacopy_output"
    output_dims: [96, 128]
    output_format: "Float16_b"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        src_a_dims: [96, 128]
        src_b_dims: [96, 128]
        src_a_format: "Float16_b"
        src_b_format: "Float16_b"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        broadcast_type: "SCALAR"
        math_fidelity: "LoFi"
      - type: "UnarySfpu"
        operation: "Fill"
        approximation_mode: false
        iterations: 32
        dst_dest_tile_index: 0
        fill_const_value: 1.0
      - type: "Fpu"
        src_a: "input_A1"
        src_b: "input_B1"
        src_a_dims: [96, 128]
        src_b_dims: [96, 128]
        src_a_format: "Float16_b"
        src_b_format: "Float16_b"
        operation: "Elwadd"
        unpacker: "UnpackerAB"
    packer: "Packer"
    block_size: [64, 64]

  - output: "tilized_output"
    output_dims: [96, 128]
    output_format: "Float16_b"
    math:
      - type: "Fpu"
        src_a: "datacopy_output"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerTilizeA"
        math_fidelity: "LoFi"
      - type: "UnarySfpu"
        operation: "Exp"
        approximation_mode: false
        iterations: 64
      - type: "UnarySfpu"
        operation: "Celu"
        approximation_mode: false
        iterations: 64
      - type: "BinarySfpu"
        operation: "SfpuElwadd"
        approximation_mode: false
        iterations: 32
        src1_dest_tile_index: 0
        src2_dest_tile_index: 1
        dst_dest_tile_index: 1
    packer: "Packer"
    block_size: [64, 64]

  - output: "elwadd1"
    output_dims: [96, 128]
    output_format: "Float16_b"
    math:
      - type: "Fpu"
        src_a: "tilized_output"
        src_b: "input_B"
        operation: "Elwadd"
        unpacker: "UnpackerAB"
        unpack_transpose_within_face: true
        unpack_transpose_faces: true
        math_fidelity: "LoFi"
        acc_to_dest: true
      - type: "UnarySfpu"
        operation: "Neg"
        approximation_mode: false
        iterations: 32
    packer: "Packer"
    dest_sync: "SyncFull"

  - output: "matmul_result"
    output_dims: [32, 128]
    output_format: "Float32"
    math:
      - type: "Fpu"
        src_a: "elwadd1"
        src_b: "input_C"
        src_b_dims: [128, 128]
        src_b_format: "Float16_b"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "HiFi2"
      - type: "UnarySfpu"
        operation: "Abs"
        approximation_mode: false
        iterations: 32
      - type: "UnarySfpu"
        operation: "Sqrt"
        approximation_mode: false
        iterations: 32
    packer: "Packer"

