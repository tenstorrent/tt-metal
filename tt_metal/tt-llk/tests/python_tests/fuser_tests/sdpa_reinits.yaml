
operands:
  - name: "input_A"
    dims: [32, 32]
    format: "Float16_b"
  - name: "input_B"
    dims: [32, 32]
    format: "Float16_b"
    const_value: 1.0
  - name: "output1"
    dims: [32, 32]
    format: "Float16_b"
  - name: "output2"
    dims: [32, 32]
    format: "Float16_b"
  - name: "output3"
    dims: [32, 32]
    format: "Float16_b"
  - name: "output4"
    dims: [32, 32]
    format: "Float16_b"

operations:
  - output: "output1"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "LoFi"
    packer: "Packer"

  - output: "output2"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "ReduceBlockMax"
        unpacker: "ReduceBlockMaxUnpacker"
        math_fidelity: "LoFi"
    packer: "Packer"

  - output: "output3"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwadd"
        unpacker: "UnpackerAB"
        broadcast_type: "COL"
        math_fidelity: "LoFi"
    packer: "Packer"

  - output: "output4"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "LoFi"
    packer: "Packer"
