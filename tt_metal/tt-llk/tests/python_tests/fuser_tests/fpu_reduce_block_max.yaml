# Block max reduce. Source B is all ones as the identity scale.

dest_acc: true

operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float32"
  - name: "input_B"
    dims: [256, 256]
    format: "Float32"
    const_value: 1.0
  - name: "reduce_block_max_out"
    dims: [256, 256]
    format: "Float32"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "ReduceBlockMax"
        unpacker: "ReduceBlockMaxUnpacker"
        math_fidelity: "HiFi2"
    pack:
      - output: "reduce_block_max_out"
        packer: "Packer"
    block_size: [64, 64]
