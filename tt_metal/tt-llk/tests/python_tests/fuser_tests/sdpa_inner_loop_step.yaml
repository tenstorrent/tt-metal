supported_archs: ["wormhole"]

# SDPA inner loop step — simplified single-iteration pipeline.
# Models sdpa_inner_loop_step from compute_streaming.hpp without SALAD correction.
# Exercises: multi-stage reconfigs, multi-pack with different formats,
# L1 accumulation, pack relu, SubBcastColCustom+Exp fusion,
# MatmulNoMop, ReduceBlockMaxRuntime, broadcast col multiply.

operands:
  # Q: query tile block
  - name: "Q"
    dims: [32, 64]
    format: "Float16_b"
  # KT: key transposed
  - name: "KT"
    dims: [64, 64]
    format: "Float16_b"
    const_value: 0.01
  # V: value matrix
  - name: "V"
    dims: [64, 64]
    format: "Float16_b"
  # identity_scale: all-ones for reduce
  - name: "identity_scale"
    dims: [64, 64]
    format: "Float16_b"
    const_value: 1.0
  # intermediates and outputs
  - name: "qkt"
    dims: [32, 64]
    format: "Float16_b"
  - name: "row_max"
    dims: [32, 64]
    format: "Float16_b"
  - name: "sub_exp_out"
    dims: [32, 64]
    format: "Float16_b"
  - name: "sub_exp_sum"
    dims: [32, 64]
    format: "Float16_b"
  - name: "attn_v"
    dims: [32, 64]
    format: "Float16_b"
  - name: "sum_recip"
    dims: [32, 64]
    format: "Float16_b"
  - name: "output"
    dims: [32, 64]
    format: "Float16_b"

operations:
  # Step 1: QKT = Q[32,64] × KT[64,64] → [32,64]
  - math:
      - type: "Fpu"
        src_a: "Q"
        src_b: "KT"
        operation: "MatmulNoMop"
        unpacker: "MatmulUnpacker"
        math_fidelity: "HiFi2"
    block_size: [32, 64]
    pack:
      - output: "qkt"
        packer: "Packer"

  # Step 2: row_max = reduce_block_max_row(qkt)
  - math:
      - type: "Fpu"
        src_a: "qkt"
        src_b: "identity_scale"
        operation: "ReduceBlockMaxRuntime"
        unpacker: "ReduceBlockMaxRuntimeUnpacker"
        math_fidelity: "HiFi2"
    block_size: [32, 64]
    pack:
      - output: "row_max"
        packer: "Packer"

  # Step 3: sub_exp = exp(qkt - bcast_col(row_max))
  # Dual pack: sub_exp_out with ZERO_RELU, sub_exp_sum with L1 accumulation
  # Models the real kernel's inline row sum during sub+exp
  - math:
      - type: "Fpu"
        src_a: "qkt"
        src_b: "row_max"
        operation: "SubBcastColCustom"
        unpacker: "SubBcastColCustomUnpacker"
        math_fidelity: "LoFi"
      - type: "UnarySfpu"
        operation: "Exp"
        approximation_mode: true
        iterations: 32
    block_size: [32, 64]
    pack:
      - output: "sub_exp_out"
        packer: "Packer"
        pack_relu: "ZERO_RELU"
      - output: "sub_exp_sum"
        packer: "Packer"
        pack_l1_accumulation: 1

  # Step 4: attn_v = sub_exp_out[32,64] × V[64,64] → [32,64]
  - math:
      - type: "Fpu"
        src_a: "sub_exp_out"
        src_b: "V"
        operation: "MatmulNoMop"
        unpacker: "MatmulUnpacker"
        math_fidelity: "HiFi2"
    block_size: [32, 64]
    pack:
      - output: "attn_v"
        packer: "Packer"

  # Step 5: sum_recip = reciprocal(sub_exp_sum)
  # Datacopy loads sum into DEST, then SFPU reciprocal
  - math:
      - type: "Fpu"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "LoFi"
        src_a: "sub_exp_sum"
        src_b: "identity_scale"
      - type: "UnarySfpu"
        operation: "Reciprocal"
        iterations: 8
    block_size: [32, 64]
    pack:
      - output: "sum_recip"
        packer: "Packer"

  # Step 6: output = attn_v * bcast_col(sum_recip) — normalize
  - math:
      - type: "Fpu"
        src_a: "attn_v"
        src_b: "sum_recip"
        operation: "Elwmul"
        unpacker: "UnpackerAB"
        broadcast_type: "COL"
        math_fidelity: "LoFi"
    block_size: [32, 64]
    pack:
      - output: "output"
        packer: "Packer"
