# Register-level regression for tt-llk#1161 (Wormhole _llk_unpack_tilize_uninit_).
#
# A tilize-only pipeline on a num_faces=2 (16x32 tile) operand. The kernel ends
# on _llk_unpack_tilize_uninit_, so afterwards the unpack tile-descriptor z-dim
# must equal num_faces (2). Before the fix the uninit hardcoded z-dim back to 4,
# silently leaving the operand in the wrong default state. test_tilize_uninit.py
# reads the descriptor register back and asserts z_dim == num_faces.
supported_archs: ["wormhole"]

operands:
  - name: "input_A"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"
  - name: "input_B"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"
  - name: "tilize_out"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"

operations:
  - output: "tilize_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerTilizeA"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]
