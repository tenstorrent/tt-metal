dest_acc: true

operands:
  - name: "input_A"
    dims: [32, 32]
    format: "Float16_b"
  - name: "input_B"
    dims: [32, 32]
    format: "Float32"
  - name: "input_C"
    dims: [32, 32]
    format: "Float16_b"
  - name: "output_A"
    dims: [32, 32]
    format: "Float16_b"

  - name: "input_D"
    dims: [32, 32]
    format: "Float16_b"
  - name: "output_B"
    dims: [32, 32]
    format: "Bfp8_b"

  - name: "input_E"
    dims: [32, 32]
    format: "Bfp8_b"
  - name: "output_C"
    dims: [32, 32]
    format: "Float32"

operations:
  - math:
      - type: "Fpu"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "LoFi"
        src_a: "input_A"
        src_b: "input_B"
      - type: "UnarySfpu"
        operation: "Exp"
        approximation_mode: false
        iterations: 32
        dst_dest_tile_index: 0
      - type: "UnarySfpu"
        operation: "Log1p"
        approximation_mode: false
        iterations: 32
        dst_dest_tile_index: 0
      - type: "UnarySfpu"
        operation: "Tanh"
        approximation_mode: false
        iterations: 32
        dst_dest_tile_index: 0
      - type: "Fpu"
        src_a: "input_C"
        src_b: "input_B"
        operation: "Elwmul"
        unpacker: "UnpackerA"
        reuse_dest: "DEST_TO_SRCB"
        math_fidelity: "LoFi"
    packer: "Packer"
    output: "output_A"
    block_size: [32, 32]

  - math:
      - type: "Fpu"
        src_a: "input_D"
        src_b: "output_A"
        operation: "Elwmul"
        unpacker: "UnpackerAB"
        math_fidelity: "LoFi"
      - type: "Fpu"
        src_a: "input_D"
        src_b: "output_A"
        operation: "Elwmul"
        unpacker: "UnpackerA"
        reuse_dest: "DEST_TO_SRCA"
        acc_to_dest: true
        math_fidelity: "LoFi"
    packer: "Packer"
    output: "output_B"
    block_size: [32, 32]

  - math:
      - type: "Fpu"
        src_a: "input_E"
        src_b: "output_B"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "LoFi"
    packer: "Packer"
    output: "output_C"
    block_size: [32, 32]
