# Column reduce with max pooling.

dest_acc: true

operands:
  - name: "input_A"
    dims: [32, 32]
    format: "Float32"
    # const_value: 0.335
  - name: "input_B"
    dims: [32, 32]
    format: "Float32"
    const_value: 1.0
  - name: "reduced_output"
    dims: [32, 32]
    format: "Float32"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Reduce"
        reduce_dim: "REDUCE_ROW"
        reduce_pool: "SUM"
        unpacker: "ReduceUnpacker"
        math_fidelity: "HiFi4"
    pack:
      - output: "reduced_output"
        packer: "Packer"
    block_size: [64, 64]
