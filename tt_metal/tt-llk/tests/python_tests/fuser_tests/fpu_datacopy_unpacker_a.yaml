# Basic datacopy test that reads from source A only.

dest_acc: true


operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [256, 256]
    format: "Float16_b"
  - name: "datacopy_out"
    dims: [256, 256]
    format: "Float16_b"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "HiFi2"
    block_size: [32, 128]
    pack:
      - output: "datacopy_out"
        packer: "Packer"
