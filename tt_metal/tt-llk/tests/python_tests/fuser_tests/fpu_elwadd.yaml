# Element-wise addition of two inputs (A + B).

operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [256, 256]
    format: "Float16_b"
  - name: "elwadd_out"
    dims: [256, 256]
    format: "Float16_b"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwadd"
        unpacker: "UnpackerAB"
        math_fidelity: "LoFi"
    block_size: [64, 128]
    pack:
      - output: "elwadd_out"
        packer: "Packer"
