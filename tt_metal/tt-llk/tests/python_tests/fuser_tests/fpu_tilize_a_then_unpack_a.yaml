supported_archs: ["wormhole"]

operands:
  - name: "input_A"
    dims: [64, 64]
    format: "Float16_b"
  - name: "input_B"
    dims: [64, 64]
    format: "Float16_b"
  - name: "tilize_out"
    dims: [64, 64]
    format: "Float16_b"
  - name: "unpack_a_out"
    dims: [64, 64]
    format: "Float16_b"

operations:
  - output: "tilize_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerTilizeA"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]

  - output: "unpack_a_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]
