# Column reduce that sums across rows with FP32 accumulation.

dest_acc: true

operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [256, 256]
    format: "Float16_b"
    const_value: 1.0
  - name: "reduce_col_out"
    dims: [256, 256]
    format: "Float16_b"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Reduce"
        reduce_dim: "REDUCE_COL"
        reduce_pool: "SUM"
        unpacker: "ReduceUnpacker"
        math_fidelity: "HiFi2"
        enforce_fp32_accumulation: true
    block_size: [32, 128]
    pack:
      - output: "reduce_col_out"
        packer: "Packer"
