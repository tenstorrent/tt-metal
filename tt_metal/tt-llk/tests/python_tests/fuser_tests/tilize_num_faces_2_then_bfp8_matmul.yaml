# Regression test for tt-metal#47016 / tt-llk#1161 (Wormhole
# _llk_unpack_tilize_uninit_ z-dim restore vs BFP-compressed matmul consumers).
#
# Background: #45179 changed _llk_unpack_tilize_uninit_ to restore the tile
# descriptor z-dim to the operand's num_faces instead of the hardcoded 4. For a
# num_faces=2 tilize operand this leaves z-dim=2 in SEC0 (SrcA). A subsequent
# Bfp8_b (BFP-compressed) matmul does NOT reprogram the descriptor z-dim (its
# init only sets the ADC X-end counters), so it inherits the stale z-dim. For
# compressed operands z-dim sizes the per-tile exponent / RowStart arrays
# (NumBlobs = BlobsPerXYPlane * ZDim * WDim), so a wrong z-dim corrupts the
# exponent decode -> saturated logits. Plain/uncompressed matmul is immune
# (face iteration comes from the MOP loop count), which is why no existing test
# catches this.
#
# The three ops isolate the tilize-uninit z-dim as the single deciding variable,
# mirroring the issue's device A/B table:
#   1. warmup_out - Datacopy that reuses the matmul's own Bfp8_b 4-face operands
#                   (mm_A/mm_B). The one-time _llk_unpack_hw_configure_ runs here
#                   and sets SEC0 AND SEC1 z-dim = 4.
#   2. tilize_out - tilize a num_faces=2 (16x32) Float16_b operand;
#                   _llk_unpack_tilize_uninit_ rewrites ONLY SEC0 (SrcA) z-dim to
#                   the restored value (2 on current/buggy LLK, 4 with the fix).
#   3. mm_out     - Bfp8_b 4-face matmul on the same mm_A/mm_B. Matmul unpack
#                   programs ADC X-end but not the descriptor z-dim, so SrcA
#                   inherits op 2's stale z-dim while SrcB keeps op 1's z-dim=4.
#                   SrcA's BFP exponent array is therefore the only corrupted field.
#
# Expected (single uninit z-dim token toggled in
# tt_llk_wormhole_b0/llk_lib/llk_unpack_tilize.h):
#   z = num_faces (current LLK / #45179): warmup_out PASS, tilize_out PASS,
#                                         mm_out FAIL (PCC ~ -0.04)
#   z = 4         (issue's proposal):     all three PASS (mm_out PCC ~ 0.9995)
supported_archs: ["wormhole"]

operands:
  # BFP8 4-face matmul operands; also reused to seed the descriptor in op 1.
  - name: "mm_A"
    dims: [64, 64]
    format: "Bfp8_b"
  - name: "mm_B"
    dims: [64, 64]
    format: "Bfp8_b"
  - name: "warmup_out"
    dims: [64, 64]
    format: "Float16_b"
  - name: "mm_out"
    dims: [64, 64]
    format: "Float16_b"

  # num_faces=2 (16x32) tilize operands that drive the uninit z-dim restore.
  - name: "tilize_in_A"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"
  - name: "tilize_in_B"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"
  - name: "tilize_out"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"

operations:
  # Op 1: seed SEC0/SEC1 z-dim = 4 via the one-time hw_configure on mm_A/mm_B.
  - output: "warmup_out"
    math:
      - type: "Fpu"
        src_a: "mm_A"
        src_b: "mm_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]

  # Op 2: tilize a num_faces=2 operand; uninit rewrites only SEC0 (SrcA) z-dim.
  - output: "tilize_out"
    math:
      - type: "Fpu"
        src_a: "tilize_in_A"
        src_b: "tilize_in_B"
        operation: "Datacopy"
        unpacker: "UnpackerTilizeA"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]

  # Op 3: Bfp8_b matmul that inherits the stale SEC0 z-dim on SrcA.
  - output: "mm_out"
    math:
      - type: "Fpu"
        src_a: "mm_A"
        src_b: "mm_B"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 32]
