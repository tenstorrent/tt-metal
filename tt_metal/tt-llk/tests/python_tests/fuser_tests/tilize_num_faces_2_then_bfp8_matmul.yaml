# Regression test for tt-metal#47016 / tt-llk#1161 (Wormhole
# _llk_unpack_tilize_uninit_ z-dim restore vs BFP-compressed matmul consumers).
#
# Background: #45179 changed _llk_unpack_tilize_uninit_ to restore the tile
# descriptor z-dim to the operand's num_faces instead of the hardcoded 4. For a
# num_faces=2 tilize operand this leaves z-dim=2 in SEC0 (SrcA). A subsequent
# Bfp8_b (BFP-compressed) matmul does NOT reprogram the descriptor z-dim (its
# init only sets the ADC X-end counters), so it inherits the stale z-dim. For
# compressed operands z-dim sizes the per-tile exponent / RowStart arrays
# (NumBlobs = BlobsPerXYPlane * ZDim * WDim), so a wrong z-dim corrupts the
# exponent decode -> saturated logits. Plain/uncompressed matmul is immune
# (face iteration comes from the MOP loop count), which is why no existing test
# catches this.
#
# The three ops below isolate the tilize-uninit z-dim as the single deciding
# variable, mirroring the issue's device A/B table:
#   1. warm_out  - Datacopy on Bfp8_b 4-face operands. The one-time
#                  _llk_unpack_hw_configure_ sets SEC0 AND SEC1 z-dim = 4 (the
#                  correct value for the matmul operands).
#   2. tilize_out - tilize a num_faces=2 (16x32) Float16_b operand;
#                  _llk_unpack_tilize_uninit_ rewrites ONLY SEC0 (SrcA) z-dim to
#                  the restored value (2 on current/buggy LLK, 4 with the fix).
#   3. mm_out    - Bfp8_b 4-face matmul. Matmul unpack programs ADC X-end but
#                  not the descriptor z-dim, so SrcA inherits op 2's stale z-dim
#                  while SrcB keeps op 1's z-dim=4. SrcA's BFP exponent array is
#                  therefore the only corrupted field.
#
# Expected (single uninit z-dim token toggled in
# tt_llk_wormhole_b0/llk_lib/llk_unpack_tilize.h):
#   z = num_faces (current LLK / #45179): warm_out PASS, tilize_out PASS,
#                                         mm_out FAIL (PCC ~ -0.04)
#   z = 4         (issue's proposal):     all three PASS (mm_out PCC ~ 0.9995)
supported_archs: ["wormhole"]

operands:
  # Op 1: BFP8 4-face warm-up so the one-time hw_configure sets SEC0/SEC1 z=4.
  - name: "warm_A"
    dims: [64, 64]
    format: "Bfp8_b"
  - name: "warm_B"
    dims: [64, 64]
    format: "Bfp8_b"
  - name: "warm_out"
    dims: [64, 64]
    format: "Float16_b"

  # Op 2: num_faces=2 (16x32) tilize operand that drives the uninit z-dim.
  - name: "tilize_in_A"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"
  - name: "tilize_in_B"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"
  - name: "tilize_out"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"

  # Op 3: BFP-compressed 4-face matmul consumer that inherits the stale z-dim.
  - name: "mm_A"
    dims: [64, 64]
    format: "Bfp8_b"
  - name: "mm_B"
    dims: [64, 64]
    format: "Bfp8_b"
  - name: "mm_out"
    dims: [64, 64]
    format: "Float16_b"

operations:
  - output: "warm_out"
    math:
      - type: "Fpu"
        src_a: "warm_A"
        src_b: "warm_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]

  - output: "tilize_out"
    math:
      - type: "Fpu"
        src_a: "tilize_in_A"
        src_b: "tilize_in_B"
        operation: "Datacopy"
        unpacker: "UnpackerTilizeA"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]

  - output: "mm_out"
    math:
      - type: "Fpu"
        src_a: "mm_A"
        src_b: "mm_B"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 32]
