# Regression test for tt-llk#1161 (Wormhole _llk_unpack_tilize_uninit_).
#
# Operands use 16x32 tiles (num_faces=2). Operation 1 runs the tilize-unpack
# pipeline on input_A and tears down with _llk_unpack_tilize_uninit_; operation
# 2 then unpacks the same input_A with the plain unpack-A path. Before the fix,
# the uninit clobbered input_A's tile-descriptor z-dim to 4, and op 2 would
# read with a wrong stride, silently corrupting the output. With the fix, both
# operations produce PCC=1.0 against golden.
supported_archs: ["wormhole"]

operands:
  - name: "input_A"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"
  - name: "input_B"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"
  - name: "tilize_out"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"
  - name: "unpack_a_out"
    dims: [64, 64]
    tile_dimensions: [16, 32]
    format: "Float16_b"

operations:
  - output: "tilize_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerTilizeA"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]

  - output: "unpack_a_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "HiFi2"
    packer: "Packer"
    block_size: [32, 64]
