operands:
  - name: "input_A"
    dims: [128, 128]
    format: "Float16_b"
  - name: "input_B"
    dims: [128, 128]
    format: "Float16_b"
  - name: "l1_acc_out"
    dims: [128, 128]
    format: "Float16_b"

operations:
  - output: "l1_acc_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwadd"
        unpacker: "UnpackerAB"
        math_fidelity: "LoFi"
    packer: "Packer"
    block_size: [64, 64]
    pack_l1_accumulation: 1
