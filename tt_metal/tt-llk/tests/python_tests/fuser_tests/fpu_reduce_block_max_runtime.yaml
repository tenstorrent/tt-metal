supported_archs: ["wormhole"]

operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [256, 256]
    format: "Float16_b"
    const_value: 1.0
  - name: "reduce_block_max_runtime_out"
    dims: [256, 256]
    format: "Float16_b"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "ReduceBlockMaxRuntime"
        unpacker: "ReduceBlockMaxRuntimeUnpacker"
        math_fidelity: "HiFi2"
    block_size: [64, 128]
    pack:
      - output: "reduce_block_max_runtime_out"
        packer: "Packer"
