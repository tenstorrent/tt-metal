# Same as fpu_reduce_block_max but the unpacker is configured at runtime
# instead of compile time.

dest_acc: true

operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float32"
  - name: "input_B"
    dims: [256, 256]
    format: "Float32"
    const_value: 1.0
  - name: "reduce_block_max_runtime_out"
    dims: [256, 256]
    format: "Float32"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "ReduceBlockMaxRuntime"
        unpacker: "ReduceBlockMaxRuntimeUnpacker"
        math_fidelity: "HiFi2"
    pack:
      - output: "reduce_block_max_runtime_out"
        packer: "Packer"
    block_size: [64, 64]
