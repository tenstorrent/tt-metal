supported_archs: ["wormhole"]

operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [256, 256]
    format: "Float16_b"
  - name: "sub_bcast_col_custom_out"
    dims: [256, 256]
    format: "Float16_b"

operations:
  - output: "sub_bcast_col_custom_out"
    math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "SubBcastColCustom"
        unpacker: "SubBcastColCustomUnpacker"
        math_fidelity: "LoFi"
    packer: "Packer"
    block_size: [64, 128]
