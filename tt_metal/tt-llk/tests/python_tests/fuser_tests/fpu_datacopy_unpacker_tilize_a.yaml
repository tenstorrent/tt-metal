# Datacopy test that reads through the tilize unpack path.

operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [256, 256]
    format: "Float16_b"
  - name: "datacopy_tilize_out"
    dims: [256, 256]
    format: "Float16_b"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerTilizeA"
        math_fidelity: "HiFi2"
    block_size: [64, 128]
    pack:
      - output: "datacopy_tilize_out"
        packer: "Packer"
