# Stress test that chains five fused operations together to exercise as many
# fuser features as possible: datacopy with fill, tilize with SFPU ops,
# elwadd with transpose, two matmul stages with SFPU chains, dest accumulation,
# looping, broadcast scalar, acc_to_dest, SyncFull, and mixed formats.

supported_archs: ["wormhole", "blackhole"]

dest_acc: true
loop_factor: 16

operands:
  - name: "input_A"
    dims: [96, 128]
    format: "Float16_b"
  - name: "input_B"
    dims: [96, 128]
    format: "Float16_b"
  - name: "input_A1"
    dims: [96, 128]
    format: "Float16_b"
  - name: "input_B1"
    dims: [96, 128]
    format: "Float16_b"
  - name: "input_C"
    dims: [128, 128]
    format: "Float16_b"
  - name: "input_D"
    dims: [128, 32]
    format: "Float32"
  - name: "datacopy_output"
    dims: [96, 128]
    format: "Float16_b"
  - name: "tilized_output"
    dims: [96, 128]
    format: "Float16_b"
  - name: "elwadd_output"
    dims: [96, 128]
    format: "Float16_b"
  - name: "matmul_result"
    dims: [32, 128]
    format: "Float32"
  - name: "final_output"
    dims: [32, 32]
    format: "Float32"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        broadcast_type: "SCALAR"
        math_fidelity: "LoFi"
      - type: "UnarySfpu"
        operation: "Fill"
        approximation_mode: false
        iterations: 32
        dst_dest_tile_index: 0
        fill_const_value: 1.0
      - type: "Fpu"
        src_a: "input_A1"
        src_b: "input_B1"
        operation: "Elwadd"
        unpacker: "UnpackerAB"
    block_size: [64, 64]

    pack:
      - output: "datacopy_output"
        packer: "Packer"
  - math:
      - type: "Fpu"
        src_a: "datacopy_output"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerTilizeA"
        math_fidelity: "LoFi"
      - type: "UnarySfpu"
        operation: "Exp"
        approximation_mode: false
        iterations: 64
      - type: "UnarySfpu"
        operation: "Celu"
        approximation_mode: false
        iterations: 64
      - type: "BinarySfpu"
        operation: "SfpuElwadd"
        approximation_mode: false
        iterations: 32
        src1_dest_tile_index: 0
        src2_dest_tile_index: 1
        dst_dest_tile_index: 1
    block_size: [64, 64]

    pack:
      - output: "tilized_output"
        packer: "Packer"
  - math:
      - type: "Fpu"
        src_a: "tilized_output"
        src_b: "input_B"
        operation: "Elwadd"
        unpacker: "UnpackerAB"
        unpack_transpose_within_face: true
        unpack_transpose_faces: true
        math_fidelity: "LoFi"
        acc_to_dest: true
      - type: "UnarySfpu"
        operation: "Neg"
        approximation_mode: false
        iterations: 32
    dest_sync: "SyncFull"

    pack:
      - output: "elwadd_output"
        packer: "Packer"
  - math:
      - type: "Fpu"
        src_a: "elwadd_output"
        src_b: "input_C"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "HiFi2"
      - type: "UnarySfpu"
        operation: "Abs"
        approximation_mode: false
        iterations: 32
      - type: "UnarySfpu"
        operation: "Sqrt"
        approximation_mode: false
        iterations: 32

    pack:
      - output: "matmul_result"
        packer: "Packer"
  - math:
      - type: "Fpu"
        src_a: "matmul_result"
        src_b: "input_D"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "LoFi"
      - type: "UnarySfpu"
        operation: "Sqrt"
        approximation_mode: false
        iterations: 32
      - type: "BinarySfpu"
        operation: "SfpuElwadd"
        approximation_mode: false
        iterations: 32
        src1_dest_tile_index: 0
        src2_dest_tile_index: 0
        dst_dest_tile_index: 0
    pack:
      - output: "final_output"
        packer: "Packer"
