# Sharded layernorm compute kernel.
# Reference: ttnn/cpp/ttnn/operations/normalization/layernorm/device/kernels/compute/layernorm_sharded.cpp
#
# Pipeline: E[x] partial reduce → x-E[x] → (x-E[x])² → Var partial reduce →
#           Var+eps → rsqrt → normalize → gamma scale → beta bias.
#
# Reduce stages use reduce_to_tile to accumulate all tiles into a single
# dest tile per block, matching the metal kernel's cross tile reduce behavior.
# The global allgather reduce is not modeled; ex_global is a pre reduced constant.

supported_archs: ["wormhole", "blackhole"]

operands:
  # x: input tensor
  - name: "x"
    dims: [64, 128]
    format: "Float16_b"

  # scaler for partial reduce (1/W)
  - name: "scaler"
    dims: [64, 128]
    format: "Float16_b"
    const_value: 0.03125

  # E[x] — pre-reduced mean (models allgather output), single row broadcast
  - name: "ex_global"
    dims: [64, 128]
    format: "Float16_b"
    const_value: 0.5

  # eps — small constant for numerical stability
  - name: "eps"
    dims: [64, 128]
    format: "Float16_b"
    const_value: 0.001

  # gamma — per-column scale
  - name: "gamma"
    dims: [64, 128]
    format: "Float16_b"
    const_value: 1.0

  # beta — per-column bias
  - name: "beta"
    dims: [64, 128]
    format: "Float16_b"
    const_value: 0.0

  # intermediates
  - name: "ex_partial"
    dims: [64, 128]
    format: "Float16_b"

  - name: "xmm"
    dims: [64, 128]
    format: "Float16_b"

  - name: "xmm2"
    dims: [64, 128]
    format: "Float16_b"

  - name: "var_partial"
    dims: [64, 128]
    format: "Float16_b"

  - name: "ex2pe"
    dims: [64, 128]
    format: "Float16_b"

  - name: "normalized"
    dims: [64, 128]
    format: "Float16_b"

  - name: "gamma_out"
    dims: [64, 128]
    format: "Float16_b"

  - name: "output"
    dims: [64, 128]
    format: "Float16_b"

operations:
  # Step 1: E[x] partial reduce — row-reduce(AVG) the input
  - math:
      - type: "Fpu"
        src_a: "x"
        src_b: "scaler"
        operation: "Reduce"
        reduce_dim: "REDUCE_ROW"
        reduce_pool: "AVG"
        reduce_to_tile: true
        unpacker: "ReduceUnpacker"
        math_fidelity: "HiFi4"
    block_size: [64, 128]
    pack:
      - output: "ex_partial"
        packer: "Packer"

  # Step 2: x - E[x] — subtract mean (broadcast col)
  - math:
      - type: "Fpu"
        src_a: "x"
        src_b: "ex_global"
        operation: "Elwsub"
        unpacker: "UnpackerAB"
        broadcast_type: "COL"
        math_fidelity: "LoFi"
    block_size: [64, 128]
    pack:
      - output: "xmm"
        packer: "Packer"

  # Step 3: (x - E[x])^2 — self-multiply
  - math:
      - type: "Fpu"
        src_a: "xmm"
        src_b: "xmm"
        operation: "Elwmul"
        unpacker: "UnpackerAB"
        math_fidelity: "LoFi"
    block_size: [64, 128]
    pack:
      - output: "xmm2"
        packer: "Packer"

  # Step 4: Var(x) partial reduce — row-reduce(AVG) the squared deviations
  - math:
      - type: "Fpu"
        src_a: "xmm2"
        src_b: "scaler"
        operation: "Reduce"
        reduce_dim: "REDUCE_ROW"
        reduce_pool: "AVG"
        reduce_to_tile: true
        unpacker: "ReduceUnpacker"
        math_fidelity: "HiFi4"
    block_size: [64, 128]
    pack:
      - output: "var_partial"
        packer: "Packer"

  # Step 5: 1/sqrt(Var + eps) — add eps then rsqrt
  - math:
      - type: "Fpu"
        src_a: "var_partial"
        src_b: "eps"
        operation: "Elwadd"
        unpacker: "UnpackerAB"
        math_fidelity: "LoFi"
      - type: "UnarySfpu"
        operation: "Rsqrt"
        iterations: 8
    block_size: [64, 128]
    pack:
      - output: "ex2pe"
        packer: "Packer"

  # Step 6: (x - E[x]) * 1/sqrt(Var+eps) — normalize (broadcast col)
  - math:
      - type: "Fpu"
        src_a: "xmm"
        src_b: "ex2pe"
        operation: "Elwmul"
        unpacker: "UnpackerAB"
        broadcast_type: "COL"
        math_fidelity: "LoFi"
    block_size: [64, 128]
    pack:
      - output: "normalized"
        packer: "Packer"

  # Step 7: normalized * gamma — scale (broadcast row)
  - math:
      - type: "Fpu"
        src_a: "normalized"
        src_b: "gamma"
        operation: "Elwmul"
        unpacker: "UnpackerAB"
        broadcast_type: "ROW"
        math_fidelity: "LoFi"
    block_size: [64, 128]
    pack:
      - output: "gamma_out"
        packer: "Packer"

  # Step 8: gamma_out + beta — bias (broadcast row)
  - math:
      - type: "Fpu"
        src_a: "gamma_out"
        src_b: "beta"
        operation: "Elwadd"
        unpacker: "UnpackerAB"
        broadcast_type: "ROW"
        math_fidelity: "LoFi"
    block_size: [64, 128]
    pack:
      - output: "output"
        packer: "Packer"
