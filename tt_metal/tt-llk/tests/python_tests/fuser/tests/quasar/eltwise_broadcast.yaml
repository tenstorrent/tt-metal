# Single-stage Elwmul with COL broadcast to validate the broadcast path.

dest_acc: true

operands:
  - name: "input_A"
    dims: [32, 32]
    format: "Float16_b"
    # const_value: 1.0
  - name: "input_B"
    dims: [32, 32]
    format: "Float16_b"
  - name: "output_A"
    dims: [32, 32]
    format: "Float16_b"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwmul"
        unpacker: "UnpackerAB"
        broadcast_type: "COL"
        math_fidelity: "HiFi2"
    block_size: [32, 32]
    pack:
      - output: "output_A"
        packer: "Packer"
