# Simplified SDPA inner loop for Quasar.
# Mirrors the WH/BH sdpa_inner_loop_step pipeline:
# QKT matmul, reduce max, sub+exp (datacopy+SFPU), eltwise broadcast multiply,
# attn_v matmul, reciprocal (datacopy+SFPU), normalize (eltwise broadcast multiply).

# dest_acc: true

operands:
  # Q: query tile block
  - name: "Q"
    dims: [32, 64]
    format: "Float16_b"
  # KT: key transposed
  - name: "KT"
    dims: [64, 64]
    format: "Float16_b"
    const_value: 0.01
  # V: value matrix
  - name: "V"
    dims: [64, 64]
    format: "Float16_b"
  # identity_scale: all-ones for reduce
  - name: "identity_scale"
    dims: [64, 64]
    format: "Float16_b"
    const_value: 1.0
  # intermediates and outputs
  - name: "qkt"
    dims: [32, 64]
    format: "Float16_b"
  - name: "row_max"
    dims: [32, 64]
    format: "Float16_b"
  - name: "sub_exp_out"
    dims: [32, 64]
    format: "Float16_b"
  - name: "sub_exp_sum"
    dims: [32, 64]
    format: "Float16_b"
  - name: "attn_v"
    dims: [32, 64]
    format: "Float16_b"
  - name: "sum_recip"
    dims: [32, 64]
    format: "Float16_b"
  - name: "output"
    dims: [32, 64]
    format: "Float16_b"

operations:
  # Step 1: QKT = Q[32,64] x KT[64,64] -> [32,64]
  - math:
      - type: "Fpu"
        src_a: "Q"
        src_b: "KT"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "HiFi2"
    block_size: [32, 64]
    pack:
      - output: "qkt"
        packer: "Packer"

  # Step 2: row_max = reduce_max_row(qkt) with reduce_to_tile
  - math:
      - type: "Fpu"
        src_a: "qkt"
        src_b: "identity_scale"
        operation: "Reduce"
        reduce_dim: "REDUCE_ROW"
        reduce_pool: "MAX"
        reduce_to_tile: true
        unpacker: "ReduceUnpacker"
        math_fidelity: "LoFi"
    block_size: [32, 64]
    pack:
      - output: "row_max"
        packer: "Packer"

  # Step 3: sub_exp = exp(datacopy(qkt))
  # Dual pack: sub_exp_out with ZERO_RELU, sub_exp_sum with L1 accumulation
  - math:
      - type: "Fpu"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "LoFi"
        src_a: "qkt"
        src_b: "identity_scale"
    block_size: [32, 64]
    pack:
      - type: "UnarySfpu"
        operation: "Exp"
        approximation_mode: true
        iterations: 32
      - output: "sub_exp_out"
        packer: "Packer"
        pack_relu: "ZERO_RELU"
      - output: "sub_exp_sum"
        packer: "Packer"
        pack_l1_accumulation: 1

  # Step 4: attn_v = sub_exp_out[32,64] x V[64,64] -> [32,64]
  - math:
      - type: "Fpu"
        src_a: "sub_exp_out"
        src_b: "V"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "HiFi2"
    block_size: [32, 64]
    pack:
      - output: "attn_v"
        packer: "Packer"

  # Step 5: sum_recip = reciprocal(sub_exp_sum)
  # Datacopy loads sum into DEST, then SFPU reciprocal
  - math:
      - type: "Fpu"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "LoFi"
        src_a: "sub_exp_sum"
        src_b: "identity_scale"
      - type: "UnarySfpu"
        operation: "Reciprocal"
        iterations: 32
    block_size: [32, 64]
    pack:
      - output: "sum_recip"
        packer: "Packer"

  # Step 6: output = attn_v * bcast_col(sum_recip) — normalize
  - math:
      - type: "Fpu"
        src_a: "attn_v"
        src_b: "sum_recip"
        operation: "Elwmul"
        unpacker: "UnpackerAB"
        broadcast_type: "COL"
        math_fidelity: "LoFi"
    block_size: [32, 64]
    pack:
      - output: "output"
        packer: "Packer"
