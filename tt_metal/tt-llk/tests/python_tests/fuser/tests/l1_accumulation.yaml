# Element-wise add where the packer accumulates results in L1 across iterations.

operands:
  - name: "input_A"
    dims: [128, 128]
    format: "Float16_b"
  - name: "input_B"
    dims: [128, 128]
    format: "Float16_b"
  - name: "l1_acc_out"
    dims: [128, 128]
    format: "Float16_b"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwadd"
        unpacker: "UnpackerAB"
        math_fidelity: "LoFi"
    block_size: [64, 64]
    pack:
      - output: "l1_acc_out"
        packer: "Packer"
        pack_l1_accumulation: 1
