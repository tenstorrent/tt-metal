# Subtraction where source B is a column vector broadcast across every column.

supported_archs: ["wormhole", "blackhole"]

operands:
  - name: "input_A"
    dims: [32, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [32, 256]
    format: "Float16_b"
  - name: "sub_bcast_col_custom_out"
    dims: [32, 256]
    format: "Float16_b"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "SubBcastColCustom"
        unpacker: "SubBcastColCustomUnpacker"
        math_fidelity: "LoFi"
    block_size: [32, 256]
    pack:
      - output: "sub_bcast_col_custom_out"
        packer: "Packer"
