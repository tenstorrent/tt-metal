# SFPU operations interleaved on the pack thread.
# Datacopy loads data into dest, then the pack list alternates between
# packing the current dest contents and applying SFPU transforms:
#   pack(raw) -> exp -> pack(exp) -> neg -> pack(neg(exp))
# Each packed output captures a different snapshot of dest.

supported_archs: ["wormhole", "blackhole"]

operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [256, 256]
    format: "Float16_b"
  - name: "out_raw"
    dims: [256, 256]
    format: "Float16_b"
  - name: "out_after_exp"
    dims: [256, 256]
    format: "Float16_b"
  - name: "out_after_neg"
    dims: [256, 256]
    format: "Float16_b"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "LoFi"
    block_size: [64, 64]
    pack:
      - output: "out_raw"
        packer: "Packer"
      - type: "UnarySfpu"
        operation: "Exp"
        approximation_mode: false
        iterations: 32
      - output: "out_after_exp"
        packer: "Packer"
      - type: "UnarySfpu"
        operation: "Neg"
        approximation_mode: false
        iterations: 32
      - output: "out_after_neg"
        packer: "Packer"
