# Four operations that mimic an SDPA sequence: matmul, block max reduce,
# column broadcast elwadd, and matmul again. Each stage uses a different
# unpacker type, so the init and uninit transitions all get exercised.

supported_archs: ["wormhole", "blackhole"]

operands:
  - name: "input_A"
    dims: [32, 32]
    format: "Float16_b"
  - name: "input_B"
    dims: [32, 32]
    format: "Float16_b"
    const_value: 1.0
  - name: "output1"
    dims: [32, 32]
    format: "Float16_b"
  - name: "output2"
    dims: [32, 32]
    format: "Float16_b"
  - name: "output3"
    dims: [32, 32]
    format: "Float16_b"
  - name: "output4"
    dims: [32, 32]
    format: "Float16_b"

operations:
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "LoFi"

    pack:
      - output: "output1"
        packer: "Packer"
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "ReduceBlockMax"
        unpacker: "ReduceBlockMaxUnpacker"
        math_fidelity: "LoFi"

    pack:
      - output: "output2"
        packer: "Packer"
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwadd"
        unpacker: "UnpackerAB"
        broadcast_type: "COL"
        math_fidelity: "LoFi"

    pack:
      - output: "output3"
        packer: "Packer"
  - math:
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Matmul"
        unpacker: "MatmulUnpacker"
        math_fidelity: "LoFi"
    pack:
      - output: "output4"
        packer: "Packer"
