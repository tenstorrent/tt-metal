# Mish activation fused into a single operation: x * tanh(log(1 + exp(x))).
# Chains datacopy, exp, log1p, tanh, and elwmul with dest to srcB reuse.

supported_archs: ["wormhole", "blackhole"]

operands:
  - name: "input_A"
    dims: [256, 256]
    format: "Float16_b"
  - name: "input_B"
    dims: [256, 256]
    format: "Float16_b"
  - name: "mish"
    dims: [256, 256]
    format: "Float16_b"

operations:
  - math:
      - type: "Fpu"
        operation: "Datacopy"
        unpacker: "UnpackerA"
        math_fidelity: "LoFi"
        src_a: "input_A"
        src_b: "input_B"
      - type: "UnarySfpu"
        operation: "Exp"
        approximation_mode: false
        iterations: 32
        dst_dest_tile_index: 0
      - type: "UnarySfpu"
        operation: "Log1p"
        approximation_mode: false
        iterations: 32
        dst_dest_tile_index: 0
      - type: "UnarySfpu"
        operation: "Tanh"
        approximation_mode: false
        iterations: 32
        dst_dest_tile_index: 0
      - type: "Fpu"
        src_a: "input_A"
        src_b: "input_B"
        operation: "Elwmul"
        unpacker: "UnpackerA"
        reuse_dest: "DEST_TO_SRCB"
        # acc_to_dest: true # only for DEST_TO_SRCA
        math_fidelity: "LoFi"
    block_size: [32, 32]
    pack:
      - output: "mish"
        packer: "Packer"
